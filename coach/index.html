function renderInjuryView(){
  var active=D.i.filter(function(x){return !x.resolved;});
  var today=todayStr();
  var soon=active.filter(function(inj){
    if(!inj.returnDate)return false;
    var d=Math.ceil((new Date(inj.returnDate)-new Date(today))/86400000);
    return d>=0&&d<=7;
  });
  var h='';
  h+=heroBlock('<em>怪我・リハビリ</em>の状況','離脱者の現在地と復帰までの道のりを追跡します。');
  var fullRehab=active.filter(function(inj){var ch=getChart(inj.id);return ch&&ch.rtpLevel&&ch.rtpLevel!=='rest'&&ch.rtpLevel!=='full';}).length;
  var recovered30=D.i.filter(function(x){return x.resolved&&x.resolvedDate&&Math.ceil((new Date(today)-new Date(x.resolvedDate))/86400000)<=30;}).length;
  h+='<div class="sec"><div class="grid g4">'+
    rv(kpiTile(active.length,'現在の怪我人','var(--red)','名'),0)+
    rv(kpiTile(soon.length,'7日以内に復帰予定','var(--amber)','名'),1)+
    rv(kpiTile(fullRehab,'リハビリ・部分参加中','var(--blue)','名'),2)+
    rv(kpiTile(recovered30,'過去30日で復帰','var(--green)','名'),3)+
    '</div></div>';
  // 考察
  h+=insightSec(insInjury());
  // 復帰タイムライン
  var withReturn=active.filter(function(x){return x.returnDate;}).sort(function(a,b){return a.returnDate.localeCompare(b.returnDate);});
  if(withReturn.length){
    h+='<div class="sec">'+secH('TIMELINE','復帰予定タイムライン','早い順')+rv('<div class="card">'+withReturn.map(returnRow).join('')+'</div>',1)+'</div>';
  }
  // 怪我人一覧
  h+='<div class="sec">'+secH('INJURY LIST','怪我人の状況',active.length+'名');
  if(!active.length){
    h+=rv('<div class="card"><div class="no">現在、怪我で離脱している選手はいません 🎉</div></div>',1);
  }else{
    active.sort(function(a,b){
      var ra=rtpOrder(getChart(a.id).rtpLevel),rb=rtpOrder(getChart(b.id).rtpLevel);
      return ra-rb;
    });
    active.forEach(function(inj,idx){
      var p=D.p.find(function(x){return idEq(x.id,inj.pid);});if(!p)return;
      var ch=getChart(inj.id);
      var rh=D.r.find(function(x){return idEq(x.injId,inj.id);});
      var rtp=ch.rtpLevel?RTP_LEVELS.find(function(x){return x.k===ch.rtpLevel;}):null;
      var stage=rh?(rh.stage||0):0;
      var progPct=Math.round((stage/(STG.length-1))*100);
      var daysSince=Math.floor((new Date(today)-new Date(inj.date))/86400000);
      var recur=samePartBefore(inj).length>0;
      var c='<div class="card card-hv" onclick="openPlayer('+p.id+')">';
      c+='<div style="display:flex;align-items:center;gap:11px;margin-bottom:12px">'+ava(p,42)+
        '<div style="flex:1;min-width:0"><div style="font-weight:800;font-size:15px">'+escapeHtml(p.name)+'</div>'+
        '<div style="font-size:11px;color:var(--txt-2)">'+escapeHtml(p.position||'-')+'・'+escapeHtml(String(p.year||'-'))+'年 ・ 受傷から'+daysSince+'日</div></div>';
      if(rtp)c+='<span class="bd" style="background:'+hexA(rtpC(rtp.k),.16)+';color:'+rtpC(rtp.k)+'">'+rtp.label+'</span>';
      c+='</div>';
      c+='<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px">'+
        '<span class="chip">'+escapeHtml((inj.side||'')+inj.part)+'</span><span class="chip">'+escapeHtml(inj.type||'')+'</span>'+
        (recur?'<span class="chip" style="background:var(--red-bg);color:var(--red)">再発</span>':'')+
        (inj.returnDate?'<span class="chip" style="color:var(--amber)">復帰予定 '+fmt(inj.returnDate)+'</span>':'')+'</div>';
      c+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px"><span style="font-size:11px;color:var(--txt-2)">リハビリ進捗</span><span style="font-size:11px;font-weight:700;color:var(--accent)">'+STG[stage]+'</span></div>';
      c+='<div class="pbar"><div class="pbar-f" data-w="'+progPct+'"></div></div>';
      c+='</div>';
      h+=rv(c,Math.min(idx,4));
    });
  }
  h+='</div>';
  paint(h);
}

function renderPhysicalView(){
  var h='';
  h+=heroBlock('<em>フィジカル</em>データ','BIG3を軸にチームの筋力レベルと成長を可視化します。');
  var ranked=D.p.map(function(p){return{p:p,big3:getBestBIG3(p.id)||0};}).filter(function(x){return x.big3>0;}).sort(function(a,b){return b.big3-a.big3;});
  if(ranked.length){
    var avgBig3=Math.round(ranked.reduce(function(s,x){return s+x.big3;},0)/ranked.length);
    var maxBig3=ranked[0].big3;
    h+='<div class="sec"><div class="grid g3">'+
      rv(kpiTile(ranked.length,'記録のある選手','var(--blue)','名'),0)+
      rv(kpiTile(avgBig3,'BIG3平均','var(--green)','kg'),1)+
      rv(kpiTile(maxBig3,'BIG3最高','var(--amber)','kg'),2)+
      '</div></div>';
  }
  // ブロンコ目標達成（ポジション別・Chart.js不使用のHTMLバー）
  var cfgBr=getStdCfg();
  var brMeasured=0,brAchieved=0,brFastest=null;
  var brByPos=POS.map(function(ps){
    var std=cfgBr.pos[ps];var goldSec=(std&&std.bronco)?std.bronco:null;
    var members=D.p.filter(function(p){return p.position===ps;});
    var m=0,n=0;
    members.forEach(function(p){
      var bi=getBroncoRankInfo(p.id,getBest(p.id,'bronco')); // 達成ボードは自己ベスト基準（達成・最速・達成率は career-best で判定）
      if(bi&&bi.best!=null){m++;brMeasured++;if(bi.achieved){n++;brAchieved++;}
        // 「チーム最速」は自己ベスト(bestSec=getBest)で判定＝最新値化の影響を受けない
        if(bi.bestSec!=null&&(!brFastest||bi.bestSec<brFastest.best))brFastest={p:p,best:bi.bestSec};}
    });
    return{ps:ps,goldSec:goldSec,measured:m,achieved:n,members:members.length};
  });
  var brRate=brMeasured?Math.round(brAchieved/brMeasured*100):null;
  h+='<div class="sec">'+secH('BRONCO','ブロンコ目標達成','ポジション別基準')+
    rv('<div class="grid g3">'+
      kpiTile(brMeasured,'測定済','#5FA8FF','名')+
      kpiTile(brAchieved,'ゴールド達成','#FFC24A','名')+
      kpiTile(brRate!=null?brRate:'-','達成率','#3DF0A4',brRate!=null?'%':'')+
    '</div>',1);
  var brRows=brByPos.filter(function(r){return r.members>0;}).map(function(r){
    var pct=r.measured?Math.round(r.achieved/r.measured*100):0;
    return'<div class="row" style="align-items:center;gap:10px">'+
      '<div style="width:42px;font-weight:800;font-size:13px">'+escapeHtml(r.ps)+'</div>'+
      '<div style="width:60px;font-size:11px;color:var(--txt-2)">'+(r.goldSec?broncoFmt(r.goldSec):'—')+'</div>'+
      '<div style="flex:1;min-width:40px"><div style="height:8px;background:var(--bg-tertiary);border-radius:4px;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:linear-gradient(90deg,#FFC24A,#3DF0A4);border-radius:4px"></div></div></div>'+
      '<div style="width:52px;text-align:right;font-size:12px;font-weight:800">'+r.achieved+'/'+r.measured+'</div>'+
    '</div>';
  }).join('');
  h+=rv('<div class="card" style="margin-top:12px">'+(brRows||'<div class="no">記録がありません</div>')+
    (brFastest?'<div class="row" style="margin-top:8px;padding-top:8px;border-top:1px solid var(--line)"><div style="flex:1;min-width:0;display:flex;align-items:center;gap:6px">'+ava(brFastest.p,26)+'<span style="font-weight:700;font-size:13px;color:var(--txt)">'+escapeHtml(brFastest.p.name)+'</span></div><div style="font-size:10px;color:var(--txt-3);margin-right:8px">チーム最速</div><div style="font-weight:800;color:var(--accent)">'+broncoFmt(brFastest.best)+'</div></div>':'')+
    '</div>',2);
  h+='</div>';
  // 考察
  h+=insightSec(insPhysical());
  // ポジション別平均
  h+='<div class="sec">'+secH('POSITION','ポジション別 平均','FW / BK')+
    rv('<div class="card"><div style="position:relative;height:240px"><canvas id="pos-chart"></canvas></div></div>',1)+'</div>';
  // ランキング（表彰台＋リスト）
  h+='<div class="sec">'+secH('RANKING','BIG3 ランキング','合計ベスト');
  if(!ranked.length){h+=rv('<div class="card"><div class="no">記録がありません</div></div>',1);}
  else{
    var top3=ranked.slice(0,3);
    if(top3.length===3){
      var podOrder=[1,0,2];
      var pods=podOrder.map(function(oi,vi){
        var r=top3[oi];if(!r)return '';
        return '<div class="pod'+(oi===0?' pod-1':'')+'" onclick="openPlayer('+r.p.id+')">'+
          '<div class="pod-medal">'+['🥇','🥈','🥉'][oi]+'</div>'+
          '<div style="display:flex;justify-content:center">'+ava(r.p,oi===0?52:42)+'</div>'+
          '<div class="pod-name">'+escapeHtml(r.p.name)+'</div>'+
          '<div class="pod-meta">'+escapeHtml(r.p.position||'-')+'・'+escapeHtml(String(r.p.year||'-'))+'年</div>'+
          '<div class="pod-val"><span class="cv" data-cnt="'+r.big3+'">0</span><span class="unit">kg</span></div></div>';
      }).join('');
      h+=rv('<div class="podium">'+pods+'</div>',1);
    }
    var rest=ranked.slice(top3.length===3?3:0,15);
    if(rest.length){
      var rows=rest.map(function(r,i){
        var rank=(top3.length===3?4:1)+i;
        return '<div class="row row-click" onclick="openPlayer('+r.p.id+')">'+
          '<div style="width:26px;font-weight:800;font-size:13px;color:var(--txt-3);text-align:center">'+rank+'</div>'+
          ava(r.p,30)+
          '<div style="flex:1;min-width:0"><div style="font-weight:700;font-size:13px">'+escapeHtml(r.p.name)+'</div>'+
          '<div style="font-size:10px;color:var(--txt-2)">'+escapeHtml(r.p.position||'-')+'・'+escapeHtml(String(r.p.year||'-'))+'年</div></div>'+
          '<div style="font-weight:800;font-size:15px;color:var(--accent)">'+r.big3+'<span style="font-size:10px;color:var(--txt-2);font-weight:500"> kg</span></div></div>';
      }).join('');
      h+=rv('<div class="card" style="margin-top:12px">'+rows+'</div>',2);
    }
  }
  h+='</div>';
  paint(h);
  // ポジション別チャート
  setTimeout(function(){
    var e=document.getElementById('pos-chart');if(!e)return;
    var FW=['PR','HO','LO','FL','No.8'],BK=['SH','SO','CTB','WTB','FB'];
    function groupAvg(positions,field){
      var vals=D.p.filter(function(p){return positions.indexOf(p.position)>=0;}).map(function(p){return getBest(p.id,field);}).filter(function(v){return v!=null;});
      if(!vals.length)return null;
      return Math.round(vals.reduce(function(s,v){return s+v;},0)/vals.length);
    }
    var fields=[{k:'squat',l:'SQ'},{k:'bench',l:'BP'},{k:'deadlift',l:'DL'}];
    var fwData=fields.map(function(f){return groupAvg(FW,f.k)||0;});
    var bkData=fields.map(function(f){return groupAvg(BK,f.k)||0;});
    dC('pos');
    charts.pos=new Chart(e,{type:'bar',data:{labels:fields.map(function(f){return f.l;}),datasets:[
      {label:'FW',data:fwData,backgroundColor:'#5FA8FF',borderRadius:8},
      {label:'BK',data:bkData,backgroundColor:'#3DF0A4',borderRadius:8}
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#9DAEC7',usePointStyle:true,pointStyle:'circle',padding:14}},tooltip:{backgroundColor:'rgba(5,10,18,.95)',padding:12,cornerRadius:10,callbacks:{label:function(c){return c.dataset.label+': '+c.parsed.y+' kg';}}}},scales:{y:{grid:{color:'rgba(255,255,255,.06)'},ticks:{color:'#9DAEC7'}},x:{grid:{display:false},ticks:{color:'#9DAEC7',font:{size:13,weight:'600'}}}}}});
  },60);
}
</script>
<script>
// ========================================================
// ③ トレーニングビュー
// ========================================================
function renderTrainingView(){
  var today=todayStr();
  var h='';
  h+=heroBlock('<em>トレーニング</em>の実施状況','実施記録・ボリューム・怪我による制限をチェックします。');
  var logs=tlogAll().slice().sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});
  var cutoff=agoStr(13);
  var recent=logs.filter(function(l){return l.date>=cutoff;});
  var doneCount=recent.filter(function(l){return !l.absent&&l.kind!=='self';}).length; // チーム練習参加の指標=自主トレは含めない
  var absentCount=recent.filter(function(l){return l.absent;}).length;
  var injuryAbsent=recent.filter(function(l){return l.absent&&l.absentReason==='痛み・怪我';}).length;
  var vol7=teamVolume(agoStr(6),today);
  h+='<div class="sec"><div class="grid g4">'+
    rv(kpiTile(doneCount,'実施記録（14日）','var(--green)','件'),0)+
    rv(kpiTile(absentCount,'欠席（14日）','var(--amber)','件'),1)+
    rv(kpiTile(injuryAbsent,'怪我による欠席','var(--red)','件'),2)+
    rv(kpiTile(Math.round(vol7/1000),'総ボリューム（7日）','var(--blue)','t'),3)+
    '</div></div>';
  // 考察
  h+=insightSec(insTraining());
  // 怪我でできなかった種目
  var injNotices=[];
  recent.forEach(function(lg){
    if(lg.absent&&lg.absentReason==='痛み・怪我'){var pa=D.p.find(function(x){return idEq(x.id,lg.pid);});if(pa)injNotices.push({name:pa.name,pid:lg.pid,ex:'全体欠席',date:lg.date});return;}
    (lg.results||[]).forEach(function(r){if(r.skipped&&r.skipReason==='痛み・怪我'){var p=D.p.find(function(x){return idEq(x.id,lg.pid);});if(p)injNotices.push({name:p.name,pid:lg.pid,ex:r.exName,date:lg.date});}});
  });
  if(injNotices.length){
    h+='<div class="sec">'+secH('ALERT','痛み・怪我でできなかった種目','直近14日')+
      rv('<div class="card" style="border-left:3px solid var(--red)">'+injNotices.slice(0,12).map(function(n){
        return '<div class="row row-click" onclick="openPlayer('+n.pid+')"><span style="flex:1;font-size:13px;font-weight:700">'+escapeHtml(n.name)+'</span><span style="font-size:12px;color:var(--txt-2)">'+escapeHtml(n.ex)+'</span><span style="font-size:10px;color:var(--txt-3);margin-left:8px">'+fmt(n.date)+'</span></div>';
      }).join('')+'</div>',1)+'</div>';
  }
  // 実施記録一覧
  h+='<div class="sec">'+secH('LOG','トレーニング記録','新しい順');
  if(!logs.length){h+=rv('<div class="card"><div class="no">まだ記録がありません</div></div>',1);}
  else{
    var rows='';
    logs.slice(0,25).forEach(function(lg){
      var p=D.p.find(function(x){return idEq(x.id,lg.pid);});if(!p)return;
      var selfBadge=lg.kind==='self'?' <span class="bd bd-b">自主</span>':'';
      if(lg.absent){
        var rc=lg.absentReason==='痛み・怪我'?'bd-r':'bd-n';
        rows+='<div class="row row-click" onclick="openPlayer('+lg.pid+')">'+ava(p,30)+'<div style="flex:1;min-width:0"><div style="font-weight:700;font-size:13px">'+escapeHtml(p.name)+' <span class="bd '+rc+'">欠席</span></div><div style="font-size:10px;color:var(--txt-2)">'+fmt(lg.date)+' ・ '+escapeHtml(lg.absentReason||'')+'</div></div></div>';
      }else if(lg.fitness){
        // フィットネス記録: results:[]/totalVolume:0 のため種目数/kg欄は無意味→種類+時間（+距離/RPE）を出す
        var ff=lg.fitness;
        var fMeta=fitTimeStr(ff)+(ff.km!=null?' ・ '+ff.km+'km':'')+(ff.rpe!=null?' ・ RPE'+ff.rpe:'');
        rows+='<div class="row row-click" onclick="openPlayer('+lg.pid+')">'+ava(p,30)+'<div style="flex:1;min-width:0"><div style="font-weight:700;font-size:13px">'+escapeHtml(ff.ftype||'フィットネス')+selfBadge+'</div><div style="font-size:10px;color:var(--txt-2)">'+escapeHtml(p.name)+' ・ '+fmt(lg.date)+'</div></div><div style="font-weight:800;color:var(--green);font-size:12px">'+escapeHtml(fMeta)+'</div></div>';
      }else{
        rows+='<div class="row row-click" onclick="openPlayer('+lg.pid+')">'+ava(p,30)+'<div style="flex:1;min-width:0"><div style="font-weight:700;font-size:13px">'+escapeHtml(p.name)+selfBadge+'</div><div style="font-size:10px;color:var(--txt-2)">'+fmt(lg.date)+' ・ '+(lg.results?lg.results.length:0)+'種目</div></div><div style="font-weight:800;color:var(--accent);font-size:14px">'+(lg.totalVolume||0).toLocaleString()+'<span style="font-size:10px;color:var(--txt-2)"> kg</span></div></div>';
      }
    });
    h+=rv('<div class="card">'+rows+'</div>',1);
  }
  h+='</div>';
  paint(h);
}

      dC('cond');
      charts.cond=new Chart(e,{type:'line',data:{labels:daily.map(function(d){return d.date.slice(5);}),datasets:[
        {label:'平均疲労度',data:daily.map(function(d){return d.rpe!=null?Math.round(d.rpe*10)/10:null;}),borderColor:'#FFC069',backgroundColor:'rgba(255,192,105,.12)',borderWidth:2.5,fill:true,tension:.4,spanGaps:true,pointRadius:3,pointBackgroundColor:'#0D1520',pointBorderColor:'#FFC069',pointBorderWidth:2,yAxisID:'y'},
        {label:'平均睡眠(h)',data:daily.map(function(d){return d.sleep!=null?Math.round(d.sleep*10)/10:null;}),borderColor:'#C7A4FF',borderWidth:2.5,fill:false,tension:.4,spanGaps:true,pointRadius:3,pointBackgroundColor:'#0D1520',pointBorderColor:'#C7A4FF',pointBorderWidth:2,yAxisID:'y2'}
      ]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{labels:{color:'#9DAEC7',usePointStyle:true,pointStyle:'circle',boxWidth:7,padding:12,font:{size:11}}},tooltip:{backgroundColor:'rgba(5,10,18,.95)',padding:10,cornerRadius:10}},scales:{y:{min:0,max:10,grid:{color:'rgba(255,255,255,.06)'},ticks:{color:'#FFC069',font:{size:10}}},y2:{position:'right',min:0,max:12,grid:{display:false},ticks:{color:'#C7A4FF',font:{size:10}}},x:{grid:{display:false},ticks:{color:'#9DAEC7',font:{size:10}}}}}});
    },60);
  }

function renderPlayersView(){

function setPosFilter(v){window._posFilter=v;window._noAnim=true;render();window._noAnim=false;}
// 個人レポート用: BIG3ランクバッジ＋体重帯（staff選手詳細と同じ基準エンジンを使用。閲覧専用のため書込は一切なし）
function renderStdBadgesCoach(pid){
  var p=D.p.find(function(x){return idEq(x.id,pid);});
  if(!p)return'';
  if(!p.position)return'<div class="card" style="margin-top:12px"><div class="no">ポジション未登録のため基準未表示</div></div>';
  var weak=getWeakLift(pid);
  var liftsHtml=STD_LIFTS.map(function(l){
    var inf=getLiftRankInfo(pid,l.k);
    var isWeak=weak&&weak.lift===l.k;
    if(!inf||inf.noWeight||!inf.oneRM)return'<div style="background:var(--bg-elev);border-radius:10px;padding:10px;text-align:center"><div style="font-size:15px;font-weight:800;color:var(--txt-3)">-</div><div style="font-size:10px;color:var(--txt-2);margin-top:2px">'+l.short+(inf&&inf.noWeight?' (体重なし)':'')+'</div></div>';
    var rankLabel=inf.rank?inf.rank.label:'未到達';
    var rankColor=inf.rank?inf.rank.color:'var(--txt-3)';
    return'<div style="background:var(--bg-elev);border-radius:10px;padding:10px;text-align:center"><div style="font-size:15px;font-weight:800;color:'+rankColor+'">'+rankLabel+(isWeak?' 🎯':'')+'</div><div style="font-size:10px;color:var(--txt-2);margin-top:2px">'+l.short+' '+inf.oneRM+'kg'+(inf.bestRM!=null&&inf.bestRM!==inf.oneRM?' <span style="color:var(--txt-3)">(Best '+inf.bestRM+')</span>':'')+'</div></div>';
  }).join('');
  var band=getWeightBandInfo(pid);
  var bandHtml='';
  if(band&&band.noHeight)bandHtml='<div style="font-size:11px;color:var(--txt-3);margin-top:10px">身長未登録のため推奨体重帯は非表示</div>';
  else if(band){
    var stChip=band.status==='in'?'<span class="bd bd-g">帯内 ✓</span>'
      :band.status==='under'?'<span class="bd bd-a">帯まで +'+band.diff+'kg</span>'
      :band.status==='over'?'<span class="bd bd-r">帯上限 +'+band.diff+'kg</span>':'';
    bandHtml='<div style="font-size:11.5px;margin-top:10px;color:var(--txt-2)">推奨体重帯 <b style="color:var(--txt)">'+band.lo+'〜'+band.hi+'kg</b>'+(band.w!=null?'（現在 '+band.w+'kg）':'')+' '+stChip+'</div>';
  }
  return'<div class="card" style="margin-top:12px"><div style="font-size:13px;font-weight:800;margin-bottom:10px">BIG3基準・体重帯</div><div class="grid g3" style="gap:8px">'+liftsHtml+'</div>'+bandHtml+'</div>';
}
// ========================================================
// 個人レポート
// ========================================================
function renderPlayerReport(pid){
  var p=D.p.find(function(x){return idEq(x.id,pid);});
  if(!p){_detailPid=null;render();return;}
  var today=todayStr();
  var h='<div class="sec">';
  h+='<button class="lnk" style="margin-bottom:14px;font-size:13px" onclick="backFromReport()">‹ 一覧へ戻る</button>';
  // ヘッダー
  h+=rv('<div class="card" style="background:linear-gradient(150deg,rgba(61,240,164,.1),rgba(255,255,255,.02));border-color:rgba(61,240,164,.22)"><div style="display:flex;align-items:center;gap:15px">'+ava(p,58)+
    '<div style="flex:1;min-width:0"><div class="sec-eyebrow">PLAYER REPORT</div><div style="font-size:21px;font-weight:800;letter-spacing:-.01em">'+escapeHtml(p.name)+'</div>'+
    '<div style="font-size:12px;color:var(--txt-2);margin-top:3px">'+escapeHtml(p.position||'-')+' ・ '+escapeHtml(String(p.year||'-'))+'年'+(p.height?' ・ '+p.height+'cm':'')+(p.weight?' / '+p.weight+'kg':'')+'</div></div></div></div>',0);
  // 個人考察
  var pIns=insPlayer(pid);
  if(pIns.length){
    h+='<div style="margin-top:14px"></div>';
    h+='<div class="ins-list">'+pIns.map(insCard).join('')+'</div>';
  }
  // 現在の怪我
  var activeInj=D.i.filter(function(x){return idEq(x.pid,pid)&&!x.resolved;});
  if(activeInj.length){
    var ic='<div style="font-size:13px;font-weight:800;color:var(--red);margin-bottom:10px">現在の怪我・リハビリ</div>';
    activeInj.forEach(function(inj){
      var ch=getChart(inj.id);var rh=D.r.find(function(x){return idEq(x.injId,inj.id);});
      var rtp=ch.rtpLevel?RTP_LEVELS.find(function(x){return x.k===ch.rtpLevel;}):null;
      var stage=rh?(rh.stage||0):0;var progPct=Math.round((stage/(STG.length-1))*100);
      var days=inj.returnDate?Math.ceil((new Date(inj.returnDate)-new Date(today))/86400000):null;
      ic+='<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap"><span style="font-weight:700;font-size:14px">'+escapeHtml((inj.side||'')+inj.part+' '+inj.type)+'</span>'+(rtp?'<span class="bd" style="background:'+hexA(rtpC(rtp.k),.16)+';color:'+rtpC(rtp.k)+'">'+rtp.label+'</span>':'')+'</div>';
      ic+='<div style="font-size:11px;color:var(--txt-2);margin-bottom:7px">受傷: '+fmt(inj.date)+(inj.returnDate?' ／ 復帰予定: '+fmt(inj.returnDate)+(days!=null?'（'+(days<0?(-days)+'日超過':days===0?'本日':'あと'+days+'日')+'）':''):'')+'</div>';
      ic+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px"><span style="font-size:10px;color:var(--txt-2)">リハビリ進捗</span><span style="font-size:10px;color:var(--accent);font-weight:700">'+STG[stage]+'</span></div><div class="pbar"><div class="pbar-f" data-w="'+progPct+'"></div></div></div>';
    });
    h+=rv('<div class="card" style="border-left:3px solid var(--red);margin-top:14px">'+ic+'</div>',1);
  }else{
    h+=rv('<div class="card" style="margin-top:14px"><div style="font-size:13px;color:var(--green);font-weight:700">✓ 現在、怪我はありません</div></div>',1);
  }
  // フィジカル
  var sq=getBest(pid,'squat'),bp=getBest(pid,'bench'),dl=getBest(pid,'deadlift'),b3=getBestBIG3(pid);
  var phRecs=D.ph.filter(function(x){return idEq(x.pid,pid);}).sort(function(a,b){return (a.date||'').localeCompare(b.date||'');});
  var pc='<div style="font-size:13px;font-weight:800;margin-bottom:10px">フィジカル <span style="font-size:10px;color:var(--txt-3);font-weight:600">ベスト記録</span></div>';
  pc+='<div class="grid g4" style="gap:8px">'+miniStat('SQ',sq)+miniStat('BP',bp)+miniStat('DL',dl)+miniStat('BIG3',b3,'var(--accent)')+'</div>';
  var e1=getLatestE1RMReport(pid);
  if(Object.keys(e1).length){
    pc+='<div style="margin-top:10px;font-size:11px;color:var(--txt-2)">推定1RM（参考）: '+Object.keys(e1).map(function(k){var l=(EST_BASES.find(function(b){return b.k===k;})||{}).label||k;return l+' '+e1[k]+'kg';}).join(' / ')+'</div>';
  }
  if(phRecs.length>=2){
    pc+='<div style="position:relative;height:180px;margin-top:14px"><canvas id="rep-phys-chart"></canvas></div>';
  }
  h+=rv('<div class="card" style="margin-top:12px">'+pc+'</div>',2);
  var stdHtml=renderStdBadgesCoach(pid);
  if(stdHtml)h+=rv(stdHtml,2);
  // トレーニング（種目推移＋セッション履歴: 既存ヘルパー流用）
  h+='<div class="rv" style="--d:.1s">'+buildTrendCoach(pid)+'</div>';
  h+='<div class="rv" style="--d:.1s">'+buildHistCoach(pid)+'</div>';
  // コンディション
  var recent7=agoStr(6);
  var condRecs=D.f.filter(function(x){return idEq(x.pid,pid)&&x.date>=recent7;});
  if(condRecs.length){
    var sleepRecs=condRecs.filter(function(x){return x.sleep;});
    var avgSleep=sleepRecs.length?sleepRecs.reduce(function(s,x){return s+x.sleep;},0)/sleepRecs.length:0;
    var avgRpe=condRecs.reduce(function(s,x){return s+(x.rpe||0);},0)/condRecs.length;
    var condStats=miniStat('平均睡眠',avgSleep?avgSleep.toFixed(1)+'h':'-')+miniStat('平均疲労度',avgRpe?avgRpe.toFixed(1):'-');
    // 拡張項目（任意入力のため記録がある期間のみ平均を出す）
    [['mood','平均気分'],['stress','平均ストレス'],['soreness','平均筋肉痛']].forEach(function(f){
      var recs=condRecs.filter(function(x){return x[f[0]];});
      if(recs.length)condStats+=miniStat(f[1],(recs.reduce(function(s,x){return s+x[f[0]];},0)/recs.length).toFixed(1));
    });
    h+=rv('<div class="card" style="margin-top:12px"><div style="font-size:13px;font-weight:800;margin-bottom:10px">コンディション <span style="font-size:10px;color:var(--txt-3);font-weight:600">直近7日平均</span></div><div class="grid g4" style="gap:8px">'+condStats+'</div></div>',1);
  }
  // 怪我歴
  var pastInj=D.i.filter(function(x){return idEq(x.pid,pid)&&x.resolved;}).sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});
  if(pastInj.length){
    var hist='<div style="font-size:13px;font-weight:800;margin-bottom:10px">過去の怪我歴</div>';
    pastInj.slice(0,8).forEach(function(inj){
      hist+='<div class="row"><div style="flex:1"><div style="font-size:12px;font-weight:700">'+escapeHtml((inj.side||'')+inj.part+' '+inj.type)+'</div><div style="font-size:10px;color:var(--txt-2)">'+fmt(inj.date)+(inj.resolvedDate?' 〜 '+fmt(inj.resolvedDate):'')+'</div></div></div>';
    });
    h+=rv('<div class="card" style="margin-top:12px">'+hist+'</div>',1);
  }
  h+='</div>';
  paint(h);
  // BIG3推移グラフ
  if(phRecs.length>=2){
    setTimeout(function(){
      var e=document.getElementById('rep-phys-chart');if(!e)return;
      var ctx=e.getContext('2d');
      function grad(c1,c2){var g=ctx.createLinearGradient(0,0,0,180);g.addColorStop(0,c1);g.addColorStop(1,c2);return g;}
      function mk(label,key,color,ft){return{label:label,data:phRecs.map(function(r){return r[key]||null;}),borderColor:color,backgroundColor:grad(ft,'rgba(0,0,0,0)'),borderWidth:2.5,fill:true,tension:.4,pointRadius:3,pointBackgroundColor:'#0D1520',pointBorderColor:color,pointBorderWidth:2};}
      dC('repphys');
      charts.repphys=new Chart(e,{type:'line',data:{labels:phRecs.map(function(r){return r.date.slice(5);}),datasets:[
        mk('SQ','squat','#5FA8FF','rgba(95,168,255,.2)'),
        mk('BP','bench','#3DF0A4','rgba(61,240,164,.2)'),
        mk('DL','deadlift','#FFC069','rgba(255,192,105,.2)')
      ]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{labels:{color:'#9DAEC7',usePointStyle:true,pointStyle:'circle',boxWidth:7,padding:12,font:{size:11}}},tooltip:{backgroundColor:'rgba(5,10,18,.95)',padding:10,cornerRadius:10,callbacks:{label:function(c){return c.dataset.label+': '+(c.parsed.y!=null?c.parsed.y+'kg':'-');}}}},scales:{y:{grid:{color:'rgba(255,255,255,.06)'},ticks:{color:'#9DAEC7',font:{size:10}}},x:{grid:{display:false},ticks:{color:'#9DAEC7',font:{size:10}}}}}});
    },60);
  }
  // 種目推移グラフ
  setTimeout(function(){drawTrChartC(pid,window._trEx,window._trMetric);},60);
}
</script>
<script>
// ========== ナビ ==========
var TABS=[
  {k:'home',label:'概況'},
  {k:'injury',label:'怪我・リハビリ'},
  {k:'physical',label:'フィジカル'},
  {k:'training',label:'トレーニング'},
  {k:'condition',label:'コンディション'},
  {k:'players',label:'選手一覧'}
];
var curTab='home';
var _detailPid=null;
var _seenTabs={home:1};
function renderTabs(){
  // 個人レポート表示中はタブのハイライトを外す（現在地の嘘を防ぐ）
  var activeK=(_detailPid==null)?curTab:null;
  document.getElementById('tabs').innerHTML=TABS.map(function(t){
    return '<div class="tab'+(t.k===activeK?' ac':'')+'" onclick="goTab(\''+t.k+'\')">'+t.label+'</div>';
  }).join('');
  if(document.querySelector){
    var ac=document.querySelector('.tab.ac');
    if(ac&&ac.scrollIntoView){try{ac.scrollIntoView({inline:'center',block:'nearest'});}catch(e){}}
  }
}
function goTab(k){
  var first=!_seenTabs[k];_seenTabs[k]=1;
  curTab=k;_detailPid=null;
  try{history.replaceState({tab:k},'','#'+k);}catch(e){}
  renderTabs();
  if(!first)window._noAnim=true;  // 2回目以降のタブはアニメなしで即表示
  render();
  window._noAnim=false;
  window.scrollTo(0,0);
}
function backFromReport(){
  if(window.history&&history.state&&history.state.pid!=null){history.back();return;}
  _detailPid=null;render();window.scrollTo(0,0);
}
// iPhoneのエッジスワイプ／ブラウザバックで個人レポートから戻れるように
if(window.addEventListener){
  window.addEventListener('popstate',function(e){
    _detailPid=(e.state&&e.state.pid!=null)?e.state.pid:null;
    window._noAnim=true;render();window._noAnim=false;
    window.scrollTo(0,0);
  });
}
// 種目セレクタ／指標トグル変更（blk_train版を上書き: 再描画アニメなし・スクロール位置維持）
function setTrExC(v){window._trEx=(v||'').trim();var y=window.scrollY;window._noAnim=true;renderPlayerReport(_detailPid);window._noAnim=false;window.scrollTo(0,y);}
function setTrMetricC(m){window._trMetric=m;var y=window.scrollY;window._noAnim=true;renderPlayerReport(_detailPid);window._noAnim=false;window.scrollTo(0,y);}
function render(){
  renderTabs();
  renderSyncStatus();
  dCA();
  if(_detailPid){renderPlayerReport(_detailPid);return;}
  if(curTab==='home')renderHomeView();
  else if(curTab==='injury')renderInjuryView();
  else if(curTab==='physical')renderPhysicalView();
  else if(curTab==='training')renderTrainingView();
  else if(curTab==='condition')renderConditionView();
  else if(curTab==='players')renderPlayersView();
}
loadData();
</script>
</body>
