<style>
:root{
  --bg-app:#050A12;
  --bg-panel:rgba(255,255,255,.04);
  --bg-panel-2:rgba(255,255,255,.055);
  --bg-elev:rgba(255,255,255,.09);
  --line:rgba(255,255,255,.08);--line-2:rgba(255,255,255,.16);
  --accent:#3DF0A4;--accent-2:#14B87D;--accent-glow:rgba(61,240,164,.28);
  --blue:#5FA8FF;--blue-bg:rgba(95,168,255,.15);
  --amber:#FFC069;--amber-bg:rgba(255,192,105,.15);
  --red:#FF7B7B;--red-bg:rgba(255,123,123,.15);
  --purple:#C7A4FF;--purple-bg:rgba(199,164,255,.15);
  --green:#3DF0A4;--green-bg:rgba(61,240,164,.14);
  --txt:#F1F6FF;--txt-2:#9DAEC7;--txt-3:#6F82A0;
  --radius:18px;--radius-sm:12px;
  --shadow:0 14px 44px rgba(0,0,0,.45);
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans JP',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg-app);color:var(--txt);min-height:100vh;-webkit-font-smoothing:antialiased;padding-bottom:calc(64px + env(safe-area-inset-bottom));overflow-x:hidden;font-variant-numeric:tabular-nums;-webkit-tap-highlight-color:transparent}
/* ===== 背景エフェクト ===== */
.fx-bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.orb{position:absolute;border-radius:50%;will-change:transform}
@media(max-width:720px){.orb-3{display:none}}
.orb-1{width:560px;height:560px;left:-180px;top:-200px;background:radial-gradient(circle,rgba(20,184,125,.17),transparent 64%);animation:drift1 26s ease-in-out infinite alternate}
.orb-2{width:660px;height:660px;right:-240px;top:110px;background:radial-gradient(circle,rgba(95,168,255,.11),transparent 64%);animation:drift2 34s ease-in-out infinite alternate}
.orb-3{width:500px;height:500px;left:28%;bottom:-260px;background:radial-gradient(circle,rgba(199,164,255,.09),transparent 64%);animation:drift1 40s ease-in-out infinite alternate-reverse}
@keyframes drift1{from{transform:translate(0,0) scale(1)}to{transform:translate(60px,44px) scale(1.12)}}
@keyframes drift2{from{transform:translate(0,0) scale(1)}to{transform:translate(-72px,52px) scale(1.08)}}
.wrap{max-width:1080px;margin:0 auto;padding:0 18px;position:relative;z-index:1}
/* ===== ヘッダー ===== */
.topbar{position:sticky;top:0;z-index:50;background:rgba(5,10,18,.72);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-bottom:1px solid var(--line)}
.topbar-inner{max-width:1080px;margin:0 auto;padding:12px 18px;padding-top:calc(12px + env(safe-area-inset-top));display:flex;align-items:center;gap:11px}
.brand-logo{width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,#35E89C,#1FA2FF);display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 4px 18px var(--accent-glow);flex-shrink:0}
.brand-txt h1{font-size:14.5px;font-weight:800;letter-spacing:.01em;line-height:1.25}
.brand-txt p{font-size:10px;color:var(--txt-2);font-weight:700;letter-spacing:.09em}
.view-badge{margin-left:auto;font-size:10px;font-weight:800;color:var(--accent);background:rgba(61,240,164,.1);border:1px solid rgba(61,240,164,.32);padding:5px 11px;border-radius:99px;letter-spacing:.08em;white-space:nowrap}
/* ===== タブ ===== */
.tabs-bar{position:sticky;top:63px;z-index:40;background:linear-gradient(180deg,rgba(5,10,18,.94) 68%,rgba(5,10,18,0));padding:10px 0 14px}
.tabs{max-width:1080px;margin:0 auto;padding:0 44px 0 18px;display:flex;gap:7px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;-webkit-mask-image:linear-gradient(90deg,#000 calc(100% - 32px),transparent);mask-image:linear-gradient(90deg,#000 calc(100% - 32px),transparent)}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:11px 17px;border-radius:99px;font-size:12.5px;font-weight:700;color:var(--txt-2);cursor:pointer;white-space:nowrap;transition:all .22s;border:1px solid var(--line);background:rgba(255,255,255,.03)}
@media(hover:hover){.tab:hover{color:var(--txt);border-color:var(--line-2);transform:translateY(-1px)}}
.tab.ac{background:linear-gradient(135deg,#35E89C,#1FA2FF);color:#04140C;border-color:transparent;box-shadow:0 5px 20px var(--accent-glow)}
/* ===== ヒーロー ===== */
.hero{padding:22px 0 2px}
.hero-date{font-size:10.5px;font-weight:800;letter-spacing:.2em;color:var(--txt-3)}
.hero-title{font-size:26px;font-weight:800;letter-spacing:-.02em;margin-top:5px;line-height:1.3}
.hero-title em{font-style:normal;background:linear-gradient(90deg,var(--accent),#6EC3FF);-webkit-background-clip:text;background-clip:text;color:transparent}
.hero-sub{font-size:12.5px;color:var(--txt-2);margin-top:6px;line-height:1.6}
/* ===== セクション ===== */
.sec{margin:30px 0}
.sec-h{margin-bottom:14px}
.sec-eyebrow{font-size:9.5px;font-weight:800;letter-spacing:.24em;color:var(--accent);margin-bottom:5px}
.sec-h h2{font-size:18.5px;font-weight:800;letter-spacing:-.01em;display:flex;align-items:baseline;gap:9px}
.sec-h .sub{font-size:11.5px;color:var(--txt-3);font-weight:600}
/* ===== カード ===== */
.card{background:linear-gradient(165deg,rgba(255,255,255,.055),rgba(255,255,255,.018));border:1px solid var(--line);border-radius:var(--radius);padding:18px;position:relative}
.card+.card{margin-top:12px}
.card-hv{transition:transform .25s,border-color .25s,box-shadow .25s;cursor:pointer}
.card-hv:active{transform:scale(.985);transition-duration:.08s}
@media(hover:hover){.card-hv:hover{transform:translateY(-3px);border-color:var(--line-2);box-shadow:var(--shadow)}}
.grid{display:grid;gap:12px}
.g2{grid-template-columns:repeat(2,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}
@media(max-width:720px){.g3,.g4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:460px){.g2{grid-template-columns:1fr}}
/* ===== KPI ===== */
.kpi{background:linear-gradient(165deg,rgba(255,255,255,.06),rgba(255,255,255,.02));border:1px solid var(--line);border-radius:var(--radius);padding:17px 16px 15px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;left:16px;top:0;width:34px;height:3px;border-radius:0 0 4px 4px;background:var(--kc,var(--accent))}
.kpi-v{font-size:33px;font-weight:800;line-height:1.05;letter-spacing:-.03em;font-variant-numeric:tabular-nums;color:var(--kc,var(--txt))}
.kpi-v .unit{font-size:13px;font-weight:700;color:var(--txt-3);letter-spacing:0;margin-left:2px}
.kpi-l{font-size:11px;color:var(--txt-2);margin-top:7px;font-weight:600}
/* ===== 考察カード ===== */
.ins-list{display:flex;flex-direction:column;gap:10px}
.ins{display:block;padding:15px 16px 14px;border-radius:16px;border:1px solid var(--line);background:linear-gradient(165deg,rgba(255,255,255,.05),rgba(255,255,255,.015));position:relative;overflow:hidden}
.ins::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--ic-c)}
.ins-main{display:flex;gap:13px;align-items:flex-start}
.ins-tap{cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .15s}
.ins-tap:active{transform:scale(.985)}
.ins-chev{margin-left:2px;flex-shrink:0;width:24px;height:24px;border-radius:8px;background:var(--bg-elev);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--txt-2);transition:transform .3s}
.ins.open .ins-chev{transform:rotate(180deg)}
.ins-hint{font-size:9.5px;color:var(--txt-3);font-weight:700;margin-top:7px;letter-spacing:.05em}
.ins.open .ins-hint{display:none}
.ins-detail{display:none;margin-top:11px;padding-top:4px;border-top:1px solid var(--line)}
.ins.open .ins-detail{display:block;animation:insIn .35s cubic-bezier(.22,.65,.25,1)}
@keyframes insIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.ins-ic{width:30px;height:30px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0;background:var(--ic-bg);color:var(--ic-c)}
.ins-t{font-size:13.5px;font-weight:700;margin-bottom:3px;line-height:1.45}
.ins-d{font-size:12px;color:var(--txt-2);line-height:1.7}
.ins-d b{color:var(--txt)}
/* ===== 稼働率リング ===== */
.ring-wrap{display:flex;align-items:center;gap:22px;flex-wrap:wrap}
.ring-box{position:relative;width:134px;height:134px;flex-shrink:0}
.ring-box svg{transform:rotate(-90deg);display:block}
.ring-bgc{fill:none;stroke:rgba(255,255,255,.07);stroke-width:11}
.ring-f{fill:none;stroke:url(#ringGrad);stroke-width:11;stroke-linecap:round;transition:stroke-dashoffset 1.4s cubic-bezier(.25,.65,.2,1) .25s}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-v{font-size:27px;font-weight:800;letter-spacing:-.02em;line-height:1}
.ring-v .unit{font-size:12px;color:var(--txt-3);font-weight:700}
.ring-l{font-size:10px;color:var(--txt-2);font-weight:800;letter-spacing:.16em;margin-top:4px}
.ring-legend{flex:1;min-width:170px;display:flex;flex-direction:column;gap:9px}
.rl-row{display:flex;align-items:center;gap:9px;font-size:12.5px}
.rl-dot{width:9px;height:9px;border-radius:3px;flex-shrink:0}
.rl-n{margin-left:auto;font-weight:800;font-size:15px;font-variant-numeric:tabular-nums}
/* ===== バッジ・チップ ===== */
.bd{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:800;padding:3.5px 9px;border-radius:99px;letter-spacing:.02em;white-space:nowrap}
.bd-g{background:var(--green-bg);color:var(--green)}.bd-b{background:var(--blue-bg);color:var(--blue)}
.bd-a{background:var(--amber-bg);color:var(--amber)}.bd-r{background:var(--red-bg);color:var(--red)}
.bd-p{background:var(--purple-bg);color:var(--purple)}.bd-n{background:var(--bg-elev);color:var(--txt-2)}
.chip{display:inline-block;font-size:11px;padding:3.5px 10px;border-radius:9px;background:var(--bg-elev);color:var(--txt-2);font-weight:600;margin:2px}
.ava{border-radius:50%;background:var(--bg-elev);border:1px solid var(--line-2);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--accent);background-size:cover;background-position:center;flex-shrink:0}
/* ===== 行 ===== */
.row{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--line)}
.row:last-child{border-bottom:none}
.row-click{cursor:pointer;transition:background .15s;border-radius:10px;margin:0 -9px;padding-left:9px;padding-right:9px}
.row-click:active{background:rgba(255,255,255,.06)}
@media(hover:hover){.row-click:hover{background:rgba(255,255,255,.045)}}
/* ===== プログレスバー ===== */
.pbar{height:7px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden}
.pbar-f{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent-2),var(--accent));width:0;transition:width 1.1s cubic-bezier(.25,.65,.2,1) .2s;box-shadow:0 0 10px var(--accent-glow)}
/* ===== 表彰台 ===== */
.podium{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;align-items:end}
.pod{text-align:center;border:1px solid var(--line);border-radius:var(--radius);padding:16px 8px 14px;background:linear-gradient(175deg,rgba(255,255,255,.06),rgba(255,255,255,.015));cursor:pointer;transition:transform .25s,box-shadow .25s}
.pod:active{transform:scale(.985);transition-duration:.08s}
@media(hover:hover){.pod:hover{transform:translateY(-3px);box-shadow:var(--shadow)}}
.pod-1{padding-top:24px;padding-bottom:20px;border-color:rgba(255,192,105,.4);background:linear-gradient(175deg,rgba(255,192,105,.12),rgba(255,255,255,.015));box-shadow:0 8px 30px rgba(255,192,105,.12)}
.pod-medal{font-size:22px;margin-bottom:6px}
.pod-name{font-size:12.5px;font-weight:700;margin-top:7px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pod-meta{font-size:10.5px;color:var(--txt-3);margin-top:2px}
.pod-val{font-size:17px;font-weight:800;color:var(--accent);margin-top:5px;font-variant-numeric:tabular-nums}
.pod-val .unit{font-size:10px;color:var(--txt-3);font-weight:600}
/* ===== その他 ===== */
.no{text-align:center;color:var(--txt-3);font-size:13px;padding:26px 16px;line-height:1.7}
.muted{color:var(--txt-2)}
.lnk{color:var(--accent);font-size:12px;font-weight:700;cursor:pointer;background:none;border:none;font-family:inherit;padding:0 16px 0 0;min-height:44px;display:inline-flex;align-items:center}
canvas{max-width:100%}
select.sel{background:var(--bg-elev);color:var(--txt);border:1px solid var(--line-2);border-radius:10px;padding:8px 12px;font-size:16px;font-family:inherit;max-width:100%}
.loading{text-align:center;padding:80px 20px;color:var(--txt-2)}
.spinner{width:36px;height:36px;border:3px solid var(--line-2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
/* ===== スクロールリビール ===== */
.rv{opacity:0;transform:translateY(14px);transition:opacity .5s cubic-bezier(.22,.65,.25,1),transform .5s cubic-bezier(.22,.65,.25,1);transition-delay:var(--d,0s)}
.rv.in{opacity:1;transform:none}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}.rv{opacity:1;transform:none}}
</style>

</div>
<script>
// ========== Firebase ==========
firebase.initializeApp({apiKey:"AIzaSyBNBxVywJmZVb7wmWlZkppB0ESf02IPTls",authDomain:"fukuokauniv-rug.firebaseapp.com",projectId:"fukuokauniv-rug",storageBucket:"fukuokauniv-rug.firebasestorage.app",messagingSenderId:"314514138275",appId:"1:314514138275:web:b1b93406813ebaba75cb16"});
var db=firebase.firestore();
var D={p:[],i:[],r:[],ph:[],a:[],f:[],md:[],wc:[],bc:[],ann:[],offday:[],cal:[],matchsel:[],tape:[],tapeslot:[],trainers:[],rtpl:[],rplan:[],rlog:[],phskip:[],rtest_tpl:[],rtest:[],msess:[],injcomm:[],chart:[],taperec:[],tmenu:[],tlog:[],texlist:[],e1rm:[],std:[]};
var SK={p:'rm_players',i:'rm_injuries',r:'rm_rehabs',ph:'rm_physicals',a:'rm_absences',f:'rm_fatigue',md:'rm_matchday',wc:'rm_weekcheck',bc:'rm_bodycomp',ann:'rm_announce',offday:'rm_offday',cal:'rm_calendar',matchsel:'rm_matchsel',tape:'rm_tape',tapeslot:'rm_tapeslot',trainers:'rm_trainers',rtpl:'rm_rehab_tpl',rplan:'rm_rehab_plan',rlog:'rm_rehab_log',phskip:'rm_phskip',rtest_tpl:'rm_rtest_tpl',rtest:'rm_rtest',msess:'rm_msess',injcomm:'rm_injcomm',chart:'rm_chart',taperec:'rm_taperec',tmenu:'rm_tmenu',tlog:'rm_tlog',texlist:'rm_texlist',e1rm:'rm_e1rm',std:'rm_standards'};
var charts={};
function dC(k){if(charts[k]){try{charts[k].destroy();}catch(e){}charts[k]=null;}}
function dCA(){Object.keys(charts).forEach(dC);}
var _loaded={};
var _allKeys=Object.keys(SK);
var _rawCache={};
var _renderTimer=null;
// 取得エラーが出ているキー（オフライン等で握りつぶすと「0件」に見えてしまうのを防ぐ）
var _errKeys={};
var _lastUpdateAt=null;
// ヘッダーの「更新 hh:mm」表示とエラー帯を更新（#mainの再描画とは独立して即時反映）
function renderSyncStatus(){
  var te=document.getElementById('sync-time');
  if(te)te.textContent=_lastUpdateAt?('更新 '+String(_lastUpdateAt.getHours()).padStart(2,'0')+':'+String(_lastUpdateAt.getMinutes()).padStart(2,'0')):'';
  var be=document.getElementById('sync-err');
  if(be){
    var errN=Object.keys(_errKeys).length;
    be.innerHTML=errN?('<div style="background:var(--red-bg);color:var(--red);font-size:11.5px;font-weight:700;padding:9px 18px;text-align:center">⚠ 一部データの取得に失敗しました（通信状況をご確認ください）。表示中の内容が最新でない可能性があります。</div>'):'';
  }
  // 帯の表示有無でtopbarの高さが変わるため、その下に貼りつくtabs-barのsticky位置を実測して追従させる
  var tb=document.querySelector('.topbar'),tbb=document.querySelector('.tabs-bar');
  if(tb&&tbb)tbb.style.top=tb.offsetHeight+'px';
}
// データ読み込み（全キーをリッスン。中身が変わらない通知では再描画しない）
function loadData(){
  _allKeys.forEach(function(k){
    db.collection('appdata').doc(k).onSnapshot(function(doc){
      var raw=doc.exists?doc.data().data:'';
      var changed=_rawCache[k]!==raw;
      _rawCache[k]=raw;
      if(changed&&raw){try{var p=JSON.parse(raw);if(Array.isArray(p))D[k]=p;}catch(e){}}
      _loaded[k]=true;
      delete _errKeys[k];
      _lastUpdateAt=new Date();
      renderSyncStatus();
      if(changed||!_firstRender)maybeRender();
    },function(err){_loaded[k]=true;_errKeys[k]=true;renderSyncStatus();maybeRender();});
  });
}
var _firstRender=false;
function maybeRender(){
  // 主要キーが揃ったら描画（全部待たずに）
  var essential=['p','i','r','ph'];
  if(!essential.every(function(k){return _loaded[k];}))return;
  // tlog容量対策: 選手リストが揃った時点で全選手のアーカイブを1回だけ取得（完了時に静かに再描画）
  if(!window._tlaKicked){window._tlaKicked=true;loadTlogArch(function(){maybeRender();});}
  if(!_firstRender){_firstRender=true;render();return;}
  // 2回目以降＝リアルタイム更新: 300msまとめて・アニメなし・スクロール位置維持で静かに再描画
  if(_renderTimer)clearTimeout(_renderTimer);
  _renderTimer=setTimeout(function(){
    _renderTimer=null;
    var y=window.scrollY;
    window._noAnim=true;render();window._noAnim=false;
    window.scrollTo(0,y);
  },300);
}
$M=function(){return document.getElementById('main');};
</script>

var RCAT_COLOR={ケア:'var(--blue)',ROM改善:'var(--green)',患部外トレーニング:'var(--amber)',トレーニング:'var(--red)',アジリティ:'var(--purple)',フィットネス:'#0891B2',サポート:'#059669',オフ:'var(--text-secondary)'};

function tlaHalf(dateStr){return dateStr.slice(0,4)+'h'+((+dateStr.slice(5,7))<=6?1:2);}

function tlaHalves(){
  var t=todayStr(),y=+t.slice(0,4),h=(+t.slice(5,7))<=6?1:2;
  var out=[],cy=2026,ch=1;
  while(cy<y||(cy===y&&ch<=h)){out.push(cy+'h'+ch);if(ch===1){ch=2;}else{ch=1;cy++;}}

function tlogAll(){
  var base=D.tlog||[];
  if(_tlaCache&&_tlaCacheSrc===base&&_tlaCacheArch===_tlogArch)return _tlaCache;
  var seen={},out=base.slice();
  base.forEach(function(l){if(l&&l.id!=null)seen[l.id]=1;});
  _tlogArch.forEach(function(l){if(l&&l.id!=null&&!seen[l.id])out.push(l);});

// 全選手×全半期のアーカイブdocを一括取得（存在しないdocは空扱い・個別失敗も空扱いで継続）
function loadTlogArch(cb){
  if(_tlogArchLoaded){if(cb)cb();return;}
  if(_tlaCbs){if(cb)_tlaCbs.push(cb);return;}
  _tlaCbs=cb?[cb]:[];
  var halves=tlaHalves(),keys=[];
  (D.p||[]).forEach(function(p){halves.forEach(function(hf){keys.push(tlaKey(p.id,hf));});});
  Promise.all(keys.map(function(k){
    return db.collection('appdata').doc(k).get().then(function(doc){
      if(!doc.exists)return[];
      try{var q=JSON.parse(doc.data().data);return Array.isArray(q)?q:[];}catch(e){return[];}
    }).catch(function(e){console.error('tla load error:',k,e);return[];});
  })).then(function(parts){
    var seen={},out=[];
    parts.forEach(function(arr){arr.forEach(function(l){if(l&&l.id!=null&&!seen[l.id]){seen[l.id]=1;out.push(l);}});});
    _tlogArch=out;_tlogArchLoaded=true;_tlaCache=null;

// 現在体重: 直近30日の実測（コンディションの毎日体重＋体組成）の平均 → 期間外は最新実測 → 選手登録の体重
function getCurrentWeightInfo(pid){
  var since=toDateStr(new Date(Date.now()-29*86400000));
  var recs=[];
  (D.f||[]).forEach(function(r){var w=parseFloat(r.weight);if(idEq(r.pid,pid)&&w>0&&r.date)recs.push({date:r.date,w:w});});
  (D.bc||[]).forEach(function(r){var w=parseFloat(r.weight);if(idEq(r.pid,pid)&&w>0&&r.date)recs.push({date:r.date,w:w});});
  var recent=recs.filter(function(x){return x.date>=since;});
  if(recent.length){
    var avg=recent.reduce(function(s,x){return s+x.w;},0)/recent.length;
    return{w:Math.round(avg*10)/10,src:'直近30日平均・'+recent.length+'回',live:true};
  }
  if(recs.length){
    recs.sort(function(a,b){return(b.date||'').localeCompare(a.date||'');});
    return{w:recs[0].w,src:fmt(recs[0].date)+'の実測',live:false};
  }
  var p=D.p.find(function(x){return idEq(x.id,pid);});
  var pw=p?parseFloat(p.weight):NaN;
  if(pw>0)return{w:pw,src:'選手登録の体重',live:false};
  return null;
}
// 種目ランク判定。oneRM=最新記録(getLatest)でランク算出・bestRMに自己ベスト併記。ratio=最新1RM÷(ゴールド倍率×体重)。ranks昇順でratio以上の最上位が現ランク。
function getLiftRankInfo(pid,liftK){
  var p=D.p.find(function(x){return idEq(x.id,pid);});
  if(!p||!p.position)return null;
  var cfg=getStdCfg(),posStd=cfg.pos[p.position];
  if(!posStd||!posStd[liftK])return null;
  var wInfo=getCurrentWeightInfo(pid);
  if(!wInfo)return{noWeight:true,lift:liftK};
  var lift=STD_LIFTS.find(function(l){return l.k===liftK;});
  var oneRM=getLatest(pid,lift.ph);
  var bestRM=getBest(pid,lift.ph);
  var goldTarget=posStd[liftK]*wInfo.w;
  var ratio=oneRM?oneRM/goldTarget:0;
  var ranks=cfg.ranks.slice().sort(function(a,b){return a.pct-b.pct;});
  var cur=null,next=null;
  for(var i=0;i<ranks.length;i++){
    if(oneRM&&ratio>=ranks[i].pct)cur=ranks[i];
    else if(!next)next=ranks[i];
  }
  return{
    lift:liftK,label:lift.label,short:lift.short,
    oneRM:oneRM,bestRM:bestRM,weight:wInfo.w,weightSrc:wInfo.src,mult:posStd[liftK],
    goldTarget:Math.round(goldTarget*10)/10,
    ratio:ratio,
    relBW:oneRM?Math.round(oneRM/wInfo.w*100)/100:null,
    rank:cur,next:next,
    nextTargetKg:next?Math.round(next.pct*goldTarget*10)/10:null,
    nextNeedKg:(next&&oneRM)?Math.max(0,Math.ceil((next.pct*goldTarget-oneRM)*2)/2):null
  };
}
// ブロンコランク判定。ratio=ゴールド基準秒÷ベストタイム秒（速いほど高い）。ranks閾値はBIG3と共通。
// timeSecOpt指定時はその値で判定（ランキングの測定会フィルタ用）。省略時は getLatest(pid,'bronco')＝最新記録。bestSecに自己ベスト併記。
function getBroncoRankInfo(pid,timeSecOpt){
  var p=D.p.find(function(x){return idEq(x.id,pid);});
  if(!p||!p.position)return null;
  var cfg=getStdCfg(),posStd=cfg.pos[p.position];
  if(!posStd||!posStd.bronco)return null;
  var goldSec=posStd.bronco;
  var best=(timeSecOpt!=null)?timeSecOpt:getLatest(pid,'bronco');
  var bestSec=getBest(pid,'bronco');
  var ratio=best?goldSec/best:0;
  var ranks=(cfg.broncoRanks&&cfg.broncoRanks.length?cfg.broncoRanks:cfg.ranks).slice().sort(function(a,b){return a.pct-b.pct;});
  var cur=null,next=null;
  for(var i=0;i<ranks.length;i++){
    if(best&&ratio>=ranks[i].pct)cur=ranks[i];
    else if(!next)next=ranks[i];
  }
  var nextTargetSec=next?Math.floor(goldSec/next.pct):null; // このタイム以下で次ランク
  return{goldSec:goldSec,best:best,bestSec:bestSec,ratio:ratio,rank:cur,next:next,
    nextTargetSec:nextTargetSec,
    nextNeedSec:(next&&best)?Math.max(0,best-nextTargetSec):null,
    achieved:!!(best&&ratio>=1)};
}
// アロメトリック補正スコア = 1RM ÷ 体重^b（体格差を除いた公平比較用）

// 体重推奨帯: 下限=FFMI下限×身長²÷(1−体脂肪下限)、上限=FFMI上限×身長²÷(1−体脂肪上限)

// 現在FFMI（直近の体脂肪率つき体組成から。無ければnull→測定CTA表示に使う）
function getCurrentFFMIInfo(pid){

// 弱点種目 = 測定済み種目のうち達成率(ratio)最小。2種目以上の測定が無いと判定しない
function getWeakLift(pid){

    if(inf&&inf.bestRM){inf.ratio=(inf.goldTarget>0)?inf.bestRM/inf.goldTarget:0;infos.push(inf);}

// アロメトリック補正スコアのチーム内順位（スコア算出可能な選手のみ母数）
function getAlloTeamRank(pid,liftK){
  var scores=D.p.map(function(pp){return{pid:pp.id,s:getAlloScore(pp.id,liftK)};}).filter(function(x){return x.s!=null;});
  if(!scores.length)return null;
  scores.sort(function(a,b){return b.s-a.s;});
  var idx=scores.findIndex(function(x){return idEq(x.pid,pid);});
  if(idx<0)return null;
  return{rank:idx+1,total:scores.length,score:scores[idx].s};
}
// 弱点種目に効くボリュームの週次推移（月曜始まり・直近weeks週）。
// 対象= estBaseが弱点種目 or 種目名がメイン種目名/処方箋(rx)の種目名に一致（skippedは除外）
function getWeakWeeklyVolume(pid,liftK,weeks){
  var lift=STD_LIFTS.find(function(l){return l.k===liftK;});
  if(!lift)return[];
  var cfg=getStdCfg();
  var rxNames=(cfg.rx[liftK]||[]).map(function(r){return r.name;});
  var now=new Date();var dow=(now.getDay()+6)%7;// 月曜=0
  var thisMon=new Date(now);thisMon.setDate(now.getDate()-dow);
  var out=[];
  for(var wi=weeks-1;wi>=0;wi--){
    var st=new Date(thisMon);st.setDate(thisMon.getDate()-7*wi);
    var en=new Date(st);en.setDate(st.getDate()+6);
    var stS=toDateStr(st),enS=toDateStr(en);
    var vol=0;
    (D.tlog||[]).forEach(function(l){
      if(!idEq(l.pid,pid)||l.absent||!l.results)return;
      if(!(l.date>=stS&&l.date<=enS))return;
      l.results.forEach(function(r){
        if(r.skipped)return;
        var isTarget=(r.estBase===lift.ph)||(r.exName===lift.label)||rxNames.indexOf(r.exName)>=0;
        if(!isTarget)return;
        (r.sets||[]).forEach(function(s){vol+=(parseFloat(s.weight)||0)*(parseInt(s.reps)||0);});
      });
    });
    out.push({label:(st.getMonth()+1)+'/'+st.getDate()+'週',vol:Math.round(vol)});
  }
  return out;
}

function fmt(d){return d?d.replace(/-/g,'/'):'-';}
function getChart(injId){
  var ch=D.chart.find(function(x){return idEq(x.injId,injId);});
  if(!ch){
    ch={injId:injId,injDetail:{},medical:{},evals:[],soaps:[],returnCriteria:{},images:[]};
    D.chart.push(ch);
  }
  // 古いデータに項目がなければ補完
  if(!ch.injDetail)ch.injDetail={};
  if(!ch.medical)ch.medical={};
  if(!ch.evals)ch.evals=[];
  if(!ch.soaps)ch.soaps=[];
  if(!ch.returnCriteria)ch.returnCriteria={};
  if(!ch.images)ch.images=[];
  return ch;
}
function getPlayerInjHistory(pid,excludeIid){
  return D.i.filter(function(x){return idEq(x.pid,pid)&&!idEq(x.id,excludeIid);})
    .sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});
}
function analyzeRecurrence(inj){
  var samePart=getSamePartInjuries(inj.pid,inj.part,inj.id);
  var samePartType=samePart.filter(function(x){return x.type===inj.type;});
  return {
    isRecurrent: samePart.length>0,
    samePartCount: samePart.length,
    sameTypeCount: samePartType.length,
    lastSame: samePart.length?samePart[0]:null,
    history: samePart
  };
}
function getPctFromRIR(reps,rir){
  var rpe=10-rir;
  if(rpe>10)rpe=10;if(rpe<6)rpe=6;
  // 0.5刻みに丸め
  rpe=Math.round(rpe*2)/2;
  var r=Math.round(reps);
  if(r<1)r=1;if(r>12)r=12;
  var row=RPECHART[r];
  if(!row)return null;
  return row[rpe]!=null?row[rpe]:null;
}
function estimateWeight(oneRM,reps,rir){
  if(!oneRM)return null;
  var pct=getPctFromRIR(reps,rir);
  if(pct==null)return null;
  var w=oneRM*pct/100;
  return Math.round(w/2.5)*2.5;
}
function estimateOneRM(weight,reps,rir){
  if(!weight||!reps)return null;
  var pct=getPctFromRIR(reps,rir!=null?rir:0);
  if(pct==null||pct===0)return null;
  return Math.round(weight/(pct/100));
}
function getPlayer1RM(pid,estBase){
  if(!estBase)return null;
  return getBest(pid,estBase);
}

<script>
// ========================================================
// スクロールリビール＋カウントアップ基盤
// ========================================================
var _io=null;
function runFx(el){
  var i,noAn=!!window._noAnim;
  var cvs=el.querySelectorAll('.cv[data-cnt]');
  for(i=0;i<cvs.length;i++)countUp(cvs[i]);
  var rings=el.querySelectorAll('.ring-f[data-off]');
  for(i=0;i<rings.length;i++){if(noAn)rings[i].style.transition='none';rings[i].style.strokeDashoffset=rings[i].getAttribute('data-off');}
  var bars=el.querySelectorAll('.pbar-f[data-w]');
  for(i=0;i<bars.length;i++){if(noAn)bars[i].style.transition='none';bars[i].style.width=bars[i].getAttribute('data-w')+'%';}
}
function countUp(el){
  if(el.getAttribute('data-done'))return;
  el.setAttribute('data-done','1');
  var raw=el.getAttribute('data-cnt');var target=parseFloat(raw);
  if(isNaN(target)){return;}
  var dec=(String(raw).split('.')[1]||'').length;
  // サイレント再描画時・reduced-motion時は即確定（0からの再カウントを防ぐ）
  if(window._noAnim||(window.matchMedia&&window.matchMedia('(prefers-reduced-motion:reduce)').matches)){
    el.textContent=dec?target.toFixed(dec):String(Math.round(target));return;
  }
  var dur=950,t0=null;
  function step(ts){
    if(!t0)t0=ts;
    var p=Math.min((ts-t0)/dur,1);
    var e=1-Math.pow(1-p,3);
    var v=target*e;
    el.textContent=dec?v.toFixed(dec):String(Math.round(v));
    if(p<1)requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}
function revealNow(el){el.classList.add('in');runFx(el);}
function initReveal(instant){
  if(_io){_io.disconnect();_io=null;}
  var els=document.querySelectorAll('.rv'),i;
  var noIO=!('IntersectionObserver' in window);
  var reduced=window.matchMedia&&window.matchMedia('(prefers-reduced-motion:reduce)').matches;
  if(instant||noIO||reduced){for(i=0;i<els.length;i++)revealNow(els[i]);return;}
  _io=new IntersectionObserver(function(ents){
    for(var j=0;j<ents.length;j++){
      if(ents[j].isIntersecting){revealNow(ents[j].target);_io.unobserve(ents[j].target);}
    }
  },{threshold:.05,rootMargin:'0px 0px 160px 0px'});
  for(i=0;i<els.length;i++)_io.observe(els[i]);
}
function paint(h){
  $M().innerHTML=h;
  initReveal(!!window._noAnim);
}
// rv付きセクションラッパー（d=遅延段数）
function rv(inner,d){return '<div class="rv"'+(d?' style="--d:'+(d*0.07).toFixed(2)+'s"':'')+'>'+inner+'</div>';}

// ========================================================
// 分析ヘルパー（考察エンジン用）
// ========================================================
function agoStr(n){return toDateStr(new Date(Date.now()-n*86400000));}
function heroDateStr(){
  var d=new Date();var w=['日','月','火','水','木','金','土'][d.getDay()];
  return d.getFullYear()+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+String(d.getDate()).padStart(2,'0')+' '+w+'曜日';
}
function pName(pid){var p=D.p.find(function(x){return idEq(x.id,pid);});return p?p.name:'?';}
// 怪我による稼働状況マップ: outP=離脱(完全休養/リハビリのみ) limP=制限付き
function injuryStatusMaps(){
  var outP={},limP={};
  D.i.filter(function(x){return !x.resolved;}).forEach(function(inj){
    var lv=getChart(inj.id).rtpLevel||'rest';
    if(lv==='rest'||lv==='rehab')outP[inj.pid]=1;
    else if(lv!=='full')limP[inj.pid]=1;
  });
  Object.keys(outP).forEach(function(k){delete limP[k];});
  return {outP:outP,limP:limP};
}
// RTPレベルを「出場可/練習のみ/不可/判断待ち」の4バケットに翻訳（「土曜使えるか」に即答するため）
// 怪我はあるがrtpLevel未設定＝評価未実施は「不可」と区別して「判断待ち」に分類する
function rtpBuckets(){
  var order={out:0,pending:1,train:2,ok:3};
  var pidBucket={};
  D.i.filter(function(x){return !x.resolved;}).forEach(function(inj){
    var lv=getChart(inj.id).rtpLevel;
    var b=!lv?'pending':lv==='full'?'ok':(lv==='rest'||lv==='rehab')?'out':'train';
    if(!(inj.pid in pidBucket)||order[b]<order[pidBucket[inj.pid]])pidBucket[inj.pid]=b;
  });
  var c={ok:0,train:0,out:0,pending:0};
  D.p.forEach(function(p){c[pidBucket[p.id]||'ok']++;});
  return {total:D.p.length,ok:c.ok,train:c.train,out:c.out,pending:c.pending};
}
// ポジション別の頭数×稼働マトリクス（「土曜スクラム組めるか」に即答するため）
// PR/HOはフル稼働2名+控え1名の計3名を切ると編成に赤信号
var POS_CRIT_MIN={PR:3,HO:3};
function positionMatrix(){
  var m=injuryStatusMaps();
  return POS.map(function(pos){
    var players=D.p.filter(function(p){return p.position===pos;});
    var total=players.length;
    var out=players.filter(function(p){return m.outP[p.id];}).length;
    var lim=players.filter(function(p){return m.limP[p.id];}).length;
    var ok=Math.max(total-out-lim,0);
    var min=POS_CRIT_MIN[pos];
    var crit=min!=null&&ok<min;
    var warn=!crit&&total>0&&ok===0;
    return {pos:pos,total:total,ok:ok,lim:lim,out:out,crit:crit,warn:warn};
  });
}
// 同一部位の過去の怪我（再発検出）
function samePartBefore(inj){
  return D.i.filter(function(x){
    return idEq(x.pid,inj.pid)&&!idEq(x.id,inj.id)&&x.part===inj.part&&(x.date||'')<(inj.date||'');
  });
}
// 選手ごとの最新測定と前回測定のBIG3差
function physDeltas(){
  var res=[];
  D.p.forEach(function(p){
    var recs=D.ph.filter(function(x){return idEq(x.pid,p.id);}).sort(function(a,b){return (a.date||'').localeCompare(b.date||'');});
    if(recs.length<2)return;
    var last=recs[recs.length-1],prev=recs[recs.length-2];
    var lb=big3(last),pb=big3(prev);
    if(lb>0&&pb>0)res.push({p:p,delta:lb-pb,last:lb,date:last.date});
  });
  return res;
}
// 期間内の日別チーム平均（コンディション）
function condDaily(days){
  var out=[];
  for(var n=days-1;n>=0;n--){
    var ds=agoStr(n);
    var recs=D.f.filter(function(x){return x.date===ds;});
    var rpes=recs.filter(function(x){return x.rpe!=null;}).map(function(x){return x.rpe;});
    var sleeps=recs.filter(function(x){return x.sleep!=null&&x.sleep>0;}).map(function(x){return x.sleep;});
    out.push({date:ds,
      rpe:rpes.length?rpes.reduce(function(s,v){return s+v;},0)/rpes.length:null,
      sleep:sleeps.length?sleeps.reduce(function(s,v){return s+v;},0)/sleeps.length:null,
      n:recs.length});
  }
  return out;
}
function avgOf(arr){var v=arr.filter(function(x){return x!=null;});if(!v.length)return null;return v.reduce(function(s,x){return s+x;},0)/v.length;}
// 外れ値除外（Tukeyの1.5×IQR法）。サンプルが4件未満はそのまま返す
function iqrFilter(vals){
  if(vals.length<4)return vals;
  var s=vals.slice().sort(function(a,b){return a-b;});
  function pct(p){var idx=(s.length-1)*p,lo=Math.floor(idx),hi=Math.ceil(idx);return lo===hi?s[lo]:s[lo]+(s[hi]-s[lo])*(idx-lo);}
  var q1=pct(.25),q3=pct(.75),iqr=q3-q1,lo=q1-1.5*iqr,hi=q3+1.5*iqr;
  var f=s.filter(function(v){return v>=lo&&v<=hi;});
  return f.length?f:s;
}
// 期間のチーム総ボリューム
function teamVolume(from,to){
  return tlogAll().filter(function(l){return !l.absent&&l.date>=from&&l.date<=to;})
    .reduce(function(s,l){return s+(l.totalVolume||0);},0);
}

// ========================================================
// 考察エンジン（ルールベース）
// ========================================================
var _insOpen={};
// 考察の安定キー（タイトルから数値・HTMLを除いてハッシュ化＝再描画後も開閉状態を維持）
function insKey(t){
  var s=String(t).replace(/<[^>]*>/g,'').replace(/[0-9０-９.,%．]/g,'');
  var h=0;for(var i=0;i<s.length;i++){h=(h*31+s.charCodeAt(i))>>>0;}
  return 'k'+h.toString(36);
}
function insCard(ins,i){
  var C={good:['var(--green)','var(--green-bg)','✓'],info:['var(--blue)','var(--blue-bg)','i'],warn:['var(--amber)','var(--amber-bg)','!'],bad:['var(--red)','var(--red-bg)','!']};
  var c=C[ins.lv]||C.info;
  var hasD=!!ins.detail;
  var key=insKey(ins.t);
  var open=hasD&&_insOpen[key];
  var h='<div class="ins rv'+(hasD?' ins-tap':'')+(open?' open':'')+'" style="--ic-c:'+c[0]+';--ic-bg:'+c[1]+';--d:'+(i*0.08).toFixed(2)+'s"'+(hasD?' id="ins-'+key+'" onclick="toggleIns(\''+key+'\')"':'')+'>';
  h+='<div class="ins-main"><div class="ins-ic">'+c[2]+'</div>'+
    '<div style="flex:1;min-width:0"><div class="ins-t">'+ins.t+'</div><div class="ins-d">'+ins.d+'</div>'+
    (hasD?'<div class="ins-hint">タップで詳細を見る ▾</div>':'')+'</div>'+
    (hasD?'<div class="ins-chev">▾</div>':'')+'</div>';
  if(hasD)h+='<div class="ins-detail" onclick="event.stopPropagation()">'+ins.detail+'</div>';
  return h+'</div>';
}
function toggleIns(key){
  _insOpen[key]=!_insOpen[key];
  var el=document.getElementById('ins-'+key);
  if(el){if(_insOpen[key])el.classList.add('open');else el.classList.remove('open');}
}
// 考察詳細の選手行（タップで個人レポートへ）
function insRowP(pid,sub,right){
  var p=D.p.find(function(x){return idEq(x.id,pid);});
  if(!p)return '';
  return '<div class="row row-click" onclick="openPlayer('+p.id+')">'+ava(p,30)+
    '<div style="flex:1;min-width:0"><div style="font-weight:700;font-size:13px">'+escapeHtml(p.name)+'</div>'+
    (sub?'<div style="font-size:10.5px;color:var(--txt-2)">'+sub+'</div>':'')+'</div>'+
    (right?'<div style="text-align:right">'+right+'</div>':'')+'</div>';
}
// 行数の多い詳細リストを制限
function capRows(rows,limit){
  if(rows.length<=limit)return rows.join('');
  return rows.slice(0,limit).join('')+'<div style="font-size:11px;color:var(--txt-3);padding:8px 0 2px;text-align:center">ほか '+(rows.length-limit)+'名</div>';
}
function insightSec(list,sub){
  if(!list.length)return '';
  var h='<div class="sec"><div class="sec-h rv"><div class="sec-eyebrow">INSIGHT</div><h2>考察 <span class="sub">'+(sub||'このデータから読み取れること')+'</span></h2></div>';
  h+='<div class="ins-list">'+list.map(insCard).join('')+'</div></div>';
  return h;
}
// --- 怪我 ---
function insInjury(){
  var out=[],today=todayStr();
  var active=D.i.filter(function(x){return !x.resolved;});
  if(!active.length){
    out.push({lv:'good',t:'現在、離脱者はゼロです',d:'全選手が怪我なく稼働できています。この状態を保つには、コンディション面（疲労・睡眠）の要注意サインの早期対応が有効です。'});
    return out;
  }
  // 復帰予定超過
  var overdue=active.filter(function(x){return x.returnDate&&x.returnDate<today;});
  if(overdue.length){
    var names=overdue.slice(0,3).map(function(x){return escapeHtml(pName(x.pid));}).join('・');
    out.push({lv:'bad',t:'復帰予定日を過ぎている選手が'+overdue.length+'名います',
      d:'<b>'+names+(overdue.length>3?' ほか':'')+'</b>。回復が予定より遅れているか、復帰予定の更新漏れです。トレーナー・スタッフと再評価のすり合わせを推奨します。',
      detail:overdue.map(function(x){
        var over=Math.ceil((new Date(today)-new Date(x.returnDate))/86400000);
        return insRowP(x.pid,escapeHtml((x.side||'')+x.part+' '+(x.type||'')),'<span style="color:var(--red);font-weight:800;font-size:13px">'+over+'日超過</span><div style="font-size:10px;color:var(--txt-3)">予定 '+fmt(x.returnDate)+'</div>');
      }).join('')});
  }
  // 再発
  var recur=active.filter(function(x){return samePartBefore(x).length>0;});
  if(recur.length){
    var rn=recur.slice(0,3).map(function(x){return escapeHtml(pName(x.pid))+'（'+escapeHtml(x.part)+'）';}).join('・');
    out.push({lv:'warn',t:'同じ部位の再受傷が'+recur.length+'件あります',
      d:'<b>'+rn+(recur.length>3?' ほか':'')+'</b>。再発は離脱が長期化しやすい傾向があります。復帰基準の達成確認と、復帰後の段階的な負荷管理が特に重要です。',
      detail:recur.map(function(x){
        var prev=samePartBefore(x).sort(function(a,b){return (b.date||'').localeCompare(a.date||'');})[0];
        return insRowP(x.pid,escapeHtml((x.side||'')+x.part+' '+(x.type||'')),prev?'<div style="font-size:10px;color:var(--txt-3)">前回 '+fmt(prev.date)+'</div>':'');
      }).join('')});
  }
  // 長期離脱（平均は外れ値〈極端に長い/短い離脱〉を除外して算出）
  var resolved=D.i.filter(function(x){return x.resolved&&x.date&&x.resolvedDate;});
  var avgDays=null;
  if(resolved.length){
    var durations=resolved.map(function(x){return Math.max(0,(new Date(x.resolvedDate)-new Date(x.date))/86400000);});
    var filtered=iqrFilter(durations);
    avgDays=Math.round(filtered.reduce(function(s,v){return s+v;},0)/filtered.length);
    var longActive=active.filter(function(x){return x.date&&(new Date(today)-new Date(x.date))/86400000>avgDays;});
    if(longActive.length&&avgDays>0){
      out.push({lv:'info',t:'チームの平均離脱期間は約'+avgDays+'日です',
        d:'現在それを超えて離脱中なのは<b>'+longActive.length+'名</b>。重症度が高いか回復が停滞している可能性があり、経過の確認価値があります。',
        detail:longActive.map(function(x){
          var ds=Math.floor((new Date(today)-new Date(x.date))/86400000);
          return insRowP(x.pid,escapeHtml((x.side||'')+x.part+' '+(x.type||'')),'<span style="color:var(--amber);font-weight:800;font-size:13px">'+ds+'日経過</span>');
        }).join('')});
    }else if(avgDays>0){
      out.push({lv:'info',t:'チームの平均離脱期間は約'+avgDays+'日です',d:'現在離脱中の選手は全員この平均の範囲内で経過しています。'});
    }
  }
  // 滞留レコード検出: 120日超+復帰予定未設定は棚卸し推奨（稼働率を歪める古いレコードの可能性）
  var stale=active.filter(function(x){
    var days=x.date?(new Date(today)-new Date(x.date))/86400000:0;
    return days>120&&!x.returnDate;
  });
  if(stale.length){
    out.push({lv:'warn',t:'120日超・復帰予定未設定のまま滞留している記録が'+stale.length+'件あります',
      d:'受傷から長期間が経過し復帰予定も入っていないレコードは、実際は解決済みで更新漏れの可能性があります。棚卸し（回復済みへの更新 or 復帰予定の設定）を推奨します。稼働率の数字を歪める一因にもなります。',
      detail:stale.sort(function(a,b){return (a.date||'').localeCompare(b.date||'');}).map(function(x){
        var ds=Math.floor((new Date(today)-new Date(x.date))/86400000);
        return insRowP(x.pid,escapeHtml((x.side||'')+x.part+' '+(x.type||'')),'<span style="color:var(--amber);font-weight:800;font-size:13px">'+ds+'日経過</span>');
      }).join('')});
  }
  // 部位傾向（90日）
  var recent=D.i.filter(function(x){return (x.date||'')>=agoStr(90);});
  if(recent.length>=3){
    var byPart={};recent.forEach(function(x){byPart[x.part]=(byPart[x.part]||0)+1;});
    var top=Object.keys(byPart).sort(function(a,b){return byPart[b]-byPart[a];})[0];
    if(byPart[top]>=2){
      var partList=recent.filter(function(x){return x.part===top;}).sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});
      out.push({lv:'info',t:'直近90日で最も多いのは「'+escapeHtml(top)+'」の怪我です（'+byPart[top]+'件）',
        d:'発生が特定部位に偏っている場合、練習内容・ウォームアップ・予防エクササイズを見直す材料になります。',
        detail:capRows(partList.map(function(x){
          return insRowP(x.pid,escapeHtml((x.side||'')+x.part+' '+(x.type||''))+(x.resolved?' <span style="color:var(--green)">復帰済</span>':''),'<div style="font-size:10px;color:var(--txt-3)">'+fmt(x.date)+'</div>');
        }),12)});
    }
  }
  // コンタクト可否
  var noContact=active.filter(function(x){var lv=getChart(x.id).rtpLevel;return lv&&lv!=='full'&&lv!=='rest'&&lv!=='rehab';});
  if(noContact.length){
    out.push({lv:'info',t:'部分参加（制限付き）は'+noContact.length+'名です',
      d:'コンタクト制限中の選手はチーム練習の設計時に考慮が必要です。各選手の詳細は下の一覧から確認できます。',
      detail:noContact.map(function(x){
        var lv=RTP_LEVELS.find(function(r){return r.k===getChart(x.id).rtpLevel;});
        return insRowP(x.pid,escapeHtml((x.side||'')+x.part+' '+(x.type||'')),lv?'<span class="bd" style="background:'+hexA(rtpC(lv.k),.16)+';color:'+rtpC(lv.k)+'">'+lv.label+'</span>':'');
      }).join('')});
  }
  return out;
}
// --- フィジカル ---
function insPhysical(){
  var out=[];
  var deltas=physDeltas();
  if(deltas.length){
    var up=deltas.filter(function(d){return d.delta>0;}).sort(function(a,b){return b.delta-a.delta;});
    var down=deltas.filter(function(d){return d.delta<-5;}).sort(function(a,b){return a.delta-b.delta;});
    if(up.length){
      var top=up[0];
      out.push({lv:'good',t:'前回測定からBIG3が向上した選手は'+up.length+'名です',
        d:'最大の伸びは<b>'+escapeHtml(top.p.name)+'（+'+top.delta+'kg）</b>。トレーニングの成果が数字に表れています。',
        detail:capRows(up.map(function(d){
          return insRowP(d.p.id,'BIG3 '+d.last+'kg（'+fmt(d.date)+'測定）','<span style="color:var(--green);font-weight:800;font-size:13px">+'+d.delta+'kg</span>');
        }),15)});
    }
    if(down.length){
      var nm=down.slice(0,3).map(function(d){return escapeHtml(d.p.name);}).join('・');
      out.push({lv:'warn',t:'前回測定からBIG3が5kg以上低下した選手が'+down.length+'名います',
        d:'<b>'+nm+(down.length>3?' ほか':'')+'</b>。怪我・疲労・測定条件の影響が考えられます。個人レポートでトレーニング推移と合わせて確認してください。',
        detail:capRows(down.map(function(d){
          return insRowP(d.p.id,'BIG3 '+d.last+'kg（'+fmt(d.date)+'測定）','<span style="color:var(--red);font-weight:800;font-size:13px">'+d.delta+'kg</span>');
        }),15)});
    }
  }
  // 測定の鮮度
  var stale=D.p.filter(function(p){
    var last=getLatestPhys(p.id);
    return last&&last.date&&last.date<agoStr(90);
  });
  var never=D.p.filter(function(p){return !getLatestPhys(p.id);});
  if(stale.length){
    stale.sort(function(a,b){return ((getLatestPhys(a.id)||{}).date||'').localeCompare((getLatestPhys(b.id)||{}).date||'');});
    out.push({lv:'warn',t:'90日以上測定していない選手が'+stale.length+'名います',
      d:'数値が古いと推定重量やトレーニング強度の基準もズレていきます。次回測定日の設定を推奨します。',
      detail:capRows(stale.map(function(p){
        return insRowP(p.id,escapeHtml(p.position||'-')+'・'+escapeHtml(String(p.year||'-'))+'年','<div style="font-size:10px;color:var(--txt-3)">最終測定 '+fmt((getLatestPhys(p.id)||{}).date)+'</div>');
      }),20)});
  }
  if(never.length&&never.length<D.p.length){
    out.push({lv:'info',t:'まだ一度も測定記録がない選手が'+never.length+'名います',d:'全員のベースラインが揃うと、ポジション別比較や成長率の分析精度が上がります。',
      detail:capRows(never.map(function(p){
        return insRowP(p.id,escapeHtml(p.position||'-')+'・'+escapeHtml(String(p.year||'-'))+'年','');
      }),20)});
  }
  // FW/BK
  var FW=['PR','HO','LO','FL','No.8'],BK=['SH','SO','CTB','WTB','FB'];
  function grpB3(pos){
    var vals=D.p.filter(function(p){return pos.indexOf(p.position)>=0;}).map(function(p){return getBestBIG3(p.id);}).filter(function(v){return v;});
    return vals.length?Math.round(vals.reduce(function(s,v){return s+v;},0)/vals.length):null;
  }
  var fw=grpB3(FW),bk=grpB3(BK);
  if(fw&&bk){
    out.push({lv:'info',t:'BIG3平均: FW '+fw+'kg / BK '+bk+'kg（差 '+Math.abs(fw-bk)+'kg）',
      d:(fw>=bk?'FWが上回っています。':'BKが上回っています。')+'ポジション特性を考慮しつつ、下のグラフで種目別の内訳を確認できます。'});
  }
  return out;
}
// --- トレーニング ---
function insTraining(){
  var out=[],today=todayStr();
  var logs=tlogAll();
  if(!logs.length)return out;
  // 週間ボリューム比較
  var v1=teamVolume(agoStr(6),today);
  var v2=teamVolume(agoStr(13),agoStr(7));
  if(v2>0){
    var pct=Math.round((v1-v2)/v2*100);
    // 選手別の内訳（変化の大きい順）
    var perP=D.p.map(function(p){
      var a=tlogAll().filter(function(l){return idEq(l.pid,p.id)&&!l.absent&&l.date>=agoStr(6);}).reduce(function(s,l){return s+(l.totalVolume||0);},0);
      var b=tlogAll().filter(function(l){return idEq(l.pid,p.id)&&!l.absent&&l.date>=agoStr(13)&&l.date<=agoStr(7);}).reduce(function(s,l){return s+(l.totalVolume||0);},0);
      return{p:p,a:a,b:b,d:a-b};
    }).filter(function(x){return x.a>0||x.b>0;}).sort(function(x,y){return Math.abs(y.d)-Math.abs(x.d);});
    var volDetail=capRows(perP.map(function(x){
      return insRowP(x.p.id,'今週 '+x.a.toLocaleString()+'kg / 先週 '+x.b.toLocaleString()+'kg','<span style="font-weight:800;font-size:13px;color:'+(x.d>=0?'var(--green)':'var(--red)')+'">'+(x.d>=0?'+':'')+x.d.toLocaleString()+'kg</span>');
    }),10);
    if(pct<=-25){
      out.push({lv:'warn',t:'チーム総ボリュームが先週比'+pct+'%と大きく減少しています',
        d:'直近7日 <b>'+v1.toLocaleString()+'kg</b> / その前7日 <b>'+v2.toLocaleString()+'kg</b>。テスト期間・オフ・怪我などの要因がないか確認を。意図的なディロードなら問題ありません。',detail:volDetail});
    }else if(pct>=25){
      out.push({lv:'warn',t:'チーム総ボリュームが先週比+'+pct+'%と急増しています',
        d:'急激な負荷増は怪我リスクを高めます。漸進的な増加（週あたり±10%程度）が理想です。',detail:volDetail});
    }else{
      out.push({lv:'good',t:'チーム総ボリュームは先週比'+(pct>=0?'+':'')+pct+'%で安定しています',
        d:'直近7日 <b>'+v1.toLocaleString()+'kg</b>。大きな負荷変動がなく、コントロールされた状態です。',detail:volDetail});
    }
  }
  // 欠席率（自主トレは欠席し得ない=分母に入れると率が薄まるためkind!=='self'で除外）
  var recent=logs.filter(function(l){return l.date>=agoStr(13)&&l.kind!=='self';});
  var absList=recent.filter(function(l){return l.absent;});
  var abs=absList.length;
  if(recent.length>=5){
    var rate=Math.round(abs/recent.length*100);
    if(rate>=25){
      out.push({lv:'warn',t:'直近14日の欠席率が'+rate+'%あります',
        d:'欠席'+abs+'件/'+recent.length+'件。理由の内訳（怪我・疲労・その他）を下の記録から確認できます。',
        detail:capRows(absList.sort(function(a,b){return (b.date||'').localeCompare(a.date||'');}).map(function(l){
          return insRowP(l.pid,escapeHtml(l.absentReason||'理由未記入'),'<div style="font-size:10px;color:var(--txt-3)">'+fmt(l.date)+'</div>');
        }),10)});
    }
  }
  // 痛みスキップの偏り
  var skipEx={};
  logs.filter(function(l){return l.date>=agoStr(29)&&!l.absent;}).forEach(function(l){
    (l.results||[]).forEach(function(r){
      if(r.skipped&&r.skipReason==='痛み・怪我'){var nm=(r.exName||'').trim();if(nm)skipEx[nm]=(skipEx[nm]||0)+1;}
    });
  });
  var skipTop=Object.keys(skipEx).sort(function(a,b){return skipEx[b]-skipEx[a];})[0];
  if(skipTop&&skipEx[skipTop]>=2){
    var skipRows=[];
    logs.filter(function(l){return l.date>=agoStr(29)&&!l.absent;}).sort(function(a,b){return (b.date||'').localeCompare(a.date||'');}).forEach(function(l){
      (l.results||[]).forEach(function(r){
        if(r.skipped&&r.skipReason==='痛み・怪我'&&(r.exName||'').trim()===skipTop){
          skipRows.push(insRowP(l.pid,escapeHtml(skipTop),'<div style="font-size:10px;color:var(--txt-3)">'+fmt(l.date)+'</div>'));
        }
      });
    });
    out.push({lv:'warn',t:'「'+escapeHtml(skipTop)+'」が痛みでスキップされることが多い種目です（30日で'+skipEx[skipTop]+'回）',
      d:'特定種目に痛みが集中している場合、フォーム・重量設定・怪我との相性を見直す材料になります。',
      detail:capRows(skipRows,10)});
  }
  return out;
}
// --- コンディション ---
function insCondition(){
  var out=[];
  var recs7=D.f.filter(function(x){return x.date>=agoStr(6);});
  if(!recs7.length){
    if(D.f.length)out.push({lv:'warn',t:'直近7日間のコンディション入力がありません',d:'入力が途切れると疲労・睡眠の変化を見逃します。選手への声かけを推奨します。'});
    return out;
  }
  // 睡眠トレンド（入力数nを併記。n<5は参考値扱いにして断定しない）
  var sleepVals7=recs7.filter(function(x){return x.sleep>0;});
  var n1=sleepVals7.length;
  var s1=n1?sleepVals7.reduce(function(s,x){return s+x.sleep;},0)/n1:null;
  var prevRecs=D.f.filter(function(x){return x.date>=agoStr(13)&&x.date<agoStr(6);});
  var prevSleepVals=prevRecs.filter(function(x){return x.sleep>0;});
  var n2=prevSleepVals.length;
  var s2=n2?prevSleepVals.reduce(function(s,x){return s+x.sleep;},0)/n2:null;
  // 選手別の7日平均睡眠（短い順）
  var perSleep=D.p.map(function(p){
    var rs=recs7.filter(function(x){return idEq(x.pid,p.id)&&x.sleep!=null&&x.sleep>0;});
    if(!rs.length)return null;
    return{p:p,s:rs.reduce(function(a,x){return a+x.sleep;},0)/rs.length};
  }).filter(function(x){return x;}).sort(function(a,b){return a.s-b.s;});
  var sleepDetail=capRows(perSleep.map(function(x){
    return insRowP(x.p.id,'直近7日の平均睡眠','<span style="font-weight:800;font-size:13px;color:'+(x.s<6?'var(--red)':x.s<7?'var(--amber)':'var(--green)')+'">'+x.s.toFixed(1)+'h</span>');
  }),10);
  if(s1!=null){
    var lowN=n1<5;
    var nSuf='（入力'+n1+'名分'+(lowN?'・参考値':'')+'）';
    var lowNote=lowN?'入力数が少ないため参考値です。':'';
    if(s1<6.5){
      out.push({lv:lowN?'info':'warn',t:'チーム平均睡眠が'+s1.toFixed(1)+'時間と不足気味です'+nSuf,
        d:lowNote+'睡眠不足は回復・パフォーマンス・怪我リスクに直結します。'+(s2!=null?'先週は'+s2.toFixed(1)+'時間でした（'+n2+'名分）。':'')+'7時間以上を目安に働きかけを。',detail:sleepDetail});
    }else if(s2!=null&&n2>=5&&!lowN&&s1-s2<=-0.7){
      out.push({lv:'warn',t:'チーム平均睡眠が先週から'+(s1-s2).toFixed(1)+'時間減っています'+nSuf,
        d:'今週 '+s1.toFixed(1)+'h（'+n1+'名分） / 先週 '+s2.toFixed(1)+'h（'+n2+'名分）。テスト期間や行事の影響が考えられます。負荷設定に反映する価値があります。',detail:sleepDetail});
    }else{
      out.push({lv:lowN?'info':'good',t:'チーム平均睡眠は'+s1.toFixed(1)+'時間を確保できています'+nSuf,d:lowNote+(s2!=null?'先週は'+s2.toFixed(1)+'時間。':'')+'回復の土台となる睡眠が維持されています。',detail:sleepDetail});
    }
  }
  // 連続高RPE（低入力率でも検知できるよう「直近3日連続」ではなく「直近5回の入力中3回以上」に緩和）
  var streak=[];
  D.p.forEach(function(p){
    var recs=D.f.filter(function(x){return idEq(x.pid,p.id)&&x.rpe!=null;}).sort(function(a,b){return (b.date||'').localeCompare(a.date||'');}).slice(0,5);
    var high=recs.filter(function(x){return x.rpe>=8;});
    if(high.length>=3)streak.push({p:p,vals:recs.map(function(x){return x.rpe;}),n:recs.length});
  });
  if(streak.length){
    out.push({lv:'bad',t:'直近5回の入力中3回以上で疲労度8以上の選手が'+streak.length+'名います',
      d:'<b>'+streak.slice(0,4).map(function(x){return escapeHtml(x.p.name);}).join('・')+(streak.length>4?' ほか':'')+'</b>。疲労の蓄積が続くと怪我・体調不良につながります。負荷を落とすか休養日の検討を。',
      detail:streak.map(function(x){
        return insRowP(x.p.id,'直近'+x.n+'回の疲労度（新しい順）','<span style="color:var(--red);font-weight:800;font-size:13px">'+x.vals.join(' / ')+'</span>');
      }).join('')});
  }
  // 入力率（当日だけを見ると常に低く出て「オオカミ少年」化するため、直近7日のカバレッジを基準にする）
  var coveredPids={};
  recs7.forEach(function(x){coveredPids[x.pid]=1;});
  var coveredN=Object.keys(coveredPids).length;
  if(D.p.length){
    var rate=Math.round(coveredN/D.p.length*100);
    var noInput7=D.p.filter(function(p){return !coveredPids[p.id];});
    var lastDate=recs7.reduce(function(m,x){return x.date>m?x.date:m;},recs7[0].date);
    out.push({lv:rate>=60?'good':'info',t:'直近7日でコンディションを入力した選手は'+rate+'%です（'+coveredN+'/'+D.p.length+'名）',
      d:(rate>=60?'高い入力率が保たれており、データの信頼性が高い状態です。':'入力率が上がるほどチーム状態の把握精度が上がります。')+' 最終入力: '+fmt(lastDate)+'。',
      detail:noInput7.length?('<div style="font-size:11px;color:var(--txt-2);padding:6px 0 2px;font-weight:700">直近7日未入力の選手</div>'+capRows(noInput7.map(function(p){
        return insRowP(p.id,escapeHtml(p.position||'-')+'・'+escapeHtml(String(p.year||'-'))+'年','');
      }),15)):''});
  }
  return out;
}
// --- 概況（各カテゴリから重要なものを抽出） ---
function insHome(){
  var all=[];
  function tag(list,cat){list.forEach(function(x){x.cat=cat;all.push(x);});}
  tag(insInjury(),'怪我');tag(insCondition(),'コンディション');tag(insTraining(),'トレーニング');tag(insPhysical(),'フィジカル');
  var order={bad:0,warn:1,good:2,info:3};
  all.sort(function(a,b){return order[a.lv]-order[b.lv];});
  var picked=all.slice(0,5);
  picked.forEach(function(x){x.t='<span style="font-size:10px;font-weight:800;color:var(--txt-3);letter-spacing:.06em;margin-right:7px">'+x.cat+'</span>'+x.t;});
  return picked;
}
// --- 個人 ---
function insPlayer(pid){
  var out=[],today=todayStr();
  var p=D.p.find(function(x){return idEq(x.id,pid);});
  if(!p)return out;
  // BIG3順位
  var b3=getBestBIG3(pid);
  if(b3){
    var ranked=D.p.map(function(x){return{id:x.id,v:getBestBIG3(x.id)||0};}).filter(function(x){return x.v>0;}).sort(function(a,b){return b.v-a.v;});
    var rank=ranked.findIndex(function(x){return idEq(x.id,pid);})+1;
    var posMates=D.p.filter(function(x){return x.position===p.position;}).map(function(x){return{id:x.id,v:getBestBIG3(x.id)||0};}).filter(function(x){return x.v>0;}).sort(function(a,b){return b.v-a.v;});
    var posRank=posMates.findIndex(function(x){return idEq(x.id,pid);})+1;
    out.push({lv:rank<=3?'good':'info',t:'BIG3合計 '+b3+'kg — チーム'+rank+'位 / '+escapeHtml(p.position||'-')+'内'+posRank+'位',
      d:'記録のある'+ranked.length+'名中の順位です。'+(rank<=3?'チームトップクラスの筋力です。':'')});
  }
  // 測定間の伸び
  var recs=D.ph.filter(function(x){return idEq(x.pid,pid);}).sort(function(a,b){return (a.date||'').localeCompare(b.date||'');});
  if(recs.length>=2){
    var d=big3(recs[recs.length-1])-big3(recs[recs.length-2]);
    if(d>0)out.push({lv:'good',t:'前回測定からBIG3が+'+d+'kg伸びています',d:fmt(recs[recs.length-2].date)+' → '+fmt(recs[recs.length-1].date)+'の比較。トレーニングが結果につながっています。'});
    else if(d<0)out.push({lv:'warn',t:'前回測定からBIG3が'+d+'kg低下しています',d:'怪我・疲労・測定条件の影響が考えられます。下のトレーニング推移と合わせて確認してください。'});
  }
  // 怪我再発リスク
  var byPart={};
  D.i.filter(function(x){return idEq(x.pid,pid);}).forEach(function(x){byPart[x.part]=(byPart[x.part]||0)+1;});
  Object.keys(byPart).forEach(function(part){
    if(byPart[part]>=2){
      var hist=D.i.filter(function(x){return idEq(x.pid,pid)&&x.part===part;}).sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});
      out.push({lv:'warn',t:'「'+escapeHtml(part)+'」を過去に'+byPart[part]+'回負傷しています',
        d:'同一部位の反復受傷は構造的な弱点や動作パターンの問題を示すことがあります。予防エクササイズの継続が重要です。',
        detail:hist.map(function(x){
          return '<div class="row"><div style="flex:1"><div style="font-size:12px;font-weight:700">'+escapeHtml((x.side||'')+x.part+' '+(x.type||''))+(x.resolved?'':' <span class="bd bd-r">現在</span>')+'</div><div style="font-size:10px;color:var(--txt-2)">'+fmt(x.date)+(x.resolvedDate?' 〜 '+fmt(x.resolvedDate):'')+'</div></div></div>';
        }).join('')});
    }
  });
  // 直近のコンディション
  var cond7=D.f.filter(function(x){return idEq(x.pid,pid)&&x.date>=agoStr(6);});
  if(cond7.length){
    var avgR=avgOf(cond7.map(function(x){return x.rpe;}));
    var avgS=avgOf(cond7.map(function(x){return x.sleep>0?x.sleep:null;}));
    if(avgR!=null&&avgR>=8)out.push({lv:'bad',t:'直近7日の平均疲労度が'+avgR.toFixed(1)+'と高い状態です',d:(avgS!=null?'平均睡眠は'+avgS.toFixed(1)+'時間。':'')+'負荷の調整または休養を検討する段階です。'});
    else if(avgS!=null&&avgS<6)out.push({lv:'warn',t:'直近7日の平均睡眠が'+avgS.toFixed(1)+'時間と不足しています',d:'回復が追いつかないと怪我・パフォーマンス低下につながります。'});
  }
  // 週間ボリューム推移
  var w1=tlogAll().filter(function(l){return idEq(l.pid,pid)&&!l.absent&&l.date>=agoStr(6);}).reduce(function(s,l){return s+(l.totalVolume||0);},0);
  var w2=tlogAll().filter(function(l){return idEq(l.pid,pid)&&!l.absent&&l.date>=agoStr(13)&&l.date<agoStr(6);}).reduce(function(s,l){return s+(l.totalVolume||0);},0);
  if(w1&&w2){
    var vp=Math.round((w1-w2)/w2*100);
    if(vp>=30)out.push({lv:'warn',t:'週間トレーニングボリュームが先週比+'+vp+'%と急増しています',d:'今週 '+w1.toLocaleString()+'kg / 先週 '+w2.toLocaleString()+'kg。急な負荷増は怪我リスク要因です。'});
    else if(vp<=-30)out.push({lv:'info',t:'週間トレーニングボリュームが先週比'+vp+'%に減少しています',d:'今週 '+w1.toLocaleString()+'kg / 先週 '+w2.toLocaleString()+'kg。怪我・欠席・ディロードなど要因の確認を。'});
  }
  return out;
}
</script>
<script>
function miniStat(label,val,color){
  return '<div style="background:var(--bg-elev);border-radius:10px;padding:10px;text-align:center"><div style="font-size:18px;font-weight:800;color:'+(color||'var(--txt)')+'">'+(val!=null&&val!==''?val:'-')+'</div><div style="font-size:10px;color:var(--txt-2);margin-top:2px">'+label+'</div></div>';
}
function getLatestE1RMReport(pid){
  var recs=(D.e1rm||[]).filter(function(x){return idEq(x.pid,pid);}).sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});
  var result={};
  (EST_BASES||[]).forEach(function(b){
    for(var i=0;i<recs.length;i++){if(recs[i].values&&recs[i].values[b.k]){result[b.k]=recs[i].values[b.k].e1rm;break;}}
  });
  return result;
}
// ===== トレーニング把握（staffと定義一致。閲覧専用） =====
// 単一resultのセット群から指標を算出（トップ重量・ボリューム・最大推定1RM＋そのレップ数）
function exMetrics(sets){
  var topW=0,vol=0,e1=null,e1reps=null;
  (sets||[]).forEach(function(s){
    var w=parseFloat(s.weight)||0,rp=parseInt(s.reps)||0;
    if(w>topW)topW=w;vol+=w*rp;
    var hasRir=s.rir!=null&&s.rir!=='';
    if(hasRir&&rp>0&&rp<=6&&w>0){var e=estimateOneRM(w,rp,parseInt(s.rir));if(e&&(e1==null||e>e1)){e1=e;e1reps=rp;}}
  });
  return{topW:topW,vol:vol,e1:e1,e1reps:e1reps};
}
// 種目の時系列（同日集約: トップ重量=最大 / 推定1RM=最大 / ボリューム=合算）
function getExSeries(pid,exName){
  var byDate={};
  tlogAll().filter(function(l){return idEq(l.pid,pid)&&!l.absent;}).forEach(function(l){
    var r=(l.results||[]).find(function(x){return (x.exName||'').trim()===exName&&!x.skipped;});
    if(!r||!r.sets||!r.sets.length)return;
    var m=exMetrics(r.sets);var d=l.date;
    if(!byDate[d])byDate[d]={date:d,topW:0,vol:0,e1:null,e1reps:null};
    if(m.topW>byDate[d].topW)byDate[d].topW=m.topW;
    byDate[d].vol+=m.vol;
    if(m.e1!=null&&(byDate[d].e1==null||m.e1>byDate[d].e1)){byDate[d].e1=m.e1;byDate[d].e1reps=m.e1reps;}
  });
  return Object.keys(byDate).sort().map(function(k){return byDate[k];});
}
// 比較セッション（player getCompareVolume を _curTLog非依存に引数化＋全指標化）。mode: prev / week(6日前以前の直近)
function getCompareEx(pid,exName,beforeDate,mode,curTs,curId){
  var logs=tlogAll().filter(function(l){
    if(!idEq(l.pid,pid))return false;
    if(curId!=null&&idEq(l.id,curId))return false;
    if(l.ts&&curTs)return l.ts<curTs;
    return l.date<beforeDate;
  }).sort(function(a,b){var at=a.ts||a.date,bt=b.ts||b.date;return bt.localeCompare(at);});
  if(mode==='week'){var wkAgo=new Date(beforeDate);wkAgo.setDate(wkAgo.getDate()-6);var wkStr=toDateStr(wkAgo);logs=logs.filter(function(l){return l.date<=wkStr;});}
  for(var i=0;i<logs.length;i++){
    var r=(logs[i].results||[]).find(function(x){return (x.exName||'').trim()===exName&&!x.skipped;});
    if(r&&r.sets){var m=exMetrics(r.sets);m.date=logs[i].date;return m;}
  }
  return null;
}
// 種目のestBase（最初に見つかったもの）
function getExEstBase(pid,exName){
  var eb=null;
  tlogAll().filter(function(l){return idEq(l.pid,pid);}).forEach(function(l){(l.results||[]).forEach(function(r){if(!eb&&(r.exName||'').trim()===exName&&r.estBase)eb=r.estBase;});});
  return eb;
}
// 実測1RM（ph）のベスト値＋測定日
function getBestPh(pid,field){
  var rs=(D.ph||[]).filter(function(x){return idEq(x.pid,pid)&&x[field]!=null;});
  if(!rs.length)return null;
  var best=null;rs.forEach(function(x){if(best==null||x[field]>best.val)best={val:x[field],date:x.date};});
  return best;
}
// 差分の矢印（色付き）
function diffArrow(d){return d>0?'<span style="color:var(--green)">↑</span>':d<0?'<span style="color:var(--red)">↓</span>':'<span style="color:var(--txt-2)">→</span>';}
// 前回比/7日比の一行（トップセット重量差＋実日付）
function trCmpLine(label,cur,cmp){
  if(!cmp)return '<span style="color:var(--txt-3)">'+label+' 比較なし</span>';
  var d=cur.topW-cmp.topW;
  return '<span>'+label+' '+diffArrow(d)+' '+(d>0?'+':'')+d+'kg <span style="color:var(--txt-3)">('+fmt(cmp.date).slice(5)+'比)</span></span>';
}
// セッション展開のトグル
function toggleTrSess(id){
  var el=document.getElementById('trsess-'+id);if(!el)return;
  var open=el.style.display==='none';
  el.style.display=open?'block':'none';
  var arw=document.getElementById('trsess-arw-'+id);if(arw)arw.textContent=open?'▾':'▸';
}
// 種目セレクタ／指標トグル変更 → レポート全再構築（スクロール位置を保つ）
function setTrExC(v){window._trEx=(v||'').trim();var y=window.scrollY;renderPlayerReport(_detailPid);window.scrollTo(0,y);}
function setTrMetricC(m){window._trMetric=m;var y=window.scrollY;renderPlayerReport(_detailPid);window.scrollTo(0,y);}
// 種目推移カードのHTML
function buildTrendCoach(pid){
  var logs=tlogAll().filter(function(l){return idEq(l.pid,pid)&&!l.absent;}).sort(function(a,b){return (b.ts||b.date||'').localeCompare(a.ts||a.date||'');});
  var exAgg={};
  logs.forEach(function(l){(l.results||[]).forEach(function(r){if(r.skipped)return;var nm=(r.exName||'').trim();if(!nm)return;if(!exAgg[nm])exAgg[nm]={name:nm,count:0,estBase:null};exAgg[nm].count++;if(!exAgg[nm].estBase&&r.estBase)exAgg[nm].estBase=r.estBase;});});
  var exList=Object.keys(exAgg).map(function(k){return exAgg[k];}).sort(function(a,b){return b.count-a.count;});
  if(!exList.length)return'';
  var def=exList.find(function(e){return e.estBase;})||exList[0];
  var sel=(window._trEx&&exAgg[window._trEx])?window._trEx:def.name;
  window._trEx=sel;
  var estBase=exAgg[sel].estBase;
  var metric=window._trMetric||'top';
  if(metric==='e1rm'&&!estBase)metric='top';
  window._trMetric=metric;
  var metricBtns=[['top','トップセット重量'],['e1rm','推定1RM'],['vol','ボリューム']];
  var togHtml=metricBtns.map(function(mb){
    var disabled=mb[0]==='e1rm'&&!estBase;var active=mb[0]===metric;
    return '<span style="font-size:12px;padding:9px 13px;border-radius:10px;border:1px solid var(--line-2);'+(active?'background:var(--blue);color:#0A1019;border-color:var(--blue);font-weight:700':'color:var(--txt-2)')+(disabled?';opacity:.35':';cursor:pointer')+'"'+(disabled?' title="実測1RM基準なし＝推定1RM不可"':' onclick="setTrMetricC(\''+mb[0]+'\')"')+'>'+mb[1]+'</span>';
  }).join('');
  var h='<div class="card" style="margin-top:12px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px"><div style="font-size:13px;font-weight:700">📈 種目推移</div>'+
    '<select class="sel" onchange="setTrExC(this.value)">'+exList.map(function(e){return'<option value="'+escapeHtml(e.name)+'"'+(e.name===sel?' selected':'')+'>'+escapeHtml(e.name)+(e.estBase?'':' (手入力)')+'</option>';}).join('')+'</select></div>'+
    '<div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap">'+togHtml+'</div>';
  var series=getExSeries(pid,sel);
  if(!series.length)return h+'<div style="color:var(--txt-2);font-size:12px">この種目の記録がありません</div></div>';
  h+='<div style="position:relative;height:200px;margin-bottom:8px"><canvas id="ch-tr1rm"></canvas></div>';
  if(metric==='e1rm')h+='<div style="font-size:10px;color:var(--txt-3);margin-bottom:6px">● 濃い点=信頼度高(≤3レップ) / ● 薄い点=参考(4〜6レップ)。候補(RIR記録あり・6レップ以下)が無い日は点を打ちません。</div>';
  var curLog=null;
  logs.forEach(function(l){var r=(l.results||[]).find(function(x){return (x.exName||'').trim()===sel&&!x.skipped;});if(r&&r.sets&&r.sets.length){var t=l.ts||l.date;if(!curLog||t>(curLog.ts||curLog.date))curLog=l;}});
  if(curLog){
    var curR=(curLog.results||[]).find(function(x){return (x.exName||'').trim()===sel&&!x.skipped;});
    var curM=exMetrics(curR.sets);
    var prev=getCompareEx(pid,sel,curLog.date,'prev',curLog.ts,curLog.id);
    var wk=getCompareEx(pid,sel,curLog.date,'week',curLog.ts,curLog.id);
    var phBest=estBase?getBestPh(pid,estBase):null;
    if(phBest&&phBest.val>0){
      var eff=Math.round(curM.topW/phBest.val*100);var over=eff>100;
      h+='<div style="font-size:12px;margin-bottom:6px;color:var(--txt)">実効強度 <b style="color:'+(over?'var(--txt-3)':'var(--blue)')+'">'+eff+'%</b>'+(over?' <span style="color:var(--amber);font-size:11px">⚠ 100%超＝ph更新推奨</span>':'')+' <span style="color:var(--txt-3);font-size:11px">(実測1RM '+phBest.val+'kg・'+fmt(phBest.date).slice(5)+'測定)</span></div>';
    }
    if(prev){
      var sp=[];
      var td=curM.topW-prev.topW;sp.push('<span>トップ '+diffArrow(td)+' '+(td>0?'+':'')+td+'kg</span>');
      if(curM.e1!=null&&prev.e1!=null){var ed=curM.e1-prev.e1;sp.push('<span>推定1RM '+diffArrow(ed)+' '+(ed>0?'+':'')+ed+'kg</span>');}
      var vd=curM.vol-prev.vol;sp.push('<span style="color:var(--txt-3)">ボリューム '+diffArrow(vd)+'</span>');
      h+='<div style="font-size:12px;display:flex;flex-wrap:wrap;gap:12px;margin-bottom:5px;color:var(--txt)">'+sp.join('')+'</div>';
    }
    h+='<div style="font-size:11px;color:var(--txt-2);display:flex;flex-wrap:wrap;gap:14px">'+trCmpLine('前回比',curM,prev)+trCmpLine('7日比',curM,wk)+'</div>';
  }
  h+='<div style="font-size:10px;color:var(--txt-3);margin-top:6px">※判断は トップセット重量＞推定1RM＞＞ボリューム の順。ボリュームはウォームアップ込みの参考値。</div>';
  return h+'</div>';
}
// セッション履歴カードのHTML（折りたたみ展開）
function buildHistCoach(pid){
  var logs=tlogAll().filter(function(l){return idEq(l.pid,pid);}).sort(function(a,b){return (b.ts||b.date||'').localeCompare(a.ts||a.date||'');});
  if(!logs.length)return'';
  var h='<div class="card" style="margin-top:12px"><div style="font-size:13px;font-weight:700;margin-bottom:10px">🏋️ セッション履歴</div>';
  logs.slice(0,20).forEach(function(lg){
    if(lg.absent){
      h+='<div class="row"><span style="min-width:60px;color:var(--txt-2);font-size:12px">'+fmt(lg.date)+'</span><span class="chip" style="'+(lg.absentReason==='痛み・怪我'?'background:var(--red-bg);color:var(--red)':'')+'">欠席</span><span style="flex:1;color:var(--txt-2);font-size:11px">'+escapeHtml(lg.absentReason||'-')+'</span></div>';
      return;
    }
    var selfBadge=lg.kind==='self'?' <span class="chip" style="background:var(--blue-bg);color:var(--blue)">自主</span>':'';
    if(lg.fitness){
      // フィットネス記録: 種目数/0kgの代わりに種類+時間（+距離/RPE）を出す
      var ff=lg.fitness;
      var fMeta=fitTimeStr(ff)+(ff.km!=null?' ・ '+ff.km+'km':'')+(ff.rpe!=null?' ・ RPE'+ff.rpe:'');
      h+='<div class="row row-click" onclick="toggleTrSess('+lg.id+')"><span style="min-width:14px;color:var(--txt-3)" id="trsess-arw-'+lg.id+'">▸</span><span style="min-width:58px;color:var(--txt-2);font-size:12px">'+fmt(lg.date)+'</span><span style="flex:1;font-size:12px;font-weight:600">'+escapeHtml(ff.ftype||'フィットネス')+selfBadge+'</span><span style="font-weight:700;color:var(--green);font-size:12px">'+escapeHtml(fMeta)+'</span></div>';
      h+='<div id="trsess-'+lg.id+'" style="display:none">'+trSessDetailC(lg,pid)+'</div>';
      return;
    }
    var mn=D.tmenu.find(function(x){return idEq(x.id,lg.menuId);});
    var nm=lg.kind==='self'?'自主トレ（ウエイト）':(mn?escapeHtml(mn.name):'メニュー');
    var exCount=(lg.results||[]).length;
    var hasInjury=(lg.results||[]).some(function(r){return r.skipped&&r.skipReason==='痛み・怪我';});
    h+='<div class="row row-click" onclick="toggleTrSess('+lg.id+')"><span style="min-width:14px;color:var(--txt-3)" id="trsess-arw-'+lg.id+'">▸</span><span style="min-width:58px;color:var(--txt-2);font-size:12px">'+fmt(lg.date)+'</span><span style="flex:1;font-size:12px;font-weight:600">'+nm+selfBadge+(hasInjury?' <span class="chip" style="background:var(--red-bg);color:var(--red)">怪我</span>':'')+'</span><span style="font-size:11px;color:var(--txt-2);margin-right:8px">'+exCount+'種目</span><span style="font-weight:700;color:var(--accent);font-size:13px">'+(lg.totalVolume||0).toLocaleString()+'kg</span></div>';
    h+='<div id="trsess-'+lg.id+'" style="display:none">'+trSessDetailC(lg,pid)+'</div>';
  });
  if(logs.length>20)h+='<div style="font-size:11px;color:var(--txt-2);margin-top:6px">ほか '+(logs.length-20)+'件</div>';
  h+='<div style="font-size:10px;color:var(--txt-3);margin-top:8px">※ボリュームはウォームアップ込み</div>';
  return h+'</div>';
}
// 1セッションの展開内容（全セット・目標差・スキップ理由・当日コンディション）
function trSessDetailC(lg,pid){
  var cond=(D.f||[]).filter(function(r){return idEq(r.pid,pid)&&r.date===lg.date;})[0];
  var h='<div style="background:var(--bg-panel-2);border-radius:10px;padding:8px 12px;margin:2px 0 8px">';
  if(cond)h+='<div style="font-size:11px;color:var(--txt-2);margin-bottom:8px">当日コンディション: RPE <b style="color:var(--txt)">'+cond.rpe+'</b> / 睡眠 <b style="color:var(--txt)">'+cond.sleep+'h</b></div>';
  if(lg.fitness){
    // フィットネス記録の展開内容（results:[]のため下のセット表示は通らない）
    var fd=lg.fitness;
    h+='<div style="padding:6px 0"><div style="font-weight:600;font-size:12px;margin-bottom:4px;color:var(--txt)">'+escapeHtml(fd.ftype||'フィットネス')+' <span class="chip" style="background:var(--blue-bg);color:var(--blue)">自主</span></div>'+
      '<div style="font-size:12px;color:var(--txt-2)">'+(fitTimeStr(fd)?(fd.timeSec!=null?'タイム ':'時間 ')+fitTimeStr(fd):'')+(fd.km!=null?' ／ 距離 '+fd.km+'km':'')+(fd.rpe!=null?' ／ RPE '+fd.rpe:'')+'</div>'+
      (fd.note?'<div style="font-size:11px;color:var(--txt-2);margin-top:4px;white-space:pre-wrap">'+escapeHtml(fd.note)+'</div>':'')+'</div>';
    return h+'</div>';
  }
  (lg.results||[]).forEach(function(r){
    if(r.skipped){
      var inj=r.skipReason==='痛み・怪我';
      h+='<div style="padding:6px 0;border-bottom:1px solid var(--line);opacity:.75"><span style="font-weight:600;font-size:12px;color:var(--txt-2)">'+escapeHtml(r.exName)+'</span> <span style="font-size:11px;color:'+(inj?'var(--red)':'var(--txt-3)')+';font-weight:'+(inj?'700':'400')+'">⊘ スキップ'+(r.skipReason?'（'+escapeHtml(r.skipReason)+'）':'')+'</span></div>';
      return;
    }
    h+='<div style="padding:6px 0;border-bottom:1px solid var(--line)"><div style="font-weight:600;font-size:12px;margin-bottom:4px;color:var(--txt)">'+escapeHtml(r.exName)+(r.targetReps?'<span style="font-size:10px;color:var(--txt-3);font-weight:400;margin-left:6px">目標 '+r.targetReps+'回'+(r.targetRir!=null?' / RIR'+r.targetRir:'')+'</span>':'')+'</div><div style="display:flex;flex-wrap:wrap;gap:6px">';
    (r.sets||[]).forEach(function(s){
      var hasW=s.weight!=null&&s.weight!=='',hasR=s.reps!=null&&s.reps!=='';
      var w=hasW?s.weight:'-',rp=hasR?s.reps:'-';
      var rir=(s.rir!=null&&s.rir!=='')?s.rir:null;
      var col='var(--txt)';
      if(r.targetReps&&hasR&&parseInt(s.reps)<r.targetReps)col='var(--red)';
      var rirCol='var(--txt-2)';
      if(r.targetRir!=null&&rir!=null&&parseInt(rir)>r.targetRir)rirCol='var(--amber)';
      h+='<span style="font-size:12px;background:var(--bg-elev);border-radius:6px;padding:3px 8px"><b style="color:'+col+'">'+w+'kg×'+rp+'</b>'+(rir!=null?' <span style="color:'+rirCol+'">RIR'+rir+'</span>':'')+'</span>';
    });
    h+='</div></div>';
  });
  return h+'</div>';
}
// 種目推移グラフ（coach配色。指標ごとに毎回 dC→new Chart で作り直す）
function drawTrChartC(pid,exName,metric){
  dC('tr1rm');
  var e=document.getElementById('ch-tr1rm');if(!e)return;
  var series=getExSeries(pid,exName);if(!series.length)return;
  var labels=series.map(function(p){return p.date.slice(5);});
  var estBase=getExEstBase(pid,exName);
  var phBest=(metric!=='vol'&&estBase)?getBestPh(pid,estBase):null;
  var datasets=[],maxV=0;
  if(metric==='vol'){
    datasets.push({label:'ボリューム(kg)',data:series.map(function(p){return p.vol;}),borderColor:'#4D9FFF',backgroundColor:'rgba(77,159,255,.15)',borderWidth:2.5,fill:true,tension:.35,spanGaps:true,pointRadius:4,pointBackgroundColor:'#16243A',pointBorderColor:'#4D9FFF',pointBorderWidth:2});
  }else if(metric==='e1rm'){
    series.forEach(function(p){if(p.e1!=null&&p.e1>maxV)maxV=p.e1;});
    datasets.push({label:'推定1RM(kg)',data:series.map(function(p){return p.e1;}),borderColor:'#4D9FFF',borderWidth:2.5,tension:.35,spanGaps:true,
      pointRadius:series.map(function(p){return p.e1==null?0:(p.e1reps<=3?5:4);}),
      pointBackgroundColor:series.map(function(p){return p.e1==null?'transparent':(p.e1reps<=3?'#4D9FFF':'rgba(77,159,255,.45)');}),
      pointBorderColor:series.map(function(p){return p.e1==null?'transparent':'#4D9FFF';}),pointBorderWidth:1.5});
  }else{
    series.forEach(function(p){if(p.topW>maxV)maxV=p.topW;});
    datasets.push({label:'トップセット重量(kg)',data:series.map(function(p){return p.topW||null;}),borderColor:'#4D9FFF',backgroundColor:'rgba(77,159,255,.15)',borderWidth:2.5,fill:true,tension:.35,spanGaps:true,pointRadius:4,pointBackgroundColor:'#16243A',pointBorderColor:'#4D9FFF',pointBorderWidth:2});
  }
  if(phBest&&phBest.val>0){
    if(phBest.val>maxV)maxV=phBest.val;
    datasets.push({label:'実測1RM '+phBest.val+'kg',data:labels.map(function(){return phBest.val;}),borderColor:'#5E708A',borderWidth:1.5,borderDash:[6,4],pointRadius:0,fill:false,tension:0});
  }
  var yBase={grid:{color:'rgba(255,255,255,.06)'},ticks:{color:'#93A4BC',font:{size:10}}};
  if(metric==='vol'){yBase.beginAtZero=true;}else{yBase.beginAtZero=false;yBase.suggestedMax=Math.ceil(maxV*1.05);}
  charts.tr1rm=new Chart(e,{type:'line',data:{labels:labels,datasets:datasets},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{labels:{color:'#93A4BC',usePointStyle:true,pointStyle:'circle',boxWidth:7,padding:10,font:{size:10}}},tooltip:{backgroundColor:'rgba(10,16,25,.95)',padding:10,cornerRadius:10}},scales:{y:yBase,x:{grid:{display:false},ticks:{color:'#93A4BC',font:{size:10}}}}}});
}
</script>
<script>
// ========================================================
// 共通UI部品
// ========================================================
function ava(p,sz){
  var ini=p.name?p.name.split(/\s+/).map(function(w){return w[0];}).join('').slice(0,2):'?';
  var style='width:'+sz+'px;height:'+sz+'px;font-size:'+Math.round(sz*.36)+'px;';
  if(p.photo)return '<div class="ava" style="'+style+'background-image:url('+p.photo+')"></div>';
  return '<div class="ava" style="'+style+'">'+escapeHtml(ini)+'</div>';
}
function hexA(hex,a){
  var h=hex.replace('#','');if(h.length===3)h=h.split('').map(function(c){return c+c;}).join('');
  var r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);
  return 'rgba('+r+','+g+','+b+','+a+')';
}
function rtpOrder(k){var i=RTP_LEVELS.findIndex(function(x){return x.k===k;});return i<0?99:i;}
// RTPレベルのダークテーマ用表示色（共通定数RTP_LEVELSは4サイト一致の鉄則があるため触らずcoach側で変換）
var RTP_DARK={rest:'#FF7B7B',rehab:'#FFA45C',partial_nocontact:'#FFC069',full_nocontact:'#5FA8FF',full_limited:'#C7A4FF',full:'#3DF0A4'};
function rtpC(k){return RTP_DARK[k]||'#9DAEC7';}
function openPlayer(pid){window._trEx=null;window._trMetric='top';_detailPid=pid;try{history.pushState({pid:pid},'','#p'+pid);}catch(e){}render();window.scrollTo(0,0);}
function getLatestPhys(pid){
  return D.ph.filter(function(x){return idEq(x.pid,pid);}).sort(function(a,b){return (b.date||'').localeCompare(a.date||'');})[0];
}
function avgSleepCalc(since){
  var vals=D.f.filter(function(x){return x.date>=since&&x.sleep!=null&&x.sleep>0;}).map(function(x){return x.sleep;});
  if(!vals.length)return null;
  return (vals.reduce(function(s,v){return s+v;},0)/vals.length).toFixed(1);
}
// KPIタイル: valが数値ならカウントアップ
function kpiTile(val,label,color,unit){
  var num=(typeof val==='number');
  var vh=num?'<span class="cv" data-cnt="'+val+'">0</span>':String(val);
  if(unit)vh+='<span class="unit">'+unit+'</span>';
  return '<div class="kpi" style="--kc:'+color+'"><div class="kpi-v">'+vh+'</div><div class="kpi-l">'+label+'</div></div>';
}
function secH(eyebrow,title,sub){
  return '<div class="sec-h rv"><div class="sec-eyebrow">'+eyebrow+'</div><h2>'+title+(sub?' <span class="sub">'+sub+'</span>':'')+'</h2></div>';
}
function heroBlock(title,sub){
  return '<div class="hero rv"><div class="hero-date">'+heroDateStr()+'</div><div class="hero-title">'+title+'</div>'+(sub?'<div class="hero-sub">'+sub+'</div>':'')+'</div>';
}
// 稼働率リング（SVGドーナツ）
function ringChart(pct,label){
  var R=54,C=2*Math.PI*R;
  var off=C*(1-pct/100);
  return '<div class="ring-box"><svg viewBox="0 0 128 128" width="134" height="134">'+
    '<defs><linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#35E89C"/><stop offset="100%" stop-color="#1FA2FF"/></linearGradient></defs>'+
    '<circle class="ring-bgc" cx="64" cy="64" r="'+R+'"/>'+
    '<circle class="ring-f" cx="64" cy="64" r="'+R+'" stroke-dasharray="'+C.toFixed(1)+'" stroke-dashoffset="'+C.toFixed(1)+'" data-off="'+off.toFixed(1)+'"/>'+
    '</svg><div class="ring-center"><div class="ring-v"><span class="cv" data-cnt="'+pct+'">0</span><span class="unit">%</span></div><div class="ring-l">'+label+'</div></div></div>';
}
// ポジション別頭数×稼働マトリクスのHTML
function renderPosMatrix(){
  var rows=positionMatrix();
  var h='<div class="card">';
  h+=rows.map(function(r){
    var rowBg=r.crit?'background:var(--red-bg);':r.warn?'background:var(--amber-bg);':'';
    var h2='<div class="row" style="'+rowBg+(rowBg?'margin:0 -9px;padding-left:9px;padding-right:9px;border-radius:10px':'')+'">';
    h2+='<div style="width:48px;font-weight:800;font-size:13px'+(r.crit?';color:var(--red)':'')+'">'+r.pos+'</div>';
    h2+='<div style="flex:1;min-width:0;font-size:10.5px;color:var(--txt-3)">登録 '+r.total+'名</div>';
    h2+='<div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end">'+
      '<span class="bd '+(r.ok>0?'bd-g':'bd-n')+'">フル '+r.ok+'</span>'+
      '<span class="bd '+(r.lim>0?'bd-a':'bd-n')+'">制限 '+r.lim+'</span>'+
      '<span class="bd '+(r.out>0?'bd-r':'bd-n')+'">離脱 '+r.out+'</span>'+
      '</div></div>';
    if(r.crit)h2+='<div style="font-size:10.5px;color:var(--red);font-weight:700;padding:0 0 10px">⚠ フル稼働が'+POS_CRIT_MIN[r.pos]+'名未満です</div>';
    else if(r.warn)h2+='<div style="font-size:10.5px;color:var(--amber);font-weight:700;padding:0 0 10px">⚠ フル稼働できる選手がいません</div>';
    return h2;
  }).join('');
  return h+'</div>';
}

    '<div class="rl-row"><span class="rl-dot" style="background:var(--purple)"></span>判断待ち<span class="rl-n" style="color:var(--purple)">'+rb.pending+'<span style="font-size:10px;color:var(--txt-3);font-weight:600">名</span></span></div>'+
    '<div class="rl-row" style="border-top:1px solid var(--line);padding-top:9px;color:var(--txt-2)">登録選手<span class="rl-n">'+rb.total+'<span style="font-size:10px;color:var(--txt-3);font-weight:600">名</span></span></div>'+
    '</div></div></div>',0)+'</div>';
  // ポジション別頭数×稼働マトリクス
  h+='<div class="sec">'+secH('ROSTER','ポジション別 頭数×稼働','土曜の編成に即答')+rv(renderPosMatrix(),1)+'</div>';
  // KPI
  var active=D.i.filter(function(x){return !x.resolved;});
  var soon=active.filter(function(x){
    if(!x.returnDate)return false;
    var d=Math.ceil((new Date(x.returnDate)-new Date(today))/86400000);
    return d>=0&&d<=7;
  });
  var inputToday=D.f.filter(function(x){return x.date===today;}).length;
  var trained14=tlogAll().filter(function(l){return !l.absent&&l.kind!=='self'&&l.date>=agoStr(13);}).length; // チーム練習参加の指標=自主トレは含めない
  h+='<div class="sec"><div class="grid g4">'+
    rv(kpiTile(active.length,'現在の怪我','var(--red)','件'),0)+
    rv(kpiTile(soon.length,'7日以内に復帰予定','var(--amber)','名'),1)+
    rv(kpiTile(inputToday,'本日のコンディション入力','var(--blue)','名'),2)+
    rv(kpiTile(trained14,'トレーニング記録（14日）','var(--green)','件'),3)+
    '</div></div>';
  // 考察ダイジェスト
  h+=insightSec(insHome(),'チーム全体のハイライト');
  // 復帰間近
  var withReturn=active.filter(function(x){return x.returnDate;}).sort(function(a,b){return a.returnDate.localeCompare(b.returnDate);}).slice(0,5);
  if(withReturn.length){
    h+='<div class="sec">'+secH('RETURN','復帰が近い選手','タップで個人レポート')+rv('<div class="card">'+withReturn.map(returnRow).join('')+'</div>',1)+'</div>';
  }
  // 要注意コンディション
  var alerts=condAlerts().slice(0,5);
  if(alerts.length){
    h+='<div class="sec">'+secH('CONDITION','コンディション要注意')+rv('<div class="card">'+alerts.map(function(a){
      return '<div class="row row-click" onclick="openPlayer('+a.p.id+')">'+ava(a.p,32)+
        '<div style="flex:1;min-width:0"><div style="font-weight:700;font-size:13px">'+escapeHtml(a.p.name)+'</div>'+
        '<div style="font-size:10.5px;color:var(--txt-2)">'+(a.sleep!=null?'睡眠'+a.sleep+'h ・ ':'')+'平均疲労度'+a.avgRpe+'</div></div>'+
        '<span class="bd bd-a">'+a.flag+'</span></div>';

function returnRow(inj){
  var p=D.p.find(function(x){return idEq(x.id,inj.pid);});if(!p)return '';
  var today=todayStr();
  var days=Math.ceil((new Date(inj.returnDate)-new Date(today))/86400000);
  var dayLabel,dayColor;
  if(days<0){dayLabel=(-days)+'日超過';dayColor='var(--red)';}
  else if(days===0){dayLabel='本日';dayColor='var(--amber)';}
  else if(days<=7){dayLabel='あと'+days+'日';dayColor='var(--amber)';}
  else{dayLabel='あと'+days+'日';dayColor='var(--txt-2)';}
  return '<div class="row row-click" onclick="openPlayer('+p.id+')">'+ava(p,34)+
    '<div style="flex:1;min-width:0"><div style="font-weight:700;font-size:14px">'+escapeHtml(p.name)+'</div>'+
    '<div style="font-size:11px;color:var(--txt-2)">'+escapeHtml((inj.side||'')+inj.part+' '+inj.type)+'</div></div>'+
    '<div style="text-align:right"><div style="font-size:13px;font-weight:800;color:'+dayColor+'">'+dayLabel+'</div>'+
    '<div style="font-size:10px;color:var(--txt-3)">'+fmt(inj.returnDate)+'</div></div></div>';
}
function condAlerts(){
  var recent7=agoStr(6),alerts=[];
  D.p.forEach(function(p){
    var recs=D.f.filter(function(x){return idEq(x.pid,p.id)&&x.date>=recent7;}).sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});
    if(!recs.length)return;
    var latest=recs[0];
    var avgRpe=recs.reduce(function(s,x){return s+(x.rpe||0);},0)/recs.length;
    var flag=null;
    if(latest.sleep!=null&&latest.sleep>0&&latest.sleep<6)flag='睡眠不足';
    if(avgRpe>=8)flag='疲労蓄積';
    if(flag)alerts.push({p:p,flag:flag,sleep:latest.sleep,avgRpe:avgRpe.toFixed(1)});
  });
  return alerts;
}
