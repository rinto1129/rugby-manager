<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>福岡大学ラグビー部 コーチダッシュボード</title>
<style>
:root{
  --bg-app:#0A1019;--bg-panel:#111B2A;--bg-panel-2:#16243A;--bg-elev:#1B2E49;
  --line:rgba(255,255,255,.07);--line-2:rgba(255,255,255,.12);
  --accent:#3DDC97;--accent-2:#2BB67E;--accent-glow:rgba(61,220,151,.25);
  --blue:#4D9FFF;--blue-bg:rgba(77,159,255,.14);
  --amber:#FFB454;--amber-bg:rgba(255,180,84,.14);
  --red:#FF6B6B;--red-bg:rgba(255,107,107,.14);
  --purple:#B388FF;--purple-bg:rgba(179,136,255,.14);
  --green:#3DDC97;--green-bg:rgba(61,220,151,.14);
  --txt:#EAF1FB;--txt-2:#93A4BC;--txt-3:#5E708A;
  --radius:14px;--radius-sm:10px;
  --shadow:0 8px 30px rgba(0,0,0,.4);
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans JP',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg-app);color:var(--txt);min-height:100vh;-webkit-font-smoothing:antialiased;padding-bottom:40px}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(61,220,151,.08),transparent 70%);pointer-events:none;z-index:0}
.wrap{max-width:1100px;margin:0 auto;padding:0 16px;position:relative;z-index:1}
/* ヘッダー */
.topbar{position:sticky;top:0;z-index:50;background:rgba(10,16,25,.85);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
.topbar-inner{max-width:1100px;margin:0 auto;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.brand{display:flex;align-items:center;gap:10px}
.brand-logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--blue));display:flex;align-items:center;justify-content:center;font-weight:800;color:#0A1019;font-size:16px}
.brand-txt h1{font-size:15px;font-weight:700;letter-spacing:.01em}
.brand-txt p{font-size:11px;color:var(--txt-2);font-weight:500}
.view-badge{font-size:10px;font-weight:700;color:var(--accent);background:var(--accent-glow);padding:4px 9px;border-radius:99px;letter-spacing:.04em}
/* タブナビ */
.tabs{display:flex;gap:4px;overflow-x:auto;padding:10px 0 0;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:9px 15px;border-radius:99px;font-size:13px;font-weight:600;color:var(--txt-2);cursor:pointer;white-space:nowrap;transition:all .15s;border:1px solid transparent}
.tab:hover{color:var(--txt)}
.tab.ac{background:var(--accent);color:#0A1019;font-weight:700}
/* セクション */
.sec{margin:22px 0}
.sec-h{display:flex;align-items:center;gap:9px;margin-bottom:14px}
.sec-h .ic{width:26px;height:26px;color:var(--accent)}
.sec-h h2{font-size:17px;font-weight:700;letter-spacing:.01em}
.sec-h .sub{font-size:12px;color:var(--txt-2);margin-left:auto}
/* カード */
.card{background:var(--bg-panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px}
.card+.card{margin-top:10px}
.grid{display:grid;gap:12px}
.g2{grid-template-columns:repeat(2,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}
@media(max-width:720px){.g3,.g4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:460px){.g2{grid-template-columns:1fr}}
/* KPIタイル */
.kpi{background:linear-gradient(150deg,var(--bg-panel-2),var(--bg-panel));border:1px solid var(--line);border-radius:var(--radius);padding:16px;position:relative;overflow:hidden}
.kpi-v{font-size:32px;font-weight:800;line-height:1;letter-spacing:-.02em}
.kpi-l{font-size:11px;color:var(--txt-2);margin-top:6px;font-weight:500}
.kpi-ic{position:absolute;right:12px;top:12px;width:22px;height:22px;opacity:.5}
/* バッジ */
.bd{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:3px 9px;border-radius:99px}
.bd-g{background:var(--green-bg);color:var(--green)}.bd-b{background:var(--blue-bg);color:var(--blue)}
.bd-a{background:var(--amber-bg);color:var(--amber)}.bd-r{background:var(--red-bg);color:var(--red)}
.bd-p{background:var(--purple-bg);color:var(--purple)}.bd-n{background:var(--bg-elev);color:var(--txt-2)}
/* アバター */
.ava{border-radius:50%;background:var(--bg-elev);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--accent);background-size:cover;background-position:center;flex-shrink:0}
/* リスト行 */
.row{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--line)}
.row:last-child{border-bottom:none}
.row-click{cursor:pointer;transition:background .12s;border-radius:8px;margin:0 -8px;padding-left:8px;padding-right:8px}
.row-click:hover{background:var(--bg-panel-2)}
/* プログレスバー */
.pbar{height:7px;background:var(--bg-elev);border-radius:99px;overflow:hidden}
.pbar-f{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent-2),var(--accent));transition:width .5s}
/* 復帰タイムライン */
.tl-track{position:relative;padding:6px 0}
.no{text-align:center;color:var(--txt-3);font-size:13px;padding:24px}
.muted{color:var(--txt-2)}
/* ボタン的リンク */
.lnk{color:var(--accent);font-size:12px;font-weight:600;cursor:pointer;background:none;border:none;font-family:inherit}
canvas{max-width:100%}
.chip{display:inline-block;font-size:11px;padding:3px 10px;border-radius:8px;background:var(--bg-elev);color:var(--txt-2);font-weight:600;margin:2px}
select.sel{background:var(--bg-elev);color:var(--txt);border:1px solid var(--line-2);border-radius:8px;padding:6px 10px;font-size:12px;font-family:inherit}
.loading{text-align:center;padding:60px 20px;color:var(--txt-2)}
.spinner{width:34px;height:34px;border:3px solid var(--line-2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>

      if(doc.exists){try{var p=JSON.parse(doc.data().data);if(Array.isArray(p))D[k]=p;}catch(e){}}

      maybeRender();
    },function(err){_loaded[k]=true;maybeRender();});
  });
}
var _firstRender=false;
function maybeRender(){
  // 主要キーが揃ったら描画（全部待たずに）
  var essential=['p','i','r','ph'];
  if(essential.every(function(k){return _loaded[k];})){

    else render();
  }
}

function idEq(a,b){if(a==null||b==null)return false;return a===b||String(a)===String(b);}
function toDateStr(d){var y=d.getFullYear();var m=String(d.getMonth()+1).padStart(2,'0');var day=String(d.getDate()).padStart(2,'0');return y+'-'+m+'-'+day;}
function todayStr(){var d=new Date();var y=d.getFullYear();var m=String(d.getMonth()+1).padStart(2,'0');var day=String(d.getDate()).padStart(2,'0');return y+'-'+m+'-'+day;}
function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function avH(p,sz){var i=p.id%AVC.length,ini=p.name?p.name.split(/\s+/).map(function(w){return w[0];}).join('').slice(0,2):'?';return p.photo?'<div class="av" style="width:'+sz+'px;height:'+sz+'px;background-image:url('+p.photo+')"></div>':'<div class="av" style="width:'+sz+'px;height:'+sz+'px;background:'+AVC[i][0]+';color:'+AVC[i][1]+';font-size:'+Math.round(sz*.35)+'px">'+ini+'</div>';}
function big3(r){return(r.squat||0)+(r.bench||0)+(r.deadlift||0);}
function getBest(pid,f){var rs=D.ph.filter(function(x){return x.pid===pid&&x[f]!=null;});if(!rs.length)return null;return f==='bronco'?Math.min.apply(null,rs.map(function(x){return x[f];})):Math.max.apply(null,rs.map(function(x){return x[f];}));}
function getBestBIG3(pid){var sq=getBest(pid,'squat')||0;var bp=getBest(pid,'bench')||0;var dl=getBest(pid,'deadlift')||0;return(sq||bp||dl)?(sq+bp+dl):null;}
function fmt(d){return d?d.replace(/-/g,'/'):'-';}
function getChart(injId){
  var ch=D.chart.find(function(x){return idEq(x.injId,injId);});
  if(!ch){
    ch={injId:injId,injDetail:{},medical:{},evals:[],soaps:[],returnCriteria:{},images:[]};
    D.chart.push(ch);
  }
  // 古いデータに項目がなければ補完
  if(!ch.injDetail)ch.injDetail={};
  if(!ch.medical)ch.medical={};
  if(!ch.evals)ch.evals=[];
  if(!ch.soaps)ch.soaps=[];
  if(!ch.returnCriteria)ch.returnCriteria={};
  if(!ch.images)ch.images=[];
  return ch;
}
function getPlayerInjHistory(pid,excludeIid){
  return D.i.filter(function(x){return idEq(x.pid,pid)&&!idEq(x.id,excludeIid);})
    .sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});
}
function analyzeRecurrence(inj){
  var samePart=getSamePartInjuries(inj.pid,inj.part,inj.id);
  var samePartType=samePart.filter(function(x){return x.type===inj.type;});
  return {
    isRecurrent: samePart.length>0,
    samePartCount: samePart.length,
    sameTypeCount: samePartType.length,
    lastSame: samePart.length?samePart[0]:null,
    history: samePart
  };
}
function getPctFromRIR(reps,rir){
  var rpe=10-rir;
  if(rpe>10)rpe=10;if(rpe<6)rpe=6;
  // 0.5刻みに丸め
  rpe=Math.round(rpe*2)/2;
  var r=Math.round(reps);
  if(r<1)r=1;if(r>12)r=12;
  var row=RPECHART[r];
  if(!row)return null;
  return row[rpe]!=null?row[rpe]:null;
}
function estimateWeight(oneRM,reps,rir){
  if(!oneRM)return null;
  var pct=getPctFromRIR(reps,rir);
  if(pct==null)return null;
  var w=oneRM*pct/100;
  return Math.round(w/2.5)*2.5;
}
function estimateOneRM(weight,reps,rir){
  if(!weight||!reps)return null;
  var pct=getPctFromRIR(reps,rir!=null?rir:0);
  if(pct==null||pct===0)return null;
  return Math.round(weight/(pct/100));
}
function getPlayer1RM(pid,estBase){
  if(!estBase)return null;
  return getBest(pid,estBase);
}

<script>

function renderInjuryView(){
  var active=D.i.filter(function(x){return!x.resolved;});
  var today=todayStr();
  // 復帰間近（7日以内）
  var soon=active.filter(function(inj){
    if(!inj.returnDate)return false;
    var d=Math.ceil((new Date(inj.returnDate)-new Date(today))/86400000);
    return d>=0&&d<=7;
  });
  // 今週復帰予定
  var h='';
  // KPIタイル
  h+='<div class="sec">';
  h+='<div class="grid g4">';
  h+=kpiTile(active.length,'現在の怪我人','#FF6B6B','M12 2L4 5v6c0 5 3.4 9.7 8 11 4.6-1.3 8-6 8-11V5z');
  h+=kpiTile(soon.length,'7日以内に復帰予定','#FFB454','M12 2a10 10 0 100 20 10 10 0 000-20zm1 5h-2v6l5 3 1-1.6-4-2.4z');
  var fullRehab=active.filter(function(inj){var ch=getChart(inj.id);return ch&&ch.rtpLevel&&ch.rtpLevel!=='rest'&&ch.rtpLevel!=='full';}).length;
  h+=kpiTile(fullRehab,'リハビリ・部分参加中','#4D9FFF','M13 3v6h8l-9 12v-8H4z');
  var recovered30=D.i.filter(function(x){return x.resolved&&x.resolvedDate&&Math.ceil((new Date(today)-new Date(x.resolvedDate))/86400000)<=30;}).length;
  h+=kpiTile(recovered30,'過去30日で復帰','#3DDC97','M9 16.2L4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4z');
  h+='</div></div>';

  // 復帰タイムライン
  var withReturn=active.filter(function(x){return x.returnDate;}).sort(function(a,b){return a.returnDate.localeCompare(b.returnDate);});
  if(withReturn.length){
    h+='<div class="sec"><div class="sec-h"><svg class="ic" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm1 5h-2v6l5 3 1-1.6-4-2.4z"/></svg><h2>復帰予定タイムライン</h2><span class="sub">早い順</span></div>';
    h+='<div class="card">';
    withReturn.forEach(function(inj){
      var p=D.p.find(function(x){return idEq(x.id,inj.pid);});if(!p)return;
      var days=Math.ceil((new Date(inj.returnDate)-new Date(today))/86400000);
      var dayLabel,dayColor;
      if(days<0){dayLabel=(-days)+'日超過';dayColor='var(--red)';}
      else if(days===0){dayLabel='本日';dayColor='var(--amber)';}
      else if(days<=7){dayLabel='あと'+days+'日';dayColor='var(--amber)';}
      else{dayLabel='あと'+days+'日';dayColor='var(--txt-2)';}
      h+='<div class="row row-click" onclick="openPlayer('+p.id+')">'+ava(p,34)+

  }

  // 怪我人一覧（詳細カード）
  h+='<div class="sec"><div class="sec-h"><svg class="ic" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L4 5v6c0 5 3.4 9.7 8 11 4.6-1.3 8-6 8-11V5z"/></svg><h2>怪我人の状況</h2><span class="sub">'+active.length+'名</span></div>';

      // 練習参加レベル
      var rtp=ch.rtpLevel?RTP_LEVELS.find(function(x){return x.k===ch.rtpLevel;}):null;
      // リハビリ進捗（stage / STG.length）
      var stage=rh?(rh.stage||0):0;
      var progPct=Math.round((stage/(STG.length-1))*100);
      var daysSince=Math.floor((new Date(today)-new Date(inj.date))/86400000);
      h+='<div class="card" style="cursor:pointer" onclick="openPlayer('+p.id+')">';

      if(rtp)h+='<span class="bd" style="background:'+hexA(rtp.color,.16)+';color:'+rtp.color+'">'+rtp.label+'</span>';
      h+='</div>';
      // 怪我内容
      h+='<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">'+
        '<span class="chip">'+(inj.side||'')+inj.part+'</span><span class="chip">'+inj.type+'</span>'+
        (inj.returnDate?'<span class="chip" style="color:var(--amber)">復帰予定 '+fmt(inj.returnDate)+'</span>':'')+'</div>';

      h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px"><span style="font-size:11px;color:var(--txt-2)">リハビリ進捗</span><span style="font-size:11px;font-weight:600;color:var(--accent)">'+STG[stage]+'</span></div>';
      h+='<div class="pbar"><div class="pbar-f" style="width:'+progPct+'%"></div></div>';
      h+='</div>';
    });
  }
  h+='</div>';
  $M().innerHTML=h;
}
function rtpOrder(k){var i=RTP_LEVELS.findIndex(function(x){return x.k===k;});return i<0?99:i;}
function kpiTile(val,label,color,iconPath){
  return '<div class="kpi"><svg class="kpi-ic" viewBox="0 0 24 24" fill="'+color+'"><path d="'+iconPath+'"/></svg>'+
    '<div class="kpi-v" style="color:'+color+'">'+val+'</div><div class="kpi-l">'+label+'</div></div>';
}
function ava(p,sz){
  var ini=p.name?p.name.split(/\s+/).map(function(w){return w[0];}).join('').slice(0,2):'?';
  var style='width:'+sz+'px;height:'+sz+'px;font-size:'+Math.round(sz*.36)+'px;';
  if(p.photo)return '<div class="ava" style="'+style+'background-image:url('+p.photo+')"></div>';
  return '<div class="ava" style="'+style+'">'+ini+'</div>';
}
function hexA(hex,a){
  var h=hex.replace('#','');if(h.length===3)h=h.split('').map(function(c){return c+c;}).join('');
  var r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);
  return 'rgba('+r+','+g+','+b+','+a+')';
}

function renderConditionView(){
  var today=todayStr();
  var h='';
  // 直近のコンディション記録から、疲労が高い・睡眠が短い選手を抽出
  var recent7=toDateStr(new Date(new Date(today).getTime()-7*86400000));
  var alerts=[];
  D.p.forEach(function(p){
    var recs=D.f.filter(function(x){return idEq(x.pid,p.id)&&x.date>=recent7;}).sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});
    if(!recs.length)return;
    var latest=recs[0];
    var avgRpe=recs.reduce(function(s,x){return s+(x.rpe||0);},0)/recs.length;
    var flag=null;
    if(latest.sleep!=null&&latest.sleep>0&&latest.sleep<6)flag='睡眠不足';
    if(avgRpe>=8)flag='疲労蓄積';
    if(flag)alerts.push({p:p,flag:flag,sleep:latest.sleep,avgRpe:avgRpe.toFixed(1)});
  });
  h+='<div class="sec"><div class="grid g3">';
  var inputToday=D.f.filter(function(x){return x.date===today;}).length;
  h+=kpiTile(inputToday,'本日のコンディション入力','#4D9FFF','M9 11H7v2h2zm4 0h-2v2h2z');
  h+=kpiTile(alerts.length,'要注意（疲労・睡眠）','#FFB454','M1 21h22L12 2z');
  var avgSleep7=avgSleepCalc(recent7);
  h+=kpiTile(avgSleep7?avgSleep7+'h':'-','平均睡眠（7日）','#B388FF','M12 3a9 9 0 109 9c0-.46-.04-.92-.1-1.36A5.4 5.4 0 0112 3z');
  h+='</div></div>';

  // 要注意選手
  h+='<div class="sec"><div class="sec-h"><svg class="ic" viewBox="0 0 24 24" fill="#FFB454"><path d="M1 21h22L12 2z"/></svg><h2>コンディション要注意</h2></div>';
  if(!alerts.length){h+='<div class="card"><div class="no">特に注意が必要な選手はいません</div></div>';}
  else{
    h+='<div class="card">';
    alerts.forEach(function(a){
      h+='<div class="row row-click" onclick="openPlayer('+a.p.id+')">'+ava(a.p,32)+'<div style="flex:1"><div style="font-weight:600;font-size:13px">'+escapeHtml(a.p.name)+'</div><div style="font-size:10px;color:var(--txt-2)">'+(a.sleep!=null?'睡眠'+a.sleep+'h ・ ':'')+'平均RPE'+a.avgRpe+'</div></div><span class="bd bd-a">'+a.flag+'</span></div>';
    });
    h+='</div></div>';
  }
  $M().innerHTML=h;
}
function avgSleepCalc(since){
  var vals=D.f.filter(function(x){return x.date>=since&&x.sleep!=null&&x.sleep>0;}).map(function(x){return x.sleep;});
  if(!vals.length)return null;
  return (vals.reduce(function(s,v){return s+v;},0)/vals.length).toFixed(1);
}

    h+='</div>';
  }else{
    h+='<div class="card" style="margin-top:12px"><div style="font-size:13px;color:var(--green);font-weight:600">✓ 現在、怪我はありません</div></div>';
  }

  // フィジカル
  var latestPh=getLatestPhys(pid);
  h+='<div class="card" style="margin-top:12px"><div style="font-size:13px;font-weight:700;margin-bottom:10px">💪 フィジカル</div>';
  var sq=getBest(pid,'squat'),bp=getBest(pid,'bench'),dl=getBest(pid,'deadlift'),b3=getBestBIG3(pid);
  h+='<div class="grid g4" style="gap:8px">';
  h+=miniStat('SQ',sq);h+=miniStat('BP',bp);h+=miniStat('DL',dl);h+=miniStat('BIG3',b3,'var(--accent)');
  h+='</div>';
  // 推定1RM
  var e1=getLatestE1RMReport(pid);
  if(Object.keys(e1).length){
    h+='<div style="margin-top:10px;font-size:11px;color:var(--txt-2)">推定1RM（参考）: '+Object.keys(e1).map(function(k){var l=(EST_BASES.find(function(b){return b.k===k;})||{}).label||k;return l+' '+e1[k]+'kg';}).join(' / ')+'</div>';
  }
  // BIG3推移グラフ
  var phRecs=D.ph.filter(function(x){return idEq(x.pid,pid);}).sort(function(a,b){return (a.date||'').localeCompare(b.date||'');});
  if(phRecs.length>=2){
    h+='<div style="position:relative;height:180px;margin-top:14px"><canvas id="rep-phys-chart"></canvas></div>';
  }
  h+='</div>';

  // トレーニング状況
  var tlogs=D.tlog.filter(function(x){return idEq(x.pid,pid)&&!x.absent;}).sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});
  if(tlogs.length){
    h+='<div class="card" style="margin-top:12px"><div style="font-size:13px;font-weight:700;margin-bottom:10px">🏋️ トレーニング（直近）</div>';
    tlogs.slice(0,5).forEach(function(lg){
      var mn=D.tmenu.find(function(x){return idEq(x.id,lg.menuId);});
      h+='<div class="row"><div style="flex:1"><div style="font-size:12px;font-weight:600">'+(mn?escapeHtml(mn.name):'メニュー')+'</div><div style="font-size:10px;color:var(--txt-2)">'+fmt(lg.date)+'</div></div><div style="font-weight:700;color:var(--accent);font-size:13px">'+(lg.totalVolume||0).toLocaleString()+'kg</div></div>';
    });
    h+='</div>';
  }

  // コンディション（直近7日の平均）
  var recent7=toDateStr(new Date(new Date(today).getTime()-7*86400000));
  var condRecs=D.f.filter(function(x){return idEq(x.pid,pid)&&x.date>=recent7;});
  if(condRecs.length){
    var avgSleep=(condRecs.filter(function(x){return x.sleep;}).reduce(function(s,x){return s+x.sleep;},0)/condRecs.filter(function(x){return x.sleep;}).length)||0;
    var avgRpe=(condRecs.reduce(function(s,x){return s+(x.rpe||0);},0)/condRecs.length)||0;
    h+='<div class="card" style="margin-top:12px"><div style="font-size:13px;font-weight:700;margin-bottom:10px">📊 コンディション（7日平均）</div><div class="grid g2" style="gap:8px">';
    h+=miniStat('平均睡眠',avgSleep?avgSleep.toFixed(1)+'h':'-');
    h+=miniStat('平均RPE',avgRpe?avgRpe.toFixed(1):'-');
    h+='</div></div>';
  }

  // 怪我歴
  var pastInj=D.i.filter(function(x){return idEq(x.pid,pid)&&x.resolved;}).sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});
  if(pastInj.length){
    h+='<div class="card" style="margin-top:12px"><div style="font-size:13px;font-weight:700;margin-bottom:10px">📋 過去の怪我歴</div>';
    pastInj.slice(0,8).forEach(function(inj){
      h+='<div class="row"><div style="flex:1"><div style="font-size:12px;font-weight:600">'+(inj.side||'')+inj.part+' '+inj.type+'</div><div style="font-size:10px;color:var(--txt-2)">'+fmt(inj.date)+(inj.resolvedDate?' 〜 '+fmt(inj.resolvedDate):'')+'</div></div></div>';
    });
    h+='</div>';
  }
  h+='</div>';
  $M().innerHTML=h;
  // BIG3推移グラフ描画
  if(phRecs.length>=2){
    setTimeout(function(){
      var e=document.getElementById('rep-phys-chart');if(!e)return;
      var ctx=e.getContext('2d');
      function grad(c1,c2){var g=ctx.createLinearGradient(0,0,0,180);g.addColorStop(0,c1);g.addColorStop(1,c2);return g;}
      function mk(label,key,color,ft){return{label:label,data:phRecs.map(function(r){return r[key]||null;}),borderColor:color,backgroundColor:grad(ft,'rgba(0,0,0,0)'),borderWidth:2.5,fill:true,tension:.4,pointRadius:3,pointBackgroundColor:'#16243A',pointBorderColor:color,pointBorderWidth:2};}
      dC('repphys');
      charts.repphys=new Chart(e,{type:'line',data:{labels:phRecs.map(function(r){return r.date.slice(5);}),datasets:[
        mk('SQ','squat','#4D9FFF','rgba(77,159,255,.2)'),
        mk('BP','bench','#3DDC97','rgba(61,220,151,.2)'),
        mk('DL','deadlift','#FFB454','rgba(255,180,84,.2)')
      ]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{labels:{color:'#93A4BC',usePointStyle:true,pointStyle:'circle',boxWidth:7,padding:12,font:{size:11}}},tooltip:{backgroundColor:'rgba(10,16,25,.95)',padding:10,cornerRadius:10,callbacks:{label:function(c){return c.dataset.label+': '+(c.parsed.y!=null?c.parsed.y+'kg':'-');}}}},scales:{y:{grid:{color:'rgba(255,255,255,.06)'},ticks:{color:'#93A4BC',font:{size:10}}},x:{grid:{display:false},ticks:{color:'#93A4BC',font:{size:10}}}}}});
    },60);
  }
}
function miniStat(label,val,color){
  return '<div style="background:var(--bg-elev);border-radius:10px;padding:10px;text-align:center"><div style="font-size:18px;font-weight:800;color:'+(color||'var(--txt)')+'">'+(val!=null&&val!==''?val:'-')+'</div><div style="font-size:10px;color:var(--txt-2);margin-top:2px">'+label+'</div></div>';
}
function getLatestE1RMReport(pid){
  var recs=(D.e1rm||[]).filter(function(x){return idEq(x.pid,pid);}).sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});
  var result={};
  (EST_BASES||[]).forEach(function(b){
    for(var i=0;i<recs.length;i++){if(recs[i].values&&recs[i].values[b.k]){result[b.k]=recs[i].values[b.k].e1rm;break;}}
  });
  return result;
}
function backFromReport(){_detailPid=null;render();window.scrollTo(0,0);}

</script>
<script>
// ========== ナビ ==========
var TABS=[
  {k:'injury',label:'怪我・リハビリ'},
  {k:'physical',label:'フィジカル'},
  {k:'training',label:'出欠・トレーニング'},
  {k:'condition',label:'コンディション'},
  {k:'players',label:'選手一覧'}
];
var curTab='injury';
function renderTabs(){
  document.getElementById('tabs').innerHTML=TABS.map(function(t){
    return '<div class="tab'+(t.k===curTab?' ac':'')+'" onclick="goTab(\''+t.k+'\')">'+t.label+'</div>';
  }).join('');
}
function goTab(k){curTab=k;_detailPid=null;renderTabs();render();window.scrollTo(0,0);}
var _detailPid=null;
function render(){
  renderTabs();
  dCA();
  if(_detailPid){renderPlayerReport(_detailPid);return;}
  if(curTab==='injury')renderInjuryView();
  else if(curTab==='physical')renderPhysicalView();
  else if(curTab==='training')renderTrainingView();
  else if(curTab==='condition')renderConditionView();
  else if(curTab==='players')renderPlayersView();
}
loadData();
</script>
</body>
</html>
