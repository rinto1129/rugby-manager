<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rugby Manager</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans JP',sans-serif;background:#fff;color:#1a1a1a;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.wrap{text-align:center;max-width:400px}
h1{font-size:24px;margin-bottom:8px}
p{color:#6b6b65;margin-bottom:32px;font-size:14px}
a{display:block;padding:18px 24px;border-radius:12px;text-decoration:none;font-size:16px;font-weight:600;margin-bottom:14px;transition:transform .15s}
a:hover{transform:translateY(-2px)}
.staff{background:#185FA5;color:#fff}
.player{background:#f5f5f0;color:#1a1a1a;border:1.5px solid rgba(0,0,0,0.1)}
</style>
</head>
<body>
<div class="wrap">
<div style="font-size:48px;margin-bottom:16px">🏉</div>
<h1>Rugby Manager</h1>
<p>福岡大学ラグビー部 選手管理システム</p>
<a href="./プレーヤー/" class="player">👤 選手サイト</a>
<a href="./スタッフ/" class="staff">🖥️ スタッフサイト</a>
</div>
</body>
</html>
