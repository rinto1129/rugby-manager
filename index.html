<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>福岡大学ラグビー部 選手管理システム</title>
<style>
:root{--blue:#3B82F6;--green:#10B981;--purple:#8B5CF6;--bg:#0F1B2D;--card:#16263E;--text:#E8ECEF;--text2:#8B99A6;--radius:16px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans JP',sans-serif;background:linear-gradient(160deg,#0F1B2D 0%,#16263E 50%,#0F1B2D 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;color:var(--text)}
.wrap{width:100%;max-width:480px;text-align:center}
.logo{font-size:56px;margin-bottom:12px;filter:drop-shadow(0 4px 12px rgba(0,0,0,.4))}
h1{font-size:22px;font-weight:700;letter-spacing:.02em;margin-bottom:4px}
.sub{font-size:13px;color:var(--text2);margin-bottom:36px;letter-spacing:.06em}
.cards{display:flex;flex-direction:column;gap:14px}
.card{display:flex;align-items:center;gap:16px;padding:20px 22px;background:var(--card);border-radius:var(--radius);text-decoration:none;color:var(--text);border:1px solid rgba(255,255,255,.06);transition:all .2s;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:4px 0 0 4px}
.card.player::before{background:var(--blue)}
.card.staff::before{background:var(--purple)}
.card.trainer::before{background:var(--green)}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.35);border-color:rgba(255,255,255,.14)}
.card:active{transform:translateY(0)}
.icon{font-size:34px;width:56px;height:56px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.05);border-radius:14px;flex-shrink:0}
.info{text-align:left;flex:1}
.info .t{font-size:16px;font-weight:700;margin-bottom:3px}
.info .d{font-size:12px;color:var(--text2);line-height:1.5}
.arrow{font-size:18px;color:var(--text2)}
.footer{margin-top:36px;font-size:11px;color:var(--text2);opacity:.7}
@media(max-width:380px){.card{padding:16px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">🏉</div>
  <h1>福岡大学ラグビー部</h1>
  <div class="sub">PLAYER MANAGEMENT SYSTEM</div>
  <div class="cards">
    <a class="card player" href="./player/">
      <div class="icon">🏃</div>
      <div class="info">
        <div class="t">選手サイト</div>
        <div class="d">コンディション・MAX測定・怪我報告・テーピング予約</div>
      </div>
      <div class="arrow">→</div>
    </a>
    <a class="card trainer" href="./trainer/">
      <div class="icon">👨‍⚕️</div>
      <div class="info">
        <div class="t">専門学生サイト</div>
        <div class="d">テーピング枠管理・リハビリ記録・復帰テスト</div>
      </div>
      <div class="arrow">→</div>
    </a>
    <a class="card staff" href="./staff/">
      <div class="icon">📋</div>
      <div class="info">
        <div class="t">スタッフサイト</div>
        <div class="d">選手管理・怪我管理・リハビリ計画・測定会・分析</div>
      </div>
      <div class="arrow">→</div>
    </a>
  </div>
  <div class="footer">Fukuoka University Rugby Football Club</div>
</div>
</body>
</html>
