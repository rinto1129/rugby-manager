<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rugby Manager - トレーナー</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{

  --text-primary:#EAF0F8;--text-secondary:#9FB0C8;--text-tertiary:#6E7F9C;
  --border-secondary:rgba(255,255,255,0.18);--border-tertiary:rgba(255,255,255,0.10);

  --font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans JP',sans-serif;--radius:10px;--radius-lg:14px}
body{font-family:var(--font-sans);background:var(--bg-app);color:var(--text-primary);min-height:100vh;padding-bottom:80px;-webkit-font-smoothing:antialiased}
.header{background:linear-gradient(180deg,var(--navy),var(--navy-2));border-bottom:1px solid var(--border-tertiary);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-title{font-size:15px;font-weight:700;color:#fff}
.header-user{font-size:12px;color:var(--accent);font-weight:600;cursor:pointer}
.main{padding:16px;max-width:600px;margin:0 auto}
.nav-bottom{position:fixed;bottom:0;left:0;right:0;background:var(--navy);border-top:1px solid var(--border-tertiary);display:flex;z-index:100}
.nav-btn{flex:1;padding:10px 4px 8px;text-align:center;cursor:pointer;font-size:10px;color:var(--text-secondary);border:none;background:none;font-family:var(--font-sans);transition:color .15s}
.nav-btn.ac{color:var(--accent);font-weight:600}
.nav-btn-icon{display:flex;align-items:center;justify-content:center;margin-bottom:3px}.nav-btn-icon svg{width:24px;height:24px}
.card{background:var(--bg-primary);border:1px solid var(--border-tertiary);border-radius:var(--radius-lg);padding:1rem;margin-bottom:10px;box-shadow:var(--shadow-sm)}
.card-click{cursor:pointer}.card-click:hover{border-color:var(--accent)}
.btn{padding:8px 16px;border-radius:var(--radius);border:1px solid var(--border-secondary);background:var(--bg-secondary);font-size:13px;cursor:pointer;color:var(--text-primary);font-family:var(--font-sans);font-weight:500}.btn:hover{background:var(--bg-tertiary)}
.btn-p{background:var(--accent);color:#fff;border-color:var(--accent)}.btn-p:hover{background:var(--accent-d)}
.btn-d{color:var(--red);border-color:var(--red)}
.btn-s{color:var(--green);border-color:var(--green)}
.btn-sm{padding:4px 10px;font-size:11px;width:auto}
.ipt{padding:9px 12px;border:1.5px solid var(--border-secondary);border-radius:var(--radius);background:var(--navy);font-size:13px;color:var(--text-primary);font-family:var(--font-sans);width:100%}
.ipt:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.ipt::placeholder{color:var(--text-tertiary)}
select.ipt{appearance:auto}textarea.ipt{resize:vertical;min-height:80px}
.fl{display:flex;flex-direction:column;gap:5px}
.fl label{font-size:12px;color:var(--text-secondary);font-weight:600}
.form-box{background:var(--bg-secondary);border:1px solid var(--border-tertiary);border-radius:var(--radius-lg);padding:1rem;margin-bottom:1rem}
.form-title{font-size:11px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.04em;margin-bottom:12px}
.bd{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600}
.bd-g{background:var(--green-bg);color:var(--green)}
.bd-r{background:var(--red-bg);color:var(--red)}
.bd-a{background:var(--amber-bg);color:var(--amber)}
.bd-b{background:var(--blue-bg);color:var(--blue)}
.bd-p{background:var(--purple-bg);color:var(--purple)}
.no{text-align:center;padding:2rem;color:var(--text-secondary);font-size:13px}
.log-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:0.5px solid var(--border-tertiary);font-size:12px}
.log-row:last-child{border-bottom:none}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0;overflow:hidden;background-size:cover;background-position:center}
.alert-card{padding:.65rem .85rem;border-radius:var(--radius);margin-bottom:6px;font-size:12px;font-weight:500}
.alert-info{background:var(--blue-bg);color:var(--blue);border-left:3px solid var(--blue)}
.alert-warn{background:var(--amber-bg);color:var(--amber);border-left:3px solid var(--amber)}
.grid{display:grid;gap:10px}
.g2{grid-template-columns:1fr 1fr}
.mc{background:var(--bg-secondary);border-radius:var(--radius);padding:.75rem;text-align:center}
.mc .v{font-size:22px;font-weight:700}
.mc .l{font-size:10px;color:var(--text-secondary);margin-top:3px}
.select-card{border:2px solid var(--border-tertiary);border-radius:var(--radius-lg);padding:14px 16px;cursor:pointer;margin-bottom:8px;background:var(--bg-primary);transition:all .15s}
.select-card:hover{border-color:var(--blue)}
.select-card.selected{border-color:var(--blue);background:var(--blue-bg)}
/* ログイン画面 */
#login-screen{position:fixed;inset:0;background:var(--bg-primary);z-index:9999;overflow-y:auto;padding:24px}
.login-wrap{width:100%;max-width:380px;margin:0 auto;padding-top:40px;padding-bottom:40px}
.login-title{font-size:22px;font-weight:700;text-align:center;margin-bottom:6px}
.login-sub{font-size:13px;color:var(--text-secondary);text-align:center;margin-bottom:28px}
.trainer-btn{display:block;width:100%;padding:14px 16px;border-radius:var(--radius-lg);border:1.5px solid var(--border-tertiary);background:var(--bg-primary);font-size:15px;font-weight:600;cursor:pointer;margin-bottom:10px;text-align:left;font-family:var(--font-sans);color:var(--text-primary);transition:all .15s}
.trainer-btn:hover{border-color:var(--blue);background:var(--blue-bg);color:var(--blue)}
.chart-hero{background:linear-gradient(135deg,#0F1B2D,#1E3251);border-radius:var(--radius-lg);padding:1.1rem 1.25rem;margin-bottom:0;box-shadow:var(--shadow-md)}
.chart-tabs{display:flex;gap:4px;overflow-x:auto;background:var(--bg-secondary);border-radius:var(--radius);padding:5px;margin:12px 0 14px;-webkit-overflow-scrolling:touch}
.chart-tab{flex-shrink:0;padding:7px 12px;border-radius:8px;font-size:12px;font-weight:600;color:var(--text-secondary);cursor:pointer;white-space:nowrap;transition:all .15s}
.chart-tab:hover{background:var(--bg-tertiary);color:var(--text-primary)}
.chart-tab.ac{background:var(--accent);color:#fff}
/* ===== タイムライン ===== */
.tl-wrap{position:relative;padding:8px 0 8px 0}
.tl-item{position:relative;padding:0 0 22px 38px}
.tl-item:last-child{padding-bottom:4px}
.tl-line{position:absolute;left:13px;top:22px;bottom:-4px;width:2px;background:linear-gradient(180deg,var(--tl-color,var(--accent)),rgba(255,255,255,.06))}
.tl-item:last-child .tl-line{display:none}
.tl-dot{position:absolute;left:5px;top:3px;width:18px;height:18px;border-radius:50%;background:var(--tl-color,var(--accent));box-shadow:0 0 0 4px var(--bg-app),0 0 12px var(--tl-glow,rgba(59,130,246,.6));display:flex;align-items:center;justify-content:center;z-index:2}
.tl-dot svg{width:10px;height:10px;fill:#fff}
.tl-card{background:linear-gradient(135deg,var(--bg-primary),var(--bg-secondary));border:1px solid var(--border-tertiary);border-left:3px solid var(--tl-color,var(--accent));border-radius:10px;padding:11px 14px;transition:all .2s;box-shadow:var(--shadow-sm)}
.tl-card:hover{transform:translateX(3px);box-shadow:0 4px 16px rgba(0,0,0,.25)}
.tl-date{font-size:11px;font-weight:700;color:var(--tl-color,var(--accent));letter-spacing:.03em;text-transform:uppercase;margin-bottom:3px}
.tl-title{font-size:14px;font-weight:700;color:var(--text-primary);margin-bottom:2px}
.tl-desc{font-size:12.5px;color:var(--text-secondary);line-height:1.5}
.tl-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;margin-left:6px;vertical-align:middle}
.tl-metric{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;background:var(--bg-tertiary);padding:2px 8px;border-radius:6px;margin:4px 4px 0 0}
.soap-line{display:flex;gap:8px;align-items:flex-start;margin-bottom:6px;font-size:13px;line-height:1.5}
.soap-tag{flex-shrink:0;width:22px;height:22px;border-radius:6px;color:#fff;font-weight:800;font-size:12px;display:inline-flex;align-items:center;justify-content:center}
.detail-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:0.5px solid var(--border-tertiary);font-size:13px}.detail-row:last-child{border-bottom:none}
.detail-label{color:var(--text-secondary)}.detail-value{font-weight:600;text-align:right}
.chart-wrap{position:relative;height:200px;margin:12px 0}
.g3{grid-template-columns:1fr 1fr 1fr}
</style>
</head>

// カルテデータ取得（なければ新規作成して返す）
function getChart(injId){
  var ch=D.chart.find(function(x){return idEq(x.injId,injId);});
  if(!ch){
    ch={injId:injId,injDetail:{},medical:{},evals:[],soaps:[],returnCriteria:{},images:[]};
    D.chart.push(ch);
  }
  // 古いデータに項目がなければ補完
  if(!ch.injDetail)ch.injDetail={};
  if(!ch.medical)ch.medical={};
  if(!ch.evals)ch.evals=[];
  if(!ch.soaps)ch.soaps=[];
  if(!ch.returnCriteria)ch.returnCriteria={};
  if(!ch.images)ch.images=[];
  // 怪我×リハビリ連携（Phase0）：未定義の既存カルテで落ちないよう既定値を補完
  if(!ch.metrics)ch.metrics=[];
  if(!ch.mmtTargets)ch.mmtTargets=[];
  if(ch.injType==null)ch.injType='';
  if(ch.isConcussion==null)ch.isConcussion=false;
  if(!ch.medClearance)ch.medClearance={granted:false,date:null};
  if(!ch.romLimit)ch.romLimit={active:false,key:null,max:null,min:null,until:null};
  if(ch.rtpLevel==null)ch.rtpLevel='';
  return ch;
}
// カルテ保存（必ずsvSafeUpdateで安全に。素のsvは使わない＝他端末のカルテを巻き戻さない）
// ⚠️ saveChart(ch)は ch 全体を server-latest に上書きする＝同一injId内のロストアップデートの火種。
//   eval/metrics等の頻繁な編集は下の操作単位関数(saveChartMetrics/saveEval/delEval)を使うこと。
//   低頻度のSOAP/復帰基準/rtpLevel等のみ saveChart を継続使用。
function saveChart(ch,onDone){
  if(!ch){if(onDone)onDone();return;}
  // 一意キーは injId 優先、無ければ id。どちらかがあれば一致レコードをupsert、無ければ末尾に追加（全上書きはしない）
  var key=(ch.injId!=null)?'injId':(ch.id!=null?'id':null);
  return svSafeUpdate('chart',function(latest){
    if(key){
      var i=latest.findIndex(function(x){return idEq(x[key],ch[key]);});
      if(i>=0)latest[i]=ch;else latest.push(ch);
    }else{
      latest.push(ch);
    }
    return latest;
  },onDone);
}
// === METRIC-SAVE (4ファイル同期) ===
// 操作単位の保存：server-latestの対象injIdレコードの「指定フィールドだけ」を触る。
// evals/soaps等は一切触らないので、他端末がeval追加中でも巻き戻さない（ロストアップデート対策）。
function _chartIdx(latest,injId){
  var i=latest.findIndex(function(x){return idEq(x.injId,injId);});
  if(i<0){
    latest.push({injId:injId,injDetail:{},medical:{},evals:[],soaps:[],returnCriteria:{},images:[],metrics:[],mmtTargets:[]});
    i=latest.length-1;
  }
  return i;
}
// 追跡指標・MMT目標・chartレベルのメタ（種別/脳震盪/医師clearance/ROM制限）の保存
function saveChartMetrics(injId,metrics,mmtTargets,meta,onDone){
  return svSafeUpdate('chart',function(latest){
    var i=_chartIdx(latest,injId);
    if(metrics!=null)latest[i].metrics=metrics;
    if(mmtTargets!=null)latest[i].mmtTargets=mmtTargets;
    if(meta){
      if(meta.injType!=null)latest[i].injType=meta.injType;
      if(meta.isConcussion!=null)latest[i].isConcussion=meta.isConcussion;
      if(meta.medClearance!=null)latest[i].medClearance=meta.medClearance;
      if(meta.romLimit!=null)latest[i].romLimit=meta.romLimit;
    }
    return latest;
  },onDone);
}

// 指定選手の過去のケガ一覧（指定ケガ自身は除く、新しい順）
function getPlayerInjHistory(pid,excludeIid){
  return D.i.filter(function(x){return idEq(x.pid,pid)&&!idEq(x.id,excludeIid);})
    .sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});
}
// 同一部位の過去ケガ（再発判定用）
function getSamePartInjuries(pid,part,excludeIid){
  return getPlayerInjHistory(pid,excludeIid).filter(function(x){return x.part===part;});
}
// 再発・多発の検知。返り値: {isRecurrent:bool, samePartCount:int, sameTypeCount:int, lastSame:obj}
function analyzeRecurrence(inj){
  var samePart=getSamePartInjuries(inj.pid,inj.part,inj.id);
  var samePartType=samePart.filter(function(x){return x.type===inj.type;});
  return {
    isRecurrent: samePart.length>0,
    samePartCount: samePart.length,
    sameTypeCount: samePartType.length,
    lastSame: samePart.length?samePart[0]:null,
    history: samePart
  };
}
// 全選手の中で「同一部位を3回以上」のケガを持つ選手を検出（多発アラート）
function getFrequentInjuryPlayers(){
  var byPlayerPart={};
  D.i.forEach(function(inj){
    var key=inj.pid+'|'+inj.part;
    if(!byPlayerPart[key])byPlayerPart[key]={pid:inj.pid,part:inj.part,count:0,injs:[]};
    byPlayerPart[key].count++;
    byPlayerPart[key].injs.push(inj);
  });
  var result=[];
  Object.keys(byPlayerPart).forEach(function(k){
    if(byPlayerPart[k].count>=3)result.push(byPlayerPart[k]);
  });
  return result.sort(function(a,b){return b.count-a.count;});
}

function sv(k){db.collection('appdata').doc(k).set({data:JSON.stringify(D[k])}).catch(function(e){console.error('save error:',k,e);});}
function svSafe(k,newRec,callback){
  var ref=db.collection('appdata').doc(k);
  return db.runTransaction(function(tx){
    return tx.get(ref).then(function(doc){
      var latest=[];
      if(doc.exists){try{var parsed=JSON.parse(doc.data().data);if(Array.isArray(parsed))latest=parsed;}catch(e){}}
      latest.push(newRec);
      tx.set(ref,{data:JSON.stringify(latest)});
      return latest;
    });
  }).then(function(latest){D[k]=latest;if(callback)callback();}).catch(function(e){alert('保存に失敗しました');console.error(e);});
}
function svSafeUpdate(k,updateFn,onDone){
  var ref=db.collection('appdata').doc(k);
  return db.runTransaction(function(tx){
    return tx.get(ref).then(function(doc){
      var latest=[];if(doc.exists){try{var parsed=JSON.parse(doc.data().data);if(Array.isArray(parsed))latest=parsed;}catch(e){}}
      latest=updateFn(latest);
      tx.set(ref,{data:JSON.stringify(latest)});
      return latest;
    });
  }).then(function(latest){D[k]=latest;if(onDone)onDone();}).catch(function(e){console.error('svSafeUpdate error:',k,e);alert('保存に失敗しました');});
}
// 単一レコードをトランザクションで安全にupsert（id一致で置換、なければ追加）
function svRec(k,rec,onDone){
  return svSafeUpdate(k,function(latest){
    var i=latest.findIndex(function(x){return idEq(x.id,rec.id);});
    if(i>=0)latest[i]=rec;else latest.push(rec);
    return latest;
  },onDone);
}
// 単一レコードをトランザクションで安全に削除（id一致）
function svDel(k,id,onDone){
  return svSafeUpdate(k,function(latest){return latest.filter(function(x){return!idEq(x.id,id);});},onDone);
}

function renderInjCommentsListOnly(iid,role){
  var comments=(D.injcomm||[]).filter(function(c){return idEq(c.injId,iid);}).sort(function(a,b){return (a.createdAt||'').localeCompare(b.createdAt||'');});
  var roleLabel={staff:'スタッフ',player:'選手',trainer:'専門学生'};
  var roleColor={staff:'var(--purple)',player:'var(--blue)',trainer:'var(--green)'};
  if(!comments.length)return'<div style="font-size:12px;color:var(--text-secondary);text-align:center;padding:14px">まだコメントはありません</div>';
  return comments.map(function(c){
    var label=roleLabel[c.role]||c.role||'?';
    var color=roleColor[c.role]||'var(--text-secondary)';
    var dt=c.createdAt?new Date(c.createdAt):null;
    var dateStr=dt?(toDateStr(dt)+' '+String(dt.getHours()).padStart(2,'0')+':'+String(dt.getMinutes()).padStart(2,'0')):'';
    var canDelete=c.role===role&&String(c.authorId)===String(getCurrentUserId(role));
    return'<div style="padding:8px 10px;border-radius:var(--radius);background:var(--bg-secondary);margin-bottom:6px">'+
    '<div style="display:flex;align-items:center;justify-content:space-between;font-size:11px;margin-bottom:4px">'+
    '<span><span class="bd" style="background:'+color+';color:#fff;font-size:9px">'+label+'</span> <b style="margin-left:4px">'+(c.authorName||'')+'</b></span>'+
    '<span style="color:var(--text-secondary)">'+dateStr+(canDelete?' <button class="btn btn-sm btn-d" onclick="delInjComment(\''+c.id+'\','+iid+',\''+role+'\')">削除</button>':'')+'</span>'+
    '</div>'+
    '<div style="font-size:13px;white-space:pre-wrap;word-break:break-word">'+escapeHtml(c.text||'')+'</div>'+
    '</div>';
  }).join('');
}

function postInjComment(iid,role){
  var el=document.getElementById('injcomm-input-'+iid);
  if(!el)return;
  var text=(el.value||'').trim();
  if(!text){alert('コメントを入力してください');return;}
  var newComm={
    id:'ic_'+Date.now()+'_'+Math.floor(Math.random()*1000),
    injId:iid,role:role,
    authorId:getCurrentUserId(role),
    authorName:getCurrentUserName(role),
    text:text,createdAt:new Date().toISOString()
  };
  svSafeUpdate('injcomm',function(latest){
    latest.push(newComm);
    return latest;
  },function(){
    el.value='';
    var listEl=document.getElementById('injcomm-list-'+iid);
    if(listEl){listEl.innerHTML=renderInjCommentsListOnly(iid,role);listEl.scrollTop=listEl.scrollHeight;}
  });
}

function delInjComment(cid,iid,role){
  if(!confirm('このコメントを削除しますか？'))return;
  svSafeUpdate('injcomm',function(latest){
    return latest.filter(function(c){return!idEq(c.id,cid);});
  },function(){
    var listEl=document.getElementById('injcomm-list-'+iid);
    if(listEl)listEl.innerHTML=renderInjCommentsListOnly(iid,role);
  });
}

function doSetupPIN(tid){
  var pin1=document.getElementById('pin-new').value;
  var pin2=document.getElementById('pin-new2').value;
  if(!/^\d{4}$/.test(pin1)){alert('PINは4桁の数字で設定してください');return;}
  if(pin1!==pin2){alert('PINが一致しません');return;}
  // 保存
  svSafeUpdate('trainers',function(latest){
    var idx=latest.findIndex(function(t){return idEq(t.id,tid);});
    if(idx>=0){latest[idx].pin=pin1;}
    return latest;
  },function(){
    alert('PINを設定しました ✓');

  });

function login(tid){
  var trainer=D.trainers.find(function(t){return t.id===tid;});
  if(!trainer)return;
  // PIN確認
  var pinEl=document.getElementById('pin-input');
  if(trainer.pin){
    if(!pinEl){return;}
    if(pinEl.value!==trainer.pin){
      alert('PINが間違っています');
      pinEl.value='';
      pinEl.focus();
      return;
    }
  }
  myTrainer=trainer;
  document.getElementById('login-screen').style.display='none';
  document.getElementById('header-user').textContent=myTrainer.name+'さん | ログアウト';
  go('home');
}

function logout(){
  if(!confirm('ログアウトしますか？'))return;
  myTrainer=null;
  showLogin();
}

// ===== NAVIGATION =====
function go(tab){
  curTab=tab;
  window._subViewActive=false;
  // onclick属性からタブ名を読み取って判定（順序依存をなくす）
  document.querySelectorAll('.nav-btn').forEach(function(e){
    var onclickAttr=e.getAttribute('onclick')||'';
    var m=onclickAttr.match(/go\(['"]([^'"]+)['"]\)/);
    e.classList.toggle('ac',m&&m[1]===tab);
  });
  T[tab]&&T[tab]();
}

tape:function(){
  var today=todayStr();
  var now=new Date();
  var daysToNextMon=now.getDay()===0?1:8-now.getDay();
  var nextMon=new Date(now);nextMon.setDate(now.getDate()+daysToNextMon);
  var nextSun=new Date(nextMon);nextSun.setDate(nextMon.getDate()+6);
  // 過去4週間〜来週まで表示
  var pastStart=new Date(now);pastStart.setDate(now.getDate()-28);
  var fromS=pastStart.getFullYear()+'-'+String(pastStart.getMonth()+1).padStart(2,'0')+'-'+String(pastStart.getDate()).padStart(2,'0');
  var toS=nextSun.getFullYear()+'-'+String(nextSun.getMonth()+1).padStart(2,'0')+'-'+String(nextSun.getDate()).padStart(2,'0');
  // 自分の枠がある日
  var mySlotDates=[...new Set((D.tapeslot||[]).filter(function(s){return s.staff===myTrainer.name&&s.date>=fromS&&s.date<=toS;}).map(function(s){return s.date;}))].sort().reverse();
  var h='<div style="font-size:18px;font-weight:700;margin:4px 0 16px">🩻 テーピング管理</div>';
  h+='<button class="btn btn-p" style="width:100%;margin-bottom:10px" onclick="showTapeSetupForm()">+ 今日/来週の枠を設定する</button>';
  h+='<button class="btn" style="width:100%;margin-bottom:14px" onclick="showTapeRecList()">📋 テーピング記録（引き継ぎ）を見る</button>';
  h+='<div style="font-weight:600;margin-bottom:10px">あなたの担当枠（過去4週間〜来週）</div>';
  if(mySlotDates.length){

function saveTapeRec(recId){
  var pidEl=document.getElementById('tr-pid');
  var pid=pidEl&&pidEl.value?parseInt(pidEl.value):(recId?(D.taperec.find(function(x){return idEq(x.id,recId);})||{}).pid:null);
  if(!pid)return alert('選手を選択してください');
  var tapeTypes=Array.prototype.slice.call(document.querySelectorAll('.tr-tape:checked')).map(function(e){return e.value;});
  var g=function(id){var e=document.getElementById(id);return e?e.value:'';};
  var data={pid:pid,date:g('tr-date')||todayStr(),side:g('tr-side'),part:g('tr-part'),tapeTypes:tapeTypes,method:g('tr-method'),caution:g('tr-caution'),videoUrl:g('tr-video').trim(),author:g('tr-author'),inputAt:new Date().toISOString()};
  svSafeUpdate('taperec',function(latest){
    if(recId){
      var idx=latest.findIndex(function(x){return idEq(x.id,recId);});
      if(idx>=0){data.id=recId;latest[idx]=data;}else{data.id=recId;latest.push(data);}
    }else{
      data.id=Date.now()+'_'+Math.floor(Math.random()*1000);
      latest.push(data);
    }
    return latest;
  },function(){
    alert('保存しました');
    showPlayerTapeRecs(pid);
  });
}
function delTapeRec(recId,pid){
  if(!confirm('このテーピング記録を削除しますか？'))return;
  svSafeUpdate('taperec',function(latest){
    return latest.filter(function(x){return!idEq(x.id,recId);});
  },function(){showPlayerTapeRecs(pid);});
}

      events.push({date:ddate,type:'hospital',title:'病院受診・診断',desc:dtxt.join('<br>')});
    }
    if(ch.medical.surgery&&ch.medical.surgeryDate){
      events.push({date:ch.medical.surgeryDate,type:'hospital',title:'手術',desc:escapeHtml(ch.medical.surgeryName||'手術実施')});
    }
  }
  // 3. 評価（痛み・ROMの推移をメトリクスで）
  (ch.evals||[]).forEach(function(ev){
    var metrics='';
    if(ev.pain){
      var maxP=Math.max(ev.pain.rest||0,ev.pain.motion||0,ev.pain.night||0,ev.pain.press||0);
      var pc=maxP>=7?'#EF4444':maxP>=4?'#F59E0B':'#10B981';
      metrics+='<span class="tl-metric" style="color:'+pc+'">😣 痛み '+maxP+'/10</span>';
    }
    if(ev.rom){var romKeys=Object.keys(ev.rom);if(romKeys.length){var r0=ev.rom[romKeys[0]];if(r0)metrics+='<span class="tl-metric">📐 ROM '+r0+'°</span>';}}
    if(ev.mmt){var mk=Object.keys(ev.mmt);if(mk.length){var m0=ev.mmt[mk[0]];if(m0)metrics+='<span class="tl-metric">💪 MMT '+m0+'</span>';}}
    events.push({date:ev.date,type:'eval',title:'評価',desc:(ev.note?escapeHtml(ev.note):'')+(metrics?'<div style="margin-top:2px">'+metrics+'</div>':'')});
  });
  // 4. SOAP
  (ch.soaps||[]).forEach(function(s){
    var parts=[];
    if(s.a)parts.push('<b>A:</b> '+escapeHtml(s.a));
    if(s.p)parts.push('<b>P:</b> '+escapeHtml(s.p));
    var d=parts.join('<br>');
    if(!d&&s.s)d='<b>S:</b> '+escapeHtml(s.s);
    events.push({date:s.date,type:'soap',title:'SOAP記録'+(s.author?' ('+escapeHtml(s.author)+')':''),desc:d||'記録あり'});
  });
  // 5. リハビリ段階の開始日
  if(rh&&rh.stageDates){
    Object.keys(rh.stageDates).forEach(function(stg){
      var d=rh.stageDates[stg];
      if(d&&STG[stg])events.push({date:d,type:'stage',title:'リハビリ '+STG[stg],desc:'ステージ'+stg+'に移行'});
    });
  }
  // 6. RTP（現在のレベル。履歴がないので「設定」として表示）
  if(ch.rtpLevel){
    var rtpObj=RTP_LEVELS.find(function(x){return x.k===ch.rtpLevel;});
    if(rtpObj&&ch.rtpLevel!=='rest'){
      // RTP変更日が記録されていればそれを、なければ最終評価日あたりを使う
      var rtpDate=ch.rtpLevelDate||(ch.evals&&ch.evals.length?ch.evals[ch.evals.length-1].date:inj.date);
      events.push({date:rtpDate,type:'rtp',title:'練習参加レベル',desc:'<b style="color:'+rtpObj.color+'">'+rtpObj.label+'</b> '+rtpObj.desc});
    }
  }
  // 7. 復帰予定（未来のイベント）
  var isFuture=false;
  if(inj.returnDate&&!inj.resolved){
    var dl=Math.ceil((new Date(inj.returnDate)-new Date(todayStr()))/86400000);
    events.push({date:inj.returnDate,type:'goal',title:'復帰予定',desc:dl>0?'あと'+dl+'日':dl===0?'本日予定':(-dl)+'日超過',_future:true});
  }
  // 8. 回復済み
  if(inj.resolved){
    events.push({date:inj.resolvedDate||todayStr(),type:'goal',title:'復帰・回復',desc:'競技復帰しました 🎉'});
  }

  // 日付順にソート（同日は受傷→診断→評価→SOAPの優先度）
  var typeOrder={injury:0,hospital:1,stage:2,eval:3,soap:4,rtp:5,goal:6};
  events.sort(function(a,b){
    var dc=(a.date||'').localeCompare(b.date||'');
    if(dc!==0)return dc;
    return (typeOrder[a.type]||9)-(typeOrder[b.type]||9);
  });

  if(!events.length)return'<div class="no">まだ記録がありません</div>';

  // ヘッダー統計
  var daysSince=Math.floor((new Date(todayStr())-new Date(inj.date))/86400000);
  var h='<div style="display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap">'+
    '<div style="flex:1;min-width:90px;background:linear-gradient(135deg,#3B82F6,#2563EB);border-radius:12px;padding:12px 14px;color:#fff;box-shadow:0 4px 14px rgba(59,130,246,.3)"><div style="font-size:24px;font-weight:800;line-height:1">'+daysSince+'</div><div style="font-size:11px;opacity:.9;margin-top:2px">受傷からの日数</div></div>'+
    '<div style="flex:1;min-width:90px;background:linear-gradient(135deg,#10B981,#059669);border-radius:12px;padding:12px 14px;color:#fff;box-shadow:0 4px 14px rgba(16,185,129,.3)"><div style="font-size:24px;font-weight:800;line-height:1">'+events.filter(function(e){return e.type==='eval';}).length+'</div><div style="font-size:11px;opacity:.9;margin-top:2px">評価回数</div></div>'+
    '<div style="flex:1;min-width:90px;background:linear-gradient(135deg,#F59E0B,#D97706);border-radius:12px;padding:12px 14px;color:#fff;box-shadow:0 4px 14px rgba(245,158,11,.3)"><div style="font-size:24px;font-weight:800;line-height:1">'+events.length+'</div><div style="font-size:11px;opacity:.9;margin-top:2px">記録イベント</div></div>'+
    '</div>';

  // タイムライン本体
  h+='<div class="tl-wrap">';
  events.forEach(function(ev){
    var col=C[ev.type]||'#3B82F6';
    var glow=G[ev.type]||'rgba(59,130,246,.6)';
    var futureStyle=ev._future?'opacity:.75;border-style:dashed':'';
    h+='<div class="tl-item" style="--tl-color:'+col+';--tl-glow:'+glow+'">'+
      '<div class="tl-line"></div>'+
      '<div class="tl-dot">'+(IC[ev.type]||'')+'</div>'+
      '<div class="tl-card" style="'+futureStyle+'">'+
        '<div class="tl-date">'+fmt(ev.date)+(ev._future?' ・ 予定':'')+'</div>'+
        '<div class="tl-title">'+escapeHtml(ev.title)+'</div>'+
        (ev.desc?'<div class="tl-desc">'+escapeHtml(ev.desc)+'</div>':'')+
      '</div>'+
    '</div>';
  });
  h+='</div>';
  return h;
}

    (ch.injDetail.severity?'<div class="detail-row"><span class="detail-label">重症度</span><span class="detail-value">'+ch.injDetail.severity+'</span></div>':'')+
    (ch.medical.diagnosis?'<div class="detail-row"><span class="detail-label">診断名</span><span class="detail-value">'+escapeHtml(ch.medical.diagnosis)+'</span></div>':'')+
    '</div>';
  // リハビリ状況
  if(rh){
    h+='<div class="form-box"><div class="form-title">リハビリ状況</div>'+
    '<div class="detail-row"><span class="detail-label">現在の段階</span><span class="detail-value" style="color:var(--accent);font-weight:700">'+STG[rh.stage]+'</span></div></div>';
  }
  // 再発アラート
  var rec=analyzeRecurrence(inj);
  if(rec.isRecurrent){
    h+='<div class="alert-card alert-warn" style="margin-bottom:12px">'+
      '<div><div style="font-weight:700">⚠️ 再発の可能性 — 同じ部位（'+inj.part+'）のケガが過去に'+rec.samePartCount+'件</div>'+
      (rec.lastSame?'<div style="font-size:11px;margin-top:3px;opacity:.85">直近: '+fmt(rec.lastSame.date)+' '+rec.lastSame.type+'</div>':'')+
      (rec.samePartCount>=2?'<div style="font-size:11px;margin-top:3px;opacity:.85;font-weight:600">繰り返し受傷しています。根本的な原因の評価を推奨</div>':'')+
      '</div></div>';
  }
  // 最新の痛み状態
  if(lastEval){
    h+='<div class="form-box"><div class="form-title">最新の状態（'+fmt(lastEval.date)+'）</div>';
    PAIN_TYPES.forEach(function(pt){
      if(lastPain[pt.k]!=null){
        var v=lastPain[pt.k];
        h+='<div class="detail-row"><span class="detail-label">'+pt.label+'</span><span class="detail-value"><b style="color:'+(v>=7?'var(--red)':v>=4?'var(--amber)':'var(--green)')+'">'+v+'</b>/10</span></div>';

    '<button class="btn btn-d" onclick="deleteInjury('+iid+')">削除</button>'+
    '</div>';
  return h;
}

function renderChartEval(iid){
  var inj=D.i.find(function(x){return idEq(x.id,iid);});if(!inj)return'';
  var ch=getChart(iid);
  var em=EVAL_MASTER[inj.part]||EVAL_MASTER['その他'];
  var evals=ch.evals.slice().sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});
  var h='';
  // 新規評価追加ボタン
  h+='<button class="btn btn-p" style="width:100%;margin-bottom:14px" onclick="showEvalForm('+iid+')">＋ 新しい評価を記録する</button>';
  // 痛み推移グラフ
  if(evals.length>=1){
    h+='<div class="form-box"><div class="form-title">📈 痛みの推移</div><div class="chart-wrap" style="height:200px"><canvas id="ev-pain-chart"></canvas></div></div>';
    // ROM推移グラフ（部位にROM項目がある場合）
    if(em.rom.length>0){
      h+='<div class="form-box"><div class="form-title">📐 ROM（関節可動域）の推移</div><div class="chart-wrap" style="height:200px"><canvas id="ev-rom-chart"></canvas></div></div>';
    }
  }
  // 評価記録一覧
  h+='<div class="form-title" style="margin:16px 0 10px">評価記録（'+evals.length+'件）</div>';
  if(!evals.length){
    h+='<div class="no">まだ評価記録がありません。<br>「新しい評価を記録する」から始めてください。</div>';
  }else{
    evals.forEach(function(ev){
      h+='<div class="card" style="margin-bottom:10px">'+
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'+
        '<span style="font-weight:700;font-size:14px">'+fmt(ev.date)+'</span>'+
        '<div style="display:flex;gap:6px"><button class="btn btn-sm" onclick="showEvalForm('+iid+',\''+ev.id+'\')">編集</button><button class="btn btn-sm btn-d" onclick="delEval('+iid+',\''+ev.id+'\')">削除</button></div>'+
        '</div>';
      // 痛み
      if(ev.pain){
        var painParts=[];
        PAIN_TYPES.forEach(function(pt){if(ev.pain[pt.k]!=null)painParts.push(pt.label+':'+ev.pain[pt.k]);});
        if(painParts.length)h+='<div style="font-size:12px;margin-bottom:4px"><span style="color:var(--text-secondary)">痛み</span> '+painParts.join(' / ')+'</div>';
      }
      // ROM
      if(ev.rom&&Object.keys(ev.rom).length){
        var romParts=[];
        em.rom.forEach(function(r){if(ev.rom[r.k]!=null&&ev.rom[r.k]!=='')romParts.push(r.label+':'+ev.rom[r.k]+r.unit);});
        if(romParts.length)h+='<div style="font-size:12px;margin-bottom:4px"><span style="color:var(--text-secondary)">ROM</span> '+romParts.join(' / ')+'</div>';
      }
      // MMT
      if(ev.mmt&&Object.keys(ev.mmt).length){
        var mmtParts=[];
        em.mmt.forEach(function(mm){if(ev.mmt[mm]!=null&&ev.mmt[mm]!=='')mmtParts.push(mm+':'+ev.mmt[mm]);});
        if(mmtParts.length)h+='<div style="font-size:12px;margin-bottom:4px"><span style="color:var(--text-secondary)">筋力</span> '+mmtParts.join(' / ')+'</div>';
      }
      // 周径
      if(ev.circ&&Object.keys(ev.circ).length){
        var circParts=[];
        em.circ.forEach(function(c){if(ev.circ[c]!=null&&ev.circ[c]!=='')circParts.push(c+':'+ev.circ[c]+'cm');});
        if(circParts.length)h+='<div style="font-size:12px;margin-bottom:4px"><span style="color:var(--text-secondary)">周径</span> '+circParts.join(' / ')+'</div>';
      }
      // 整形外科テスト
      if(ev.ortho&&Object.keys(ev.ortho).length){
        var orthoParts=[];
        Object.keys(ev.ortho).forEach(function(k){if(ev.ortho[k])orthoParts.push(k+':'+ev.ortho[k]);});
        if(orthoParts.length)h+='<div style="font-size:12px;margin-bottom:4px"><span style="color:var(--text-secondary)">整形テスト</span> '+orthoParts.join(' / ')+'</div>';
      }
      // 所見
      if(ev.note)h+='<div style="font-size:12px;margin-top:6px;padding:8px;background:var(--bg-secondary);border-radius:6px;white-space:pre-wrap">'+escapeHtml(ev.note)+'</div>';
      h+='</div>';
    });
  }
  return h;
}

function showEvalForm(iid,evalId){

  var isEdit=!!ev;

function saveEval(iid,evalId){
  var pain={},rom={},mmt={},circ={},ortho={},special=[];
  var fit={},romH={},mmtH={},circH={},fitH={};
  document.querySelectorAll('.ev-pain').forEach(function(e){if(e.value!=='')pain[e.dataset.k]=parseFloat(e.value);});
  document.querySelectorAll('.ev-rom').forEach(function(e){if(e.value!=='')rom[e.dataset.k]=e.value;});
  document.querySelectorAll('.ev-mmt').forEach(function(e){if(e.value!=='')mmt[e.dataset.k]=e.value;});
  document.querySelectorAll('.ev-circ').forEach(function(e){if(e.value!=='')circ[e.dataset.k]=parseFloat(e.value);});
  document.querySelectorAll('.ev-ortho').forEach(function(e){if(e.value!=='')ortho[e.dataset.k]=e.value;});
  document.querySelectorAll('.ev-special:checked').forEach(function(e){special.push(e.value);});
  // 健側枠(*H)・フィットネス独自指標(metric id→値)。UIは後フェーズで追加（現状は空＝無害）
  document.querySelectorAll('.ev-romH').forEach(function(e){if(e.value!=='')romH[e.dataset.k]=e.value;});
  document.querySelectorAll('.ev-mmtH').forEach(function(e){if(e.value!=='')mmtH[e.dataset.k]=e.value;});
  document.querySelectorAll('.ev-circH').forEach(function(e){if(e.value!=='')circH[e.dataset.k]=parseFloat(e.value);});
  document.querySelectorAll('.ev-fit').forEach(function(e){if(e.value!=='')fit[e.dataset.k]=parseFloat(e.value);});
  document.querySelectorAll('.ev-fitH').forEach(function(e){if(e.value!=='')fitH[e.dataset.k]=parseFloat(e.value);});
  // 臨床項目（提案の安全ゲートの入力源）
  var effEl=document.getElementById('ev-effusion');var effusion=(effEl&&effEl.value!=='')?effEl.value:null;
  var plEl=document.getElementById('ev-painLoad');var painLoad=(plEl&&plEl.value!=='')?parseFloat(plEl.value):null;
  var rdEl=document.getElementById('ev-readiness');var readiness=(rdEl&&rdEl.value!=='')?parseFloat(rdEl.value):null;
  var date=document.getElementById('ev-date').value||todayStr();
  var note=document.getElementById('ev-note').value;
  var nowISO=new Date().toISOString();
  svSafeUpdate('chart',function(latest){
    var i=_chartIdx(latest,iid);
    if(!latest[i].evals)latest[i].evals=[];
    var rec=null;
    if(evalId)rec=latest[i].evals.find(function(x){return idEq(x.id,evalId);});
    if(!rec){rec={id:evalId||(Date.now()+'_'+Math.floor(Math.random()*1000))};latest[i].evals.push(rec);}
    rec.date=date;rec.pain=pain;rec.rom=rom;rec.mmt=mmt;rec.circ=circ;rec.ortho=ortho;rec.special=special;rec.note=note;rec.inputAt=nowISO;
    // 拡張フィールドは中身がある時だけ書く（空{}で既存evalを汚さない＝chart肥大も抑制）
    if(Object.keys(fit).length)rec.fit=fit;
    if(Object.keys(romH).length)rec.romH=romH;
    if(Object.keys(mmtH).length)rec.mmtH=mmtH;
    if(Object.keys(circH).length)rec.circH=circH;
    if(Object.keys(fitH).length)rec.fitH=fitH;
    if(effusion!=null)rec.effusion=effusion;
    if(painLoad!=null)rec.painLoad=painLoad;
    if(readiness!=null)rec.readiness=readiness;
    return latest;
  },function(){chartTab('eval');});
}
function delEval(iid,evalId){
  if(!confirm('この評価記録を削除しますか？'))return;
  svSafeUpdate('chart',function(latest){
    var i=latest.findIndex(function(x){return idEq(x.injId,iid);});
    if(i>=0&&latest[i].evals)latest[i].evals=latest[i].evals.filter(function(x){return!idEq(x.id,evalId);});
    return latest;
  },function(){chartTab('eval');});
}

}

function saveSOAP(iid,soapId){
  var ch=getChart(iid);
  var g=function(id){var e=document.getElementById(id);return e?e.value:'';};
  var data={date:g('sp-date')||todayStr(),s:g('sp-s'),o:g('sp-o'),a:g('sp-a'),p:g('sp-p'),menu:g('sp-menu'),author:g('sp-author'),inputAt:new Date().toISOString()};
  if(soapId){
    var sp=ch.soaps.find(function(x){return idEq(x.id,soapId);});
    if(sp)Object.assign(sp,data);
  }else{
    data.id=Date.now()+'_'+Math.floor(Math.random()*1000);
    ch.soaps.push(data);
  }
  saveChart(ch);
  chartTab('soap');
}
function delSOAP(iid,soapId){
  if(!confirm('この記録を削除しますか？'))return;
  var ch=getChart(iid);
  ch.soaps=ch.soaps.filter(function(x){return!idEq(x.id,soapId);});
  saveChart(ch);
  chartTab('soap');
}

function changeStage(iid,delta){
  var rh=D.r.find(function(x){return idEq(x.injId,iid);});if(!rh)return;
  var ns=rh.stage+delta;
  if(ns<0||ns>=STG.length)return;
  rh.stage=ns;
  if(!rh.stageDates)rh.stageDates=[];
  rh.stageDates[ns]=todayStr();
  svRec('r',rh);
  chartTab('return');
}
function toggleReturnCriteria(iid,el){
  var ch=getChart(iid);
  if(!ch.returnCriteria)ch.returnCriteria={};
  ch.returnCriteria[el.dataset.k]=el.checked;
  saveChart(ch);
}
function unresolveInj(iid){
  var inj=D.i.find(function(x){return idEq(x.id,iid);});if(!inj)return;
  inj.resolved=false;
  svRec('i',inj);
  renderChartTab();
}

function trToggleOther(){

}
function trToggleOtherType(){
  var v=document.getElementById('tri-type').value;
  document.getElementById('tri-typeOther-wrap').style.display=(v==='その他')?'block':'none';
}
function trDoAddInjury(){
  var pid=parseInt(document.getElementById('tri-pid').value);
  if(!pid)return alert('選手を選択してください');
  var part=document.getElementById('tri-part').value;
  var type=document.getElementById('tri-type').value;
  var injId=Date.now();
  var inj={id:injId,pid:pid,side:document.getElementById('tri-side').value,part:part,partOther:part==='その他'?document.getElementById('tri-partOther').value:'',type:type,typeOther:type==='その他'?document.getElementById('tri-typeOther').value:'',date:document.getElementById('tri-date').value,returnDate:document.getElementById('tri-ret').value,note:document.getElementById('tri-note').value,resolved:false,source:'trainer',approved:true};
  // svSafe方式でi・rを順にトランザクション追加（同時保存でも記録を失わない）
  svSafe('i',inj,function(){
    svSafe('r',{id:injId+1,injId:injId,pid:pid,stage:0,logs:[],stageDates:[]},function(){
      alert('ケガを登録しました。リハビリ管理を開始します。');
      openChart(injId);

}

function openChart(iid){window._subViewActive=true;
  var inj=(D.i||[]).find(function(x){return idEq(x.id,iid);});if(!inj)return;
  var p=D.p.find(function(x){return idEq(x.id,inj.pid);});if(!p)return;
  curChartTab='overview';
  _chartIid=iid;
  var hero='<div class="chart-hero">'+
    '<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">'+
    avH(p,48)+
    '<div style="flex:1;min-width:140px"><div style="font-size:18px;font-weight:800;color:#fff">'+escapeHtml(p.name)+'</div>'+
    '<div style="font-size:12px;color:#A9B8CE;margin-top:2px">'+(p.position||'-')+' ・ '+(p.year||'?')+'年</div></div>'+
    '<div style="text-align:right"><div style="font-size:14px;font-weight:700;color:#fff">'+(inj.side||'')+inj.part+'</div>'+
    '<div style="margin-top:4px"><span class="bd '+(inj.resolved?'bd-g':'bd-r')+'">'+(inj.resolved?'回復済':'治療中')+'</span></div></div>'+
    '</div></div>';
  var tabs='<div class="chart-tabs">'+
    '<div class="chart-tab ac" onclick="chartTab(\'overview\')">📋 概要</div>'+
    '<div class="chart-tab" onclick="chartTab(\'timeline\')">🕐 経過</div>'+
    '<div class="chart-tab" onclick="chartTab(\'diagnosis\')">🩺 受傷・診断</div>'+
    '<div class="chart-tab" onclick="chartTab(\'eval\')">📊 評価</div>'+
    '<div class="chart-tab" onclick="chartTab(\'soap\')">📝 SOAP</div>'+
    '<div class="chart-tab" onclick="chartTab(\'return\')">🎯 復帰</div>'+
    '<div class="chart-tab" onclick="chartTab(\'comment\')">💬 コメント</div>'+
    '</div>';
  var backBtn='<button class="btn btn-sm" style="margin-bottom:10px" onclick="goRehabPlayer('+iid+')">← リハビリ画面に戻る</button>';
  $m().innerHTML=backBtn+hero+tabs+'<div id="chart-body"></div>';
  setTimeout(function(){renderChartTab();},30);
}
function chartTab(t){
  curChartTab=t;
  document.querySelectorAll('.chart-tab').forEach(function(el){
    var oa=el.getAttribute('onclick')||'';
    var m=oa.match(/chartTab\('([^']+)'\)/);
    el.classList.toggle('ac',m&&m[1]===t);
  });
  renderChartTab();
}
function renderChartTab(){
  var iid=_chartIid;
  var body=document.getElementById('chart-body');
  if(!body)return;
  if(curChartTab==='overview')body.innerHTML=renderChartOverview(iid);
  else if(curChartTab==='timeline')body.innerHTML=renderChartTimeline(iid);
  else if(curChartTab==='diagnosis')body.innerHTML=renderChartDiagnosis(iid);
  else if(curChartTab==='eval'){body.innerHTML=renderChartEval(iid);setTimeout(function(){drawEvalCharts(iid);},50);}
  else if(curChartTab==='soap')body.innerHTML=renderChartSOAP(iid);
  else if(curChartTab==='return')body.innerHTML=renderChartReturn(iid);
  else if(curChartTab==='comment'){body.innerHTML=renderInjComments(iid,'trainer');setTimeout(function(){bindInjCommSubmit(iid,'trainer');},50);}
}

function goRehabPlayer(injId){window._subViewActive=true;
  var inj=(D.i||[]).find(function(x){return x.id===injId;});if(!inj)return;
  var p=D.p.find(function(x){return x.id===inj.pid;});if(!p)return;
  var plan=(D.rplan||[]).find(function(x){return x.injId===injId;});
  var logs=(D.rlog||[]).filter(function(l){return l.injId===injId;}).sort(function(a,b){return b.date.localeCompare(a.date);});
  var tpl=plan&&plan.tplId?(D.rtpl||[]).find(function(x){return x.id===plan.tplId;}):null;
  var tomorrowCats=plan?plan.tomorrowCats||[]:[];
  var rh=(D.r||[]).find(function(x){return x.injId===injId;});

  var h='<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">'+avH(p,38)+
  '<div><div style="font-size:17px;font-weight:600">'+escapeHtml(p.name)+'</div>'+
  '<div style="font-size:12px;color:var(--text-secondary)">'+(inj.side||'')+inj.part+' '+inj.type+'</div>'+
  (rh?'<div style="font-size:12px;color:var(--green);font-weight:600">段階: '+STG[rh.stage]+'</div>':'')+
  '</div></div>';
  // 電子カルテへの入口
  h+='<button class="btn btn-p" style="width:100%;margin-bottom:14px" onclick="openChart('+injId+')">📋 電子カルテを開く（評価・診断・SOAP）</button>';

  // 段階タイムライン
  if(rh){
    var dl=inj.returnDate?Math.max(0,Math.ceil((new Date(inj.returnDate)-new Date())/86400000)):null;
    h+='<div class="form-box"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">'+
    '<div class="form-title" style="margin-bottom:0">リハビリ段階</div>'+
    (dl!==null?'<span class="bd bd-b">復帰まで約'+dl+'日</span>':'')+
    '</div><div style="display:flex;align-items:flex-start;gap:0;overflow-x:auto;padding-bottom:6px">';
    for(var idx=0;idx<STG.length;idx++){
      var isDone=idx<rh.stage,isCur=idx===rh.stage;
      var sd=rh.stageDates&&rh.stageDates[idx]?rh.stageDates[idx]:'';
      h+='<div style="display:flex;flex-direction:column;align-items:center;min-width:64px;flex:1;position:relative">'+
      (idx<STG.length-1?'<div style="position:absolute;top:13px;left:50%;width:100%;height:2.5px;background:'+(isDone?'var(--green)':'var(--border-tertiary)')+';z-index:1"></div>':'')+
      '<div style="width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;z-index:2;border:2.5px solid '+(isDone?'var(--green)':isCur?'var(--blue)':'var(--border-tertiary)')+';background:'+(isDone?'var(--green)':isCur?'var(--blue)':'var(--bg-primary)')+';color:'+(isDone||isCur?'#fff':'var(--text-secondary)')+'">'+( isDone?'✓':(idx+1))+'</div>'+
      '<div style="font-size:8px;color:var(--text-secondary);margin-top:3px;text-align:center;line-height:1.3">'+STG[idx]+'</div>'+
      (sd?'<div style="font-size:8px;color:var(--green);font-weight:600">'+fmt(sd)+'</div>':'')+
      '</div>';
    }
    h+='</div></div>';
  }

  // 前回の記録
  var lastLog=logs.length?logs[0]:null;
  if(lastLog){
    h+='<div class="form-box" style="border-left:3px solid var(--amber)">';
    h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">'+

function collectPreCheck(lastLog){
  if(!window._preCheckOpen)return null;
  var pain=parseInt((document.getElementById('pc-pain')||{}).value);
  var feeling=(document.getElementById('pc-feeling')||{}).value||'';
  var roms=[];
  for(var ri=1;ri<=window._romCount;ri++){
    var j=(document.getElementById('rom-joint-'+ri)||{}).value;
    var a=parseFloat((document.getElementById('rom-angle-'+ri)||{}).value);
    if(j&&!isNaN(a)){
      var prevRom=lastLog&&lastLog.preCheck&&lastLog.preCheck.roms?lastLog.preCheck.roms.find(function(r){return r.joint===j;}):null;
      var diff=prevRom?Math.round((a-prevRom.angle)*10)/10:null;
      roms.push({joint:j,angle:a,diff:diff});
    }
  }
  var strengths=[];
  for(var si=1;si<=window._strengthCount;si++){
    var n=(document.getElementById('str-name-'+si)||{}).value;
    var v=parseFloat((document.getElementById('str-val-'+si)||{}).value);
    if(n&&!isNaN(v)){
      var prevStr=lastLog&&lastLog.preCheck&&lastLog.preCheck.strengths?lastLog.preCheck.strengths.find(function(s){return s.name===n;}):null;
      var sdiff=prevStr?Math.round((v-prevStr.value)*10)/10:null;
      strengths.push({name:n,value:v,diff:sdiff});
    }
  }
  return{pain:isNaN(pain)?null:pain,roms:roms,strengths:strengths,feeling:feeling};
}

function calcSideDiff(ti){
  var h=parseFloat((document.getElementById('rt-healthy-'+ti)||{}).value);
  var a=parseFloat((document.getElementById('rt-affected-'+ti)||{}).value);
  var el=document.getElementById('rt-diff-'+ti);if(!el)return;
  if(isNaN(h)||isNaN(a)||h===0){el.textContent='値を入力してください';el.style.background='var(--bg-secondary)';el.style.color='';return;}
  var ratio=Math.round(a/h*1000)/10;
  var passed=ratio>=85;
  var short=passed?0:Math.round((h*0.85-a)*10)/10;
  el.textContent=ratio+'% '+(passed?'✓ クリア':'✗ 未クリア（あと'+short+'必要）');
  el.style.background=passed?'var(--green-bg)':'var(--red-bg)';
  el.style.color=passed?'var(--green)':'var(--red)';
}

function doSaveRTest(injId,physCount){
  var date=document.getElementById('rt-date').value;
  if(!date)return alert('日付を入力してください');
  var physResults=[];var physPassed=true;
  var types=window._rtTestTypes||[];
  for(var ti=0;ti<physCount;ti++){
    if(types[ti]==='sidediff'){
      var h=parseFloat((document.getElementById('rt-healthy-'+ti)||{}).value);
      var a=parseFloat((document.getElementById('rt-affected-'+ti)||{}).value);
      var ratio=(!isNaN(h)&&!isNaN(a)&&h>0)?Math.round(a/h*1000)/10:0;
      var passed=ratio>=85;
      if(!passed)physPassed=false;
      physResults.push({type:'sidediff',healthy:h,affected:a,ratio:ratio,passed:passed});
    } else {
      var chk=document.getElementById('rt-action-'+ti);
      var passed2=chk&&chk.checked;
      var cmt=(document.getElementById('rt-action-cmt-'+ti)||{}).value||'';
      if(!passed2)physPassed=false;
      physResults.push({type:'action',passed:passed2,comment:cmt});
    }
  }
  var brM=parseInt((document.getElementById('rt-br-m')||{}).value)||0;
  var brS=parseInt((document.getElementById('rt-br-s')||{}).value)||0;
  var broncoTime=(brM||brS)?(brM*60+brS):null;
  var broncoTarget=window._rtBroncoTarget;
  var fitPassed=broncoTime&&broncoTarget?broncoTime<=broncoTarget:false;
  var note=(document.getElementById('rt-note')||{}).value||'';
  var rec={id:Date.now(),injId:injId,date:date,implementer:myTrainer.name,physResults:physResults,physPassed:physPassed,broncoTime:broncoTime,fitPassed:fitPassed,note:note,inputAt:new Date().toISOString()};
  svSafe('rtest',rec,function(){
    var msg='保存しました ✓\n患部テスト: '+(physPassed?'✓ クリア':'✗ 未クリア')+'\nフィットテスト: '+(fitPassed?'✓ クリア':'✗ 未クリア');
    if(physPassed&&fitPassed)msg+='\n\n🎉 全テストクリア！スタッフに承認をもらいましょう！';
    alert(msg);
    goRehabPlayer(injId);
  });
}

  var exercises=[];var cats=[];

    for(var ei=0;ei<exCount;ei++){
      var chk=document.getElementById('rl-chk-'+ei);
      var done=chk&&chk.checked;
      var exDiv=document.getElementById('rl-ex-'+ei);

      var exName=nameEl?nameEl.textContent:'';

      var sets=parseInt((document.getElementById('rl-sets-'+ei)||{}).value)||null;
      var reps=parseInt((document.getElementById('rl-reps-'+ei)||{}).value)||null;
      var cmt=(document.getElementById('rl-cmt-'+ei)||{}).value||'';
      if(done&&cat&&cats.indexOf(cat)<0)cats.push(cat);
      exercises.push({name:exName,cat:cat,sets:sets,reps:reps,comment:cmt,done:done});
    }
  } else {

      var reps=parseInt((document.getElementById('crit-reps-'+ci)||{}).value)||null;
      var cmt=(document.getElementById('crit-cmt-'+ci)||{}).value||'';

  '<div class="fl"><label>1枠あたりの同時対応人数</label><input class="ipt" type="number" id="ts-cap" value="1" min="1" max="5"></div>'+
  '</div>'+
  '<div style="display:flex;gap:8px"><button class="btn" style="flex:1" onclick="T.tape()">キャンセル</button><button class="btn btn-p" style="flex:1" onclick="doTapeSetup()">枠を作成</button></div>';
  $m().innerHTML=h;
}

function doTapeSetup(){
  var date=document.getElementById('ts-date').value;
  var type=document.getElementById('ts-type').value;
  var startT=document.getElementById('ts-start').value;
  var endT=document.getElementById('ts-end').value;
  var interval=parseInt(document.getElementById('ts-interval').value)||5;
  var cap=parseInt(document.getElementById('ts-cap').value)||1;
  if(!date||startT>=endT)return alert('日付と時間を正しく入力してください（終了 > 開始）');
  if(!D.tapeslot)D.tapeslot=[];
  var newSlots=[];
  var cur=startT;
  while(cur<endT){
    var pts=cur.split(':');var hh=parseInt(pts[0]),mm=parseInt(pts[1]);
    var nm=mm+interval;var nh=hh+Math.floor(nm/60);nm=nm%60;
    if(nh>=24)break;
    var next=String(nh).padStart(2,'0')+':'+String(nm).padStart(2,'0');
    if(next>endT)break;
    newSlots.push({id:Date.now()+newSlots.length*19,date:date,type:type,startTime:cur,endTime:next,capacity:cap,staff:myTrainer.name});
    cur=next;
  }
  if(!newSlots.length)return alert('枠が作成できませんでした。時間を確認してください。');
  svSafeUpdate('tapeslot',function(latest){return latest.concat(newSlots);},function(){
    alert(newSlots.length+'枠を作成しました ✓');
    T.tape();
  });
}

function delMyTapeDay(date){
  if(!confirm(fmt(date)+'の自分の枠を全て削除しますか？'))return;
  // 自分の枠だけ削除（tapeslot→tapeの順にトランザクション）
  var mySlotIds=(D.tapeslot||[]).filter(function(s){return s.date===date&&s.staff===myTrainer.name;}).map(function(s){return s.id;});
  svSafeUpdate('tapeslot',function(latest){return latest.filter(function(s){return!(s.date===date&&s.staff===myTrainer.name);});},function(){
    svSafeUpdate('tape',function(latest){return latest.filter(function(t){return mySlotIds.indexOf(t.slotId)<0;});},function(){
      T.tape();
    });
  });
}

// ===== LOAD =====
function startListeners(){
  Object.keys(SK).forEach(function(k){
    db.collection('appdata').doc(k).onSnapshot(function(doc){
      if(doc.exists){
        try{
          var parsed=JSON.parse(doc.data().data);
          if(Array.isArray(parsed)&&parsed.length>0)D[k]=parsed;
          else if(!Array.isArray(parsed)&&parsed!==undefined)D[k]=parsed;
          // 入力中フォーム判定
          var ae=document.activeElement;
          var isInputting=ae&&(ae.tagName==='INPUT'||ae.tagName==='TEXTAREA'||ae.tagName==='SELECT');
          if(!isInputting&&!window._subViewActive&&myTrainer&&curTab&&T[curTab]){
            try{T[curTab]();}catch(e){console.error('Re-render error:',e);}
          }
        }catch(e){}
      }
    });
  });
}

ld().then(function(){
  document.getElementById('loading-screen').style.display='none';
  startListeners();
  showLogin();
}).catch(function(e){
  console.error(e);
  document.getElementById('loading-screen').innerHTML='<div style="text-align:center"><div style="font-size:40px;margin-bottom:16px">⚠️</div><div>読み込みエラー</div><button onclick="location.reload()" style="margin-top:12px;padding:8px 16px;cursor:pointer">再試行</button></div>';
});
</script>
