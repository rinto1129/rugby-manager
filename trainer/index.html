    return (b.inputAt||'').localeCompare(a.inputAt||'');
  });
  for(var i=0;i<sorted.length;i++){
    var hv=readEvalMetric(sorted[i],ref,true);
    if(hv!=null)return{val:hv,date:sorted[i].date};
  }
  return null;
}
// 最古の患側値を持つeval（受傷前基準の代用＝初回評価）。昇順スキャン。{val,date}|null
function oldestPatientForMetric(evals,m){
  var ref=metricEvalRef(m);
  var sorted=(evals||[]).slice().sort(function(a,b){
    var d=(a.date||'').localeCompare(b.date||'');
    if(d!==0)return d;
    return (a.inputAt||'').localeCompare(b.inputAt||'');
  });
  for(var i=0;i<sorted.length;i++){

// EVAL_MASTER[部位].rom から m.evalKey に一致する normal を数値で返す（rom以外/未定義はnull）
function normalForMetric(inj,m){
  if(!m.evalKey)return null;
  var em=EVAL_MASTER[inj.part]||EVAL_MASTER['その他'];
  if(!em||!em.rom)return null;
  for(var i=0;i<em.rom.length;i++){
    if(em.rom[i].k===m.evalKey){var n=parseFloat(em.rom[i].normal);return isNaN(n)?null:n;}
  }
  return null;
}
// 基準（ターゲット）解決。優先: 手動目標target → baseModeの指す先 → フォールバック(健側→正常値→受傷前)
// 返り値 {val,src,srcKey,date?}|null（全滅で基準未設定）
function resolveMetricBase(ch,inj,m){
  var evals=ch.evals||[];
  if(m.target!=null&&!isNaN(parseFloat(m.target)))return{val:parseFloat(m.target),src:'🎯手動目標',srcKey:'target'};
  var tried={};
  function tryMode(mode){
    if(!mode||tried[mode])return null;tried[mode]=true;
    if(mode==='手動'){
      if(m.baseValue!=null&&!isNaN(parseFloat(m.baseValue)))return{val:parseFloat(m.baseValue),src:'手動基準',srcKey:'manual'};
      return null;
    }
    if(mode==='健側'){
      var hv=latestHealthyForMetric(evals,m);
      if(hv)return{val:hv.val,src:'健側比',srcKey:'healthy',date:hv.date};
      return null;
    }
    if(mode==='正常値'){
      var nv=normalForMetric(inj,m);
      if(nv!=null)return{val:nv,src:'正常値比',srcKey:'normal'};
      return null;
    }
    if(mode==='受傷前'){
      var ov=oldestPatientForMetric(evals,m);
      if(ov)return{val:ov.val,src:'初回評価比（参考）',srcKey:'oldest',date:ov.date};
      return null;
    }
    return null;
  }
  var r=tryMode(m.baseMode);
  if(r)return r;
  var chain=['健側','正常値','受傷前'];
  for(var i=0;i<chain.length;i++){var f=tryMode(chain[i]);if(f)return f;}
  return null;
}
// 達成率と「あと◯◯」（direction補正＋ガード）。{pct,remain,reached}
// up: pct=cur/base, remain=base-cur ／ down(小さいほど良い): pct=base/cur, remain=cur-base
function gaugeCalc(cur,base,direction){
  var out={pct:null,remain:null,reached:false};
  if(cur==null||base==null||isNaN(cur)||isNaN(base))return out;
  if(direction==='down'){
    out.remain=Math.max(0,cur-base);
    if(cur===0)out.pct=(base===0)?100:null;
    else{var pd=base/cur*100;out.pct=isFinite(pd)?pd:null;}
  }else{
    out.remain=Math.max(0,base-cur);
    if(base===0)out.pct=(cur===0)?100:null;
    else{var pu=cur/base*100;out.pct=isFinite(pu)?pu:null;}
  }
  if(out.pct!=null&&out.pct>=100)out.reached=true;
  return out;
}
// 達成率→色（CSS変数・両テーマ自動適応）。≧90緑/60-89青/<60アンバー/不明はグレー
function gaugeColor(pct){
  if(pct==null)return'var(--text-tertiary)';
  if(pct>=90)return'var(--green)';
  if(pct>=60)return'var(--blue)';
  return'var(--amber)';
}
// ネオン円形プログレスリング（純SVG）。弧は0-100クランプ、中央%表示は実数（120%等）。
// colorはCSS変数（fill/stroke属性でvar()を使う既存スパークラインと同じ流儀）。glowで発光。
function gaugeSVG(pct,color,idsfx){
  idsfx=String(idsfx==null?'':idsfx).replace(/[^a-zA-Z0-9_]/g,'');
  var size=88,sw=9,r=(size-sw)/2,cx=size/2,cy=size/2,circ=2*Math.PI*r;
  var shown=(pct==null)?0:Math.max(0,Math.min(100,pct));
  var dash=Math.round(circ*shown/100*10)/10;
  var gap=Math.round((circ-dash)*10)/10;
  var s='<svg viewBox="0 0 '+size+' '+size+'" style="width:78px;height:78px;display:block">';
  s+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="var(--border-secondary)" stroke-width="'+sw+'" opacity="0.5"/>';
  if(pct!=null){
    s+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+color+'" stroke-width="'+sw+'" stroke-linecap="round" stroke-dasharray="'+dash+' '+gap+'" transform="rotate(-90 '+cx+' '+cy+')" opacity="0.4" style="filter:drop-shadow(0 0 5px '+color+')"/>';
    s+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+color+'" stroke-width="'+sw+'" stroke-linecap="round" stroke-dasharray="'+dash+' '+gap+'" transform="rotate(-90 '+cx+' '+cy+')"/>';
  }
  var label=(pct==null)?'—':(Math.round(pct)+'%');
  s+='<text x="'+cx+'" y="'+cy+'" text-anchor="middle" dominant-baseline="central" font-size="18" font-weight="800" fill="'+color+'">'+label+'</text>';
  s+='</svg>';
  return s;
}
// MMT段階ドット（chart.metricsにMMTは無いが軽量版）。最新のev.mmtを持つeval→各項目をMMT_ORDER indexで。
function renderMMTDots(inj,evals){
  var em=EVAL_MASTER[inj.part]||EVAL_MASTER['その他'];

    if(d!==0)return d;return (b.inputAt||'').localeCompare(a.inputAt||'');
  });
  var ev=null;

    for(var j=0;j<MMT_ORDER.length;j++){
      var on=j<=ci;

      dots+='<span title="'+escapeHtml(MMT_ORDER[j])+'" style="width:'+sz+';height:'+sz+';border-radius:50%;background:'+bg+';display:inline-block'+ring+'"></span>';
    }
    rows+='<div style="display:flex;align-items:center;gap:5px;margin-bottom:5px"><span style="font-size:11px;min-width:64px;color:var(--text-secondary)">'+escapeHtml(mm)+'</span><span style="display:flex;gap:3px;align-items:center">'+dots+'</span><span style="font-size:11px;font-weight:700;margin-left:4px">'+escapeHtml(String(cur))+'</span>'+(hi>=0?'<span style="font-size:10px;color:var(--text-tertiary)">健:'+escapeHtml(String(ev.mmtH[mm]))+'</span>':'')+'</div>';

}

function qeUpdatePain(){
  var el=document.getElementById('qe-pain');if(!el)return;
  el.setAttribute('data-moved','1');
  var v=parseInt(el.value);
  var vEl=document.getElementById('qe-pain-val');if(vEl)vEl.textContent=v+'/10';
  var dEl=document.getElementById('qe-pain-diff');
  if(dEl){
    var prevStr=el.getAttribute('data-prev');
    if(prevStr===''||prevStr==null){dEl.textContent='今日の痛み: '+v+'/10 を記録します';dEl.style.color='var(--text-secondary)';}
    else{
      var prev=parseInt(prevStr);var d=v-prev;
      if(d===0){dEl.textContent='前回比 ±0';dEl.style.color='var(--text-secondary)';}
      else{var improved=d<0;dEl.textContent='前回比 '+(d>0?'+':'')+d+(improved?'（改善）':'（増加）');dEl.style.color=improved?'var(--green)':'var(--red)';}
    }
  }
  qeSaveDraft(window._qeInjId);
}
function qeUpdateMetric(mid){
  var pel=document.getElementById('qe-m-'+mid);if(!pel)return;
  var dir=pel.getAttribute('data-dir')||'up';
  var isLsi=pel.getAttribute('data-lsi')==='1';
  var cur=pel.value!==''?parseFloat(pel.value):null;
  var dEl=document.getElementById('qe-diff-'+mid);
  if(dEl){
    var prevStr=pel.getAttribute('data-prev');
    if(cur==null||isNaN(cur)||prevStr===''||prevStr==null){dEl.textContent='';dEl.style.color='var(--text-secondary)';}
    else{
      var prev=parseFloat(prevStr);var d=Math.round((cur-prev)*100)/100;
      if(d===0){dEl.textContent='前回比 ±0';dEl.style.color='var(--text-secondary)';}
      else{var improved=dir==='down'?d<0:d>0;dEl.textContent='前回比 '+(d>0?'+':'')+d+(improved?'（改善）':'（低下）');dEl.style.color=improved?'var(--green)':'var(--red)';}
    }
  }
  if(isLsi){
    var lEl=document.getElementById('qe-lsi-'+mid);
    var hel=document.getElementById('qe-mH-'+mid);
    if(lEl){
      var hv=hel&&hel.value!==''?parseFloat(hel.value):null;
      var pct=symPct(cur,hv,dir);
      if(pct==null){lEl.textContent='';}
      else{var col=pct>=90?'var(--green)':pct>=75?'var(--amber)':'var(--red)';lEl.innerHTML='左右比 <span style="color:'+col+'">'+pct+'%</span>'+(pct>=90?' ✓':'');}
    }
  }
  qeSaveDraft(window._qeInjId);
}
// 同日下書きをlocalStorageに保存（怪我ごと1件）。保存成功時に消す。
function qeSaveDraft(injId){
  if(injId==null)return;
  try{
    var pe=document.getElementById('qe-pain');

      painMoved:!!(pe&&pe.getAttribute('data-moved')==='1'),

function saveQuickEval(injId,btn){
  var ch=getChart(injId);
  var metrics=(ch.metrics||[]);
  var date=(document.getElementById('qe-date')||{}).value||todayStr();
  var note=(document.getElementById('qe-note')||{}).value||'';
  // 痛み：スライダーを動かした時だけ記録（前回値の複製事故防止）
  var painEl=document.getElementById('qe-pain');
  var painVal=null;
  if(painEl&&painEl.getAttribute('data-moved')==='1'){var pv=parseInt(painEl.value);if(!isNaN(pv))painVal=pv;}
  // 指標
  var rom={},circ={},fit={},romH={},circH={},fitH={};
  var filledCount=0;var summary=[];
  metrics.forEach(function(m){
    var ref=metricEvalRef(m);
    var pel=document.getElementById('qe-m-'+m.id);
    var hel=document.getElementById('qe-mH-'+m.id);
    if(pel&&pel.value.trim()!==''){
      var raw=pel.value.trim();var pn=parseFloat(raw);
      if(!isNaN(pn)){
        if(ref.f==='rom')rom[ref.k]=raw;else if(ref.f==='circ')circ[ref.k]=pn;else fit[ref.k]=pn;
        filledCount++;
        var prev=latestEvalForMetric(ch.evals||[],m);
        summary.push({name:m.name,unit:m.unit||'',cur:pn,prev:prev?prev.patient:null,dir:m.direction||'up'});
      }
    }
    if(m.lsi&&hel&&hel.value.trim()!==''){
      var hn=parseFloat(hel.value);
      if(!isNaN(hn)){if(ref.hf==='romH')romH[ref.k]=String(hn);else if(ref.hf==='circH')circH[ref.k]=hn;else fitH[ref.k]=hn;}
    }
  });
  if(painVal==null&&filledCount===0){alert('記録する項目がありません。痛みスライダーを動かすか、指標を入力してください。');return;}
  if(!guardSubmit(btn,'保存中…'))return;
  var nowISO=new Date().toISOString();
  svSafeUpdate('chart',function(latest){
    var i=_chartIdx(latest,injId);
    if(!latest[i].evals)latest[i].evals=[];
    var rec={id:Date.now()+'_'+Math.floor(Math.random()*1000),date:date,inputAt:nowISO,source:'quick'};
    var painObj={};if(painVal!=null)painObj.motion=painVal;
    rec.pain=painObj;
    if(Object.keys(rom).length)rec.rom=rom;
    if(Object.keys(circ).length)rec.circ=circ;
    if(Object.keys(fit).length)rec.fit=fit;
    if(Object.keys(romH).length)rec.romH=romH;
    if(Object.keys(circH).length)rec.circH=circH;
    if(Object.keys(fitH).length)rec.fitH=fitH;
    if(note)rec.note=note;
    latest[i].evals.push(rec);
    return latest;
  },function(){
    qeShowResult(injId,painVal,summary,btn);
    try{localStorage.removeItem('rm_qe_'+injId);}catch(e){}
  },function(){
    releaseSubmit(btn);
    alert('保存に失敗しました。通信状況を確認してもう一度お試しください。入力内容は残っています。');
  });
}
function qeShowResult(injId,painVal,summary,btn){
  var improved=summary.filter(function(s){return s.prev!=null&&(s.dir==='down'?s.cur<s.prev:s.cur>s.prev);}).length;
  var lines=[];
  if(painVal!=null)lines.push('痛み '+painVal+'/10');
  summary.forEach(function(s){
    var arrow='';
    if(s.prev!=null){var d=Math.round((s.cur-s.prev)*100)/100;if(d!==0){var imp=s.dir==='down'?d<0:d>0;arrow=' <span style="color:'+(imp?'var(--green)':'var(--red)')+'">('+(d>0?'+':'')+d+escapeHtml(s.unit)+')</span>';}}
    lines.push(escapeHtml(s.name)+' '+s.cur+escapeHtml(s.unit)+arrow);
  });
  var h='<div style="background:var(--green-bg);border:1.5px solid var(--green);border-radius:var(--radius);padding:12px;margin-bottom:10px">'+
    '<div style="font-weight:700;color:var(--green);font-size:14px;margin-bottom:6px">✓ 評価を保存しました</div>'+
    '<div style="font-size:12px;line-height:1.8">'+(lines.length?lines.join(' ・ '):'（記録なし）')+'</div>'+
    (improved>0?'<div style="font-size:12px;color:var(--green);font-weight:600;margin-top:6px">'+improved+'項目が前回より改善しています 🎉</div>':'')+
    '<div style="font-size:11px;color:var(--text-secondary);margin-top:6px">カルテの「評価記録」に保存しました。続けて下で今日のリハビリ実施内容を記録できます。</div>'+
    '</div>';
  var res=document.getElementById('qe-result');if(res)res.innerHTML=h;
  if(btn){releaseSubmit(btn);btn.innerHTML='💾 評価を保存';}
}

function calcSideDiff(ti){
  var h=parseFloat((document.getElementById('rt-healthy-'+ti)||{}).value);
  var a=parseFloat((document.getElementById('rt-affected-'+ti)||{}).value);
  var el=document.getElementById('rt-diff-'+ti);if(!el)return;
  if(isNaN(h)||isNaN(a)||h===0){el.textContent='値を入力してください';el.style.background='var(--bg-secondary)';el.style.color='';return;}
  var ratio=Math.round(a/h*1000)/10;
  var passed=ratio>=85;
  var short=passed?0:Math.round((h*0.85-a)*10)/10;
  el.textContent=ratio+'% '+(passed?'✓ クリア':'✗ 未クリア（あと'+short+'必要）');
  el.style.background=passed?'var(--green-bg)':'var(--red-bg)';
  el.style.color=passed?'var(--green)':'var(--red)';
}

function doSaveRTest(injId,physCount,btnEl){
  var date=document.getElementById('rt-date').value;
  if(!date)return alert('日付を入力してください');
  if(!guardSubmit(btnEl,'保存中…'))return;
  var physResults=[];var physPassed=true;
  var types=window._rtTestTypes||[];
  for(var ti=0;ti<physCount;ti++){
    if(types[ti]==='sidediff'){
      var h=parseFloat((document.getElementById('rt-healthy-'+ti)||{}).value);
      var a=parseFloat((document.getElementById('rt-affected-'+ti)||{}).value);
      var ratio=(!isNaN(h)&&!isNaN(a)&&h>0)?Math.round(a/h*1000)/10:0;
      var passed=ratio>=85;
      if(!passed)physPassed=false;
      physResults.push({type:'sidediff',healthy:h,affected:a,ratio:ratio,passed:passed});
    } else {
      var chk=document.getElementById('rt-action-'+ti);
      var passed2=chk&&chk.checked;
      var cmt=(document.getElementById('rt-action-cmt-'+ti)||{}).value||'';
      if(!passed2)physPassed=false;
      physResults.push({type:'action',passed:passed2,comment:cmt});
    }
  }
  var brM=parseInt((document.getElementById('rt-br-m')||{}).value)||0;
  var brS=parseInt((document.getElementById('rt-br-s')||{}).value)||0;
  var broncoTime=(brM||brS)?(brM*60+brS):null;
  var broncoTarget=window._rtBroncoTarget;
  var fitPassed=broncoTime&&broncoTarget?broncoTime<=broncoTarget:false;
  var note=(document.getElementById('rt-note')||{}).value||'';
  var rec={id:Date.now(),injId:injId,date:date,implementer:myTrainer.name,physResults:physResults,physPassed:physPassed,broncoTime:broncoTime,fitPassed:fitPassed,note:note,inputAt:new Date().toISOString()};
  svSafeSeq([{k:'rtest',rec:rec}],function(){
    var msg='保存しました ✓\n患部テスト: '+(physPassed?'✓ クリア':'✗ 未クリア')+'\nフィットテスト: '+(fitPassed?'✓ クリア':'✗ 未クリア');
    if(physPassed&&fitPassed)msg+='\n\n🎉 全テストクリア！スタッフに承認をもらいましょう！';
    alert(msg);
    goRehabPlayer(injId);
  },function(){
    releaseSubmit(btnEl);
    alert('保存できませんでした。電波の良い場所でもう一度お試しください。入力内容は残っています。');
  });
}

function doSaveRehabLogTrainer(injId,hasTpl,exCount,btnEl){
  var date=document.getElementById('rl-date').value;
  if(!date)return alert('日付を入力してください');
  if(!guardSubmit(btnEl,'保存中…'))return;
  var exercises=[];var cats=[];
  if(hasTpl){
    for(var ei=0;ei<exCount;ei++){
      var chk=document.getElementById('rl-chk-'+ei);
      var done=chk&&chk.checked;
      var exDiv=document.getElementById('rl-ex-'+ei);
      var exName=exDiv?(exDiv.dataset.name||''):'';
      var cat=exDiv?(exDiv.dataset.cat||''):'';
      var sets=parseInt((document.getElementById('rl-sets-'+ei)||{}).value)||null;
      var reps=parseInt((document.getElementById('rl-reps-'+ei)||{}).value)||null;
      var cmt=(document.getElementById('rl-cmt-'+ei)||{}).value||'';
      if(done&&cat&&cats.indexOf(cat)<0)cats.push(cat);
      exercises.push({name:exName,cat:cat,sets:sets,reps:reps,comment:cmt,done:done});
    }
  } else {
    document.querySelectorAll('[id^="crit-"]').forEach(function(el){
      var ci=el.id.replace('crit-','');
      if(isNaN(parseInt(ci)))return;
      var cat=(document.getElementById('crit-cat-'+ci)||{}).value||'';
      var name=(document.getElementById('crit-name-'+ci)||{}).value||'';
      var sets=parseInt((document.getElementById('crit-sets-'+ci)||{}).value)||null;
      var reps=parseInt((document.getElementById('crit-reps-'+ci)||{}).value)||null;
      var cmt=(document.getElementById('crit-cmt-'+ci)||{}).value||'';
      if(name){exercises.push({name:name,cat:cat,sets:sets,reps:reps,comment:cmt,done:true});if(cat&&cats.indexOf(cat)<0)cats.push(cat);}
    });
  }
  var comment=(document.getElementById('rl-comment')||{}).value||'';
  var lastLog2=(D.rlog||[]).filter(function(l){return l.injId===injId;}).sort(function(a,b){return (b.date||"").localeCompare(a.date||"");})[0]||null;
  var preCheck=collectPreCheck(lastLog2);
  var curSess=getCurrentMSess();
  var logRec={id:Date.now(),injId:injId,date:date,implementer:myTrainer.name,by:myTrainer.name,cats:cats,exercises:exercises,comment:comment,preCheck:preCheck,msessId:curSess?curSess.id:null,inputAt:new Date().toISOString()};
  // svSafeは失敗時に内部でalert＋ボタン固着してしまうため、svSafeSeqで成否を捕捉する
  svSafeSeq([{k:'rlog',rec:logRec}],function(){
    if(!hasTpl&&exercises.length&&confirm('このメニューをテンプレとして保存しますか？')){
      goSaveAsTemplateT(injId,exercises,cats);return;
    }
    goSetNextMenuT(injId);
  },function(){
    releaseSubmit(btnEl);
    alert('保存できませんでした。電波の良い場所でもう一度お試しください。入力内容は残っています。');
  });
}

function goSaveAsTemplateT(injId,exercises,cats){window._subViewActive=true;
  var inj=(D.i||[]).find(function(x){return x.id===injId;});if(!inj)return;
  var name=prompt('テンプレ名を入力してください：','');
  if(!name)return goSetNextMenuT(injId);
  if(!D.rtpl)D.rtpl=[];
  var newId=D.rtpl.length?Math.max.apply(null,D.rtpl.map(function(t){return t.id;}))+1:1;
  svSafe('rtpl',{id:newId,name:name,part:inj.part,stage:'',cats:cats,exercises:exercises,createdBy:myTrainer.name,createdAt:todayStr()},function(){
    alert('テンプレを保存しました ✓');goSetNextMenuT(injId);
  });
}

function goSetNextMenuT(injId){window._subViewActive=true;
  var inj=(D.i||[]).find(function(x){return x.id===injId;});if(!inj)return;
  var p=D.p.find(function(x){return x.id===inj.pid;});if(!p)return;
  var plan=(D.rplan||[]).find(function(x){return x.injId===injId;});
  var cur=plan?plan.tomorrowCats||[]:[];
  var h='<div style="font-size:17px;font-weight:600;margin-bottom:8px">📅 '+escapeHtml(p.name)+' の次回メニュー</div>'+
  '<div style="font-size:13px;color:var(--text-secondary);margin-bottom:14px">今日の状況を踏まえて次回のメニューを選択してください</div>'+
  '<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px">'+
  RCATS.map(function(c,ci){
    var sel=cur.indexOf(c)>=0;
    return'<div id="nmrt-'+ci+'" onclick="toggleNextMenuCatT('+ci+')" style="padding:8px 16px;border-radius:99px;border:1.5px solid '+(sel?RCAT_COLOR[c]:'var(--border-secondary)')+';background:'+(sel?RCAT_BG[c]:'var(--bg-primary)')+';color:'+(sel?RCAT_COLOR[c]:'var(--text-primary)')+';cursor:pointer;font-size:13px;font-weight:500">'+c+'</div>';
  }).join('')+'</div>'+
  '<div style="display:flex;gap:8px"><button class="btn" onclick="go(\'rehab\')">スキップ</button><button class="btn btn-p" style="flex:1" onclick="saveNextMenuT('+injId+')">保存して完了</button></div>';
  window._nextMenuCatsT=cur.slice();
  $m().innerHTML=h;
}

function toggleNextMenuCatT(ci){
  var cat=RCATS[ci];if(!cat)return;
  if(!window._nextMenuCatsT)window._nextMenuCatsT=[];
  var i=window._nextMenuCatsT.indexOf(cat);
  if(i>=0){window._nextMenuCatsT.splice(i,1);}else{window._nextMenuCatsT.push(cat);}
  var el=document.getElementById('nmrt-'+ci);if(!el)return;
  var sel=window._nextMenuCatsT.indexOf(cat)>=0;
  el.style.borderColor=sel?RCAT_COLOR[cat]:'var(--border-secondary)';
  el.style.background=sel?RCAT_BG[cat]:'var(--bg-primary)';
  el.style.color=sel?RCAT_COLOR[cat]:'var(--text-primary)';
}

function saveNextMenuT(injId){
  var cats=window._nextMenuCatsT||[];
  // 対象日（設定日の翌日）を持たせる。staffダッシュボードの「明日の予定」が日付で振り分けされるため必須
  var _tm=new Date();_tm.setDate(_tm.getDate()+1);var tomorrowDate=toDateStr(_tm);
  svSafeUpdate('rplan',function(latest){var plan=latest.find(function(x){return idEq(x.injId,injId);});if(!plan){plan={injId:injId,tplId:null,tomorrowCats:[]};latest.push(plan);}plan.tomorrowCats=cats;plan.tomorrowDate=cats.length?tomorrowDate:null;return latest;},function(){alert('保存しました ✓');goRehabPlayer(injId);});
}

function timeOptions(sel){
  var h='';
  for(var hh=0;hh<24;hh++){for(var mm=0;mm<60;mm+=10){
    var v=String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0');
    h+='<option'+(v===sel?' selected':'')+'>'+v+'</option>';
  }}
  return h;
}

  '<div style="display:flex;gap:8px"><button class="btn" style="flex:1" onclick="go(\'tape\')">キャンセル</button><button class="btn btn-p" style="flex:1" onclick="doTapeSetup(this)">枠を作成</button></div>';

function doTapeSetup(btnEl){
  var date=document.getElementById('ts-date').value;
  var type=document.getElementById('ts-type').value;
  var startT=document.getElementById('ts-start').value;
  var endT=document.getElementById('ts-end').value;
  var interval=parseInt(document.getElementById('ts-interval').value)||5;
  var cap=parseInt(document.getElementById('ts-cap').value)||1;
  if(!date||startT>=endT)return alert('日付と時間を正しく入力してください（終了 > 開始）');
  if(!D.tapeslot)D.tapeslot=[];
  var newSlots=[];
  var cur=startT;
  while(cur<endT){
    var pts=cur.split(':');var hh=parseInt(pts[0]),mm=parseInt(pts[1]);
    var nm=mm+interval;var nh=hh+Math.floor(nm/60);nm=nm%60;
    if(nh>=24)break;
    var next=String(nh).padStart(2,'0')+':'+String(nm).padStart(2,'0');
    if(next>endT)break;
    newSlots.push({id:Date.now()+newSlots.length*19,date:date,type:type,startTime:cur,endTime:next,capacity:cap,staff:myTrainer.name});
    cur=next;
  }
  if(!newSlots.length)return alert('枠が作成できませんでした。時間を確認してください。');
  if(!guardSubmit(btnEl,'作成中…'))return;
  svSafeUpdate('tapeslot',function(latest){return latest.concat(newSlots);},function(){
    alert(newSlots.length+'枠を作成しました ✓');
    go('tape');
  },function(){
    releaseSubmit(btnEl);
    alert('保存できませんでした。電波の良い場所でもう一度お試しください。入力内容は残っています。');
  });
}

function delMyTapeDay(date){
  if(!confirm(fmt(date)+'の自分の枠を全て削除しますか？'))return;
  // 自分の枠だけ削除（tapeslot→tapeの順にトランザクション）
  var mySlotIds=(D.tapeslot||[]).filter(function(s){return s.date===date&&s.staff===myTrainer.name;}).map(function(s){return s.id;});
  svSafeUpdate('tapeslot',function(latest){return latest.filter(function(s){return!(s.date===date&&s.staff===myTrainer.name);});},function(){
    svSafeUpdate('tape',function(latest){return latest.filter(function(t){return mySlotIds.indexOf(t.slotId)<0;});},function(){
      T.tape();
    });
  });
}

function startListeners(){
  Object.keys(SK).forEach(function(k){
    db.collection('appdata').doc(k).onSnapshot(function(doc){
      if(doc.exists){
        try{
          var parsed=JSON.parse(doc.data().data);
          if(Array.isArray(parsed)&&(parsed.length>0||k==='pp'))D[k]=parsed;
          // 入力中フォーム判定
          var ae=document.activeElement;
          var isInputting=ae&&(ae.tagName==='INPUT'||ae.tagName==='TEXTAREA'||ae.tagName==='SELECT');
          if(!isInputting&&!window._subViewActive&&myTrainer&&curTab&&T[curTab]){
            try{T[curTab]();}catch(e){console.error('Re-render error:',e);}
          }
        }catch(e){}
      }
    });
  });
}
