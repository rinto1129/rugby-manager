<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rugby Manager - トレーナー</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0F1B2D;--navy-2:#16263E;--navy-3:#1E3251;
  --accent:#3B82F6;--accent-d:#2563EB;--accent-glow:rgba(59,130,246,.35);
  --blue:#3B82F6;--blue-bg:rgba(59,130,246,.16);--green:#34D399;--green-bg:rgba(52,211,153,.16);--red:#F87171;--red-bg:rgba(248,113,113,.16);--amber:#FBBF24;--amber-bg:rgba(251,191,36,.16);--purple:#A78BFA;--purple-bg:rgba(167,139,250,.16);
  --bg-primary:#16263E;--bg-secondary:#1E3251;--bg-tertiary:#24395C;--bg-app:#0F1B2D;
  --text-primary:#EAF0F8;--text-secondary:#9FB0C8;--text-tertiary:#6E7F9C;
  --border-secondary:rgba(255,255,255,0.18);--border-tertiary:rgba(255,255,255,0.10);
  --shadow-sm:0 1px 3px rgba(0,0,0,.25);--shadow-md:0 6px 20px rgba(0,0,0,.35);
  --font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans JP',sans-serif;--radius:10px;--radius-lg:14px}
body{font-family:var(--font-sans);background:var(--bg-app);color:var(--text-primary);min-height:100vh;padding-bottom:80px;-webkit-font-smoothing:antialiased}
.header{background:linear-gradient(180deg,var(--navy),var(--navy-2));border-bottom:1px solid var(--border-tertiary);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-title{font-size:15px;font-weight:700;color:#fff}
.header-user{font-size:12px;color:var(--accent);font-weight:600;cursor:pointer}
.main{padding:16px;max-width:600px;margin:0 auto}
.nav-bottom{position:fixed;bottom:0;left:0;right:0;background:var(--navy);border-top:1px solid var(--border-tertiary);display:flex;z-index:100}
.nav-btn{flex:1;padding:10px 4px 8px;text-align:center;cursor:pointer;font-size:10px;color:var(--text-secondary);border:none;background:none;font-family:var(--font-sans);transition:color .15s}
.nav-btn.ac{color:var(--accent);font-weight:600}
.nav-btn-icon{display:flex;align-items:center;justify-content:center;margin-bottom:3px}.nav-btn-icon svg{width:24px;height:24px}
.card{background:var(--bg-primary);border:1px solid var(--border-tertiary);border-radius:var(--radius-lg);padding:1rem;margin-bottom:10px;box-shadow:var(--shadow-sm)}
.card-click{cursor:pointer}.card-click:hover{border-color:var(--accent)}
.btn{padding:8px 16px;border-radius:var(--radius);border:1px solid var(--border-secondary);background:var(--bg-secondary);font-size:13px;cursor:pointer;color:var(--text-primary);font-family:var(--font-sans);font-weight:500}.btn:hover{background:var(--bg-tertiary)}
.btn-p{background:var(--accent);color:#fff;border-color:var(--accent)}.btn-p:hover{background:var(--accent-d)}
.btn-d{color:var(--red);border-color:var(--red)}
.btn-s{color:var(--green);border-color:var(--green)}
.btn-sm{padding:4px 10px;font-size:11px;width:auto}
.btn-back{background:none;border:none;padding:10px 4px;font-size:13px;font-weight:600;color:var(--accent);cursor:pointer;font-family:var(--font-sans)}.btn-back:hover{color:var(--accent-d)}
.ipt{padding:9px 12px;border:1.5px solid var(--border-secondary);border-radius:var(--radius);background:var(--navy);font-size:16px;color:var(--text-primary);font-family:var(--font-sans);width:100%}
.ipt:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.ipt::placeholder{color:var(--text-tertiary)}
select.ipt{appearance:auto}textarea.ipt{resize:vertical;min-height:80px}
.fl{display:flex;flex-direction:column;gap:5px}
.fl label{font-size:12px;color:var(--text-secondary);font-weight:600}
.form-box{background:var(--bg-secondary);border:1px solid var(--border-tertiary);border-radius:var(--radius-lg);padding:1rem;margin-bottom:1rem}
.form-title{font-size:11px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.04em;margin-bottom:12px}
.bd{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600}
.bd-g{background:var(--green-bg);color:var(--green)}
.bd-r{background:var(--red-bg);color:var(--red)}
.bd-a{background:var(--amber-bg);color:var(--amber)}
.bd-b{background:var(--blue-bg);color:var(--blue)}
.bd-p{background:var(--purple-bg);color:var(--purple)}
.no{text-align:center;padding:2rem;color:var(--text-secondary);font-size:13px}
.log-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:0.5px solid var(--border-tertiary);font-size:12px}
.log-row:last-child{border-bottom:none}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0;overflow:hidden;background-size:cover;background-position:center}
.alert-card{padding:.65rem .85rem;border-radius:var(--radius);margin-bottom:6px;font-size:12px;font-weight:500}
.alert-info{background:var(--blue-bg);color:var(--blue);border-left:3px solid var(--blue)}
.alert-warn{background:var(--amber-bg);color:var(--amber);border-left:3px solid var(--amber)}
.grid{display:grid;gap:10px}
.g2{grid-template-columns:1fr 1fr}
.mc{background:var(--bg-secondary);border-radius:var(--radius);padding:.75rem;text-align:center}
.mc .v{font-size:22px;font-weight:700}
.mc .l{font-size:10px;color:var(--text-secondary);margin-top:3px}
.select-card{border:2px solid var(--border-tertiary);border-radius:var(--radius-lg);padding:14px 16px;cursor:pointer;margin-bottom:8px;background:var(--bg-primary);transition:all .15s}
.select-card:hover{border-color:var(--blue)}
.select-card.selected{border-color:var(--blue);background:var(--blue-bg)}
/* ログイン画面 */
#login-screen{position:fixed;inset:0;background:var(--bg-primary);z-index:9999;overflow-y:auto;padding:24px}
.login-wrap{width:100%;max-width:380px;margin:0 auto;padding-top:40px;padding-bottom:40px}
.login-title{font-size:22px;font-weight:700;text-align:center;margin-bottom:6px}
.login-sub{font-size:13px;color:var(--text-secondary);text-align:center;margin-bottom:28px}
.trainer-btn{display:block;width:100%;padding:14px 16px;border-radius:var(--radius-lg);border:1.5px solid var(--border-tertiary);background:var(--bg-primary);font-size:15px;font-weight:600;cursor:pointer;margin-bottom:10px;text-align:left;font-family:var(--font-sans);color:var(--text-primary);transition:all .15s}
.trainer-btn:hover{border-color:var(--blue);background:var(--blue-bg);color:var(--blue)}
.chart-hero{background:linear-gradient(135deg,#0F1B2D,#1E3251);border-radius:var(--radius-lg);padding:1.1rem 1.25rem;margin-bottom:0;box-shadow:var(--shadow-md)}
.chart-tabs{display:flex;gap:4px;overflow-x:auto;background:var(--bg-secondary);border-radius:var(--radius);padding:5px;margin:12px 0 14px;-webkit-overflow-scrolling:touch}
.chart-tab{flex-shrink:0;padding:7px 12px;border-radius:8px;font-size:12px;font-weight:600;color:var(--text-secondary);cursor:pointer;white-space:nowrap;transition:all .15s}
.chart-tab:hover{background:var(--bg-tertiary);color:var(--text-primary)}
.chart-tab.ac{background:var(--accent);color:#fff}
/* ===== タイムライン ===== */
.tl-wrap{position:relative;padding:8px 0 8px 0}
.tl-item{position:relative;padding:0 0 22px 38px}
.tl-item:last-child{padding-bottom:4px}
.tl-line{position:absolute;left:13px;top:22px;bottom:-4px;width:2px;background:linear-gradient(180deg,var(--tl-color,var(--accent)),rgba(255,255,255,.06))}
.tl-item:last-child .tl-line{display:none}
.tl-dot{position:absolute;left:5px;top:3px;width:18px;height:18px;border-radius:50%;background:var(--tl-color,var(--accent));box-shadow:0 0 0 4px var(--bg-app),0 0 12px var(--tl-glow,rgba(59,130,246,.6));display:flex;align-items:center;justify-content:center;z-index:2}
.tl-dot svg{width:10px;height:10px;fill:#fff}
.tl-card{background:linear-gradient(135deg,var(--bg-primary),var(--bg-secondary));border:1px solid var(--border-tertiary);border-left:3px solid var(--tl-color,var(--accent));border-radius:10px;padding:11px 14px;transition:all .2s;box-shadow:var(--shadow-sm)}
.tl-card:hover{transform:translateX(3px);box-shadow:0 4px 16px rgba(0,0,0,.25)}
.tl-date{font-size:11px;font-weight:700;color:var(--tl-color,var(--accent));letter-spacing:.03em;text-transform:uppercase;margin-bottom:3px}
.tl-title{font-size:14px;font-weight:700;color:var(--text-primary);margin-bottom:2px}
.tl-desc{font-size:12.5px;color:var(--text-secondary);line-height:1.5}
.tl-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;margin-left:6px;vertical-align:middle}
.tl-metric{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;background:var(--bg-tertiary);padding:2px 8px;border-radius:6px;margin:4px 4px 0 0}
.soap-line{display:flex;gap:8px;align-items:flex-start;margin-bottom:6px;font-size:13px;line-height:1.5}
.soap-tag{flex-shrink:0;width:22px;height:22px;border-radius:6px;color:#fff;font-weight:800;font-size:12px;display:inline-flex;align-items:center;justify-content:center}
.detail-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:0.5px solid var(--border-tertiary);font-size:13px}.detail-row:last-child{border-bottom:none}
.detail-label{color:var(--text-secondary)}.detail-value{font-weight:600;text-align:right}
.chart-wrap{position:relative;height:200px;margin:12px 0}
.g3{grid-template-columns:1fr 1fr 1fr}
</style>
</head>
<body>

<!-- ログイン画面 -->
<div id="login-screen">
  <div class="login-wrap">
    <div style="text-align:center;font-size:48px;margin-bottom:16px">🏉</div>

  <div style="font-size:15px;font-weight:600;margin-bottom:6px">トレーナーサイト</div>

</div>

function doEditInjuryTrainer(iid,btn){
  var inj=D.i.find(function(x){return idEq(x.id,iid);});if(!inj)return;
  if(!myTrainer){alert('ログインし直してください');return;}
  if(!guardSubmit(btn,'保存中…'))return;
  var newVals={
    side:document.getElementById('ei-side').value,
    part:document.getElementById('ei-part').value,
    type:document.getElementById('ei-type').value,
    date:document.getElementById('ei-date').value,
    returnDate:document.getElementById('ei-ret').value,
    hospitalVisited:document.getElementById('ei-hv').value==='1',
    hospitalDate:document.getElementById('ei-hd').value,
    note:document.getElementById('ei-note').value
  };
  newVals.partOther=newVals.part==='その他'?document.getElementById('ei-partOther').value:'';
  newVals.typeOther=newVals.type==='その他'?document.getElementById('ei-typeOther').value:'';
  var changes=[];
  INJ_EDIT_FIELDS.forEach(function(f){
    var ov=injEditNormVal(f.k,inj[f.k]),nv=injEditNormVal(f.k,newVals[f.k]);
    if(String(ov)!==String(nv)){
      changes.push({field:f.label,from:injEditFieldFmt(f,inj[f.k]),to:injEditFieldFmt(f,newVals[f.k])});
    }
  });
  if(!changes.length){
    releaseSubmit(btn);
    alert('変更点がありませんでした');
    chartTab(curChartTab);
    return;
  }
  INJ_EDIT_FIELDS.forEach(function(f){inj[f.k]=newVals[f.k];});
  if(!Array.isArray(inj.editLog))inj.editLog=[];
  inj.editLog.push({date:todayStr(),by:myTrainer.name,byId:myTrainer.id,changes:changes});
  svRec('i',inj,function(){
    alert('保存しました ✓');
    var text='📝【基本情報編集】'+changes.map(function(c){return c.field+'：'+c.from+'→'+c.to;}).join('／')+'（'+myTrainer.name+'）';
    var newComm={
      id:'ic_'+Date.now()+'_'+Math.floor(Math.random()*1000),
      injId:iid,role:'trainer',
      authorId:getCurrentUserId('trainer'),
      authorName:getCurrentUserName('trainer'),
      text:text,createdAt:new Date().toISOString()
    };
    svSafeUpdate('injcomm',function(latest){latest.push(newComm);return latest;},null,function(e){console.error('injcomm notify error:',e);});
    chartTab(curChartTab);
  },function(){
    releaseSubmit(btn);
    alert('保存できませんでした。電波の良い場所でもう一度お試しください。入力内容は残っています。');
  });
}
// カルテデータ取得（なければ新規作成して返す）
function getChart(injId){
  var ch=D.chart.find(function(x){return idEq(x.injId,injId);});
  if(!ch){
    ch={injId:injId,injDetail:{},medical:{},evals:[],soaps:[],returnCriteria:{},images:[]};
    D.chart.push(ch);
  }
  // 古いデータに項目がなければ補完
  if(!ch.injDetail)ch.injDetail={};
  if(!ch.medical)ch.medical={};
  if(!ch.evals)ch.evals=[];
  if(!ch.soaps)ch.soaps=[];
  if(!ch.returnCriteria)ch.returnCriteria={};
  if(!ch.images)ch.images=[];
  // 怪我×リハビリ連携（Phase0）：未定義の既存カルテで落ちないよう既定値を補完
  if(!ch.metrics)ch.metrics=[];
  if(!ch.mmtTargets)ch.mmtTargets=[];
  if(ch.injType==null)ch.injType='';
  if(ch.isConcussion==null)ch.isConcussion=false;
  if(!ch.medClearance)ch.medClearance={granted:false,date:null};
  if(!ch.romLimit)ch.romLimit={active:false,key:null,max:null,min:null,until:null};
  if(ch.rtpLevel==null)ch.rtpLevel='';
  return ch;
}
// カルテ保存（必ずsvSafeUpdateで安全に。素のsvは使わない＝他端末のカルテを巻き戻さない）
// ⚠️ saveChart(ch)は ch 全体を server-latest に上書きする＝同一injId内のロストアップデートの火種。
//   eval/metrics等の頻繁な編集は下の操作単位関数(saveChartMetrics/saveEval/delEval)を使うこと。
//   低頻度のSOAP/復帰基準/rtpLevel等のみ saveChart を継続使用。
function saveChart(ch,onDone){
  if(!ch){if(onDone)onDone();return;}
  // 一意キーは injId 優先、無ければ id。どちらかがあれば一致レコードをupsert、無ければ末尾に追加（全上書きはしない）
  var key=(ch.injId!=null)?'injId':(ch.id!=null?'id':null);
  return svSafeUpdate('chart',function(latest){
    if(key){
      var i=latest.findIndex(function(x){return idEq(x[key],ch[key]);});
      if(i>=0)latest[i]=ch;else latest.push(ch);
    }else{
      latest.push(ch);
    }
    return latest;
  },onDone);
}
// === METRIC-SAVE (4ファイル同期) ===
// 操作単位の保存：server-latestの対象injIdレコードの「指定フィールドだけ」を触る。
// evals/soaps等は一切触らないので、他端末がeval追加中でも巻き戻さない（ロストアップデート対策）。
function _chartIdx(latest,injId){
  var i=latest.findIndex(function(x){return idEq(x.injId,injId);});
  if(i<0){
    latest.push({injId:injId,injDetail:{},medical:{},evals:[],soaps:[],returnCriteria:{},images:[],metrics:[],mmtTargets:[]});
    i=latest.length-1;
  }
  return i;
}
// 追跡指標・MMT目標・chartレベルのメタ（種別/脳震盪/医師clearance/ROM制限）の保存
function saveChartMetrics(injId,metrics,mmtTargets,meta,onDone){
  return svSafeUpdate('chart',function(latest){
    var i=_chartIdx(latest,injId);
    if(metrics!=null)latest[i].metrics=metrics;
    if(mmtTargets!=null)latest[i].mmtTargets=mmtTargets;
    if(meta){
      if(meta.injType!=null)latest[i].injType=meta.injType;
      if(meta.isConcussion!=null)latest[i].isConcussion=meta.isConcussion;
      if(meta.medClearance!=null)latest[i].medClearance=meta.medClearance;
      if(meta.romLimit!=null)latest[i].romLimit=meta.romLimit;
    }
    return latest;
  },onDone);
}

function getPlayerInjHistory(pid,excludeIid){

// 同一部位の過去ケガ（再発判定用）
function getSamePartInjuries(pid,part,excludeIid){

}
// 再発・多発の検知。返り値: {isRecurrent:bool, samePartCount:int, sameTypeCount:int, lastSame:obj}
function analyzeRecurrence(inj){
  var samePart=getSamePartInjuries(inj.pid,inj.part,inj.id);
  var samePartType=samePart.filter(function(x){return x.type===inj.type;});
  return {
    isRecurrent: samePart.length>0,
    samePartCount: samePart.length,
    sameTypeCount: samePartType.length,
    lastSame: samePart.length?samePart[0]:null,
    history: samePart
  };
}
// 全選手の中で「同一部位を3回以上」のケガを持つ選手を検出（多発アラート）
function getFrequentInjuryPlayers(){
  var byPlayerPart={};
  D.i.forEach(function(inj){
    var key=inj.pid+'|'+inj.part;
    if(!byPlayerPart[key])byPlayerPart[key]={pid:inj.pid,part:inj.part,count:0,injs:[]};
    byPlayerPart[key].count++;
    byPlayerPart[key].injs.push(inj);
  });
  var result=[];
  Object.keys(byPlayerPart).forEach(function(k){
    if(byPlayerPart[k].count>=3)result.push(byPlayerPart[k]);
  });
  return result.sort(function(a,b){return b.count-a.count;});
}

function sv(k){db.collection('appdata').doc(k).set({data:JSON.stringify(D[k])}).catch(function(e){console.error('save error:',k,e);});}
function svSafe(k,newRec,callback){
  var ref=db.collection('appdata').doc(k);
  return db.runTransaction(function(tx){
    return tx.get(ref).then(function(doc){
      var latest=[];
      if(doc.exists){try{var parsed=JSON.parse(doc.data().data);if(Array.isArray(parsed))latest=parsed;}catch(e){}}
      latest.push(newRec);
      tx.set(ref,{data:JSON.stringify(latest)});
      return latest;
    });
  }).then(function(latest){D[k]=latest;if(callback)callback();}).catch(function(e){alert('保存に失敗しました');console.error(e);});
}
// onError(任意・第4引数): 指定時は失敗を呼び出し側へ委譲（既定の保存失敗alertは出さない）。未指定なら従来どおりalert。
function svSafeUpdate(k,updateFn,onDone,onError){
  var ref=db.collection('appdata').doc(k);
  return db.runTransaction(function(tx){
    return tx.get(ref).then(function(doc){
      var latest=[];if(doc.exists){try{var parsed=JSON.parse(doc.data().data);if(Array.isArray(parsed))latest=parsed;}catch(e){}}
      latest=updateFn(latest);
      tx.set(ref,{data:JSON.stringify(latest)});
      return latest;
    });
  }).then(function(latest){D[k]=latest;if(onDone)onDone();}).catch(function(e){console.error('svSafeUpdate error:',k,e);if(onError)onError(e);else alert('保存に失敗しました');});
}
// 単一レコードをトランザクションで安全にupsert（id一致で置換、なければ追加）
// onError(任意・第4引数): svSafeUpdateと同様、指定時は失敗を呼び出し側へ委譲。
function svRec(k,rec,onDone,onError){
  return svSafeUpdate(k,function(latest){
    var i=latest.findIndex(function(x){return idEq(x.id,rec.id);});
    if(i>=0)latest[i]=rec;else latest.push(rec);
    return latest;
  },onDone,onError);
}
// 単一レコードをトランザクションで安全に削除（id一致）
function svDel(k,id,onDone){
  return svSafeUpdate(k,function(latest){return latest.filter(function(x){return!idEq(x.id,id);});},onDone);
}
// ===== 共通の安全土台（playerから移植） =====
// 0をはじかない必須チェック。空文字・null・undefined・NaNのみを「未入力」とする（0は有効値）。
function isFilled(v){if(v===''||v==null)return false;if(typeof v==='number')return !Number.isNaN(v);if(typeof v==='string')return v.trim()!=='';return true;}
// 複数レコードを順番に安全保存する。items=[{k:'i',rec:...},{k:'r',rec:...}]
// 全件成功でonAllDone、途中失敗でonError(err, doneList, item)。
function svSafeSeq(items,onAllDone,onError){
  var done=[];
  function step(i){
    if(i>=items.length){if(onAllDone)onAllDone(done);return;}
    var it=items[i];
    var ref=db.collection('appdata').doc(it.k);
    db.runTransaction(function(tx){
      return tx.get(ref).then(function(doc){
        var latest=[];
        if(doc.exists){try{var parsed=JSON.parse(doc.data().data);if(Array.isArray(parsed))latest=parsed;}catch(e){}}
        latest.push(it.rec);
        tx.set(ref,{data:JSON.stringify(latest)});
        return latest;
      });
    }).then(function(latest){
      D[it.k]=latest;done.push(it.k);step(i+1);
    }).catch(function(e){
      console.error('svSafeSeq error:',it.k,e);
      if(onError)onError(e,done,it);
    });
  }
  step(0);
}

function ppNext(){
  var a=Array.isArray(D.pp)?D.pp:[]; if(!a.length)return null;
  var last=a[a.length-1]; var t=last&&last.type; if(t!=='push'&&t!=='pull')return null;
  // 当日の自動確定(by:auto)は表示上まだ当日実施タイプを見せ、翌日から反転（日跨ぎ対応）。手動flipは即時反映。
  if(last.by==='auto'&&last.date===todayStr())return t==='push'?'pull':'push';
  return t;
}
function ppNextWeightDay(){
  var t=todayStr();
  var last=(Array.isArray(D.pp)&&D.pp.length>=2)?D.pp[D.pp.length-1]:null;
  // 当日実施済み判定は手動flip(by!=='auto')のみ。当日の自動確定は表示上まだ当日を次のウエイト日として見せる。
  var doneToday=!!last&&last.date===t&&last.by!=='auto';
  var ds=(D.cal||[]).filter(function(e){return e&&e.type==='weight'&&typeof e.date==='string'&&(doneToday?e.date>t:e.date>=t);}).map(function(e){return e.date;});
  if(!ds.length)return null; ds.sort();
  return{date:ds[0],isToday:ds[0]===t};
}

function ppFlip(expected){
  svSafeUpdate('pp',function(latest){
    if(!Array.isArray(latest))latest=[];
    var last=latest.length?latest[latest.length-1]:null;
    if(!last||(last.type!=='push'&&last.type!=='pull'))return latest;
    if(expected&&last.type!==expected)return latest;
    latest.push({id:Date.now(),type:last.type==='push'?'pull':'push',date:todayStr(),by:'trainer'});
    if(latest.length>100)latest=latest.slice(-100);
    return latest;
  },function(){if(curTab==='home')T.home();});
}
function ppUndo(){
  svSafeUpdate('pp',function(latest){
    if(!Array.isArray(latest)||!latest.length)return latest;
    latest.pop();
    return latest;
  },function(){if(curTab==='home')T.home();});
}
function ppStart(type){
  if(type!=='push'&&type!=='pull')return;
  svSafeUpdate('pp',function(latest){
    if(Array.isArray(latest)&&latest.length)return latest;
    return[{id:Date.now(),type:type,date:todayStr(),by:'trainer'}];
  },function(){if(curTab==='home')T.home();});
}

function go(tab){
  curTab=tab;
  window._subViewActive=false;
  // onclick属性からタブ名を読み取って判定（順序依存をなくす）
  document.querySelectorAll('.nav-btn').forEach(function(e){
    var onclickAttr=e.getAttribute('onclick')||'';
    var m=onclickAttr.match(/go\(['"]([^'"]+)['"]\)/);
    e.classList.toggle('ac',m&&m[1]===tab);
  });
  T[tab]&&T[tab]();
}

// 予約rsvsのうち、slotId(枠)を占有しているものを返す（複数枠予約はslotIds配列全体を見る。旧データはslotIdのみへフォールバック）
function tapeSlotBooked(rsvs,slotId){return rsvs.filter(function(t){return(t.slotIds||[t.slotId]).indexOf(slotId)>=0;});}

// ホームTo-Doバッジ（1カード1個・優先度: 🔴安全(脳震盪/レッドフラグ未対応/評価空きすぎ)→🟡評価期限→🔵メニュー未設定→🟣復帰テスト目前→🟢記録済み）。該当なければnull。
function trTodoBadge(inj){
  var today=todayStr();
  var ch=getChart(inj.id);
  var rh=(D.r||[]).find(function(x){return idEq(x.injId,inj.id);});
  var plan=(D.rplan||[]).find(function(x){return x.injId===inj.id;});
  var lastLog=(D.rlog||[]).filter(function(l){return l.injId===inj.id;}).sort(function(a,b){return (b.date||"").localeCompare(a.date||"");})[0];
  if(ch.isConcussion)return{rank:0,cls:'bd-r',emoji:'🧠',label:'脳震盪：安全ゲート要確認',action:'chart'};
  // レッドフラグ：直近のinjcommがトレーナー発の要確認連絡のままでスタッフ側の返信がまだない
  var comms=(D.injcomm||[]).filter(function(c){return idEq(c.injId,inj.id);}).sort(function(a,b){return (a.createdAt||'').localeCompare(b.createdAt||'');});
  var lastComm=comms[comms.length-1];
  if(lastComm&&lastComm.role==='trainer'&&lastComm.text&&lastComm.text.indexOf('⚠️【要確認・実施前チェック】')===0){
    return{rank:0,cls:'bd-r',emoji:'🚨',label:'レッドフラグ連絡中・要対応',action:'rehab'};
  }
  var evalDates=(ch.evals||[]).map(function(e){return e.date;}).filter(Boolean).sort();
  var lastEvalDate=evalDates[evalDates.length-1];
  var refDate=lastEvalDate||inj.date;
  var gapDays=Math.floor((new Date(today)-new Date(refDate))/86400000);
  if(gapDays>=14)return{rank:0,cls:'bd-r',emoji:'📊',label:'評価が'+gapDays+'日空いています',action:'rehab'};
  if(gapDays>=7)return{rank:1,cls:'bd-a',emoji:'🟡',label:'評価期限：前回から'+gapDays+'日',action:'rehab'};
  var tomorrowCats=plan?plan.tomorrowCats||[]:[];
  if(!tomorrowCats.length)return{rank:2,cls:'bd-b',emoji:'📋',label:'本日のメニュー未設定',action:'menu'};
  if(rh&&rh.stage===STG.length-2&&!(D.rtest||[]).some(function(r){return r.injId===inj.id;})){
    return{rank:3,cls:'bd-p',emoji:'🏁',label:'復帰テスト目前',action:'rtest'};
  }
  if(lastLog&&lastLog.date===today)return{rank:4,cls:'bd-g',emoji:'✅',label:'今日は記録済み',action:'rehab'};
  return null;
}
// トップ画面のTo-Doバッジタップ時の遷移先ディスパッチ
function trBadgeGo(action,injId){
  if(action==='chart')return openChart(injId);
  if(action==='menu')return goSetNextMenuT(injId);
  if(action==='rtest')return goRTestRecord(injId);
  return goRehabPlayer(injId);
}

tape:function(){
  var today=todayStr();
  var now=new Date();
  var daysToNextMon=now.getDay()===0?1:8-now.getDay();
  var nextMon=new Date(now);nextMon.setDate(now.getDate()+daysToNextMon);
  var nextSun=new Date(nextMon);nextSun.setDate(nextMon.getDate()+6);
  // 過去4週間〜来週まで表示
  var pastStart=new Date(now);pastStart.setDate(now.getDate()-28);
  var fromS=pastStart.getFullYear()+'-'+String(pastStart.getMonth()+1).padStart(2,'0')+'-'+String(pastStart.getDate()).padStart(2,'0');
  var toS=nextSun.getFullYear()+'-'+String(nextSun.getMonth()+1).padStart(2,'0')+'-'+String(nextSun.getDate()).padStart(2,'0');
  // 自分の枠がある日
  var mySlotDates=[...new Set((D.tapeslot||[]).filter(function(s){return s.staff===myTrainer.name&&s.date>=fromS&&s.date<=toS;}).map(function(s){return s.date;}))].sort().reverse();

  h+='<div style="font-weight:600;margin-bottom:10px">あなたの担当枠（過去4週間〜来週）</div>';
  if(mySlotDates.length){
    mySlotDates.forEach(function(date){
      var slots=(D.tapeslot||[]).filter(function(s){return s.date===date&&s.staff===myTrainer.name;}).sort(function(a,b){return a.startTime.localeCompare(b.startTime);});
      var rsvs=(D.tape||[]).filter(function(t){return t.date===date;});
      var isPast=date<today;
      h+='<div class="card'+(isPast?' card-past':'')+'">'+
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">'+
      '<div><div style="font-weight:600">'+fmt(date)+(isPast?' <span style="font-size:11px;color:var(--text-secondary)">（過去）</span>':'')+'</div>'+
      '<div style="font-size:11px;color:var(--text-secondary)">枠数: '+slots.length+' / 予約: '+rsvs.length+'件</div></div>'+
      (!isPast?'<button class="btn btn-sm btn-d" onclick="delMyTapeDay(\''+date+'\')">削除</button>':'')+
      '</div>';
      slots.forEach(function(s){
        var booked=tapeSlotBooked(rsvs,s.id);
        var full=booked.length>=s.capacity;
        h+='<div style="margin-bottom:6px;padding:8px;background:var(--bg-secondary);border-radius:var(--radius)">'+
        '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:'+(booked.length?'6px':'0')+'">'+
        '<span style="font-weight:600;font-size:13px">'+s.startTime+'〜'+s.endTime+'</span>'+
        '<span class="bd '+(full?'bd-r':booked.length>0?'bd-a':'bd-g')+'">'+(full?'満員':booked.length+'/'+s.capacity+'名')+'</span></div>';
        booked.forEach(function(rsv){
          var p=D.p.find(function(x){return x.id===rsv.pid;});
          h+='<div class="log-row" style="padding:4px 0">'+avH(p,22)+'<div style="flex:1"><span style="font-weight:600;font-size:12px">'+(p?p.name:'不明')+'</span><span style="font-size:11px;color:var(--text-secondary);margin-left:6px">'+rsv.parts.join('・')+'</span></div>'+(p?'<button class="btn btn-sm" onclick="showPlayerTapeRecs('+p.id+')">記録</button>':'')+'</div>';
        });

function saveTapeRec(recId,btnEl){
  var pidEl=document.getElementById('tr-pid');
  var pid=pidEl&&pidEl.value?parseInt(pidEl.value):(recId?(D.taperec.find(function(x){return idEq(x.id,recId);})||{}).pid:null);
  if(!pid)return alert('選手を選択してください');
  if(!guardSubmit(btnEl,'保存中…'))return;
  var tapeTypes=Array.prototype.slice.call(document.querySelectorAll('.tr-tape:checked')).map(function(e){return e.value;});
  var g=function(id){var e=document.getElementById(id);return e?e.value:'';};
  var data={pid:pid,date:g('tr-date')||todayStr(),side:g('tr-side'),part:g('tr-part'),tapeTypes:tapeTypes,method:g('tr-method'),caution:g('tr-caution'),videoUrl:g('tr-video').trim(),author:g('tr-author'),inputAt:new Date().toISOString()};
  svSafeUpdate('taperec',function(latest){
    if(recId){
      var idx=latest.findIndex(function(x){return idEq(x.id,recId);});
      if(idx>=0){data.id=recId;latest[idx]=data;}else{data.id=recId;latest.push(data);}
    }else{
      data.id=Date.now()+'_'+Math.floor(Math.random()*1000);
      latest.push(data);
    }
    return latest;
  },function(){
    alert('保存しました');
    showPlayerTapeRecs(pid);
  },function(){
    releaseSubmit(btnEl);
    alert('保存できませんでした。電波の良い場所でもう一度お試しください。入力内容は残っています。');
  });
}
function delTapeRec(recId,pid){
  if(!confirm('このテーピング記録を削除しますか？'))return;
  svSafeUpdate('taperec',function(latest){
    return latest.filter(function(x){return!idEq(x.id,recId);});
  },function(){showPlayerTapeRecs(pid);});
}

    rtp:'<svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm-2 15l-5-5 1.4-1.4L10 14.2l7.6-7.6L19 8l-9 9z"/></svg>',
    goal:'<svg viewBox="0 0 24 24"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm0 18c-4.4 0-8-3.6-8-8s3.6-8 8-8 8 3.6 8 8-3.6 8-8 8zm1-13h-2v6l5 3 1-1.6-4-2.4V7z"/></svg>',
    edit:'<svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 000-1.41l-2.34-2.34a1 1 0 00-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>'
  };
  var C={injury:'#EF4444',hospital:'#8B5CF6',eval:'#3B82F6',soap:'#10B981',stage:'#F59E0B',rtp:'#06B6D4',goal:'#EC4899',edit:'#64748B'};
  var G={injury:'rgba(239,68,68,.6)',hospital:'rgba(139,92,246,.6)',eval:'rgba(59,130,246,.6)',soap:'rgba(16,185,129,.6)',stage:'rgba(245,158,11,.6)',rtp:'rgba(6,182,212,.6)',goal:'rgba(236,72,153,.6)',edit:'rgba(100,116,139,.6)'};

  // 1. 受傷
  events.push({date:inj.date,type:'injury',title:'受傷',desc:(inj.side||'')+inj.part+' '+inj.type+(inj.note?'<br>'+escapeHtml(inj.note):'')});
  // 2. 病院受診・診断
  if(ch.medical){
    if(ch.medical.hospital||ch.medical.diagnosis){
      var ddate=ch.medical.diagnosisDate||inj.hospitalDate||inj.date;
      var dtxt=[];
      if(ch.medical.hospital)dtxt.push(escapeHtml(ch.medical.hospital));
      if(ch.medical.diagnosis)dtxt.push('診断: '+escapeHtml(ch.medical.diagnosis));
      if(ch.medical.imgFindings&&ch.medical.imgFindings.length)dtxt.push(Array.isArray(ch.medical.imgFindings)?ch.medical.imgFindings.join('・'):escapeHtml(ch.medical.imgFindings));
      events.push({date:ddate,type:'hospital',title:'病院受診・診断',desc:dtxt.join('<br>')});
    }
    if(ch.medical.surgery&&ch.medical.surgeryDate){
      events.push({date:ch.medical.surgeryDate,type:'hospital',title:'手術',desc:escapeHtml(ch.medical.surgeryName||'手術実施')});
    }
  }
  // 2.5. 基本情報編集履歴（trainer「怪我の基本情報編集」解禁分＝inj.editLog）
  (inj.editLog||[]).forEach(function(e){
    var desc=(e.changes||[]).map(function(c){return escapeHtml(c.field)+': '+escapeHtml(c.from)+' → '+escapeHtml(c.to);}).join('<br>');
    events.push({date:e.date,type:'edit',title:'基本情報編集'+(e.by?'（'+escapeHtml(e.by)+'）':''),desc:desc});
  });
  // 3. 評価（痛み・ROMの推移をメトリクスで）
  (ch.evals||[]).forEach(function(ev){
    var metrics='';
    if(ev.pain){
      var maxP=Math.max(ev.pain.rest||0,ev.pain.motion||0,ev.pain.night||0,ev.pain.press||0);
      var pc=maxP>=7?'#EF4444':maxP>=4?'#F59E0B':'#10B981';
      metrics+='<span class="tl-metric" style="color:'+pc+'">😣 痛み '+maxP+'/10</span>';
    }
    if(ev.rom){var romKeys=Object.keys(ev.rom);if(romKeys.length){var r0=ev.rom[romKeys[0]];if(r0)metrics+='<span class="tl-metric">📐 ROM '+r0+'°</span>';}}
    if(ev.mmt){var mk=Object.keys(ev.mmt);if(mk.length){var m0=ev.mmt[mk[0]];if(m0)metrics+='<span class="tl-metric">💪 MMT '+m0+'</span>';}}
    events.push({date:ev.date,type:'eval',title:'評価',desc:(ev.note?escapeHtml(ev.note):'')+(metrics?'<div style="margin-top:2px">'+metrics+'</div>':'')});
  });
  // 4. SOAP
  (ch.soaps||[]).forEach(function(s){
    var parts=[];
    if(s.a)parts.push('<b>A:</b> '+escapeHtml(s.a));
    if(s.p)parts.push('<b>P:</b> '+escapeHtml(s.p));
    var d=parts.join('<br>');
    if(!d&&s.s)d='<b>S:</b> '+escapeHtml(s.s);
    events.push({date:s.date,type:'soap',title:'SOAP記録'+(s.author?' ('+escapeHtml(s.author)+')':''),desc:d||'記録あり'});
  });
  // 5. リハビリ段階の開始日
  if(rh&&rh.stageDates){
    Object.keys(rh.stageDates).forEach(function(stg){
      var d=rh.stageDates[stg];
      if(d&&STG[stg])events.push({date:d,type:'stage',title:'リハビリ '+STG[stg],desc:'ステージ'+stg+'に移行'});
    });
  }
  // 6. RTP（現在のレベル。履歴がないので「設定」として表示）
  if(ch.rtpLevel){
    var rtpObj=RTP_LEVELS.find(function(x){return x.k===ch.rtpLevel;});
    if(rtpObj&&ch.rtpLevel!=='rest'){
      // RTP変更日が記録されていればそれを、なければ最終評価日あたりを使う
      var rtpDate=ch.rtpLevelDate||(ch.evals&&ch.evals.length?ch.evals[ch.evals.length-1].date:inj.date);
      events.push({date:rtpDate,type:'rtp',title:'練習参加レベル',desc:'<b style="color:'+rtpObj.color+'">'+rtpObj.label+'</b> '+rtpObj.desc});
    }
  }
  // 7. 復帰予定（未来のイベント）
  var isFuture=false;
  if(inj.returnDate&&!inj.resolved){
    var dl=Math.ceil((new Date(inj.returnDate)-new Date(todayStr()))/86400000);
    events.push({date:inj.returnDate,type:'goal',title:'復帰予定',desc:dl>0?'あと'+dl+'日':dl===0?'本日予定':(-dl)+'日超過',_future:true});
  }
  // 8. 回復済み
  if(inj.resolved){
    events.push({date:inj.resolvedDate||todayStr(),type:'goal',title:'復帰・回復',desc:'競技復帰しました 🎉'});
  }

  // 日付順にソート（同日は受傷→診断→評価→SOAPの優先度）
  var typeOrder={injury:0,hospital:1,edit:1.5,stage:2,eval:3,soap:4,rtp:5,goal:6};
  events.sort(function(a,b){
    var dc=(a.date||'').localeCompare(b.date||'');
    if(dc!==0)return dc;
    return (typeOrder[a.type]||9)-(typeOrder[b.type]||9);
  });

  if(!events.length)return'<div class="no">まだ記録がありません</div>';

  // ヘッダー統計
  var daysSince=Math.floor((new Date(todayStr())-new Date(inj.date))/86400000);
  var h='<div style="display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap">'+
    '<div style="flex:1;min-width:90px;background:linear-gradient(135deg,#3B82F6,#2563EB);border-radius:12px;padding:12px 14px;color:#fff;box-shadow:0 4px 14px rgba(59,130,246,.3)"><div style="font-size:24px;font-weight:800;line-height:1">'+daysSince+'</div><div style="font-size:11px;opacity:.9;margin-top:2px">受傷からの日数</div></div>'+
    '<div style="flex:1;min-width:90px;background:linear-gradient(135deg,#10B981,#059669);border-radius:12px;padding:12px 14px;color:#fff;box-shadow:0 4px 14px rgba(16,185,129,.3)"><div style="font-size:24px;font-weight:800;line-height:1">'+events.filter(function(e){return e.type==='eval';}).length+'</div><div style="font-size:11px;opacity:.9;margin-top:2px">評価回数</div></div>'+
    '<div style="flex:1;min-width:90px;background:linear-gradient(135deg,#F59E0B,#D97706);border-radius:12px;padding:12px 14px;color:#fff;box-shadow:0 4px 14px rgba(245,158,11,.3)"><div style="font-size:24px;font-weight:800;line-height:1">'+events.length+'</div><div style="font-size:11px;opacity:.9;margin-top:2px">記録イベント</div></div>'+
    '</div>';

  // タイムライン本体
  h+='<div class="tl-wrap">';
  events.forEach(function(ev){
    var col=C[ev.type]||'#3B82F6';
    var glow=G[ev.type]||'rgba(59,130,246,.6)';
    var futureStyle=ev._future?'opacity:.75;border-style:dashed':'';
    h+='<div class="tl-item" style="--tl-color:'+col+';--tl-glow:'+glow+'">'+
      '<div class="tl-line"></div>'+
      '<div class="tl-dot">'+(IC[ev.type]||'')+'</div>'+
      '<div class="tl-card" style="'+futureStyle+'">'+
        '<div class="tl-date">'+fmt(ev.date)+(ev._future?' ・ 予定':'')+'</div>'+
        '<div class="tl-title">'+ev.title+'</div>'+
        (ev.desc?'<div class="tl-desc">'+ev.desc+'</div>':'')+
      '</div>'+
    '</div>';
  });
  h+='</div>';
  return h;
}


function renderChartOverview(iid){
  var inj=D.i.find(function(x){return idEq(x.id,iid);});if(!inj)return'';
  var p=D.p.find(function(x){return idEq(x.id,inj.pid);});
  var rh=D.r.find(function(x){return idEq(x.injId,iid);});
  var ch=getChart(iid);
  var daysSince=Math.floor((new Date(todayStr())-new Date(inj.date))/86400000);
  // 最新評価
  var lastEval=ch.evals.slice().sort(function(a,b){return (b.date||'').localeCompare(a.date||'');})[0];
  // 最新痛み
  var lastPain=lastEval&&lastEval.pain?lastEval.pain:{};
  var h='<div class="grid g3" style="margin-bottom:16px">'+
    '<div class="mc"><div class="v" style="font-size:20px;color:var(--accent)">'+daysSince+'</div><div class="l">受傷からの日数</div></div>'+
    '<div class="mc"><div class="v" style="font-size:20px">'+ch.evals.length+'</div><div class="l">評価記録</div></div>'+
    '<div class="mc"><div class="v" style="font-size:20px">'+ch.soaps.length+'</div><div class="l">SOAP記録</div></div>'+
    '</div>';
  // 基本情報
  h+='<div class="form-box"><div class="form-title">基本情報</div>'+
    '<div class="detail-row"><span class="detail-label">部位</span><span class="detail-value">'+(inj.side||'')+inj.part+(inj.partOther?'('+escapeHtml(inj.partOther)+')':'')+'</span></div>'+
    '<div class="detail-row"><span class="detail-label">種類</span><span class="detail-value">'+inj.type+(inj.typeOther?'('+escapeHtml(inj.typeOther)+')':'')+'</span></div>'+
    '<div class="detail-row"><span class="detail-label">受傷日</span><span class="detail-value">'+fmt(inj.date)+'（'+daysSince+'日経過）</span></div>'+
    '<div class="detail-row"><span class="detail-label">復帰予定</span><span class="detail-value">'+(inj.returnDate?fmt(inj.returnDate)+(function(){if(inj.resolved)return'';var dl=Math.ceil((new Date(inj.returnDate)-new Date(todayStr()))/86400000);if(dl>0)return' <span class="bd bd-b" style="font-size:10px">あと'+dl+'日</span>';else if(dl===0)return' <span class="bd bd-a" style="font-size:10px">本日予定</span>';else return' <span class="bd bd-r" style="font-size:10px">'+(-dl)+'日超過</span>';})():'未設定')+'</span></div>'+
    (ch.injDetail.severity?'<div class="detail-row"><span class="detail-label">重症度</span><span class="detail-value">'+ch.injDetail.severity+'</span></div>':'')+
    (ch.medical.diagnosis?'<div class="detail-row"><span class="detail-label">診断名</span><span class="detail-value">'+escapeHtml(ch.medical.diagnosis)+'</span></div>':'')+
    '</div>';
  // 脳震盪・禁忌の警告（現場で見落とすと危険なので、開いてすぐ見える概要タブに掲示）
  if(ch.isConcussion){
    h+='<div style="font-size:12.5px;padding:12px;border-radius:10px;background:var(--amber-bg);color:var(--amber);line-height:1.6;margin-bottom:12px">🧠 <b>脳震盪</b>として登録されています。数値評価・整形外科的テストの対象外です。GRTP（症状ベース・24時間ルール）で管理してください。</div>';
  } else if(ch.injType&&INJ_TEMPLATES[ch.injType]&&INJ_TEMPLATES[ch.injType].contra){
    h+='<div style="font-size:12px;padding:8px 10px;border-radius:8px;background:var(--amber-bg);color:var(--amber);line-height:1.5;margin-bottom:12px">⚠️ <b>禁忌:</b> '+escapeHtml(INJ_TEMPLATES[ch.injType].contra)+'</div>';
  }
  // リハビリ状況
  if(rh){
    h+='<div class="form-box"><div class="form-title">リハビリ状況</div>'+
    '<div class="detail-row"><span class="detail-label">現在の段階</span><span class="detail-value" style="color:var(--accent);font-weight:700">'+STG[rh.stage]+'</span></div></div>';
  }
  // 再発アラート
  var rec=analyzeRecurrence(inj);
  if(rec.isRecurrent){
    h+='<div class="alert-card alert-warn" style="margin-bottom:12px">'+
      '<div><div style="font-weight:700">⚠️ 再発の可能性 — 同じ部位（'+inj.part+'）のケガが過去に'+rec.samePartCount+'件</div>'+
      (rec.lastSame?'<div style="font-size:11px;margin-top:3px;opacity:.85">直近: '+fmt(rec.lastSame.date)+' '+rec.lastSame.type+'</div>':'')+
      (rec.samePartCount>=2?'<div style="font-size:11px;margin-top:3px;opacity:.85;font-weight:600">繰り返し受傷しています。根本的な原因の評価を推奨</div>':'')+
      '</div></div>';
  }
  // 最新の痛み状態
  if(lastEval){
    h+='<div class="form-box"><div class="form-title">最新の状態（'+fmt(lastEval.date)+'）</div>';
    PAIN_TYPES.forEach(function(pt){
      if(lastPain[pt.k]!=null){
        var v=lastPain[pt.k];
        h+='<div class="detail-row"><span class="detail-label">'+pt.label+'</span><span class="detail-value"><b style="color:'+(v>=7?'var(--red)':v>=4?'var(--amber)':'var(--green)')+'">'+v+'</b>/10</span></div>';
      }
    });
    h+='</div>';
  }
  // 既往歴
  h+=renderInjHistoryBox(inj.pid,inj.id,inj.part);
  // アクションボタン
  h+='<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px">'+
    '<button class="btn btn-p" onclick="goEditInjury('+iid+')">基本情報を編集</button>'+
    (!inj.resolved?'<button class="btn btn-s" onclick="resolveInj('+iid+')">回復済みにする</button>':'<button class="btn" onclick="unresolveInj('+iid+')">治療中に戻す</button>')+
    '<button class="btn btn-d" onclick="deleteInjury('+iid+')">削除</button>'+
    '</div>';
  return h;
}

function saveChartDiagnosis(iid){
  var ch=getChart(iid);
  var g=function(id){var e=document.getElementById(id);return e?e.value:'';};
  ch.injDetail.mechanism=g('cd-mech');ch.injDetail.scene=g('cd-scene');ch.injDetail.tissue=g('cd-tissue');ch.injDetail.severity=g('cd-sev');ch.injDetail.situation=g('cd-situation');ch.injDetail.firstaid=g('cd-firstaid');
  ch.medical.visitDate=g('cd-visitdate');ch.medical.hospital=g('cd-hospital');ch.medical.doctor=g('cd-doctor');ch.medical.diagnosis=g('cd-diagnosis');
  ch.medical.imgTypes=Array.prototype.slice.call(document.querySelectorAll('.cd-imgtype:checked')).map(function(e){return e.value;});
  ch.medical.imgFindings=g('cd-imgfind');ch.medical.treatment=g('cd-treatment');
  ch.medical.surgery=document.getElementById('cd-surgery')?document.getElementById('cd-surgery').checked:false;
  ch.medical.surgeryDate=g('cd-surgdate');ch.medical.surgeryName=g('cd-surgname');
  saveChart(ch);alert('保存しました');
}

function renderChartEval(iid){
  var inj=D.i.find(function(x){return idEq(x.id,iid);});if(!inj)return'';
  var ch=getChart(iid);
  var em=EVAL_MASTER[inj.part]||EVAL_MASTER['その他'];
  var evals=ch.evals.slice().sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});
  var h='';
  // 脳震盪：整形外科的テストを通常の陰性/陽性判定として扱わない（GRTP＝症状ベースで管理）
  if(ch.isConcussion){
    h+='<div style="font-size:12.5px;padding:12px;border-radius:10px;background:var(--amber-bg);color:var(--amber);line-height:1.6;margin-bottom:12px">🧠 <b>脳震盪として登録</b>されています。数値評価の対象外です。<br>GRTP（症状ベース・24時間ルール・症状再燃で前段階へ後退）で管理してください。判断に迷う場合は必ずスタッフに相談してください。</div>';
  } else if(ch.injType&&INJ_TEMPLATES[ch.injType]&&INJ_TEMPLATES[ch.injType].contra){
    h+='<div style="font-size:12px;padding:8px 10px;border-radius:8px;background:var(--amber-bg);color:var(--amber);line-height:1.5;margin-bottom:12px">⚠️ <b>禁忌:</b> '+escapeHtml(INJ_TEMPLATES[ch.injType].contra)+'</div>';
  }
  // 回復ゲージ（怪我×リハビリ連携 Phase2・読み取り＋描画のみ）
  h+=renderDeficitGauges(iid);
  // 新規評価追加ボタン
  h+='<button class="btn btn-p" style="width:100%;margin-bottom:14px" onclick="showEvalForm('+iid+')">＋ 新しい評価を記録する</button>';
  // 痛み推移グラフ
  if(evals.length>=1){
    h+='<div class="form-box"><div class="form-title">📈 痛みの推移</div><div class="chart-wrap" style="height:200px"><canvas id="ev-pain-chart"></canvas></div></div>';
    // ROM推移グラフ（部位にROM項目がある場合）
    if(em.rom.length>0){
      h+='<div class="form-box"><div class="form-title">📐 ROM（関節可動域）の推移</div><div class="chart-wrap" style="height:200px"><canvas id="ev-rom-chart"></canvas></div></div>';
    }
  }
  // 評価記録一覧
  h+='<div class="form-title" style="margin:16px 0 10px">評価記録（'+evals.length+'件）</div>';
  if(!evals.length){
    h+='<div class="no">まだ評価記録がありません。<br>「新しい評価を記録する」から始めてください。</div>';
  }else{
    evals.forEach(function(ev){
      h+='<div class="card" style="margin-bottom:10px">'+
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'+
        '<span style="font-weight:700;font-size:14px">'+fmt(ev.date)+'</span>'+
        '<div style="display:flex;gap:6px"><button class="btn btn-sm" onclick="showEvalForm('+iid+',\''+ev.id+'\')">編集</button><button class="btn btn-sm btn-d" onclick="delEval('+iid+',\''+ev.id+'\')">削除</button></div>'+
        '</div>';
      // 痛み
      if(ev.pain){
        var painParts=[];
        PAIN_TYPES.forEach(function(pt){if(ev.pain[pt.k]!=null)painParts.push(pt.label+':'+ev.pain[pt.k]);});
        if(painParts.length)h+='<div style="font-size:12px;margin-bottom:4px"><span style="color:var(--text-secondary)">痛み</span> '+painParts.join(' / ')+'</div>';
      }
      // ROM
      if(ev.rom&&Object.keys(ev.rom).length){
        var romParts=[];
        em.rom.forEach(function(r){if(ev.rom[r.k]!=null&&ev.rom[r.k]!=='')romParts.push(r.label+':'+ev.rom[r.k]+r.unit);});
        if(romParts.length)h+='<div style="font-size:12px;margin-bottom:4px"><span style="color:var(--text-secondary)">ROM</span> '+romParts.join(' / ')+'</div>';
      }
      // MMT
      if(ev.mmt&&Object.keys(ev.mmt).length){
        var mmtParts=[];
        em.mmt.forEach(function(mm){if(ev.mmt[mm]!=null&&ev.mmt[mm]!=='')mmtParts.push(mm+':'+ev.mmt[mm]);});
        if(mmtParts.length)h+='<div style="font-size:12px;margin-bottom:4px"><span style="color:var(--text-secondary)">筋力</span> '+mmtParts.join(' / ')+'</div>';
      }
      // 周径
      if(ev.circ&&Object.keys(ev.circ).length){
        var circParts=[];
        em.circ.forEach(function(c){if(ev.circ[c]!=null&&ev.circ[c]!=='')circParts.push(c+':'+ev.circ[c]+'cm');});
        if(circParts.length)h+='<div style="font-size:12px;margin-bottom:4px"><span style="color:var(--text-secondary)">周径</span> '+circParts.join(' / ')+'</div>';
      }
      // 整形外科テスト
      if(ev.ortho&&Object.keys(ev.ortho).length){
        var orthoParts=[];
        Object.keys(ev.ortho).forEach(function(k){if(ev.ortho[k])orthoParts.push(k+':'+ev.ortho[k]);});
        if(orthoParts.length)h+='<div style="font-size:12px;margin-bottom:4px"><span style="color:var(--text-secondary)">整形テスト</span> '+orthoParts.join(' / ')+'</div>';
      }
      // 所見
      if(ev.note)h+='<div style="font-size:12px;margin-top:6px;padding:8px;background:var(--bg-secondary);border-radius:6px;white-space:pre-wrap">'+escapeHtml(ev.note)+'</div>';
      h+='</div>';
    });
  }
  return h;
}

// 評価入力フォーム（部位連動・セクション型ウィザード）
// 見習いが「何から・どの順で入力するか」で迷わないよう、上部固定の進捗チップ＋アコーディオン式セクションで
// 「上から順に」誘導する。順序は臨床の侵襲が少ない順（痛み→周径(腫脹)→ROM→筋力→テスト→症状→所見）。
// セクション移動は再描画せず可視性トグルのみ＝入力中のDOM値は保持される（メモリ不滅）。
function showEvalForm(iid,evalId){
  var inj=D.i.find(function(x){return idEq(x.id,iid);});if(!inj)return;
  var ch=getChart(iid);
  var em=EVAL_MASTER[inj.part]||EVAL_MASTER['その他'];
  var evals=(ch&&ch.evals)?ch.evals:[];var exId=evalId||null; // ⑧-b 前回値ゴースト用（編集中evalは除外）
  var ev=evalId?ch.evals.find(function(x){return idEq(x.id,evalId);}):null;
  var isEdit=!!ev;
  if(!ev)ev={date:todayStr(),pain:{},rom:{},mmt:{},circ:{},ortho:{},note:''};
  // --- セクションを部位に応じて動的生成（該当項目がある部位だけ並ぶ）---
  var secs=[];
  // ① 痛み（全部位共通）
  var pbody='<div style="font-size:11px;color:var(--text-secondary);margin-bottom:10px">0:なし 〜 10:最大。運動時痛が推移グラフの基準になります。</div>';
  PAIN_TYPES.forEach(function(pt,pi){
    var v=ev.pain&&ev.pain[pt.k]!=null?ev.pain[pt.k]:'';
    var pr=evPrevVal(evals,'pain',pt.k,exId);
    var ser=evSeriesFull(evals,'pain',pt.k),spk=sparklineSVG(ser,'down','pain'+pi);
    pbody+='<div style="margin-bottom:12px"><div class="fl"><label>'+pt.label+(pr?' <span style="font-size:11px;font-weight:400;color:var(--text-tertiary)">前回 '+pr.v+'/10</span>':'')+'</label>'+
      '<input type="number" class="ipt ev-pain" data-k="'+pt.k+'" data-prev="'+(pr?pr.v:'')+'" data-dir="down" data-unit="" data-diff="evd-pain-'+pi+'" min="0" max="10" value="'+v+'" placeholder="0-10" oninput="evLiveDiff(this)"></div>'+
      '<div style="display:flex;align-items:center;gap:8px;margin-top:3px"><span id="evd-pain-'+pi+'" style="font-size:11px;color:var(--text-secondary)"></span>'+(spk?'<div style="flex:1;min-width:0">'+spk+'</div>'+sparkCaption(ser,'down'):'')+'</div></div>';
  });
  secs.push({key:'pain',icon:'😣',label:'痛み',body:pbody});
  // ② 周径（腫脹）— ROMより前（その日どこまで押してよいかの判断材料になるため）
  if(em.circ.length){
    var cbody='<div style="font-size:11px;color:var(--text-secondary);margin-bottom:10px">腫脹の指標。左右差の確認に使います。</div>';
    em.circ.forEach(function(c,ci){
      var v=ev.circ&&ev.circ[c]!=null?ev.circ[c]:'';
      var pr=evPrevVal(evals,'circ',c,exId);
      var ser=evSeriesFull(evals,'circ',c),spk=sparklineSVG(ser,'none','circ'+ci);
      cbody+='<div style="margin-bottom:12px"><div class="fl"><label>'+escapeHtml(c)+(pr?' <span style="font-size:11px;font-weight:400;color:var(--text-tertiary)">前回 '+pr.v+'cm</span>':'')+'</label>'+
        '<input type="number" step="0.1" class="ipt ev-circ" data-k="'+escapeHtml(c)+'" data-prev="'+(pr?pr.v:'')+'" data-dir="none" data-unit="cm" data-diff="evd-circ-'+ci+'" value="'+v+'" placeholder="cm" oninput="evLiveDiff(this)"></div>'+
        '<div style="display:flex;align-items:center;gap:8px;margin-top:3px"><span id="evd-circ-'+ci+'" style="font-size:11px;color:var(--text-secondary)"></span>'+(spk?'<div style="flex:1;min-width:0">'+spk+'</div>'+sparkCaption(ser,'none'):'')+'</div></div>';
    });
    secs.push({key:'circ',icon:'📏',label:'周径',body:cbody});
  }
  // ③ ROM
  if(em.rom.length){
    var rbody='<div style="font-size:11px;color:var(--text-secondary);margin-bottom:10px">関節可動域。健側と比較して。</div>';
    em.rom.forEach(function(r,ri){
      var v=ev.rom&&ev.rom[r.k]!=null?ev.rom[r.k]:'';
      var pr=evPrevVal(evals,'rom',r.k,exId);
      var ser=evSeriesFull(evals,'rom',r.k),spk=sparklineSVG(ser,'none','rom'+ri);
      rbody+='<div style="margin-bottom:12px"><div class="fl"><label>'+r.label+(r.normal?' <span style="color:var(--text-tertiary);font-weight:400">(正常≒'+r.normal+r.unit+')</span>':'')+(pr?' <span style="font-size:11px;font-weight:400;color:var(--text-tertiary)">前回 '+escapeHtml(String(pr.v))+r.unit+'</span>':'')+'</label>'+
        '<input type="text" inputmode="decimal" class="ipt ev-rom" data-k="'+r.k+'" data-prev="'+(pr?escapeHtml(String(pr.v)):'')+'" data-dir="none" data-unit="'+r.unit+'" data-diff="evd-rom-'+ri+'" value="'+escapeHtml(v)+'" placeholder="'+r.unit+'" oninput="evLiveDiff(this)"></div>'+
        '<div style="display:flex;align-items:center;gap:8px;margin-top:3px"><span id="evd-rom-'+ri+'" style="font-size:11px;color:var(--text-secondary)"></span>'+(spk?'<div style="flex:1;min-width:0">'+spk+'</div>'+sparkCaption(ser,'none'):'')+'</div></div>';
    });
    secs.push({key:'rom',icon:'📐',label:'ROM',body:rbody});
  }
  // ④ 筋力 MMT
  if(em.mmt.length){
    var mbody='<div style="font-size:11px;color:var(--text-secondary);margin-bottom:10px">徒手筋力テスト（0〜5）。健側と比較して。</div>';
    em.mmt.forEach(function(mm,mmi){
      var v=ev.mmt&&ev.mmt[mm]!=null?ev.mmt[mm]:'';
      var pr=evPrevVal(evals,'mmt',mm,exId);
      var ser=evSeriesFull(evals,'mmt',mm),spk=sparklineSVG(ser,'up','mmt'+mmi);
      mbody+='<div style="margin-bottom:12px"><div class="fl"><label>'+escapeHtml(mm)+(pr?' <span style="font-size:11px;font-weight:400;color:var(--text-tertiary)">前回 '+escapeHtml(String(pr.v))+'</span>':'')+'</label>'+
        '<select class="ipt ev-mmt" data-k="'+escapeHtml(mm)+'" data-prev="'+(pr?escapeHtml(String(pr.v)):'')+'" data-dir="up" data-ord="1" data-diff="evd-mmt-'+mmi+'" onchange="evLiveDiff(this)"><option value="">-</option>'+
        ['5','4+','4','4-','3+','3','3-','2','1','0'].map(function(o){return'<option'+(String(v)===o?' selected':'')+'>'+o+'</option>';}).join('')+'</select></div>'+
        '<div style="display:flex;align-items:center;gap:8px;margin-top:3px"><span id="evd-mmt-'+mmi+'" style="font-size:11px;color:var(--text-secondary)"></span>'+(spk?'<div style="flex:1;min-width:0">'+spk+'</div>'+sparkCaption(ser,'up'):'')+'</div></div>';
    });
    secs.push({key:'mmt',icon:'💪',label:'筋力',body:mbody});
  }
  // ⑤ 整形外科テスト（脳震盪は陰性/陽性の二値判定になじまないため対象外）
  if(em.ortho.length&&!ch.isConcussion){
    var obody='<div style="font-size:11px;color:var(--text-secondary);margin-bottom:10px;line-height:1.6"><b style="color:var(--amber)">🔒 監督下</b>のテストは、有資格スタッフの立ち会いのもとで実施・判定してください。自信がなければ「未実施」のままでOK。判断に迷ったら必ずスタッフに相談を。</div>';
    em.ortho.forEach(function(o){
      var v=ev.ortho&&ev.ortho[o]!=null?ev.ortho[o]:'';
      var sup=orthoIsSupervised(o); // 既定は全テストtrue（安全側）＝凛人がORTHO_SOLO_OKに登録すると外れる
      obody+='<div class="fl" style="margin-bottom:10px"><label>'+escapeHtml(o)+(sup?' <span style="font-size:10px;font-weight:700;color:var(--amber);background:var(--amber-bg);border-radius:5px;padding:1px 6px;white-space:nowrap">🔒 監督下</span>':'')+'</label><select class="ipt ev-ortho" data-k="'+escapeHtml(o)+'"><option value="">未実施</option>'+
        ['陰性(-)','陽性(+)','疑陽性(±)'].map(function(opt){return'<option'+(v===opt?' selected':'')+'>'+opt+'</option>';}).join('')+'</select></div>';
    });
    secs.push({key:'ortho',icon:'🔬',label:'テスト',body:obody});
  }
  // ⑥ 特記症状
  if(em.special&&em.special.length){
    var sbody='<div style="font-size:11px;color:var(--text-secondary);margin-bottom:10px">該当する症状にチェックしてください。</div><div style="display:flex;flex-wrap:wrap;gap:10px">';
    em.special.forEach(function(s){
      var checked=ev.special&&ev.special.indexOf(s)>=0;
      sbody+='<label style="display:flex;align-items:center;gap:5px;font-size:13px;cursor:pointer"><input type="checkbox" class="ev-special" value="'+escapeHtml(s)+'"'+(checked?' checked':'')+'> '+escapeHtml(s)+'</label>';
    });
    sbody+='</div>';
    secs.push({key:'special',icon:'⚠️',label:'症状',body:sbody});
  }
  // ⑦ 所見（全部位共通・最後）
  secs.push({key:'note',icon:'📝',label:'所見',body:'<textarea class="ipt" id="ev-note" placeholder="気づいたこと、評価の総合所見など" style="min-height:80px">'+escapeHtml(ev.note||'')+'</textarea>'});

  window._evSecKeys=secs.map(function(s){return s.key;});
  window._evSec=0;
  var last=secs.length-1;

  var h='';
  h+='<div style="font-size:16px;font-weight:700;margin-bottom:4px">'+(isEdit?'評価を編集':'新しい評価を記録')+'</div>';
  h+='<div style="font-size:12px;color:var(--text-secondary);margin-bottom:12px">'+escapeHtml((inj.side||'')+inj.part)+' ・ 上から順に入力していきましょう（全'+secs.length+'ステップ）</div>';

  } else if(ch.injType&&INJ_TEMPLATES[ch.injType]&&INJ_TEMPLATES[ch.injType].contra){

  }
  // 評価日（常時見える・設定して忘れる項目）
  h+='<div class="fl" style="margin-bottom:12px"><label>評価日</label><input type="date" class="ipt" id="ev-date" value="'+(ev.date||todayStr())+'"></div>';
  // 進捗チップ（上部固定・横スクロール）
  h+='<div id="ev-prog" style="position:sticky;z-index:50;background:var(--bg-app);padding:8px 0;margin-bottom:10px;display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch">';
  secs.forEach(function(s,i){
    h+='<div id="evchip-'+i+'" onclick="evGoSec('+i+')" style="flex:0 0 auto;display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:99px;border:1px solid var(--border-tertiary);background:var(--bg-secondary);color:var(--text-secondary);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap"><span class="ev-chip-n" style="display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:rgba(255,255,255,0.12);font-size:11px">'+(i+1)+'</span>'+s.label+'</div>';
  });
  h+='</div>';
  // セクション本体（アコーディオン）
  secs.forEach(function(s,i){
    h+='<div class="form-box ev-sec" id="evsec-'+s.key+'" style="padding:0;overflow:hidden">'+
      '<div id="evsec-head-'+s.key+'" onclick="evGoSec('+i+')" style="display:flex;align-items:center;gap:8px;padding:12px 14px;cursor:pointer">'+
        '<span style="display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--blue-bg);color:var(--blue);font-size:12px;font-weight:700;flex-shrink:0">'+(i+1)+'</span>'+
        '<span style="font-weight:700;font-size:14px;flex:1">'+s.icon+' '+s.label+'</span>'+
        '<span id="evchev-'+s.key+'" style="color:var(--text-secondary);font-size:12px">'+(i===0?'▾':'▸')+'</span>'+
      '</div>'+
      '<div class="ev-sec-body" id="evsec-body-'+s.key+'" style="display:'+(i===0?'block':'none')+';padding:0 14px 14px">'+
        s.body+
        (i<last?'<button class="btn btn-p" style="width:100%;margin-top:10px" onclick="evGoSec('+(i+1)+')">次へ ▶</button>':'')+
      '</div>'+
    '</div>';
  });
  // 保存アクション（常時到達可能）
  h+='<div style="display:flex;gap:8px;margin-top:6px"><button class="btn btn-back" onclick="chartTab(\'eval\')">キャンセル</button><button class="btn btn-p" style="flex:1" onclick="saveEval('+iid+','+(isEdit?'\''+evalId+'\'':'null')+',this)">💾 保存する</button></div>';
  var body=document.getElementById('chart-body');
  if(body)body.innerHTML=h;
  // 進捗バーのsticky topをアプリヘッダー高さに合わせる＋初期状態を反映（初回はスクロールしない）
  setTimeout(function(){
    var hd=document.querySelector('.header');var hh=hd?hd.offsetHeight:0;
    var pbEl=document.getElementById('ev-prog');if(pbEl)pbEl.style.top=hh+'px';
    evGoSec(0,true);
  },30);
}
// セクション移動：再描画せず表示切替のみ（入力DOM値を保持）。noScroll=trueで初期化時のジャンプを抑止。
function evGoSec(n,noScroll){
  var keys=window._evSecKeys||[];
  if(!keys.length)return;
  if(n<0)n=0;if(n>=keys.length)n=keys.length-1;
  window._evSec=n;
  keys.forEach(function(k,i){
    var bodyEl=document.getElementById('evsec-body-'+k);
    if(bodyEl)bodyEl.style.display=(i===n)?'block':'none';
    var chev=document.getElementById('evchev-'+k);if(chev)chev.textContent=(i===n)?'▾':'▸';
    var chip=document.getElementById('evchip-'+i);
    if(chip){
      var active=(i===n),done=(i<n);
      chip.style.background=active?'var(--blue)':(done?'var(--green-bg)':'var(--bg-secondary)');
      chip.style.color=active?'#fff':(done?'var(--green)':'var(--text-secondary)');
      chip.style.borderColor=active?'var(--blue)':(done?'var(--green)':'var(--border-tertiary)');
      var nEl=chip.querySelector('.ev-chip-n');if(nEl){nEl.textContent=done?'✓':(i+1);nEl.style.background=active?'rgba(255,255,255,0.25)':(done?'var(--green-bg)':'rgba(255,255,255,0.12)');}
    }
  });
  var ac=document.getElementById('evchip-'+n);if(ac&&ac.scrollIntoView){try{ac.scrollIntoView({inline:'center',block:'nearest'});}catch(e){}}
  if(noScroll)return;
  var sec=document.getElementById('evsec-'+keys[n]);
  if(sec){
    var hd=document.querySelector('.header');var hh=hd?hd.offsetHeight:0;
    var pbEl=document.getElementById('ev-prog');var ph=pbEl?pbEl.offsetHeight:0;
    var y=sec.getBoundingClientRect().top+(window.pageYOffset||0)-hh-ph-8;
    try{window.scrollTo({top:y,behavior:'smooth'});}catch(e){window.scrollTo(0,y);}
  }
}

// --- ⑧-b フル評価の前回値ゴースト＋差分色＋スパークライン ---
// kind='pain'|'rom'|'mmt'|'circ'。編集中のeval(excludeId)を除いた直近の生値 {v,date} を返す（無ければnull）
function evPrevVal(evals,kind,key,excludeId){
  var sorted=(evals||[]).slice().sort(function(a,b){
    var d=(b.date||'').localeCompare(a.date||'');
    if(d!==0)return d;
    return (b.inputAt||'').localeCompare(a.inputAt||'');
  });
  for(var i=0;i<sorted.length;i++){
    var ev=sorted[i];
    if(excludeId!=null&&idEq(ev.id,excludeId))continue;
    var obj=ev[kind];
    if(obj&&typeof obj==='object'&&obj[key]!=null&&obj[key]!=='')return{v:obj[key],date:ev.date};
  }
  return null;
}
// 昇順の数値時系列（スパークライン用）。mmtはMMT_ORDERのindex、他はparseFloat。非数値は除外。
function evSeriesFull(evals,kind,key){
  var sorted=(evals||[]).slice().sort(function(a,b){
    var d=(a.date||'').localeCompare(b.date||'');
    if(d!==0)return d;
    return (a.inputAt||'').localeCompare(b.inputAt||'');
  });
  var out=[];
  sorted.forEach(function(ev){
    var obj=ev[kind];if(!obj||typeof obj!=='object')return;
    var raw=obj[key];if(raw==null||raw==='')return;
    var num;
    if(kind==='mmt'){num=MMT_ORDER.indexOf(String(raw));if(num<0)return;}
    else{num=parseFloat(raw);if(isNaN(num))return;}
    out.push({date:ev.date,v:num});
  });
  return out;
}
// 入力のたびに前回比を表示（data-*から前回値/向き/表示先を取得）。
// data-dir='none' は良し悪しを断定せず数値差のみ灰色表示（ROM/周径）。data-ord='1' はMMT順序型（段数差）。
function evLiveDiff(el){
  var diffId=el.getAttribute('data-diff');if(!diffId)return;
  var dEl=document.getElementById(diffId);if(!dEl)return;
  var prevStr=el.getAttribute('data-prev');
  var dir=el.getAttribute('data-dir')||'up';
  var ord=el.getAttribute('data-ord')==='1';
  var unit=el.getAttribute('data-unit')||'';
  var raw=el.value;
  if(raw===''||raw==null||prevStr===''||prevStr==null){dEl.textContent='';return;}
  var cur,prev;
  if(ord){cur=MMT_ORDER.indexOf(String(raw));prev=MMT_ORDER.indexOf(String(prevStr));if(cur<0||prev<0){dEl.textContent='';return;}}
  else{cur=parseFloat(raw);prev=parseFloat(prevStr);if(isNaN(cur)||isNaN(prev)){dEl.textContent='';return;}}
  var d=Math.round((cur-prev)*100)/100;
  var suffix=ord?'段':unit;
  if(d===0){dEl.textContent='前回比 ±0';dEl.style.color='var(--text-secondary)';return;}
  var txt='前回比 '+(d>0?'+':'')+d+suffix;
  if(dir==='none'){dEl.textContent=txt;dEl.style.color='var(--text-secondary)';return;}
  var improved=dir==='down'?d<0:d>0;
  dEl.textContent=txt+(improved?'（改善）':'（悪化）');
  dEl.style.color=improved?'var(--green)':'var(--red)';
}
// 保存時の改善サマリー。良し悪しが一意に定まる痛み(down)・筋力MMT(up)だけを対象に集計（ROM/周径は向き不定なので数えない）
function evImprovementSummary(evals,entered,excludeId){
  var improved=0,total=0;
  [['pain','down'],['mmt','up']].forEach(function(pair){
    var kind=pair[0],dir=pair[1],obj=entered[kind]||{};
    Object.keys(obj).forEach(function(k){
      var pr=evPrevVal(evals,kind,k,excludeId);if(!pr)return;
      var cur,pv;
      if(kind==='mmt'){cur=MMT_ORDER.indexOf(String(obj[k]));pv=MMT_ORDER.indexOf(String(pr.v));if(cur<0||pv<0)return;}
      else{cur=parseFloat(obj[k]);pv=parseFloat(pr.v);if(isNaN(cur)||isNaN(pv))return;}
      total++;
      if(cur===pv)return;
      if(dir==='down'?cur<pv:cur>pv)improved++;
    });
  });
  return{improved:improved,total:total};
}

function buildSOAPObjectiveDraft(iid){
  var inj=D.i.find(function(x){return idEq(x.id,iid);});if(!inj)return '';
  var ch=getChart(iid);var em=EVAL_MASTER[inj.part]||EVAL_MASTER['その他'];
  var evals=(ch.evals||[]).slice().sort(function(a,b){
    var d=(b.date||'').localeCompare(a.date||'');
    if(d!==0)return d;
    return (b.inputAt||'').localeCompare(a.inputAt||'');
  });
  if(!evals.length)return '';
  var ev=evals[0];var parts=[];
  PAIN_TYPES.forEach(function(pt){if(ev.pain&&ev.pain[pt.k]!=null&&ev.pain[pt.k]!=='')parts.push(pt.label+ev.pain[pt.k]+'/10');});
  (em.rom||[]).forEach(function(r){if(ev.rom&&ev.rom[r.k]!=null&&ev.rom[r.k]!=='')parts.push(r.label+ev.rom[r.k]+r.unit);});
  (em.mmt||[]).forEach(function(mm){if(ev.mmt&&ev.mmt[mm]!=null&&ev.mmt[mm]!=='')parts.push(mm+' MMT'+ev.mmt[mm]);});
  (em.circ||[]).forEach(function(c){if(ev.circ&&ev.circ[c]!=null&&ev.circ[c]!=='')parts.push(c+' '+ev.circ[c]+'cm');});
  if(!parts.length)return '';
  return '【'+(ev.date||'')+'の評価より】'+parts.join('、')+'。';
}

    '<button class="btn btn-sm" style="margin-top:8px" onclick="goEditInjury('+iid+')">予定日を変更</button>'+

function changeStage(iid,delta){
  var rh=D.r.find(function(x){return idEq(x.injId,iid);});if(!rh)return;
  var ns=rh.stage+delta;
  if(ns<0||ns>=STG.length)return;
  // 段階変更は臨床判断のため、確認＋実施者記録を必須にする
  var msg=delta>0?'リハビリ段階を「'+STG[ns]+'」に進めますか？':'リハビリ段階を「'+STG[ns]+'」に戻しますか？';
  if(!confirm(msg))return;
  rh.stage=ns;
  if(!rh.stageDates)rh.stageDates=[];
  rh.stageDates[ns]=todayStr();
  if(!rh.stageBy)rh.stageBy=[];
  rh.stageBy[ns]=myTrainer?myTrainer.name:'';
  svRec('r',rh);
  chartTab('return');
}
function toggleReturnCriteria(iid,el){
  var ch=getChart(iid);
  if(!ch.returnCriteria)ch.returnCriteria={};
  ch.returnCriteria[el.dataset.k]=el.checked;
  saveChart(ch);
}
function unresolveInj(iid){
  var inj=D.i.find(function(x){return idEq(x.id,iid);});if(!inj)return;
  inj.resolved=false;
  svRec('i',inj);
  renderChartTab();
}

function chartTab(t){
  curChartTab=t;
  document.querySelectorAll('.chart-tab').forEach(function(el){
    var oa=el.getAttribute('onclick')||'';
    var m=oa.match(/chartTab\('([^']+)'\)/);
    el.classList.toggle('ac',m&&m[1]===t);
  });
  renderChartTab();
}
function renderChartTab(){
  var iid=_chartIid;
  var body=document.getElementById('chart-body');
  if(!body)return;
  if(curChartTab==='overview')body.innerHTML=renderChartOverview(iid);
  else if(curChartTab==='timeline')body.innerHTML=renderChartTimeline(iid);
  else if(curChartTab==='diagnosis')body.innerHTML=renderChartDiagnosis(iid);
  else if(curChartTab==='eval'){body.innerHTML=renderChartEval(iid);setTimeout(function(){drawEvalCharts(iid);},50);}
  else if(curChartTab==='soap')body.innerHTML=renderChartSOAP(iid);
  else if(curChartTab==='return')body.innerHTML=renderChartReturn(iid);
  else if(curChartTab==='comment'){body.innerHTML=renderInjComments(iid,'trainer');setTimeout(function(){bindInjCommSubmit(iid,'trainer');},50);}
}

function goRehabPlayer(injId){window._subViewActive=true;
  var inj=(D.i||[]).find(function(x){return x.id===injId;});if(!inj)return;
  var p=D.p.find(function(x){return x.id===inj.pid;});if(!p)return;
  var plan=(D.rplan||[]).find(function(x){return x.injId===injId;});
  var logs=(D.rlog||[]).filter(function(l){return l.injId===injId;}).sort(function(a,b){return (b.date||"").localeCompare(a.date||"");});
  var tpl=plan&&plan.tplId?(D.rtpl||[]).find(function(x){return x.id===plan.tplId;}):null;
  var tomorrowCats=plan?plan.tomorrowCats||[]:[];
  var rh=(D.r||[]).find(function(x){return x.injId===injId;});
  var _qch=getChart(injId);

  var h='<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">'+avH(p,38)+
  '<div><div style="font-size:17px;font-weight:600">'+escapeHtml(p.name)+'</div>'+
  '<div style="font-size:12px;color:var(--text-secondary)">'+(inj.side||'')+inj.part+' '+inj.type+'</div>'+
  (rh?'<div style="font-size:12px;color:var(--green);font-weight:600">段階: '+STG[rh.stage]+'</div>':'')+
  '</div></div>';
  // 電子カルテへの入口
  h+='<button class="btn btn-p" style="width:100%;margin-bottom:14px" onclick="openChart('+injId+')">📋 電子カルテを開く（評価・診断・SOAP）</button>';

  // 段階タイムライン
  if(rh){
    var dl=inj.returnDate?Math.max(0,Math.ceil((new Date(inj.returnDate)-new Date())/86400000)):null;
    h+='<div class="form-box"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">'+
    '<div class="form-title" style="margin-bottom:0">リハビリ段階</div>'+
    (dl!==null?'<span class="bd bd-b">復帰まで約'+dl+'日</span>':'')+
    '</div><div style="display:flex;align-items:flex-start;gap:0;overflow-x:auto;padding-bottom:6px">';
    for(var idx=0;idx<STG.length;idx++){
      var isDone=idx<rh.stage,isCur=idx===rh.stage;
      var sd=rh.stageDates&&rh.stageDates[idx]?rh.stageDates[idx]:'';
      h+='<div style="display:flex;flex-direction:column;align-items:center;min-width:64px;flex:1;position:relative">'+
      (idx<STG.length-1?'<div style="position:absolute;top:13px;left:50%;width:100%;height:2.5px;background:'+(isDone?'var(--green)':'var(--border-tertiary)')+';z-index:1"></div>':'')+
      '<div style="width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;z-index:2;border:2.5px solid '+(isDone?'var(--green)':isCur?'var(--blue)':'var(--border-tertiary)')+';background:'+(isDone?'var(--green)':isCur?'var(--blue)':'var(--bg-primary)')+';color:'+(isDone||isCur?'#fff':'var(--text-secondary)')+'">'+( isDone?'✓':(idx+1))+'</div>'+
      '<div style="font-size:10px;color:var(--text-secondary);margin-top:3px;text-align:center;line-height:1.3">'+STG[idx]+'</div>'+
      (sd?'<div style="font-size:10px;color:var(--green);font-weight:600">'+fmt(sd)+'</div>':'')+
      '</div>';
    }
    h+='</div></div>';
  }

  // === ステップ0: 今日の変化チェック（安全ゲート）===
  window._chgChk={pain:null,night:null,swell:null};
  var chgQs=[{k:'pain',q:'前回よりも痛みが増えた'},{k:'night',q:'夜間痛（寝ている時の痛み）がある'},{k:'swell',q:'腫れ・熱感が増えた'}];
  h+='<div class="form-box" style="border-left:3px solid var(--red)">'+
  '<div class="form-title">🚦 今日の変化チェック</div>'+
  '<div style="font-size:12px;color:var(--text-secondary);margin-bottom:12px">リハビリを始める前に確認します。1つでも「はい」があれば、今日は中断してスタッフに連絡します。</div>';
  chgQs.forEach(function(o){
    h+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">'+
    '<span style="font-size:14px;flex:1;line-height:1.4">'+o.q+'</span>'+
    '<div style="display:flex;gap:6px;flex-shrink:0">'+
    '<button id="cc-'+o.k+'-y" onclick="setChgChk(\''+o.k+'\',true,'+injId+')" style="padding:8px 16px;border-radius:var(--radius);border:1.5px solid var(--border-secondary);background:var(--bg-secondary);color:var(--text-primary);font-size:13px;font-weight:600;cursor:pointer;min-width:56px">はい</button>'+
    '<button id="cc-'+o.k+'-n" onclick="setChgChk(\''+o.k+'\',false,'+injId+')" style="padding:8px 16px;border-radius:var(--radius);border:1.5px solid var(--border-secondary);background:var(--bg-secondary);color:var(--text-primary);font-size:13px;font-weight:600;cursor:pointer;min-width:56px">いいえ</button>'+
    '</div></div>';
  });
  h+='<div id="chgchk-result" style="margin-top:12px">'+renderChgChkGate(injId)+'</div>'+
  '</div>';

  // 前回の記録
  var lastLog=logs.length?logs[0]:null;
  if(lastLog){
    h+='<div class="form-box" style="border-left:3px solid var(--amber)">';
    h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">'+
    '<div><div class="form-title" style="margin-bottom:2px">📋 前回の記録</div>'+
    '<div style="font-size:12px;color:var(--text-secondary)">'+fmt(lastLog.date)+' / '+(lastLog.implementer||lastLog.by||'記録者不明')+'</div></div></div>';
    // 前回の評価（脳震盪=旧preCheck方式、非脳震盪=同日のクイック評価chart.evalsを参照）
    if(_qch.isConcussion){
      if(lastLog.preCheck){
        var pc=lastLog.preCheck;
        h+='<div style="background:var(--bg-primary);border-radius:var(--radius);padding:8px;margin-bottom:8px">';
        h+='<div style="font-size:11px;font-weight:600;color:var(--text-secondary);margin-bottom:6px">評価</div>';
        if(pc.pain!=null)h+='<div style="font-size:13px;margin-bottom:4px">痛み: <b style="color:'+(pc.pain<=3?'var(--green)':pc.pain<=6?'var(--amber)':'var(--red)')+'">'+pc.pain+'/10</b></div>';
        if(pc.roms&&pc.roms.length)pc.roms.forEach(function(r){h+='<div style="font-size:13px;margin-bottom:2px">'+escapeHtml(r.joint)+': <b>'+r.angle+'°</b></div>';});
        if(pc.strengths&&pc.strengths.length)pc.strengths.forEach(function(s){h+='<div style="font-size:13px;margin-bottom:2px">'+escapeHtml(s.name)+': <b>'+s.value+'</b></div>';});
        if(pc.feeling)h+='<div style="font-size:12px;color:var(--text-secondary);margin-top:4px;border-top:0.5px solid var(--border-tertiary);padding-top:4px">感覚: '+escapeHtml(pc.feeling)+'</div>';
        h+='</div>';
      }
    } else {
      var sameEv=sameDayEval(_qch.evals,lastLog.date);
      if(sameEv){
        var evPv=evalPainVal(sameEv);
        var evMvs=evalMetricVals(_qch,sameEv);
        h+='<div style="background:var(--bg-primary);border-radius:var(--radius);padding:8px;margin-bottom:8px">';
        h+='<div style="font-size:11px;font-weight:600;color:var(--text-secondary);margin-bottom:6px">評価（クイック評価）</div>';
        if(evPv!=null)h+='<div style="font-size:13px;margin-bottom:4px">痛み: <b style="color:'+(evPv<=3?'var(--green)':evPv<=6?'var(--amber)':'var(--red)')+'">'+evPv+'/10</b></div>';
        evMvs.forEach(function(mv){h+='<div style="font-size:13px;margin-bottom:2px">'+escapeHtml(mv.name)+': <b>'+mv.val+escapeHtml(mv.unit)+'</b></div>';});
        if(sameEv.note)h+='<div style="font-size:12px;color:var(--text-secondary);margin-top:4px;border-top:0.5px solid var(--border-tertiary);padding-top:4px">メモ: '+escapeHtml(sameEv.note)+'</div>';
        h+='</div>';
      }
    }
    // 前回の種目
    if(lastLog.exercises&&lastLog.exercises.length){
      h+='<div style="font-size:11px;font-weight:600;color:var(--text-secondary);margin-bottom:4px">実施内容</div>';
      lastLog.exercises.forEach(function(e){
        h+='<div style="font-size:12px;padding:3px 0;display:flex;align-items:center;gap:6px">'+
        '<span style="color:'+(e.done?'var(--green)':'var(--text-tertiary)')+'">'+(e.done?'✓':'✗')+'</span>'+
        '<span style="flex:1">'+(e.done?'<b>':'<span style="color:var(--text-tertiary)">')+escapeHtml(e.name)+(e.done?'</b>':'</span>')+
        (e.sets?' '+e.sets+'セット':'')+( e.reps?' × '+e.reps+'回':'')+'</span>'+
        (e.comment?'<span style="font-size:11px;color:var(--text-secondary)">'+escapeHtml(e.comment)+'</span>':'')+
        '</div>';
      });
    }
    if(lastLog.comment)h+='<div style="font-size:12px;color:var(--text-secondary);margin-top:8px;padding-top:6px;border-top:0.5px solid var(--border-tertiary)">💬 '+escapeHtml(lastLog.comment)+'</div>';
    h+='</div>';
  } else {
    h+='<div class="alert-card alert-info" style="margin-bottom:10px">📋 前回の記録はまだありません</div>';
  }

  // テンプレ・次回メニュー表示
  if(tpl||tomorrowCats.length){
    h+='<div class="form-box">';
    if(tpl)h+='<div style="font-size:13px;font-weight:600;margin-bottom:6px">📋 '+escapeHtml(tpl.name)+'</div>';
    if(tomorrowCats.length){
      h+='<div style="font-size:11px;font-weight:600;color:var(--text-secondary);margin-bottom:4px">本日のメニュー</div>'+
      '<div style="display:flex;flex-wrap:wrap;gap:4px">'+
      tomorrowCats.map(function(c){return'<span style="background:'+RCAT_BG[c]+';color:'+RCAT_COLOR[c]+';padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600">'+c+'</span>';}).join('')+
      '</div>';
    }
    h+='</div>';
  }

  // 評価入力：脳震盪でなければクイック評価（chart.metrics連動）、脳震盪は従来の自由入力式（数値評価対象外なので所見メモ主体）
  if(!_qch.isConcussion){
    h+=renderQuickEvalCard(injId);
  } else {

function collectPreCheck(lastLog){
  if(!window._preCheckOpen)return null;
  var pain=parseInt((document.getElementById('pc-pain')||{}).value);
  var feeling=(document.getElementById('pc-feeling')||{}).value||'';
  var roms=[];
  for(var ri=1;ri<=window._romCount;ri++){
    var j=(document.getElementById('rom-joint-'+ri)||{}).value;
    var a=parseFloat((document.getElementById('rom-angle-'+ri)||{}).value);
    if(j&&!isNaN(a)){
      var prevRom=lastLog&&lastLog.preCheck&&lastLog.preCheck.roms?lastLog.preCheck.roms.find(function(r){return r.joint===j;}):null;
      var diff=prevRom?Math.round((a-prevRom.angle)*10)/10:null;
      roms.push({joint:j,angle:a,diff:diff});
    }
  }
  var strengths=[];
  for(var si=1;si<=window._strengthCount;si++){
    var n=(document.getElementById('str-name-'+si)||{}).value;
    var v=parseFloat((document.getElementById('str-val-'+si)||{}).value);
    if(n&&!isNaN(v)){
      var prevStr=lastLog&&lastLog.preCheck&&lastLog.preCheck.strengths?lastLog.preCheck.strengths.find(function(s){return s.name===n;}):null;
      var sdiff=prevStr?Math.round((v-prevStr.value)*10)/10:null;
      strengths.push({name:n,value:v,diff:sdiff});
    }
  }
  return{pain:isNaN(pain)?null:pain,roms:roms,strengths:strengths,feeling:feeling};
}

// === ステップ⑤-b: クイック評価（痛み＋★重要指標・chart.metrics連動）===
// metricの値がevalレコードのどのフィールド/キーに入るかを解決（Phase0のev.rom/circ/fit・健側枠と整合）
function metricEvalRef(m){
  if(m.kind==='rom'&&m.evalKey)return{f:'rom',hf:'romH',k:m.evalKey,str:true};
  if(m.kind==='circ'&&m.evalKey)return{f:'circ',hf:'circH',k:m.evalKey,str:false};
  // strength(定量kg)・fitness・evalKey無しのrom/circ は fit/fitH に metric.id で格納
  return{f:'fit',hf:'fitH',k:'m_'+m.id,str:false};
}
// evalレコードから指定metricの数値を取り出す（患側/健側）。無ければnull
function readEvalMetric(rec,ref,healthy){
  var obj=rec[healthy?ref.hf:ref.f];
  if(!obj)return null;
  var v=obj[ref.k];
  if(v==null||v==='')return null;
  var n=parseFloat(v);
  return isNaN(n)?null:n;
}
// 指定日付のevalのうち最新（inputAt降順）のものを返す。無ければnull（rlog記録日とクイック評価を紐付ける用）
function sameDayEval(evals,date){
  var matches=(evals||[]).filter(function(ev){return ev.date===date;});
  if(!matches.length)return null;
  matches.sort(function(a,b){return (b.inputAt||'').localeCompare(a.inputAt||'');});
  return matches[0];
}
// evalの運動時痛み値（motion）。無ければnull
function evalPainVal(ev){return ev&&ev.pain&&ev.pain.motion!=null?ev.pain.motion:null;}
// ch.metricsのうちevに値がある指標だけ{name,unit,val}で返す（履歴カードの読み手用）
function evalMetricVals(ch,ev){
  var out=[];
  (ch.metrics||[]).forEach(function(m){
    var ref=metricEvalRef(m);
    var v=readEvalMetric(ev,ref,false);
    if(v!=null)out.push({name:m.name||'',unit:m.unit||'',val:v});
  });
  return out;
}
// 指定metricについて、最新の患側値を持つevalから {patient,healthy,date} を返す（date→inputAtの2段ソート）
function latestEvalForMetric(evals,m){
  var ref=metricEvalRef(m);
  var sorted=(evals||[]).slice().sort(function(a,b){
    var d=(b.date||'').localeCompare(a.date||'');
    if(d!==0)return d;
    return (b.inputAt||'').localeCompare(a.inputAt||'');
  });
  for(var i=0;i<sorted.length;i++){
    var pv=readEvalMetric(sorted[i],ref,false);
    if(pv!=null)return{patient:pv,healthy:readEvalMetric(sorted[i],ref,true),date:sorted[i].date};
  }
  return null;
}
// 最新の痛み（運動時motion優先、無ければ全PAIN_TYPESのmax）
function latestPainVal(evals){
  var sorted=(evals||[]).slice().sort(function(a,b){
    var d=(b.date||'').localeCompare(a.date||'');
    if(d!==0)return d;
    return (b.inputAt||'').localeCompare(a.inputAt||'');
  });
  for(var i=0;i<sorted.length;i++){
    var p=sorted[i].pain;
    if(p&&typeof p==='object'){
      if(p.motion!=null)return{val:p.motion,date:sorted[i].date};
      var mx=null;PAIN_TYPES.forEach(function(pt){if(p[pt.k]!=null&&(mx==null||p[pt.k]>mx))mx=p[pt.k];});
      if(mx!=null)return{val:mx,date:sorted[i].date};
    }
  }
  return null;
}
// direction考慮の左右比%（患健の対称性・0除算/NaN/Infガード）。>=90%で左右差ほぼ解消の目安。
function symPct(patient,healthy,direction){
  if(patient==null||healthy==null||isNaN(patient)||isNaN(healthy))return null;
  var num,den;
  if(direction==='down'){num=healthy;den=patient;}else{num=patient;den=healthy;}
  if(den===0)return num===0?100:null;
  var pct=num/den*100;
  if(!isFinite(pct))return null;
  return Math.round(pct);
}
// 指定metricの患側値の時系列（昇順 date→inputAt）。スパークライン用。[{date,v}]
function metricSeries(evals,m){

// 痛み（運動時motion優先、無ければ全PAIN_TYPESのmax）の時系列（昇順）。[{date,v}]

// ネオン系ミニスパークライン（純SVG・Chart.js不使用）。pts=[{date,v}]昇順。
// 2点未満は''（推移が描けない）。min==max（横ばい）は中央の水平線。direction基準で終点ドットを色分け（改善=緑/悪化=赤/横ばい=青）。
function sparklineSVG(pts,direction,idsfx){
  pts=(pts||[]).filter(function(p){return p&&p.v!=null&&!isNaN(p.v);});
  if(pts.length>12)pts=pts.slice(-12);
  if(pts.length<2)return '';
  idsfx=String(idsfx==null?'':idsfx).replace(/[^a-zA-Z0-9_]/g,'');
  var W=300,H=40,padX=6,padT=8,padB=8,n=pts.length;
  var vals=pts.map(function(p){return p.v;});
  var mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals),span=mx-mn;
  var X=function(i){return Math.round((padX+(W-2*padX)*(i/(n-1)))*10)/10;};
  var Y=function(v){var y=span===0?H/2:padT+(H-padT-padB)*(1-(v-mn)/span);return Math.round(y*10)/10;};
  var pointStr=pts.map(function(p,i){return X(i)+','+Y(p.v);}).join(' ');
  var first=vals[0],last=vals[n-1],flat=last===first;
  var improved=direction==='down'?last<first:last>first;
  // direction==='none' は良し悪しを断定しない項目（ROM/周径など向きが部位で反転しうる）＝終点は常に青
  var endCol=(direction==='none'||flat)?'var(--blue)':(improved?'var(--green)':'var(--red)');
  var lx=X(n-1),ly=Y(last);
  var sg='sg_'+idsfx,sa='sa_'+idsfx;
  var areaStr='M'+X(0)+','+(H-padB)+' L'+pointStr.split(' ').join(' L')+' L'+lx+','+(H-padB)+' Z';
  var s='<svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none" style="width:100%;height:38px;display:block;overflow:visible">';
  s+='<defs><linearGradient id="'+sg+'" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#3B82F6"/><stop offset="1" stop-color="#A78BFA"/></linearGradient>';
  s+='<linearGradient id="'+sa+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#3B82F6" stop-opacity="0.28"/><stop offset="1" stop-color="#3B82F6" stop-opacity="0"/></linearGradient></defs>';
  s+='<path d="'+areaStr+'" fill="url(#'+sa+')" stroke="none"/>';
  s+='<polyline points="'+pointStr+'" fill="none" stroke="url(#'+sg+')" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.35" vector-effect="non-scaling-stroke"/>';
  s+='<polyline points="'+pointStr+'" fill="none" stroke="url(#'+sg+')" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke"/>';
  s+='<circle cx="'+lx+'" cy="'+ly+'" r="5.5" fill="'+endCol+'" opacity="0.25"/>';
  s+='<circle cx="'+lx+'" cy="'+ly+'" r="2.8" fill="'+endCol+'"/>';
  s+='</svg>';
  return s;
}
// スパークライン脇の推移キャプション（N回・↗改善/↘悪化/→横ばい）。direction基準。2点未満は''
function sparkCaption(pts,direction){
  if(!pts||pts.length<2)return '';
  var first=pts[0].v,last=pts[pts.length-1].v,flat=last===first;
  var improved=direction==='down'?last<first:last>first;
  var arrow=flat?'→':(last>first?'↗':'↘'); // 矢印は数値の増減（スパークラインの見た目と一致）、色で良し悪しを表す
  // direction==='none' は良し悪しを断定しない＝色はニュートラル（矢印だけで数値の増減を示す）
  var col=(direction==='none'||flat)?'var(--text-secondary)':(improved?'var(--green)':'var(--red)');
  return '<span style="white-space:nowrap"><span style="font-size:10px;color:var(--text-tertiary)">'+pts.length+'回</span> <span style="font-size:13px;font-weight:700;color:'+col+'">'+arrow+'</span></span>';
}

// === 怪我×リハビリ連携 Phase2: 不足ゲージ（読み取り＋描画のみ・書込なし）===
// 数値の軽い整形（小数1桁まで・末尾0除去）。null/NaNは''
function fmtNum(n){if(n==null||isNaN(n))return'';var r=Math.round(Number(n)*10)/10;return String(r);}
// 2日付(YYYY-MM-DD)の日数差 to-from（floor）。無効はNaN
function daysBetween(from,to){return Math.floor((new Date(to)-new Date(from))/86400000);}
// 健側値を持つ最新evalを独立に探索（患側最新と同じevalとは限らない）。{val,date}|null
function latestHealthyForMetric(evals,m){
  var ref=metricEvalRef(m);
  var sorted=(evals||[]).slice().sort(function(a,b){
    var d=(b.date||'').localeCompare(a.date||'');
