<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rugby Manager - 選手管理システム</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0F1B2D;--navy-2:#16263E;--navy-3:#1E3251;--navy-hover:#22395C;
  --accent:#3B82F6;--accent-d:#2563EB;--accent-glow:rgba(59,130,246,.35);
  --blue:#2563EB;--blue-bg:#E8F0FE;--green:#0E9F6E;--green-bg:#E3F5EE;--red:#DC2B2B;--red-bg:#FCEBEB;--amber:#B45309;--amber-bg:#FBF0DD;--purple:#6D52D6;--purple-bg:#EEEAFB;
  --bg-primary:#ffffff;--bg-secondary:#F4F6FA;--bg-tertiary:#EAEEF5;--bg-app:#EEF1F6;
  --text-primary:#101828;--text-secondary:#5A6473;--text-tertiary:#98A2B3;
  --border-secondary:rgba(16,24,40,0.16);--border-tertiary:rgba(16,24,40,0.08);
  --shadow-sm:0 1px 3px rgba(16,24,40,.06),0 1px 2px rgba(16,24,40,.04);--shadow-md:0 4px 16px rgba(16,24,40,.10);--shadow-lg:0 12px 32px rgba(16,24,40,.14);
  --font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans JP',sans-serif;--radius:10px;--radius-lg:14px}
body{font-family:var(--font-sans);background:var(--bg-app);color:var(--text-primary);line-height:1.5;-webkit-font-smoothing:antialiased}
.app{display:flex;height:100vh}
.sb{width:236px;flex-shrink:0;background:linear-gradient(180deg,#11203A 0%,var(--navy) 100%);color:#C3CEDE;display:flex;flex-direction:column;overflow-y:auto;box-shadow:2px 0 16px rgba(0,0,0,.25);position:relative;z-index:6}
.sb-hd{padding:1.4rem 1.2rem;border-bottom:1px solid rgba(255,255,255,.08);background:rgba(59,130,246,.06)}.sb-hd h1{font-size:17px;font-weight:700;color:#fff;letter-spacing:.02em;display:flex;align-items:center;gap:9px}.sb-hd p{font-size:10px;color:#7E8FA8;margin-top:4px;letter-spacing:.12em;font-weight:600}
.ni{display:flex;align-items:center;gap:11px;padding:10px 1.2rem;cursor:pointer;font-size:13px;color:#9FB0C8;border-left:3px solid transparent;transition:all .15s;font-weight:500}
.ni-ic{width:20px;height:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:.75;transition:all .15s}
.ni-ic svg{width:19px;height:19px}
.ni-group{font-size:10px;font-weight:700;color:#5E708C;opacity:.9;letter-spacing:.1em;padding:16px 1.2rem 5px;text-transform:uppercase}
.ni:hover{background:var(--navy-hover);color:#fff}.ni:hover .ni-ic{opacity:1}
.ni.ac{background:linear-gradient(90deg,var(--navy-3),var(--navy-2));color:#fff;border-left-color:var(--accent);font-weight:600;box-shadow:inset 0 0 24px rgba(59,130,246,.12)}
.ni.ac .ni-ic{opacity:1;color:var(--accent)}
.mn{flex:1;overflow:hidden;display:flex;flex-direction:column;background:var(--bg-app)}
.tb{background:var(--bg-primary);border-bottom:1px solid var(--border-tertiary);padding:14px 1.6rem;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow-sm);z-index:5}.tb h2{font-size:17px;font-weight:700;color:var(--text-primary)}
.ct{flex:1;overflow-y:auto;padding:1.6rem;background:var(--bg-app)}
.btn{padding:8px 16px;border-radius:var(--radius);border:1px solid var(--border-secondary);background:var(--bg-primary);font-size:13px;cursor:pointer;color:var(--text-primary);transition:all .12s;font-family:var(--font-sans);font-weight:500}.btn:hover{background:var(--bg-secondary);border-color:var(--text-tertiary)}
.btn-p{background:var(--accent);color:#fff;border-color:var(--accent)}.btn-p:hover{background:var(--accent-d);box-shadow:0 2px 8px var(--accent-glow)}
.btn-d{color:var(--red);border-color:var(--red)}.btn-d:hover{background:var(--red-bg)}
.btn-s{color:var(--green);border-color:var(--green)}.btn-s:hover{background:var(--green-bg)}
.btn-back{color:var(--text-secondary);border:none;padding:7px 10px;background:none;font-size:13px;cursor:pointer;font-family:var(--font-sans);font-weight:500}.btn-back:hover{color:var(--accent)}
.btn-sm{padding:4px 10px;font-size:11px;width:auto}
.ipt{padding:9px 12px;border:1.5px solid var(--border-secondary);border-radius:var(--radius);background:var(--bg-primary);font-size:13px;color:var(--text-primary);font-family:var(--font-sans);width:100%}
.ipt:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
select.ipt{appearance:auto}textarea.ipt{resize:vertical;min-height:80px}
.bd{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600}
.bd-g{background:var(--green-bg);color:var(--green)}.bd-r{background:var(--red-bg);color:var(--red)}.bd-a{background:var(--amber-bg);color:var(--amber)}.bd-b{background:var(--blue-bg);color:var(--blue)}.bd-p{background:var(--purple-bg);color:var(--purple)}
.grid{display:grid;gap:12px}.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr 1fr}.g4{grid-template-columns:repeat(auto-fill,minmax(155px,1fr))}
.card{background:var(--bg-primary);border:1px solid var(--border-tertiary);border-radius:var(--radius-lg);padding:1.25rem;box-shadow:var(--shadow-sm);transition:all .15s}.card:hover{border-color:var(--border-secondary);box-shadow:var(--shadow-md)}
.card-click{cursor:pointer}.card-click:hover{border-color:var(--blue)}
.mc{background:var(--bg-primary);border:1px solid var(--border-tertiary);border-radius:var(--radius);padding:.75rem;text-align:center;box-shadow:var(--shadow-sm)}.mc .v{font-size:24px;font-weight:600}.mc .l{font-size:10px;color:var(--text-secondary);margin-top:3px}
.stat-tile{background:var(--bg-primary);border:1px solid var(--border-tertiary);border-radius:var(--radius-lg);padding:1.1rem 1rem;box-shadow:var(--shadow-sm);cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.stat-tile:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);border-color:var(--accent)}
.stat-tile::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--accent);opacity:0;transition:opacity .15s}.stat-tile:hover::before{opacity:1}
.stat-v{font-size:30px;font-weight:800;line-height:1;letter-spacing:-.02em}
.stat-l{font-size:11px;color:var(--text-secondary);margin-top:7px;font-weight:500}
.chip-late{display:inline-block;padding:4px 11px;border-radius:99px;font-size:12px;font-weight:600;background:var(--amber-bg);color:var(--amber);border:1px solid transparent;transition:all .12s}.chip-late:hover{border-color:var(--amber)}
.player-hero{display:flex;align-items:center;gap:1.25rem;background:linear-gradient(135deg,var(--navy),var(--navy-2));border-radius:var(--radius-lg);padding:1.4rem 1.5rem;margin-bottom:1.25rem;color:#fff;box-shadow:var(--shadow-md);flex-wrap:wrap}
.player-hero-av .av{border:3px solid rgba(255,255,255,.2)}
.player-hero-main{flex:1;min-width:180px}
.player-hero-name{font-size:24px;font-weight:800;letter-spacing:-.01em}
.player-hero-meta{font-size:13px;color:#A9B8CE;margin-top:3px}
.status-pill{display:inline-block;padding:4px 12px;border-radius:99px;font-size:12px;font-weight:700;color:#fff}
.player-hero-stats{display:flex;gap:1.5rem}
.phs{text-align:center}.phs-v{font-size:22px;font-weight:800;line-height:1}.phs-l{font-size:10px;color:#A9B8CE;margin-top:5px}
@media(max-width:640px){.player-hero-stats{width:100%;justify-content:space-around;margin-top:10px;padding-top:14px;border-top:1px solid rgba(255,255,255,.12)}}
.chart-hero{background:linear-gradient(135deg,var(--navy),var(--navy-2));border-radius:var(--radius-lg);padding:1.25rem 1.4rem;margin-bottom:0;box-shadow:var(--shadow-md)}
.chart-tabs{display:flex;gap:4px;overflow-x:auto;background:var(--bg-primary);border-radius:var(--radius);padding:5px;margin:14px 0 16px;box-shadow:var(--shadow-sm);-webkit-overflow-scrolling:touch}
.chart-tab{flex-shrink:0;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;color:var(--text-secondary);cursor:pointer;white-space:nowrap;transition:all .15s}
.chart-tab:hover{background:var(--bg-secondary);color:var(--text-primary)}
.chart-tab.ac{background:var(--accent);color:#fff}
.soap-line{display:flex;gap:8px;align-items:flex-start;margin-bottom:6px;font-size:13px;line-height:1.5}
.soap-tag{flex-shrink:0;width:22px;height:22px;border-radius:6px;color:#fff;font-weight:800;font-size:12px;display:inline-flex;align-items:center;justify-content:center}
.fl{display:flex;flex-direction:column;gap:5px}.fl label{font-size:12px;color:var(--text-secondary);font-weight:600}
.form-box{background:var(--bg-secondary);border:1px solid var(--border-tertiary);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1.25rem}
.form-title{font-size:12px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.04em;margin-bottom:14px}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border-tertiary);margin-bottom:1.25rem}
.tab{padding:10px 16px;font-size:13px;cursor:pointer;color:var(--text-secondary);border-bottom:2.5px solid transparent;margin-bottom:-1px;font-weight:500}.tab.ac{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}
.tc{display:none}.tc.ac{display:block}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0;overflow:hidden;background-size:cover;background-position:center}
.pcard{cursor:pointer;text-align:center;transition:all .18s}.pcard:hover{transform:translateY(-3px);border-color:var(--blue);box-shadow:var(--shadow-md)}
.no{text-align:center;padding:2rem;color:var(--text-secondary);font-size:13px}
.stage-line{display:flex;align-items:flex-start;gap:0;margin:1rem 0;overflow-x:auto;padding-bottom:6px}
.stage-item{display:flex;flex-direction:column;align-items:center;min-width:72px;flex:1;position:relative}
.stage-dot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;z-index:2;border:2.5px solid var(--border-tertiary);background:var(--bg-primary);color:var(--text-secondary)}
.stage-dot.done{background:var(--green);border-color:var(--green);color:#fff}.stage-dot.cur{background:var(--blue);border-color:var(--blue);color:#fff}
.stage-label{font-size:9px;color:var(--text-secondary);margin-top:4px;text-align:center;line-height:1.3}
.stage-est{font-size:8px;color:var(--text-tertiary);margin-top:1px}.stage-date{font-size:8px;color:var(--green);margin-top:1px;font-weight:600}
.stage-conn{position:absolute;top:15px;left:50%;width:100%;height:2.5px;background:var(--border-tertiary);z-index:1}.stage-conn.done{background:var(--green)}
.alert-card{padding:.65rem .85rem;border-radius:var(--radius);margin-bottom:6px;font-size:12px;display:flex;align-items:center;gap:8px;font-weight:500}
.alert-up{background:var(--green-bg);color:var(--green);border-left:3px solid var(--green)}
.alert-down{background:var(--red-bg);color:var(--red);border-left:3px solid var(--red)}
.alert-warn{background:var(--amber-bg);color:var(--amber);border-left:3px solid var(--amber)}
.alert-info{background:var(--blue-bg);color:var(--blue);border-left:3px solid var(--blue)}
.rank-tbl{width:100%;border-collapse:collapse;font-size:13px}
.rank-tbl th{text-align:left;padding:8px 10px;border-bottom:1.5px solid var(--border-secondary);color:var(--text-secondary);font-weight:600;font-size:11px}
.rank-tbl td{padding:8px 10px;border-bottom:0.5px solid var(--border-tertiary)}.rank-tbl tr:hover td{background:var(--bg-secondary)}
.chart-wrap{position:relative;height:230px;margin:1rem 0}
.photo-up{width:90px;height:90px;border-radius:50%;border:2.5px dashed var(--border-secondary);display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;background:var(--bg-secondary);background-size:cover;background-position:center;flex-shrink:0;font-size:11px;color:var(--text-secondary);text-align:center;line-height:1.4}.photo-up:hover{border-color:var(--blue)}
.log-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:0.5px solid var(--border-tertiary);font-size:12px}.log-row:last-child{border-bottom:none}
.pain-dot{display:inline-flex;width:24px;height:24px;border-radius:50%;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff;flex-shrink:0}
.srch{display:flex;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap}.srch .ipt{width:auto}
.att-bar{display:flex;align-items:center;gap:8px;font-size:12px;margin-bottom:5px}
.cb-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:1px solid var(--border-tertiary);cursor:pointer;transition:background .1s}.cb-row:hover{background:var(--bg-secondary)}.cb-row.checked{background:var(--red-bg)}
.cb-box{width:20px;height:20px;border:2px solid var(--border-secondary);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}.cb-box.on{background:var(--red);border-color:var(--red);color:#fff}
.reason-ipt{margin-top:4px;padding:5px 8px;border:1px solid var(--border-secondary);border-radius:6px;font-size:12px;width:100%;background:var(--bg-primary);color:var(--text-primary);font-family:var(--font-sans)}
.ftg-cell{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 6px;border-radius:var(--radius);min-width:50px;text-align:center}
.ftg-val{font-size:16px;font-weight:600;line-height:1}.ftg-lbl{font-size:9px;color:var(--text-secondary)}
.p-search-wrap{position:relative}.p-search-list{position:absolute;top:100%;left:0;right:0;background:var(--bg-primary);border:1.5px solid var(--border-secondary);border-top:none;border-radius:0 0 var(--radius) var(--radius);max-height:200px;overflow-y:auto;z-index:10;display:none}
.p-search-list.open{display:block}
.p-search-item{padding:8px 12px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:8px;border-bottom:0.5px solid var(--border-tertiary)}.p-search-item:hover{background:var(--bg-secondary)}
.detail-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:0.5px solid var(--border-tertiary);font-size:13px}.detail-row:last-child{border-bottom:none}
.detail-label{color:var(--text-secondary);font-weight:600;min-width:100px}.detail-value{color:var(--text-primary);text-align:right}
@media(max-width:768px){.sb{width:56px}.sb-hd{display:none}.ni{padding:12px 0;justify-content:center}.ni span:last-child{display:none}.ni-ic{opacity:.85}.ni-group{display:none}.g2,.g3{grid-template-columns:1fr}.g4{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}.ct{padding:1rem}}
</style>
</head>
<body>
<div class="app">
<div class="sb">
<div class="sb-hd"><h1><svg width="22" height="22" viewBox="0 0 24 24" fill="#fff"><path d="M12 2C7 2 3 6 3 11c0 1.6.4 3.1 1.1 4.4l-1.8 4.8c-.2.6.4 1.2 1 .9l4.6-1.9C9.3 21.4 10.6 22 12 22c5 0 9-4 9-9s-4-9-9-9zm-2.5 6.5l1.5 1.5 1.5-1.5 1 1-1.5 1.5 1.5 1.5-1 1L12 11.5 10.5 13l-1-1L11 10.5 9.5 9l1-1z"/></svg> Rugby Manager</h1><p>FUKUOKA UNIV. RFC</p></div>
<div style="padding:.5rem 0">
<div class="ni-group">日々の確認</div>
<div class="ni ac" onclick="nav('dash')"><span class="ni-ic"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg></span><span>ダッシュボード</span></div>
<div class="ni" onclick="nav('players')"><span class="ni-ic"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg></span><span>選手一覧</span></div>
<div class="ni" onclick="nav('calendar')"><span class="ni-ic"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V9h14v10zM7 11h5v5H7z"/></svg></span><span>カレンダー</span></div>
<div class="ni-group">怪我・リハビリ</div>
<div class="ni" onclick="nav('injury')"><span class="ni-ic"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 8h-2v3h-3v2h3v3h2v-3h3v-2h-3zM4 8h6v2H4zm0 4h6v2H4zm0 4h6v2H4zM18 2H6c-1.1 0-2 .9-2 2v2h16V4c0-1.1-.9-2-2-2z"/></svg></span><span>怪我管理</span></div>
<div class="ni" onclick="nav('rehab')"><span class="ni-ic"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.57 14.86L22 13.43 20.57 12 17 15.57 8.43 7 12 3.43 10.57 2 9.14 3.43 7.71 2 5.57 4.14 4.14 2.71 2.71 4.14l1.43 1.43L2 7.71l1.43 1.43L2 10.57 3.43 12 7 8.43 15.57 17 12 20.57 13.43 22l1.43-1.43L16.29 22l2.14-2.14 1.43 1.43 1.43-1.43-1.43-1.43L22 16.29z"/></svg></span><span>リハビリ管理</span></div>
<div class="ni" onclick="nav('injstats')"><span class="ni-ic"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M3.5 18.49l6-6.01 4 4L22 6.92l-1.41-1.41-7.09 7.97-4-4L2 16.99z"/></svg></span><span>ケガ分析</span></div>
<div class="ni" onclick="nav('rtest')"><span class="ni-ic"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M14.4 6L14 4H5v17h2v-7h5.6l.4 2h7V6z"/></svg></span><span>復帰テスト</span></div>
<div class="ni" onclick="nav('tape')"><span class="ni-ic"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 8l-4 4h3c0 3.31-2.69 6-6 6-1.01 0-1.97-.25-2.8-.7l-1.46 1.46C8.97 19.54 10.43 20 12 20c4.42 0 8-3.58 8-8h3l-4-4zM6 12c0-3.31 2.69-6 6-6 1.01 0 1.97.25 2.8.7l1.46-1.46C15.03 4.46 13.57 4 12 4c-4.42 0-8 3.58-8 8H1l4 4 4-4H6z"/></svg></span><span>テーピング予約</span></div>
<div class="ni-group">コンディション・記録</div>
<div class="ni" onclick="nav('fatigue')"><span class="ni-ic"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-.5-13H10v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg></span><span>疲労度管理</span></div>
<div class="ni" onclick="nav('absence')"><span class="ni-ic"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm-2 14l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9z"/></svg></span><span>欠席管理</span></div>

function sv(k){db.collection('appdata').doc(k).set({data:JSON.stringify(D[k])}).catch(function(e){console.error('Save error:',k,e);});}
function svSafe(k,newRec,onDone){
  // Firestoreから最新取得→追加→保存（複数人同時書き込み対応）
  db.collection('appdata').doc(k).get().then(function(doc){
    var latest=[];if(doc.exists){try{var parsed=JSON.parse(doc.data().data);if(Array.isArray(parsed))latest=parsed;}catch(e){}}
    latest.push(newRec);D[k]=latest;
    return db.collection('appdata').doc(k).set({data:JSON.stringify(latest)});
  }).then(function(){if(onDone)onDone();}).catch(function(e){console.error('svSafe error:',k,e);alert('保存に失敗しました');});
}
// 配列を直接更新する場合のsvSafe
function svSafeUpdate(k,updateFn,onDone){
  db.collection('appdata').doc(k).get().then(function(doc){
    var latest=[];if(doc.exists){try{var parsed=JSON.parse(doc.data().data);if(Array.isArray(parsed))latest=parsed;}catch(e){}}
    latest=updateFn(latest);D[k]=latest;
    return db.collection('appdata').doc(k).set({data:JSON.stringify(latest)});
  }).then(function(){if(onDone)onDone();}).catch(function(e){console.error('svSafeUpdate error:',k,e);alert('保存に失敗しました');});
}

// ⑮ 学年チェック（4月1日以降に前回更新から1年経過していたら通知）
function checkYearUpdate(){
  var lastUpdate=localStorage.getItem('rm_year_update');
  var now=new Date();
  var thisApril=new Date(now.getFullYear(),3,1); // 4月1日
  if(now>=thisApril&&(!lastUpdate||new Date(lastUpdate)<thisApril)){
    if(confirm('新年度になりました！選手の学年を更新しますか？\n（4年生は自動的に削除候補としてマークされます）')){
      doYearUpdate();
    }
  }
}

function doYearUpdate(){
  var graduated=[];
  D.p.forEach(function(p){
    if(p.year>=4){
      graduated.push(p.name);
      p.graduated=true; // 卒業フラグ（削除しない）
      p.note=(p.note?p.note+' ':'')+'[卒業]';
    } else {
      p.year=Math.min(4,(p.year||1)+1);
    }
  });
  sv('p');
  localStorage.setItem('rm_year_update',new Date().toISOString());
  alert('学年を更新しました！\n卒業フラグ付与（手動削除してください）: '+graduated.join('、'));
  V.players&&V.players();
}

function startListeners(){
  Object.keys(SK).forEach(function(k){
    db.collection('appdata').doc(k).onSnapshot(function(doc){
      if(doc.exists){
        try{
          var parsed=JSON.parse(doc.data().data);
          if(k==='p'&&parsed.length>0)D[k]=parsed;
          else if(k!=='p')D[k]=parsed;
          // 入力中フォーム判定：input/textarea/selectがactiveElementなら再描画しない
          var ae=document.activeElement;
          var isInputting=ae&&(ae.tagName==='INPUT'||ae.tagName==='TEXTAREA'||ae.tagName==='SELECT');
          // viewStack内（編集画面）も再描画しない
          if(!isInputting&&curPage&&V[curPage]&&(!viewStack||viewStack.length===0)){
            try{
              V[curPage]();
              // 再描画後にハイライトを再適用
              document.querySelectorAll('.ni').forEach(function(el){
                var oa=el.getAttribute('onclick')||'';
                var mm=oa.match(/nav\(['"]([^'"]+)['"]\)/);
                el.classList.toggle('ac',mm&&mm[1]===curPage);
              });
            }catch(e){console.error('Re-render error:',e);}
          }
        }catch(e){}
      }
    });
  });
}

      var pInj=D.i.find(function(x){return idEq(x.pid,p.id)&&!x.resolved;});

  });
  var ai=D.i.filter(function(x){return!x.resolved;}).sort(function(a,b){return b.date.localeCompare(a.date);}).slice(0,6);
  // 来週復帰予定（来週月曜〜日曜）
  var today=new Date();

  var daysToNextMon=dow===0?1:8-dow;

  var nextSun=new Date(nextMon);nextSun.setDate(nextMon.getDate()+6);
  var nextMonS=toDateStr(nextMon);
  var nextSunS=toDateStr(nextSun);
  var returning=D.i.filter(function(x){return!x.resolved&&x.returnDate&&x.returnDate>=nextMonS&&x.returnDate<=nextSunS;});
  // New injuries pending approval (source match/player, not yet approved)
  var pendingInj=D.i.filter(function(x){return!x.resolved&&x.source&&!x.approved;}).sort(function(a,b){return b.date.localeCompare(a.date);});
  // Can't practice next week → 今週中のみ表示（日曜を過ぎたら消える）
  var thisWeekSun=new Date(today);thisWeekSun.setDate(today.getDate()+(7-today.getDay())%7||(7));
  // 今週月曜
  var thisWeekMon=new Date(today);thisWeekMon.setDate(today.getDate()-today.getDay()+1);
  var thisWeekMonS=toDateStr(thisWeekMon);
  var cantPrac=D.i.filter(function(x){

    // その怪我報告の日付が今週以降（先週以前なら消す）

  });
  // Match day check: find members who should check but haven't for today's match
  var todayMatchDate=todayStr();
  var selectedForMatch=D.matchsel||[];
  var matchDoneToday=D.md.filter(function(m){return m.date===todayMatchDate;}).map(function(m){return m.pid;});
  var matchNotDone=selectedForMatch.filter(function(pid){return matchDoneToday.indexOf(pid)<0;});
  // This week's calendar events for announce
  var thisWeekEvents=getThisWeekEvents();
  // ===== 本日の提出状況集計 =====
  // コンディション：全選手が毎日提出すべき
  var condSubmittedToday=D.f.filter(function(r){return r.date===todayS;}).map(function(r){return r.pid;});
  var condNotSubmitted=D.p.filter(function(p){
    return !condSubmittedToday.some(function(sid){return idEq(sid,p.id);});

  var condRate=tot>0?Math.round((tot-condNotSubmitted.length)/tot*100):0;
  // 体組成：測定会期間中のみ対象

  var bcNotSubmitted=[];

    bcNotSubmitted=D.p.filter(function(p){return!bcSubmitted.some(function(sid){return idEq(sid,p.id);});});
  }
  // 提出が遅い選手（昨日のコンディションを今日まで出していない）
  var yd=new Date();yd.setDate(yd.getDate()-1);var ydS=toDateStr(yd);
  var lateSubmitters=[];

    var hasYesterday=D.f.some(function(r){return idEq(r.pid,p.id)&&r.date===ydS;});
    var hasToday=D.f.some(function(r){return idEq(r.pid,p.id)&&r.date===todayS;});
    if(!hasYesterday&&!hasToday){

      lateSubmitters.push({pid:p.id,name:p.name,lastDate:lastRec?lastRec.date:null,daysSince:daysSince});

    var target=r.stageTargetDates[r.stage+1];
    if(!target)return;
    var targetDt=new Date(target);
    var nowDt=new Date(todayStr());

    }

  // 緊急: 新着怪我
  if(pendingInj.length){

    pendingInj.map(function(x){var p=D.p.find(function(pp){return pp.id===x.pid;});if(!p)return'';
      return'<div class="alert-card alert-down" style="justify-content:space-between;flex-wrap:wrap;gap:6px"><span style="flex:1">'+p.name+' — '+(x.side||'')+x.part+' '+x.type+' ('+fmt(x.date)+') '+(x.source==='match'?'【試合】':'【練習/その他】')+'</span><div style="display:flex;gap:6px"><button class="btn btn-sm btn-s" onclick="approveInjury('+x.id+')">怪我人に追加</button><button class="btn btn-sm btn-d" onclick="rejectInjury('+x.id+')">却下</button><button class="btn btn-sm" onclick="goInjuryDetail('+x.id+')">詳細</button></div></div>';

    '<div style="display:flex;gap:8px;align-items:center"><div style="font-size:12px;color:var(--text-secondary)">コンディション</div><div style="font-size:20px;font-weight:700;color:'+(condRate>=80?'var(--green)':condRate>=50?'var(--amber)':'var(--red)')+'">'+condRate+'%</div><div style="font-size:11px;color:var(--text-secondary)">('+(tot-condNotSubmitted.length)+'/'+tot+')</div></div>'+
    '</div>'+
    // プログレスバー
    '<div style="height:8px;background:var(--bg-tertiary);border-radius:99px;overflow:hidden;margin-bottom:14px"><div style="height:100%;width:'+condRate+'%;background:linear-gradient(90deg,'+(condRate>=80?'var(--green)':condRate>=50?'var(--amber)':'var(--red)')+','+(condRate>=80?'#34D399':condRate>=50?'#FBBF24':'#F87171')+');border-radius:99px;transition:width .4s"></div></div>'+
    (condNotSubmitted.length?'<div style="font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:6px">コンディション未提出 ('+condNotSubmitted.length+'名)</div>'+
      '<div style="display:flex;flex-wrap:wrap;gap:5px">'+condNotSubmitted.map(function(p){return'<span class="chip-late" onclick="goPlayerDetail('+p.id+')" style="cursor:pointer">'+escapeHtml(p.name)+'</span>';}).join('')+'</div>'
      :'<div style="font-size:12px;color:var(--green);font-weight:600">✅ 全員提出済み</div>')+

      '<div style="display:flex;flex-wrap:wrap;gap:5px">'+bcNotSubmitted.map(function(p){return'<span class="chip-late" onclick="goPlayerDetail('+p.id+')" style="cursor:pointer">'+escapeHtml(p.name)+'</span>';}).join('')+'</div>':'')+
    '</div>';

  // 提出遅延パネル（2日以上出していない選手）
  var bigLate=lateSubmitters.filter(function(l){return l.daysSince===null||l.daysSince>=2;});
  var latePanel='';

    latePanel='<div class="card" style="margin-bottom:1.25rem;padding:1.1rem 1.25rem;border-left:4px solid var(--amber)">'+

    '<div style="display:flex;flex-direction:column;gap:6px">'+bigLate.map(function(l){
      var label=l.daysSince===null?'一度も提出なし':l.daysSince+'日間未提出';

    }).join('')+'</div></div>';
  }

  $m().innerHTML='<div style="font-size:13px;font-weight:700;color:var(--text-secondary);margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em">📊 チーム状況</div>'+
  '<div class="grid g4" style="margin-bottom:1.25rem">'+
  '<div class="stat-tile" onclick="nav(\'players\')"><div class="stat-v">'+tot+'</div><div class="stat-l">登録選手</div></div>'+
  '<div class="stat-tile" style="cursor:default"><div class="stat-v" style="color:var(--green)">'+ok+'</div><div class="stat-l">コンディション正常</div></div>'+
  '<div class="stat-tile" onclick="nav(\'injury\')"><div class="stat-v" style="color:var(--red)">'+inj+'</div><div class="stat-l">怪我・リハビリ中</div></div>'+
  '<div class="stat-tile" style="cursor:default"><div class="stat-v" style="color:'+(condRate>=80?'var(--green)':condRate>=50?'var(--amber)':'var(--red)')+'">'+condRate+'<span style="font-size:14px">%</span></div><div class="stat-l">本日提出率</div></div>'+
  '</div>'+
  prioritySection+
  submissionPanel+
  latePanel+
  '<div class="grid g3"><div class="card"><div style="font-size:14px;font-weight:700;margin-bottom:.75rem">🏥 怪我中の選手</div>'+(ai.length?ai.map(function(i){var p=D.p.find(function(x){return x.id===i.pid;});if(!p)return'';return'<div class="log-row card-click" onclick="goInjuryDetail('+i.id+')">'+avH(p,26)+'<span style="font-weight:600;flex:1">'+p.name+'</span><span style="color:var(--text-secondary);font-size:11px">'+injLabel(i)+'</span><span class="bd '+(i.hospitalVisited?'bd-g':'bd-a')+'" style="font-size:9px">'+(i.hospitalVisited?'受診済':'未受診')+'</span></div>';}).join(''):'<div class="no">なし</div>')+'</div><div class="card"><div style="font-size:14px;font-weight:700;margin-bottom:.75rem">📋 欠席アラート</div>'+(aa.length?aa.map(function(a){return'<div class="alert-card alert-warn" style="cursor:pointer" onclick="goPlayerDetail('+a.pid+')">'+a.n+': '+a.c+'回</div>';}).join(''):'<div class="no">該当なし</div>')+'</div><div class="card"><div style="font-size:14px;font-weight:700;margin-bottom:.75rem">😴 疲労度アラート</div>'+(fa.length?fa.map(function(f){return'<div class="alert-card alert-down" style="cursor:pointer" onclick="goPlayerDetail('+f.pid+')">'+f.txt+'</div>';}).join(''):'<div class="no">該当なし</div>')+'</div></div>';
  // Add body comp missed alerts
  var isOff=(D.offday||[]).indexOf(todayStr())>=0;
  if(!isOff){var bcMissed=getDashBCAlerts();
  if(bcMissed.length)$m().innerHTML+='<div style="margin-top:1rem"><div style="font-size:14px;font-weight:600;margin-bottom:.5rem">⚖️ 体組成 未入力</div>'+bcMissed.map(function(n){return'<div class="alert-card alert-warn">'+n+': 未入力</div>';}).join('')+'</div>';}
  // 試合日チェック未入力（昨日の試合日）
  var yesterdayD=new Date();yesterdayD.setDate(yesterdayD.getDate()-1);

  var wasMatchYesterdayS=(D.cal||[]).some(function(e){return e.date===yesterdayDS&&e.type==='match';});

    var selectedForMatchS=D.matchsel||[];
    var matchMissedS=D.p.filter(function(p){
      return selectedForMatchS.indexOf(p.id)>=0&&!D.md.some(function(m){return m.pid===p.id&&m.date===yesterdayDS;});

    if(matchMissedS.length)$m().innerHTML+='<div style="margin-top:1rem"><div style="font-size:14px;font-weight:600;margin-bottom:.5rem">🏟️ 試合日チェック未入力 <span style="font-size:12px;color:var(--text-secondary)">'+fmt(yesterdayDS)+' / '+matchMissedS.length+'名</span></div>'+matchMissedS.map(function(p){return'<div class="alert-card alert-down" style="cursor:pointer" onclick="goPlayerDetail('+p.id+')">'+p.name+'</div>';}).join('')+'</div>';
  }
  // チームフィジカル記録
  var physFields=[
    {f:'squat',label:'SQ',higher:true,unit:'kg'},

  physFields.forEach(function(fd){

    });
    var val=best!==null?(fd.f==='bronco'?broncoFmt(best):best+fd.unit):'-';
    teamRecordsH+='<div class="mc"><div class="v" style="font-size:16px">'+val+'</div><div class="l">'+fd.label+(bestP?' / '+bestP.name:'')+'</div></div>';
  });
  teamRecordsH+='</div></div>';
  $m().innerHTML+=teamRecordsH;
  // Announcements section with calendar link
  $m().innerHTML+='<div style="margin-top:1.25rem"><div style="font-size:14px;font-weight:600;margin-bottom:.75rem">📢 お知らせ投稿（選手サイトに表示）</div>'+

  var recs=D.ph.filter(function(r){return!pf||String(r.pid)===pf;}).sort(function(a,b){return b.date.localeCompare(a.date);});
  var h='<div class="srch"><select class="ipt" style="width:auto" id="phypf" onchange="V.physical()"><option value="">全選手</option>'+D.p.map(function(p){return'<option value="'+p.id+'"'+(pf===String(p.id)?' selected':'')+'>'+p.name+'</option>';}).join('')+'</select><button class="btn" onclick="goMarkPhSkip()">測定なしを設定</button></div><div id="ph-alerts"></div>';
  if(pf)h+='<div class="chart-wrap"><canvas id="ch-phys"></canvas></div>';
  h+=recs.length?recs.slice(0,40).map(function(r){var p=D.p.find(function(x){return x.id===r.pid;});if(!p)return'';return'<div class="card" style="padding:.6rem 1rem;margin-bottom:5px"><div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">'+avH(p,26)+'<span style="font-weight:600">'+p.name+'</span><div><div style="color:var(--text-secondary);font-size:12px">'+fmt(r.date)+'</div>'+(r.inputAt?'<div style="font-size:10px;color:var(--text-secondary);opacity:.7">入力 '+fmtDateTime(r.inputAt)+(r.editedAt?' (修正済)':'')+'</div>':'')+'</div><span>SQ:'+(r.squat||'-')+'</span><span>BP:'+(r.bench||'-')+'</span><span>DL:'+(r.deadlift||'-')+'</span><span style="font-weight:600;color:var(--blue)">BIG3:'+big3(r)+'</span><span>Bronco:'+(r.bronco?broncoFmt(r.bronco):'-')+'</span><span style="margin-left:auto;display:flex;gap:4px"><button class="btn btn-sm" onclick="goEditPhys('+r.id+')">編集</button><button class="btn btn-sm btn-d" onclick="doDelPhys('+r.id+')">削除</button></span></div></div>';}).join(''):'<div class="no">記録なし</div>';
  $m().innerHTML=h;if(pf)setTimeout(function(){renderPhysChart(parseInt(pf));},60);renderPhysAlerts();
},
bodycomp:function(){
  var pf=document.getElementById('bcpf')?document.getElementById('bcpf').value:'';
  var recs=D.bc.filter(function(r){return!pf||String(r.pid)===pf;}).sort(function(a,b){var dd=b.date.localeCompare(a.date);return dd!==0?dd:(b.inputAt||'').localeCompare(a.inputAt||'');});
  var today=todayStr();
  var isOff=D.offday.indexOf(today)>=0;
  var pickup=isOff?[]:getTodayPickup();
  var missed=pickup.filter(function(pid){return!D.bc.some(function(r){return r.pid===pid&&r.date===today;});});
  var h='<div class="srch"><select class="ipt" style="width:auto" id="bcpf" onchange="V.bodycomp()"><option value="">全選手</option>'+D.p.map(function(p){return'<option value="'+p.id+'"'+(pf===String(p.id)?' selected':'')+'>'+p.name+'</option>';}).join('')+'</select><button class="btn'+(isOff?' btn-s':' btn-d')+'" style="margin-left:auto" onclick="toggleOffDay()">'+(!isOff?'本日を測定なしにする':'本日は測定なし（解除する）')+'</button></div>';
  if(isOff){h+='<div class="alert-card alert-info" style="margin-bottom:1rem">📅 本日は測定オフ日です</div>';}
  else{h+='<div class="card" style="margin-bottom:1rem"><div style="font-size:14px;font-weight:600;margin-bottom:8px">📋 本日の測定対象（5名）</div>'+
  (pickup.length?pickup.map(function(pid){var p=D.p.find(function(x){return x.id===pid;});if(!p)return'';var done=D.bc.some(function(r){return r.pid===pid&&r.date===today;});return'<div class="log-row">'+avH(p,26)+'<span style="font-weight:600;flex:1">'+p.name+'</span>'+(done?'<span class="bd bd-g">入力済み</span>':'<span class="bd bd-r">未入力</span>')+'</div>';}).join(''):'')+'</div>';
  if(missed.length)h+='<div class="alert-card alert-warn" style="margin-bottom:1rem">⚠️ 未入力: '+missed.map(function(pid){var p=D.p.find(function(x){return x.id===pid;});return p?p.name:'';}).join(', ')+'</div>';}
  if(pf)h+='<div class="chart-wrap"><canvas id="ch-bc"></canvas></div>';
  h+=recs.length?recs.slice(0,40).map(function(r){var p=D.p.find(function(x){return x.id===r.pid;});if(!p)return'';return'<div class="card" style="padding:.6rem 1rem;margin-bottom:5px"><div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">'+avH(p,26)+'<span style="font-weight:600">'+p.name+'</span><div><div style="color:var(--text-secondary);font-size:12px">'+fmt(r.date)+'</div>'+(r.inputAt?'<div style="font-size:10px;color:var(--text-secondary);opacity:.7">入力 '+fmtDateTime(r.inputAt)+'</div>':'')+'</div><span>体重:'+(r.weight||'-')+'kg</span><span>体脂肪:'+(r.fat||'-')+'%</span><span>筋量:'+(r.muscle||'-')+'kg</span><button class="btn btn-sm btn-d" style="margin-left:auto" onclick="delBCStaff(\''+r.id+'\')">削除</button></div></div>';}).join(''):'<div class="no">記録なし</div>';
  $m().innerHTML=h;if(pf)setTimeout(function(){renderBCChart(parseInt(pf));},60);
},

matchview:function(){
  var wcs=D.wc.sort(function(a,b){return b.date.localeCompare(a.date);});
  // 日付ごとにグループ化
  var dateMap={};
  D.md.forEach(function(m){if(!dateMap[m.date])dateMap[m.date]=[];dateMap[m.date].push(m);});
  var dates=Object.keys(dateMap).sort(function(a,b){return b.localeCompare(a);});
  var mdH=dates.length?dates.map(function(date){
    var recs=dateMap[date];
    var injCount=recs.filter(function(m){return m.injured;}).length;
    var crampCount=recs.filter(function(m){return m.cramp;}).length;
    return'<div class="card card-click" style="margin-bottom:8px" onclick="goMatchDateDetail(\''+date+'\')">'+
    '<div style="display:flex;align-items:center;justify-content:space-between">'+
    '<div><div style="font-weight:600;font-size:15px">'+fmt(date)+'</div>'+
    '<div style="font-size:12px;color:var(--text-secondary);margin-top:2px">提出: '+recs.length+'名</div></div>'+
    '<div style="display:flex;gap:6px;align-items:center">'+
    (injCount?'<span class="bd bd-r">怪我 '+injCount+'名</span>':'')+
    (crampCount?'<span class="bd bd-a">足攣り '+crampCount+'名</span>':'')+
    '<span style="color:var(--text-secondary);font-size:18px">›</span></div></div></div>';
  }).join(''):'<div class="no">記録なし</div>';
  $m().innerHTML='<div class="tabs"><div class="tab ac" onclick="mvTab(0)">試合日レポート</div><div class="tab" onclick="mvTab(1)">週次怪我チェック</div></div>'+
  '<div class="tc ac" id="mv0">'+mdH+'</div>'+
  '<div class="tc" id="mv1">'+(wcs.length?wcs.map(function(w){var p=D.p.find(function(x){return x.id===w.pid;});if(!p)return'';return'<div class="card" style="margin-bottom:8px"><div style="display:flex;align-items:center;gap:10px">'+avH(p,30)+'<div style="flex:1"><div style="font-weight:600">'+p.name+'</div><div style="font-size:12px;color:var(--text-secondary)">'+fmt(w.date)+'</div></div><div style="text-align:right"><div style="display:flex;align-items:center;gap:6px"><span style="font-size:12px">痛み:</span><span class="pain-dot" style="background:'+(w.pain<=3?'var(--green)':w.pain<=6?'var(--amber)':'var(--red)')+'">'+w.pain+'</span></div><div style="font-size:11px;color:var(--text-secondary);margin-top:2px">復帰: '+w.returnEst+'</div></div><button class="btn btn-sm btn-d" style="margin-left:6px" onclick="delWCStaff(\''+w.id+'\')">削除</button></div>'+(w.note?'<div style="font-size:12px;color:var(--text-secondary);margin-top:6px;padding-top:6px;border-top:0.5px solid var(--border-tertiary)">'+w.note+'</div>':'')+'</div>';}).join(''):'<div class="no">記録なし</div>')+'</div>';
},
rank:function(){
  var m=document.getElementById('rkm')?document.getElementById('rkm').value:'squat',yf=document.getElementById('rky')?document.getElementById('rky').value:'',pf=document.getElementById('rkp')?document.getElementById('rkp').value:'';
  var labels={squat:'スクワットMAX',bench:'ベンチプレスMAX',deadlift:'デッドリフトMAX',chinning:'チンニングMAX',clean:'クリーンMAX',bronco:'ブロンコテスト',big3:'BIG3合計',big3perkg:'体重あたりBIG3'};
  var rk=D.p.filter(function(p){if(yf&&String(p.year)!==yf)return false;if(pf&&p.position!==pf)return false;return true;}).map(function(p){var rs=D.ph.filter(function(x){return x.pid===p.id;});var v=null;
  if(m==='bronco'){var vs=rs.filter(function(x){return x.bronco;}).map(function(x){return x.bronco;});v=vs.length?Math.min.apply(null,vs):null;}
  else if(m==='big3'){v=rs.length?Math.max.apply(null,rs.map(function(x){return big3(x);})):null;}
  else if(m==='big3perkg'){var w=parseFloat(p.weight);if(w){var b=getBestBIG3(p.id)||0;v=b?Math.round(b/w*100)/100:null;}}
  else{var vs2=rs.filter(function(x){return x[m];}).map(function(x){return x[m];});v=vs2.length?Math.max.apply(null,vs2):null;}
  return{p:p,v:v};}).filter(function(x){return x.v!==null;});
  m==='bronco'?rk.sort(function(a,b){return a.v-b.v;}):rk.sort(function(a,b){return b.v-a.v;});
  var unit=m==='bronco'?'':m==='big3perkg'?'倍':'kg';
  $m().innerHTML='<div class="srch"><select class="ipt" style="width:auto" id="rkm" onchange="V.rank()">'+Object.keys(labels).map(function(k){return'<option value="'+k+'"'+(m===k?' selected':'')+'>'+labels[k]+'</option>';}).join('')+'</select><select class="ipt" style="width:auto" id="rky" onchange="V.rank()"><option value="">全学年</option>'+[1,2,3,4].map(function(y){return'<option value="'+y+'"'+(yf===String(y)?' selected':'')+'>'+y+'年</option>';}).join('')+'</select><select class="ipt" style="width:auto" id="rkp" onchange="V.rank()"><option value="">全ポジション</option>'+POS.map(function(p){return'<option'+(pf===p?' selected':'')+'>'+p+'</option>';}).join('')+'</select></div><div class="card" style="padding:0;overflow:hidden"><table class="rank-tbl"><thead><tr><th style="width:50px">#</th><th>選手名</th><th>POS</th><th>学年</th><th style="text-align:right">'+labels[m]+'</th></tr></thead><tbody>'+(rk.length?rk.map(function(r,i){var dispVal=m==='bronco'?broncoFmt(r.v):m==='big3perkg'?r.v.toFixed(2):r.v+(unit?' '+unit:'');return'<tr style="cursor:pointer" onclick="goPlayerDetail('+r.p.id+')"><td style="font-weight:600;'+(i===0?'color:#BA7517':i===1?'color:#888780':i===2?'color:#993C1D':'')+'">'+(["🥇","🥈","🥉"][i]||(i+1))+'</td><td><div style="display:flex;align-items:center;gap:8px">'+avH(r.p,26)+'<span style="font-weight:600">'+r.p.name+'</span></div></td><td>'+(r.p.position||'-')+'</td><td>'+(r.p.year||'-')+'年</td><td style="text-align:right;font-weight:600">'+dispVal+'</td></tr>';}).join(''):'<tr><td colspan="5" class="no">データなし</td></tr>')+'</tbody></table></div>';
},
calendar:function(){
  var now=new Date();
  var ym=document.getElementById('cal-ym')?document.getElementById('cal-ym').value:(now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0'));
  var parts=ym.split('-');var yr=parseInt(parts[0]),mo=parseInt(parts[1])-1;
  var firstDay=new Date(yr,mo,1);var lastDay=new Date(yr,mo+1,0);
  var eventsThisMonth=D.cal.filter(function(e){return e.date&&e.date.startsWith(ym);}).sort(function(a,b){return a.date.localeCompare(b.date);});
  // Calendar grid
  var DOW=['日','月','火','水','木','金','土'];
  var calH='<div style="display:flex;align-items:center;gap:10px;margin-bottom:1rem"><button class="btn" onclick="calNavMonth(-1,\''+ym+'\')">◀</button><input type="month" class="ipt" id="cal-ym" value="'+ym+'" style="width:auto;flex:1" onchange="V.calendar()"><button class="btn" onclick="calNavMonth(1,\''+ym+'\')">▶</button></div>';
  calH+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:1rem">';
  DOW.forEach(function(d,i){calH+='<div style="text-align:center;font-size:11px;font-weight:600;padding:4px;color:'+(i===0?'var(--red)':i===6?'var(--blue)':'var(--text-secondary)')+'">'+d+'</div>';});
  // blank cells before first day
  for(var bi=0;bi<firstDay.getDay();bi++)calH+='<div></div>';
  var todayS=todayStr();
  for(var d=1;d<=lastDay.getDate();d++){
    var ds=yr+'-'+String(mo+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var dayEvts=D.cal.filter(function(e){return e.date===ds;});
    var isToday=ds===todayS;
    var dow=(firstDay.getDay()+d-1)%7;
    calH+='<div onclick="calDayClick(\''+ds+'\')" style="min-height:52px;border:1px solid var(--border-tertiary);border-radius:6px;padding:4px;cursor:pointer;background:'+(isToday?'var(--blue-bg)':'var(--bg-primary)')+';transition:background .1s" onmouseover="this.style.background=\'var(--bg-secondary)\'" onmouseout="this.style.background=\''+(isToday?'var(--blue-bg)':'var(--bg-primary)')+'\'">';
    calH+='<div style="font-size:12px;font-weight:'+(isToday?'700':'500')+';color:'+(isToday?'var(--blue)':dow===0?'var(--red)':dow===6?'var(--blue)':'var(--text-primary)')+'">'+d+'</div>';
    var msessOnDay=(D.msess||[]).filter(function(s){return s.startDate<=ds&&s.endDate>=ds;});
    msessOnDay.forEach(function(s){calH+='<div style="font-size:8px;background:#0891B2;color:#fff;border-radius:3px;padding:1px 3px;margin-top:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">📐'+s.name+'</div>';});

// === REHAB HTML ===
function rehabHTML(r,done){
  var inj=D.i.find(function(x){return idEq(x.id,r.injId);}),p=D.p.find(function(x){return idEq(x.id,r.pid);});if(!p||!inj)return'';
  if(!r.stageDates)r.stageDates=[];
  if(!r.stageTargetDates)r.stageTargetDates=[];
  var dl=inj.returnDate?Math.max(0,Math.ceil((new Date(inj.returnDate)-new Date())/86400000)):null;
  var sl=STG.length-1-r.stage,dps=dl!==null&&sl>0?Math.round(dl/sl):null;
  // 現在段階の目標日と遅延判定
  var currentTarget=r.stageTargetDates[r.stage+1]||null;
  var isOverdue=false;
  var daysOverdue=0;
  if(currentTarget&&r.stage<STG.length-1){
    var targetDt=new Date(currentTarget);
    var nowDt=new Date(todayStr());
    if(nowDt>targetDt){
      isOverdue=true;
      daysOverdue=Math.ceil((nowDt-targetDt)/86400000);
    }
  }
  var h='<div class="card card-click" style="margin-bottom:10px'+(isOverdue?';border-left:3px solid var(--red)':'')+'" onclick="goInjuryDetail('+inj.id+')">'+
  '<div style="display:flex;align-items:center;gap:10px;margin-bottom:.5rem">'+avH(p,36)+
  '<div style="flex:1"><div style="font-size:14px;font-weight:600">'+p.name+' — '+injLabel(inj)+
  (isOverdue?' <span class="bd bd-r" style="font-size:9px">⚠️ '+daysOverdue+'日遅延</span>':'')+
  '</div><div style="font-size:12px;color:var(--text-secondary)">受傷: '+fmt(inj.date)+(inj.returnDate?' | 復帰予定: '+fmt(inj.returnDate):'')+'</div></div>'+
  (dl!==null?'<span class="bd bd-b">残り約'+dl+'日</span>':'')+'</div>'+
  '<div class="stage-line" onclick="event.stopPropagation()">';
  for(var idx=0;idx<STG.length;idx++){
    var isDone=idx<r.stage,isCur=idx===r.stage;
    var sd=r.stageDates[idx]||'';
    var target=r.stageTargetDates[idx]||'';
    var est=!isDone&&!isCur&&dps?'約'+(dps*(idx-r.stage))+'日後':'';
    var dateStr='';
    if(sd){dateStr='<div class="stage-date">開始: '+fmt(sd)+'</div>';}
    else if(target){
      var tDt=new Date(target);
      var nowDt2=new Date(todayStr());
      var isLate=nowDt2>tDt;
      dateStr='<div class="stage-date" style="color:'+(isLate?'var(--red)':'var(--amber)')+';font-weight:600">'+(isLate?'⚠️ ':'🎯 ')+'目標: '+fmt(target)+'</div>';
    } else if(isCur){dateStr='<div class="stage-est" style="color:var(--blue);font-weight:600">現在</div>';}
    else if(est){dateStr='<div class="stage-est">'+est+'</div>';}
    h+='<div class="stage-item">'+(idx<STG.length-1?'<div class="stage-conn'+(isDone?' done':'')+'"></div>':'')+
    '<div class="stage-dot'+(isDone?' done':'')+(isCur?' cur':'')+'">'+(isDone?'✓':(idx+1))+'</div>'+
    '<div class="stage-label">'+STG[idx]+'</div>'+dateStr+'</div>';
  }
  h+='</div>';
  if(!done){h+='<div onclick="event.stopPropagation()" style="display:flex;gap:6px;margin-bottom:.5rem;flex-wrap:wrap"><button class="btn btn-sm" onclick="advStage('+r.id+')">次の段階へ ▶</button><button class="btn btn-sm btn-d" onclick="prevStage('+r.id+')">◀ 前に戻す</button><button class="btn btn-sm" onclick="editStageDate('+r.id+','+r.stage+')">開始日設定</button><button class="btn btn-sm" onclick="setStageTargetDate('+r.id+','+(r.stage+1)+')">🎯 目標日設定</button><button class="btn btn-sm" onclick="goAddRehabLog('+r.id+')">+ ログ</button></div>';}
  // 新式（D.rlog）+ 旧式（r.logs）両方からログを取得して結合
  var newLogs=(D.rlog||[]).filter(function(l){return l.injId===r.injId;}).map(function(l){return{date:l.date,pain:l.pain,rom:l.rom,content:l.content||(l.comment||''),_id:l.id,_isNew:true};});
  var oldLogs=(r.logs||[]).map(function(lg,li){return{date:lg.date,pain:lg.pain,rom:lg.rom,content:lg.content,_li:li,_isNew:false};});
  var allLogs=newLogs.concat(oldLogs).sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});
  if(allLogs.length){h+='<div style="font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:4px">ログ</div>';allLogs.slice(0,5).forEach(function(lg){h+='<div class="log-row" onclick="event.stopPropagation()"><span style="min-width:65px;color:var(--text-secondary)">'+fmt(lg.date)+'</span><div class="pain-dot" style="background:'+rpeColor(lg.pain)+'">'+lg.pain+'</div><span style="flex:1">'+(lg.content||'-')+'</span><span style="color:var(--text-secondary)">ROM:'+(lg.rom||'-')+'%</span>'+(lg._isNew?'<button class="btn btn-sm btn-d" style="margin-left:4px" onclick="delRehabLogStaff(\''+lg._id+'\','+r.injId+')">削除</button>':'<button class="btn btn-sm" style="margin-left:4px" onclick="goEditRehabLog('+r.id+','+lg._li+')">編集</button>')+'</div>';});}

  return h+'</div>';

// ===== ケガ分析ヘルパー（既往歴・再発検知） =====
// ============================================================
// 指定選手の過去のケガ一覧（指定ケガ自身は除く、新しい順）
function getPlayerInjHistory(pid,excludeIid){
  return D.i.filter(function(x){return idEq(x.pid,pid)&&!idEq(x.id,excludeIid);})
    .sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});
}
// 同一部位の過去ケガ（再発判定用）
function getSamePartInjuries(pid,part,excludeIid){
  return getPlayerInjHistory(pid,excludeIid).filter(function(x){return x.part===part;});
}
// 再発・多発の検知。返り値: {isRecurrent:bool, samePartCount:int, sameTypeCount:int, lastSame:obj}
function analyzeRecurrence(inj){
  var samePart=getSamePartInjuries(inj.pid,inj.part,inj.id);
  var samePartType=samePart.filter(function(x){return x.type===inj.type;});
  return {
    isRecurrent: samePart.length>0,
    samePartCount: samePart.length,
    sameTypeCount: samePartType.length,
    lastSame: samePart.length?samePart[0]:null,
    history: samePart
  };
}
// 全選手の中で「同一部位を3回以上」のケガを持つ選手を検出（多発アラート）
function getFrequentInjuryPlayers(){
  var byPlayerPart={};
  D.i.forEach(function(inj){
    var key=inj.pid+'|'+inj.part;
    if(!byPlayerPart[key])byPlayerPart[key]={pid:inj.pid,part:inj.part,count:0,injs:[]};
    byPlayerPart[key].count++;
    byPlayerPart[key].injs.push(inj);
  });
  var result=[];
  Object.keys(byPlayerPart).forEach(function(k){
    if(byPlayerPart[k].count>=3)result.push(byPlayerPart[k]);
  });
  return result.sort(function(a,b){return b.count-a.count;});
}
// 既往歴HTML（カルテや登録フォームで使う）
function renderInjHistoryBox(pid,excludeIid,currentPart){
  var hist=getPlayerInjHistory(pid,excludeIid);
  if(!hist.length)return'';
  var h='<div class="form-box"><div class="form-title">📜 この選手の既往歴（'+hist.length+'件）</div>';
  hist.slice(0,8).forEach(function(x){
    var isSamePart=currentPart&&x.part===currentPart;
    h+='<div class="log-row" style="cursor:pointer" onclick="goInjuryDetail('+x.id+')">'+
      '<span style="min-width:64px;color:var(--text-secondary);font-size:11px">'+fmt(x.date)+'</span>'+
      '<span style="flex:1;font-weight:'+(isSamePart?'700':'500')+';'+(isSamePart?'color:var(--amber)':'')+'">'+(x.side||'')+x.part+' '+x.type+(isSamePart?' ⚠️同部位':'')+'</span>'+
      '<span class="bd '+(x.resolved?'bd-g':'bd-r')+'" style="font-size:9px">'+(x.resolved?'回復':'治療中')+'</span>'+
      '</div>';
  });
  h+='</div>';
  return h;
}

// カルテデータ取得（なければ新規作成して返す）
function getChart(injId){
  var ch=D.chart.find(function(x){return idEq(x.injId,injId);});
  if(!ch){
    ch={injId:injId,injDetail:{},medical:{},evals:[],soaps:[],returnCriteria:{},images:[]};
    D.chart.push(ch);
  }
  // 古いデータに項目がなければ補完
  if(!ch.injDetail)ch.injDetail={};
  if(!ch.medical)ch.medical={};
  if(!ch.evals)ch.evals=[];
  if(!ch.soaps)ch.soaps=[];
  if(!ch.returnCriteria)ch.returnCriteria={};
  if(!ch.images)ch.images=[];
  return ch;
}

var INJ_TISSUE=['筋肉','腱','靭帯','骨','関節（軟骨）','半月板/関節唇','神経','皮膚','その他'];
// 重症度
var INJ_SEVERITY=['軽症（数日）','中等症（1-3週）','重症（3-6週）','重度（6週以上）','要手術'];
// 画像所見の種類
var IMG_FINDINGS=['レントゲン','MRI','エコー','CT'];
// 痛みの種類
var PAIN_TYPES=[{k:'rest',label:'安静時痛'},{k:'motion',label:'運動時痛'},{k:'night',label:'夜間痛'},{k:'press',label:'圧痛'}];

// ===== 新・電子カルテ メイン画面（タブ式） =====
var curChartTab='overview';
function goInjuryDetail(iid){
  var inj=D.i.find(function(x){return idEq(x.id,iid);});if(!inj)return;
  var p=D.p.find(function(x){return idEq(x.id,inj.pid);});if(!p)return;
  curChartTab='overview';
  window._chartIid=iid;
  var hero='<div class="chart-hero">'+
    '<div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">'+
    avH(p,52)+
    '<div style="flex:1;min-width:160px"><div style="font-size:20px;font-weight:800;color:#fff">'+escapeHtml(p.name)+'</div>'+
    '<div style="font-size:13px;color:#A9B8CE;margin-top:2px">'+(p.position||'-')+' ・ '+(p.year||'?')+'年</div></div>'+
    '<div style="text-align:right"><div style="font-size:15px;font-weight:700;color:#fff">'+(inj.side||'')+inj.part+(inj.partOther?'('+inj.partOther+')':'')+'</div>'+
    '<div style="margin-top:4px"><span class="bd '+(inj.resolved?'bd-g':'bd-r')+'">'+(inj.resolved?'回復済':'治療中')+'</span></div></div>'+
    '</div></div>';
  var tabs='<div class="chart-tabs">'+
    '<div class="chart-tab ac" onclick="chartTab(\'overview\')">📋 概要</div>'+
    '<div class="chart-tab" onclick="chartTab(\'diagnosis\')">🩺 受傷・診断</div>'+
    '<div class="chart-tab" onclick="chartTab(\'eval\')">📊 評価</div>'+
    '<div class="chart-tab" onclick="chartTab(\'soap\')">📝 SOAP</div>'+
    '<div class="chart-tab" onclick="chartTab(\'return\')">🎯 復帰</div>'+
    '<div class="chart-tab" onclick="chartTab(\'comment\')">💬 コメント</div>'+
    '</div>';
  pushView(p.name+' カルテ',hero+tabs+'<div id="chart-body"></div>');
  setTimeout(function(){renderChartTab();},30);
}
function chartTab(t){
  curChartTab=t;
  document.querySelectorAll('.chart-tab').forEach(function(el){
    var oa=el.getAttribute('onclick')||'';
    var m=oa.match(/chartTab\('([^']+)'\)/);
    el.classList.toggle('ac',m&&m[1]===t);
  });
  renderChartTab();
}
function renderChartTab(){
  var iid=window._chartIid;
  var body=document.getElementById('chart-body');
  if(!body)return;
  if(curChartTab==='overview')body.innerHTML=renderChartOverview(iid);
  else if(curChartTab==='diagnosis')body.innerHTML=renderChartDiagnosis(iid);
  else if(curChartTab==='eval'){body.innerHTML=renderChartEval(iid);setTimeout(function(){drawEvalCharts(iid);},50);}
  else if(curChartTab==='soap')body.innerHTML=renderChartSOAP(iid);
  else if(curChartTab==='return')body.innerHTML=renderChartReturn(iid);
  else if(curChartTab==='comment'){body.innerHTML=renderInjComments(iid,'staff');setTimeout(function(){bindInjCommSubmit(iid,'staff');},50);}
}

// ===== 概要タブ =====
function renderChartOverview(iid){
  var inj=D.i.find(function(x){return idEq(x.id,iid);});if(!inj)return'';
  var p=D.p.find(function(x){return idEq(x.id,inj.pid);});
  var rh=D.r.find(function(x){return idEq(x.injId,iid);});
  var ch=getChart(iid);
  var daysSince=Math.floor((new Date(todayStr())-new Date(inj.date))/86400000);
  // 最新評価
  var lastEval=ch.evals.slice().sort(function(a,b){return (b.date||'').localeCompare(a.date||'');})[0];
  // 最新痛み
  var lastPain=lastEval&&lastEval.pain?lastEval.pain:{};
  var h='<div class="grid g3" style="margin-bottom:16px">'+
    '<div class="mc"><div class="v" style="font-size:20px;color:var(--accent)">'+daysSince+'</div><div class="l">受傷からの日数</div></div>'+
    '<div class="mc"><div class="v" style="font-size:20px">'+ch.evals.length+'</div><div class="l">評価記録</div></div>'+
    '<div class="mc"><div class="v" style="font-size:20px">'+ch.soaps.length+'</div><div class="l">SOAP記録</div></div>'+
    '</div>';
  // 基本情報
  h+='<div class="form-box"><div class="form-title">基本情報</div>'+
    '<div class="detail-row"><span class="detail-label">部位</span><span class="detail-value">'+(inj.side||'')+inj.part+(inj.partOther?'('+inj.partOther+')':'')+'</span></div>'+
    '<div class="detail-row"><span class="detail-label">種類</span><span class="detail-value">'+inj.type+(inj.typeOther?'('+inj.typeOther+')':'')+'</span></div>'+
    '<div class="detail-row"><span class="detail-label">受傷日</span><span class="detail-value">'+fmt(inj.date)+'（'+daysSince+'日経過）</span></div>'+
    '<div class="detail-row"><span class="detail-label">復帰予定</span><span class="detail-value">'+(inj.returnDate?fmt(inj.returnDate)+(function(){if(inj.resolved)return'';var dl=Math.ceil((new Date(inj.returnDate)-new Date(todayStr()))/86400000);if(dl>0)return' <span class="bd bd-b" style="font-size:10px">あと'+dl+'日</span>';else if(dl===0)return' <span class="bd bd-a" style="font-size:10px">本日予定</span>';else return' <span class="bd bd-r" style="font-size:10px">'+(-dl)+'日超過</span>';})():'未設定')+'</span></div>'+
    (ch.injDetail.severity?'<div class="detail-row"><span class="detail-label">重症度</span><span class="detail-value">'+ch.injDetail.severity+'</span></div>':'')+
    (ch.medical.diagnosis?'<div class="detail-row"><span class="detail-label">診断名</span><span class="detail-value">'+escapeHtml(ch.medical.diagnosis)+'</span></div>':'')+
    '</div>';
  // リハビリ状況
  if(rh){
    h+='<div class="form-box"><div class="form-title">リハビリ状況</div>'+
    '<div class="detail-row"><span class="detail-label">現在の段階</span><span class="detail-value" style="color:var(--accent);font-weight:700">'+STG[rh.stage]+'</span></div></div>';
  }
  // 再発アラート
  var rec=analyzeRecurrence(inj);
  if(rec.isRecurrent){
    h+='<div class="alert-card alert-warn" style="margin-bottom:12px">'+
      '<div><div style="font-weight:700">⚠️ 再発の可能性 — 同じ部位（'+inj.part+'）のケガが過去に'+rec.samePartCount+'件</div>'+
      (rec.lastSame?'<div style="font-size:11px;margin-top:3px;opacity:.85">直近: '+fmt(rec.lastSame.date)+' '+rec.lastSame.type+'</div>':'')+
      (rec.samePartCount>=2?'<div style="font-size:11px;margin-top:3px;opacity:.85;font-weight:600">繰り返し受傷しています。根本的な原因の評価を推奨</div>':'')+
      '</div></div>';
  }
  // 最新の痛み状態
  if(lastEval){
    h+='<div class="form-box"><div class="form-title">最新の状態（'+fmt(lastEval.date)+'）</div>';
    PAIN_TYPES.forEach(function(pt){
      if(lastPain[pt.k]!=null){
        var v=lastPain[pt.k];
        h+='<div class="detail-row"><span class="detail-label">'+pt.label+'</span><span class="detail-value"><b style="color:'+(v>=7?'var(--red)':v>=4?'var(--amber)':'var(--green)')+'">'+v+'</b>/10</span></div>';
      }
    });
    h+='</div>';
  }
  // 既往歴
  h+=renderInjHistoryBox(inj.pid,inj.id,inj.part);
  // アクションボタン
  h+='<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px">'+
    '<button class="btn btn-p" onclick="goEditInjury('+iid+')">基本情報を編集</button>'+
    (!inj.resolved?'<button class="btn btn-s" onclick="resolveInj('+iid+');popView()">回復済みにする</button>':'<button class="btn" onclick="unresolveInj('+iid+')">治療中に戻す</button>')+
    '<button class="btn btn-d" onclick="deleteInjury('+iid+')">削除</button>'+
    '</div>';
  return h;
}

// ===== 受傷・診断タブ =====

  var ch=getChart(iid);
  var d=ch.injDetail,m=ch.medical;
  var h='<div class="form-box"><div class="form-title">🩹 受傷の詳細</div>';
  h+='<div class="fl" style="margin-bottom:12px"><label>受傷機転</label><select class="ipt" id="cd-mech">'+
    '<option value="">選択</option>'+INJ_MECHANISM.map(function(x){return'<option'+(d.mechanism===x?' selected':'')+'>'+x+'</option>';}).join('')+'</select></div>';
  h+='<div class="fl" style="margin-bottom:12px"><label>受傷場面</label><select class="ipt" id="cd-scene">'+
    '<option value="">選択</option>'+INJ_SCENE.map(function(x){return'<option'+(d.scene===x?' selected':'')+'>'+x+'</option>';}).join('')+'</select></div>';
  h+='<div class="fl" style="margin-bottom:12px"><label>組織分類</label><select class="ipt" id="cd-tissue">'+
    '<option value="">選択</option>'+INJ_TISSUE.map(function(x){return'<option'+(d.tissue===x?' selected':'')+'>'+x+'</option>';}).join('')+'</select></div>';
  h+='<div class="fl" style="margin-bottom:12px"><label>重症度（見込み）</label><select class="ipt" id="cd-sev">'+
    '<option value="">選択</option>'+INJ_SEVERITY.map(function(x){return'<option'+(d.severity===x?' selected':'')+'>'+x+'</option>';}).join('')+'</select></div>';
  h+='<div class="fl" style="margin-bottom:12px"><label>受傷時の状況（自由記述）</label><textarea class="ipt" id="cd-situation" placeholder="どんな動作で、どこが痛くなったか等">'+escapeHtml(d.situation||'')+'</textarea></div>';
  h+='<div class="fl" style="margin-bottom:12px"><label>初期対応</label><textarea class="ipt" id="cd-firstaid" placeholder="RICE処置、アイシング等" style="min-height:50px">'+escapeHtml(d.firstaid||'')+'</textarea></div>';
  h+='</div>';
  h+='<div class="form-box"><div class="form-title">🏥 診断・医療情報</div>';
  h+='<div class="grid g2" style="gap:12px;margin-bottom:12px">'+
    '<div class="fl"><label>受診日</label><input type="date" class="ipt" id="cd-visitdate" value="'+(m.visitDate||'')+'"></div>'+
    '<div class="fl"><label>病院・クリニック名</label><input class="ipt" id="cd-hospital" value="'+escapeHtml(m.hospital||'')+'" placeholder="○○整形外科"></div>'+
    '</div>';
  h+='<div class="fl" style="margin-bottom:12px"><label>担当医</label><input class="ipt" id="cd-doctor" value="'+escapeHtml(m.doctor||'')+'" placeholder="○○医師"></div>';
  h+='<div class="fl" style="margin-bottom:12px"><label>診断名</label><input class="ipt" id="cd-diagnosis" value="'+escapeHtml(m.diagnosis||'')+'" placeholder="医師の診断名"></div>';
  h+='<div class="fl" style="margin-bottom:12px"><label>画像検査</label><div style="display:flex;gap:12px;flex-wrap:wrap;padding:4px 0">'+
    IMG_FINDINGS.map(function(x){var checked=(m.imgTypes||[]).indexOf(x)>=0;return'<label style="display:flex;align-items:center;gap:5px;font-size:13px;font-weight:400;cursor:pointer"><input type="checkbox" class="cd-imgtype" value="'+x+'"'+(checked?' checked':'')+'> '+x+'</label>';}).join('')+
    '</div></div>';
  h+='<div class="fl" style="margin-bottom:12px"><label>画像所見の詳細</label><textarea class="ipt" id="cd-imgfind" placeholder="MRIで○○断裂を確認 等">'+escapeHtml(m.imgFindings||'')+'</textarea></div>';

  h+='<div class="fl" style="margin-bottom:12px"><label style="display:flex;align-items:center;gap:6px;cursor:pointer"><input type="checkbox" id="cd-surgery"'+(m.surgery?' checked':'')+'> 手術あり</label></div>';

function saveChartDiagnosis(iid){
  var ch=getChart(iid);
  var g=function(id){var e=document.getElementById(id);return e?e.value:'';};
  ch.injDetail.mechanism=g('cd-mech');ch.injDetail.scene=g('cd-scene');ch.injDetail.tissue=g('cd-tissue');ch.injDetail.severity=g('cd-sev');ch.injDetail.situation=g('cd-situation');ch.injDetail.firstaid=g('cd-firstaid');
  ch.medical.visitDate=g('cd-visitdate');ch.medical.hospital=g('cd-hospital');ch.medical.doctor=g('cd-doctor');ch.medical.diagnosis=g('cd-diagnosis');
  ch.medical.imgTypes=Array.prototype.slice.call(document.querySelectorAll('.cd-imgtype:checked')).map(function(e){return e.value;});
  ch.medical.imgFindings=g('cd-imgfind');ch.medical.treatment=g('cd-treatment');
  ch.medical.surgery=document.getElementById('cd-surgery')?document.getElementById('cd-surgery').checked:false;
  ch.medical.surgeryDate=g('cd-surgdate');ch.medical.surgeryName=g('cd-surgname');
  saveChart();alert('保存しました');
}

// ===== 評価タブ（部位連動） =====
function renderChartEval(iid){
  var inj=D.i.find(function(x){return idEq(x.id,iid);});if(!inj)return'';
  var ch=getChart(iid);
  var em=EVAL_MASTER[inj.part]||EVAL_MASTER['その他'];
  var evals=ch.evals.slice().sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});
  var h='';
  // 新規評価追加ボタン
  h+='<button class="btn btn-p" style="width:100%;margin-bottom:14px" onclick="showEvalForm('+iid+')">＋ 新しい評価を記録する</button>';
  // 痛み推移グラフ
  if(evals.length>=1){
    h+='<div class="form-box"><div class="form-title">📈 痛みの推移</div><div class="chart-wrap" style="height:200px"><canvas id="ev-pain-chart"></canvas></div></div>';
    // ROM推移グラフ（部位にROM項目がある場合）
    if(em.rom.length>0){
      h+='<div class="form-box"><div class="form-title">📐 ROM（関節可動域）の推移</div><div class="chart-wrap" style="height:200px"><canvas id="ev-rom-chart"></canvas></div></div>';
    }
  }
  // 評価記録一覧
  h+='<div class="form-title" style="margin:16px 0 10px">評価記録（'+evals.length+'件）</div>';
  if(!evals.length){
    h+='<div class="no">まだ評価記録がありません。<br>「新しい評価を記録する」から始めてください。</div>';
  }else{
    evals.forEach(function(ev){
      h+='<div class="card" style="margin-bottom:10px">'+
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'+
        '<span style="font-weight:700;font-size:14px">'+fmt(ev.date)+'</span>'+
        '<div style="display:flex;gap:6px"><button class="btn btn-sm" onclick="showEvalForm('+iid+',\''+ev.id+'\')">編集</button><button class="btn btn-sm btn-d" onclick="delEval('+iid+',\''+ev.id+'\')">削除</button></div>'+
        '</div>';
      // 痛み
      if(ev.pain){
        var painParts=[];
        PAIN_TYPES.forEach(function(pt){if(ev.pain[pt.k]!=null)painParts.push(pt.label+':'+ev.pain[pt.k]);});
        if(painParts.length)h+='<div style="font-size:12px;margin-bottom:4px"><span style="color:var(--text-secondary)">痛み</span> '+painParts.join(' / ')+'</div>';
      }
      // ROM
      if(ev.rom&&Object.keys(ev.rom).length){
        var romParts=[];
        em.rom.forEach(function(r){if(ev.rom[r.k]!=null&&ev.rom[r.k]!=='')romParts.push(r.label+':'+ev.rom[r.k]+r.unit);});
        if(romParts.length)h+='<div style="font-size:12px;margin-bottom:4px"><span style="color:var(--text-secondary)">ROM</span> '+romParts.join(' / ')+'</div>';
      }
      // MMT
      if(ev.mmt&&Object.keys(ev.mmt).length){
        var mmtParts=[];
        em.mmt.forEach(function(mm){if(ev.mmt[mm]!=null&&ev.mmt[mm]!=='')mmtParts.push(mm+':'+ev.mmt[mm]);});
        if(mmtParts.length)h+='<div style="font-size:12px;margin-bottom:4px"><span style="color:var(--text-secondary)">筋力</span> '+mmtParts.join(' / ')+'</div>';
      }
      // 周径
      if(ev.circ&&Object.keys(ev.circ).length){
        var circParts=[];
        em.circ.forEach(function(c){if(ev.circ[c]!=null&&ev.circ[c]!=='')circParts.push(c+':'+ev.circ[c]+'cm');});
        if(circParts.length)h+='<div style="font-size:12px;margin-bottom:4px"><span style="color:var(--text-secondary)">周径</span> '+circParts.join(' / ')+'</div>';
      }
      // 整形外科テスト
      if(ev.ortho&&Object.keys(ev.ortho).length){
        var orthoParts=[];
        Object.keys(ev.ortho).forEach(function(k){if(ev.ortho[k])orthoParts.push(k+':'+ev.ortho[k]);});
        if(orthoParts.length)h+='<div style="font-size:12px;margin-bottom:4px"><span style="color:var(--text-secondary)">整形テスト</span> '+orthoParts.join(' / ')+'</div>';
      }
      // 所見
      if(ev.note)h+='<div style="font-size:12px;margin-top:6px;padding:8px;background:var(--bg-secondary);border-radius:6px;white-space:pre-wrap">'+escapeHtml(ev.note)+'</div>';
      h+='</div>';
    });
  }
  return h;
}

// 評価入力フォーム（部位連動）
function showEvalForm(iid,evalId){
  var inj=D.i.find(function(x){return idEq(x.id,iid);});if(!inj)return;
  var ch=getChart(iid);
  var em=EVAL_MASTER[inj.part]||EVAL_MASTER['その他'];
  var ev=evalId?ch.evals.find(function(x){return idEq(x.id,evalId);}):null;
  var isEdit=!!ev;
  if(!ev)ev={date:todayStr(),pain:{},rom:{},mmt:{},circ:{},ortho:{},note:''};
  var h='<div style="max-width:600px">';
  h+='<div class="form-box"><div class="form-title">評価日</div><input type="date" class="ipt" id="ev-date" value="'+(ev.date||todayStr())+'"></div>';
  // 痛み（全部位共通）
  h+='<div class="form-box"><div class="form-title">😣 痛み（0:なし 〜 10:最大）</div>';
  PAIN_TYPES.forEach(function(pt){
    var v=ev.pain&&ev.pain[pt.k]!=null?ev.pain[pt.k]:'';
    h+='<div class="fl" style="margin-bottom:10px"><label>'+pt.label+'</label><input type="number" class="ipt ev-pain" data-k="'+pt.k+'" min="0" max="10" value="'+v+'" placeholder="0-10"></div>';
  });
  h+='</div>';
  // ROM（部位連動）
  if(em.rom.length){
    h+='<div class="form-box"><div class="form-title">📐 ROM 関節可動域</div>';
    em.rom.forEach(function(r){
      var v=ev.rom&&ev.rom[r.k]!=null?ev.rom[r.k]:'';
      h+='<div class="fl" style="margin-bottom:10px"><label>'+r.label+(r.normal?' <span style="color:var(--text-tertiary);font-weight:400">(正常≒'+r.normal+r.unit+')</span>':'')+'</label><input type="text" class="ipt ev-rom" data-k="'+r.k+'" value="'+v+'" placeholder="'+r.unit+'"></div>';
    });
    h+='</div>';
  }
  // MMT（部位連動）
  if(em.mmt.length){
    h+='<div class="form-box"><div class="form-title">💪 筋力 MMT（0〜5）</div>';
    em.mmt.forEach(function(mm){
      var v=ev.mmt&&ev.mmt[mm]!=null?ev.mmt[mm]:'';
      h+='<div class="fl" style="margin-bottom:10px"><label>'+mm+'</label><select class="ipt ev-mmt" data-k="'+escapeHtml(mm)+'"><option value="">-</option>'+
        ['5','4+','4','4-','3+','3','3-','2','1','0'].map(function(o){return'<option'+(String(v)===o?' selected':'')+'>'+o+'</option>';}).join('')+'</select></div>';
    });
    h+='</div>';
  }
  // 周径（部位連動）
  if(em.circ.length){
    h+='<div class="form-box"><div class="form-title">📏 周径（cm）</div>';
    em.circ.forEach(function(c){
      var v=ev.circ&&ev.circ[c]!=null?ev.circ[c]:'';
      h+='<div class="fl" style="margin-bottom:10px"><label>'+c+'</label><input type="number" step="0.1" class="ipt ev-circ" data-k="'+escapeHtml(c)+'" value="'+v+'" placeholder="cm"></div>';
    });
    h+='</div>';
  }
  // 整形外科テスト（部位連動）
  if(em.ortho.length){
    h+='<div class="form-box"><div class="form-title">🔬 整形外科的テスト</div>';
    em.ortho.forEach(function(o){
      var v=ev.ortho&&ev.ortho[o]!=null?ev.ortho[o]:'';
      h+='<div class="fl" style="margin-bottom:10px"><label>'+o+'</label><select class="ipt ev-ortho" data-k="'+escapeHtml(o)+'"><option value="">-</option>'+

function saveEval(iid,evalId){
  var ch=getChart(iid);
  var pain={},rom={},mmt={},circ={},ortho={},special=[];
  document.querySelectorAll('.ev-pain').forEach(function(e){if(e.value!=='')pain[e.dataset.k]=parseFloat(e.value);});
  document.querySelectorAll('.ev-rom').forEach(function(e){if(e.value!=='')rom[e.dataset.k]=e.value;});
  document.querySelectorAll('.ev-mmt').forEach(function(e){if(e.value!=='')mmt[e.dataset.k]=e.value;});
  document.querySelectorAll('.ev-circ').forEach(function(e){if(e.value!=='')circ[e.dataset.k]=parseFloat(e.value);});
  document.querySelectorAll('.ev-ortho').forEach(function(e){if(e.value!=='')ortho[e.dataset.k]=e.value;});
  document.querySelectorAll('.ev-special:checked').forEach(function(e){special.push(e.value);});
  var date=document.getElementById('ev-date').value||todayStr();
  var note=document.getElementById('ev-note').value;

  saveChart();
  chartTab('eval');
}

function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

function getCurrentUserId(role){
  // role別の現在ユーザーID取得
  if(role==='staff')return 'staff'; // スタッフ複数だが一括
  if(role==='player')return typeof myPid!=='undefined'?myPid:null;
  if(role==='trainer')return (typeof myTrainer!=='undefined'&&myTrainer)?myTrainer.id:null;
  return null;
}

function getCurrentUserName(role){
  if(role==='staff')return 'スタッフ';
  if(role==='player'){var p=D.p.find(function(x){return idEq(x.id,myPid);});return p?p.name:'選手';}
  if(role==='trainer')return (typeof myTrainer!=='undefined'&&myTrainer)?myTrainer.name:'専門学生';
  return '';
}

function postInjComment(iid,role){
  var el=document.getElementById('injcomm-input-'+iid);
  if(!el)return;
  var text=(el.value||'').trim();
  if(!text){alert('コメントを入力してください');return;}
  var newComm={
    id:'ic_'+Date.now()+'_'+Math.floor(Math.random()*1000),
    injId:iid,
    role:role,
    authorId:getCurrentUserId(role),
    authorName:getCurrentUserName(role),
    text:text,
    createdAt:new Date().toISOString()
  };
  db.collection('appdata').doc('injcomm').get().then(function(doc){
    var latest=[];if(doc.exists){try{var parsed=JSON.parse(doc.data().data);if(Array.isArray(parsed))latest=parsed;}catch(e){}}
    latest.push(newComm);
    D.injcomm=latest;

function deleteInjury(iid){
  if(!confirm('この怪我記録を削除しますか？\n（関連するリハビリ記録・プラン・進行データもすべて削除されます。元に戻せません。）'))return;
  var id=parseInt(iid)||iid;
  // 4つのコレクションを順番に削除（Firestoreから最新取得→該当削除→保存）
  // i (怪我), r (リハビリ進行), rplan (プラン), rlog (記録)
  function deleteFromCollection(collectionKey, matchField){
    return db.collection('appdata').doc(collectionKey).get().then(function(doc){
      var latest=[];if(doc.exists){try{var parsed=JSON.parse(doc.data().data);if(Array.isArray(parsed))latest=parsed;}catch(e){}}
      latest=latest.filter(function(r){
        if(matchField==='id'){return r.id!==id&&String(r.id)!==String(iid);}
        return r[matchField]!==id&&String(r[matchField])!==String(iid);
      });
      D[collectionKey]=latest;
      return db.collection('appdata').doc(collectionKey).set({data:JSON.stringify(latest)});
    });
  }
  deleteFromCollection('i','id')
    .then(function(){return deleteFromCollection('r','injId');})
    .then(function(){return deleteFromCollection('rplan','injId');})
    .then(function(){return deleteFromCollection('rlog','injId');})
    .then(function(){alert('削除しました ✓');popView();})
    .catch(function(e){alert('削除に失敗しました');console.error(e);});
}

function advStage(rid){
  var r=D.r.find(function(x){return idEq(x.id,rid);});if(!r||r.stage>=STG.length-1)return;
  r.stage++;
  if(!r.stageDates)r.stageDates=[];
  r.stageDates[r.stage]=todayStr();
  // 次の段階に進む時、その段階の目標日（何日後に次へ進むか）を任意で設定
  if(r.stage<STG.length-1){
    var nextStage=STG[r.stage+1];
    var ans=prompt('次の段階「'+nextStage+'」への目標日を設定しますか？\n（YYYY-MM-DD形式、空欄でスキップ）\n例: 1週間後なら '+toDateStr(new Date(Date.now()+7*86400000)),'');
    if(ans&&/^\d{4}-\d{2}-\d{2}$/.test(ans)){
      if(!r.stageTargetDates)r.stageTargetDates=[];
      r.stageTargetDates[r.stage+1]=ans;
    }
  }
  if(r.stage===STG.length-1){
    var inj=D.i.find(function(x){return idEq(x.id,r.injId);});
    if(inj)inj.resolved=true;
    sv('i');
  }
  sv('r');V.rehab();
}

function setStageTargetDate(rid,si){
  var r=D.r.find(function(x){return idEq(x.id,rid);});if(!r)return;
  if(!r.stageTargetDates)r.stageTargetDates=[];
  var cur=r.stageTargetDates[si]||'';
  var nd=prompt(STG[si]+' への目標日（YYYY-MM-DD）:\n空欄で削除',cur);
  if(nd===null)return;
  if(nd===''){delete r.stageTargetDates[si];}
  else if(/^\d{4}-\d{2}-\d{2}$/.test(nd)){r.stageTargetDates[si]=nd;}
  else{alert('日付の形式が正しくありません');return;}
  sv('r');V.rehab();
}

function getTodayPickup(){
  var lastMeasured=D.p.map(function(p){var recs=D.bc.filter(function(r){return r.pid===p.id;});var last=recs.length?recs.sort(function(a,b){return b.date.localeCompare(a.date);})[0].date:'2000-01-01';return{pid:p.id,last:last};});
  lastMeasured.sort(function(a,b){return a.last.localeCompare(b.last);});
  // Use today's date as seed to keep consistent during the day
  var today=todayStr();var seed=0;for(var ci=0;ci<today.length;ci++)seed+=today.charCodeAt(ci);
  // Pick 5 from the least recently measured, with slight shuffle
  var pool=lastMeasured.slice(0,15);
  for(var si=pool.length-1;si>0;si--){var j=(seed+si)%si;var tmp=pool[si];pool[si]=pool[j];pool[j]=tmp;}
  return pool.slice(0,5).map(function(x){return x.pid;});
}

function doAddTapeSlot(){
  var date=document.getElementById('ts-date').value;
  var type=document.getElementById('ts-type').value;
  var interval=parseInt(document.getElementById('ts-interval').value)||5;
  if(!date)return alert('日付を入力してください');
  if(!D.tapeslot)D.tapeslot=[];
  var totalSlots=0;
  for(var si=0;si<tapeStaffRowCount;si++){
    var nameEl=document.getElementById('ts-sname-'+si);
    var startEl=document.getElementById('ts-start-'+si);
    var endEl=document.getElementById('ts-end-'+si);
    var capEl=document.getElementById('ts-cap-'+si);
    if(!nameEl||!startEl||!endEl)continue;
    var sname=nameEl.value.trim()||('担当者'+(si+1));
    var startT=startEl.value,endT=endEl.value;
    var cap=parseInt((capEl||{}).value)||1;
    if(startT>=endT){alert(sname+': 終了時間は開始時間より後にしてください');return;}
    var cur=startT;
    while(cur<endT){
      var pts=cur.split(':');var hh=parseInt(pts[0]),mm=parseInt(pts[1]);
      var nm=mm+interval;var nh=hh+Math.floor(nm/60);nm=nm%60;
      if(nh>=24)break;
      var next=String(nh).padStart(2,'0')+':'+String(nm).padStart(2,'0');
      if(next>endT)break;
      D.tapeslot.push({id:Date.now()+totalSlots*17,date:date,type:type,startTime:cur,endTime:next,capacity:cap,staff:sname});
      totalSlots++;cur=next;
    }
  }
  if(!totalSlots)return alert('枠が作成できませんでした。時間を確認してください。');
  tapeStaffRowCount=1;
  sv('tapeslot');
