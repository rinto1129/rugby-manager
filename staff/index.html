<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rugby Manager - 選手管理システム</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0F1B2D;--navy-2:#16263E;--navy-3:#1E3251;--navy-hover:#22395C;
  --accent:#3B82F6;--accent-d:#2563EB;--accent-glow:rgba(59,130,246,.35);
  --blue:#2563EB;--blue-bg:#E8F0FE;--green:#0E9F6E;--green-bg:#E3F5EE;--red:#DC2B2B;--red-bg:#FCEBEB;--amber:#B45309;--amber-bg:#FBF0DD;--purple:#6D52D6;--purple-bg:#EEEAFB;
  --bg-primary:#ffffff;--bg-secondary:#F4F6FA;--bg-tertiary:#EAEEF5;--bg-app:#EEF1F6;
  --text-primary:#101828;--text-secondary:#5A6473;--text-tertiary:#98A2B3;
  --border-secondary:rgba(16,24,40,0.16);--border-tertiary:rgba(16,24,40,0.08);
  --shadow-sm:0 1px 3px rgba(16,24,40,.06),0 1px 2px rgba(16,24,40,.04);--shadow-md:0 4px 16px rgba(16,24,40,.10);--shadow-lg:0 12px 32px rgba(16,24,40,.14);
  --font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans JP',sans-serif;--radius:10px;--radius-lg:14px}
body{font-family:var(--font-sans);background:var(--bg-app);color:var(--text-primary);line-height:1.5;-webkit-font-smoothing:antialiased}
.app{display:flex;height:100vh}
.sb{width:236px;flex-shrink:0;background:linear-gradient(180deg,#11203A 0%,var(--navy) 100%);color:#C3CEDE;display:flex;flex-direction:column;overflow-y:auto;box-shadow:2px 0 16px rgba(0,0,0,.25);position:relative;z-index:6}
.sb-hd{padding:1.4rem 1.2rem;border-bottom:1px solid rgba(255,255,255,.08);background:rgba(59,130,246,.06)}.sb-hd h1{font-size:17px;font-weight:700;color:#fff;letter-spacing:.02em;display:flex;align-items:center;gap:9px}.sb-hd p{font-size:10px;color:#7E8FA8;margin-top:4px;letter-spacing:.12em;font-weight:600}
.ni{display:flex;align-items:center;gap:11px;padding:10px 1.2rem;cursor:pointer;font-size:13px;color:#9FB0C8;border-left:3px solid transparent;transition:all .15s;font-weight:500}
.ni-ic{width:20px;height:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:.75;transition:all .15s}
.ni-ic svg{width:19px;height:19px}
.ni-group{font-size:10px;font-weight:700;color:#5E708C;opacity:.9;letter-spacing:.1em;padding:16px 1.2rem 5px;text-transform:uppercase}
.ni:hover{background:var(--navy-hover);color:#fff}.ni:hover .ni-ic{opacity:1}
.ni.ac{background:linear-gradient(90deg,var(--navy-3),var(--navy-2));color:#fff;border-left-color:var(--accent);font-weight:600;box-shadow:inset 0 0 24px rgba(59,130,246,.12)}
.ni.ac .ni-ic{opacity:1;color:var(--accent)}
.mn{flex:1;overflow:hidden;display:flex;flex-direction:column;background:var(--bg-app)}
.tb{background:var(--bg-primary);border-bottom:1px solid var(--border-tertiary);padding:14px 1.6rem;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow-sm);z-index:5}.tb h2{font-size:17px;font-weight:700;color:var(--text-primary)}
.ct{flex:1;overflow-y:auto;padding:1.6rem;background:var(--bg-app)}
.btn{padding:8px 16px;border-radius:var(--radius);border:1px solid var(--border-secondary);background:var(--bg-primary);font-size:13px;cursor:pointer;color:var(--text-primary);transition:all .12s;font-family:var(--font-sans);font-weight:500}.btn:hover{background:var(--bg-secondary);border-color:var(--text-tertiary)}
.btn-p{background:var(--accent);color:#fff;border-color:var(--accent)}.btn-p:hover{background:var(--accent-d);box-shadow:0 2px 8px var(--accent-glow)}
.btn-d{color:var(--red);border-color:var(--red)}.btn-d:hover{background:var(--red-bg)}
.btn-s{color:var(--green);border-color:var(--green)}.btn-s:hover{background:var(--green-bg)}
.btn-back{color:var(--text-secondary);border:none;padding:7px 10px;background:none;font-size:13px;cursor:pointer;font-family:var(--font-sans);font-weight:500}.btn-back:hover{color:var(--accent)}
.btn-sm{padding:4px 10px;font-size:11px;width:auto}
.ipt{padding:9px 12px;border:1.5px solid var(--border-secondary);border-radius:var(--radius);background:var(--bg-primary);font-size:13px;color:var(--text-primary);font-family:var(--font-sans);width:100%}
.ipt:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
select.ipt{appearance:auto}textarea.ipt{resize:vertical;min-height:80px}
.bd{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600}
.bd-g{background:var(--green-bg);color:var(--green)}.bd-r{background:var(--red-bg);color:var(--red)}.bd-a{background:var(--amber-bg);color:var(--amber)}.bd-b{background:var(--blue-bg);color:var(--blue)}.bd-p{background:var(--purple-bg);color:var(--purple)}
.grid{display:grid;gap:12px}.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr 1fr}.g4{grid-template-columns:repeat(auto-fill,minmax(155px,1fr))}
.card{background:var(--bg-primary);border:1px solid var(--border-tertiary);border-radius:var(--radius-lg);padding:1.25rem;box-shadow:var(--shadow-sm);transition:all .15s}.card:hover{border-color:var(--border-secondary);box-shadow:var(--shadow-md)}
.card-click{cursor:pointer}.card-click:hover{border-color:var(--blue)}
.mc{background:var(--bg-primary);border:1px solid var(--border-tertiary);border-radius:var(--radius);padding:.75rem;text-align:center;box-shadow:var(--shadow-sm)}.mc .v{font-size:24px;font-weight:600}.mc .l{font-size:10px;color:var(--text-secondary);margin-top:3px}
.stat-tile{background:var(--bg-primary);border:1px solid var(--border-tertiary);border-radius:var(--radius-lg);padding:1.1rem 1rem;box-shadow:var(--shadow-sm);cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.stat-tile:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);border-color:var(--accent)}
.stat-tile::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--accent);opacity:0;transition:opacity .15s}.stat-tile:hover::before{opacity:1}
.stat-v{font-size:30px;font-weight:800;line-height:1;letter-spacing:-.02em}
.stat-l{font-size:11px;color:var(--text-secondary);margin-top:7px;font-weight:500}
.chip-late{display:inline-block;padding:4px 11px;border-radius:99px;font-size:12px;font-weight:600;background:var(--amber-bg);color:var(--amber);border:1px solid transparent;transition:all .12s}.chip-late:hover{border-color:var(--amber)}
.player-hero{display:flex;align-items:center;gap:1.25rem;background:linear-gradient(135deg,var(--navy),var(--navy-2));border-radius:var(--radius-lg);padding:1.4rem 1.5rem;margin-bottom:1.25rem;color:#fff;box-shadow:var(--shadow-md);flex-wrap:wrap}
.player-hero-av .av{border:3px solid rgba(255,255,255,.2)}
.player-hero-main{flex:1;min-width:180px}
.player-hero-name{font-size:24px;font-weight:800;letter-spacing:-.01em}
.player-hero-meta{font-size:13px;color:#A9B8CE;margin-top:3px}
.status-pill{display:inline-block;padding:4px 12px;border-radius:99px;font-size:12px;font-weight:700;color:#fff}
.player-hero-stats{display:flex;gap:1.5rem}
.phs{text-align:center}.phs-v{font-size:22px;font-weight:800;line-height:1}.phs-l{font-size:10px;color:#A9B8CE;margin-top:5px}
@media(max-width:640px){.player-hero-stats{width:100%;justify-content:space-around;margin-top:10px;padding-top:14px;border-top:1px solid rgba(255,255,255,.12)}}
.chart-hero{background:linear-gradient(135deg,var(--navy),var(--navy-2));border-radius:var(--radius-lg);padding:1.25rem 1.4rem;margin-bottom:0;box-shadow:var(--shadow-md)}
.chart-tabs{display:flex;gap:4px;overflow-x:auto;background:var(--bg-primary);border-radius:var(--radius);padding:5px;margin:14px 0 16px;box-shadow:var(--shadow-sm);-webkit-overflow-scrolling:touch}
.chart-tab{flex-shrink:0;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;color:var(--text-secondary);cursor:pointer;white-space:nowrap;transition:all .15s}
.chart-tab:hover{background:var(--bg-secondary);color:var(--text-primary)}
.chart-tab.ac{background:var(--accent);color:#fff}
/* ===== タイムライン ===== */
.tl-wrap{position:relative;padding:8px 0 8px 0}
.tl-item{position:relative;padding:0 0 22px 38px}
.tl-item:last-child{padding-bottom:4px}
.tl-line{position:absolute;left:13px;top:22px;bottom:-4px;width:2px;background:linear-gradient(180deg,var(--tl-color,var(--accent)),rgba(255,255,255,.06))}
.tl-item:last-child .tl-line{display:none}
.tl-dot{position:absolute;left:5px;top:3px;width:18px;height:18px;border-radius:50%;background:var(--tl-color,var(--accent));box-shadow:0 0 0 4px var(--bg-app),0 0 12px var(--tl-glow,rgba(59,130,246,.6));display:flex;align-items:center;justify-content:center;z-index:2}
.tl-dot svg{width:10px;height:10px;fill:#fff}
.tl-card{background:linear-gradient(135deg,var(--bg-primary),var(--bg-secondary));border:1px solid var(--border-tertiary);border-left:3px solid var(--tl-color,var(--accent));border-radius:10px;padding:11px 14px;transition:all .2s;box-shadow:var(--shadow-sm)}
.tl-card:hover{transform:translateX(3px);box-shadow:0 4px 16px rgba(0,0,0,.25)}
.tl-date{font-size:11px;font-weight:700;color:var(--tl-color,var(--accent));letter-spacing:.03em;text-transform:uppercase;margin-bottom:3px}
.tl-title{font-size:14px;font-weight:700;color:var(--text-primary);margin-bottom:2px}
.tl-desc{font-size:12.5px;color:var(--text-secondary);line-height:1.5}
.tl-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;margin-left:6px;vertical-align:middle}
.tl-metric{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;background:var(--bg-tertiary);padding:2px 8px;border-radius:6px;margin:4px 4px 0 0}
/* ===== ランキング ===== */
.rk-podium{display:flex;align-items:flex-end;justify-content:center;gap:10px;margin-bottom:20px}
.rk-col{flex:1;text-align:center;min-width:0}
.rk-col.first{flex:1.15}
.rk-ava{border-radius:50%;margin:0 auto 6px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;background-size:cover;background-position:center}
.rk-name{font-size:13px;font-weight:700;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rk-sub{font-size:10px;color:var(--text-secondary);margin-bottom:6px}
.rk-stand{border-radius:10px 10px 0 0;padding:14px 6px 12px;display:flex;flex-direction:column;justify-content:flex-end;color:#fff}
.rk-rank-num{font-weight:800;line-height:1}
.rk-val{font-weight:800;color:#fff;margin-top:4px}
.rk-row{display:flex;align-items:center;gap:10px;background:var(--bg-secondary);border-radius:10px;padding:9px 12px;position:relative;overflow:hidden;cursor:pointer;transition:transform .15s}
.rk-row:hover{transform:translateX(3px)}
.rk-bar{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,rgba(59,130,246,.16),rgba(59,130,246,0));z-index:0}
.rk-row>*{z-index:1}
.rk-rownum{width:24px;font-weight:700;color:var(--text-secondary);font-size:14px;text-align:center}
.rk-rowava{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;background-size:cover;background-position:center}
.soap-line{display:flex;gap:8px;align-items:flex-start;margin-bottom:6px;font-size:13px;line-height:1.5}
.soap-tag{flex-shrink:0;width:22px;height:22px;border-radius:6px;color:#fff;font-weight:800;font-size:12px;display:inline-flex;align-items:center;justify-content:center}
.fl{display:flex;flex-direction:column;gap:5px}.fl label{font-size:12px;color:var(--text-secondary);font-weight:600}
.form-box{background:var(--bg-secondary);border:1px solid var(--border-tertiary);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1.25rem}
.form-title{font-size:12px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.04em;margin-bottom:14px}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border-tertiary);margin-bottom:1.25rem}
.tab{padding:10px 16px;font-size:13px;cursor:pointer;color:var(--text-secondary);border-bottom:2.5px solid transparent;margin-bottom:-1px;font-weight:500}.tab.ac{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}
.tc{display:none}.tc.ac{display:block}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0;overflow:hidden;background-size:cover;background-position:center}
.pcard{cursor:pointer;text-align:center;transition:all .18s}.pcard:hover{transform:translateY(-3px);border-color:var(--blue);box-shadow:var(--shadow-md)}
.no{text-align:center;padding:2rem;color:var(--text-secondary);font-size:13px}
.stage-line{display:flex;align-items:flex-start;gap:0;margin:1rem 0;overflow-x:auto;padding-bottom:6px}
.stage-item{display:flex;flex-direction:column;align-items:center;min-width:72px;flex:1;position:relative}
.stage-dot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;z-index:2;border:2.5px solid var(--border-tertiary);background:var(--bg-primary);color:var(--text-secondary)}
.stage-dot.done{background:var(--green);border-color:var(--green);color:#fff}.stage-dot.cur{background:var(--blue);border-color:var(--blue);color:#fff}
.stage-label{font-size:9px;color:var(--text-secondary);margin-top:4px;text-align:center;line-height:1.3}
.stage-est{font-size:8px;color:var(--text-tertiary);margin-top:1px}.stage-date{font-size:8px;color:var(--green);margin-top:1px;font-weight:600}
.stage-conn{position:absolute;top:15px;left:50%;width:100%;height:2.5px;background:var(--border-tertiary);z-index:1}.stage-conn.done{background:var(--green)}
.alert-card{padding:.65rem .85rem;border-radius:var(--radius);margin-bottom:6px;font-size:12px;display:flex;align-items:center;gap:8px;font-weight:500}
.alert-up{background:var(--green-bg);color:var(--green);border-left:3px solid var(--green)}
.alert-down{background:var(--red-bg);color:var(--red);border-left:3px solid var(--red)}
.alert-warn{background:var(--amber-bg);color:var(--amber);border-left:3px solid var(--amber)}
.alert-info{background:var(--blue-bg);color:var(--blue);border-left:3px solid var(--blue)}
.rank-tbl{width:100%;border-collapse:collapse;font-size:13px}
.rank-tbl th{text-align:left;padding:8px 10px;border-bottom:1.5px solid var(--border-secondary);color:var(--text-secondary);font-weight:600;font-size:11px}
.rank-tbl td{padding:8px 10px;border-bottom:0.5px solid var(--border-tertiary)}.rank-tbl tr:hover td{background:var(--bg-secondary)}
.chart-wrap{position:relative;height:230px;margin:1rem 0}
.photo-up{width:90px;height:90px;border-radius:50%;border:2.5px dashed var(--border-secondary);display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;background:var(--bg-secondary);background-size:cover;background-position:center;flex-shrink:0;font-size:11px;color:var(--text-secondary);text-align:center;line-height:1.4}.photo-up:hover{border-color:var(--blue)}
.log-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:0.5px solid var(--border-tertiary);font-size:12px}.log-row:last-child{border-bottom:none}
.pain-dot{display:inline-flex;width:24px;height:24px;border-radius:50%;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff;flex-shrink:0}
.srch{display:flex;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap}.srch .ipt{width:auto}
.att-bar{display:flex;align-items:center;gap:8px;font-size:12px;margin-bottom:5px}
.cb-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:1px solid var(--border-tertiary);cursor:pointer;transition:background .1s}.cb-row:hover{background:var(--bg-secondary)}.cb-row.checked{background:var(--red-bg)}
.cb-box{width:20px;height:20px;border:2px solid var(--border-secondary);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}.cb-box.on{background:var(--red);border-color:var(--red);color:#fff}
.reason-ipt{margin-top:4px;padding:5px 8px;border:1px solid var(--border-secondary);border-radius:6px;font-size:12px;width:100%;background:var(--bg-primary);color:var(--text-primary);font-family:var(--font-sans)}
.ftg-cell{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 6px;border-radius:var(--radius);min-width:50px;text-align:center}
.ftg-val{font-size:16px;font-weight:600;line-height:1}.ftg-lbl{font-size:9px;color:var(--text-secondary)}
.p-search-wrap{position:relative}.p-search-list{position:absolute;top:100%;left:0;right:0;background:var(--bg-primary);border:1.5px solid var(--border-secondary);border-top:none;border-radius:0 0 var(--radius) var(--radius);max-height:200px;overflow-y:auto;z-index:10;display:none}
.p-search-list.open{display:block}
.p-search-item{padding:8px 12px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:8px;border-bottom:0.5px solid var(--border-tertiary)}.p-search-item:hover{background:var(--bg-secondary)}
.detail-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:0.5px solid var(--border-tertiary);font-size:13px}.detail-row:last-child{border-bottom:none}
.detail-label{color:var(--text-secondary);font-weight:600;min-width:100px}.detail-value{color:var(--text-primary);text-align:right}
@media(max-width:768px){.sb{width:56px}.sb-hd{display:none}.ni{padding:12px 0;justify-content:center}.ni span:last-child{display:none}.ni-ic{opacity:.85}.ni-group{display:none}.g2,.g3{grid-template-columns:1fr}.g4{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}.ct{padding:1rem}}
</style>
</head>
<body>
<div class="app">
<div class="sb">
<div class="sb-hd"><h1><svg width="22" height="22" viewBox="0 0 24 24" fill="#fff"><path d="M12 2C7 2 3 6 3 11c0 1.6.4 3.1 1.1 4.4l-1.8 4.8c-.2.6.4 1.2 1 .9l4.6-1.9C9.3 21.4 10.6 22 12 22c5 0 9-4 9-9s-4-9-9-9zm-2.5 6.5l1.5 1.5 1.5-1.5 1 1-1.5 1.5 1.5 1.5-1 1L12 11.5 10.5 13l-1-1L11 10.5 9.5 9l1-1z"/></svg> Rugby Manager</h1><p>FUKUOKA UNIV. RFC</p></div>
<div style="padding:.5rem 0">
<div class="ni-group">日々の確認</div>
<div class="ni ac" onclick="nav('dash')"><span class="ni-ic"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg></span><span>ダッシュボード</span></div>
<div class="ni" onclick="nav('players')"><span class="ni-ic"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg></span><span>選手一覧</span></div>
<div class="ni" onclick="nav('calendar')"><span class="ni-ic"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V9h14v10zM7 11h5v5H7z"/></svg></span><span>カレンダー</span></div>
<div class="ni-group">怪我・リハビリ</div>

function getPctFromRIR(reps,rir){
  var rpe=10-rir;
  if(rpe>10)rpe=10;if(rpe<6)rpe=6;

  rpe=Math.round(rpe*2)/2;
  var r=Math.round(reps);
  if(r<1)r=1;if(r>12)r=12;
  var row=RPECHART[r];
  if(!row)return null;
  return row[rpe]!=null?row[rpe]:null;
}
// 推定重量 = 1RM × % 、2.5kg単位に丸め
function estimateWeight(oneRM,reps,rir){
  if(!oneRM)return null;
  var pct=getPctFromRIR(reps,rir);
  if(pct==null)return null;
  var w=oneRM*pct/100;
  return Math.round(w/2.5)*2.5;
}
// e1RM逆算（実際に挙げた weight×reps×rir から推定1RM）
function estimateOneRM(weight,reps,rir){
  if(!weight||!reps)return null;
  var pct=getPctFromRIR(reps,rir!=null?rir:0);
  if(pct==null||pct===0)return null;
  return Math.round(weight/(pct/100));
}

// 'std'の保存値をデフォルトへフィールド単位でマージ（部分保存でも欠けが出ない）
function getStdCfg(){
  var saved=(D.std&&D.std[0])||null;
  if(!saved)return STD_DEFAULT;
  var cfg={pos:{},ranks:(saved.ranks&&saved.ranks.length?saved.ranks:STD_DEFAULT.ranks),allo:saved.allo||STD_DEFAULT.allo,rx:saved.rx||STD_DEFAULT.rx};
  Object.keys(STD_DEFAULT.pos).forEach(function(pk){
    var d=STD_DEFAULT.pos[pk],s=(saved.pos||{})[pk]||{},m={};
    Object.keys(d).forEach(function(f){m[f]=(s[f]!=null&&s[f]!==''?s[f]:d[f]);});
    cfg.pos[pk]=m;
  });
  return cfg;
}
// 現在体重: 直近30日の実測（コンディションの毎日体重＋体組成）の平均 → 期間外は最新実測 → 選手登録の体重
function getCurrentWeightInfo(pid){
  var since=toDateStr(new Date(Date.now()-29*86400000));
  var recs=[];
  (D.f||[]).forEach(function(r){var w=parseFloat(r.weight);if(idEq(r.pid,pid)&&w>0&&r.date)recs.push({date:r.date,w:w});});
  (D.bc||[]).forEach(function(r){var w=parseFloat(r.weight);if(idEq(r.pid,pid)&&w>0&&r.date)recs.push({date:r.date,w:w});});
  var recent=recs.filter(function(x){return x.date>=since;});
  if(recent.length){
    var avg=recent.reduce(function(s,x){return s+x.w;},0)/recent.length;
    return{w:Math.round(avg*10)/10,src:'直近30日平均・'+recent.length+'回',live:true};
  }
  if(recs.length){
    recs.sort(function(a,b){return(b.date||'').localeCompare(a.date||'');});
    return{w:recs[0].w,src:fmt(recs[0].date)+'の実測',live:false};
  }
  var p=D.p.find(function(x){return idEq(x.id,pid);});
  var pw=p?parseFloat(p.weight):NaN;
  if(pw>0)return{w:pw,src:'選手登録の体重',live:false};
  return null;
}
// 種目ランク判定。ratio=1RM÷(ゴールド倍率×体重)。ranks昇順でratio以上の最上位が現ランク。
function getLiftRankInfo(pid,liftK){
  var p=D.p.find(function(x){return idEq(x.id,pid);});
  if(!p||!p.position)return null;
  var cfg=getStdCfg(),posStd=cfg.pos[p.position];
  if(!posStd||!posStd[liftK])return null;
  var wInfo=getCurrentWeightInfo(pid);
  if(!wInfo)return{noWeight:true,lift:liftK};
  var lift=STD_LIFTS.find(function(l){return l.k===liftK;});
  var oneRM=getBest(pid,lift.ph);
  var goldTarget=posStd[liftK]*wInfo.w;
  var ratio=oneRM?oneRM/goldTarget:0;
  var ranks=cfg.ranks.slice().sort(function(a,b){return a.pct-b.pct;});
  var cur=null,next=null;
  for(var i=0;i<ranks.length;i++){
    if(oneRM&&ratio>=ranks[i].pct)cur=ranks[i];
    else if(!next)next=ranks[i];
  }
  return{
    lift:liftK,label:lift.label,short:lift.short,
    oneRM:oneRM,weight:wInfo.w,weightSrc:wInfo.src,mult:posStd[liftK],
    goldTarget:Math.round(goldTarget*10)/10,
    ratio:ratio,
    relBW:oneRM?Math.round(oneRM/wInfo.w*100)/100:null,
    rank:cur,next:next,
    nextTargetKg:next?Math.round(next.pct*goldTarget*10)/10:null,
    nextNeedKg:(next&&oneRM)?Math.max(0,Math.ceil((next.pct*goldTarget-oneRM)*2)/2):null
  };
}
// アロメトリック補正スコア = 1RM ÷ 体重^b（体格差を除いた公平比較用）
function getAlloScore(pid,liftK){
  var cfg=getStdCfg(),b=cfg.allo[liftK];
  if(b==null)return null;
  var wInfo=getCurrentWeightInfo(pid);
  if(!wInfo)return null;
  var lift=STD_LIFTS.find(function(l){return l.k===liftK;});
  var oneRM=getBest(pid,lift.ph);
  if(!oneRM)return null;
  return Math.round(oneRM/Math.pow(wInfo.w,b)*10)/10;
}
// 体重推奨帯: 下限=FFMI下限×身長²÷(1−体脂肪下限)、上限=FFMI上限×身長²÷(1−体脂肪上限)
function getWeightBandInfo(pid){
  var p=D.p.find(function(x){return idEq(x.id,pid);});
  if(!p||!p.position)return null;
  var cfg=getStdCfg(),s=cfg.pos[p.position];
  if(!s)return null;
  var hCm=parseFloat(p.height);
  if(!(hCm>0))return{noHeight:true};
  var hM=hCm/100;
  var lo=s.ffmiLo*hM*hM/(1-s.bfLo/100);
  var hi=s.ffmiHi*hM*hM/(1-s.bfHi/100);
  var wInfo=getCurrentWeightInfo(pid);
  var st=null,diff=null;
  if(wInfo){
    if(wInfo.w<lo){st='under';diff=lo-wInfo.w;}
    else if(wInfo.w>hi){st='over';diff=wInfo.w-hi;}
    else st='in';
  }
  return{lo:Math.round(lo*10)/10,hi:Math.round(hi*10)/10,w:wInfo?wInfo.w:null,weightSrc:wInfo?wInfo.src:null,status:st,diff:diff!=null?Math.round(diff*10)/10:null,ffmiLo:s.ffmiLo,ffmiHi:s.ffmiHi,bfLo:s.bfLo,bfHi:s.bfHi};
}
// 現在FFMI（直近の体脂肪率つき体組成から。無ければnull→測定CTA表示に使う）
function getCurrentFFMIInfo(pid){
  var p=D.p.find(function(x){return idEq(x.id,pid);});
  var hCm=parseFloat(p&&p.height);
  if(!(hCm>0))return null;
  var recs=(D.bc||[]).filter(function(r){return idEq(r.pid,pid)&&parseFloat(r.weight)>0&&r.fat!=null&&r.fat!=='';}).sort(function(a,b){return(b.date||'').localeCompare(a.date||'');});
  if(!recs.length)return null;
  var fat=parseFloat(recs[0].fat),w=parseFloat(recs[0].weight);
  if(!(w>0)||isNaN(fat))return null;
  var hM=hCm/100,ffm=w*(1-fat/100);
  return{ffmi:Math.round(ffm/(hM*hM)*10)/10,ffm:Math.round(ffm*10)/10,fat:fat,date:recs[0].date};
}
// 弱点種目 = 測定済み種目のうち達成率(ratio)最小。2種目以上の測定が無いと判定しない
function getWeakLift(pid){
  var infos=[];
  STD_LIFTS.forEach(function(l){
    var inf=getLiftRankInfo(pid,l.k);
    if(inf&&inf.oneRM)infos.push(inf);
  });
  if(infos.length<2)return null;
  infos.sort(function(a,b){return a.ratio-b.ratio;});
  return infos[0];
}
// アロメトリック補正スコアのチーム内順位（スコア算出可能な選手のみ母数）
function getAlloTeamRank(pid,liftK){
  var scores=D.p.map(function(pp){return{pid:pp.id,s:getAlloScore(pp.id,liftK)};}).filter(function(x){return x.s!=null;});
  if(!scores.length)return null;
  scores.sort(function(a,b){return b.s-a.s;});
  var idx=scores.findIndex(function(x){return idEq(x.pid,pid);});
  if(idx<0)return null;
  return{rank:idx+1,total:scores.length,score:scores[idx].s};
}
// 弱点種目に効くボリュームの週次推移（月曜始まり・直近weeks週）。
// 対象= estBaseが弱点種目 or 種目名がメイン種目名/処方箋(rx)の種目名に一致（skippedは除外）
function getWeakWeeklyVolume(pid,liftK,weeks){
  var lift=STD_LIFTS.find(function(l){return l.k===liftK;});
  if(!lift)return[];
  var cfg=getStdCfg();
  var rxNames=(cfg.rx[liftK]||[]).map(function(r){return r.name;});
  var now=new Date();var dow=(now.getDay()+6)%7;// 月曜=0
  var thisMon=new Date(now);thisMon.setDate(now.getDate()-dow);
  var out=[];
  for(var wi=weeks-1;wi>=0;wi--){
    var st=new Date(thisMon);st.setDate(thisMon.getDate()-7*wi);
    var en=new Date(st);en.setDate(st.getDate()+6);
    var stS=toDateStr(st),enS=toDateStr(en);
    var vol=0;
    (D.tlog||[]).forEach(function(l){
      if(!idEq(l.pid,pid)||l.absent||!l.results)return;
      if(!(l.date>=stS&&l.date<=enS))return;
      l.results.forEach(function(r){
        if(r.skipped)return;
        var isTarget=(r.estBase===lift.ph)||(r.exName===lift.label)||rxNames.indexOf(r.exName)>=0;
        if(!isTarget)return;
        (r.sets||[]).forEach(function(s){vol+=(parseFloat(s.weight)||0)*(parseInt(s.reps)||0);});
      });
    });
    out.push({label:(st.getMonth()+1)+'/'+st.getDate()+'週',vol:Math.round(vol)});
  }
  return out;
}
// 選手詳細「基本情報」タブ用: BIG3ランクバッジ＋体重帯ステータス（選手サイトのマイステータスと同じ基準エンジンを使用）
function renderStdSummaryHTML(pid){
  var p=D.p.find(function(x){return idEq(x.id,pid);});
  if(!p||!p.position)return'<div class="form-box"><div class="form-title">🏋️ BIG3基準・体重帯</div><div class="no">ポジション未登録のため基準未表示</div></div>';
  var weak=getWeakLift(pid);
  var liftsHtml=STD_LIFTS.map(function(l){
    var inf=getLiftRankInfo(pid,l.k);
    var isWeak=weak&&weak.lift===l.k;
    if(!inf||inf.noWeight||!inf.oneRM)return'<div class="mc"><div class="v" style="font-size:13px;color:var(--text-tertiary)">-</div><div class="l">'+l.short+(inf&&inf.noWeight?' (体重なし)':'')+'</div></div>';
    var rankLabel=inf.rank?inf.rank.label:'未到達';
    var rankColor=inf.rank?inf.rank.color:'var(--text-tertiary)';
    return'<div class="mc"><div class="v" style="font-size:14px;color:'+rankColor+'">'+rankLabel+(isWeak?' 🎯':'')+'</div><div class="l">'+l.short+' '+inf.oneRM+'kg</div></div>';
  }).join('');
  var band=getWeightBandInfo(pid);
  var bandHtml='';
  if(band&&band.noHeight)bandHtml='<div style="font-size:12px;color:var(--text-tertiary);margin-top:8px">身長未登録のため推奨体重帯は非表示</div>';
  else if(band){
    var stChip=band.status==='in'?'<span class="bd bd-g">帯内 ✓</span>'
      :band.status==='under'?'<span class="bd bd-a">帯まで +'+band.diff+'kg</span>'
      :band.status==='over'?'<span class="bd bd-r">帯上限 +'+band.diff+'kg</span>':'';
    bandHtml='<div style="font-size:12px;margin-top:8px">推奨体重帯 <b>'+band.lo+'〜'+band.hi+'kg</b>'+(band.w!=null?'（現在 '+band.w+'kg・'+escapeHtml(band.weightSrc||'')+'）':'')+' '+stChip+'</div>';
  }
  return'<div class="form-box"><div class="form-title">🏋️ BIG3基準・体重帯</div><div class="grid" style="grid-template-columns:repeat(3,1fr);gap:8px">'+liftsHtml+'</div>'+bandHtml+'</div>';
}

function sv(k){db.collection('appdata').doc(k).set({data:JSON.stringify(D[k])}).catch(function(e){console.error('Save error:',k,e);});}
function svSafe(k,newRec,onDone){
  // Firestoreトランザクションで最新取得→追加→保存（同時書き込みでも記録を失わない）
  var ref=db.collection('appdata').doc(k);
  return db.runTransaction(function(tx){
    return tx.get(ref).then(function(doc){
      var latest=[];if(doc.exists){try{var parsed=JSON.parse(doc.data().data);if(Array.isArray(parsed))latest=parsed;}catch(e){}}
      latest.push(newRec);
      tx.set(ref,{data:JSON.stringify(latest)});
      return latest;
    });
  }).then(function(latest){D[k]=latest;if(onDone)onDone();}).catch(function(e){console.error('svSafe error:',k,e);alert('保存に失敗しました');});
}
// 配列を直接更新する場合のsvSafe
function svSafeUpdate(k,updateFn,onDone,onError){
  var ref=db.collection('appdata').doc(k);
  return db.runTransaction(function(tx){
    return tx.get(ref).then(function(doc){
      var latest=[];if(doc.exists){try{var parsed=JSON.parse(doc.data().data);if(Array.isArray(parsed))latest=parsed;}catch(e){}}
      latest=updateFn(latest);
      tx.set(ref,{data:JSON.stringify(latest)});
      return latest;
    });
  }).then(function(latest){D[k]=latest;if(onDone)onDone();}).catch(function(e){console.error('svSafeUpdate error:',k,e);if(onError)onError(e);else alert('保存に失敗しました');});
}
// 単一レコードをトランザクションで安全にupsert（id一致で置換、なければ追加）
function svRec(k,rec,onDone){
  svSafeUpdate(k,function(latest){
    var i=latest.findIndex(function(x){return idEq(x.id,rec.id);});
    if(i>=0)latest[i]=rec;else latest.push(rec);
    return latest;
  },onDone);
}
// 単一レコードをトランザクションで安全に削除（id一致）
function svDel(k,id,onDone){
  svSafeUpdate(k,function(latest){return latest.filter(function(x){return!idEq(x.id,id);});},onDone);
}

rank:function(){
  var m=document.getElementById('rkm')?document.getElementById('rkm').value:'squat',yf=document.getElementById('rky')?document.getElementById('rky').value:'',pf=document.getElementById('rkp')?document.getElementById('rkp').value:'';
  var labels={squat:'スクワットMAX',bench:'ベンチプレスMAX',deadlift:'デッドリフトMAX',chinning:'チンニングMAX',clean:'クリーンMAX',bronco:'ブロンコテスト',big3:'BIG3合計',big3perkg:'体重あたりBIG3'};
  var rk=D.p.filter(function(p){if(yf&&String(p.year)!==yf)return false;if(pf&&p.position!==pf)return false;return true;}).map(function(p){var rs=D.ph.filter(function(x){return x.pid===p.id;});var v=null;
  if(m==='bronco'){var vs=rs.filter(function(x){return x.bronco;}).map(function(x){return x.bronco;});v=vs.length?Math.min.apply(null,vs):null;}
  else if(m==='big3'){v=rs.length?Math.max.apply(null,rs.map(function(x){return big3(x);})):null;}

  else{var vs2=rs.filter(function(x){return x[m];}).map(function(x){return x[m];});v=vs2.length?Math.max.apply(null,vs2):null;}
  return{p:p,v:v};}).filter(function(x){return x.v!==null;});
  m==='bronco'?rk.sort(function(a,b){return a.v-b.v;}):rk.sort(function(a,b){return b.v-a.v;});
  var unit=m==='bronco'?'':m==='big3perkg'?'倍':'kg';
  var fmtVal=function(v){return m==='bronco'?broncoFmt(v):m==='big3perkg'?v.toFixed(2):v+(unit?' '+unit:'');};
  var filterUI='<div class="srch"><select class="ipt" style="width:auto" id="rkm" onchange="V.rank()">'+Object.keys(labels).map(function(k){return'<option value="'+k+'"'+(m===k?' selected':'')+'>'+labels[k]+'</option>';}).join('')+'</select><select class="ipt" style="width:auto" id="rky" onchange="V.rank()"><option value="">全学年</option>'+[1,2,3,4].map(function(y){return'<option value="'+y+'"'+(yf===String(y)?' selected':'')+'>'+y+'年</option>';}).join('')+'</select><select class="ipt" style="width:auto" id="rkp" onchange="V.rank()"><option value="">全ポジション</option>'+POS.map(function(p){return'<option'+(pf===p?' selected':'')+'>'+p+'</option>';}).join('')+'</select></div>';

  if(!rk.length){$m().innerHTML=filterUI+'<div class="no">データなし</div>';return;}

  var maxV=m==='bronco'?Math.max.apply(null,rk.map(function(r){return r.v;})):rk[0].v;
  var minV=m==='bronco'?Math.min.apply(null,rk.map(function(r){return r.v;})):0;
  // バーの幅%（broncoは小さいほど良いので反転）
  var barPct=function(v){if(m==='bronco'){var range=maxV-minV;return range?Math.round((maxV-v)/range*70+25):60;}return maxV?Math.round(v/maxV*88):60;};

  var h=filterUI+'<div style="font-size:14px;font-weight:700;margin-bottom:2px;display:flex;align-items:center;gap:6px">🏆 '+labels[m]+' ランキング</div><div style="font-size:12px;color:var(--text-secondary);margin-bottom:18px">'+(yf?yf+'年':'全学年')+'・'+(pf||'全ポジション')+'</div>';

  // トップ3が揃う場合は表彰台
  if(rk.length>=3){

    h+='<div class="rk-podium">';
    podiumOrder.forEach(function(o){
      var isFirst=o.pos===0;
      var p=o.r.p;
      var sc=standColors[o.pos],ac=avaColors[o.pos];
      // アバター（写真があれば写真、なければグラデ+イニシャル）
      var ini=p.name?p.name.split(/\s+/).map(function(w){return w[0];}).join('').slice(0,2):'?';
      var avaStyle='width:'+avaSz[o.pos]+'px;height:'+avaSz[o.pos]+'px;border:3px solid '+avaBorder[o.pos]+';font-size:'+Math.round(avaSz[o.pos]*.34)+'px;'+(isFirst?'box-shadow:0 0 20px rgba(251,191,36,.5);':'');
      var avaInner=p.photo?'background-image:url('+p.photo+')':'background:linear-gradient(135deg,'+ac[0]+','+ac[1]+')';
      h+='<div class="rk-col'+(isFirst?' first':'')+'">'+
        (isFirst?'<div style="font-size:20px;margin-bottom:2px">👑</div>':'')+
        '<div class="rk-ava" style="'+avaStyle+avaInner+'" onclick="goPlayerDetail('+p.id+')">'+(p.photo?'':ini)+'</div>'+
        '<div class="rk-name" onclick="goPlayerDetail('+p.id+')" style="cursor:pointer">'+escapeHtml(p.name)+'</div>'+
        '<div class="rk-sub">'+(p.position||'-')+'・'+(p.year||'-')+'年</div>'+
        '<div class="rk-stand" style="height:'+standH[o.pos]+'px;background:linear-gradient(180deg,'+sc[0]+','+sc[1]+')'+(isFirst?';box-shadow:0 -2px 16px rgba(251,191,36,.3)':'')+'">'+
          '<div class="rk-rank-num" style="font-size:'+(isFirst?28:22)+'px;color:'+(isFirst?'#FFF7E6':o.pos===1?'#CBD5E1':'#FED7AA')+'">'+(o.pos+1)+'</div>'+

        '</div>'+

    h+='</div>';
    // 4位以降
    if(rk.length>3){

      rk.slice(3).forEach(function(r,i){

        var avaInner=p.photo?'background-image:url('+p.photo+')':'background:var(--bg-tertiary);color:var(--accent)';
        h+='<div class="rk-row" onclick="goPlayerDetail('+p.id+')">'+
          '<div class="rk-bar" style="width:'+barPct(r.v)+'%"></div>'+
          '<div class="rk-rownum">'+rank+'</div>'+
          '<div class="rk-rowava" style="'+avaInner+'">'+(p.photo?'':ini)+'</div>'+
          '<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+escapeHtml(p.name)+'</div><div style="font-size:10px;color:var(--text-secondary)">'+(p.position||'-')+'・'+(p.year||'-')+'年</div></div>'+
          '<div style="font-weight:800;color:var(--text-primary);font-size:15px">'+fmtVal(r.v).replace(/ ?'+unit+'$/,'')+'<span style="font-size:10px;color:var(--text-secondary);font-weight:400">'+(unit?' '+unit:'')+'</span></div>'+
        '</div>';
      });
      h+='</div>';
    }
  }else{
    // 3人未満：リストのみ
    h+='<div style="display:flex;flex-direction:column;gap:7px">';
    rk.forEach(function(r,i){
      var p=r.p;
      var ini=p.name?p.name.split(/\s+/).map(function(w){return w[0];}).join('').slice(0,2):'?';
      var avaInner=p.photo?'background-image:url('+p.photo+')':'background:var(--bg-tertiary);color:var(--accent)';
      var medal=['🥇','🥈','🥉'][i]||'';
      h+='<div class="rk-row" onclick="goPlayerDetail('+p.id+')">'+
        '<div class="rk-bar" style="width:'+barPct(r.v)+'%"></div>'+
        '<div class="rk-rownum">'+(medal||(i+1))+'</div>'+
        '<div class="rk-rowava" style="'+avaInner+'">'+(p.photo?'':ini)+'</div>'+
        '<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;color:var(--text-primary)">'+escapeHtml(p.name)+'</div><div style="font-size:10px;color:var(--text-secondary)">'+(p.position||'-')+'・'+(p.year||'-')+'年</div></div>'+
        '<div style="font-weight:800;color:var(--text-primary);font-size:15px">'+fmtVal(r.v)+'</div>'+

  $m().innerHTML=h;

calendar:function(){
  var now=new Date();
  var ym=document.getElementById('cal-ym')?document.getElementById('cal-ym').value:(now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0'));
  var parts=ym.split('-');var yr=parseInt(parts[0]),mo=parseInt(parts[1])-1;
  var firstDay=new Date(yr,mo,1);var lastDay=new Date(yr,mo+1,0);
  var eventsThisMonth=D.cal.filter(function(e){return e.date&&e.date.startsWith(ym);}).sort(function(a,b){return a.date.localeCompare(b.date);});
  // Calendar grid
  var DOW=['日','月','火','水','木','金','土'];
  var calH='<div style="display:flex;align-items:center;gap:10px;margin-bottom:1rem"><button class="btn" onclick="calNavMonth(-1,\''+ym+'\')">◀</button><input type="month" class="ipt" id="cal-ym" value="'+ym+'" style="width:auto;flex:1" onchange="V.calendar()"><button class="btn" onclick="calNavMonth(1,\''+ym+'\')">▶</button></div>';
  calH+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:1rem">';
  DOW.forEach(function(d,i){calH+='<div style="text-align:center;font-size:11px;font-weight:600;padding:4px;color:'+(i===0?'var(--red)':i===6?'var(--blue)':'var(--text-secondary)')+'">'+d+'</div>';});
  // blank cells before first day
  for(var bi=0;bi<firstDay.getDay();bi++)calH+='<div></div>';
  var todayS=todayStr();
  for(var d=1;d<=lastDay.getDate();d++){
    var ds=yr+'-'+String(mo+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var dayEvts=D.cal.filter(function(e){return e.date===ds;});
    var isToday=ds===todayS;
    var dow=(firstDay.getDay()+d-1)%7;
    calH+='<div onclick="calDayClick(\''+ds+'\')" style="min-height:52px;border:1px solid var(--border-tertiary);border-radius:6px;padding:4px;cursor:pointer;background:'+(isToday?'var(--blue-bg)':'var(--bg-primary)')+';transition:background .1s" onmouseover="this.style.background=\'var(--bg-secondary)\'" onmouseout="this.style.background=\''+(isToday?'var(--blue-bg)':'var(--bg-primary)')+'\'">';
    calH+='<div style="font-size:12px;font-weight:'+(isToday?'700':'500')+';color:'+(isToday?'var(--blue)':dow===0?'var(--red)':dow===6?'var(--blue)':'var(--text-primary)')+'">'+d+'</div>';
    var msessOnDay=(D.msess||[]).filter(function(s){return s.startDate<=ds&&s.endDate>=ds;});
    msessOnDay.forEach(function(s){calH+='<div style="font-size:8px;background:#0891B2;color:#fff;border-radius:3px;padding:1px 3px;margin-top:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">📐'+escapeHtml(s.name)+'</div>';});
    dayEvts.forEach(function(e){var color=e.type==='match'?'var(--purple)':e.type==='practice'?'var(--green)':e.type==='off'?'var(--amber)':e.type==='weight'?'#F97316':e.type==='phys_measure'?'#0891B2':e.type==='bronco_measure'?'#059669':'var(--blue)';calH+='<div style="font-size:9px;background:'+color+';color:#fff;border-radius:3px;padding:1px 4px;margin-top:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">'+escapeHtml(e.title)+'</div>';});
    calH+='</div>';
  }
  calH+='</div>';
  // Event list for month
  calH+='<div style="font-size:14px;font-weight:600;margin-bottom:.5rem">イベント一覧</div>';
  if(eventsThisMonth.length){
    calH+=eventsThisMonth.map(function(e){
      var color=e.type==='match'?'var(--purple)':e.type==='practice'?'var(--green)':e.type==='off'?'var(--amber)':e.type==='weight'?'#F97316':e.type==='phys_measure'?'#0891B2':e.type==='bronco_measure'?'#059669':'var(--blue)';
      var typelabel=e.type==='match'?'試合':e.type==='practice'?'練習':e.type==='off'?'オフ':e.type==='weight'?'ウエイト':e.type==='phys_measure'?'フィジカル測定':e.type==='bronco_measure'?'ブロンコ測定':'その他';
      return'<div class="card" style="margin-bottom:6px;padding:.65rem 1rem;display:flex;align-items:center;gap:10px"><div style="width:8px;height:8px;border-radius:50%;background:'+color+';flex-shrink:0"></div><div style="flex:1"><div style="font-weight:600;font-size:13px">'+fmt(e.date)+' '+escapeHtml(e.title)+'</div>'+(e.detail?'<div style="font-size:11px;color:var(--text-secondary)">'+escapeHtml(e.detail)+'</div>':'')+'</div><span class="bd" style="background:'+color+'20;color:'+color+'">'+typelabel+'</span>'+(e.type==='match'?'<button class="btn btn-sm" onclick="goSelectMatchMembers(\''+e.id+'\',\''+e.date+'\')">出場選手設定</button>':'')+
      '<button class="btn btn-sm btn-d" onclick="delCalEvent(\''+e.id+'\')">削除</button></div>';
    }).join('');
  } else {
    calH+='<div class="no">この月のイベントはありません</div>';
  }
  $m().innerHTML=calH;
}};

// === REHAB HTML ===
function rehabHTML(r,done){
  var inj=D.i.find(function(x){return idEq(x.id,r.injId);}),p=D.p.find(function(x){return idEq(x.id,r.pid);});if(!p||!inj)return'';
  if(!r.stageDates)r.stageDates=[];
  if(!r.stageTargetDates)r.stageTargetDates=[];
  var dl=inj.returnDate?Math.max(0,Math.ceil((new Date(inj.returnDate)-new Date())/86400000)):null;
  var sl=STG.length-1-r.stage,dps=dl!==null&&sl>0?Math.round(dl/sl):null;
  // 現在段階の目標日と遅延判定
  var currentTarget=r.stageTargetDates[r.stage+1]||null;
  var isOverdue=false;
  var daysOverdue=0;
  if(currentTarget&&r.stage<STG.length-1){
    var targetDt=new Date(currentTarget);
    var nowDt=new Date(todayStr());
    if(nowDt>targetDt){
      isOverdue=true;
      daysOverdue=Math.ceil((nowDt-targetDt)/86400000);
    }
  }
  var h='<div class="card card-click" style="margin-bottom:10px'+(isOverdue?';border-left:3px solid var(--red)':'')+'" onclick="goInjuryDetail('+inj.id+')">'+
  '<div style="display:flex;align-items:center;gap:10px;margin-bottom:.5rem">'+avH(p,36)+
  '<div style="flex:1"><div style="font-size:14px;font-weight:600">'+escapeHtml(p.name)+' — '+injLabel(inj)+
  (isOverdue?' <span class="bd bd-r" style="font-size:9px">⚠️ '+daysOverdue+'日遅延</span>':'')+
  '</div><div style="font-size:12px;color:var(--text-secondary)">受傷: '+fmt(inj.date)+(inj.returnDate?' | 復帰予定: '+fmt(inj.returnDate):'')+'</div></div>'+
  (dl!==null?'<span class="bd bd-b">残り約'+dl+'日</span>':'')+'</div>'+
  '<div class="stage-line" onclick="event.stopPropagation()">';
  for(var idx=0;idx<STG.length;idx++){
    var isDone=idx<r.stage,isCur=idx===r.stage;
    var sd=r.stageDates[idx]||'';
    var target=r.stageTargetDates[idx]||'';
    var est=!isDone&&!isCur&&dps?'約'+(dps*(idx-r.stage))+'日後':'';
    var dateStr='';
    if(sd){dateStr='<div class="stage-date">開始: '+fmt(sd)+'</div>';}
    else if(target){
      var tDt=new Date(target);
      var nowDt2=new Date(todayStr());
      var isLate=nowDt2>tDt;
      dateStr='<div class="stage-date" style="color:'+(isLate?'var(--red)':'var(--amber)')+';font-weight:600">'+(isLate?'⚠️ ':'🎯 ')+'目標: '+fmt(target)+'</div>';
    } else if(isCur){dateStr='<div class="stage-est" style="color:var(--blue);font-weight:600">現在</div>';}
    else if(est){dateStr='<div class="stage-est">'+est+'</div>';}
    h+='<div class="stage-item">'+(idx<STG.length-1?'<div class="stage-conn'+(isDone?' done':'')+'"></div>':'')+
    '<div class="stage-dot'+(isDone?' done':'')+(isCur?' cur':'')+'">'+(isDone?'✓':(idx+1))+'</div>'+
    '<div class="stage-label">'+STG[idx]+'</div>'+dateStr+'</div>';
  }
  h+='</div>';
  if(!done){h+='<div onclick="event.stopPropagation()" style="display:flex;gap:6px;margin-bottom:.5rem;flex-wrap:wrap"><button class="btn btn-sm" onclick="advStage('+r.id+')">次の段階へ ▶</button><button class="btn btn-sm btn-d" onclick="prevStage('+r.id+')">◀ 前に戻す</button><button class="btn btn-sm" onclick="editStageDate('+r.id+','+r.stage+')">開始日設定</button><button class="btn btn-sm" onclick="setStageTargetDate('+r.id+','+(r.stage+1)+')">🎯 目標日設定</button><button class="btn btn-sm" onclick="goAddRehabLog('+r.id+')">+ 実施ログ</button><button class="btn btn-sm btn-p" onclick="goInjuryDetail('+r.injId+')">📊 評価・カルテ</button></div>';}
  // 新式（D.rlog）+ 旧式（r.logs）両方からログを取得して結合
  var newLogs=(D.rlog||[]).filter(function(l){return l.injId===r.injId;}).map(function(l){return{date:l.date,content:l.content||(l.comment||''),_id:l.id,_isNew:true};});
  var oldLogs=(r.logs||[]).map(function(lg,li){return{date:lg.date,content:lg.content,_li:li,_isNew:false};});
  var allLogs=newLogs.concat(oldLogs).sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});
  if(allLogs.length){h+='<div style="font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:4px">実施ログ</div>';allLogs.slice(0,5).forEach(function(lg){h+='<div class="log-row" onclick="event.stopPropagation()"><span style="min-width:65px;color:var(--text-secondary)">'+fmt(lg.date)+'</span><span style="flex:1">'+(lg.content||'-')+'</span>'+(lg._isNew?'<button class="btn btn-sm btn-d" style="margin-left:4px" onclick="delRehabLogStaff(\''+lg._id+'\','+r.injId+')">削除</button>':'<button class="btn btn-sm" style="margin-left:4px" onclick="goEditRehabLog('+r.id+','+lg._li+')">編集</button>')+'</div>';});}
  return h+'</div>';

// 指定選手の過去のケガ一覧（指定ケガ自身は除く、新しい順）
function getPlayerInjHistory(pid,excludeIid){
  return D.i.filter(function(x){return idEq(x.pid,pid)&&!idEq(x.id,excludeIid);})
    .sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});
}
// 同一部位の過去ケガ（再発判定用）
function getSamePartInjuries(pid,part,excludeIid){
  return getPlayerInjHistory(pid,excludeIid).filter(function(x){return x.part===part;});
}
// 再発・多発の検知。返り値: {isRecurrent:bool, samePartCount:int, sameTypeCount:int, lastSame:obj}
function analyzeRecurrence(inj){
  var samePart=getSamePartInjuries(inj.pid,inj.part,inj.id);
  var samePartType=samePart.filter(function(x){return x.type===inj.type;});
  return {
    isRecurrent: samePart.length>0,
    samePartCount: samePart.length,
    sameTypeCount: samePartType.length,
    lastSame: samePart.length?samePart[0]:null,
    history: samePart
  };
}
// 全選手の中で「同一部位を3回以上」のケガを持つ選手を検出（多発アラート）
function getFrequentInjuryPlayers(){
  var byPlayerPart={};
  D.i.forEach(function(inj){
    var key=inj.pid+'|'+inj.part;
    if(!byPlayerPart[key])byPlayerPart[key]={pid:inj.pid,part:inj.part,count:0,injs:[]};
    byPlayerPart[key].count++;
    byPlayerPart[key].injs.push(inj);
  });
  var result=[];
  Object.keys(byPlayerPart).forEach(function(k){
    if(byPlayerPart[k].count>=3)result.push(byPlayerPart[k]);
  });
  return result.sort(function(a,b){return b.count-a.count;});
}

// カルテデータ取得（なければ新規作成して返す）
function getChart(injId){
  var ch=D.chart.find(function(x){return idEq(x.injId,injId);});
  if(!ch){
    ch={injId:injId,injDetail:{},medical:{},evals:[],soaps:[],returnCriteria:{},images:[]};
    D.chart.push(ch);
  }
  // 古いデータに項目がなければ補完
  if(!ch.injDetail)ch.injDetail={};
  if(!ch.medical)ch.medical={};
  if(!ch.evals)ch.evals=[];
  if(!ch.soaps)ch.soaps=[];
  if(!ch.returnCriteria)ch.returnCriteria={};
  if(!ch.images)ch.images=[];
  // 怪我×リハビリ連携（Phase0）：未定義の既存カルテで落ちないよう既定値を補完
  if(!ch.metrics)ch.metrics=[];
  if(!ch.mmtTargets)ch.mmtTargets=[];
  if(ch.injType==null)ch.injType='';
  if(ch.isConcussion==null)ch.isConcussion=false;
  if(!ch.medClearance)ch.medClearance={granted:false,date:null};
  if(!ch.romLimit)ch.romLimit={active:false,key:null,max:null,min:null,until:null};
  if(ch.rtpLevel==null)ch.rtpLevel='';
  return ch;
}
// カルテ保存（必ずsvSafeUpdateで安全に。素のsvは使わない＝他端末のカルテを巻き戻さない）
// ⚠️ saveChart(ch)は ch 全体を server-latest に上書きする＝同一injId内のロストアップデートの火種。
//   eval/metrics等の頻繁な編集は下の操作単位関数(saveChartMetrics/saveEval/delEval)を使うこと。
//   低頻度のSOAP/復帰基準/rtpLevel等のみ saveChart を継続使用。
function saveChart(ch,onDone){
  if(!ch){if(onDone)onDone();return;}
  // 一意キーは injId 優先、無ければ id。どちらかがあれば一致レコードをupsert、無ければ末尾に追加（全上書きはしない）
  var key=(ch.injId!=null)?'injId':(ch.id!=null?'id':null);
  return svSafeUpdate('chart',function(latest){
    if(key){
      var i=latest.findIndex(function(x){return idEq(x[key],ch[key]);});
      if(i>=0)latest[i]=ch;else latest.push(ch);
    }else{
      latest.push(ch);
    }
    return latest;
  },onDone);
}
// === METRIC-SAVE (4ファイル同期) ===
// 操作単位の保存：server-latestの対象injIdレコードの「指定フィールドだけ」を触る。
// evals/soaps等は一切触らないので、他端末がeval追加中でも巻き戻さない（ロストアップデート対策）。
function _chartIdx(latest,injId){
  var i=latest.findIndex(function(x){return idEq(x.injId,injId);});
  if(i<0){
    latest.push({injId:injId,injDetail:{},medical:{},evals:[],soaps:[],returnCriteria:{},images:[],metrics:[],mmtTargets:[]});
    i=latest.length-1;
  }
  return i;
}
// 追跡指標・MMT目標・chartレベルのメタ（種別/脳震盪/医師clearance/ROM制限）の保存
function saveChartMetrics(injId,metrics,mmtTargets,meta,onDone){
  return svSafeUpdate('chart',function(latest){
    var i=_chartIdx(latest,injId);
    if(metrics!=null)latest[i].metrics=metrics;
    if(mmtTargets!=null)latest[i].mmtTargets=mmtTargets;
    if(meta){
      if(meta.injType!=null)latest[i].injType=meta.injType;
      if(meta.isConcussion!=null)latest[i].isConcussion=meta.isConcussion;
      if(meta.medClearance!=null)latest[i].medClearance=meta.medClearance;
      if(meta.romLimit!=null)latest[i].romLimit=meta.romLimit;
    }
    return latest;
  },onDone);
}

    rtp:'<svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm-2 15l-5-5 1.4-1.4L10 14.2l7.6-7.6L19 8l-9 9z"/></svg>',
    goal:'<svg viewBox="0 0 24 24"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm0 18c-4.4 0-8-3.6-8-8s3.6-8 8-8 8 3.6 8 8-3.6 8-8 8zm1-13h-2v6l5 3 1-1.6-4-2.4V7z"/></svg>'
  };
  var C={injury:'#EF4444',hospital:'#8B5CF6',eval:'#3B82F6',soap:'#10B981',stage:'#F59E0B',rtp:'#06B6D4',goal:'#EC4899'};
  var G={injury:'rgba(239,68,68,.6)',hospital:'rgba(139,92,246,.6)',eval:'rgba(59,130,246,.6)',soap:'rgba(16,185,129,.6)',stage:'rgba(245,158,11,.6)',rtp:'rgba(6,182,212,.6)',goal:'rgba(236,72,153,.6)'};

  // 1. 受傷
  events.push({date:inj.date,type:'injury',title:'受傷',desc:(inj.side||'')+inj.part+' '+inj.type+(inj.note?'<br>'+escapeHtml(inj.note):'')});
  // 2. 病院受診・診断
  if(ch.medical){
    if(ch.medical.hospital||ch.medical.diagnosis){
      var ddate=ch.medical.diagnosisDate||inj.hospitalDate||inj.date;
      var dtxt=[];
      if(ch.medical.hospital)dtxt.push(escapeHtml(ch.medical.hospital));
      if(ch.medical.diagnosis)dtxt.push('診断: '+escapeHtml(ch.medical.diagnosis));
      if(ch.medical.imgFindings&&ch.medical.imgFindings.length)dtxt.push(Array.isArray(ch.medical.imgFindings)?ch.medical.imgFindings.join('・'):escapeHtml(ch.medical.imgFindings));
      events.push({date:ddate,type:'hospital',title:'病院受診・診断',desc:dtxt.join('<br>')});
    }
    if(ch.medical.surgery&&ch.medical.surgeryDate){
      events.push({date:ch.medical.surgeryDate,type:'hospital',title:'手術',desc:escapeHtml(ch.medical.surgeryName||'手術実施')});
    }
  }
  // 3. 評価（痛み・ROMの推移をメトリクスで）
  (ch.evals||[]).forEach(function(ev){
    var metrics='';
    if(ev.pain){
      var maxP=Math.max(ev.pain.rest||0,ev.pain.motion||0,ev.pain.night||0,ev.pain.press||0);
      var pc=maxP>=7?'#EF4444':maxP>=4?'#F59E0B':'#10B981';
      metrics+='<span class="tl-metric" style="color:'+pc+'">😣 痛み '+maxP+'/10</span>';
    }
    if(ev.rom){var romKeys=Object.keys(ev.rom);if(romKeys.length){var r0=ev.rom[romKeys[0]];if(r0)metrics+='<span class="tl-metric">📐 ROM '+r0+'°</span>';}}
    if(ev.mmt){var mk=Object.keys(ev.mmt);if(mk.length){var m0=ev.mmt[mk[0]];if(m0)metrics+='<span class="tl-metric">💪 MMT '+m0+'</span>';}}
    events.push({date:ev.date,type:'eval',title:'評価',desc:(ev.note?escapeHtml(ev.note):'')+(metrics?'<div style="margin-top:2px">'+metrics+'</div>':'')});
  });
  // 4. SOAP
  (ch.soaps||[]).forEach(function(s){
    var parts=[];
    if(s.a)parts.push('<b>A:</b> '+escapeHtml(s.a));
    if(s.p)parts.push('<b>P:</b> '+escapeHtml(s.p));
    var d=parts.join('<br>');
    if(!d&&s.s)d='<b>S:</b> '+escapeHtml(s.s);
    events.push({date:s.date,type:'soap',title:'SOAP記録'+(s.author?' ('+escapeHtml(s.author)+')':''),desc:d||'記録あり'});
  });
  // 5. リハビリ段階の開始日
  if(rh&&rh.stageDates){
    Object.keys(rh.stageDates).forEach(function(stg){
      var d=rh.stageDates[stg];
      if(d&&STG[stg])events.push({date:d,type:'stage',title:'リハビリ '+STG[stg],desc:'ステージ'+stg+'に移行'});
    });
  }
  // 6. RTP（現在のレベル。履歴がないので「設定」として表示）
  if(ch.rtpLevel){
    var rtpObj=RTP_LEVELS.find(function(x){return x.k===ch.rtpLevel;});
    if(rtpObj&&ch.rtpLevel!=='rest'){
      // RTP変更日が記録されていればそれを、なければ最終評価日あたりを使う
      var rtpDate=ch.rtpLevelDate||(ch.evals&&ch.evals.length?ch.evals[ch.evals.length-1].date:inj.date);
      events.push({date:rtpDate,type:'rtp',title:'練習参加レベル',desc:'<b style="color:'+rtpObj.color+'">'+rtpObj.label+'</b> '+rtpObj.desc});
    }
  }
  // 7. 復帰予定（未来のイベント）
  var isFuture=false;
  if(inj.returnDate&&!inj.resolved){
    var dl=Math.ceil((new Date(inj.returnDate)-new Date(todayStr()))/86400000);
    events.push({date:inj.returnDate,type:'goal',title:'復帰予定',desc:dl>0?'あと'+dl+'日':dl===0?'本日予定':(-dl)+'日超過',_future:true});
  }
  // 8. 回復済み
  if(inj.resolved){
    events.push({date:inj.resolvedDate||todayStr(),type:'goal',title:'復帰・回復',desc:'競技復帰しました 🎉'});
  }

  // 日付順にソート（同日は受傷→診断→評価→SOAPの優先度）
  var typeOrder={injury:0,hospital:1,stage:2,eval:3,soap:4,rtp:5,goal:6};
  events.sort(function(a,b){
    var dc=(a.date||'').localeCompare(b.date||'');
    if(dc!==0)return dc;
    return (typeOrder[a.type]||9)-(typeOrder[b.type]||9);
  });

  if(!events.length)return'<div class="no">まだ記録がありません</div>';

  // ヘッダー統計
  var daysSince=Math.floor((new Date(todayStr())-new Date(inj.date))/86400000);
  var h='<div style="display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap">'+
    '<div style="flex:1;min-width:90px;background:linear-gradient(135deg,#3B82F6,#2563EB);border-radius:12px;padding:12px 14px;color:#fff;box-shadow:0 4px 14px rgba(59,130,246,.3)"><div style="font-size:24px;font-weight:800;line-height:1">'+daysSince+'</div><div style="font-size:11px;opacity:.9;margin-top:2px">受傷からの日数</div></div>'+
    '<div style="flex:1;min-width:90px;background:linear-gradient(135deg,#10B981,#059669);border-radius:12px;padding:12px 14px;color:#fff;box-shadow:0 4px 14px rgba(16,185,129,.3)"><div style="font-size:24px;font-weight:800;line-height:1">'+events.filter(function(e){return e.type==='eval';}).length+'</div><div style="font-size:11px;opacity:.9;margin-top:2px">評価回数</div></div>'+
    '<div style="flex:1;min-width:90px;background:linear-gradient(135deg,#F59E0B,#D97706);border-radius:12px;padding:12px 14px;color:#fff;box-shadow:0 4px 14px rgba(245,158,11,.3)"><div style="font-size:24px;font-weight:800;line-height:1">'+events.length+'</div><div style="font-size:11px;opacity:.9;margin-top:2px">記録イベント</div></div>'+
    '</div>';

  // タイムライン本体
  h+='<div class="tl-wrap">';
  events.forEach(function(ev){
    var col=C[ev.type]||'#3B82F6';
    var glow=G[ev.type]||'rgba(59,130,246,.6)';
    var futureStyle=ev._future?'opacity:.75;border-style:dashed':'';
    h+='<div class="tl-item" style="--tl-color:'+col+';--tl-glow:'+glow+'">'+
      '<div class="tl-line"></div>'+
      '<div class="tl-dot">'+(IC[ev.type]||'')+'</div>'+
      '<div class="tl-card" style="'+futureStyle+'">'+
        '<div class="tl-date">'+fmt(ev.date)+(ev._future?' ・ 予定':'')+'</div>'+
        '<div class="tl-title">'+ev.title+'</div>'+
        (ev.desc?'<div class="tl-desc">'+ev.desc+'</div>':'')+
      '</div>'+
    '</div>';
  });
  h+='</div>';
  return h;
}

// ===== 概要タブ =====
function renderChartOverview(iid){
  var inj=D.i.find(function(x){return idEq(x.id,iid);});if(!inj)return'';
  var p=D.p.find(function(x){return idEq(x.id,inj.pid);});
  var rh=D.r.find(function(x){return idEq(x.injId,iid);});
  var ch=getChart(iid);
  var daysSince=Math.floor((new Date(todayStr())-new Date(inj.date))/86400000);
  // 最新評価
  var lastEval=ch.evals.slice().sort(function(a,b){return (b.date||'').localeCompare(a.date||'');})[0];
  // 最新痛み
  var lastPain=lastEval&&lastEval.pain?lastEval.pain:{};
  var h='<div class="grid g3" style="margin-bottom:16px">'+
    '<div class="mc"><div class="v" style="font-size:20px;color:var(--accent)">'+daysSince+'</div><div class="l">受傷からの日数</div></div>'+
    '<div class="mc"><div class="v" style="font-size:20px">'+ch.evals.length+'</div><div class="l">評価記録</div></div>'+
    '<div class="mc"><div class="v" style="font-size:20px">'+ch.soaps.length+'</div><div class="l">SOAP記録</div></div>'+
    '</div>';
  // 基本情報
  h+='<div class="form-box"><div class="form-title">基本情報</div>'+
    '<div class="detail-row"><span class="detail-label">部位</span><span class="detail-value">'+(inj.side||'')+inj.part+(inj.partOther?'('+escapeHtml(inj.partOther)+')':'')+'</span></div>'+
    '<div class="detail-row"><span class="detail-label">種類</span><span class="detail-value">'+inj.type+(inj.typeOther?'('+escapeHtml(inj.typeOther)+')':'')+'</span></div>'+
    '<div class="detail-row"><span class="detail-label">受傷日</span><span class="detail-value">'+fmt(inj.date)+'（'+daysSince+'日経過）</span></div>'+
    '<div class="detail-row"><span class="detail-label">復帰予定</span><span class="detail-value">'+(inj.returnDate?fmt(inj.returnDate)+(function(){if(inj.resolved)return'';var dl=Math.ceil((new Date(inj.returnDate)-new Date(todayStr()))/86400000);if(dl>0)return' <span class="bd bd-b" style="font-size:10px">あと'+dl+'日</span>';else if(dl===0)return' <span class="bd bd-a" style="font-size:10px">本日予定</span>';else return' <span class="bd bd-r" style="font-size:10px">'+(-dl)+'日超過</span>';})():'未設定')+'</span></div>'+
    (ch.injDetail.severity?'<div class="detail-row"><span class="detail-label">重症度</span><span class="detail-value">'+ch.injDetail.severity+'</span></div>':'')+
    (ch.medical.diagnosis?'<div class="detail-row"><span class="detail-label">診断名</span><span class="detail-value">'+escapeHtml(ch.medical.diagnosis)+'</span></div>':'')+
    '</div>';
  // リハビリ状況
  if(rh){
    h+='<div class="form-box"><div class="form-title">リハビリ状況</div>'+
    '<div class="detail-row"><span class="detail-label">現在の段階</span><span class="detail-value" style="color:var(--accent);font-weight:700">'+STG[rh.stage]+'</span></div></div>';
  }
  // 再発アラート
  var rec=analyzeRecurrence(inj);
  if(rec.isRecurrent){
    h+='<div class="alert-card alert-warn" style="margin-bottom:12px">'+
      '<div><div style="font-weight:700">⚠️ 再発の可能性 — 同じ部位（'+inj.part+'）のケガが過去に'+rec.samePartCount+'件</div>'+
      (rec.lastSame?'<div style="font-size:11px;margin-top:3px;opacity:.85">直近: '+fmt(rec.lastSame.date)+' '+rec.lastSame.type+'</div>':'')+
      (rec.samePartCount>=2?'<div style="font-size:11px;margin-top:3px;opacity:.85;font-weight:600">繰り返し受傷しています。根本的な原因の評価を推奨</div>':'')+
      '</div></div>';
  }
  // 最新の痛み状態
  if(lastEval){
    h+='<div class="form-box"><div class="form-title">最新の状態（'+fmt(lastEval.date)+'）</div>';
    PAIN_TYPES.forEach(function(pt){
      if(lastPain[pt.k]!=null){
        var v=lastPain[pt.k];
        h+='<div class="detail-row"><span class="detail-label">'+pt.label+'</span><span class="detail-value"><b style="color:'+(v>=7?'var(--red)':v>=4?'var(--amber)':'var(--green)')+'">'+v+'</b>/10</span></div>';
      }
    });
    h+='</div>';
  }
  // 既往歴
  h+=renderInjHistoryBox(inj.pid,inj.id,inj.part);
  // アクションボタン
  h+='<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px">'+
    '<button class="btn btn-p" onclick="goEditInjury('+iid+')">基本情報を編集</button>'+
    (!inj.resolved?'<button class="btn btn-s" onclick="resolveInj('+iid+');popView()">回復済みにする</button>':'<button class="btn" onclick="unresolveInj('+iid+')">治療中に戻す</button>')+
    '<button class="btn btn-d" onclick="deleteInjury('+iid+')">削除</button>'+
    '</div>';
  return h;
}

// ===== 評価タブ（部位連動） =====
function renderChartEval(iid){
  var inj=D.i.find(function(x){return idEq(x.id,iid);});if(!inj)return'';
  var ch=getChart(iid);
  var em=EVAL_MASTER[inj.part]||EVAL_MASTER['その他'];
  var evals=ch.evals.slice().sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});
  var h='';
  // 回復ゲージ（怪我×リハビリ連携 Phase2・読み取り＋描画のみ）
  h+=renderDeficitGauges(iid);
  // 追跡指標セクション（怪我×リハビリ連携 Phase1）
  h+=renderChartMetrics(iid);
  // 新規評価追加ボタン
  h+='<button class="btn btn-p" style="width:100%;margin-bottom:14px" onclick="showEvalForm('+iid+')">＋ 新しい評価を記録する</button>';
  // 痛み推移グラフ
  if(evals.length>=1){
    h+='<div class="form-box"><div class="form-title">📈 痛みの推移</div><div class="chart-wrap" style="height:200px"><canvas id="ev-pain-chart"></canvas></div></div>';
    // ROM推移グラフ（部位にROM項目がある場合）
    if(em.rom.length>0){
      h+='<div class="form-box"><div class="form-title">📐 ROM（関節可動域）の推移</div><div class="chart-wrap" style="height:200px"><canvas id="ev-rom-chart"></canvas></div></div>';
    }
  }
  // 評価記録一覧
  h+='<div class="form-title" style="margin:16px 0 10px">評価記録（'+evals.length+'件）</div>';
  if(!evals.length){
    h+='<div class="no">まだ評価記録がありません。<br>「新しい評価を記録する」から始めてください。</div>';
  }else{
    evals.forEach(function(ev){
      h+='<div class="card" style="margin-bottom:10px">'+
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'+
        '<span style="font-weight:700;font-size:14px">'+fmt(ev.date)+'</span>'+
        '<div style="display:flex;gap:6px"><button class="btn btn-sm" onclick="showEvalForm('+iid+',\''+ev.id+'\')">編集</button><button class="btn btn-sm btn-d" onclick="delEval('+iid+',\''+ev.id+'\')">削除</button></div>'+
        '</div>';
      // 痛み
      if(ev.pain){
        var painParts=[];
        PAIN_TYPES.forEach(function(pt){if(ev.pain[pt.k]!=null)painParts.push(pt.label+':'+ev.pain[pt.k]);});
        if(painParts.length)h+='<div style="font-size:12px;margin-bottom:4px"><span style="color:var(--text-secondary)">痛み</span> '+painParts.join(' / ')+'</div>';
      }
      // ROM
      if(ev.rom&&Object.keys(ev.rom).length){
        var romParts=[];
        em.rom.forEach(function(r){if(ev.rom[r.k]!=null&&ev.rom[r.k]!=='')romParts.push(r.label+':'+ev.rom[r.k]+r.unit);});
        if(romParts.length)h+='<div style="font-size:12px;margin-bottom:4px"><span style="color:var(--text-secondary)">ROM</span> '+romParts.join(' / ')+'</div>';
      }
      // MMT
      if(ev.mmt&&Object.keys(ev.mmt).length){
        var mmtParts=[];
        em.mmt.forEach(function(mm){if(ev.mmt[mm]!=null&&ev.mmt[mm]!=='')mmtParts.push(mm+':'+ev.mmt[mm]);});
        if(mmtParts.length)h+='<div style="font-size:12px;margin-bottom:4px"><span style="color:var(--text-secondary)">筋力</span> '+mmtParts.join(' / ')+'</div>';
      }
      // 周径
      if(ev.circ&&Object.keys(ev.circ).length){
        var circParts=[];
        em.circ.forEach(function(c){if(ev.circ[c]!=null&&ev.circ[c]!=='')circParts.push(c+':'+ev.circ[c]+'cm');});
        if(circParts.length)h+='<div style="font-size:12px;margin-bottom:4px"><span style="color:var(--text-secondary)">周径</span> '+circParts.join(' / ')+'</div>';
      }
      // 整形外科テスト
      if(ev.ortho&&Object.keys(ev.ortho).length){
        var orthoParts=[];
        Object.keys(ev.ortho).forEach(function(k){if(ev.ortho[k])orthoParts.push(k+':'+ev.ortho[k]);});
        if(orthoParts.length)h+='<div style="font-size:12px;margin-bottom:4px"><span style="color:var(--text-secondary)">整形テスト</span> '+orthoParts.join(' / ')+'</div>';
      }
      // 所見
      if(ev.note)h+='<div style="font-size:12px;margin-top:6px;padding:8px;background:var(--bg-secondary);border-radius:6px;white-space:pre-wrap">'+escapeHtml(ev.note)+'</div>';
      h+='</div>';
    });
  }
  return h;
}

function saveEval(iid,evalId){
  var pain={},rom={},mmt={},circ={},ortho={},special=[];
  var fit={},romH={},mmtH={},circH={},fitH={};
  document.querySelectorAll('.ev-pain').forEach(function(e){if(e.value!=='')pain[e.dataset.k]=parseFloat(e.value);});
  document.querySelectorAll('.ev-rom').forEach(function(e){if(e.value!=='')rom[e.dataset.k]=e.value;});
  document.querySelectorAll('.ev-mmt').forEach(function(e){if(e.value!=='')mmt[e.dataset.k]=e.value;});
  document.querySelectorAll('.ev-circ').forEach(function(e){if(e.value!=='')circ[e.dataset.k]=parseFloat(e.value);});
  document.querySelectorAll('.ev-ortho').forEach(function(e){if(e.value!=='')ortho[e.dataset.k]=e.value;});
  document.querySelectorAll('.ev-special:checked').forEach(function(e){special.push(e.value);});
  // 健側枠(*H)・フィットネス独自指標(metric id→値)。UIは後フェーズで追加（現状は空＝無害）
  document.querySelectorAll('.ev-romH').forEach(function(e){if(e.value!=='')romH[e.dataset.k]=e.value;});
  document.querySelectorAll('.ev-mmtH').forEach(function(e){if(e.value!=='')mmtH[e.dataset.k]=e.value;});
  document.querySelectorAll('.ev-circH').forEach(function(e){if(e.value!=='')circH[e.dataset.k]=parseFloat(e.value);});
  document.querySelectorAll('.ev-fit').forEach(function(e){if(e.value!=='')fit[e.dataset.k]=parseFloat(e.value);});
  document.querySelectorAll('.ev-fitH').forEach(function(e){if(e.value!=='')fitH[e.dataset.k]=parseFloat(e.value);});
  // 臨床項目（提案の安全ゲートの入力源）
  var effEl=document.getElementById('ev-effusion');var effusion=(effEl&&effEl.value!=='')?effEl.value:null;
  var plEl=document.getElementById('ev-painLoad');var painLoad=(plEl&&plEl.value!=='')?parseFloat(plEl.value):null;
  var rdEl=document.getElementById('ev-readiness');var readiness=(rdEl&&rdEl.value!=='')?parseFloat(rdEl.value):null;
  var date=document.getElementById('ev-date').value||todayStr();
  var note=document.getElementById('ev-note').value;
  var nowISO=new Date().toISOString();
  svSafeUpdate('chart',function(latest){
    var i=_chartIdx(latest,iid);
    if(!latest[i].evals)latest[i].evals=[];
    var rec=null;
    if(evalId)rec=latest[i].evals.find(function(x){return idEq(x.id,evalId);});
    if(!rec){rec={id:evalId||(Date.now()+'_'+Math.floor(Math.random()*1000))};latest[i].evals.push(rec);}
    rec.date=date;rec.pain=pain;rec.rom=rom;rec.mmt=mmt;rec.circ=circ;rec.ortho=ortho;rec.special=special;rec.note=note;rec.inputAt=nowISO;
    // 拡張フィールドは中身がある時だけ書く（空{}で既存evalを汚さない＝chart肥大も抑制）
    if(Object.keys(fit).length)rec.fit=fit;
    if(Object.keys(romH).length)rec.romH=romH;
    if(Object.keys(mmtH).length)rec.mmtH=mmtH;
    if(Object.keys(circH).length)rec.circH=circH;
    if(Object.keys(fitH).length)rec.fitH=fitH;
    if(effusion!=null)rec.effusion=effusion;
    if(painLoad!=null)rec.painLoad=painLoad;
    if(readiness!=null)rec.readiness=readiness;
    return latest;
  },function(){chartTab('eval');});
}
function delEval(iid,evalId){
  if(!confirm('この評価記録を削除しますか？'))return;
  svSafeUpdate('chart',function(latest){
    var i=latest.findIndex(function(x){return idEq(x.injId,iid);});
    if(i>=0&&latest[i].evals)latest[i].evals=latest[i].evals.filter(function(x){return!idEq(x.id,evalId);});
    return latest;
  },function(){chartTab('eval');});
}

// ===== 追跡指標セクション（怪我×リハビリ連携 Phase1） =====

function _mid(){return Date.now()+'_'+Math.floor(Math.random()*10000);}
function renderChartMetrics(iid){

    h+='<label style="font-size:12.5px;display:flex;align-items:center;gap:6px;cursor:pointer;margin-top:4px"><input type="checkbox" id="mt-concussion" checked onchange="toggleConcussion('+iid+')"> 脳震盪として扱う（数値評価の対象外）</label>';
    h+='</div>';
    return h;

  if(ch.injType&&INJ_TEMPLATES[ch.injType]&&INJ_TEMPLATES[ch.injType].contra){

     '<button class="btn btn-sm" onclick="addCustomMetric('+iid+')">＋ 指標を手動追加</button>'+
     (ms.length?'<button class="btn btn-p btn-sm" style="flex:1" onclick="saveMetricsFromUI('+iid+')">💾 追跡指標の設定を保存</button>':'')+
     '</div>';

// 1指標の編集行（名前・種類・単位・向き・基準・目標・期限すべて編集可）

  var kinds=[['rom','ROM'],['circ','周径'],['strength','筋力(定量)'],['fitness','フィットネス']];

  h+='<input type="number" step="any" class="ipt mt-baseval" value="'+(m.baseValue!=null?m.baseValue:'')+'" placeholder="手動基準値" style="width:110px">';
  h+='<label style="font-size:12px;display:flex;align-items:center;gap:4px;cursor:pointer" title="患側/健側で回復度を見る指標"><input type="checkbox" class="mt-lsi"'+(m.lsi?' checked':'')+'> 患健LSI</label>';
  h+='</div>';
