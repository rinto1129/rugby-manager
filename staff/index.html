    }).join('')+'</div></div>';
  // --- 処方箋 ---
  h+='<div class="card" style="margin-bottom:12px"><div style="font-weight:700;margin-bottom:4px">処方箋（弱点種目→推奨補助種目）</div>'+

  STD_LIFTS.forEach(function(l){
    h+='<div style="font-weight:700;font-size:12px;margin:10px 0 6px">'+l.label+'が弱点のとき</div>';

function doSaveStd(btn){
  var cur=getStdCfg();
  var cfg={pos:{},ranks:[],broncoRanks:[],allo:{},rx:{}};
  var errs=[];
  function num(id,name,lo,hi){
    var v=parseFloat((document.getElementById(id)||{}).value);
    if(!(v>=lo&&v<=hi)){errs.push(name+'（'+lo+'〜'+hi+'）');return null;}
    return v;
  }
  POS.forEach(function(ps,pi){
    var row={};
    row.sq=num('std-pos-'+pi+'-sq',ps+' SQ倍率',0.5,3);
    row.bp=num('std-pos-'+pi+'-bp',ps+' BP倍率',0.5,3);
    row.dl=num('std-pos-'+pi+'-dl',ps+' DL倍率',0.5,3);
    row.ffmiLo=num('std-pos-'+pi+'-ffmiLo',ps+' FFMI下限',15,35);
    row.ffmiHi=num('std-pos-'+pi+'-ffmiHi',ps+' FFMI上限',15,35);
    row.bfLo=num('std-pos-'+pi+'-bfLo',ps+' 脂肪%下限',3,35);
    row.bfHi=num('std-pos-'+pi+'-bfHi',ps+' 脂肪%上限',3,35);
    var _bm=parseFloat((document.getElementById('std-pos-'+pi+'-br-m')||{}).value);
    var _bs=parseFloat((document.getElementById('std-pos-'+pi+'-br-s')||{}).value);
    if(!(_bm>=0)||!(_bs>=0&&_bs<=59)){errs.push(ps+' ブロンコ基準（分と秒0〜59）');row.bronco=null;}
    else{var _bt=Math.round(_bm*60+_bs);if(!(_bt>=180&&_bt<=600)){errs.push(ps+' ブロンコ基準（3:00〜10:00）');row.bronco=null;}else row.bronco=_bt;}
    if(row.ffmiLo!=null&&row.ffmiHi!=null&&row.ffmiLo>row.ffmiHi)errs.push(ps+' FFMIが下限>上限');
    if(row.bfLo!=null&&row.bfHi!=null&&row.bfLo>row.bfHi)errs.push(ps+' 脂肪%が下限>上限');
    cfg.pos[ps]=row;
  });
  cur.ranks.forEach(function(r,i){
    var v=num('std-rank-'+i,'ランク%（'+r.label+'）',0.3,2);
    cfg.ranks.push({k:r.k,label:r.label,pct:v!=null?v:r.pct,color:r.color});
  });
  for(var i=1;i<cfg.ranks.length;i++){if(cfg.ranks[i].pct<=cfg.ranks[i-1].pct){errs.push('ランク%は昇順にしてください（'+cfg.ranks[i-1].label+'＜'+cfg.ranks[i].label+'）');break;}}
  cur.broncoRanks.forEach(function(r,i){
    var v=num('std-brrank-'+i,'ブロンコランク%（'+r.label+'）',0.3,2);
    cfg.broncoRanks.push({k:r.k,label:r.label,pct:v!=null?v:r.pct,color:r.color});
  });
  for(var bi=1;bi<cfg.broncoRanks.length;bi++){if(cfg.broncoRanks[bi].pct<=cfg.broncoRanks[bi-1].pct){errs.push('ブロンコランク%は昇順にしてください（'+cfg.broncoRanks[bi-1].label+'＜'+cfg.broncoRanks[bi].label+'）');break;}}
  STD_LIFTS.forEach(function(l){
    cfg.allo[l.k]=num('std-allo-'+l.k,l.short+' 補正指数',0.1,1);
    var arr=[];
    for(var ri=0;ri<3;ri++){
      var nm=((document.getElementById('std-rx-'+l.k+'-'+ri+'-name')||{}).value||'').trim();
      if(!nm)continue;
      var st=num('std-rx-'+l.k+'-'+ri+'-sets',l.short+' 処方'+(ri+1)+' セット',1,10);
      var rp=num('std-rx-'+l.k+'-'+ri+'-reps',l.short+' 処方'+(ri+1)+' 回数',1,20);
      var rr=num('std-rx-'+l.k+'-'+ri+'-rir',l.short+' 処方'+(ri+1)+' RIR',0,5);
      arr.push({name:nm,sets:st,reps:rp,rir:rr});
    }
    cfg.rx[l.k]=arr;
  });
  // バッジ点数（0〜99・整数）。無効入力はcur(=既存cfg)値へフォールバックしつつerrsで保存ブロック。
  cfg.badgePts={rank:{}};
  cur.ranks.forEach(function(r,i){
    var v=num('std-bpt-rank-'+i,'バッジ点数（'+r.label+'）',0,99);
    cfg.badgePts.rank[r.k]=(v!=null?Math.round(v):((cur.badgePts&&cur.badgePts.rank&&cur.badgePts.rank[r.k])||0));
  });
  [['top1','種目1位'],['posTop1','ポジ別1位'],['mvp','伸び率MVP'],['pb','自己ベスト更新'],['club','BIG3クラブ'],['allYear','皆勤賞']].forEach(function(kv){
    var v=num('std-bpt-'+kv[0].toLowerCase(),'バッジ点数（'+kv[1]+'）',0,99);
    cfg.badgePts[kv[0]]=(v!=null?Math.round(v):((cur.badgePts&&cur.badgePts[kv[0]])||0));
  });
  if(errs.length)return alert('入力値を確認してください:\n・'+errs.slice(0,8).join('\n・')+(errs.length>8?'\n…他'+(errs.length-8)+'件':''));
  if(!confirm('基準値を保存しますか？\n選手・スタッフ・コーチの全サイトに即反映されます'))return;
  btn.disabled=true;var orig=btn.textContent;btn.textContent='保存中…';
  svSafeUpdate('std',function(){return [cfg];},function(){
    btn.disabled=false;btn.textContent=orig;
    V.standards();toast('保存しました');
  },function(){
    btn.disabled=false;btn.textContent=orig;
    alert('保存できませんでした。電波状況を確認してもう一度お試しください。入力内容は残っています。');
  });
}
function doResetStd(btn){
  if(!confirm('カスタム基準を削除して初期値（コード内デフォルト）に戻しますか？'))return;
  btn.disabled=true;
  svSafeUpdate('std',function(){return [];},function(){btn.disabled=false;V.standards();toast('初期値に戻しました');},function(){btn.disabled=false;alert('通信エラーで戻せませんでした。もう一度お試しください。');});
}

ld().then(function(){
  var lds=document.getElementById('loading-screen');
  if(lds){
    lds.style.pointerEvents='none'; // 透明レイヤーが全タップを遮断する事故防止（display:none前の保険）
    var ldHide=function(){lds.style.display='none';};
    if(typeof lds.addEventListener==='function')lds.addEventListener('transitionend',ldHide,{once:true});
    setTimeout(ldHide,600); // transitionend不発（reduced-motion等）でも必ずdisplay:none
    lds.classList.add('done');
  }
  startListeners();nav('dash'); // nav()経由=クラスA演出+トップバーaction(学年更新)が初回ロードでも揃う（旧: V.dash()直呼びだと両方欠けた）
  kickTlogArch(); // 全選手のtlogアーカイブをプリロード（種目推移・セッション履歴の全期間表示用）
  setTimeout(archiveTlog,1500); // tlog容量対策: 古いレコードの移送（冪等・選手側と重なっても安全）
}).catch(function(e){
  console.error(e);
  document.getElementById('loading-screen').innerHTML='<div style="text-align:center;color:var(--pale)">'+ic('i-warn',40,'var(--gold-hot)')+'<div style="margin-top:12px;font-weight:700">読み込みエラー</div><button onclick="location.reload()" style="margin-top:14px;padding:10px 22px;cursor:pointer;border:none;border-radius:10px;background:var(--pale);color:var(--maroon-d);font-weight:700;font-family:inherit;font-size:14px">再試行</button></div>';
});
