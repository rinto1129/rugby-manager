// 種別テンプレから指標を一括生成（既存指標は置換）
function applyInjTemplate(iid){
  var sel=document.getElementById('mt-injtype');if(!sel)return;
  var key=sel.value;
  if(!key||!INJ_TEMPLATES[key]){alert('怪我の種別を選択してください');return;}
  var tpl=INJ_TEMPLATES[key];
  var ch=getChart(iid);
  if((ch.metrics&&ch.metrics.length)&&!confirm('「'+key+'」のテンプレで追跡指標を置き換えます。\n現在の指標設定は消えます。よろしいですか？'))return;
  var inj=D.i.find(function(x){return idEq(x.id,iid);});
  var side=(inj&&inj.side)?inj.side:null;
  var metrics=(tpl.metrics||[]).map(function(t){
    var baseMode=t.lsi?'健側':(t.evalKey?'正常値':'受傷前');
    return {id:_mid(),name:t.name,kind:t.kind,unit:t.unit||'',evalKey:t.evalKey||null,
      side:t.lsi?side:null,direction:t.direction||'up',lsi:!!t.lsi,
      baseMode:baseMode,baseValue:null,target:null,deadline:null,
      cat:METRIC_CAT_MAP[t.kind]||'',tplId:key,exName:null};
  });
  saveChartMetrics(iid,metrics,null,{injType:key,isConcussion:!!tpl.concussion},function(){chartTab('eval');});
}
// 空の指標を1件追加（手動作成用）
function addCustomMetric(iid){
  var ch=getChart(iid);
  var metrics=(ch.metrics||[]).slice();
  metrics.push({id:_mid(),name:'',kind:'rom',unit:'°',evalKey:null,side:null,direction:'up',lsi:false,
    baseMode:'正常値',baseValue:null,target:null,deadline:null,cat:METRIC_CAT_MAP['rom']||'',tplId:null,exName:null});
  saveChartMetrics(iid,metrics,null,null,function(){chartTab('eval');});
}
function delMetric(iid,mid){
  if(!confirm('この指標を削除しますか？'))return;
  var ch=getChart(iid);
  var metrics=(ch.metrics||[]).filter(function(m){return m.id!==mid;});
  saveChartMetrics(iid,metrics,null,null,function(){chartTab('eval');});
}
// UI上の各行の入力を集めて保存（既存フィールドは保持、編集項目だけ上書き）
function saveMetricsFromUI(iid){
  var ch=getChart(iid);
  var metrics=(ch.metrics||[]).map(function(m){
    var row=document.querySelector('.mt-row[data-mid="'+m.id+'"]');
    if(!row)return m;
    function val(cls){var e=row.querySelector('.'+cls);return e?e.value:'';}
    function chk(cls){var e=row.querySelector('.'+cls);return e?e.checked:false;}
    var nm={};for(var k in m)nm[k]=m[k];
    nm.name=(val('mt-name')||'').trim()||m.name;
    nm.kind=val('mt-kind')||m.kind;
    nm.unit=val('mt-unit');
    nm.direction=val('mt-dir')||'up';
    nm.baseMode=val('mt-base')||'正常値';
    nm.lsi=chk('mt-lsi');
    var bv=val('mt-baseval');nm.baseValue=(nm.baseMode==='手動'&&bv!=='')?parseFloat(bv):null;
    var tg=val('mt-target');nm.target=(tg!=='')?parseFloat(tg):null;
    var dl=val('mt-deadline');nm.deadline=dl||null;
    nm.cat=METRIC_CAT_MAP[nm.kind]||nm.cat||'';
    if(nm.side==null&&nm.lsi){var inj=D.i.find(function(x){return idEq(x.id,iid);});nm.side=(inj&&inj.side)?inj.side:null;}
    return nm;
  });
  saveChartMetrics(iid,metrics,null,null,function(){chartTab('eval');});
}
// 脳震盪フラグの切替（数値評価の対象外）
function toggleConcussion(iid){
  var el=document.getElementById('mt-concussion');if(!el)return;
  saveChartMetrics(iid,null,null,{isConcussion:el.checked},function(){chartTab('eval');});
}


// ===== 追跡指標ヘルパー（trainerからverbatim移植・バイト一致）=====
// === ステップ⑤-b: クイック評価（痛み＋★重要指標・chart.metrics連動）===
// metricの値がevalレコードのどのフィールド/キーに入るかを解決（Phase0のev.rom/circ/fit・健側枠と整合）
function metricEvalRef(m){
  if(m.kind==='rom'&&m.evalKey)return{f:'rom',hf:'romH',k:m.evalKey,str:true};
  if(m.kind==='circ'&&m.evalKey)return{f:'circ',hf:'circH',k:m.evalKey,str:false};
  // strength(定量kg)・fitness・evalKey無しのrom/circ は fit/fitH に metric.id で格納
  return{f:'fit',hf:'fitH',k:'m_'+m.id,str:false};
}
// evalレコードから指定metricの数値を取り出す（患側/健側）。無ければnull
function readEvalMetric(rec,ref,healthy){
  var obj=rec[healthy?ref.hf:ref.f];
  if(!obj)return null;
  var v=obj[ref.k];
  if(v==null||v==='')return null;
  var n=parseFloat(v);
  return isNaN(n)?null:n;
}
// 指定metricについて、最新の患側値を持つevalから {patient,healthy,date} を返す（date→inputAtの2段ソート）
function latestEvalForMetric(evals,m){
  var ref=metricEvalRef(m);
  var sorted=(evals||[]).slice().sort(function(a,b){
    var d=(b.date||'').localeCompare(a.date||'');
    if(d!==0)return d;
    return (b.inputAt||'').localeCompare(a.inputAt||'');
  });
  for(var i=0;i<sorted.length;i++){
    var pv=readEvalMetric(sorted[i],ref,false);
    if(pv!=null)return{patient:pv,healthy:readEvalMetric(sorted[i],ref,true),date:sorted[i].date};
  }
  return null;
}
// direction考慮の左右比%（患健の対称性・0除算/NaN/Infガード）。>=90%で左右差ほぼ解消の目安。
function symPct(patient,healthy,direction){
  if(patient==null||healthy==null||isNaN(patient)||isNaN(healthy))return null;
  var num,den;
  if(direction==='down'){num=healthy;den=patient;}else{num=patient;den=healthy;}
  if(den===0)return num===0?100:null;
  var pct=num/den*100;
  if(!isFinite(pct))return null;
  return Math.round(pct);
}
// 指定metricの患側値の時系列（昇順 date→inputAt）。スパークライン用。[{date,v}]
function metricSeries(evals,m){
  var ref=metricEvalRef(m);
  var sorted=(evals||[]).slice().sort(function(a,b){
    var d=(a.date||'').localeCompare(b.date||'');
    if(d!==0)return d;
    return (a.inputAt||'').localeCompare(b.inputAt||'');
  });
  var out=[];
  sorted.forEach(function(ev){var v=readEvalMetric(ev,ref,false);if(v!=null)out.push({date:ev.date,v:v});});
  return out;
}
// ネオン系ミニスパークライン（純SVG・Chart.js不使用）。pts=[{date,v}]昇順。
// 2点未満は''（推移が描けない）。min==max（横ばい）は中央の水平線。direction基準で終点ドットを色分け（改善=緑/悪化=赤/横ばい=青）。
function sparklineSVG(pts,direction,idsfx){
  pts=(pts||[]).filter(function(p){return p&&p.v!=null&&!isNaN(p.v);});
  if(pts.length>12)pts=pts.slice(-12);
  if(pts.length<2)return '';
  idsfx=String(idsfx==null?'':idsfx).replace(/[^a-zA-Z0-9_]/g,'');
  var W=300,H=40,padX=6,padT=8,padB=8,n=pts.length;
  var vals=pts.map(function(p){return p.v;});
  var mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals),span=mx-mn;
  var X=function(i){return Math.round((padX+(W-2*padX)*(i/(n-1)))*10)/10;};
  var Y=function(v){var y=span===0?H/2:padT+(H-padT-padB)*(1-(v-mn)/span);return Math.round(y*10)/10;};
  var pointStr=pts.map(function(p,i){return X(i)+','+Y(p.v);}).join(' ');
  var first=vals[0],last=vals[n-1],flat=last===first;
  var improved=direction==='down'?last<first:last>first;
  // direction==='none' は良し悪しを断定しない項目（ROM/周径など向きが部位で反転しうる）＝終点は常に青
  var endCol=(direction==='none'||flat)?'var(--blue)':(improved?'var(--green)':'var(--red)');
  var lx=X(n-1),ly=Y(last);
  var sg='sg_'+idsfx,sa='sa_'+idsfx;
  var areaStr='M'+X(0)+','+(H-padB)+' L'+pointStr.split(' ').join(' L')+' L'+lx+','+(H-padB)+' Z';
  var s='<svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none" style="width:100%;height:38px;display:block;overflow:visible">';
  s+='<defs><linearGradient id="'+sg+'" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#3B82F6"/><stop offset="1" stop-color="#A78BFA"/></linearGradient>';
  s+='<linearGradient id="'+sa+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#3B82F6" stop-opacity="0.28"/><stop offset="1" stop-color="#3B82F6" stop-opacity="0"/></linearGradient></defs>';
  s+='<path d="'+areaStr+'" fill="url(#'+sa+')" stroke="none"/>';
  s+='<polyline points="'+pointStr+'" fill="none" stroke="url(#'+sg+')" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.35" vector-effect="non-scaling-stroke"/>';
  s+='<polyline points="'+pointStr+'" fill="none" stroke="url(#'+sg+')" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke"/>';
  s+='<circle cx="'+lx+'" cy="'+ly+'" r="5.5" fill="'+endCol+'" opacity="0.25"/>';
  s+='<circle cx="'+lx+'" cy="'+ly+'" r="2.8" fill="'+endCol+'"/>';
  s+='</svg>';
  return s;
}
// スパークライン脇の推移キャプション（N回・↗改善/↘悪化/→横ばい）。direction基準。2点未満は''
function sparkCaption(pts,direction){
  if(!pts||pts.length<2)return '';
  var first=pts[0].v,last=pts[pts.length-1].v,flat=last===first;
  var improved=direction==='down'?last<first:last>first;
  var arrow=flat?'→':(last>first?'↗':'↘'); // 矢印は数値の増減（スパークラインの見た目と一致）、色で良し悪しを表す
  // direction==='none' は良し悪しを断定しない＝色はニュートラル（矢印だけで数値の増減を示す）
  var col=(direction==='none'||flat)?'var(--text-secondary)':(improved?'var(--green)':'var(--red)');
  return '<span style="white-space:nowrap"><span style="font-size:10px;color:var(--text-tertiary)">'+pts.length+'回</span> <span style="font-size:13px;font-weight:700;color:'+col+'">'+arrow+'</span></span>';
}

// === 怪我×リハビリ連携 Phase2: 不足ゲージ（読み取り＋描画のみ・書込なし）===
// 数値の軽い整形（小数1桁まで・末尾0除去）。null/NaNは''
function fmtNum(n){if(n==null||isNaN(n))return'';var r=Math.round(Number(n)*10)/10;return String(r);}
// 2日付(YYYY-MM-DD)の日数差 to-from（floor）。無効はNaN
function daysBetween(from,to){return Math.floor((new Date(to)-new Date(from))/86400000);}
// 健側値を持つ最新evalを独立に探索（患側最新と同じevalとは限らない）。{val,date}|null
function latestHealthyForMetric(evals,m){
  var ref=metricEvalRef(m);
  var sorted=(evals||[]).slice().sort(function(a,b){
    var d=(b.date||'').localeCompare(a.date||'');
    if(d!==0)return d;
    return (b.inputAt||'').localeCompare(a.inputAt||'');
  });
  for(var i=0;i<sorted.length;i++){
    var hv=readEvalMetric(sorted[i],ref,true);
    if(hv!=null)return{val:hv,date:sorted[i].date};
  }
  return null;
}
// 最古の患側値を持つeval（受傷前基準の代用＝初回評価）。昇順スキャン。{val,date}|null
function oldestPatientForMetric(evals,m){
  var ref=metricEvalRef(m);
  var sorted=(evals||[]).slice().sort(function(a,b){
    var d=(a.date||'').localeCompare(b.date||'');
    if(d!==0)return d;
    return (a.inputAt||'').localeCompare(b.inputAt||'');
  });
  for(var i=0;i<sorted.length;i++){
    var pv=readEvalMetric(sorted[i],ref,false);
    if(pv!=null)return{val:pv,date:sorted[i].date};
  }
  return null;
}
// EVAL_MASTER[部位].rom から m.evalKey に一致する normal を数値で返す（rom以外/未定義はnull）
function normalForMetric(inj,m){
  if(!m.evalKey)return null;
  var em=EVAL_MASTER[inj.part]||EVAL_MASTER['その他'];
  if(!em||!em.rom)return null;
  for(var i=0;i<em.rom.length;i++){
    if(em.rom[i].k===m.evalKey){var n=parseFloat(em.rom[i].normal);return isNaN(n)?null:n;}
  }
  return null;
}
// 基準（ターゲット）解決。優先: 手動目標target → baseModeの指す先 → フォールバック(健側→正常値→受傷前)
// 返り値 {val,src,srcKey,date?}|null（全滅で基準未設定）
function resolveMetricBase(ch,inj,m){
  var evals=ch.evals||[];
  if(m.target!=null&&!isNaN(parseFloat(m.target)))return{val:parseFloat(m.target),src:'🎯手動目標',srcKey:'target'};
  var tried={};
  function tryMode(mode){
    if(!mode||tried[mode])return null;tried[mode]=true;
    if(mode==='手動'){
      if(m.baseValue!=null&&!isNaN(parseFloat(m.baseValue)))return{val:parseFloat(m.baseValue),src:'手動基準',srcKey:'manual'};
      return null;
    }
    if(mode==='健側'){
      var hv=latestHealthyForMetric(evals,m);
      if(hv)return{val:hv.val,src:'健側比',srcKey:'healthy',date:hv.date};
      return null;
    }
    if(mode==='正常値'){
      var nv=normalForMetric(inj,m);
      if(nv!=null)return{val:nv,src:'正常値比',srcKey:'normal'};
      return null;
    }
    if(mode==='受傷前'){
      var ov=oldestPatientForMetric(evals,m);
      if(ov)return{val:ov.val,src:'初回評価比（参考）',srcKey:'oldest',date:ov.date};
      return null;
    }
    return null;
  }
  var r=tryMode(m.baseMode);
  if(r)return r;
  var chain=['健側','正常値','受傷前'];
  for(var i=0;i<chain.length;i++){var f=tryMode(chain[i]);if(f)return f;}
  return null;
}
// 達成率と「あと◯◯」（direction補正＋ガード）。{pct,remain,reached}
// up: pct=cur/base, remain=base-cur ／ down(小さいほど良い): pct=base/cur, remain=cur-base
function gaugeCalc(cur,base,direction){
  var out={pct:null,remain:null,reached:false};
  if(cur==null||base==null||isNaN(cur)||isNaN(base))return out;
  if(direction==='down'){
    out.remain=Math.max(0,cur-base);
    if(cur===0)out.pct=(base===0)?100:null;
    else{var pd=base/cur*100;out.pct=isFinite(pd)?pd:null;}
  }else{
    out.remain=Math.max(0,base-cur);
    if(base===0)out.pct=(cur===0)?100:null;
    else{var pu=cur/base*100;out.pct=isFinite(pu)?pu:null;}
  }
  if(out.pct!=null&&out.pct>=100)out.reached=true;
  return out;
}
// 達成率→色（CSS変数・両テーマ自動適応）。≧90緑/60-89青/<60アンバー/不明はグレー
function gaugeColor(pct){
  if(pct==null)return'var(--text-tertiary)';
  if(pct>=90)return'var(--green)';
  if(pct>=60)return'var(--blue)';
  return'var(--amber)';
}
// ネオン円形プログレスリング（純SVG）。弧は0-100クランプ、中央%表示は実数（120%等）。
// colorはCSS変数（fill/stroke属性でvar()を使う既存スパークラインと同じ流儀）。glowで発光。
function gaugeSVG(pct,color,idsfx){
  idsfx=String(idsfx==null?'':idsfx).replace(/[^a-zA-Z0-9_]/g,'');
  var size=88,sw=9,r=(size-sw)/2,cx=size/2,cy=size/2,circ=2*Math.PI*r;
  var shown=(pct==null)?0:Math.max(0,Math.min(100,pct));
  var dash=Math.round(circ*shown/100*10)/10;
  var gap=Math.round((circ-dash)*10)/10;
  var s='<svg viewBox="0 0 '+size+' '+size+'" style="width:78px;height:78px;display:block">';
  s+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="var(--border-secondary)" stroke-width="'+sw+'" opacity="0.5"/>';
  if(pct!=null){
    s+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+color+'" stroke-width="'+sw+'" stroke-linecap="round" stroke-dasharray="'+dash+' '+gap+'" transform="rotate(-90 '+cx+' '+cy+')" opacity="0.4" style="filter:drop-shadow(0 0 5px '+color+')"/>';
    s+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+color+'" stroke-width="'+sw+'" stroke-linecap="round" stroke-dasharray="'+dash+' '+gap+'" transform="rotate(-90 '+cx+' '+cy+')"/>';
  }
  var label=(pct==null)?'—':(Math.round(pct)+'%');
  s+='<text x="'+cx+'" y="'+cy+'" text-anchor="middle" dominant-baseline="central" font-size="18" font-weight="800" fill="'+color+'">'+label+'</text>';
  s+='</svg>';
  return s;
}
// MMT段階ドット（chart.metricsにMMTは無いが軽量版）。最新のev.mmtを持つeval→各項目をMMT_ORDER indexで。
function renderMMTDots(inj,evals){
  var em=EVAL_MASTER[inj.part]||EVAL_MASTER['その他'];
  if(!em||!em.mmt||!em.mmt.length)return'';
  var sorted=(evals||[]).slice().sort(function(a,b){
    var d=(b.date||'').localeCompare(a.date||'');
    if(d!==0)return d;return (b.inputAt||'').localeCompare(a.inputAt||'');
  });
  var ev=null;
  for(var i=0;i<sorted.length;i++){if(sorted[i].mmt&&Object.keys(sorted[i].mmt).length){ev=sorted[i];break;}}
  if(!ev)return'';
  var rows='';
  em.mmt.forEach(function(mm){
    var cur=ev.mmt[mm];
    if(cur==null||cur==='')return;
    var ci=MMT_ORDER.indexOf(String(cur));
    if(ci<0)return;
    var hi=(ev.mmtH&&ev.mmtH[mm]!=null&&ev.mmtH[mm]!=='')?MMT_ORDER.indexOf(String(ev.mmtH[mm])):-1;
    var dots='';
    for(var j=0;j<MMT_ORDER.length;j++){
      var on=j<=ci;
      var isCur=j===ci;
      var isH=j===hi;
      var bg=on?(ci>=8?'var(--green)':(ci>=6?'var(--blue)':'var(--amber)')):'var(--border-secondary)';
      var ring=isH?';box-shadow:0 0 0 2px var(--text-tertiary)':'';
      var sz=isCur?'11px':'7px';
      dots+='<span title="'+escapeHtml(MMT_ORDER[j])+'" style="width:'+sz+';height:'+sz+';border-radius:50%;background:'+bg+';display:inline-block'+ring+'"></span>';
    }
    rows+='<div style="display:flex;align-items:center;gap:5px;margin-bottom:5px"><span style="font-size:11px;min-width:64px;color:var(--text-secondary)">'+escapeHtml(mm)+'</span><span style="display:flex;gap:3px;align-items:center">'+dots+'</span><span style="font-size:11px;font-weight:700;margin-left:4px">'+escapeHtml(String(cur))+'</span>'+(hi>=0?'<span style="font-size:10px;color:var(--text-tertiary)">健:'+escapeHtml(String(ev.mmtH[mm]))+'</span>':'')+'</div>';
  });
  if(!rows)return'';
  return '<div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border-tertiary)"><div style="font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:8px">💪 徒手筋力（MMT）'+fmt(ev.date)+'</div>'+rows+'</div>';
}
// 1指標の不足ゲージカード（リング＋現状/基準＋あと◯◯＋出所ラベル＋LSI＋期限＋スパークライン）
function deficitGaugeCard(ch,inj,m,mi){
  var evals=ch.evals||[];
  var name=escapeHtml(m.name||'(名称未設定)');
  var unit=escapeHtml(m.unit||'');
  var cur=latestEvalForMetric(evals,m); // {patient,healthy,date}|null

  var cardStyle='flex:1 1 168px;min-width:168px;max-width:260px;background:var(--card-bg,transparent);border:1px solid var(--border-tertiary);border-radius:var(--radius);padding:12px;box-sizing:border-box';

    h+='<div style="font-size:11px;color:var(--text-tertiary);margin-top:6px">基準 '+fmtNum(base.val)+unit+'（'+escapeHtml(base.src)+'）</div>';

  }
  var dir=(m.direction==='down')?'down':'up';

  h+='<div style="flex:1;min-width:0">';
  h+='<div style="font-weight:700;font-size:13px;line-height:1.3;margin-bottom:2px">'+name+'</div>';
  h+='<div style="font-size:11.5px;color:var(--text-secondary)">現状 <b style="color:var(--text-primary)">'+fmtNum(cur.patient)+unit+'</b> / 基準 '+fmtNum(base.val)+unit+'</div>';
  if(gc.reached){
    var reachMsg=(base.srcKey==='oldest')?'初回値に到達・手動目標の設定を推奨':'基準に到達';
    h+='<div style="font-size:11.5px;color:var(--green);font-weight:700;margin-top:2px">✓ '+reachMsg+'</div>';

  }
  h+='</div></div>';
  h+='<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px">';
  h+='<span style="font-size:10px;padding:2px 7px;border-radius:99px;background:var(--border-tertiary);color:var(--text-secondary)">'+escapeHtml(base.src)+'</span>';
  if(base.srcKey==='healthy'&&base.date){
    var days=daysBetween(base.date,todayStr());
    var stale=days>=14;
    h+='<span style="font-size:10px;padding:2px 7px;border-radius:99px;background:'+(stale?'var(--amber-bg)':'var(--border-tertiary)')+';color:'+(stale?'var(--amber)':'var(--text-tertiary)')+'">健側測定:'+days+'日前</span>';

  if(m.lsi){
    var sp=symPct(cur.patient,cur.healthy,dir);
    if(sp!=null){
      var lcol=sp>=90?'var(--green)':(sp>=80?'var(--amber)':'var(--red)');
      var lbg=sp>=90?'var(--green-bg)':(sp>=80?'var(--amber-bg)':'var(--red-bg)');
      h+='<div style="font-size:11px;padding:4px 8px;border-radius:8px;background:'+lbg+';color:'+lcol+';font-weight:700;margin-bottom:6px">患健比 '+sp+'%'+(sp>=90?' ✓':'')+' <span style="font-weight:400;color:var(--text-secondary)">(患'+fmtNum(cur.patient)+'/健'+fmtNum(cur.healthy)+unit+')</span></div>';
    }else if(cur.healthy==null){

// 不足ゲージ セクション本体。脳震盪/metrics空は''（読み取り＋描画のみ）

// 評価グラフ描画
function drawEvalCharts(iid){
  var inj=D.i.find(function(x){return idEq(x.id,iid);});if(!inj)return;
  var ch=getChart(iid);
  var em=EVAL_MASTER[inj.part]||EVAL_MASTER['その他'];

function saveSOAP(iid,soapId){
  var ch=getChart(iid);
  var g=function(id){var e=document.getElementById(id);return e?e.value:'';};
  var data={date:g('sp-date')||todayStr(),s:g('sp-s'),o:g('sp-o'),a:g('sp-a'),p:g('sp-p'),menu:g('sp-menu'),author:g('sp-author'),inputAt:new Date().toISOString()};
  if(soapId){
    var sp=ch.soaps.find(function(x){return idEq(x.id,soapId);});
    if(sp)Object.assign(sp,data);
  }else{
    data.id=Date.now()+'_'+Math.floor(Math.random()*1000);
    ch.soaps.push(data);
  }
  saveChart(ch);
  chartTab('soap');
}
function delSOAP(iid,soapId){
  if(!confirm('この記録を削除しますか？'))return;
  var ch=getChart(iid);
  ch.soaps=ch.soaps.filter(function(x){return!idEq(x.id,soapId);});
  saveChart(ch);
  chartTab('soap');
}

// 怪我ごとのコメント表示HTML
function renderInjComments(iid,role){
  var comments=(D.injcomm||[]).filter(function(c){return idEq(c.injId,iid);}).sort(function(a,b){return (a.createdAt||'').localeCompare(b.createdAt||'');});
  var roleLabel={staff:'スタッフ',player:'選手',trainer:'専門学生'};
  var roleColor={staff:'var(--purple)',player:'var(--blue)',trainer:'var(--green)'};
  var commentsH=comments.length?comments.map(function(c){
    var label=roleLabel[c.role]||c.role||'?';
    var color=roleColor[c.role]||'var(--text-secondary)';
    var dt=c.createdAt?new Date(c.createdAt):null;
    var dateStr=dt?(toDateStr(dt)+' '+String(dt.getHours()).padStart(2,'0')+':'+String(dt.getMinutes()).padStart(2,'0')):'';
    return'<div style="padding:8px 10px;border-radius:var(--radius);background:var(--bg-secondary);margin-bottom:6px">'+
    '<div style="display:flex;align-items:center;justify-content:space-between;font-size:11px;margin-bottom:4px">'+
    '<span><span class="bd" style="background:'+color+';color:#fff;font-size:9px">'+label+'</span> <b style="margin-left:4px">'+(c.authorName||'')+'</b></span>'+
    '<span style="color:var(--text-secondary)">'+dateStr+(c.authorId&&role===c.role&&String(c.authorId)===String(getCurrentUserId(role))?' <button class="btn btn-sm btn-d" onclick="delInjComment(\''+c.id+'\','+iid+',\''+role+'\')">削除</button>':'')+'</span>'+
    '</div>'+
    '<div style="font-size:13px;white-space:pre-wrap;word-break:break-word">'+escapeHtml(c.text||'')+'</div>'+
    '</div>';
  }).join(''):'<div style="font-size:12px;color:var(--text-secondary);text-align:center;padding:14px">まだコメントはありません</div>';
  return'<div class="form-box" style="margin-top:16px"><div class="form-title">💬 コメント（スタッフ・選手・専門学生で共有）</div>'+
  '<div id="injcomm-list-'+iid+'" style="max-height:300px;overflow-y:auto;margin-bottom:10px">'+commentsH+'</div>'+
  '<textarea class="ipt" id="injcomm-input-'+iid+'" placeholder="コメントを入力..." style="min-height:60px"></textarea>'+
  '<button class="btn btn-p" style="width:100%;margin-top:6px" onclick="postInjComment('+iid+',\''+role+'\')">📤 投稿する</button>'+
  '</div>';
}

function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

function getCurrentUserId(role){
  // role別の現在ユーザーID取得
  if(role==='staff')return 'staff'; // スタッフ複数だが一括
  if(role==='player')return typeof myPid!=='undefined'?myPid:null;
  if(role==='trainer')return (typeof myTrainer!=='undefined'&&myTrainer)?myTrainer.id:null;
  return null;
}

function getCurrentUserName(role){
  if(role==='staff')return 'スタッフ';
  if(role==='player'){var p=D.p.find(function(x){return idEq(x.id,myPid);});return p?p.name:'選手';}
  if(role==='trainer')return (typeof myTrainer!=='undefined'&&myTrainer)?myTrainer.name:'専門学生';
  return '';
}

function postInjComment(iid,role){
  var el=document.getElementById('injcomm-input-'+iid);
  if(!el)return;
  var text=(el.value||'').trim();
  if(!text){alert('コメントを入力してください');return;}
  var newComm={
    id:'ic_'+Date.now()+'_'+Math.floor(Math.random()*1000),
    injId:iid,
    role:role,
    authorId:getCurrentUserId(role),
    authorName:getCurrentUserName(role),
    text:text,
    createdAt:new Date().toISOString()
  };
  svSafeUpdate('injcomm',function(latest){
    latest.push(newComm);
    return latest;
  },function(){
    el.value='';
    // リスト再描画
    var listEl=document.getElementById('injcomm-list-'+iid);
    if(listEl){
      var newHtml=renderInjCommentsListOnly(iid,role);
      listEl.innerHTML=newHtml;
      listEl.scrollTop=listEl.scrollHeight;
    }
  }).catch(function(e){alert('投稿に失敗しました');console.error(e);});
}

function renderInjCommentsListOnly(iid,role){
  var comments=(D.injcomm||[]).filter(function(c){return idEq(c.injId,iid);}).sort(function(a,b){return (a.createdAt||'').localeCompare(b.createdAt||'');});

function deleteInjury(iid){
  if(!confirm('この怪我記録を削除しますか？\n（関連するリハビリ記録・プラン・進行データもすべて削除されます。元に戻せません。）'))return;
  var id=parseInt(iid)||iid;
  // 4つのコレクションを順番に削除（Firestoreから最新取得→該当削除→保存）
  // i (怪我), r (リハビリ進行), rplan (プラン), rlog (記録)
  function deleteFromCollection(collectionKey, matchField){
    return svSafeUpdate(collectionKey,function(latest){
      return latest.filter(function(r){
        if(matchField==='id'){return r.id!==id&&String(r.id)!==String(iid);}
        return r[matchField]!==id&&String(r[matchField])!==String(iid);
      });
    });
  }
  deleteFromCollection('i','id')
    .then(function(){return deleteFromCollection('r','injId');})
    .then(function(){return deleteFromCollection('rplan','injId');})
    .then(function(){return deleteFromCollection('rlog','injId');})
    .then(function(){alert('削除しました ✓');popView();})
    .catch(function(e){alert('削除に失敗しました');console.error(e);});
}

// トレーニングタブの描画（display:none中の0高さ描画を避けるため、タブが開かれた瞬間に描く）
function renderTrainTab(){
  var pid=window._dtPid;var el=document.getElementById('dt5');if(!el)return;
  var logs=(D.tlog||[]).filter(function(l){return idEq(l.pid,pid);}).sort(function(a,b){return (b.ts||b.date||'').localeCompare(a.ts||a.date||'');});
  if(!logs.length){el.innerHTML='<div class="form-box"><div class="form-title">セッション履歴</div><div class="no">まだトレーニング記録がありません</div></div>';return;}
  // ===== 上段: 種目推移（漸進性過負荷） =====
  var exAgg={};
  logs.forEach(function(l){if(l.absent)return;(l.results||[]).forEach(function(r){if(r.skipped)return;var nm=(r.exName||'').trim();if(!nm)return;if(!exAgg[nm])exAgg[nm]={name:nm,count:0,estBase:null};exAgg[nm].count++;if(!exAgg[nm].estBase&&r.estBase)exAgg[nm].estBase=r.estBase;});});
  var exList=Object.keys(exAgg).map(function(k){return exAgg[k];}).sort(function(a,b){return b.count-a.count;});
  var trendHtml='';
  if(exList.length){
    var def=exList.find(function(e){return e.estBase;})||exList[0];

    window._trEx=sel;
    var estBase=exAgg[sel].estBase;
    var metric=window._trMetric||'top';
    if(metric==='e1rm'&&!estBase)metric='top'; // estBase無し種目は推定1RM不可
    window._trMetric=metric;
    // 指標トグル（estBase無し種目は推定1RMを無効化）
    var metricBtns=[['top','トップセット重量'],['e1rm','推定1RM'],['vol','ボリューム']];
    var togHtml=metricBtns.map(function(mb){
      var disabled=mb[0]==='e1rm'&&!estBase;var active=mb[0]===metric;
      return '<button class="btn" style="padding:4px 10px;font-size:11px'+(active?';background:var(--blue);color:#fff;border-color:var(--blue)':'')+(disabled?';opacity:.4;cursor:not-allowed':'')+'"'+(disabled?' disabled title="この種目は実測1RM基準が無いため推定1RM不可"':' onclick="setTrMetric(\''+mb[0]+'\')"')+'>'+mb[1]+'</button>';
    }).join('');
    trendHtml='<div class="form-box"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px"><div class="form-title" style="margin:0">📈 種目推移</div>'+
      '<select class="ipt" style="width:auto;padding:4px 8px;font-size:12px" onchange="setTrEx(this.value)">'+exList.map(function(e){return'<option'+(e.name===sel?' selected':'')+'>'+escapeHtml(e.name)+(e.estBase?'':' (手入力)')+'</option>';}).join('')+'</select></div>'+
      '<div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap">'+togHtml+'</div>';
    var series=getExSeries(pid,sel);
    if(series.length){
      trendHtml+='<div class="chart-wrap" style="height:210px;margin:0 0 8px"><canvas id="ch-tr1rm"></canvas></div>';
      if(metric==='e1rm')trendHtml+='<div style="font-size:10px;color:var(--text-tertiary);margin-bottom:6px">● 濃い点=信頼度高(≤3レップ) / ● 薄い点=参考(4〜6レップ)。候補セット(RIR記録あり・6レップ以下)が無い日は点を打ちません。</div>';
      // 最新セッション（この種目を含む）を特定
      var curLog=null;
      logs.forEach(function(l){if(l.absent)return;var r=(l.results||[]).find(function(x){return (x.exName||'').trim()===sel&&!x.skipped;});if(r&&r.sets&&r.sets.length){var t=l.ts||l.date;if(!curLog||t>(curLog.ts||curLog.date))curLog=l;}});
      if(curLog){
        var curR=(curLog.results||[]).find(function(x){return (x.exName||'').trim()===sel&&!x.skipped;});
        var curM=exMetrics(curR.sets);
        var prev=getCompareEx(pid,sel,curLog.date,'prev',curLog.ts,curLog.id);
        var wk=getCompareEx(pid,sel,curLog.date,'week',curLog.ts,curLog.id);
        // 実効強度%（トップセット重量 ÷ 実測1RM）
        var phBest=estBase?getBestPh(pid,estBase):null;
        if(phBest&&phBest.val>0){
          var eff=Math.round(curM.topW/phBest.val*100);var over=eff>100;
          trendHtml+='<div style="font-size:12px;margin-bottom:6px">実効強度 <b style="color:'+(over?'var(--text-tertiary)':'var(--blue)')+'">'+eff+'%</b>'+(over?' <span style="color:var(--amber);font-size:11px">⚠ 100%超＝ph更新推奨</span>':'')+' <span style="color:var(--text-tertiary);font-size:11px">(実測1RM '+phBest.val+'kg・'+fmt(phBest.date).slice(5)+'測定)</span></div>';
        }
        // 一行サマリー（判断軸: トップ重量 ＞ 推定1RM ＞＞ ボリューム）
        if(prev){
          var sp=[];
          var td=curM.topW-prev.topW;sp.push('<span>トップ '+diffArrow(td)+' '+(td>0?'+':'')+td+'kg</span>');
          if(curM.e1!=null&&prev.e1!=null){var ed=curM.e1-prev.e1;sp.push('<span>推定1RM '+diffArrow(ed)+' '+(ed>0?'+':'')+ed+'kg</span>');}
          var vd=curM.vol-prev.vol;sp.push('<span style="color:var(--text-tertiary)">ボリューム '+diffArrow(vd)+'</span>');
          trendHtml+='<div style="font-size:13px;font-weight:600;margin-bottom:3px">'+escapeHtml(sel)+'</div><div style="font-size:12px;display:flex;flex-wrap:wrap;gap:12px;margin-bottom:5px">'+sp.join('')+'</div>';
        }
        // 前回比/7日比（トップセット重量差＋実日付）
        trendHtml+='<div style="font-size:11px;color:var(--text-secondary);display:flex;flex-wrap:wrap;gap:14px">'+trCmpLine('前回比',curM,prev)+trCmpLine('7日比',curM,wk)+'</div>';
      }
      trendHtml+='<div style="font-size:10px;color:var(--text-tertiary);margin-top:6px">※判断は トップセット重量＞推定1RM＞＞ボリューム の順で。ボリュームはウォームアップ込みの参考値。</div>';
    }else{
      trendHtml+='<div class="no">この種目の記録がありません</div>';
    }
    trendHtml+='</div>';
  }
  // ===== 下段: セッション履歴 =====
  var h='<div class="form-box"><div class="form-title">セッション履歴</div>';
  logs.slice(0,20).forEach(function(lg){
    if(lg.absent){
      var rc=lg.absentReason==='痛み・怪我'?'bd-r':'bd-n';
      h+='<div class="log-row"><span style="min-width:70px;color:var(--text-secondary)">'+fmt(lg.date)+'</span><span class="bd '+rc+'" style="font-size:9px">欠席</span><span style="flex:1;color:var(--text-secondary);font-size:12px;margin-left:6px">理由: '+escapeHtml(lg.absentReason||'-')+'</span></div>';
      return;
    }
    var mn=(D.tmenu||[]).find(function(x){return idEq(x.id,lg.menuId);});
    var exCount=(lg.results||[]).length;
    var hasInjury=(lg.results||[]).some(function(r){return r.skipped&&r.skipReason==='痛み・怪我';});
    var vol=lg.totalVolume||0;
    h+='<div class="log-row" style="cursor:pointer" onclick="toggleTrSess('+lg.id+')"><span style="min-width:14px;color:var(--text-tertiary)" id="trsess-arw-'+lg.id+'">▸</span><span style="min-width:64px;color:var(--text-secondary)">'+fmt(lg.date)+'</span><span style="flex:1;font-weight:600;font-size:13px">'+(mn?escapeHtml(mn.name):'メニュー')+(hasInjury?' <span class="bd bd-r" style="font-size:9px">怪我</span>':'')+'</span><span style="font-size:12px;color:var(--text-secondary);margin-right:8px">'+exCount+'種目</span><span style="font-weight:700;color:var(--blue);min-width:64px;text-align:right">'+vol.toLocaleString()+'kg</span></div>';
    h+='<div id="trsess-'+lg.id+'" style="display:none">'+trSessDetail(lg)+'</div>';
  });
  if(logs.length>20)h+='<div style="font-size:11px;color:var(--text-secondary);margin-top:6px">ほか '+(logs.length-20)+' 件</div>';
  h+='<div style="font-size:10px;color:var(--text-tertiary);margin-top:8px">※ボリュームはウォームアップ込み（各セットの重量×回数の合計）</div>';
  el.innerHTML=trendHtml+h+'</div>';
  if(trendHtml)setTimeout(function(){drawTrChart(pid,window._trEx,window._trMetric);},30);
}
// 種目セレクタ／指標トグル変更 → タブ全再描画（グラフはdC先行で作り直す）
function setTrEx(v){window._trEx=(v||'').trim();renderTrainTab();}
function setTrMetric(m){window._trMetric=m;renderTrainTab();}
// 単一resultのセット群から指標を算出（トップ重量・ボリューム・最大推定1RM＋そのレップ数）
function exMetrics(sets){
  var topW=0,vol=0,e1=null,e1reps=null;
  (sets||[]).forEach(function(s){
    var w=parseFloat(s.weight)||0,rp=parseInt(s.reps)||0;
    if(w>topW)topW=w;vol+=w*rp;
    var hasRir=s.rir!=null&&s.rir!=='';
    if(hasRir&&rp>0&&rp<=6&&w>0){var e=estimateOneRM(w,rp,parseInt(s.rir));if(e&&(e1==null||e>e1)){e1=e;e1reps=rp;}}
  });
  return{topW:topW,vol:vol,e1:e1,e1reps:e1reps};
}
// 種目の時系列（同日集約: トップ重量=最大 / 推定1RM=最大 / ボリューム=合算）
function getExSeries(pid,exName){
  var byDate={};
  (D.tlog||[]).filter(function(l){return idEq(l.pid,pid)&&!l.absent;}).forEach(function(l){
    var r=(l.results||[]).find(function(x){return (x.exName||'').trim()===exName&&!x.skipped;});
    if(!r||!r.sets||!r.sets.length)return;
    var m=exMetrics(r.sets);var d=l.date;
    if(!byDate[d])byDate[d]={date:d,topW:0,vol:0,e1:null,e1reps:null};
    if(m.topW>byDate[d].topW)byDate[d].topW=m.topW;
    byDate[d].vol+=m.vol;
    if(m.e1!=null&&(byDate[d].e1==null||m.e1>byDate[d].e1)){byDate[d].e1=m.e1;byDate[d].e1reps=m.e1reps;}
  });
  return Object.keys(byDate).sort().map(function(k){return byDate[k];});
}
// 比較セッション（player getCompareVolume を _curTLog非依存に引数化＋全指標化）。mode: prev / week(6日前以前の直近)
function getCompareEx(pid,exName,beforeDate,mode,curTs,curId){
  var logs=(D.tlog||[]).filter(function(l){
    if(!idEq(l.pid,pid))return false;
    if(curId!=null&&idEq(l.id,curId))return false;
    if(l.ts&&curTs)return l.ts<curTs;
    return l.date<beforeDate;
  }).sort(function(a,b){var at=a.ts||a.date,bt=b.ts||b.date;return bt.localeCompare(at);});
  if(mode==='week'){var wkAgo=new Date(beforeDate);wkAgo.setDate(wkAgo.getDate()-6);var wkStr=toDateStr(wkAgo);logs=logs.filter(function(l){return l.date<=wkStr;});}
  for(var i=0;i<logs.length;i++){
    var r=(logs[i].results||[]).find(function(x){return (x.exName||'').trim()===exName&&!x.skipped;});
    if(r&&r.sets){var m=exMetrics(r.sets);m.date=logs[i].date;return m;}
  }
  return null;
}
// 種目のestBase（最初に見つかったもの）
function getExEstBase(pid,exName){
  var eb=null;
  (D.tlog||[]).filter(function(l){return idEq(l.pid,pid);}).forEach(function(l){(l.results||[]).forEach(function(r){if(!eb&&(r.exName||'').trim()===exName&&r.estBase)eb=r.estBase;});});
  return eb;
}
// 実測1RM（ph）のベスト値＋測定日
function getBestPh(pid,field){
  var rs=(D.ph||[]).filter(function(x){return idEq(x.pid,pid)&&x[field]!=null;});
  if(!rs.length)return null;
  var best=null;rs.forEach(function(x){if(best==null||x[field]>best.val)best={val:x[field],date:x.date};});
  return best;
}
// 差分の矢印（色付き）
function diffArrow(d){return d>0?'<span style="color:var(--green)">↑</span>':d<0?'<span style="color:var(--red)">↓</span>':'<span style="color:var(--text-secondary)">→</span>';}
// 前回比/7日比の一行（トップセット重量差＋実日付）
function trCmpLine(label,cur,cmp){
  if(!cmp)return '<span style="color:var(--text-tertiary)">'+label+' 比較なし</span>';
  var d=cur.topW-cmp.topW;
  return '<span>'+label+' '+diffArrow(d)+' '+(d>0?'+':'')+d+'kg <span style="color:var(--text-tertiary)">('+fmt(cmp.date).slice(5)+'比)</span></span>';
}
// 種目推移グラフ（指標ごとに毎回 dC→new Chart で作り直す）。metric: top / e1rm / vol
function drawTrChart(pid,exName,metric){
  dC('tr1rm');
  var e=document.getElementById('ch-tr1rm');if(!e)return;
  var series=getExSeries(pid,exName);if(!series.length)return;
  var labels=series.map(function(p){return p.date.slice(5);});
  var estBase=getExEstBase(pid,exName);
  var phBest=(metric!=='vol'&&estBase)?getBestPh(pid,estBase):null;
  var datasets=[],maxV=0;
  if(metric==='vol'){
    datasets.push({label:'ボリューム(kg)',data:series.map(function(p){return p.vol;}),borderColor:'#2563EB',backgroundColor:'rgba(37,99,235,0.08)',borderWidth:2,fill:true,tension:.3,spanGaps:true,pointRadius:4,pointBackgroundColor:'#2563EB'});
  }else if(metric==='e1rm'){
    series.forEach(function(p){if(p.e1!=null&&p.e1>maxV)maxV=p.e1;});
    datasets.push({label:'推定1RM(kg)',data:series.map(function(p){return p.e1;}),borderColor:'#2563EB',borderWidth:2,tension:.3,spanGaps:true,
      pointRadius:series.map(function(p){return p.e1==null?0:(p.e1reps<=3?5:4);}),
      pointBackgroundColor:series.map(function(p){return p.e1==null?'transparent':(p.e1reps<=3?'#2563EB':'#9DBDF0');}),
      pointBorderColor:series.map(function(p){return p.e1==null?'transparent':(p.e1reps<=3?'#2563EB':'#9DBDF0');})});
  }else{
    series.forEach(function(p){if(p.topW>maxV)maxV=p.topW;});
    datasets.push({label:'トップセット重量(kg)',data:series.map(function(p){return p.topW||null;}),borderColor:'#2563EB',backgroundColor:'rgba(37,99,235,0.08)',borderWidth:2,fill:true,tension:.3,spanGaps:true,pointRadius:4,pointBackgroundColor:'#2563EB'});
  }
  if(phBest&&phBest.val>0){
    if(phBest.val>maxV)maxV=phBest.val;
    datasets.push({label:'実測1RM '+phBest.val+'kg',data:labels.map(function(){return phBest.val;}),borderColor:'#98A2B3',borderWidth:1.5,borderDash:[6,4],pointRadius:0,fill:false,tension:0});
  }
  var yOpt=metric==='vol'?{beginAtZero:true,title:{display:true,text:'kg'}}:{beginAtZero:false,suggestedMax:Math.ceil(maxV*1.05),title:{display:true,text:'kg'}};
  charts.tr1rm=new Chart(e,{type:'line',data:{labels:labels,datasets:datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom'}},scales:{y:yOpt}}});
}
// セッション展開のトグル
function toggleTrSess(id){

// 1セッションの展開内容（全セット・目標差・スキップ理由・当日コンディション）

      return;
    }
    h+='<div style="padding:6px 0;border-bottom:1px solid var(--border-tertiary)"><div style="font-weight:600;font-size:13px;margin-bottom:4px">'+escapeHtml(r.exName)+(r.targetReps?'<span style="font-size:10px;color:var(--text-tertiary);font-weight:400;margin-left:6px">目標 '+r.targetReps+'回'+(r.targetRir!=null?' / RIR'+r.targetRir:'')+'</span>':'')+'</div><div style="display:flex;flex-wrap:wrap;gap:6px">';
    (r.sets||[]).forEach(function(s){
      var hasW=s.weight!=null&&s.weight!=='',hasR=s.reps!=null&&s.reps!=='';
      var w=hasW?s.weight:'-',rp=hasR?s.reps:'-';
      var rir=(s.rir!=null&&s.rir!=='')?s.rir:null;

function getTodayPickup(){
  var lastMeasured=D.p.map(function(p){var recs=D.bc.filter(function(r){return r.pid===p.id;});var last=recs.length?recs.sort(function(a,b){return b.date.localeCompare(a.date);})[0].date:'2000-01-01';return{pid:p.id,last:last};});
  lastMeasured.sort(function(a,b){return a.last.localeCompare(b.last);});
  // Use today's date as seed to keep consistent during the day
  var today=todayStr();var seed=0;for(var ci=0;ci<today.length;ci++)seed+=today.charCodeAt(ci);
  // Pick 5 from the least recently measured, with slight shuffle
  var pool=lastMeasured.slice(0,15);
  for(var si=pool.length-1;si>0;si--){var j=(seed+si)%si;var tmp=pool[si];pool[si]=pool[j];pool[j]=tmp;}
  return pool.slice(0,5).map(function(x){return x.pid;});
}

function doAddTapeSlot(){
  var date=document.getElementById('ts-date').value;
  var type=document.getElementById('ts-type').value;
  var interval=parseInt(document.getElementById('ts-interval').value)||5;
  if(!date)return alert('日付を入力してください');
  if(!D.tapeslot)D.tapeslot=[];
  var newSlots=[];
  for(var si=0;si<tapeStaffRowCount;si++){
    var nameEl=document.getElementById('ts-sname-'+si);
    var startEl=document.getElementById('ts-start-'+si);
    var endEl=document.getElementById('ts-end-'+si);
    var capEl=document.getElementById('ts-cap-'+si);
    if(!nameEl||!startEl||!endEl)continue;
    var sname=nameEl.value.trim()||('担当者'+(si+1));
    var startT=startEl.value,endT=endEl.value;
    var cap=parseInt((capEl||{}).value)||1;
    if(startT>=endT){alert(sname+': 終了時間は開始時間より後にしてください');return;}
    var cur=startT;
    while(cur<endT){
      var pts=cur.split(':');var hh=parseInt(pts[0]),mm=parseInt(pts[1]);
      var nm=mm+interval;var nh=hh+Math.floor(nm/60);nm=nm%60;
      if(nh>=24)break;
      var next=String(nh).padStart(2,'0')+':'+String(nm).padStart(2,'0');
      if(next>endT)break;
      newSlots.push({id:Date.now()+newSlots.length*17,date:date,type:type,startTime:cur,endTime:next,capacity:cap,staff:sname});
      cur=next;
    }
  }
  if(!newSlots.length)return alert('枠が作成できませんでした。時間を確認してください。');
  tapeStaffRowCount=1;
  svSafeUpdate('tapeslot',function(latest){return latest.concat(newSlots);},function(){
    alert(newSlots.length+'枠を作成しました ✓');
    popView();
  });
}

function saveTapeRec(recId){
  var pidEl=document.getElementById('tr-pid');
  var pid=pidEl&&pidEl.value?parseInt(pidEl.value):(recId?(D.taperec.find(function(x){return idEq(x.id,recId);})||{}).pid:null);
  if(!pid)return alert('選手を選択してください');
  var tapeTypes=Array.prototype.slice.call(document.querySelectorAll('.tr-tape:checked')).map(function(e){return e.value;});
  var g=function(id){var e=document.getElementById(id);return e?e.value:'';};
  var data={pid:pid,date:g('tr-date')||todayStr(),side:g('tr-side'),part:g('tr-part'),tapeTypes:tapeTypes,method:g('tr-method'),caution:g('tr-caution'),videoUrl:g('tr-video').trim(),author:g('tr-author'),inputAt:new Date().toISOString()};
  svSafeUpdate('taperec',function(latest){
    if(recId){var idx=latest.findIndex(function(x){return idEq(x.id,recId);});if(idx>=0){data.id=recId;latest[idx]=data;}else{data.id=recId;latest.push(data);}}
    else{data.id=Date.now()+'_'+Math.floor(Math.random()*1000);latest.push(data);}
    return latest;
  },function(){alert('保存しました');popView();showPlayerTapeRecs(pid);});
}
function delTapeRec(recId,pid){
  if(!confirm('このテーピング記録を削除しますか？'))return;
  svSafeUpdate('taperec',function(latest){
    return latest.filter(function(x){return!idEq(x.id,recId);});
  },function(){popView();showPlayerTapeRecs(pid);});
}

function saveTMenu(menuId){
  var name=(document.getElementById('tm-name')||{}).value.trim();
  if(!name)return alert('メニュー名を入力してください');
  var scope=(document.getElementById('tm-scope')||{}).value||'all';
  // 種目を整形
  var exercises=_tmenuEx.filter(function(e){return e.name&&e.name.trim();}).map(function(e){
    return{name:e.name.trim(),estBase:e.estBase||null,sets:parseInt(e.sets)||null,reps:parseInt(e.reps)||null,rir:(e.rir!==''&&e.rir!=null)?parseInt(e.rir):null,note:e.note||'',videoUrl:e.videoUrl||''};
  });
  if(!exercises.length)return alert('種目を1つ以上追加してください');
  // 種目名を履歴に追加（重複なし）。トランザクションで最新へマージ（他端末の追加を巻き戻さない）
  var exNames=exercises.map(function(e){return e.name;});
  function mergeTex(onDone){svSafeUpdate('texlist',function(latest){exNames.forEach(function(nm){if(latest.indexOf(nm)<0)latest.push(nm);});return latest;},onDone);}

  var data={name:name,scope:scope,exercises:exercises,createdBy:'スタッフ',createdAt:menuId?undefined:todayStr()};
  if(menuId){
    svSafeUpdate('tmenu',function(latest){var m=latest.find(function(x){return idEq(x.id,menuId);});if(m){m.name=name;m.scope=scope;m.exercises=exercises;}return latest;},function(){
      mergeTex();
      alert('保存しました ✓');popView();
    });
  }else{
    data.id=Date.now();
    svSafe('tmenu',data,function(){
      mergeTex();
      alert('メニューを作成しました ✓');popView();
    });
  }
}

// 実施状況（後のステップで充実させる）
function renderTrainingStatus(){
  var logs=(D.tlog||[]).slice().sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});
  var h='';
  // 怪我でできなかった種目の通知（直近14日）
  var cutoff=new Date();cutoff.setDate(cutoff.getDate()-14);var cutoffStr=toDateStr(cutoff);
  var injuryNotices=[];
  logs.forEach(function(lg){
    if(lg.date<cutoffStr)return;
    // 欠席（痛み・怪我）も通知に含める
    if(lg.absent&&lg.absentReason==='痛み・怪我'){
      var pa=D.p.find(function(x){return idEq(x.id,lg.pid);});
      if(pa)injuryNotices.push({pid:lg.pid,name:pa.name,exName:'トレーニング全体を欠席',date:lg.date});
      return;
    }
    (lg.results||[]).forEach(function(r){
      if(r.skipped&&r.skipReason==='痛み・怪我'){
        var p=D.p.find(function(x){return idEq(x.id,lg.pid);});
        if(p)injuryNotices.push({pid:lg.pid,name:p.name,exName:r.exName,date:lg.date});
      }
    });
  });
  if(injuryNotices.length){
    h+='<div class="card" style="border-left:4px solid var(--red);margin:12px 0"><div style="font-size:14px;font-weight:700;color:var(--red);margin-bottom:8px">🏥 痛み・怪我でできなかった種目（直近14日）</div>';
    injuryNotices.slice(0,10).forEach(function(n){
      h+='<div class="log-row" style="cursor:pointer;padding:5px 0" onclick="goPlayerDetail('+n.pid+',5)"><span style="flex:1;font-size:13px;font-weight:600">'+escapeHtml(n.name)+'</span><span style="font-size:12px;color:var(--text-secondary)">'+escapeHtml(n.exName)+'</span><span style="font-size:11px;color:var(--text-tertiary);margin-left:8px">'+fmt(n.date)+'</span></div>';
    });
    h+='<div style="font-size:11px;color:var(--text-secondary);margin-top:8px">→ 個別メニューへの切り替えを検討してください</div></div>';
  }
  // 連続スキップアラート（全選手）
  var allSkipAlerts=[];
  D.p.forEach(function(p){
    var sk=getConsecutiveSkipsStaff(p.id);
    sk.forEach(function(a){allSkipAlerts.push({name:p.name,pid:p.id,exName:a.name,count:a.count});});
  });
  if(allSkipAlerts.length){
    allSkipAlerts.sort(function(a,b){return b.count-a.count;});

    });

  }

  if(!logs.length){h+='<div class="no">まだトレーニング記録がありません</div>';return h;}
  h+='<div style="font-size:12px;color:var(--text-secondary);margin:12px 0">選手が実施したトレーニング記録です。</div>';
  logs.slice(0,30).forEach(function(lg){
    var p=D.p.find(function(x){return idEq(x.id,lg.pid);});if(!p)return;
    if(lg.absent){
      // 欠席ログ
      var rc=lg.absentReason==='痛み・怪我'?'bd-r':'bd-n';

      return;
    }
    var vol=lg.totalVolume||0;
    var hasInjury=(lg.results||[]).some(function(r){return r.skipped&&r.skipReason==='痛み・怪我';});
    h+='<div class="card card-click" style="margin-bottom:8px" onclick="goPlayerDetail('+lg.pid+',5)"><div style="display:flex;align-items:center;gap:10px">'+avH(p,30)+
      '<div style="flex:1"><div style="font-weight:600;font-size:14px">'+escapeHtml(p.name)+(hasInjury?' <span class="bd bd-r" style="font-size:9px">怪我あり</span>':'')+'</div><div style="font-size:11px;color:var(--text-secondary)">'+fmt(lg.date)+' ・ '+(lg.results?lg.results.length:0)+'種目 ・ ボリューム '+vol.toLocaleString()+'kg</div></div></div></div>';
  });
  return h;
}
// スタッフ側の連続スキップ検出（選手側と同じロジック）
function getConsecutiveSkipsStaff(pid){
  var logs=(D.tlog||[]).filter(function(l){return idEq(l.pid,pid);}).sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});
  if(logs.length<2)return[];
  var exSkipCount={},exSeen={};
  logs.forEach(function(lg){
    (lg.results||[]).forEach(function(r){
      if(exSeen[r.exName]==='stopped')return;
      if(r.skipped){exSkipCount[r.exName]=(exSkipCount[r.exName]||0)+1;}
      else{exSeen[r.exName]='stopped';}
    });
  });
  var result=[];
  Object.keys(exSkipCount).forEach(function(name){if(exSkipCount[name]>=2)result.push({name:name,count:exSkipCount[name]});});
  return result.sort(function(a,b){return b.count-a.count;});
}

function tapeSlotBooked(rsvs,slotId){return rsvs.filter(function(t){return(t.slotIds||[t.slotId]).indexOf(slotId)>=0;});}

  var today=todayStr();
  var dates=Object.keys(slotMap).sort(function(a,b){return b.localeCompare(a);});
  var allStaffs=[...new Set((D.tapeslot||[]).map(function(s){return s.staff;}))].filter(Boolean).sort();
  var staffFilter=document.getElementById('tape-staff-filter')?document.getElementById('tape-staff-filter').value:'';
  var filterH='<div class="srch"><select class="ipt" style="width:auto" id="tape-staff-filter" onchange="V.tape()"><option value="">全担当者</option>'+allStaffs.map(function(s){return'<option'+(staffFilter===s?' selected':'')+'>'+escapeHtml(s)+'</option>';}).join('')+'</select></div>';
  var h='<button class="btn btn-p" style="margin-bottom:14px" onclick="showTapeRecList()">📋 テーピング記録（引き継ぎ）を見る</button>';
  h+=filterH;
  h+=dates.length?dates.map(function(date){
    var allDateSlots=slotMap[date];
    var slots=allDateSlots.filter(function(s){return!staffFilter||s.staff===staffFilter;}).sort(function(a,b){return a.startTime.localeCompare(b.startTime);});
    if(!slots.length)return'';
    var rsvs=D.tape.filter(function(t){return t.date===date;});
    var isPast=date<today;
    var typelabel=allDateSlots[0].type==='match'?'試合前':'練習前';
    var staffSummary={};
    allDateSlots.forEach(function(s){if(!staffSummary[s.staff])staffSummary[s.staff]=0;staffSummary[s.staff]++;});
    return'<div class="card" style="margin-bottom:10px;'+(isPast?'opacity:0.7':'')+'">'+
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">'+
    '<div>'+
    '<div style="font-weight:600;font-size:15px">'+fmt(date)+' <span class="bd bd-b">'+typelabel+'</span>'+(isPast?' <span style="font-size:11px;color:var(--text-secondary)">（過去）</span>':'')+'</div>'+
    '<div style="font-size:11px;color:var(--text-secondary);margin-top:2px">担当: '+Object.keys(staffSummary).map(function(s){return s+'('+staffSummary[s]+'枠)';}).join(' / ')+'</div>'+
    '<div style="font-size:12px;color:var(--text-secondary)">予約: '+rsvs.length+'件</div>'+
    '</div>'+
    '<div style="display:flex;gap:6px;flex-direction:column;align-items:flex-end">'+
    '<button class="btn btn-sm" onclick="goTapeDayDetail(\''+date+'\')">詳細・記録</button>'+
    (isPast?'':'<button class="btn btn-sm btn-d" onclick="delTapeDay(\''+date+'\')">削除</button>')+
    '</div></div>'+
    '<div style="display:flex;flex-wrap:wrap;gap:4px">'+
    slots.map(function(s){
      var booked=tapeSlotBooked(D.tape,s.id).length;
      var full=booked>=s.capacity;
      return'<div style="background:'+(full?'var(--red-bg)':'var(--green-bg)')+';padding:3px 8px;border-radius:99px;font-size:10px;font-weight:600;color:'+(full?'var(--red)':'var(--green)')+'">'+s.staff+' '+s.startTime+(full?' 満':'')+'</div>';
    }).join('')+
    '</div></div>';
  }).join(''):'<div class="no">テーピング枠がまだ設定されていません</div>';
  $m().innerHTML=h;
};

function delTapeDay(date){
  if(!confirm(fmt(date)+'のテーピング枠を全て削除しますか？\n既存の予約も削除されます。'))return;

}

V.msess=function(){

  var h='';

    h+='<div class="alert-card alert-info" style="margin-bottom:1rem">📐 現在進行中の測定会: <b>'+escapeHtml(activeSess.name)+'</b> ('+fmt(activeSess.startDate)+'〜'+fmt(activeSess.endDate)+')</div>';
  }

  if(!D.msess.length){h+='<div class="no">測定会がまだありません</div>';$m().innerHTML=h;return;}

    '<span class="bd '+(isActive?'bd-b':isPast?'bd-g':'bd-a')+'">'+(isActive?'進行中':isPast?'完了':'予定')+'</span></div>'+
    '<div style="font-size:12px;color:var(--text-secondary);margin-bottom:6px">'+fmt(s.startDate)+' 〜 '+fmt(s.endDate)+'</div>'+

function doAddRTestTpl(){
  var name=document.getElementById('rtt-name').value.trim();
  var creator=document.getElementById('rtt-creator').value.trim();
  if(!name)return alert('テンプレ名を入力してください');
  if(!D.rtest_tpl)D.rtest_tpl=[];
  var physTests=[];
  for(var ci=1;ci<=window._rtPhysCount;ci++){
    var el=document.getElementById('rtp-'+ci);if(!el)continue;
    var n=(document.getElementById('rtp-name-'+ci)||{}).value||'';
    var t=(document.getElementById('rtp-type-'+ci)||{}).value||'sidediff';
    if(!n)continue;
    var item={name:n,type:t};
    if(t==='sidediff')item.unit=(document.getElementById('rtp-unit-'+ci)||{}).value||'';
    else item.criteria=(document.getElementById('rtp-criteria-'+ci)||{}).value||'';
    physTests.push(item);
  }
  var newId=D.rtest_tpl.length?Math.max.apply(null,D.rtest_tpl.map(function(t){return t.id;}))+1:1;
  svSafe('rtest_tpl',{id:newId,name:name,createdBy:creator,createdAt:todayStr(),physTests:physTests},function(){});
  alert('テンプレを作成しました ✓');
  popView();
}

// 選手の復帰テスト詳細
function goRTestDetail(injId){
  var inj=D.i.find(function(x){return x.id===injId;});if(!inj)return;
  var p=D.p.find(function(x){return x.id===inj.pid;});if(!p)return;
  var tpl=(D.rtest_tpl||[]).find(function(t){return t.id===inj.rtestTplId;});
  var results=(D.rtest||[]).filter(function(r){return r.injId===injId;}).sort(function(a,b){return b.date.localeCompare(a.date);});
  var lastResult=results[0]||null;
  // ブロンコ目標計算
  var phRecs=D.ph.filter(function(r){return r.pid===inj.pid&&r.bronco;}).sort(function(a,b){return a.bronco-b.bronco;});
  var bestBronco=phRecs.length?phRecs[0].bronco:null;
  var autoTarget=bestBronco?Math.ceil(bestBronco*1.02):null;
  var broncoTarget=inj.broncoTarget||autoTarget;

  var h='<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">'+avH(p,36)+
  '<div><div style="font-size:16px;font-weight:600">'+escapeHtml(p.name)+'</div>'+
  '<div style="font-size:12px;color:var(--text-secondary)">'+(inj.side||'')+inj.part+' '+inj.type+'</div></div></div>';

  // テンプレ設定
  h+='<div class="form-box"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">'+
  '<div class="form-title" style="margin-bottom:0">テンプレ設定</div>'+
  '<select class="ipt" style="width:auto" onchange="setRTestTpl('+injId+',this.value)">'+
  '<option value="">テンプレを選択...</option>'+
  (D.rtest_tpl||[]).map(function(t){return'<option value="'+t.id+'"'+(inj.rtestTplId===t.id?' selected':'')+'>'+escapeHtml(t.name)+'</option>';}).join('')+
  '</select></div>'+
  (tpl?'<div style="font-size:13px;color:var(--green)">✓ '+escapeHtml(tpl.name)+'</div>':'<div style="font-size:12px;color:var(--text-secondary)">テンプレ未設定</div>')+
  '</div>';

  // ブロンコ目標設定
  h+='<div class="form-box"><div class="form-title">ブロンコ目標タイム設定</div>'+
  (bestBronco?'<div style="font-size:12px;color:var(--text-secondary);margin-bottom:8px">直近ベスト: '+broncoFmt(bestBronco)+' / 自動計算 (+2%): '+broncoFmt(autoTarget)+'</div>':'')+
  '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">'+
  '<input class="ipt" type="number" id="bt-m" placeholder="分" style="width:70px" value="'+(broncoTarget?Math.floor(broncoTarget/60):0)+'">'+
  '<span style="font-weight:600">分</span>'+
  '<input class="ipt" type="number" id="bt-s" placeholder="秒" min="0" max="59" style="width:70px" value="'+(broncoTarget?Math.round(broncoTarget%60):0)+'">'+
  '<span style="font-weight:600">秒</span>'+
  '<button class="btn btn-sm btn-p" onclick="saveBroncoTarget('+injId+')">設定</button></div>'+
  (broncoTarget?'<div style="font-size:13px;font-weight:600;color:var(--blue)">現在の目標: '+broncoFmt(broncoTarget)+'</div>':'')+
  '</div>';

  // 承認ボタン
  if(lastResult&&lastResult.physPassed&&lastResult.fitPassed&&!inj.rtestApproved){
    h+='<div class="alert-card alert-info" style="margin-bottom:10px">✅ 全テストクリア！復帰承認できます</div>'+
    '<button class="btn btn-p" style="width:100%;margin-bottom:14px" onclick="approveRTest('+injId+')">🏁 復帰を承認する</button>';
  } else if(inj.rtestApproved){
    h+='<div class="alert-card alert-up" style="margin-bottom:10px">🎉 復帰承認済み！</div>';
  }

  // テスト結果履歴
  h+='<div style="font-size:14px;font-weight:600;margin-bottom:8px">テスト結果履歴</div>';
  h+=results.length?results.map(function(r){
    return'<div class="card" style="margin-bottom:6px;padding:.75rem">'+
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">'+
    '<span style="font-weight:600">'+fmt(r.date)+'</span>'+
    '<div style="display:flex;gap:4px">'+
    '<span class="bd '+(r.physPassed?'bd-g':'bd-r')+'">患部'+(r.physPassed?'✓':'✗')+'</span>'+
    '<span class="bd '+(r.fitPassed?'bd-g':'bd-r')+'">フィット'+(r.fitPassed?'✓':'✗')+'</span>'+
    '</div></div>'+
    (r.broncoTime?'<div style="font-size:12px;color:var(--text-secondary)">ブロンコ: '+broncoFmt(r.broncoTime)+(broncoTarget?'（目標: '+broncoFmt(broncoTarget)+'）':'')+'</div>':'')+
    (r.note?'<div style="font-size:12px;color:var(--text-secondary);margin-top:4px">'+escapeHtml(r.note)+'</div>':'')+
    '</div>';
  }).join(''):'<div class="no">テスト結果なし</div>';

  pushView(escapeHtml(p.name)+' の復帰テスト',h);
}

function saveBroncoTarget(injId){
  var inj=D.i.find(function(x){return x.id===injId;});if(!inj)return;

function doSaveRehabLogStaff(injId,hasTpl,exCount){
  var date=document.getElementById('srl-date').value;
  var implementer=document.getElementById('srl-implementer').value.trim();
  if(!date)return alert('日付を入力してください');
  if(!implementer)return alert('実施者を入力してください');

  var exercises=[];
  var cats=[];

  if(hasTpl){
    for(var ei=0;ei<exCount;ei++){
      var chk=document.getElementById('srl-chk-'+ei);
      var done=chk&&chk.checked;
      var nameEl=document.getElementById('srl-ex-'+ei);
      var exName=nameEl?(nameEl.dataset.name||''):'';
      var sets=parseInt((document.getElementById('srl-sets-'+ei)||{}).value)||null;
      var reps=parseInt((document.getElementById('srl-reps-'+ei)||{}).value)||null;
      var cmt=(document.getElementById('srl-cmt-'+ei)||{}).value||'';
      var cat=nameEl?(nameEl.dataset.cat||''):'';
      if(done&&cat&&cats.indexOf(cat)<0)cats.push(cat);
      exercises.push({name:exName,cat:cat,sets:sets,reps:reps,comment:cmt,done:done});
    }
  } else {
    // カスタム種目を収集
    document.querySelectorAll('[id^="cri-"]').forEach(function(el){
      var ci=el.id.replace('cri-','');
      if(isNaN(parseInt(ci)))return;
      var cat=(document.getElementById('cri-cat-'+ci)||{}).value||'';
      var name=(document.getElementById('cri-name-'+ci)||{}).value||'';
      var sets=parseInt((document.getElementById('cri-sets-'+ci)||{}).value)||null;
      var reps=parseInt((document.getElementById('cri-reps-'+ci)||{}).value)||null;
      var cmt=(document.getElementById('cri-cmt-'+ci)||{}).value||'';
      if(name){
        exercises.push({name:name,cat:cat,sets:sets,reps:reps,comment:cmt,done:true});
        if(cat&&cats.indexOf(cat)<0)cats.push(cat);
      }
    });
  }

  var comment=(document.getElementById('srl-comment')||{}).value||'';
  var logRec={id:Date.now(),injId:injId,date:date,implementer:implementer,by:implementer,cats:cats,exercises:exercises,comment:comment};

  svSafe('rlog',logRec,function(){
    if(!hasTpl){
      // カスタムの場合：テンプレ化を提案
      if(exercises.length&&confirm('このメニューをテンプレとして保存しますか？')){
        goSaveAsTemplate(injId,exercises,cats);return;
      }
    }
    // 次回メニュー設定へ
    goSetNextMenu(injId);
  });
}

function goSetNextMenu(injId){
  var inj=D.i.find(function(x){return x.id===injId;});if(!inj)return;
  var p=D.p.find(function(x){return x.id===inj.pid;});if(!p)return;
  var plan=(D.rplan||[]).find(function(x){return x.injId===injId;});
  var cur=plan?plan.tomorrowCats||[]:[];
  var h='<div style="font-size:17px;font-weight:600;margin-bottom:14px">📅 '+escapeHtml(p.name)+' の次回メニュー設定</div>'+
  '<div style="font-size:13px;color:var(--text-secondary);margin-bottom:14px">今日の状況を踏まえて次回のメニューを選択してください</div>'+
  '<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px">'+
  RCATS.map(function(c,ci){
    var sel=cur.indexOf(c)>=0;
    return'<div id="nmr-'+ci+'" onclick="toggleNextMenuCat('+ci+')" style="padding:8px 16px;border-radius:99px;border:1.5px solid '+(sel?RCAT_COLOR[c]:'var(--border-secondary)')+';background:'+(sel?RCAT_BG[c]:'var(--bg-primary)')+';color:'+(sel?RCAT_COLOR[c]:'var(--text-primary)')+';cursor:pointer;font-size:13px;font-weight:500">'+c+'</div>';
  }).join('')+
  '</div>'+
  '<div style="display:flex;gap:8px"><button class="btn" onclick="popView()">スキップ</button><button class="btn btn-p" style="flex:1" onclick="saveNextMenu('+injId+')">保存して完了</button></div>';
  window._nextMenuCats=cur.slice();
  window._nextMenuInjId=injId;
  pushView('次回メニュー設定',h);
}

function advRehabStage(injId){
  var rh=(D.r||[]).find(function(x){return x.injId===injId;});if(!rh||rh.stage>=STG.length-1)return;
  rh.stage++;
  if(!rh.stageDates)rh.stageDates=[];
  rh.stageDates[rh.stage]=todayStr();
  if(rh.stage===STG.length-1){var inj=D.i.find(function(x){return x.id===injId;});if(inj){inj.resolved=true;svRec('i',inj);}}
  svRec('r',rh);goRPlanDetail(injId);
}

function prevRehabStage(injId){
  var rh=(D.r||[]).find(function(x){return x.injId===injId;});if(!rh||rh.stage<=0)return;
  if(!confirm(STG[rh.stage]+'から'+STG[rh.stage-1]+'に戻しますか？'))return;
  rh.stage--;svRec('r',rh);goRPlanDetail(injId);
}


function toggleNextMenuCat(ci){
  var cat=RCATS[ci];if(!cat)return;
  if(!window._nextMenuCats)window._nextMenuCats=[];
  var i=window._nextMenuCats.indexOf(cat);
  if(i>=0){window._nextMenuCats.splice(i,1);}else{window._nextMenuCats.push(cat);}
  var el=document.getElementById('nmr-'+ci);if(!el)return;
  var sel=window._nextMenuCats.indexOf(cat)>=0;
  el.style.borderColor=sel?RCAT_COLOR[cat]:'var(--border-secondary)';
  el.style.background=sel?RCAT_BG[cat]:'var(--bg-primary)';
  el.style.color=sel?RCAT_COLOR[cat]:'var(--text-primary)';
}

function saveNextMenu(injId){
  var cats=window._nextMenuCats||[];
  // 対象日（設定日の翌日）を持たせる。これが無いと「明日の予定」が日付不明で永遠に残る（旧バグ）
  var _tm=new Date();_tm.setDate(_tm.getDate()+1);var tomorrowDate=toDateStr(_tm);
  svSafeUpdate('rplan',function(latest){var plan=latest.find(function(x){return idEq(x.injId,injId);});if(!plan){plan={injId:injId,tplId:null,tomorrowCats:[]};latest.push(plan);}plan.tomorrowCats=cats;plan.tomorrowDate=cats.length?tomorrowDate:null;return latest;},function(){alert('保存しました ✓');popView();});
}

function goSaveAsTemplate(injId,exercises,cats){
  var inj=D.i.find(function(x){return x.id===injId;});if(!inj)return;
  var name=prompt('テンプレ名を入力してください：','');
  if(!name)return goSetNextMenu(injId);
  if(!D.rtpl)D.rtpl=[];
  var newId=D.rtpl.length?Math.max.apply(null,D.rtpl.map(function(t){return t.id;}))+1:1;
  svSafe('rtpl',{id:newId,name:name,part:inj.part,stage:'',cats:cats,exercises:exercises,createdBy:'スタッフ',createdAt:todayStr()},function(){});
  alert('テンプレを保存しました ✓');
  goSetNextMenu(injId);
}

function delRehabLogStaff(lid,injId){
  if(!confirm('このリハビリ記録を削除しますか？\n（削除すると元に戻せません）'))return;
  var id=parseInt(lid)||lid;var notFound=false;
  svSafeUpdate('rlog',function(latest){
    var before=latest.length;
    latest=latest.filter(function(r){return r.id!==id&&String(r.id)!==String(lid);});
    notFound=(latest.length===before);
    return latest;
  },function(){if(notFound){alert('記録が見つかりませんでした');return;}alert('削除しました ✓');goRPlanDetail(injId);});
}

  var logs=(D.rlog||[]).filter(function(l){return l.injId===injId;}).sort(function(a,b){return (b.date||"").localeCompare(a.date||"");});

function toggleRCat(cat,idx){
  var i=_selRCats.indexOf(cat);
  if(i>=0){_selRCats.splice(i,1);}else{_selRCats.push(cat);}
  var el=document.getElementById('rc-'+idx);

// カレンダーの測定イベントから測定会を自動作成（同日の測定会がなければ）
function autoCreateMSessFromCal(evtType,date,title){
  if(evtType!=='phys_measure'&&evtType!=='bronco_measure')return;
  if(!D.msess)D.msess=[];
  // 同日をカバーする測定会が既にあるか
  var exists=D.msess.some(function(s){return s.startDate<=date&&s.endDate>=date;});
  if(exists)return;
  var sessName=title||(evtType==='bronco_measure'?'ブロンコ測定':'フィジカル測定')+' '+fmt(date);
  var newSess={id:Date.now()+1,name:sessName,startDate:date,endDate:date,createdAt:new Date().toISOString(),autoCreated:true,fromCalType:evtType};
  // svSafeUpdate方式で保存（トランザクション内で再度重複チェック）
  var dup=false;
  svSafeUpdate('msess',function(latest){
    if(latest.some(function(s){return s.startDate<=date&&s.endDate>=date;})){dup=true;return latest;}
    latest.push(newSess);
    return latest;
  },function(){
    if(dup)return;
    alert('📐 測定会「'+sessName+'」を自動作成しました\n（期間中の選手のフィジカル入力は自動でこの測定会に紐づきます）');
  });
}

  var title=document.getElementById('cef-title').value.trim();

  var evtType=document.getElementById('cef-type').value;
  svSafe('cal',{id:Date.now(),date:date,type:evtType,title:title,detail:document.getElementById('cef-detail').value},function(){});
  autoCreateMSessFromCal(evtType,date,title);
  popView();
}

// === 予定の一括インポート（TimeTreeスクショ起点・貼り付け式） ===
var _calImport=[];
var CAL_IMP_TYPES=[['match','試合'],['practice','練習'],['off','オフ'],['weight','ウエイト'],['phys_measure','フィジカル測定'],['bronco_measure','ブロンコ測定'],['other','その他']];
function _normCalDate(s){
  s=(s||'').trim().replace(/[\/.]/g,'-');
  var m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  if(!m)return null;
  var mo=parseInt(m[2],10),da=parseInt(m[3],10);
  if(mo<1||mo>12||da<1||da>31)return null;
  return m[1]+'-'+('0'+mo).slice(-2)+'-'+('0'+da).slice(-2);
}
function detectCalType(title){
  var t=(title||'').toLowerCase();
  if(t.indexOf('vs')>=0||title.indexOf('ｖｓ')>=0||title.indexOf('対')>=0)return 'match';
  if(t.indexOf('off')>=0||title.indexOf('オフ')>=0)return 'off';
  if(title.indexOf('ウエイト')>=0||title.indexOf('ウェイト')>=0||t.indexOf('weight')>=0)return 'weight';
  if(t.indexOf('at')>=0||t.indexOf('df')>=0||t.indexOf('fit')>=0||t.indexOf('unit')>=0||t.indexOf('mtg')>=0||title.indexOf('ラン')>=0||title.indexOf('練習')>=0||title.indexOf('ミーティング')>=0)return 'practice';
  return 'other';
}
function goImportCal(){
  var ph='2026-06-06 | match | vs文理(AB) | \n2026-06-08 | weight | ウエイト① | 7:30\n2026-06-08 | weight | ウエイト② | 16:30\n2026-06-08 | off | OFF | ';
  var known=CAL_IMP_TYPES.map(function(o){return o[0]+'('+o[1]+')';}).join(' / ');
  var h='<div style="max-width:760px">'+
    '<div class="form-box"><div class="form-title">📋 予定を一括インポート</div>'+
    '<div style="font-size:12px;color:var(--text-secondary);line-height:1.7;margin-bottom:10px">TimeTreeのスクショから起こした予定を貼り付けてください。<b>1行＝1予定</b>。<br>形式: <code>日付 | 種別 | タイトル | 時間</code>（種別・時間は省略可。種別を空にするとタイトルから自動判定）<br>種別: '+known+'<br>※同じ日付・同じタイトルの予定は二重登録されません。</div>'+
    '<textarea class="ipt" id="cal-imp-txt" style="min-height:240px;font-family:monospace;font-size:12px;white-space:pre" placeholder="'+ph+'"></textarea>'+
    '<div style="display:flex;gap:8px;margin-top:12px"><button class="btn" onclick="popView()">キャンセル</button><button class="btn btn-p" style="flex:1" onclick="parseCalImport()">解析してプレビュー →</button></div>'+
    '</div><div id="cal-imp-preview"></div></div>';
  pushView('予定インポート',h);
}
function parseCalImport(){
  var raw=(document.getElementById('cal-imp-txt')||{}).value||'';
  var rows=[];
  raw.split(/\r?\n/).forEach(function(ln){
    var s=ln.trim();
    if(!s||s.charAt(0)==='#')return;
    var parts=s.split('|').map(function(x){return x.trim();});
    var date,type,title,time;
    var isType=function(v){v=(v||'').toLowerCase();for(var i=0;i<CAL_IMP_TYPES.length;i++){if(CAL_IMP_TYPES[i][0]===v)return true;}return false;};
    if(parts.length>=4){date=parts[0];type=parts[1];title=parts[2];time=parts.slice(3).join(' ').trim();}
    else if(parts.length===3){
      // 3カラムは曖昧: 中央が既知の種別かつ右にタイトルがある場合のみ date|種別|タイトル、そうでなければ date|タイトル|時間
      if(isType(parts[1])&&parts[2]!==''){date=parts[0];type=parts[1];title=parts[2];time='';}
      else{date=parts[0];type='';title=parts[1];time=parts[2];}
    }
    else if(parts.length===2){date=parts[0];type='';title=parts[1];time='';}
    else{rows.push({raw:s,err:true});return;}
    var nd=_normCalDate(date);
    if(!nd||!title){rows.push({raw:s,err:true});return;}
    type=(type||'').toLowerCase();
    if(!isType(type))type=detectCalType(title);
    rows.push({date:nd,type:type,title:title,time:time,err:false});
  });
  rows.forEach(function(r){
    if(r.err)return;
    r.dup=(D.cal||[]).some(function(e){return e.date===r.date&&(e.title||'').trim()===r.title;});
    r.include=!r.dup;
  });
  _calImport=rows;
  renderCalImportPreview();
}
function renderCalImportPreview(){
  var el=document.getElementById('cal-imp-preview');if(!el)return;
  var rows=_calImport||[];
  var errN=rows.filter(function(r){return r.err;}).length;
  var dupN=rows.filter(function(r){return!r.err&&r.dup;}).length;
  var newN=rows.filter(function(r){return!r.err&&!r.dup;}).length;
  var h='<div class="form-box" style="margin-top:14px"><div class="form-title">プレビュー（新規 '+newN+' ／ 既存重複 '+dupN+' ／ エラー '+errN+'）</div>';
  if(!rows.length){h+='<div class="no">解析できる行がありませんでした</div></div>';el.innerHTML=h;return;}
  h+='<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px">'+
    '<tr style="text-align:left;color:var(--text-secondary)"><th style="padding:4px">登録</th><th style="padding:4px">日付</th><th style="padding:4px">種別</th><th style="padding:4px">タイトル</th><th style="padding:4px">時間</th><th style="padding:4px">状態</th></tr>';
  rows.forEach(function(r,i){
    if(r.err){h+='<tr style="background:rgba(239,68,68,.12)"><td colspan="6" style="padding:5px;color:#B91C1C">⚠️ 解析エラー: '+escapeHtml(r.raw||'')+'</td></tr>';return;}
    var sel='<select class="ipt" style="padding:2px 4px;font-size:12px;width:auto" onchange="setCalImpType('+i+',this.value)">'+CAL_IMP_TYPES.map(function(o){return'<option value="'+o[0]+'"'+(r.type===o[0]?' selected':'')+'>'+o[1]+'</option>';}).join('')+'</select>';
    h+='<tr style="border-top:1px solid var(--border)'+(r.dup?';opacity:.45':'')+'">'+
      '<td style="padding:4px;text-align:center"><input type="checkbox" '+(r.include?'checked':'')+' onchange="toggleCalImpRow('+i+',this.checked)"></td>'+
      '<td style="padding:4px;white-space:nowrap">'+fmt(r.date)+'</td>'+
      '<td style="padding:4px">'+sel+'</td>'+
      '<td style="padding:4px">'+escapeHtml(r.title)+'</td>'+
      '<td style="padding:4px;white-space:nowrap">'+escapeHtml(r.time||'')+'</td>'+
      '<td style="padding:4px;white-space:nowrap">'+(r.dup?'<span style="color:var(--amber)">既存</span>':'<span style="color:var(--green)">新規</span>')+'</td></tr>';
  });
  h+='</table></div>';
  h+='<div style="font-size:11px;color:var(--text-secondary);margin-top:8px">チェックを外すと登録しません（私用の予定などを除外できます）。種別はその場で直せます。</div>';
  h+='<div style="display:flex;gap:8px;margin-top:14px"><button class="btn btn-p" style="flex:1" onclick="doCalImport()">✓ チェックした予定を登録</button></div></div>';
  el.innerHTML=h;
}
function setCalImpType(i,v){if(_calImport[i])_calImport[i].type=v;}
function toggleCalImpRow(i,c){if(_calImport[i])_calImport[i].include=c;}
function doCalImport(){
  var rows=(_calImport||[]).filter(function(r){return!r.err&&r.include;});
  if(!rows.length)return alert('登録する予定が選択されていません');
  var added=0,skipped=0,base=Date.now();
  svSafeUpdate('cal',function(latest){
    latest=latest||[];
    rows.forEach(function(r){
      var exists=latest.some(function(e){return e.date===r.date&&(e.title||'').trim()===r.title;});
      if(exists){skipped++;return;}
      latest.push({id:base+added*1000+Math.floor(Math.random()*1000),date:r.date,type:r.type,title:r.title,detail:r.time||''});
      added++;
    });
    return latest;
  },function(){
    alert('✓ '+added+'件を登録しました'+(skipped?'（重複 '+skipped+'件はスキップ）':''));
    popView();
    nav('calendar');
  });
}

// === MATCH MEMBER SELECTION ===
var matchSelTemp={};
function goSelectMatchMembers(evid,date){
  var eid=parseInt(evid)||evid;
  var existing=D.matchsel||[];
  matchSelTemp={};
  existing.forEach(function(pid){matchSelTemp[pid]=true;});
  var h='<div style="max-width:600px"><div style="font-size:13px;color:var(--text-secondary);margin-bottom:12px">試合当日にチェックが必要な選手を選択してください（'+fmt(date)+'）</div>';
  h+='<div style="margin-bottom:10px;display:flex;gap:8px"><button class="btn btn-sm" onclick="matchSelAll(true)">全員選択</button><button class="btn btn-sm" onclick="matchSelAll(false)">全員解除</button></div>';
  h+='<div style="max-height:500px;overflow-y:auto;border:1px solid var(--border-tertiary);border-radius:var(--radius)">';
  D.p.forEach(function(p){
    var chk=matchSelTemp[p.id]?true:false;
    h+='<div class="cb-row" id="ms-row-'+p.id+'" onclick="toggleMatchSel('+p.id+')" style="'+(chk?'background:var(--blue-bg)':'')+'">'+
    '<div class="cb-box'+(chk?' on':'')+'" id="ms-cb-'+p.id+'">'+(chk?'✓':'')+'</div>'+
    avH(p,28)+'<span style="font-weight:600;flex:1">'+escapeHtml(p.name)+'</span><span style="color:var(--text-secondary);font-size:11px">'+p.position+'/'+p.year+'年</span></div>';
  });
  h+='</div><div style="margin-top:10px;font-size:12px;color:var(--text-secondary)">選択中: <span id="ms-cnt" style="font-weight:600;color:var(--blue)">'+existing.length+'</span>名</div>';
  h+='<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px"><button class="btn" onclick="popView()">キャンセル</button><button class="btn btn-p" onclick="saveMatchSel()">保存</button></div></div>';
  pushView('試合日チェック対象選手（'+fmt(date)+'）',h);
}
function toggleMatchSel(pid){
  matchSelTemp[pid]=!matchSelTemp[pid];
  var cb=document.getElementById('ms-cb-'+pid),row=document.getElementById('ms-row-'+pid);
  if(matchSelTemp[pid]){cb.classList.add('on');cb.textContent='✓';row.style.background='var(--blue-bg)';}
  else{cb.classList.remove('on');cb.textContent='';row.style.background='';}
  var cnt=Object.values(matchSelTemp).filter(Boolean).length;
  document.getElementById('ms-cnt').textContent=cnt;
}
function matchSelAll(sel){
  D.p.forEach(function(p){
    matchSelTemp[p.id]=sel;
    var cb=document.getElementById('ms-cb-'+p.id),row=document.getElementById('ms-row-'+p.id);
    if(cb&&row){if(sel){cb.classList.add('on');cb.textContent='✓';row.style.background='var(--blue-bg)';}else{cb.classList.remove('on');cb.textContent='';row.style.background='';}}
  });
  document.getElementById('ms-cnt').textContent=sel?D.p.length:0;
}
function saveMatchSel(){
  var sel=Object.keys(matchSelTemp).filter(function(k){return matchSelTemp[k];}).map(function(k){return parseInt(k);});
  // 試合選出は「現在の選出を丸ごと置換」が意図的な仕様。トランザクション経路に統一。
  svSafeUpdate('matchsel',function(){return sel;},function(){alert('保存しました ✓');popView();});
}

// ===== BIG3・体重基準の設定画面（'std'編集。保存は svSafeUpdate で単一要素配列 [cfg] に置き換え） =====
V.standards=function(){
  var cfg=getStdCfg();
  var saved=!!(D.std&&D.std[0]);
  var POSF=[{k:'sq',label:'SQ倍率'},{k:'bp',label:'BP倍率'},{k:'dl',label:'DL倍率'},{k:'ffmiLo',label:'FFMI下限'},{k:'ffmiHi',label:'FFMI上限'},{k:'bfLo',label:'脂肪%下限'},{k:'bfHi',label:'脂肪%上限'}];
  var h='<div style="font-size:12px;color:var(--text-secondary);margin-bottom:12px;line-height:1.7">選手サイトの<b>BIG3ランク</b>（ブロンズ〜ダイヤ）と<b>推奨体重帯</b>の基準値です。保存するとチーム共通で全サイトに即反映されます。 '+
    (saved?'<span class="bd bd-b">カスタム設定を使用中</span>':'<span class="bd bd-a">未保存（コード内の初期値で動作中）</span>')+'</div>';
  // --- ポジション別テーブル ---
  h+='<div class="card" style="margin-bottom:12px"><div style="font-weight:700;margin-bottom:4px">ポジション別基準</div>'+
    '<div style="font-size:11px;color:var(--text-secondary);margin-bottom:10px">ゴールド基準1RM＝体重×倍率。推奨体重帯＝FFMI帯×身長²÷(1−体脂肪率)で算出。</div>'+
    '<div style="overflow-x:auto"><table style="border-collapse:collapse;min-width:660px">'+
    '<tr><th style="text-align:left;padding:4px 8px;font-size:11px">ポジ</th>'+POSF.map(function(f){return'<th style="padding:4px 4px;font-size:10px;color:var(--text-secondary);font-weight:600">'+f.label+'</th>';}).join('')+'</tr>'+
    POS.map(function(ps,pi){
      var row=cfg.pos[ps]||{};
      return'<tr><td style="padding:3px 8px;font-weight:700;font-size:12px;white-space:nowrap">'+ps+'</td>'+POSF.map(function(f){
        return'<td style="padding:3px 3px"><input class="ipt" style="width:66px;padding:6px 4px;text-align:center;font-size:13px" type="number" step="0.01" id="std-pos-'+pi+'-'+f.k+'" value="'+row[f.k]+'"></td>';
      }).join('')+'</tr>';
    }).join('')+'</table></div></div>';
  // --- ランク閾値 ---
  h+='<div class="card" style="margin-bottom:12px"><div style="font-weight:700;margin-bottom:4px">ランク閾値（×ゴールド基準）</div>'+
    '<div style="font-size:11px;color:var(--text-secondary);margin-bottom:10px">昇順で設定。例: ブロンズ0.70＝ゴールド基準の70%到達でブロンズ。</div>'+
    '<div style="display:flex;gap:10px;flex-wrap:wrap">'+cfg.ranks.map(function(r,i){
      return'<div style="text-align:center"><div style="font-size:11px;font-weight:700;color:'+r.color+';text-shadow:0 0 1px rgba(0,0,0,.15)">'+escapeHtml(r.label)+'</div><input class="ipt" style="width:72px;text-align:center" type="number" step="0.01" id="std-rank-'+i+'" value="'+r.pct+'"></div>';
    }).join('')+'</div></div>';
  // --- アロメトリック指数 ---
  h+='<div class="card" style="margin-bottom:12px"><div style="font-weight:700;margin-bottom:4px">アロメトリック補正指数 b（補正スコア＝1RM÷体重^b）</div>'+
    '<div style="font-size:11px;color:var(--text-secondary);margin-bottom:10px">体格差を除いた公平比較用。文献目安: SQ 0.33 / BP 0.45 / DL 0.33（暫定値）。</div>'+
    '<div style="display:flex;gap:10px">'+STD_LIFTS.map(function(l){
      return'<div style="text-align:center"><div style="font-size:11px;font-weight:700">'+l.short+'</div><input class="ipt" style="width:72px;text-align:center" type="number" step="0.01" id="std-allo-'+l.k+'" value="'+cfg.allo[l.k]+'"></div>';
    }).join('')+'</div></div>';
  // --- 処方箋 ---
  h+='<div class="card" style="margin-bottom:12px"><div style="font-weight:700;margin-bottom:4px">処方箋（弱点種目→推奨補助種目）</div>'+
    '<div style="font-size:11px;color:var(--text-secondary);margin-bottom:6px">弱点種目の選手のマイフィジカル詳細に表示。目安重量はメイン種目1RM×RPE表から自動計算。空欄の行は保存されません。</div>';
  STD_LIFTS.forEach(function(l){
    h+='<div style="font-weight:700;font-size:12px;margin:10px 0 6px">'+l.label+'が弱点のとき</div>';
    for(var ri=0;ri<3;ri++){
      var rx=(cfg.rx[l.k]||[])[ri]||{name:'',sets:3,reps:8,rir:2};
      h+='<div style="display:flex;gap:6px;align-items:center;margin-bottom:5px;flex-wrap:wrap">'+
        '<input class="ipt" style="flex:2;min-width:170px" id="std-rx-'+l.k+'-'+ri+'-name" value="'+escapeHtml(rx.name)+'" placeholder="種目名（空欄=行を削除）">'+
        '<input class="ipt" style="width:58px;text-align:center" type="number" id="std-rx-'+l.k+'-'+ri+'-sets" value="'+rx.sets+'">'+
        '<span style="font-size:11px;color:var(--text-secondary)">set×</span>'+
        '<input class="ipt" style="width:58px;text-align:center" type="number" id="std-rx-'+l.k+'-'+ri+'-reps" value="'+rx.reps+'">'+

        '<input class="ipt" style="width:58px;text-align:center" type="number" id="std-rx-'+l.k+'-'+ri+'-rir" value="'+rx.rir+'">'+
        '</div>';
    }
  });
  h+='</div>';
  h+='<div style="display:flex;gap:10px;margin-bottom:30px;flex-wrap:wrap">'+
    '<button class="btn btn-p" style="flex:1;min-width:220px" onclick="doSaveStd(this)">💾 保存（チーム共通で反映）</button>'+
    (saved?'<button class="btn btn-d" onclick="doResetStd(this)">初期値に戻す</button>':'')+
    '</div>';
  $m().innerHTML=h;
};
function doSaveStd(btn){
  var cur=getStdCfg();
  var cfg={pos:{},ranks:[],allo:{},rx:{}};
  var errs=[];
  function num(id,name,lo,hi){
    var v=parseFloat((document.getElementById(id)||{}).value);
    if(!(v>=lo&&v<=hi)){errs.push(name+'（'+lo+'〜'+hi+'）');return null;}
    return v;
  }
  POS.forEach(function(ps,pi){
    var row={};
    row.sq=num('std-pos-'+pi+'-sq',ps+' SQ倍率',0.5,3);
    row.bp=num('std-pos-'+pi+'-bp',ps+' BP倍率',0.5,3);
    row.dl=num('std-pos-'+pi+'-dl',ps+' DL倍率',0.5,3);
    row.ffmiLo=num('std-pos-'+pi+'-ffmiLo',ps+' FFMI下限',15,35);
    row.ffmiHi=num('std-pos-'+pi+'-ffmiHi',ps+' FFMI上限',15,35);
    row.bfLo=num('std-pos-'+pi+'-bfLo',ps+' 脂肪%下限',3,35);
    row.bfHi=num('std-pos-'+pi+'-bfHi',ps+' 脂肪%上限',3,35);
    if(row.ffmiLo!=null&&row.ffmiHi!=null&&row.ffmiLo>row.ffmiHi)errs.push(ps+' FFMIが下限>上限');
    if(row.bfLo!=null&&row.bfHi!=null&&row.bfLo>row.bfHi)errs.push(ps+' 脂肪%が下限>上限');
    cfg.pos[ps]=row;
  });
  cur.ranks.forEach(function(r,i){
    var v=num('std-rank-'+i,'ランク%（'+r.label+'）',0.3,2);
    cfg.ranks.push({k:r.k,label:r.label,pct:v!=null?v:r.pct,color:r.color});
  });
  for(var i=1;i<cfg.ranks.length;i++){if(cfg.ranks[i].pct<=cfg.ranks[i-1].pct){errs.push('ランク%は昇順にしてください（'+cfg.ranks[i-1].label+'＜'+cfg.ranks[i].label+'）');break;}}
  STD_LIFTS.forEach(function(l){
    cfg.allo[l.k]=num('std-allo-'+l.k,l.short+' 補正指数',0.1,1);
    var arr=[];
    for(var ri=0;ri<3;ri++){
      var nm=((document.getElementById('std-rx-'+l.k+'-'+ri+'-name')||{}).value||'').trim();
      if(!nm)continue;
      var st=num('std-rx-'+l.k+'-'+ri+'-sets',l.short+' 処方'+(ri+1)+' セット',1,10);
      var rp=num('std-rx-'+l.k+'-'+ri+'-reps',l.short+' 処方'+(ri+1)+' 回数',1,20);
      var rr=num('std-rx-'+l.k+'-'+ri+'-rir',l.short+' 処方'+(ri+1)+' RIR',0,5);
      arr.push({name:nm,sets:st,reps:rp,rir:rr});
    }
    cfg.rx[l.k]=arr;
  });
  if(errs.length)return alert('入力値を確認してください:\n・'+errs.slice(0,8).join('\n・')+(errs.length>8?'\n…他'+(errs.length-8)+'件':''));
  if(!confirm('基準値を保存しますか？\n選手・スタッフ・コーチの全サイトに即反映されます'))return;
  btn.disabled=true;var orig=btn.textContent;btn.textContent='保存中…';
  svSafeUpdate('std',function(){return [cfg];},function(){
    btn.disabled=false;btn.textContent=orig;
    alert('保存しました ✓');V.standards();
  },function(){
    btn.disabled=false;btn.textContent=orig;
    alert('保存できませんでした。電波状況を確認してもう一度お試しください。入力内容は残っています。');
  });
}
function doResetStd(btn){
  if(!confirm('カスタム基準を削除して初期値（コード内デフォルト）に戻しますか？'))return;
  btn.disabled=true;
  svSafeUpdate('std',function(){return [];},function(){btn.disabled=false;alert('初期値に戻しました');V.standards();},function(){btn.disabled=false;alert('通信エラーで戻せませんでした。もう一度お試しください。');});
}
