function saveTapeRec(recId){
  var pidEl=document.getElementById('tr-pid');
  var pid=pidEl&&pidEl.value?parseInt(pidEl.value):(recId?(D.taperec.find(function(x){return idEq(x.id,recId);})||{}).pid:null);
  if(!pid)return alert('選手を選択してください');
  var tapeTypes=Array.prototype.slice.call(document.querySelectorAll('.tr-tape:checked')).map(function(e){return e.value;});
  var g=function(id){var e=document.getElementById(id);return e?e.value:'';};
  var data={pid:pid,date:g('tr-date')||todayStr(),side:g('tr-side'),part:g('tr-part'),tapeTypes:tapeTypes,method:g('tr-method'),caution:g('tr-caution'),videoUrl:g('tr-video').trim(),author:g('tr-author'),inputAt:new Date().toISOString()};
  db.collection('appdata').doc('taperec').get().then(function(doc){
    var latest=[];if(doc.exists){try{var parsed=JSON.parse(doc.data().data);if(Array.isArray(parsed))latest=parsed;}catch(e){}}
    if(recId){var idx=latest.findIndex(function(x){return idEq(x.id,recId);});if(idx>=0){data.id=recId;latest[idx]=data;}else{data.id=recId;latest.push(data);}}
    else{data.id=Date.now()+'_'+Math.floor(Math.random()*1000);latest.push(data);}
    D.taperec=latest;
    return db.collection('appdata').doc('taperec').set({data:JSON.stringify(latest)});
  }).then(function(){alert('保存しました');popView();showPlayerTapeRecs(pid);}).catch(function(e){alert('保存に失敗しました');console.error(e);});
}
function delTapeRec(recId,pid){
  if(!confirm('このテーピング記録を削除しますか？'))return;
  db.collection('appdata').doc('taperec').get().then(function(doc){
    var latest=[];if(doc.exists){try{var parsed=JSON.parse(doc.data().data);if(Array.isArray(parsed))latest=parsed;}catch(e){}}
    latest=latest.filter(function(x){return!idEq(x.id,recId);});D.taperec=latest;
    return db.collection('appdata').doc('taperec').set({data:JSON.stringify(latest)});
  }).then(function(){popView();showPlayerTapeRecs(pid);}).catch(function(e){alert('削除に失敗しました');});
}

V.tape=function(){
  if(!D.tapeslot)D.tapeslot=[];
  if(!D.tape)D.tape=[];
  var slotMap={};
  D.tapeslot.forEach(function(s){if(!slotMap[s.date])slotMap[s.date]=[];slotMap[s.date].push(s);});
  var today=todayStr();
  var dates=Object.keys(slotMap).sort(function(a,b){return b.localeCompare(a);});
  var allStaffs=[...new Set((D.tapeslot||[]).map(function(s){return s.staff;}))].filter(Boolean).sort();
  var staffFilter=document.getElementById('tape-staff-filter')?document.getElementById('tape-staff-filter').value:'';
  var filterH='<div class="srch"><select class="ipt" style="width:auto" id="tape-staff-filter" onchange="V.tape()"><option value="">全担当者</option>'+allStaffs.map(function(s){return'<option'+(staffFilter===s?' selected':'')+'>'+s+'</option>';}).join('')+'</select></div>';
  var h='<button class="btn btn-p" style="margin-bottom:14px" onclick="showTapeRecList()">📋 テーピング記録（引き継ぎ）を見る</button>';
  h+=filterH;
  h+=dates.length?dates.map(function(date){
    var allDateSlots=slotMap[date];
    var slots=allDateSlots.filter(function(s){return!staffFilter||s.staff===staffFilter;}).sort(function(a,b){return a.startTime.localeCompare(b.startTime);});
    if(!slots.length)return'';
    var rsvs=D.tape.filter(function(t){return t.date===date;});
    var isPast=date<today;
    var typelabel=allDateSlots[0].type==='match'?'試合前':'練習前';
    var staffSummary={};
    allDateSlots.forEach(function(s){if(!staffSummary[s.staff])staffSummary[s.staff]=0;staffSummary[s.staff]++;});
    return'<div class="card" style="margin-bottom:10px;'+(isPast?'opacity:0.7':'')+'">'+
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">'+
    '<div>'+
    '<div style="font-weight:600;font-size:15px">'+fmt(date)+' <span class="bd bd-b">'+typelabel+'</span>'+(isPast?' <span style="font-size:11px;color:var(--text-secondary)">（過去）</span>':'')+'</div>'+
    '<div style="font-size:11px;color:var(--text-secondary);margin-top:2px">担当: '+Object.keys(staffSummary).map(function(s){return s+'('+staffSummary[s]+'枠)';}).join(' / ')+'</div>'+
    '<div style="font-size:12px;color:var(--text-secondary)">予約: '+rsvs.length+'件</div>'+
    '</div>'+
    '<div style="display:flex;gap:6px;flex-direction:column;align-items:flex-end">'+
    '<button class="btn btn-sm" onclick="goTapeDayDetail(\''+date+'\')">詳細・記録</button>'+
    (isPast?'':'<button class="btn btn-sm btn-d" onclick="delTapeDay(\''+date+'\')">削除</button>')+
    '</div></div>'+
    '<div style="display:flex;flex-wrap:wrap;gap:4px">'+
    slots.map(function(s){
      var booked=D.tape.filter(function(t){return t.slotId===s.id;}).length;
      var full=booked>=s.capacity;
      return'<div style="background:'+(full?'var(--red-bg)':'var(--green-bg)')+';padding:3px 8px;border-radius:99px;font-size:10px;font-weight:600;color:'+(full?'var(--red)':'var(--green)')+'">'+s.staff+' '+s.startTime+(full?' 満':'')+'</div>';
    }).join('')+
    '</div></div>';
  }).join(''):'<div class="no">テーピング枠がまだ設定されていません</div>';
  $m().innerHTML=h;
};

function goTapeDayDetail(date){
  if(!D.tape)D.tape=[];
  var allSlots=(D.tapeslot||[]).filter(function(s){return s.date===date;}).sort(function(a,b){return a.startTime.localeCompare(b.startTime)||a.staff.localeCompare(b.staff);});
  var reservations=D.tape.filter(function(t){return t.date===date;});
  var staffs=[...new Set(allSlots.map(function(s){return s.staff;}))];
  var h='<div style="font-size:17px;font-weight:600;margin-bottom:8px">📅 '+fmt(date)+' テーピング予約</div>';

  h+='<div class="grid g2" style="margin-bottom:12px"><div class="mc"><div class="v">'+allSlots.length+'</div><div class="l">総枠数</div></div><div class="mc"><div class="v" style="color:var(--blue)">'+totalRsv+'</div><div class="l">予約数</div></div></div>';
  staffs.forEach(function(staff){
    var sSlots=allSlots.filter(function(s){return s.staff===staff;});

      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">'+
      '<span style="font-weight:600">⏱ '+s.startTime+' 〜 '+s.endTime+'</span>'+

          '<textarea id="tn-'+rsv.id+'" class="ipt" style="font-size:12px;min-height:60px" placeholder="巻いた方法・注意事項など...">'+(rsv.tapeNote||'')+'</textarea>'+
          '<button class="btn btn-sm btn-s" style="margin-top:6px" onclick="saveTapeNote('+rsv.id+',\''+date+'\')">記録を保存</button>'+
          '</div>';
        });
      } else {
        h+='<div style="font-size:12px;color:var(--text-tertiary);padding:4px 0">予約なし</div>';
      }
      h+='</div>';
    });
  });
  pushView(fmt(date)+' テーピング詳細',h);
}

function saveTapeNote(rid,date){
  if(!D.tape)D.tape=[];
  var rsv=D.tape.find(function(x){return x.id===rid;});if(!rsv)return;
  var el=document.getElementById('tn-'+rid);if(!el)return;
  rsv.tapeNote=el.value;sv('tape');

}

function delTapeDay(date){
  if(!confirm(fmt(date)+'のテーピング枠を全て削除しますか？\n既存の予約も削除されます。'))return;
  D.tapeslot=(D.tapeslot||[]).filter(function(s){return s.date!==date;});

  sv('tapeslot');sv('tape');
  V.tape();
}

V.msess=function(){
  if(!D.msess)D.msess=[];
  var today=todayStr();
  var activeSess=D.msess.find(function(s){return s.startDate<=today&&s.endDate>=today;});
  var h='';
  if(activeSess){
    h+='<div class="alert-card alert-info" style="margin-bottom:1rem">📐 現在進行中の測定会: <b>'+activeSess.name+'</b> ('+fmt(activeSess.startDate)+'〜'+fmt(activeSess.endDate)+')</div>';
  }
  // 測定会一覧
  if(!D.msess.length){h+='<div class="no">測定会がまだありません</div>';$m().innerHTML=h;return;}
  var sorted=D.msess.slice().sort(function(a,b){return b.startDate.localeCompare(a.startDate);});
  h+=sorted.map(function(s){
    var isPast=s.endDate<today,isActive=s.startDate<=today&&s.endDate>=today,isFuture=s.startDate>today;
    var done=D.ph.filter(function(r){return idEq(r.msessId,s.id);}).map(function(r){return r.pid;});
    var unique=[...new Set(done)];
    var skipped=(D.phskip||[]).filter(function(sk){return idEq(sk.msessId,s.id);}).length;
    var missed=D.p.length-unique.length-skipped;
    return'<div class="card card-click" style="margin-bottom:8px" onclick="goMSessDetail(\''+s.id+'\')">'+
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">'+
    '<div style="font-weight:600;font-size:15px">'+s.name+(s.autoCreated?' <span class="bd" style="background:var(--blue-bg);color:var(--blue);font-size:9px">📅 カレンダー連動</span>':'')+'</div>'+
    '<span class="bd '+(isActive?'bd-b':isPast?'bd-g':'bd-a')+'">'+(isActive?'進行中':isPast?'完了':'予定')+'</span></div>'+
    '<div style="font-size:12px;color:var(--text-secondary);margin-bottom:6px">'+fmt(s.startDate)+' 〜 '+fmt(s.endDate)+'</div>'+
    '<div style="display:flex;gap:10px;font-size:12px">'+
    '<span style="color:var(--green)">入力済: '+unique.length+'名</span>'+
    '<span style="color:var(--amber)">測定なし: '+skipped+'名</span>'+
    '<span style="color:var(--red)">未入力: '+Math.max(0,missed)+'名</span>'+
    '</div></div>';
  }).join('');
  $m().innerHTML=h;
};

function doAddMSess(){
  var name=document.getElementById('ms-name').value.trim();
  var start=document.getElementById('ms-start').value;
  var end=document.getElementById('ms-end').value;
  if(!name||!start||!end)return alert('名前・開始日・終了日を入力してください');
  if(start>end)return alert('終了日は開始日以降にしてください');
  if(!D.msess)D.msess=[];
  var newId='ms_'+Date.now();
  D.msess.push({id:newId,name:name,startDate:start,endDate:end,note:document.getElementById('ms-note').value,createdAt:todayStr()});
  sv('msess');
  alert('測定会を作成しました ✓');
  popView();
}

function goMSessDetail(sessId){
  var s=(D.msess||[]).find(function(x){return idEq(x.id,sessId);});if(!s)return;
  var today=todayStr();
  var recs=D.ph.filter(function(r){return idEq(r.msessId,sessId);});
  var skipped=(D.phskip||[]).filter(function(sk){
    return idEq(sk.msessId,sessId)||(sk.msessId===null&&sk.date>=s.startDate&&sk.date<=s.endDate);
  });
  var donePids=[...new Set(recs.map(function(r){return r.pid;}))];
  var skippedPids=[...new Set(skipped.map(function(sk){return sk.pid;}))];
  var missedPids=D.p.filter(function(p){return!donePids.some(function(d){return idEq(d,p.id);})&&!skippedPids.some(function(sk){return idEq(sk,p.id);});}).map(function(p){return p.id;});

  var h='<div class="form-box"><div class="form-title">測定会情報</div>'+
  '<div style="font-size:16px;font-weight:600;margin-bottom:4px">'+s.name+'</div>'+
  '<div style="font-size:13px;color:var(--text-secondary)">'+fmt(s.startDate)+' 〜 '+fmt(s.endDate)+'</div>'+
  (s.note?'<div style="font-size:12px;margin-top:6px">'+s.note+'</div>':'')+
  '</div>';

  // 参加状況
  h+='<div class="grid g3" style="margin-bottom:1rem">'+
  '<div class="mc"><div class="v" style="color:var(--green)">'+donePids.length+'</div><div class="l">入力済み</div></div>'+
  '<div class="mc"><div class="v" style="color:var(--amber)">'+skippedPids.length+'</div><div class="l">測定なし</div></div>'+
  '<div class="mc"><div class="v" style="color:var(--red)">'+missedPids.length+'</div><div class="l">未入力</div></div>'+
  '</div>';

  // 未入力の選手に記録追加ボタン
  if(missedPids.length){
    h+='<div class="form-box"><div class="form-title" style="color:var(--red)">未入力の選手</div>'+
    missedPids.map(function(pid){
      var p=D.p.find(function(x){return x.id===pid;});if(!p)return'';
      return'<div class="log-row">'+avH(p,24)+'<span style="font-weight:600;flex:1">'+p.name+'</span>'+
      '<button class="btn btn-sm btn-p" onclick="goAddPhysForSess('+pid+',\''+sessId+'\')">記録入力</button>'+
      '<button class="btn btn-sm" onclick="markSkipForSess('+pid+',\''+sessId+'\')">測定なし</button>'+
      '</div>';
    }).join('')+'</div>';
  }
  // 測定なし一覧
  if(skippedPids.length){
    h+='<div class="form-box"><div class="form-title" style="color:var(--amber)">測定なし</div>'+
    skipped.map(function(sk){
      var p=D.p.find(function(x){return idEq(x.id,sk.pid);});if(!p)return'';
      return'<div class="log-row">'+avH(p,24)+'<span style="font-weight:600;flex:1">'+p.name+'</span>'+
      '<span style="font-size:11px;color:var(--text-secondary)">'+(sk.reason||'理由なし')+'</span></div>';
    }).join('')+'</div>';
  }
  // 入力済み一覧（測定値も表示）
  if(donePids.length){
    var isBronco=s.fromCalType==='bronco_measure';
    h+='<div class="form-box"><div class="form-title" style="color:var(--green)">入力済み（'+donePids.length+'名）</div>'+
    '<div style="overflow-x:auto"><table class="rank-tbl"><thead><tr><th>選手</th><th style="text-align:center">SQ</th><th style="text-align:center">BP</th><th style="text-align:center">DL</th><th style="text-align:center">BIG3</th><th style="text-align:center">ブロンコ</th><th style="text-align:right">入力</th></tr></thead><tbody>'+
    donePids.map(function(pid){
      var p=D.p.find(function(x){return idEq(x.id,pid);});if(!p)return'';
      var r=recs.filter(function(x){return idEq(x.pid,pid);}).sort(function(a,b){return (b.inputAt||b.date||'').localeCompare(a.inputAt||a.date||'');})[0];
      if(!r)return'';
      return'<tr style="cursor:pointer" onclick="goPlayerDetail('+pid+')"><td><div style="display:flex;align-items:center;gap:7px">'+avH(p,22)+'<span style="font-weight:600">'+p.name+'</span></div></td>'+
      '<td style="text-align:center">'+(r.squat||'-')+'</td>'+
      '<td style="text-align:center">'+(r.bench||'-')+'</td>'+
      '<td style="text-align:center">'+(r.deadlift||'-')+'</td>'+
      '<td style="text-align:center;font-weight:600;color:var(--blue)">'+(big3(r)||'-')+'</td>'+
      '<td style="text-align:center;font-weight:600;'+(r.bronco?'color:var(--green)':'')+'">'+(r.bronco?broncoFmt(r.bronco):'-')+'</td>'+
      '<td style="text-align:right;font-size:10px;color:var(--text-secondary)">'+(r.inputAt?fmtDateTime(r.inputAt):fmt(r.date))+'</td>'+
      '</tr>';
    }).join('')+'</tbody></table></div></div>';
  }

  h+='<div style="display:flex;gap:8px;margin-top:8px">'+
  '<button class="btn btn-d" onclick="delMSess(\''+sessId+'\')">削除</button></div>';
  pushView(s.name,h);
}

function doAddPhysForSess(pid,sessId){
  var sq=parseFloat(document.getElementById('spa-sq').value)||null;
  var bp=parseFloat(document.getElementById('spa-bp').value)||null;
  var dl=parseFloat(document.getElementById('spa-dl').value)||null;
  var cn=parseFloat(document.getElementById('spa-cn').value)||null;
  var cl=parseFloat(document.getElementById('spa-cl').value)||null;
  var br=broncoFromInputs('spa-br-m','spa-br-s');
  if(!sq&&!bp&&!dl&&!cn&&!cl&&!br)return alert('少なくとも1つ入力してください');
  var sessRec={id:Date.now(),pid:pid,date:document.getElementById('spa-date').value,squat:sq,bench:bp,deadlift:dl,chinning:cn,clean:cl,bronco:br,msessId:sessId,inputAt:new Date().toISOString()};
  db.collection('appdata').doc('ph').get().then(function(doc){var latest=[];if(doc.exists){try{var parsed=JSON.parse(doc.data().data);if(Array.isArray(parsed))latest=parsed;}catch(e){}}latest.push(sessRec);D.ph=latest;return db.collection('appdata').doc('ph').set({data:JSON.stringify(latest)});}).then(function(){alert('記録しました ✓');popView();V.msess();}).catch(function(e){alert('保存に失敗しました');console.error(e);});
}

function markSkipForSess(pid,sessId){
  var reason=prompt('測定なしの理由を入力してください：','');
  if(reason===null)return;
  if(!D.phskip)D.phskip=[];
  D.phskip.push({pid:pid,date:todayStr(),msessId:sessId,reason:reason,by:'staff'});
  sv('phskip');
  goMSessDetail(sessId);
}

function delMSess(sessId){
  if(!confirm('この測定会を削除しますか？\n（記録データは削除されません）'))return;
  D.msess=(D.msess||[]).filter(function(x){return!idEq(x.id,sessId);});
  sv('msess');
  popView();
}

// 現在の測定会を取得するユーティリティ
function getCurrentMSess(){
  var today=todayStr();
  return(D.msess||[]).find(function(s){return s.startDate<=today&&s.endDate>=today;})||null;

V.rtest=function(){
  if(!D.rtest_tpl)D.rtest_tpl=[];
  if(!D.rtest)D.rtest=[];
  if(!D.msess)D.msess=[];
  var activeInj=D.i.filter(function(x){return!x.resolved;});
  var tabs='<div class="tabs"><div class="tab ac" id="rt-tab0" onclick="rtTab(0)">選手の復帰テスト</div><div class="tab" id="rt-tab1" onclick="rtTab(1)">テンプレ一覧</div></div>';
  // 選手一覧タブ
  var playerH=activeInj.length?activeInj.map(function(inj){
    var p=D.p.find(function(x){return x.id===inj.pid;});if(!p)return'';
    var tpl=(D.rtest_tpl||[]).find(function(t){return t.id===inj.rtestTplId;});
    var results=(D.rtest||[]).filter(function(r){return r.injId===inj.id;}).sort(function(a,b){return b.date.localeCompare(a.date);});
    var lastResult=results[0]||null;
    var approved=inj.rtestApproved||false;
    // ブロンコ目標タイム
    var broncoTarget=inj.broncoTarget||null;
    var status=approved?'承認済み':lastResult?(lastResult.physPassed&&lastResult.fitPassed?'クリア待ち承認':'テスト中'):'未実施';
    var statusColor=approved?'var(--green)':lastResult&&lastResult.physPassed&&lastResult.fitPassed?'var(--blue)':'var(--amber)';
    return'<div class="card card-click" style="margin-bottom:8px" onclick="goRTestDetail('+inj.id+')">'+
    '<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">'+avH(p,30)+
    '<div style="flex:1"><div style="font-weight:600">'+p.name+'</div>'+
    '<div style="font-size:12px;color:var(--text-secondary)">'+(inj.side||'')+inj.part+' '+inj.type+'</div></div>'+
    '<span style="font-size:12px;font-weight:600;color:'+statusColor+'">'+status+'</span></div>'+
    '<div style="font-size:12px;display:flex;gap:10px;flex-wrap:wrap">'+
    (tpl?'<span>テンプレ: '+tpl.name+'</span>':'')+
    (broncoTarget?'<span style="color:var(--blue)">ブロンコ目標: '+broncoFmt(broncoTarget)+'</span>':'')+
    (lastResult?'<span style="color:var(--text-secondary)">最終: '+fmt(lastResult.date)+'</span>':'')+
    '</div></div>';
  }).join(''):'<div class="no">怪我人はいません</div>';

  // テンプレ一覧タブ
  var tplH=(D.rtest_tpl||[]).length?(D.rtest_tpl||[]).map(function(t){
    var physCount=(t.physTests||[]).length;
    return'<div class="card card-click" style="margin-bottom:8px" onclick="goRTestTplDetail('+t.id+')">'+
    '<div style="font-weight:600">'+t.name+'</div>'+
    '<div style="font-size:12px;color:var(--text-secondary);margin-top:2px">患部テスト: '+physCount+'種目'+(t.createdBy?' / 作成: '+t.createdBy:'')+'</div></div>';
  }).join(''):'<div class="no">テンプレがありません</div>';

  $m().innerHTML=tabs+
  '<div class="tc ac" id="rt0">'+playerH+'</div>'+
  '<div class="tc" id="rt1">'+tplH+'</div>';
};

function rtTab(i){
  document.querySelectorAll('#main-ct .tab').forEach(function(t,j){t.classList.toggle('ac',j===i);});
  document.querySelectorAll('#main-ct .tc').forEach(function(t,j){t.classList.toggle('ac',j===i);});
}

function addRTestPhysItem(){
  if(!window._rtPhysCount)window._rtPhysCount=0;
  window._rtPhysCount++;
  var ci=window._rtPhysCount;
  var wrap=document.getElementById('rtt-phys-wrap');if(!wrap)return;
  var div=document.createElement('div');
  div.id='rtp-'+ci;
  div.style.cssText='padding:10px;background:var(--bg-primary);border:1px solid var(--border-tertiary);border-radius:var(--radius);margin-bottom:8px';
  div.innerHTML='<div style="display:flex;justify-content:space-between;margin-bottom:8px">'+
  '<span style="font-weight:600;font-size:13px">患部テスト '+ci+'</span>'+
  '<button class="btn btn-sm btn-d" onclick="document.getElementById(\'rtp-'+ci+'\').remove()">削除</button></div>'+
  '<div class="fl" style="margin-bottom:8px"><label>テスト名</label><input class="ipt" id="rtp-name-'+ci+'" placeholder="例: ホップテスト・片足スクワット"></div>'+
  '<div class="fl" style="margin-bottom:8px"><label>種類</label>'+
  '<select class="ipt" id="rtp-type-'+ci+'" onchange="toggleRTestType('+ci+')">'+
  '<option value="sidediff">左右差（数値比較・85%基準）</option>'+

  '</select></div>'+
  '<div id="rtp-detail-'+ci+'"><div class="fl"><label>単位（例: kg・回・cm）</label><input class="ipt" id="rtp-unit-'+ci+'" placeholder="kg"></div></div>';
  wrap.appendChild(div);
}

function toggleRTestType(ci){
  var type=document.getElementById('rtp-type-'+ci).value;
  var detail=document.getElementById('rtp-detail-'+ci);
  if(!detail)return;
  if(type==='sidediff'){
    detail.innerHTML='<div class="fl"><label>単位（例: kg・回・cm）</label><input class="ipt" id="rtp-unit-'+ci+'" placeholder="kg"></div>';
  } else {
    detail.innerHTML='<div class="fl"><label>判定基準（メモ）</label><input class="ipt" id="rtp-criteria-'+ci+'" placeholder="例: 正常な動作パターンで実施できること"></div>';
  }
}

function doAddRTestTpl(){
  var name=document.getElementById('rtt-name').value.trim();
  var creator=document.getElementById('rtt-creator').value.trim();
  if(!name)return alert('テンプレ名を入力してください');
  if(!D.rtest_tpl)D.rtest_tpl=[];
  var physTests=[];
  for(var ci=1;ci<=window._rtPhysCount;ci++){
    var el=document.getElementById('rtp-'+ci);if(!el)continue;
    var n=(document.getElementById('rtp-name-'+ci)||{}).value||'';
    var t=(document.getElementById('rtp-type-'+ci)||{}).value||'sidediff';
    if(!n)continue;
    var item={name:n,type:t};
    if(t==='sidediff')item.unit=(document.getElementById('rtp-unit-'+ci)||{}).value||'';
    else item.criteria=(document.getElementById('rtp-criteria-'+ci)||{}).value||'';
    physTests.push(item);
  }
  var newId=D.rtest_tpl.length?Math.max.apply(null,D.rtest_tpl.map(function(t){return t.id;}))+1:1;
  D.rtest_tpl.push({id:newId,name:name,createdBy:creator,createdAt:todayStr(),physTests:physTests});
  sv('rtest_tpl');
  alert('テンプレを作成しました ✓');
  popView();
}

  '</select></div>'+
  (tpl?'<div style="font-size:13px;color:var(--green)">✓ '+tpl.name+'</div>':'<div style="font-size:12px;color:var(--text-secondary)">テンプレ未設定</div>')+
  '</div>';

  // ブロンコ目標設定
  h+='<div class="form-box"><div class="form-title">ブロンコ目標タイム設定</div>'+
  (bestBronco?'<div style="font-size:12px;color:var(--text-secondary);margin-bottom:8px">直近ベスト: '+broncoFmt(bestBronco)+' / 自動計算 (+2%): '+broncoFmt(autoTarget)+'</div>':'')+
  '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">'+

  '<input class="ipt" type="number" id="bt-s" placeholder="秒" min="0" max="59" style="width:70px" value="'+(broncoTarget?Math.round(broncoTarget%60):0)+'">'+
  '<span style="font-weight:600">秒</span>'+
  '<button class="btn btn-sm btn-p" onclick="saveBroncoTarget('+injId+')">設定</button></div>'+
  (broncoTarget?'<div style="font-size:13px;font-weight:600;color:var(--blue)">現在の目標: '+broncoFmt(broncoTarget)+'</div>':'')+
  '</div>';

  // 承認ボタン
  if(lastResult&&lastResult.physPassed&&lastResult.fitPassed&&!inj.rtestApproved){
    h+='<div class="alert-card alert-info" style="margin-bottom:10px">✅ 全テストクリア！復帰承認できます</div>'+

  } else if(inj.rtestApproved){
    h+='<div class="alert-card alert-up" style="margin-bottom:10px">🎉 復帰承認済み！</div>';
  }

  // テスト結果履歴
  h+='<div style="font-size:14px;font-weight:600;margin-bottom:8px">テスト結果履歴</div>';
  h+=results.length?results.map(function(r){
    return'<div class="card" style="margin-bottom:6px;padding:.75rem">'+
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">'+
    '<span style="font-weight:600">'+fmt(r.date)+'</span>'+
    '<div style="display:flex;gap:4px">'+
    '<span class="bd '+(r.physPassed?'bd-g':'bd-r')+'">患部'+(r.physPassed?'✓':'✗')+'</span>'+
    '<span class="bd '+(r.fitPassed?'bd-g':'bd-r')+'">フィット'+(r.fitPassed?'✓':'✗')+'</span>'+
    '</div></div>'+
    (r.broncoTime?'<div style="font-size:12px;color:var(--text-secondary)">ブロンコ: '+broncoFmt(r.broncoTime)+(broncoTarget?'（目標: '+broncoFmt(broncoTarget)+'）':'')+'</div>':'')+
    (r.note?'<div style="font-size:12px;color:var(--text-secondary);margin-top:4px">'+r.note+'</div>':'')+
    '</div>';
  }).join(''):'<div class="no">テスト結果なし</div>';

  pushView(p.name+' の復帰テスト',h);
}

      '<div class="fl"><label>コメント</label><input class="ipt" id="srl-cmt-'+ei+'" placeholder="気づき・変更点など..."></div>'+
      '</div>';

    h+='<div class="fl" style="margin-bottom:14px"><label>全体コメント</label><textarea class="ipt" id="srl-comment" placeholder="今日全体の状況..."></textarea></div>';

  } else {

    '<button class="btn btn-p" style="width:100%" onclick="doSaveRehabLogStaff('+injId+',false,0)">リハビリ終了・保存</button>';

  h+='<div style="font-size:14px;font-weight:600;margin:14px 0 8px">記録履歴</div>';

    return'<div class="card" style="margin-bottom:6px;padding:.75rem">'+
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">'+
    '<span style="font-weight:600">'+fmt(l.date)+'</span>'+
    '<span style="font-size:11px;color:var(--text-secondary)">'+(l.implementer||l.by||'不明')+'</span>'+
    '<button class="btn btn-sm" onclick="goEditRehabLogStaff('+injId+','+li+')">編集</button>'+
    '<button class="btn btn-sm btn-d" style="margin-left:4px" onclick="delRehabLogStaff(\''+l.id+'\','+injId+')">削除</button></div>'+
    '<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px">'+
    (l.cats||[]).map(function(c){return'<span style="background:'+RCAT_BG[c]+';color:'+RCAT_COLOR[c]+';padding:2px 8px;border-radius:99px;font-size:10px;font-weight:600">'+c+'</span>';}).join('')+

function doSaveRehabLogStaff(injId,hasTpl,exCount){
  var date=document.getElementById('srl-date').value;
  var implementer=document.getElementById('srl-implementer').value.trim();
  if(!date)return alert('日付を入力してください');
  if(!implementer)return alert('実施者を入力してください');

  var exercises=[];
  var cats=[];

  if(hasTpl){
    for(var ei=0;ei<exCount;ei++){
      var chk=document.getElementById('srl-chk-'+ei);
      var done=chk&&chk.checked;
      var nameEl=document.getElementById('srl-ex-'+ei);
      var exName=nameEl?nameEl.querySelector('span[style*="font-weight:600"]').textContent:'';
      var sets=parseInt((document.getElementById('srl-sets-'+ei)||{}).value)||null;
      var reps=parseInt((document.getElementById('srl-reps-'+ei)||{}).value)||null;
      var cmt=(document.getElementById('srl-cmt-'+ei)||{}).value||'';
      // カテゴリを取得（badge spanから）
      var catEl=nameEl?nameEl.querySelector('span[style*="border-radius:99px"]'):null;
      var cat=catEl?catEl.textContent:'';
      if(done&&cat&&cats.indexOf(cat)<0)cats.push(cat);
      exercises.push({name:exName,cat:cat,sets:sets,reps:reps,comment:cmt,done:done});
    }
  } else {
    // カスタム種目を収集
    document.querySelectorAll('[id^="cri-"]').forEach(function(el){
      var ci=el.id.replace('cri-','');
      if(isNaN(parseInt(ci)))return;
      var cat=(document.getElementById('cri-cat-'+ci)||{}).value||'';
      var name=(document.getElementById('cri-name-'+ci)||{}).value||'';
      var sets=parseInt((document.getElementById('cri-sets-'+ci)||{}).value)||null;
      var reps=parseInt((document.getElementById('cri-reps-'+ci)||{}).value)||null;
      var cmt=(document.getElementById('cri-cmt-'+ci)||{}).value||'';
      if(name){
        exercises.push({name:name,cat:cat,sets:sets,reps:reps,comment:cmt,done:true});
        if(cat&&cats.indexOf(cat)<0)cats.push(cat);
      }
    });
  }

  var comment=(document.getElementById('srl-comment')||{}).value||'';
  var logRec={id:Date.now(),injId:injId,date:date,implementer:implementer,by:implementer,cats:cats,exercises:exercises,comment:comment};

  // Firestoreから最新を取得してpush
  db.collection('appdata').doc('rlog').get().then(function(doc){
    var latest=[];
    if(doc.exists){try{var parsed=JSON.parse(doc.data().data);if(Array.isArray(parsed))latest=parsed;}catch(e){}}
    latest.push(logRec);D.rlog=latest;
    return db.collection('appdata').doc('rlog').set({data:JSON.stringify(latest)});
  }).then(function(){
    if(!hasTpl){
      // カスタムの場合：テンプレ化を提案
      if(exercises.length&&confirm('このメニューをテンプレとして保存しますか？')){
        goSaveAsTemplate(injId,exercises,cats);return;
      }
    }
    // 次回メニュー設定へ
    goSetNextMenu(injId);
  }).catch(function(e){alert('保存に失敗しました');console.error(e);});
}

function goSetNextMenu(injId){

  var cur=plan?plan.tomorrowCats||[]:[];
  var h='<div style="font-size:17px;font-weight:600;margin-bottom:14px">📅 '+p.name+' の次回メニュー設定</div>'+

  '<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px">'+

  window._nextMenuCats=cur.slice();
  window._nextMenuInjId=injId;

function advRehabStage(injId){
  var rh=(D.r||[]).find(function(x){return x.injId===injId;});if(!rh||rh.stage>=STG.length-1)return;
  rh.stage++;
  if(!rh.stageDates)rh.stageDates=[];
  rh.stageDates[rh.stage]=todayStr();
  if(rh.stage===STG.length-1){var inj=D.i.find(function(x){return x.id===injId;});if(inj)inj.resolved=true;sv('i');}
  sv('r');goRPlanDetail(injId);
}

function prevRehabStage(injId){
  var rh=(D.r||[]).find(function(x){return x.injId===injId;});if(!rh||rh.stage<=0)return;
  if(!confirm(STG[rh.stage]+'から'+STG[rh.stage-1]+'に戻しますか？'))return;
  rh.stage--;sv('r');goRPlanDetail(injId);
}


function toggleNextMenuCat(ci){

  el.style.borderColor=sel?RCAT_COLOR[cat]:'var(--border-secondary)';
  el.style.background=sel?RCAT_BG[cat]:'var(--bg-primary)';
  el.style.color=sel?RCAT_COLOR[cat]:'var(--text-primary)';
}

function saveNextMenu(injId){
  if(!D.rplan)D.rplan=[];

  sv('rplan');
  alert('保存しました ✓');

function goSaveAsTemplate(injId,exercises,cats){
  var inj=D.i.find(function(x){return x.id===injId;});if(!inj)return;
  var name=prompt('テンプレ名を入力してください：','');
  if(!name)return goSetNextMenu(injId);

function delRehabLogStaff(lid,injId){
  if(!confirm('このリハビリ記録を削除しますか？\n（削除すると元に戻せません）'))return;
  var id=parseInt(lid)||lid;
  db.collection('appdata').doc('rlog').get().then(function(doc){
    var latest=[];if(doc.exists){try{var parsed=JSON.parse(doc.data().data);if(Array.isArray(parsed))latest=parsed;}catch(e){}}
    var before=latest.length;
    latest=latest.filter(function(r){return r.id!==id&&String(r.id)!==String(lid);});
    if(latest.length===before){alert('記録が見つかりませんでした');return;}
    D.rlog=latest;
    return db.collection('appdata').doc('rlog').set({data:JSON.stringify(latest)});
  }).then(function(){alert('削除しました ✓');goRPlanDetail(injId);}).catch(function(e){alert('削除に失敗しました');console.error(e);});
}

function resetTrainerPIN(tid){
  var trainer=D.trainers.find(function(t){return t.id===tid;});if(!trainer)return;
  if(!confirm(trainer.name+'さんのPINをリセットしますか？\n（次回ログイン時に新しいPINを設定する必要があります）'))return;
  db.collection('appdata').doc('trainers').get().then(function(doc){
    var latest=[];if(doc.exists){try{var parsed=JSON.parse(doc.data().data);if(Array.isArray(parsed))latest=parsed;}catch(e){}}
    var idx=latest.findIndex(function(t){return idEq(t.id,tid);});
    if(idx>=0){delete latest[idx].pin;}
    D.trainers=latest;
    return db.collection('appdata').doc('trainers').set({data:JSON.stringify(latest)});
  }).then(function(){alert('PINをリセットしました ✓');V.trainer&&V.trainer();}).catch(function(e){alert('リセットに失敗しました');console.error(e);});
}

  '<div class="detail-row"><span class="detail-label">プレー続行</span><span class="detail-value">'+m.injContinued+'</span></div></div>':'')+
  (m.cramp?'<div class="form-box"><div class="form-title">足の攣り</div><div class="detail-row"><span class="detail-label">頻度</span><span class="detail-value">'+m.crampFreq+'</span></div></div>':'')+
  '</div>');
}
// === INJURY APPROVAL ===
function approveInjury(iid){
  var inj=D.i.find(function(x){return idEq(x.id,iid);});
  if(!inj)return;
  inj.approved=true;
  inj.approvedAt=new Date().toISOString();
  inj.notifyPlayer=true; // 選手側で未読通知扱い
  sv('i');
  V.dash();
}
function rejectInjury(iid){
  if(!confirm('この怪我報告を却下（非表示に）しますか？\n選手にも却下通知が届きます'))return;
  var inj=D.i.find(function(x){return idEq(x.id,iid);});
  if(!inj)return;
  var reason=prompt('却下理由（任意・選手に表示されます）','');
  inj.approved=false;
  inj.rejectedAt=new Date().toISOString();
  inj.rejectReason=reason||'';
  inj.notifyPlayer=true;
  inj.resolved=true;
  sv('i');
  V.dash();
}

// === CALENDAR FUNCTIONS ===
function escAnn(s){return (s||'').replace(/'/g,'\\\'').replace(/\n/g,' ');}
function getThisWeekEvents(){
  var now=new Date();
  var mon=new Date(now);mon.setDate(now.getDate()-now.getDay()+1);
  var sun=new Date(mon);sun.setDate(mon.getDate()+6);
  var monS=toDateStr(mon),sunS=toDateStr(sun);
  return D.cal.filter(function(e){return e.date>=monS&&e.date<=sunS;}).sort(function(a,b){return a.date.localeCompare(b.date);});
}
function calNavMonth(dir,ym){
  var p=ym.split('-');var yr=parseInt(p[0]),mo=parseInt(p[1])-1+dir;
  if(mo<0){mo=11;yr--;}if(mo>11){mo=0;yr++;}
  var nym=yr+'-'+String(mo+1).padStart(2,'0');
  document.getElementById('cal-ym').value=nym;
  V.calendar();
}
function calDayClick(date){
  // Show events for that day and option to add
  var dayEvts=D.cal.filter(function(e){return e.date===date;});
  var h='<div style="font-size:17px;font-weight:600;margin-bottom:12px">📅 '+fmt(date)+'</div>';
  if(dayEvts.length){
    h+='<div class="form-box"><div class="form-title">この日のイベント</div>';
    dayEvts.forEach(function(e){
      var typelabel=e.type==='match'?'試合':e.type==='practice'?'練習':e.type==='off'?'オフ':e.type==='phys_measure'?'フィジカル測定':e.type==='bronco_measure'?'ブロンコ測定':'その他';
      h+='<div class="log-row"><span style="font-weight:600;flex:1">'+e.title+'</span><span class="bd bd-p">'+typelabel+'</span>'+(e.type==='match'?'<button class="btn btn-sm" onclick="goSelectMatchMembers(\''+e.id+'\',\''+e.date+'\')">出場選手</button>':'')+'<button class="btn btn-sm btn-d" onclick="delCalEvent(\''+e.id+'\');popView()">削除</button></div>';
      if(e.detail)h+='<div style="font-size:12px;color:var(--text-secondary);padding:4px 0">'+e.detail+'</div>';
    });
    h+='</div>';
  }
  h+='<div class="form-box"><div class="form-title">イベントを追加</div>'+calEventFormHTML(date)+'<button class="btn btn-p" onclick="doAddCalEventForDate(\''+date+'\')">追加する</button></div>';
  pushView(fmt(date)+' のイベント',h);
}
function calEventFormHTML(defaultDate){
  return '<div class="grid g2" style="gap:10px;margin-bottom:10px">'+
  '<div class="fl"><label>種別</label><select class="ipt" id="cef-type"><option value="match">試合</option><option value="practice">練習</option><option value="off">オフ</option><option value="phys_measure">フィジカル測定</option><option value="bronco_measure">ブロンコ測定</option><option value="other">その他</option></select></div>'+
  '<div class="fl"><label>タイトル</label><input class="ipt" id="cef-title" placeholder="例: vs ○○大学"></div>'+
  '</div><div class="fl" style="margin-bottom:10px"><label>詳細（場所・時間等）</label><input class="ipt" id="cef-detail" placeholder="例: ホーム 14:00 KO"></div>';
}
function goAddCalEvent(){
  var td=todayStr();
  pushView('イベント追加','<div style="max-width:520px"><div class="form-box"><div class="form-title">カレンダーイベント</div>'+
  '<div class="fl" style="margin-bottom:10px"><label>日付</label><input class="ipt" type="date" id="cal-date" value="'+td+'"></div>'+
  calEventFormHTML(td)+
  '</div><div style="display:flex;gap:8px;justify-content:flex-end"><button class="btn" onclick="popView()">キャンセル</button><button class="btn btn-p" onclick="doAddCalEvent()">追加</button></div></div>');
}
function doAddCalEvent(){
  var date=document.getElementById('cal-date').value;
  var title=document.getElementById('cef-title').value.trim();
  if(!date||!title)return alert('日付とタイトルを入力してください');
  var evtType=document.getElementById('cef-type').value;
  D.cal.push({id:Date.now(),date:date,type:evtType,title:title,detail:document.getElementById('cef-detail').value});
  sv('cal');
  // 測定イベントなら測定会を自動作成
  autoCreateMSessFromCal(evtType,date,title);
  popView();
}
// カレンダーの測定イベントから測定会を自動作成（同日の測定会がなければ）
function autoCreateMSessFromCal(evtType,date,title){
  if(evtType!=='phys_measure'&&evtType!=='bronco_measure')return;
  if(!D.msess)D.msess=[];
  // 同日をカバーする測定会が既にあるか
  var exists=D.msess.some(function(s){return s.startDate<=date&&s.endDate>=date;});
  if(exists)return;
  var sessName=title||(evtType==='bronco_measure'?'ブロンコ測定':'フィジカル測定')+' '+fmt(date);
  var newSess={id:Date.now()+1,name:sessName,startDate:date,endDate:date,createdAt:new Date().toISOString(),autoCreated:true,fromCalType:evtType};
  // svSafe方式で保存
  db.collection('appdata').doc('msess').get().then(function(doc){
    var latest=[];if(doc.exists){try{var parsed=JSON.parse(doc.data().data);if(Array.isArray(parsed))latest=parsed;}catch(e){}}
    // 再度重複チェック（同時操作対策）
    if(latest.some(function(s){return s.startDate<=date&&s.endDate>=date;})){D.msess=latest;return;}
    latest.push(newSess);
    D.msess=latest;
    return db.collection('appdata').doc('msess').set({data:JSON.stringify(latest)});
  }).then(function(){
    alert('📐 測定会「'+sessName+'」を自動作成しました\n（期間中の選手のフィジカル入力は自動でこの測定会に紐づきます）');
  }).catch(function(e){console.error('測定会自動作成エラー:',e);});
}
function doAddCalEventForDate(date){
  var title=document.getElementById('cef-title').value.trim();
  if(!title)return alert('タイトルを入力してください');
  var evtType=document.getElementById('cef-type').value;
  D.cal.push({id:Date.now(),date:date,type:evtType,title:title,detail:document.getElementById('cef-detail').value});
  sv('cal');
  autoCreateMSessFromCal(evtType,date,title);
  popView();
}
function delCalEvent(evid){
  if(!confirm('このイベントを削除しますか？\n（削除すると元に戻せません）'))return;
  var eid=parseInt(evid)||evid;
  D.cal=D.cal.filter(function(e){return!idEq(e.id,eid)&&!idEq(e.id,evid);});
  sv('cal');
  V.calendar&&V.calendar();
}
function fillAnnounceFromEvent(date,title,detail){
  var el=document.getElementById('ann-text');
  if(!el)return;
  var line=fmt(date)+' '+title+(detail?' （'+detail+'）':'');
  el.value=(el.value?el.value+'\n':'')+line;
  el.focus();
}
function postAnnounceFromCalendar(){
  var evts=getThisWeekEvents();
  if(!evts.length)return alert('今週のカレンダーイベントがありません');
  var lines=evts.map(function(e){var typelabel=e.type==='match'?'【試合】':e.type==='practice'?'【練習】':e.type==='off'?'【オフ】':'';return fmt(e.date)+' '+typelabel+e.title+(e.detail?' '+e.detail:'');});
  var text='📅 今週の予定\n'+lines.join('\n');
  D.ann.push({id:Date.now(),date:todayStr(),text:text,targetPid:null});
  sv('ann');
  alert('投稿しました ✓');
  V.dash();
}

// === MATCH MEMBER SELECTION ===
var matchSelTemp={};
function goSelectMatchMembers(evid,date){
  var eid=parseInt(evid)||evid;
  var existing=D.matchsel||[];
  matchSelTemp={};
  existing.forEach(function(pid){matchSelTemp[pid]=true;});
  var h='<div style="max-width:600px"><div style="font-size:13px;color:var(--text-secondary);margin-bottom:12px">試合当日にチェックが必要な選手を選択してください（'+fmt(date)+'）</div>';
  h+='<div style="margin-bottom:10px;display:flex;gap:8px"><button class="btn btn-sm" onclick="matchSelAll(true)">全員選択</button><button class="btn btn-sm" onclick="matchSelAll(false)">全員解除</button></div>';
  h+='<div style="max-height:500px;overflow-y:auto;border:1px solid var(--border-tertiary);border-radius:var(--radius)">';
  D.p.forEach(function(p){
    var chk=matchSelTemp[p.id]?true:false;
    h+='<div class="cb-row" id="ms-row-'+p.id+'" onclick="toggleMatchSel('+p.id+')" style="'+(chk?'background:var(--blue-bg)':'')+'">'+
    '<div class="cb-box'+(chk?' on':'')+'" id="ms-cb-'+p.id+'">'+(chk?'✓':'')+'</div>'+
    avH(p,28)+'<span style="font-weight:600;flex:1">'+p.name+'</span><span style="color:var(--text-secondary);font-size:11px">'+p.position+'/'+p.year+'年</span></div>';
  });
  h+='</div><div style="margin-top:10px;font-size:12px;color:var(--text-secondary)">選択中: <span id="ms-cnt" style="font-weight:600;color:var(--blue)">'+existing.length+'</span>名</div>';
  h+='<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px"><button class="btn" onclick="popView()">キャンセル</button><button class="btn btn-p" onclick="saveMatchSel()">保存</button></div></div>';
  pushView('試合日チェック対象選手（'+fmt(date)+'）',h);
}
function toggleMatchSel(pid){
  matchSelTemp[pid]=!matchSelTemp[pid];
  var cb=document.getElementById('ms-cb-'+pid),row=document.getElementById('ms-row-'+pid);
  if(matchSelTemp[pid]){cb.classList.add('on');cb.textContent='✓';row.style.background='var(--blue-bg)';}
  else{cb.classList.remove('on');cb.textContent='';row.style.background='';}
  var cnt=Object.values(matchSelTemp).filter(Boolean).length;
  document.getElementById('ms-cnt').textContent=cnt;
}
function matchSelAll(sel){
  D.p.forEach(function(p){
    matchSelTemp[p.id]=sel;
    var cb=document.getElementById('ms-cb-'+p.id),row=document.getElementById('ms-row-'+p.id);
    if(cb&&row){if(sel){cb.classList.add('on');cb.textContent='✓';row.style.background='var(--blue-bg)';}else{cb.classList.remove('on');cb.textContent='';row.style.background='';}}
  });
  document.getElementById('ms-cnt').textContent=sel?D.p.length:0;
}
function saveMatchSel(){
  D.matchsel=Object.keys(matchSelTemp).filter(function(k){return matchSelTemp[k];}).map(function(k){return parseInt(k);});
  sv('matchsel');
  alert('保存しました ✓');
  popView();
}
