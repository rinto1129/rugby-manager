<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rugby Manager - 選手管理システム</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Overpass:ital,wght@0,700;0,800;0,900;1,800;1,900&family=Zen+Kaku+Gothic+New:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --maroon:#8d0000;--maroon-d:#4f0004;--maroon-vivid:#c1121f;
  --rose:#bd6d6d;--rose-l:#deb6b6;--pale:#f5e9e9;--ink:#2a0a0c;
  --gold:#C9A227;--gold-hot:#F2C43D;--gold-deep:#8F6F14;
  --silver:#8C97A6;--bronze:#A9713C;
  --pull:#C2410C;
  --navy:#2a0a0c;--navy-2:#3d0f11;--navy-3:#571416;--navy-hover:#4a1113;
  --accent:#8d0000;--accent-d:#6b0000;--accent-glow:rgba(141,0,0,.22);
  --blue:#1D4ED8;--blue-bg:#E8EEFC;--green:#046C48;--green-bg:#E3F5EE;--red:#B91C1C;--red-bg:#FCEBEB;--amber:#92400E;--amber-bg:#FBF0DD;--purple:#6D52D6;--purple-bg:#EEEAFB;
  --bg-primary:#fff;--bg-secondary:#F8F2F2;--bg-tertiary:#F1E7E7;--bg-app:#F7F4F3;
  --text-primary:#231416;--text-secondary:#6E5A5C;--text-tertiary:#8A7578;
  --border-secondary:rgba(60,10,12,.16);--border-tertiary:rgba(60,10,12,.08);
  --shadow-sm:0 1px 3px rgba(141,0,0,.06),0 1px 2px rgba(35,20,22,.05);--shadow-md:0 8px 24px rgba(141,0,0,.10);--shadow-lg:0 12px 32px rgba(141,0,0,.14);
  --font-sans:'Zen Kaku Gothic New',-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans JP',sans-serif;--font-num:'Overpass',var(--font-sans);
  --radius:12px;--radius-lg:16px}
body{font-family:var(--font-sans);background:var(--bg-app);color:var(--text-primary);line-height:1.5;-webkit-font-smoothing:antialiased}
.app{display:flex;height:100vh;height:100dvh}
.sb{width:236px;flex-shrink:0;background:linear-gradient(180deg,var(--navy-2) 0%,var(--navy) 100%);color:var(--pale);display:flex;flex-direction:column;overflow-y:auto;box-shadow:2px 0 16px rgba(42,10,12,.32);position:relative;z-index:6}
.sb-hd{padding:1.4rem 1.2rem;border-bottom:1px solid rgba(245,233,233,.10);background:rgba(245,233,233,.03)}.sb-hd h1{font-family:var(--font-num);font-style:italic;font-size:16px;font-weight:900;color:var(--pale);letter-spacing:.03em;display:flex;align-items:center;gap:9px}.sb-hd p{font-family:var(--font-num);font-style:italic;font-size:10px;color:var(--gold-hot);margin-top:5px;letter-spacing:.16em;font-weight:800;text-transform:uppercase}
.ni{position:relative;display:flex;align-items:center;gap:11px;padding:10px 1.2rem;cursor:pointer;font-size:13px;color:var(--rose-l);border-left:3px solid transparent;transition:all .15s;font-weight:500}
.ni-ic{width:20px;height:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:.75;transition:all .15s}
.ni-ic svg{width:19px;height:19px}
.ni-group{font-family:var(--font-num);font-style:italic;font-size:10px;font-weight:800;color:var(--rose-l);opacity:.62;letter-spacing:.14em;padding:16px 1.2rem 5px;text-transform:uppercase}
.ni:hover{background:var(--navy-hover);color:#fff}.ni:hover .ni-ic{opacity:1}
.ni.ac{background:linear-gradient(90deg,var(--navy-3),var(--navy-2));color:var(--pale);border-left-color:transparent;font-weight:600;box-shadow:inset 0 0 24px rgba(193,18,31,.14)}
.ni.ac::before{content:'';position:absolute;left:-3px;top:0;bottom:0;width:6px;background:linear-gradient(90deg,var(--maroon-vivid) 0,var(--maroon-vivid) 4px,var(--gold-hot) 4px,var(--gold-hot) 6px)}
.ni.ac .ni-ic{opacity:1;color:var(--gold-hot)}
.mn{flex:1;overflow:hidden;display:flex;flex-direction:column;background:var(--bg-app)}
.tb{background:var(--bg-primary);border-bottom:1px solid var(--border-tertiary);padding:14px 1.6rem;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow-sm);z-index:5}.tb h2{font-size:17px;font-weight:700;color:var(--text-primary)}
.ct{flex:1;overflow-y:auto;padding:1.6rem;background:var(--bg-app)}
.btn{padding:8px 16px;border-radius:var(--radius);border:1px solid var(--border-secondary);background:var(--bg-primary);font-size:13px;cursor:pointer;color:var(--text-primary);transition:all .12s;font-family:var(--font-sans);font-weight:500}.btn:hover{background:var(--bg-secondary);border-color:var(--text-tertiary)}
.btn-p{background:var(--accent);color:#fff;border-color:var(--accent)}.btn-p:hover{background:var(--accent-d);box-shadow:0 2px 8px var(--accent-glow)}
.btn-d{color:var(--red);border-color:var(--red)}.btn-d:hover{background:var(--red-bg)}
.btn-s{color:var(--green);border-color:var(--green)}.btn-s:hover{background:var(--green-bg)}
.btn-back{color:var(--text-secondary);border:none;padding:7px 10px;background:none;font-size:13px;cursor:pointer;font-family:var(--font-sans);font-weight:500}.btn-back:hover{color:var(--accent)}
.btn-sm{padding:4px 10px;font-size:11px;width:auto}
.ipt{padding:9px 12px;border:1.5px solid var(--border-secondary);border-radius:var(--radius);background:var(--bg-primary);font-size:13px;color:var(--text-primary);font-family:var(--font-sans);width:100%}
.ipt:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
select.ipt{appearance:auto}textarea.ipt{resize:vertical;min-height:80px}
.bd{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600}
.bd-g{background:var(--green-bg);color:var(--green)}.bd-r{background:var(--red-bg);color:var(--red)}.bd-a{background:var(--amber-bg);color:var(--amber)}.bd-b{background:var(--blue-bg);color:var(--blue)}.bd-p{background:var(--purple-bg);color:var(--purple)}
.grid{display:grid;gap:12px}.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr 1fr}.g4{grid-template-columns:repeat(auto-fill,minmax(155px,1fr))}
.card{background:var(--bg-primary);border:1px solid var(--border-tertiary);border-radius:var(--radius-lg);padding:1.25rem;box-shadow:var(--shadow-sm);transition:all .15s}.card:hover{border-color:var(--border-secondary);box-shadow:var(--shadow-md)}
.card-click{cursor:pointer}.card-click:hover{border-color:var(--blue)}
.mc{background:var(--bg-primary);border:1px solid var(--border-tertiary);border-radius:var(--radius);padding:.75rem;text-align:center;box-shadow:var(--shadow-sm)}.mc .v{font-size:24px;font-weight:600}.mc .l{font-size:10px;color:var(--text-secondary);margin-top:3px}
.stat-tile{background:var(--bg-primary);border:1px solid var(--border-tertiary);border-radius:var(--radius-lg);padding:1.1rem 1rem;box-shadow:var(--shadow-sm);cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.stat-tile:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);border-color:var(--accent)}
.stat-tile::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--accent);opacity:0;transition:opacity .15s}.stat-tile:hover::before{opacity:1}
.stat-v{font-size:30px;font-weight:800;line-height:1;letter-spacing:-.02em}
.stat-l{font-size:11px;color:var(--text-secondary);margin-top:7px;font-weight:500}
.chip-late{display:inline-block;padding:4px 11px;border-radius:99px;font-size:12px;font-weight:600;background:var(--amber-bg);color:var(--amber);border:1px solid transparent;transition:all .12s}.chip-late:hover{border-color:var(--amber)}
.player-hero{display:flex;align-items:center;gap:1.25rem;background:linear-gradient(135deg,var(--navy),var(--navy-2));border-radius:var(--radius-lg);padding:1.4rem 1.5rem;margin-bottom:1.25rem;color:#fff;box-shadow:var(--shadow-md);flex-wrap:wrap}
.player-hero-av .av{border:3px solid rgba(255,255,255,.2)}
.player-hero-main{flex:1;min-width:180px}
.player-hero-name{font-size:24px;font-weight:800;letter-spacing:-.01em}
.player-hero-meta{font-size:13px;color:#A9B8CE;margin-top:3px}
.status-pill{display:inline-block;padding:4px 12px;border-radius:99px;font-size:12px;font-weight:700;color:#fff}
.player-hero-stats{display:flex;gap:1.5rem}
.phs{text-align:center}.phs-v{font-size:22px;font-weight:800;line-height:1}.phs-l{font-size:10px;color:#A9B8CE;margin-top:5px}
@media(max-width:640px){.player-hero-stats{width:100%;justify-content:space-around;margin-top:10px;padding-top:14px;border-top:1px solid rgba(255,255,255,.12)}}
.chart-hero{background:linear-gradient(135deg,var(--navy),var(--navy-2));border-radius:var(--radius-lg);padding:1.25rem 1.4rem;margin-bottom:0;box-shadow:var(--shadow-md)}
.chart-tabs{display:flex;gap:4px;overflow-x:auto;background:var(--bg-primary);border-radius:var(--radius);padding:5px;margin:14px 0 16px;box-shadow:var(--shadow-sm);-webkit-overflow-scrolling:touch}
.chart-tab{flex-shrink:0;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;color:var(--text-secondary);cursor:pointer;white-space:nowrap;transition:all .15s}
.chart-tab:hover{background:var(--bg-secondary);color:var(--text-primary)}
.chart-tab.ac{background:var(--accent);color:#fff}
/* ===== タイムライン ===== */
.tl-wrap{position:relative;padding:8px 0 8px 0}
.tl-item{position:relative;padding:0 0 22px 38px}
.tl-item:last-child{padding-bottom:4px}
.tl-line{position:absolute;left:13px;top:22px;bottom:-4px;width:2px;background:linear-gradient(180deg,var(--tl-color,var(--accent)),rgba(255,255,255,.06))}
.tl-item:last-child .tl-line{display:none}
.tl-dot{position:absolute;left:5px;top:3px;width:18px;height:18px;border-radius:50%;background:var(--tl-color,var(--accent));box-shadow:0 0 0 4px var(--bg-app),0 0 12px var(--tl-glow,rgba(59,130,246,.6));display:flex;align-items:center;justify-content:center;z-index:2}
.tl-dot svg{width:10px;height:10px;fill:#fff}
.tl-card{background:linear-gradient(135deg,var(--bg-primary),var(--bg-secondary));border:1px solid var(--border-tertiary);border-left:3px solid var(--tl-color,var(--accent));border-radius:10px;padding:11px 14px;transition:all .2s;box-shadow:var(--shadow-sm)}
.tl-card:hover{transform:translateX(3px);box-shadow:0 4px 16px rgba(0,0,0,.25)}
.tl-date{font-size:11px;font-weight:700;color:var(--tl-color,var(--accent));letter-spacing:.03em;text-transform:uppercase;margin-bottom:3px}
.tl-title{font-size:14px;font-weight:700;color:var(--text-primary);margin-bottom:2px}
.tl-desc{font-size:12.5px;color:var(--text-secondary);line-height:1.5}
.tl-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;margin-left:6px;vertical-align:middle}
.tl-metric{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;background:var(--bg-tertiary);padding:2px 8px;border-radius:6px;margin:4px 4px 0 0}
/* ===== ランキング ===== */
.rk-podium{display:flex;align-items:flex-end;justify-content:center;gap:10px;margin-bottom:20px}
.rk-col{flex:1;text-align:center;min-width:0}
.rk-col.first{flex:1.15}
.rk-ava{border-radius:50%;margin:0 auto 6px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;background-size:cover;background-position:center}
.rk-name{font-size:13px;font-weight:700;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rk-sub{font-size:10px;color:var(--text-secondary);margin-bottom:6px}
.rk-stand{border-radius:10px 10px 0 0;padding:14px 6px 12px;display:flex;flex-direction:column;justify-content:flex-end;color:#fff}
.rk-rank-num{font-weight:800;line-height:1}
.rk-val{font-weight:800;color:#fff;margin-top:4px}
.rk-row{display:flex;align-items:center;gap:10px;background:var(--bg-secondary);border-radius:10px;padding:9px 12px;position:relative;overflow:hidden;cursor:pointer;transition:transform .15s}
.rk-row:hover{transform:translateX(3px)}
.rk-bar{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,rgba(141,0,0,.14),rgba(141,0,0,0));z-index:0;transform-origin:left}
.rk-lead-ava{position:relative;border-radius:50%}
.rk-lead-ava.has-photo::after{content:'';position:absolute;inset:2px;border-radius:50%;background:linear-gradient(135deg,rgba(141,0,0,.38),rgba(193,18,31,.12));mix-blend-mode:multiply;pointer-events:none}
.rk-row>*{z-index:1}
.rk-rownum{width:24px;font-weight:700;color:var(--text-secondary);font-size:14px;text-align:center}
.rk-rowava{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;background-size:cover;background-position:center}
.soap-line{display:flex;gap:8px;align-items:flex-start;margin-bottom:6px;font-size:13px;line-height:1.5}
.soap-tag{flex-shrink:0;width:22px;height:22px;border-radius:6px;color:#fff;font-weight:800;font-size:12px;display:inline-flex;align-items:center;justify-content:center}
.fl{display:flex;flex-direction:column;gap:5px}.fl label{font-size:12px;color:var(--text-secondary);font-weight:600}
.form-box{background:var(--bg-secondary);border:1px solid var(--border-tertiary);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1.25rem}
.form-title{font-size:12px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.04em;margin-bottom:14px}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border-tertiary);margin-bottom:1.25rem}
.tab{padding:10px 16px;font-size:13px;cursor:pointer;color:var(--text-secondary);border-bottom:2.5px solid transparent;margin-bottom:-1px;font-weight:500}.tab.ac{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}
.tc{display:none}.tc.ac{display:block}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0;overflow:hidden;background-size:cover;background-position:center}
.pcard{cursor:pointer;text-align:center;transition:all .18s}.pcard:hover{transform:translateY(-3px);border-color:var(--blue);box-shadow:var(--shadow-md)}
.no{text-align:center;padding:2rem;color:var(--text-secondary);font-size:13px}
.stage-line{display:flex;align-items:flex-start;gap:0;margin:1rem 0;overflow-x:auto;padding-bottom:6px}
.stage-item{display:flex;flex-direction:column;align-items:center;min-width:72px;flex:1;position:relative}
.stage-dot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;z-index:2;border:2.5px solid var(--border-tertiary);background:var(--bg-primary);color:var(--text-secondary)}
.stage-dot.done{background:var(--green);border-color:var(--green);color:#fff}.stage-dot.cur{background:var(--blue);border-color:var(--blue);color:#fff}
.stage-label{font-size:9px;color:var(--text-secondary);margin-top:4px;text-align:center;line-height:1.3}
.stage-est{font-size:8px;color:var(--text-tertiary);margin-top:1px}.stage-date{font-size:8px;color:var(--green);margin-top:1px;font-weight:600}
.stage-conn{position:absolute;top:15px;left:50%;width:100%;height:2.5px;background:var(--border-tertiary);z-index:1}.stage-conn.done{background:var(--green)}
.alert-card{padding:.65rem .85rem;border-radius:var(--radius);margin-bottom:6px;font-size:12px;display:flex;align-items:center;gap:8px;font-weight:500}
.alert-up{background:var(--green-bg);color:var(--green);border-left:3px solid var(--green)}
.alert-down{background:var(--red-bg);color:var(--red);border-left:3px solid var(--red)}
.alert-warn{background:var(--amber-bg);color:var(--amber);border-left:3px solid var(--amber)}
.alert-info{background:var(--blue-bg);color:var(--blue);border-left:3px solid var(--blue)}
.rank-tbl{width:100%;border-collapse:collapse;font-size:13px}
.rank-tbl th{text-align:left;padding:8px 10px;border-bottom:1.5px solid var(--border-secondary);color:var(--text-secondary);font-weight:600;font-size:11px}
.rank-tbl td{padding:8px 10px;border-bottom:0.5px solid var(--border-tertiary)}.rank-tbl tr:hover td{background:var(--bg-secondary)}
.chart-wrap{position:relative;height:230px;margin:1rem 0}
.photo-up{width:90px;height:90px;border-radius:50%;border:2.5px dashed var(--border-secondary);display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;background:var(--bg-secondary);background-size:cover;background-position:center;flex-shrink:0;font-size:11px;color:var(--text-secondary);text-align:center;line-height:1.4}.photo-up:hover{border-color:var(--blue)}
.log-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:0.5px solid var(--border-tertiary);font-size:12px}.log-row:last-child{border-bottom:none}
.pain-dot{display:inline-flex;width:24px;height:24px;border-radius:50%;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff;flex-shrink:0}
.srch{display:flex;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap}.srch .ipt{width:auto}
.att-bar{display:flex;align-items:center;gap:8px;font-size:12px;margin-bottom:5px}
.cb-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:1px solid var(--border-tertiary);cursor:pointer;transition:background .1s}.cb-row:hover{background:var(--bg-secondary)}.cb-row.checked{background:var(--red-bg)}
.cb-box{width:20px;height:20px;border:2px solid var(--border-secondary);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}.cb-box.on{background:var(--red);border-color:var(--red);color:#fff}
.reason-ipt{margin-top:4px;padding:5px 8px;border:1px solid var(--border-secondary);border-radius:6px;font-size:12px;width:100%;background:var(--bg-primary);color:var(--text-primary);font-family:var(--font-sans)}
.ftg-cell{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 6px;border-radius:var(--radius);min-width:50px;text-align:center}
.ftg-val{font-size:16px;font-weight:600;line-height:1}.ftg-lbl{font-size:9px;color:var(--text-secondary)}
.p-search-wrap{position:relative}.p-search-list{position:absolute;top:100%;left:0;right:0;background:var(--bg-primary);border:1.5px solid var(--border-secondary);border-top:none;border-radius:0 0 var(--radius) var(--radius);max-height:200px;overflow-y:auto;z-index:10;display:none}
.p-search-list.open{display:block}
.p-search-item{padding:8px 12px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:8px;border-bottom:0.5px solid var(--border-tertiary)}.p-search-item:hover{background:var(--bg-secondary)}
.detail-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:0.5px solid var(--border-tertiary);font-size:13px}.detail-row:last-child{border-bottom:none}
.detail-label{color:var(--text-secondary);font-weight:600;min-width:100px}.detail-value{color:var(--text-primary);text-align:right}
@media(max-width:768px){.sb{width:56px}.sb-hd{display:none}.ni{padding:12px 0;justify-content:center}.ni span:last-child{display:none}.ni-ic{opacity:.85}.ni-group{display:none}.g2,.g3{grid-template-columns:1fr}.g4{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}.ct{padding:1rem}}
/* ===== FUKUDAI RED 基礎ユーティリティ（player P1と同一規約） ===== */
.num{font-family:var(--font-num);font-weight:900;font-style:italic;letter-spacing:-.03em;line-height:.95;font-variant-numeric:tabular-nums}
.num .unit{font-size:.42em;font-style:normal;font-weight:700;letter-spacing:0}
.kicker{font-family:var(--font-num);font-style:italic;font-weight:800;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--maroon)}
.kicker--gold{color:var(--gold-hot)}
.ghost-num{position:absolute;pointer-events:none;user-select:none;-webkit-user-select:none;z-index:0;font:italic 900 120px/1 var(--font-num);color:transparent;-webkit-text-stroke:2px rgba(255,255,255,.16)}
.ghost-num--light{-webkit-text-stroke:2px rgba(141,0,0,.10)}
.ic{display:inline-block;vertical-align:-.14em;flex-shrink:0}
.flag{display:inline-block;transform:skewX(-12deg);font-family:var(--font-num);font-style:italic;font-weight:800;letter-spacing:.05em;padding:2px 8px;border-radius:3px;font-size:10px}
.flag-jp{transform:skewX(-8deg)}
:focus-visible{outline:2px solid var(--maroon);outline-offset:2px}
/* ローディング（クラスC=状態常駐）: 退場はopacity 300ms→transitionend後display:none（JS側）。揺れはreduce時停止 */
#loading-screen.done{opacity:0}
@media(prefers-reduced-motion:no-preference){.ld-ball{animation:ldswing 1.4s ease-in-out infinite}.ni.ac::before{animation:sbstripe .15s ease-out}}
@keyframes ldswing{0%,100%{transform:rotate(-12deg)}50%{transform:rotate(9deg) translateY(-5px)}}
@keyframes sbstripe{from{transform:scaleY(0)}to{transform:scaleY(1)}}
/* 折りたたみ（クラスB=毎回発火・220ms・中身にstaggerは付けない）。0fr/1frは機能状態なのでガード外、transitionのみガード内 */
.clp{display:grid;grid-template-rows:0fr}
.clp.open{grid-template-rows:1fr}
.clp>div{overflow:hidden;min-height:0}
.clp-hd{cursor:pointer;user-select:none;-webkit-user-select:none}
.clp-chev{display:inline-flex}
/* リングゲージ（クラスA=遷移演出・提出率タイル1枚のみ）: 最終値はインラインdashoffset、arm時だけ.ring-goでdraw */
@media(prefers-reduced-motion:no-preference){
  .clp{transition:grid-template-rows .22s ease}
  .clp-hd .clp-chev{transition:transform .22s ease}
  .ring-go{animation:ringdraw .9s ease-out}
}
.clp-hd.open .clp-chev{transform:rotate(180deg)}
@keyframes ringdraw{from{stroke-dashoffset:var(--ring-c)}}
/* お知らせ: 部室掲示板ノーティス様式（マスキングテープ::before+微回転。playerと同一） */
.notice-item{position:relative;background:#FFFDF6;border:1px solid var(--border-tertiary);border-radius:4px;padding:14px 14px 10px;margin:16px 4px 12px;box-shadow:0 2px 8px rgba(35,20,22,.07)}
.notice-item:nth-child(odd){transform:rotate(.45deg)}
.notice-item:nth-child(even){transform:rotate(-.45deg)}
.notice-item::before{content:'';position:absolute;top:-7px;left:50%;transform:translateX(-50%) rotate(-2.5deg);width:72px;height:15px;background:rgba(222,182,182,.55);box-shadow:0 1px 2px rgba(35,20,22,.06)}
/* トースト（クラスB=操作フィードバック・毎回発火。staffは右上） */
#toast-wrap{position:fixed;top:70px;right:20px;z-index:1200;pointer-events:none;display:flex;flex-direction:column;align-items:flex-end;gap:8px;max-width:min(420px,92vw)}
.toast{display:flex;align-items:center;gap:8px;background:var(--bg-primary);color:var(--text-primary);border:1px solid var(--border-tertiary);border-left:3px solid var(--maroon);border-radius:12px;padding:10px 16px;font-size:13px;font-weight:700;box-shadow:var(--shadow-md);opacity:0;transform:translateY(-10px);transition:opacity .24s ease-out,transform .24s cubic-bezier(.22,1,.36,1);max-width:100%}
.toast.show{opacity:1;transform:none}
.toast.hide{opacity:0;transform:translateY(-6px)}
/* Undoトースト用ボタン（#toast-wrapがpointer-events:noneのため、ボタン側でautoに戻さないと押せない） */
.toast-undo{pointer-events:auto;cursor:pointer;display:inline-flex;align-items:center;gap:4px;margin-left:8px;background:transparent;color:var(--maroon);border:1.5px solid var(--maroon);border-radius:8px;padding:4px 11px;font-size:12px;font-weight:800;font-family:inherit;white-space:nowrap;flex:none}
.toast-undo:active{opacity:.6}
/* reveal（クラスA=遷移演出）。「隠す側」宣言はreduced-motion:no-preference内のみ（reduce設定者の画面消失防止） */
@media(prefers-reduced-motion:no-preference){
  .rv-armed{opacity:0;transform:translateY(14px)}
  .rv-armed.in{opacity:1;transform:none;transition:opacity .5s cubic-bezier(.22,1,.36,1),transform .55s cubic-bezier(.22,1,.36,1)}
  .rv-armed.in .rk-bar{animation:barfill .7s cubic-bezier(.22,1,.36,1)}
}
@keyframes barfill{from{transform:scaleX(0)}to{transform:scaleX(1)}}
/* ===== GPS・スタッツ取込（Phase9）装飾モーション。リビール/カウントアップは既存.rv/data-cu基盤を再利用し、ここは装飾専用クラスのみ。「隠す/動かす」宣言はreduce時に無効化（画面消失防止） ===== */
.gx-wiz-steps{display:flex;align-items:center;gap:0;margin:2px 0 20px}
.gx-step{display:flex;align-items:center;gap:8px;flex:0 0 auto}
.gx-step-dot{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;font-family:var(--font-num);font-weight:800;font-size:14px;background:var(--bg-tertiary);color:var(--text-tertiary);border:2px solid var(--border-secondary)}
.gx-step.ac .gx-step-dot{background:linear-gradient(135deg,var(--maroon),var(--maroon-vivid));color:#fff;border-color:var(--maroon-vivid);box-shadow:0 0 0 4px var(--accent-glow)}
.gx-step.done .gx-step-dot{background:var(--green);color:#fff;border-color:var(--green)}
.gx-step-lbl{font-size:12px;font-weight:700;color:var(--text-secondary)}
.gx-step.ac .gx-step-lbl{color:var(--text-primary)}
.gx-step-bar{flex:1 1 auto;height:3px;min-width:20px;background:var(--border-secondary);border-radius:2px;position:relative;overflow:hidden}
.gx-step-bar>i{position:absolute;inset:0;transform-origin:left;transform:scaleX(0);background:linear-gradient(90deg,var(--maroon),var(--maroon-vivid))}
.gx-step-bar.fill>i{transform:scaleX(1)}
.gx-drop{border:2px dashed var(--border-secondary);border-radius:var(--radius-lg);padding:24px 18px;text-align:center;background:var(--bg-secondary);cursor:pointer}
.gx-drop.over{border-color:var(--maroon-vivid);background:var(--pale);box-shadow:0 0 0 4px var(--accent-glow)}
.gx-badge-ok{color:var(--green);font-weight:800}
.gx-badge-amb{color:var(--amber);font-weight:800}
.gx-badge-no{color:var(--red);font-weight:800}
.gx-save-ok{display:grid;place-items:center;padding:26px 10px;text-align:center}
.gx-save-ok svg{width:60px;height:60px}
.gx-check{stroke:var(--green);stroke-width:5;fill:none;stroke-linecap:round;stroke-linejoin:round}
@media(prefers-reduced-motion:no-preference){
  .gx-step-dot{transition:background .3s,color .3s,border-color .3s,box-shadow .3s}
  .gx-step-bar>i{transition:transform .5s cubic-bezier(.22,1,.36,1)}
  .gx-drop{transition:border-color .25s,background .25s,box-shadow .25s}
  .gx-shimmer{position:relative;overflow:hidden}
  .gx-shimmer::after{content:'';position:absolute;top:0;left:-60%;width:55%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.5),transparent);animation:gxshim 1.1s ease-out 1}
  @keyframes gxshim{from{left:-60%}to{left:130%}}

  @keyframes gxpop{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
  .gx-glow{animation:gxglow 1.8s ease-in-out infinite}

  .gx-check-draw{stroke-dasharray:80;stroke-dashoffset:80;animation:gxcheck .6s cubic-bezier(.65,0,.45,1) .1s forwards}
  @keyframes gxcheck{to{stroke-dashoffset:0}}

  @keyframes gxcardin{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
}

// Chart.js（FUKUDAI REDライト: 軸・凡例をmaroon系ミュートに。reduce設定はアニメ無効）

// ===== FUKUDAI RED 共通ユーティリティ（player P1と同一規約） =====
// スプライトアイコン（<body>直後のsymbolをid参照。function宣言=巻き上げ有効・ロード時呼び出し安全）
function ic(n,s,c){s=s||16;return'<svg class="ic" width="'+s+'" height="'+s+'" aria-hidden="true"'+(c?' style="color:'+c+'"':'')+'><use href="#'+n+'" xlink:href="#'+n+'"></use></svg>';}
// パステル系ランク色を白地で読める濃さに落とす（相対輝度0.5超だけ暗転。エンジンブロック外ヘルパー）
function darkenForLight(c){
  if(!/^#[0-9A-Fa-f]{6}$/.test(String(c||'')))return'var(--text-secondary)';
  var r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16);
  var lum=(0.2126*r+0.7152*g+0.0722*b)/255;
  if(lum<=0.5)return c;
  var f=0.5/lum;
  var h=function(v){v=Math.max(0,Math.min(255,Math.round(v)));var s2=v.toString(16);return s2.length<2?'0'+s2:s2;};
  return'#'+h(r*f)+h(g*f)+h(b*f);
}
// 試合出場ロールの英字小書きバッジ（player P8と同一。マップ外=出場なしは日本語のみ）
var ROLE_EN={'スタート':'STARTING XV','リザーブ':'FINISHER'};
function roleBadgeHtml(role){

  return'<span class="bd bd-p">'+escapeHtml(role||'')+(en?' <span style="font-family:var(--font-num);font-style:italic;font-weight:800;font-size:8px;letter-spacing:.06em">'+en+'</span>':'')+'</span>';
}
// 成功トースト（クラスB=毎回発火・2.2秒退場・右上）。失敗系alertは置換禁止（同期ブロッキング維持）
function toast(msg,actionLabel,actionFn){
  try{
    var w=document.getElementById('toast-wrap');
    if(!w){w=document.createElement('div');w.id='toast-wrap';document.body.appendChild(w);}
    var t=document.createElement('div');t.className='toast';
    t.innerHTML=ic('i-check-c',18,'var(--maroon)')+'<span>'+escapeHtml(msg)+'</span>';
    var hasAction=actionLabel&&typeof actionFn==='function';
    var hideTimer=null;
    function dismiss(){if(t.classList.contains('hide'))return;t.classList.add('hide');setTimeout(function(){if(t.parentNode)t.parentNode.removeChild(t);},350);}
    if(hasAction){
      var b=document.createElement('button');b.className='toast-undo';b.type='button';
      b.innerHTML=ic('i-undo',13,'var(--maroon)')+'<span>'+escapeHtml(actionLabel)+'</span>';
      var used=false;
      b.addEventListener('click',function(){if(used)return;used=true;if(hideTimer)clearTimeout(hideTimer);dismiss();try{actionFn();}catch(e){console.error(e);}});
      t.appendChild(b);
    }
    w.appendChild(t);
    requestAnimationFrame(function(){requestAnimationFrame(function(){t.classList.add('show');});});
    hideTimer=setTimeout(dismiss,hasAction?5200:2200);
  }catch(e){}
}
// ===== reveal（クラスA=遷移演出）。nav()経由のページ初回表示だけ発火 =====
// 規約: .rv-armedをrender文字列に直書き禁止。テンプレは素マーカー.rvのみ、armはObserverコールバック内でだけ行う。
var _navAnim=false;      // nav()で立てる→observerが消費（この順序は固定）
var _visitedTabs={};     // クラスAはセッション中1回だけ
var _lastRaw={};         // onSnapshot生JSON前回値
var _rvInsurance=null;
function _reduceMotion(){return typeof matchMedia==='function'&&matchMedia('(prefers-reduced-motion: reduce)').matches;}
function _rvForceIn(){
  var rem=document.querySelectorAll('.rv-armed:not(.in)');
  for(var i=0;i<rem.length;i++)rem[i].classList.add('in');
}
// count-up（クラスA=遷移演出・正の指標限定）: data-cu=生数値。初期HTMLは常に最終実値、arm時だけ0→値を上書き描画
function _cuRun(root){
  if(typeof requestAnimationFrame!=='function')return;
  var els=root.querySelectorAll('[data-cu]:not([data-cu-done])');
  for(var i=0;i<els.length;i++)(function(el){
    el.setAttribute('data-cu-done','1'); // 二重発火防止
    var raw=el.getAttribute('data-cu');
    var v=parseFloat(raw);
    if(!isFinite(v))return;
    var dec=(String(raw).split('.')[1]||'').length; // 小数記録(132.5kg等)は桁数を保って途中表示、最終フレームは生値そのもの
    var t0=null,dur=700;
    var step=function(ts){
      if(t0===null)t0=ts;
      var k=Math.min(1,(ts-t0)/dur);k=1-Math.pow(1-k,4);
      el.textContent=k>=1?String(raw):(dec?(v*k).toFixed(dec):String(Math.round(v*k)));
      if(k<1)requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  })(els[i]);
}
// リングゲージdraw（クラスA・提出率1枚のみ）: 最終dashoffsetはインライン値のまま、.ring-goでfromだけアニメ
function _ringRun(root){
  var els=root.querySelectorAll('[data-ring]:not(.ring-go)');
  for(var i=0;i<els.length;i++)els[i].classList.add('ring-go');
}
// Chartアニメ設定（S4）: reduce=無効 / V画面(vkey指定)=初回訪問700ms・再訪問/onSnapshot再描画は0 / ドリルダウン(vkey無し)=毎回400ms / stagger=棒のカスケード
// 注: options.animationを書くとグローバルdefaultsのreduce設定を上書きするため、ここで必ずreduce判定を通す
var _chartVisited={};
function _chAnim(vkey,stagger){
  if(_reduceMotion())return false;
  var first=true;
  if(vkey){
    first=!_chartVisited[vkey];
    if(first)setTimeout(function(){_chartVisited[vkey]=true;},0); // 同一描画パス内の複数チャートは同じ「初回」判定を共有
  }
  var dur=vkey?(first?700:0):400;
  var a={duration:dur,easing:'easeOutQuart'};
  if(stagger&&dur>0)a.delay=function(c){return c.type==='data'&&c.mode==='default'?c.dataIndex*40:0;};
  return a;
}
function _armReveal(){
  if(!_navAnim)return;
  _navAnim=false;
  if(viewStack&&viewStack.length>0)return; // pushView中（編集画面）は対象外（playerのsubView相当）
  var tab=curPage;
  if(!tab)return;
  if(_visitedTabs[tab])return;
  _visitedTabs[tab]=true;
  if(_reduceMotion())return;
  var root=$m();if(!root)return;
  _cuRun(root);   // クラスA: 初回訪問のみカウントアップ（reduce時は素の最終値のまま）
  _ringRun(root); // クラスA: 提出率リングdraw
  var els=root.querySelectorAll('.rv');
  var armed=[],n=0;
  for(var i=0;i<els.length&&n<8;i++){ // 先頭8要素「だけをarm」する（armして打ち切るとopacity:0残留）
    if(els[i].offsetParent===null)continue; // 隠しタブ等display:none中の要素はスキップ
    els[i].classList.add('rv-armed');
    els[i].style.transitionDelay=(n*45)+'ms';
    armed.push(els[i]);n++;
  }
  if(!armed.length)return;
  if(typeof IntersectionObserver==='function'){
    var io=new IntersectionObserver(function(entries){
      entries.forEach(function(en){
        if(en.isIntersecting){en.target.classList.add('in');io.unobserve(en.target);}
      });
    },{threshold:.05});
    armed.forEach(function(el){io.observe(el);});
  }else{
    requestAnimationFrame(function(){requestAnimationFrame(_rvForceIn);});
  }
  if(_rvInsurance)clearTimeout(_rvInsurance);
  _rvInsurance=setTimeout(_rvForceIn,1500); // 1.5秒で未revealを強制表示（最終防衛線）
}
if(typeof MutationObserver==='function'){ // jscモックにはObserver類が無いためtypeofガード
  (function(){
    var mainEl=document.getElementById('main-ct');
    if(mainEl)new MutationObserver(_armReveal).observe(mainEl,{childList:true}); // #main-ct直下childListのみ
  })();
}

// %1RMを取得（reps, rir から）。範囲外は最寄りにクランプ
function getPctFromRIR(reps,rir){
  var rpe=10-rir;
  if(rpe>10)rpe=10;if(rpe<6)rpe=6;
  // 0.5刻みに丸め
  rpe=Math.round(rpe*2)/2;
  var r=Math.round(reps);
  if(r<1)r=1;if(r>12)r=12;
  var row=RPECHART[r];
  if(!row)return null;
  return row[rpe]!=null?row[rpe]:null;
}
// 推定重量 = 1RM × % 、2.5kg単位に丸め
function estimateWeight(oneRM,reps,rir){
  if(!oneRM)return null;
  var pct=getPctFromRIR(reps,rir);
  if(pct==null)return null;
  var w=oneRM*pct/100;
  return Math.round(w/2.5)*2.5;
}
// e1RM逆算（実際に挙げた weight×reps×rir から推定1RM）
function estimateOneRM(weight,reps,rir){
  if(!weight||!reps)return null;
  var pct=getPctFromRIR(reps,rir!=null?rir:0);
  if(pct==null||pct===0)return null;
  return Math.round(weight/(pct/100));
}
// 選手の1RM（estBaseごと）を取得。getBestを使う
function getPlayer1RM(pid,estBase){
  if(!estBase)return null;
  return getBest(pid,estBase);
}

// 'std'の保存値をデフォルトへフィールド単位でマージ（部分保存でも欠けが出ない）
function getStdCfg(){
  var saved=(D.std&&D.std[0])||null;
  if(!saved)return STD_DEFAULT;
  var cfg={pos:{},ranks:(saved.ranks&&saved.ranks.length?saved.ranks:STD_DEFAULT.ranks),broncoRanks:(saved.broncoRanks&&saved.broncoRanks.length?saved.broncoRanks:STD_DEFAULT.broncoRanks),allo:saved.allo||STD_DEFAULT.allo,rx:saved.rx||STD_DEFAULT.rx,badgePts:(function(){var d=STD_DEFAULT.badgePts,s=saved.badgePts||{},m={rank:{}};Object.keys(d.rank).forEach(function(k){m.rank[k]=(s.rank&&s.rank[k]!=null&&s.rank[k]!=='')?s.rank[k]:d.rank[k];});['top1','posTop1','mvp','pb','club','allYear'].forEach(function(k){m[k]=(s[k]!=null&&s[k]!=='')?s[k]:d[k];});return m;})()};
  Object.keys(STD_DEFAULT.pos).forEach(function(pk){
    var d=STD_DEFAULT.pos[pk],s=(saved.pos||{})[pk]||{},m={};
    Object.keys(d).forEach(function(f){m[f]=(s[f]!=null&&s[f]!==''?s[f]:d[f]);});
    cfg.pos[pk]=m;
  });
  return cfg;
}
// 現在体重: 直近30日の実測（コンディションの毎日体重＋体組成）の平均 → 期間外は最新実測 → 選手登録の体重
function getCurrentWeightInfo(pid){
  var since=toDateStr(new Date(Date.now()-29*86400000));
  // 同日にf(コンディション体重)とbc(体組成/cond由来)が併存しても二重計上しない＝日付キーでdedup（同日はbc優先）。
  var byDate={};
  (D.f||[]).forEach(function(r){var w=parseFloat(r.weight);if(idEq(r.pid,pid)&&w>0&&r.date)byDate[r.date]=w;});
  (D.bc||[]).forEach(function(r){var w=parseFloat(r.weight);if(idEq(r.pid,pid)&&w>0&&r.date)byDate[r.date]=w;});
  var recs=Object.keys(byDate).map(function(d){return{date:d,w:byDate[d]};});
  var recent=recs.filter(function(x){return x.date>=since;});
  if(recent.length){
    var avg=recent.reduce(function(s,x){return s+x.w;},0)/recent.length;
    return{w:Math.round(avg*10)/10,src:'直近30日平均・'+recent.length+'回',live:true};
  }
  if(recs.length){
    recs.sort(function(a,b){return(b.date||'').localeCompare(a.date||'');});
    return{w:recs[0].w,src:fmt(recs[0].date)+'の実測',live:false};
  }
  var p=D.p.find(function(x){return idEq(x.id,pid);});
  var pw=p?parseFloat(p.weight):NaN;
  if(pw>0)return{w:pw,src:'選手登録の体重',live:false};
  return null;
}
// 指定日時点の体重情報（バッジのランク到達時体重用）。dateStr以前30日の平均→それ以前の直近実測→登録体重。
function getWeightInfoAt(pid,dateStr){
  var since=toDateStr(new Date(new Date(dateStr).getTime()-29*86400000));
  // 同日のf/bc併存を二重計上しない＝日付キーでdedup（同日はbc優先）。
  var byDate={};
  (D.f||[]).forEach(function(r){var w=parseFloat(r.weight);if(idEq(r.pid,pid)&&w>0&&r.date&&r.date<=dateStr)byDate[r.date]=w;});
  (D.bc||[]).forEach(function(r){var w=parseFloat(r.weight);if(idEq(r.pid,pid)&&w>0&&r.date&&r.date<=dateStr)byDate[r.date]=w;});
  var recs=Object.keys(byDate).map(function(d){return{date:d,w:byDate[d]};});
  var recent=recs.filter(function(x){return x.date>=since;});
  if(recent.length){
    var avg=recent.reduce(function(s,x){return s+x.w;},0)/recent.length;
    return{w:Math.round(avg*10)/10,src:'当時30日平均・'+recent.length+'回',live:true};
  }
  if(recs.length){
    recs.sort(function(a,b){return(b.date||'').localeCompare(a.date||'');});
    return{w:recs[0].w,src:fmt(recs[0].date)+'の実測',live:false};
  }

  if(pw>0)return{w:pw,src:'選手登録の体重',live:false};

// P7a: セッションロード(sRPE)用の実効TR時間。選手入力duration最優先（意図的入力を尊重）→未入力なら実測durMinで補完（朝入力の空振り対策）→当日tlogの実測durMin（旧記録の穴埋め）。
// durMinはfinishTrainingのts→完了の壁時計計測で不確実（タブ放置で過大化）のため、手動durationがあればそちらを勝たせる。
function effDur(f){
  if(!f)return 0;
  if(f.duration>0)return f.duration;
  if(f.durMin>0)return f.durMin;
  var t=(D.tlog||[]).filter(function(x){return idEq(x.pid,f.pid)&&x.date===f.date&&x.durMin>0;});
  return t.length?Math.max.apply(null,t.map(function(x){return x.durMin;})):0;
}
function sLoad(f){return f?(f.rpe||0)*effDur(f):0;}
// 種目ランク判定。oneRM=最新記録(getLatest)でランク算出・bestRMに自己ベスト併記。ratio=最新1RM÷(ゴールド倍率×体重)。ranks昇順でratio以上の最上位が現ランク。
function getLiftRankInfo(pid,liftK){
  var p=D.p.find(function(x){return idEq(x.id,pid);});
  if(!p||!p.position)return null;
  var cfg=getStdCfg(),posStd=cfg.pos[p.position];
  if(!posStd||!posStd[liftK])return null;
  var wInfo=getCurrentWeightInfo(pid);
  if(!wInfo)return{noWeight:true,lift:liftK};
  var lift=STD_LIFTS.find(function(l){return l.k===liftK;});
  var oneRM=getLatest(pid,lift.ph);
  var bestRM=getBest(pid,lift.ph);
  var goldTarget=posStd[liftK]*wInfo.w;
  var ratio=oneRM?oneRM/goldTarget:0;
  var ranks=cfg.ranks.slice().sort(function(a,b){return a.pct-b.pct;});
  var cur=null,next=null;
  for(var i=0;i<ranks.length;i++){
    if(oneRM&&ratio>=ranks[i].pct)cur=ranks[i];
    else if(!next)next=ranks[i];
  }
  return{
    lift:liftK,label:lift.label,short:lift.short,
    oneRM:oneRM,bestRM:bestRM,weight:wInfo.w,weightSrc:wInfo.src,mult:posStd[liftK],
    goldTarget:Math.round(goldTarget*10)/10,
    ratio:ratio,
    relBW:oneRM?Math.round(oneRM/wInfo.w*100)/100:null,
    rank:cur,next:next,
    nextTargetKg:next?Math.round(next.pct*goldTarget*10)/10:null,
    nextNeedKg:(next&&oneRM)?Math.max(0,Math.ceil((next.pct*goldTarget-oneRM)*2)/2):null
  };
}
// ブロンコランク判定。ratio=ゴールド基準秒÷ベストタイム秒（速いほど高い）。ranks閾値はBIG3と共通。
// timeSecOpt指定時はその値で判定（ランキングの測定会フィルタ用）。省略時は getLatest(pid,'bronco')＝最新記録。bestSecに自己ベスト併記。
function getBroncoRankInfo(pid,timeSecOpt){
  var p=D.p.find(function(x){return idEq(x.id,pid);});
  if(!p||!p.position)return null;
  var cfg=getStdCfg(),posStd=cfg.pos[p.position];
  if(!posStd||!posStd.bronco)return null;
  var goldSec=posStd.bronco;
  var best=(timeSecOpt!=null)?timeSecOpt:getLatest(pid,'bronco');
  var bestSec=getBest(pid,'bronco');
  var ratio=best?goldSec/best:0;
  var ranks=(cfg.broncoRanks&&cfg.broncoRanks.length?cfg.broncoRanks:cfg.ranks).slice().sort(function(a,b){return a.pct-b.pct;});
  var cur=null,next=null;
  for(var i=0;i<ranks.length;i++){
    if(best&&ratio>=ranks[i].pct)cur=ranks[i];
    else if(!next)next=ranks[i];
  }
  var nextTargetSec=next?Math.floor(goldSec/next.pct):null; // このタイム以下で次ランク
  return{goldSec:goldSec,best:best,bestSec:bestSec,ratio:ratio,rank:cur,next:next,
    nextTargetSec:nextTargetSec,
    nextNeedSec:(next&&best)?Math.max(0,best-nextTargetSec):null,
    achieved:!!(best&&ratio>=1)};
}
// アロメトリック補正スコア = 1RM ÷ 体重^b（体格差を除いた公平比較用）
function getAlloScore(pid,liftK){
  var cfg=getStdCfg(),b=cfg.allo[liftK];
  if(b==null)return null;
  var wInfo=getCurrentWeightInfo(pid);
  if(!wInfo)return null;
  var lift=STD_LIFTS.find(function(l){return l.k===liftK;});
  var oneRM=getBest(pid,lift.ph);
  if(!oneRM)return null;
  return Math.round(oneRM/Math.pow(wInfo.w,b)*10)/10;
}
// 体重推奨帯: 下限=FFMI下限×身長²÷(1−体脂肪下限)、上限=FFMI上限×身長²÷(1−体脂肪上限)
function getWeightBandInfo(pid){
  var p=D.p.find(function(x){return idEq(x.id,pid);});
  if(!p||!p.position)return null;
  var cfg=getStdCfg(),s=cfg.pos[p.position];
  if(!s)return null;
  var hCm=parseFloat(p.height);
  if(!(hCm>0))return{noHeight:true};
  var hM=hCm/100;
  var lo=s.ffmiLo*hM*hM/(1-s.bfLo/100);
  var hi=s.ffmiHi*hM*hM/(1-s.bfHi/100);
  var wInfo=getCurrentWeightInfo(pid);
  var st=null,diff=null;
  if(wInfo){
    if(wInfo.w<lo){st='under';diff=lo-wInfo.w;}
    else if(wInfo.w>hi){st='over';diff=wInfo.w-hi;}
    else st='in';
  }
  return{lo:Math.round(lo*10)/10,hi:Math.round(hi*10)/10,w:wInfo?wInfo.w:null,weightSrc:wInfo?wInfo.src:null,status:st,diff:diff!=null?Math.round(diff*10)/10:null,ffmiLo:s.ffmiLo,ffmiHi:s.ffmiHi,bfLo:s.bfLo,bfHi:s.bfHi};
}
// 現在FFMI（直近の体脂肪率つき体組成から。無ければnull→測定CTA表示に使う）
function getCurrentFFMIInfo(pid){
  var p=D.p.find(function(x){return idEq(x.id,pid);});
  var hCm=parseFloat(p&&p.height);
  if(!(hCm>0))return null;
  var recs=(D.bc||[]).filter(function(r){return idEq(r.pid,pid)&&parseFloat(r.weight)>0&&r.fat!=null&&r.fat!=='';}).sort(function(a,b){return(b.date||'').localeCompare(a.date||'');});
  if(!recs.length)return null;
  var fat=parseFloat(recs[0].fat),w=parseFloat(recs[0].weight);
  if(!(w>0)||isNaN(fat))return null;
  var hM=hCm/100,ffm=w*(1-fat/100);
  return{ffmi:Math.round(ffm/(hM*hM)*10)/10,ffm:Math.round(ffm*10)/10,fat:fat,date:recs[0].date};
}
// 弱点種目 = 測定済み種目のうち達成率(ratio)最小。2種目以上の測定が無いと判定しない
function getWeakLift(pid){
  var infos=[];
  STD_LIFTS.forEach(function(l){
    var inf=getLiftRankInfo(pid,l.k);
    // 弱点判定・処方箋は自己ベスト基準（最新値化の影響を受けない＝アロメトリック/クラブと同じ扱い）
    if(inf&&inf.bestRM){inf.ratio=(inf.goldTarget>0)?inf.bestRM/inf.goldTarget:0;infos.push(inf);}
  });
  if(infos.length<2)return null;
  infos.sort(function(a,b){return a.ratio-b.ratio;});
  return infos[0];
}
// アロメトリック補正スコアのチーム内順位（スコア算出可能な選手のみ母数）
function getAlloTeamRank(pid,liftK){
  var scores=D.p.map(function(pp){return{pid:pp.id,s:getAlloScore(pp.id,liftK)};}).filter(function(x){return x.s!=null;});
  if(!scores.length)return null;
  scores.sort(function(a,b){return b.s-a.s;});
  var idx=scores.findIndex(function(x){return idEq(x.pid,pid);});
  if(idx<0)return null;
  return{rank:idx+1,total:scores.length,score:scores[idx].s};
}
// 弱点種目に効くボリュームの週次推移（月曜始まり・直近weeks週）。
// 対象= estBaseが弱点種目 or 種目名がメイン種目名/処方箋(rx)の種目名に一致（skippedは除外）
function getWeakWeeklyVolume(pid,liftK,weeks){
  var lift=STD_LIFTS.find(function(l){return l.k===liftK;});
  if(!lift)return[];
  var cfg=getStdCfg();
  var rxNames=(cfg.rx[liftK]||[]).map(function(r){return r.name;});
  var now=new Date();var dow=(now.getDay()+6)%7;// 月曜=0
  var thisMon=new Date(now);thisMon.setDate(now.getDate()-dow);
  var out=[];
  for(var wi=weeks-1;wi>=0;wi--){
    var st=new Date(thisMon);st.setDate(thisMon.getDate()-7*wi);
    var en=new Date(st);en.setDate(st.getDate()+6);
    var stS=toDateStr(st),enS=toDateStr(en);
    var vol=0;
    (D.tlog||[]).forEach(function(l){
      if(!idEq(l.pid,pid)||l.absent||!l.results)return;
      if(!(l.date>=stS&&l.date<=enS))return;
      l.results.forEach(function(r){
        if(r.skipped)return;
        var isTarget=(r.estBase===lift.ph)||(r.exName===lift.label)||rxNames.indexOf(r.exName)>=0;
        if(!isTarget)return;
        (r.sets||[]).forEach(function(s){vol+=(parseFloat(s.weight)||0)*(parseInt(s.reps)||0);});
      });
    });
    out.push({label:(st.getMonth()+1)+'/'+st.getDate()+'週',vol:Math.round(vol)});
  }
  return out;
}

// バッジの表示色（rank=ランク色 / その他=種別固定色）。staffはライトテーマなので呼び出し側でdarkenForLight。
function badgeColor(b,rankColor){
  if(b.type==='rank')return rankColor[b.rankK]||'#E8A05C';
  return{top1:'#FFD24A',posTop1:'#6FE3E1',mvp:'#C084FC',pb:'#5FA8FF',club:'#FF7A9C',allYear:'#3DF0A4'}[b.type]||'#C9D4E4';
}
// staff選手詳細のバッジ一覧（ライトテーマ→darkenForLightで視認性確保）。0件は1行。
function renderBadgeListStaff(pid){
  if(!pid)return'';
  var all=computeAllBadges();
  var mine=all.byPid[String(pid)]||[];
  var total=all.totalPts[String(pid)]||0;
  if(!mine.length)return'<div class="form-box"><div class="form-title">'+ic('i-medal',14,'var(--maroon)')+' 獲得バッジ</div><div class="no" style="padding:8px 0">まだバッジがありません</div></div>';
  var cfg=getStdCfg();var rankColor={};cfg.ranks.forEach(function(r){rankColor[r.k]=r.color;});
  function chip(b){var c=darkenForLight(badgeColor(b,rankColor));return '<span style="display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:4px 9px;border-radius:99px;color:'+c+';border:1px solid '+c+'66;background:'+c+'14;margin:0 4px 4px 0">'+escapeHtml(b.label)+' <b style="font-size:10px">+'+b.pts+'</b></span>';}
  var bySess={},order=[],special=[];
  mine.forEach(function(b){if(b.sessId){if(!bySess[b.sessId]){bySess[b.sessId]=[];order.push(b.sessId);}bySess[b.sessId].push(b);}else special.push(b);});
  order.sort(function(a,b){return (bySess[b][0].date||'').localeCompare(bySess[a][0].date||'');});
  function grp(title,dt,list){var pts=list.reduce(function(s,b){return s+b.pts;},0);return '<div style="margin-bottom:8px"><div style="font-size:12px;font-weight:700;margin-bottom:4px">'+escapeHtml(title)+(dt?' <span style="font-size:10px;color:var(--text-tertiary);font-weight:600">'+fmt(dt)+'</span>':'')+' <span style="font-size:10px;color:var(--text-secondary)">'+list.length+'個・'+pts+'pt</span></div><div>'+list.map(chip).join('')+'</div></div>';}
  var h='<div class="form-box"><div class="form-title">'+ic('i-medal',14,'var(--maroon)')+' 獲得バッジ <span style="font-size:12px;color:var(--text-secondary);font-weight:600">合計 '+total+'pt・'+mine.length+'個</span></div>';
  order.forEach(function(sid){var list=bySess[sid];h+=grp(list[0].sessName||'測定会',list[0].date,list);});
  if(special.length)h+=grp('特別バッジ','',special);
  h+='</div>';
  return h;
}
function renderStdSummaryHTML(pid){

  }
  // 懸垂・クリーンのベスト値（ランク基準なしの参考値・バッジなし）
  var cnBest=getBest(pid,'chinning'),clBest=getBest(pid,'clean');

  var band=getWeightBandInfo(pid);
  var bandHtml='';
  if(band&&band.noHeight)bandHtml='<div style="font-size:12px;color:var(--text-tertiary);margin-top:8px">身長未登録のため推奨体重帯は非表示</div>';
  else if(band){

      :band.status==='under'?'<span class="bd bd-a">帯まで +'+band.diff+'kg</span>'
      :band.status==='over'?'<span class="bd bd-r">帯上限 +'+band.diff+'kg</span>':'';
    bandHtml='<div style="font-size:12px;margin-top:8px">推奨体重帯 <b>'+band.lo+'〜'+band.hi+'kg</b>'+(band.w!=null?'（現在 '+band.w+'kg・'+escapeHtml(band.weightSrc||'')+'）':'')+' '+stChip+'</div>';
  }
  return'<div class="form-box"><div class="form-title">'+ic('i-dumbbell',14,'var(--maroon)')+' BIG3基準・体重帯</div><div class="grid" style="grid-template-columns:repeat(4,1fr);gap:8px">'+liftsHtml+broncoCard+'</div>'+subRow+bandHtml+'</div>';
}

function svSafe(k,newRec,onDone){
  // Firestoreトランザクションで最新取得→追加→保存（同時書き込みでも記録を失わない）
  var ref=db.collection('appdata').doc(k);
  return db.runTransaction(function(tx){
    return tx.get(ref).then(function(doc){
      var latest=[];if(doc.exists){try{var parsed=JSON.parse(doc.data().data);if(Array.isArray(parsed))latest=parsed;}catch(e){}}
      latest.push(newRec);
      tx.set(ref,{data:JSON.stringify(latest)});
      return latest;
    });
  }).then(function(latest){D[k]=latest;if(onDone)onDone();}).catch(function(e){console.error('svSafe error:',k,e);alert('保存に失敗しました');});
}
// 配列を直接更新する場合のsvSafe
function svSafeUpdate(k,updateFn,onDone,onError){
  var ref=db.collection('appdata').doc(k);
  return db.runTransaction(function(tx){
    return tx.get(ref).then(function(doc){
      var latest=[];if(doc.exists){try{var parsed=JSON.parse(doc.data().data);if(Array.isArray(parsed))latest=parsed;}catch(e){}}
      latest=updateFn(latest);
      tx.set(ref,{data:JSON.stringify(latest)});
      return latest;
    });
  }).then(function(latest){D[k]=latest;if(onDone)onDone();}).catch(function(e){console.error('svSafeUpdate error:',k,e);if(onError)onError(e);else alert('保存に失敗しました');});
}
// 単一レコードをトランザクションで安全にupsert（id一致で置換、なければ追加）
function svRec(k,rec,onDone){
  svSafeUpdate(k,function(latest){
    var i=latest.findIndex(function(x){return idEq(x.id,rec.id);});
    if(i>=0)latest[i]=rec;else latest.push(rec);
    return latest;
  },onDone);
}
// 単一レコードをトランザクションで安全に削除（id一致）
function svDel(k,id,onDone){
  svSafeUpdate(k,function(latest){return latest.filter(function(x){return!idEq(x.id,id);});},onDone);
}

// ===== tlog容量対策（Phase 0・playerと同設計） =====
// メインdoc appdata/tlog は直近TLOG_KEEP_DAYS日分のみ。古いレコードは選手別×半期のtla_<pid>_<year>h<1|2>へ移送。
// 15日=coachの13日窓+2日マージン。staffは全選手のアーカイブを起動時にプリロードし、読み出しはtlogAll()で結合する。
var TLOG_KEEP_DAYS=15;
function tlaHalf(dateStr){return dateStr.slice(0,4)+'h'+((+dateStr.slice(5,7))<=6?1:2);}
function tlaKey(pid,half){return 'tla_'+String(pid)+'_'+half;}
function tlaHalves(){
  var t=todayStr(),y=+t.slice(0,4),h=(+t.slice(5,7))<=6?1:2;
  var out=[],cy=2026,ch=1;
  while(cy<y||(cy===y&&ch<=h)){out.push(cy+'h'+ch);if(ch===1){ch=2;}else{ch=1;cy++;}}
  return out;
}
// 保存レコードのスリム化（player finishTrainingと同一ロジック。アーカイブ移送・in-place縮小時に適用。冪等）
var TLOG_DROP_RES={prevEx:1,note:1,videoUrl:1,estWeight:1,oneRM:1,targetSets:1};
function slimTlogRec(log){
  var out={};
  for(var k in log){
    if(!Object.prototype.hasOwnProperty.call(log,k))continue;
    if(k==='hasInjurySkip'&&!log[k])continue;
    if(k==='results'&&Array.isArray(log[k])){
      out.results=log[k].map(function(r){
        var c={};
        for(var rk in r){
          if(!Object.prototype.hasOwnProperty.call(r,rk))continue;
          if(TLOG_DROP_RES[rk])continue;
          var v=r[rk];
          if(v==null)continue;
          if((rk==='skipped'||rk==='skipReason'||rk==='lastVolume')&&!v)continue;
          if(rk==='sets'&&Array.isArray(v)){
            v=v.map(function(s){var o={};for(var sk in s){if(Object.prototype.hasOwnProperty.call(s,sk)&&s[sk]!=null)o[sk]=s[sk];}return o;});
          }
          c[rk]=v;
        }
        return c;
      });
      continue;
    }
    out[k]=log[k];
  }
  return out;
}
var _tlogArch=[],_tlogArchLoaded=false,_tlaCbs=null;
var _tlaCache=null,_tlaCacheSrc=null,_tlaCacheArch=null;
function tlogAll(){
  var base=D.tlog||[];
  if(_tlaCache&&_tlaCacheSrc===base&&_tlaCacheArch===_tlogArch)return _tlaCache;
  var seen={},out=base.slice();
  base.forEach(function(l){if(l&&l.id!=null)seen[l.id]=1;});
  _tlogArch.forEach(function(l){if(l&&l.id!=null&&!seen[l.id])out.push(l);});
  _tlaCache=out;_tlaCacheSrc=base;_tlaCacheArch=_tlogArch;
  return out;
}
// 全選手×全半期のアーカイブdocを一括取得（存在しないdocは空扱い・個別失敗も空扱いで継続）
function loadTlogArch(cb){
  if(_tlogArchLoaded){if(cb)cb();return;}
  if(_tlaCbs){if(cb)_tlaCbs.push(cb);return;}
  _tlaCbs=cb?[cb]:[];
  var halves=tlaHalves(),keys=[];
  (D.p||[]).forEach(function(p){halves.forEach(function(hf){keys.push(tlaKey(p.id,hf));});});
  Promise.all(keys.map(function(k){
    return db.collection('appdata').doc(k).get().then(function(doc){
      if(!doc.exists)return[];
      try{var q=JSON.parse(doc.data().data);return Array.isArray(q)?q:[];}catch(e){return[];}
    }).catch(function(e){console.error('tla load error:',k,e);return[];});
  })).then(function(parts){
    var seen={},out=[];
    parts.forEach(function(arr){arr.forEach(function(l){if(l&&l.id!=null&&!seen[l.id]){seen[l.id]=1;out.push(l);}});});
    _tlogArch=out;_tlogArchLoaded=true;_tlaCache=null;
    var cbs=_tlaCbs||[];_tlaCbs=null;
    cbs.forEach(function(f){try{f();}catch(e){console.error(e);}});
  });
}

// 古いレコードのアーカイブ移送+メインdocのin-placeスリム化（1セッション1回・静かに実行・冪等）
var _tlogArchRan=false;
function archiveTlog(){
  if(_tlogArchRan)return;_tlogArchRan=true;
  var cut=toDateStr(new Date(Date.now()-TLOG_KEEP_DAYS*86400000));
  var stale=(D.tlog||[]).filter(function(l){
    return l&&l.id!=null&&typeof l.date==='string'&&/^\d{4}-\d{2}-\d{2}$/.test(l.date)&&l.date<cut;
  });
  if(!stale.length)return;
  var groups={};
  stale.forEach(function(l){var k=tlaKey(l.pid,tlaHalf(l.date));(groups[k]=groups[k]||[]).push(l);});
  var keys=Object.keys(groups);
  function step(i){
    if(i>=keys.length)return;
    var gk=keys[i],recs=groups[gk];
    // ①アーカイブdocへid重複排除でマージ（移送時にスリム化＝過去の肥大レコードもここで縮む）
    svSafeUpdate(gk,function(latest){
      var have={};latest.forEach(function(x){if(x&&x.id!=null)have[x.id]=1;});
      recs.forEach(function(l){if(!have[l.id])latest.push(slimTlogRec(l));});
      return latest;
    },function(){
      // ②①の成功後にメインdocから移送済みidを除去+残存レコードをin-placeスリム化（旧クライアント保存分も吸収・冪等）
      var ids={};recs.forEach(function(l){ids[l.id]=1;});
      svSafeUpdate('tlog',function(latest){
        return latest.filter(function(l){return !(l&&l.id!=null&&ids[l.id]);}).map(slimTlogRec);
      },function(){
        // 読み込み済みのメモリ上アーカイブにも反映（staffは全選手分を保持）
        if(_tlogArchLoaded){
          var have={};_tlogArch.forEach(function(x){if(x&&x.id!=null)have[x.id]=1;});
          recs.forEach(function(l){if(!have[l.id])_tlogArch.push(slimTlogRec(l));});
          _tlaCache=null;
        }
        step(i+1);
      },function(e){console.error('tlog archive(main) skip:',e);});
    },function(e){console.error('tlog archive('+gk+') skip:',e);});
  }
  step(0);
}
// ===== tlog代理編集の計算エンジン（playerから移植・identical登録）=====
// _curTLog は player実施画面専用のグローバル。staffでは代理編集経路(getCompareVolumeを常に6引数で呼ぶ)のため
// 下の分岐は到達しないが、identical移植のため宣言のみ置く（未定義参照の保険）。
var _curTLog=null;
function getCompareVolume(pid,exName,beforeDate,mode,selfId,selfTs){
  var hasSelf=arguments.length>=5;
  var nowTs=hasSelf?selfTs:((_curTLog&&_curTLog.ts)?_curTLog.ts:new Date().toISOString());
  var curId=hasSelf?selfId:(_curTLog?_curTLog.id:null);
  var logs=tlogAll().filter(function(l){
    if(!idEq(l.pid,pid))return false;
    if(curId&&idEq(l.id,curId))return false; // 自分自身は除外
    // タイムスタンプがあれば時刻で、なければ日付で「前」を判定
    if(l.ts&&nowTs)return l.ts<nowTs;
    return l.date<beforeDate;
  }).sort(function(a,b){
    // 新しい順（tsがあればts、なければdate）
    var at=a.ts||a.date,bt=b.ts||b.date;
    return bt.localeCompare(at);
  });
  if(mode==='week'){
    var wkAgo=new Date(beforeDate);wkAgo.setDate(wkAgo.getDate()-6);var wkStr=toDateStr(wkAgo);
    logs=logs.filter(function(l){return l.date<=wkStr;});

// ※抑圧ゲート（現在値超過判定）は含まない。呼び出し側で getLatestE1RM と比較する。
function bestE1rmPerBase(results){
  var best={};
  (results||[]).forEach(function(r){
    if(r.skipped||!r.estBase)return;
    (r.sets||[]).forEach(function(s){
      if(s.weight&&s.reps){var e=estimateOneRM(s.weight,s.reps,s.rir!=null?s.rir:0);if(e&&(!best[r.estBase]||e>best[r.estBase].e1rm))best[r.estBase]={e1rm:e,weight:s.weight,reps:s.reps,rir:s.rir};}
    });
  });

}
// ===== 推定1RMのリプレイ再生成（tlog編集/削除の後に呼ぶ・誤高値による「抑圧レコード」を復元する） =====
// finishTraining は estBaseごと best>現在の最新値 の時だけ e1rm を記録する＝単調増加。誤高値がある日X以降、
// 正しいが低い日はレコード自体が作られず恒久抑圧される。編集/削除では抑圧分が復活しないため、当該pidの e1rm を
// date>=fromDate で全削除→tlogAll() を日付昇順にリプレイし、estBaseごと単調最大を超えた日だけ再生成する。
// baseline(runningMax)=生き残り e1rm(date<fromDate)の最大値（同日タイ順序に依存しない max 意味論で再構築）。
// 前提: fromDate以降の全tlogがメモリ(tlogAll)に載っていること→_tlogArchLoadedを保証してから実行（staffは全選手のアーカイブを起動時プリロード）。
var _e1rmRebuildGen={};   // pid別 世代トークン: 同一pidで新しいrebuildが走ったら古いrebuildのコールバックを無効化（削除→即Undo連打の競合対策）。別pidは互いに干渉しない
var _pendingRebuild={};   // pid別 rebuild失敗時の退避→次回描画で自動リトライ
function rebuildE1rmFrom(pid,fromDate,onDone,onError,_retried){
  if(!_tlogArchLoaded&&!_retried){loadTlogArch(function(){rebuildE1rmFrom(pid,fromDate,onDone,onError,true);});return;}
  var myGen=(_e1rmRebuildGen[pid]=(_e1rmRebuildGen[pid]||0)+1);
  var validDate=function(d){return typeof d==='string'&&/^\d{4}-\d{2}-\d{2}$/.test(d);};
  svSafeUpdate('e1rm',function(latest){
    if(!Array.isArray(latest))latest=[];
    // 1) 保持: 他pidは全て温存。対象pidでも「日付が無効」または date<fromDate は温存（無効dateレコードの無言消失を防ぐ）
    var kept=latest.filter(function(r){return !idEq(r.pid,pid)||!validDate(r.date)||r.date<fromDate;});
    // 2) baseline: 生き残った対象pid(date<fromDate)の estBaseごと最大値
    var runMax={};
    latest.forEach(function(r){
      if(idEq(r.pid,pid)&&validDate(r.date)&&r.date<fromDate&&r.values){
        for(var k in r.values){if(r.values[k]&&(runMax[k]==null||r.values[k].e1rm>runMax[k]))runMax[k]=r.values[k].e1rm;}
      }
    });
    // 3) リプレイ: 対象pidの date>=fromDate セッションを日付昇順（同日は ts||id 昇順）で再構築。tlogAll()は更新関数内で毎回評価＝tx再試行時に最新D.tlogを読む
    var logs=tlogAll().filter(function(l){return l&&idEq(l.pid,pid)&&validDate(l.date)&&l.date>=fromDate;}).sort(function(a,b){
      var d=(a.date||'').localeCompare(b.date||'');if(d)return d;
      var t=String(a.ts||'').localeCompare(String(b.ts||''));if(t)return t;
      return String(a.id||'').localeCompare(String(b.id||''));
    });
    // セッション順に単調最大ゲートを通しつつ、生成レコードは「日付ごと1件（estBaseごと最大）」へ集約する。
    // → 同日に2セッションで自己ベスト更新しても1日1レコードになり、getLatestE1RM等の同日タイ順序依存（低い方を返す退行）を根絶する。
    var byDate={},order=[];
    logs.forEach(function(l){
      var best=bestE1rmPerBase(l.results);
      Object.keys(best).forEach(function(k){
        if(runMax[k]==null||best[k].e1rm>runMax[k]){
          runMax[k]=best[k].e1rm;
          if(!byDate[l.date]){byDate[l.date]={date:l.date,ts:l.ts,id:l.id,values:{}};order.push(l.date);}
          if(!byDate[l.date].values[k]||best[k].e1rm>byDate[l.date].values[k].e1rm)byDate[l.date].values[k]=best[k];
        }
      });
    });
    var rebuilt=order.map(function(d){var b=byDate[d];return{id:newId(),pid:pid,date:d,inputAt:(b.ts||d+'T00:00:00.000Z'),values:b.values,source:'rebuild',tlogId:(b.id!=null?b.id:null)};});
    return kept.concat(rebuilt);
  },function(){if(myGen!==_e1rmRebuildGen[pid])return;delete _pendingRebuild[pid];if(onDone)onDone();},function(e){if(myGen!==_e1rmRebuildGen[pid])return;console.error('rebuildE1rmFrom error',e);_pendingRebuild[pid]={pid:pid,fromDate:fromDate};if(onError)onError(e);});
}

      var isAbsent=recentSessions[i].absentees.some(function(a){return idEq(a.pid,p.id);});
      if(isAbsent)consecCount++;
      else break;
    }
    if(consecCount>=3){
      var pInj=D.i.find(function(x){return idEq(x.pid,p.id)&&!x.resolved;});
      consecutiveAbs.push({pid:p.id,name:p.name,count:consecCount,hasInjury:!!pInj});
    }
  });
  var ai=D.i.filter(function(x){return!x.resolved;}).sort(function(a,b){return b.date.localeCompare(a.date);}).slice(0,6);
  // 来週復帰予定（来週月曜〜日曜）
  var today=new Date();
  var dow=today.getDay();
  var daysToNextMon=dow===0?1:8-dow;
  var nextMon=new Date(today);nextMon.setDate(today.getDate()+daysToNextMon);
  var nextSun=new Date(nextMon);nextSun.setDate(nextMon.getDate()+6);
  var nextMonS=toDateStr(nextMon);
  var nextSunS=toDateStr(nextSun);
  var returning=D.i.filter(function(x){return!x.resolved&&x.returnDate&&x.returnDate>=nextMonS&&x.returnDate<=nextSunS;});
  // New injuries pending approval (source match/player, not yet approved)
  var pendingInj=D.i.filter(function(x){return!x.resolved&&x.source&&!x.approved;}).sort(function(a,b){return b.date.localeCompare(a.date);});
  // Can't practice next week → 今週中のみ表示（日曜を過ぎたら消える）
  var thisWeekSun=new Date(today);thisWeekSun.setDate(today.getDate()+(7-today.getDay())%7||(7));
  // 今週月曜
  var thisWeekMon=new Date(today);thisWeekMon.setDate(today.getDate()-today.getDay()+1);
  var thisWeekMonS=toDateStr(thisWeekMon);
  var cantPrac=D.i.filter(function(x){
    if(x.resolved||x.canPractice!=='参加できない'||x.approved===false)return false;
    // その怪我報告の日付が今週以降（先週以前なら消す）
    return x.date>=thisWeekMonS;
  });
  // Match day check: find members who should check but haven't for today's match
  var todayMatchDate=todayStr();
  var selectedForMatch=D.matchsel||[];
  var matchDoneToday=D.md.filter(function(m){return m.date===todayMatchDate;}).map(function(m){return m.pid;});
  var matchNotDone=selectedForMatch.filter(function(pid){return matchDoneToday.indexOf(pid)<0;});
  // This week's calendar events for announce
  var thisWeekEvents=getThisWeekEvents();
  // ===== 本日の提出状況集計 =====
  // コンディション：全選手が毎日提出すべき
  var condSubmittedToday=D.f.filter(function(r){return r.date===todayS;}).map(function(r){return r.pid;});
  var condNotSubmitted=D.p.filter(function(p){
    return !condSubmittedToday.some(function(sid){return idEq(sid,p.id);});
  });
  var condRate=tot>0?Math.round((tot-condNotSubmitted.length)/tot*100):0;
  // 体組成：測定会期間中のみ対象
  var curMSess=(D.msess||[]).find(function(s){return s.startDate<=todayS&&s.endDate>=todayS;});
  var bcNotSubmitted=[];
  if(curMSess){
    var bcSubmitted=D.bc.filter(function(r){return r.date>=curMSess.startDate&&r.date<=curMSess.endDate;}).map(function(r){return r.pid;});
    bcNotSubmitted=D.p.filter(function(p){return!bcSubmitted.some(function(sid){return idEq(sid,p.id);});});
  }
  // 提出が遅い選手（昨日のコンディションを今日まで出していない）
  var yd=new Date();yd.setDate(yd.getDate()-1);var ydS=toDateStr(yd);
  var lateSubmitters=[];
  D.p.forEach(function(p){
    var hasYesterday=D.f.some(function(r){return idEq(r.pid,p.id)&&r.date===ydS;});
    var hasToday=D.f.some(function(r){return idEq(r.pid,p.id)&&r.date===todayS;});
    if(!hasYesterday&&!hasToday){
      // 最後に提出した日
      var lastRec=D.f.filter(function(r){return idEq(r.pid,p.id);}).sort(function(a,b){return b.date.localeCompare(a.date);})[0];
      var daysSince=lastRec?Math.floor((new Date(todayS)-new Date(lastRec.date))/86400000):null;
      lateSubmitters.push({pid:p.id,name:p.name,lastDate:lastRec?lastRec.date:null,daysSince:daysSince});
    }
  });
  lateSubmitters.sort(function(a,b){return (b.daysSince||999)-(a.daysSince||999);});

  var urgentItems=[];
  var warnItems=[];
  var infoItems=[];

  // リハビリ遅延検出
  var rehabOverdue=[];
  var rehabUpcoming=[]; // 3日以内に目標日が来る選手
  (D.r||[]).forEach(function(r){
    if(!r.stageTargetDates)return;
    var inj=D.i.find(function(x){return idEq(x.id,r.injId);});
    if(!inj||inj.resolved)return;
    var p=D.p.find(function(x){return idEq(x.id,r.pid);});if(!p)return;
    if(r.stage>=STG.length-1)return;
    var target=r.stageTargetDates[r.stage+1];
    if(!target)return;
    var targetDt=new Date(target);
    var nowDt=new Date(todayStr());
    var diff=Math.ceil((targetDt-nowDt)/86400000);
    if(diff<0){
      rehabOverdue.push({pid:p.id,name:p.name,injId:inj.id,stage:STG[r.stage],nextStage:STG[r.stage+1],daysOver:-diff});
    } else if(diff<=3){
      rehabUpcoming.push({pid:p.id,name:p.name,injId:inj.id,stage:STG[r.stage],nextStage:STG[r.stage+1],daysLeft:diff});
    }
  });

  // 緊急: トレーナーからの依頼（P4）— injcommの最新がトレーナー発のセンチネル依頼＝スタッフ未対応
  var rehabReqs=[];
  (D.i||[]).forEach(function(inj){
    var comms=(D.injcomm||[]).filter(function(c){return idEq(c.injId,inj.id);}).sort(function(a,b){return (a.createdAt||'').localeCompare(b.createdAt||'');});
    var last=comms[comms.length-1];
    if(last&&last.role==='trainer'&&last.text&&last.text.indexOf(REQ_META.prefix)===0){
      // 対応済み判定：依頼された状態に既に到達していればチップを消す（staffが確定操作を実行済み＝コメント返信不要）
      var pend=true;
      if(last.text.indexOf(REQ_META.label.resolve)>=0&&inj.resolved)pend=false;    // 回復依頼→既にresolved
      if(last.text.indexOf(REQ_META.label.unresolve)>=0&&!inj.resolved)pend=false; // 治療中依頼→既に治療中
      if(pend){
        var p=D.p.find(function(x){return idEq(x.id,inj.pid);});
        rehabReqs.push({injId:inj.id,name:p?p.name:'?',text:last.text});
      }
    }
  });
  if(rehabReqs.length){
    urgentItems.push('<div style="display:flex;align-items:center;gap:6px;font-size:14px;font-weight:700;margin-bottom:.5rem">'+ic('i-bell',15,'var(--red)')+'トレーナーからの依頼<span class="bd bd-r">'+rehabReqs.length+'</span><span style="font-size:11px;font-weight:600;color:var(--text-secondary)">確定操作の確認が必要</span></div>'+
    rehabReqs.map(function(x){
      return'<div class="alert-card alert-down" style="cursor:pointer;justify-content:space-between;flex-wrap:wrap;gap:6px" onclick="goInjuryDetail('+x.injId+')"><span style="flex:1">'+escapeHtml(x.name)+' — '+escapeHtml(x.text)+'</span><span class="bd bd-r" style="white-space:nowrap;align-self:center">要対応</span></div>';
    }).join(''));
  }
  // 緊急: 新着怪我
  if(pendingInj.length){
    urgentItems.push('<div style="display:flex;align-items:center;gap:6px;font-size:14px;font-weight:700;margin-bottom:.5rem">'+ic('i-bandage',15,'var(--red)')+'新着怪我<span class="bd bd-r">'+pendingInj.length+'</span><span style="font-size:11px;font-weight:600;color:var(--text-secondary)">スタッフ確認が必要</span></div>'+
    pendingInj.map(function(x){var p=D.p.find(function(pp){return pp.id===x.pid;});if(!p)return'';
      return'<div class="alert-card alert-down" style="justify-content:space-between;flex-wrap:wrap;gap:6px"><span style="flex:1">'+escapeHtml(p.name)+' — '+(x.side||'')+x.part+' '+x.type+' ('+fmt(x.date)+') '+(x.source==='match'?'【試合】':'【練習/その他】')+'</span><div style="display:flex;gap:6px"><button class="btn btn-sm btn-s" onclick="approveInjury('+x.id+')">怪我人に追加</button><button class="btn btn-sm btn-d" onclick="rejectInjury('+x.id+')">却下</button><button class="btn btn-sm" onclick="goInjuryDetail('+x.id+')">詳細</button></div></div>';
    }).join(''));
  }
  // 緊急: リハビリ遅延中
  if(rehabOverdue.length){
    urgentItems.push('<div style="display:flex;align-items:center;gap:6px;font-size:14px;font-weight:700;margin-bottom:.5rem">'+ic('i-clock',15,'var(--red)')+'リハビリ遅延中<span class="bd bd-r">'+rehabOverdue.length+'</span><span style="font-size:11px;font-weight:600;color:var(--text-secondary)">進捗確認が必要</span></div>'+
    rehabOverdue.map(function(o){
      return'<div class="alert-card alert-down" style="cursor:pointer;justify-content:space-between" onclick="goInjuryDetail('+o.injId+')">'+
      '<span>'+escapeHtml(o.name)+' — 「'+o.stage+'」→「'+o.nextStage+'」</span>'+
      '<span class="bd bd-r">'+o.daysOver+'日遅延</span>'+
      '</div>';
    }).join(''));
  }
  // 注意: 練習に参加できない
  if(cantPrac.length){
    warnItems.push('<div style="display:flex;align-items:center;gap:6px;font-size:14px;font-weight:700;margin-bottom:.5rem">'+ic('i-warn',15,'var(--amber)')+'来週の練習に参加できない選手<span class="bd bd-a">'+cantPrac.length+'</span></div>'+
    cantPrac.map(function(x){var p=D.p.find(function(pp){return pp.id===x.pid;});if(!p)return'';
      return'<div class="alert-card alert-warn" style="cursor:pointer" onclick="goInjuryDetail('+x.id+')">'+escapeHtml(p.name)+' — '+(x.side||'')+x.part+' '+x.type+'</div>';
    }).join(''));
  }
  // 注意: 連続欠席アラート
  if(consecutiveAbs.length){
    warnItems.push('<div style="display:flex;align-items:center;gap:6px;font-size:14px;font-weight:700;margin-bottom:.5rem">'+ic('i-x-c',15,'var(--amber)')+'連続欠席している選手<span class="bd bd-a">'+consecutiveAbs.length+'</span></div>'+
    consecutiveAbs.map(function(c){
      return'<div class="alert-card alert-warn" style="cursor:pointer;justify-content:space-between" onclick="goPlayerDetail('+c.pid+')"><span>'+escapeHtml(c.name)+(c.hasInjury?' '+ic('i-bandage',12):'')+'</span><span class="bd bd-r">'+c.count+'回連続</span></div>';
    }).join(''));
  }
  // 注意: リハビリ目標日が近い
  if(rehabUpcoming.length){
    warnItems.push('<div style="display:flex;align-items:center;gap:6px;font-size:14px;font-weight:700;margin-bottom:.5rem">'+ic('i-target',15,'var(--amber)')+'リハビリ目標日が近い<span class="bd bd-a">'+rehabUpcoming.length+'</span></div>'+
    rehabUpcoming.map(function(o){
      return'<div class="alert-card alert-warn" style="cursor:pointer;justify-content:space-between" onclick="goInjuryDetail('+o.injId+')">'+
      '<span>'+escapeHtml(o.name)+' — 「'+o.nextStage+'」へ</span>'+
      '<span class="bd '+(o.daysLeft===0?'bd-r':'bd-a')+'">'+(o.daysLeft===0?'今日':'あと'+o.daysLeft+'日')+'</span>'+
      '</div>';
    }).join(''));
  }
  // 情報: 来週復帰予定
  if(returning.length){
    infoItems.push('<div style="display:flex;align-items:center;gap:6px;font-size:14px;font-weight:700;margin-bottom:.5rem">'+ic('i-flag',15,'var(--green)')+'来週復帰予定<span class="bd bd-g">'+returning.length+'</span><span style="font-size:11px;font-weight:600;color:var(--text-secondary)">'+fmt(nextMonS)+'〜'+fmt(nextSunS)+'</span></div>'+
    returning.map(function(x){var p=D.p.find(function(pp){return pp.id===x.pid;});if(!p)return'';
      var daysLeft=Math.ceil((new Date(x.returnDate)-new Date())/86400000);
      return'<div class="alert-card alert-info" style="cursor:pointer;justify-content:space-between" onclick="goInjuryDetail('+x.id+')"><span>'+escapeHtml(p.name)+' — '+injLabel(x)+' <span style="font-size:11px">(復帰予定: '+fmt(x.returnDate)+')</span></span><span class="bd bd-g">残り'+daysLeft+'日</span></div>';
    }).join(''));
  }

  // アラート3層: 今すぐ行動=帯 / 経過観察=集約折りたたみ（クラスB=毎回toggle可・状態は_dashWarnOpenで再描画をまたいで維持） / 情報=プレーン
  var prioritySection='';
  if(urgentItems.length){
    prioritySection+='<div class="rv" style="margin-bottom:1.25rem;padding:14px;background:linear-gradient(to right, var(--red-bg), transparent);border-left:4px solid var(--red);border-radius:var(--radius)">'+
    '<div style="display:flex;align-items:center;gap:6px;font-size:11px;font-weight:800;color:var(--red);margin-bottom:8px;letter-spacing:.06em">'+ic('i-warn',13)+'緊急 — 即対応</div>'+
    urgentItems.join('')+'</div>';
  }
  if(warnItems.length){
    var warnCount=cantPrac.length+consecutiveAbs.length+rehabUpcoming.length;
    var wOpen=window._dashWarnOpen===true;
    prioritySection+='<div class="rv" style="margin-bottom:1.25rem;padding:14px;background:linear-gradient(to right, var(--amber-bg), transparent);border-left:4px solid var(--amber);border-radius:var(--radius)">'+
    '<div class="clp-hd'+(wOpen?' open':'')+'" id="warn-clp-hd" onclick="dashWarnToggle()" style="display:flex;align-items:center;gap:6px;font-size:11px;font-weight:800;color:var(--amber);letter-spacing:.06em">'+ic('i-clock',13)+'注意 — 経過観察<span class="bd bd-a">'+warnCount+'</span><span style="flex:1"></span><span class="clp-chev">'+ic('i-chevron-d',15)+'</span></div>'+
    '<div class="clp'+(wOpen?' open':'')+'" id="warn-clp"><div><div style="padding-top:10px">'+warnItems.join('')+'</div></div></div>'+
    '</div>';
  }
  if(infoItems.length){
    prioritySection+='<div class="rv" style="margin-bottom:1.25rem">'+infoItems.join('')+'</div>';
  }

  // ===== 提出状況パネル =====
  var submissionPanel='<div class="card rv" style="margin-bottom:1.25rem;padding:1.1rem 1.25rem">'+
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">'+
    '<div style="display:flex;align-items:center;gap:6px;font-size:14px;font-weight:700">'+ic('i-clipboard',15,'var(--maroon)')+'本日の提出状況 <span style="font-size:11px;color:var(--text-secondary);font-weight:400">'+fmt(todayS)+'</span></div>'+
    '<div style="display:flex;gap:8px;align-items:center"><div style="font-size:12px;color:var(--text-secondary)">コンディション</div><div style="font-size:20px;font-weight:700;color:'+(condRate>=80?'var(--green)':condRate>=50?'var(--amber)':'var(--red)')+'">'+condRate+'%</div><div style="font-size:11px;color:var(--text-secondary)">('+(tot-condNotSubmitted.length)+'/'+tot+')</div></div>'+
    '</div>'+
    // プログレスバー
    '<div style="height:8px;background:var(--bg-tertiary);border-radius:99px;overflow:hidden;margin-bottom:14px"><div style="height:100%;width:'+condRate+'%;background:'+(condRate>=80?'var(--green)':condRate>=50?'var(--amber)':'var(--red)')+';border-radius:99px;transition:width .4s"></div></div>'+
    (condNotSubmitted.length?'<div style="font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:6px">コンディション未提出 ('+condNotSubmitted.length+'名)</div>'+
      '<div style="display:flex;flex-wrap:wrap;gap:5px">'+condNotSubmitted.map(function(p){return'<span class="chip-late" onclick="goPlayerDetail('+p.id+')" style="cursor:pointer">'+escapeHtml(p.name)+'</span>';}).join('')+'</div>'
      :'<div style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--green);font-weight:600">'+ic('i-check-c',14)+'全員提出済み</div>')+
    (curMSess&&bcNotSubmitted.length?'<div style="display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--text-secondary);margin:12px 0 6px">'+ic('i-scale',13)+'体組成未測定 ('+escapeHtml(curMSess.name)+' / '+bcNotSubmitted.length+'名)</div>'+
      '<div style="display:flex;flex-wrap:wrap;gap:5px">'+bcNotSubmitted.map(function(p){return'<span class="chip-late" onclick="goPlayerDetail('+p.id+')" style="cursor:pointer">'+escapeHtml(p.name)+'</span>';}).join('')+'</div>':'')+
    '</div>';

  // 提出遅延パネル（2日以上出していない選手）
  var bigLate=lateSubmitters.filter(function(l){return l.daysSince===null||l.daysSince>=2;});
  var latePanel='';
  if(bigLate.length){
    latePanel='<div class="card rv" style="margin-bottom:1.25rem;padding:1.1rem 1.25rem;border-left:4px solid var(--amber)">'+
    '<div style="display:flex;align-items:center;gap:6px;font-size:14px;font-weight:700;margin-bottom:10px">'+ic('i-clock',15,'var(--amber)')+'コンディション提出が滞っている選手<span class="bd bd-a">'+bigLate.length+'名</span></div>'+
    '<div style="display:flex;flex-direction:column;gap:6px">'+bigLate.map(function(l){
      var label=l.daysSince===null?'一度も提出なし':l.daysSince+'日間未提出';
      return'<div class="log-row card-click" onclick="goPlayerDetail('+l.pid+')" style="padding:7px 0"><span style="font-weight:600;flex:1">'+escapeHtml(l.name)+'</span>'+(l.lastDate?'<span style="font-size:11px;color:var(--text-secondary)">最終: '+fmt(l.lastDate)+'</span>':'')+'<span class="bd '+(l.daysSince===null||l.daysSince>=4?'bd-r':'bd-a')+'">'+label+'</span></div>';
    }).join('')+'</div></div>';
  }

  // ===== 今日の予定パネル =====
  var todayPlanItems='';
  // 今日のテーピング予約
  var todayTapeSlots=(D.tapeslot||[]).filter(function(s){return s.date===todayS;});
  var todayTapeBookings=[];
  todayTapeSlots.forEach(function(s){
    (D.tape||[]).filter(function(t){return idEq(t.slotId,s.id);}).forEach(function(t){
      var p=D.p.find(function(x){return idEq(x.id,t.pid);});
      if(p)todayTapeBookings.push({time:s.startTime,name:p.name,pid:p.id,parts:(t.parts||[]).join('・'),staff:s.staff});
    });
  });
  todayTapeBookings.sort(function(a,b){return (a.time||'').localeCompare(b.time||'');});
  if(todayTapeBookings.length){
    todayPlanItems+='<div style="margin-bottom:10px"><div style="display:flex;align-items:center;gap:5px;font-size:12px;font-weight:700;color:var(--accent);margin-bottom:5px">'+ic('i-tape',13)+'テーピング予約（'+todayTapeBookings.length+'件）</div>'+
      todayTapeBookings.map(function(b){return'<div class="log-row" style="cursor:pointer;padding:5px 0" onclick="goPlayerDetail('+b.pid+')"><span style="min-width:48px;font-weight:600;font-size:12px">'+b.time+'</span><span style="flex:1;font-size:13px">'+escapeHtml(b.name)+'</span><span style="font-size:11px;color:var(--text-secondary)">'+escapeHtml(b.parts)+(b.staff?' / '+escapeHtml(b.staff):'')+'</span></div>';}).join('')+'</div>';
  }
  // リハビリ予定（rplan.tomorrowCatsベース。対象日tomorrowDateで本日分/明日分に振り分け。
  // 対象日を過ぎた分・日付の無い旧データは非表示＝「明日の予定が永遠に残る」旧バグの修正）
  // 「サポート」「オフ」のみの人は除外。
  var _tm=new Date();_tm.setDate(_tm.getDate()+1);var tomorrowS=toDateStr(_tm);
  var todayRehab=[],tomorrowRehab=[];
  D.i.filter(function(x){return!x.resolved;}).forEach(function(inj){
    var plan=(D.rplan||[]).find(function(pl){return idEq(pl.injId,inj.id);});
    if(!plan||!plan.tomorrowCats||!plan.tomorrowCats.length)return;
    if(!plan.tomorrowDate)return; // 日付の無い旧データは表示しない（要再設定）
    var bucket=plan.tomorrowDate===todayS?todayRehab:(plan.tomorrowDate===tomorrowS?tomorrowRehab:null);
    if(!bucket)return; // 対象日が過去（または翌日より先）なら非表示
    var meaningfulCats=plan.tomorrowCats.filter(function(c){return c!=='サポート'&&c!=='オフ';});
    if(!meaningfulCats.length)return; // サポート・オフのみなら表示しない
    var p=D.p.find(function(x){return idEq(x.id,inj.pid);});
    var rh=D.r.find(function(rr){return idEq(rr.injId,inj.id);});
    if(p)bucket.push({pid:p.id,name:p.name,injId:inj.id,part:(inj.side||'')+inj.part,cats:meaningfulCats,stage:rh?STG[rh.stage]:''});
  });

players:function(){
  var q=(document.getElementById('ps')?document.getElementById('ps').value:'').toLowerCase(),pf=document.getElementById('pf')?document.getElementById('pf').value:'',yf=document.getElementById('yf')?document.getElementById('yf').value:'',sf=document.getElementById('sf')?document.getElementById('sf').value:'',so=document.getElementById('pso')?document.getElementById('pso').value:'name';
