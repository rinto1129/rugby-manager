rank:function(){
  var m=document.getElementById('rkm')?document.getElementById('rkm').value:'squat',yf=document.getElementById('rky')?document.getElementById('rky').value:'',pf=document.getElementById('rkp')?document.getElementById('rkp').value:'';
  var labels={squat:'スクワットMAX',bench:'ベンチプレスMAX',deadlift:'デッドリフトMAX',bronco:'ブロンコテスト',big3:'BIG3合計',big3perkg:'体重あたりBIG3'};
  var rk=D.p.filter(function(p){if(yf&&String(p.year)!==yf)return false;if(pf&&p.position!==pf)return false;return true;}).map(function(p){var rs=D.ph.filter(function(x){return x.pid===p.id;});var v=null;
  if(m==='bronco'){var vs=rs.filter(function(x){return x.bronco;}).map(function(x){return x.bronco;});v=vs.length?Math.min.apply(null,vs):null;}
  else if(m==='big3'){v=rs.length?Math.max.apply(null,rs.map(function(x){return big3(x);})):null;}
  else if(m==='big3perkg'){var w=parseFloat(p.weight);if(w){var b=rs.length?Math.max.apply(null,rs.map(function(x){return big3(x);})):0;v=b?Math.round(b/w*100)/100:null;}}
  else{var vs2=rs.filter(function(x){return x[m];}).map(function(x){return x[m];});v=vs2.length?Math.max.apply(null,vs2):null;}
  return{p:p,v:v};}).filter(function(x){return x.v!==null;});
  m==='bronco'?rk.sort(function(a,b){return a.v-b.v;}):rk.sort(function(a,b){return b.v-a.v;});
  var unit=m==='bronco'?'秒':m==='big3perkg'?'倍':'kg';
  $m().innerHTML='<div class="srch"><select class="ipt" style="width:auto" id="rkm" onchange="V.rank()">'+Object.keys(labels).map(function(k){return'<option value="'+k+'"'+(m===k?' selected':'')+'>'+labels[k]+'</option>';}).join('')+'</select><select class="ipt" style="width:auto" id="rky" onchange="V.rank()"><option value="">全学年</option>'+[1,2,3,4].map(function(y){return'<option value="'+y+'"'+(yf===String(y)?' selected':'')+'>'+y+'年</option>';}).join('')+'</select><select class="ipt" style="width:auto" id="rkp" onchange="V.rank()"><option value="">全ポジション</option>'+POS.map(function(p){return'<option'+(pf===p?' selected':'')+'>'+p+'</option>';}).join('')+'</select></div><div class="card" style="padding:0;overflow:hidden"><table class="rank-tbl"><thead><tr><th style="width:50px">#</th><th>選手名</th><th>POS</th><th>学年</th><th style="text-align:right">'+labels[m]+'</th></tr></thead><tbody>'+(rk.length?rk.map(function(r,i){return'<tr style="cursor:pointer" onclick="goPlayerDetail('+r.p.id+')"><td style="font-weight:600;'+(i===0?'color:#BA7517':i===1?'color:#888780':i===2?'color:#993C1D':'')+'">'+(["🥇","🥈","🥉"][i]||(i+1))+'</td><td><div style="display:flex;align-items:center;gap:8px">'+avH(r.p,26)+'<span style="font-weight:600">'+r.p.name+'</span></div></td><td>'+(r.p.position||'-')+'</td><td>'+(r.p.year||'-')+'年</td><td style="text-align:right;font-weight:600">'+(m==='big3perkg'?r.v.toFixed(2):r.v)+' '+unit+'</td></tr>';}).join(''):'<tr><td colspan="5" class="no">データなし</td></tr>')+'</tbody></table></div>';
}};

function rehabHTML(r,done){var inj=D.i.find(function(x){return x.id===r.injId;}),p=D.p.find(function(x){return x.id===r.pid;});if(!p||!inj)return'';if(!r.stageDates)r.stageDates=[];var dl=inj.returnDate?Math.max(0,Math.ceil((new Date(inj.returnDate)-new Date())/86400000)):null;var sl=STG.length-1-r.stage,dps=dl!==null&&sl>0?Math.round(dl/sl):null;
var h='<div class="card card-click" style="margin-bottom:10px" onclick="goInjuryDetail('+inj.id+')"><div style="display:flex;align-items:center;gap:10px;margin-bottom:.5rem">'+avH(p,36)+'<div style="flex:1"><div style="font-size:14px;font-weight:600">'+p.name+' — '+injLabel(inj)+'</div><div style="font-size:12px;color:var(--text-secondary)">受傷: '+fmt(inj.date)+(inj.returnDate?' | 復帰予定: '+fmt(inj.returnDate):'')+'</div></div>'+(dl!==null?'<span class="bd bd-b">残り約'+dl+'日</span>':'')+'</div><div class="stage-line" onclick="event.stopPropagation()">';
for(var idx=0;idx<STG.length;idx++){var isDone=idx<r.stage,isCur=idx===r.stage,sd=r.stageDates[idx]||'',est=!isDone&&!isCur&&dps?'約'+(dps*(idx-r.stage))+'日後':'';h+='<div class="stage-item">'+(idx<STG.length-1?'<div class="stage-conn'+(isDone?' done':'')+'"></div>':'')+'<div class="stage-dot'+(isDone?' done':'')+(isCur?' cur':'')+'">'+(isDone?'✓':(idx+1))+'</div><div class="stage-label">'+STG[idx]+'</div>'+(sd?'<div class="stage-date">'+fmt(sd)+'</div>':isCur?'<div class="stage-est" style="color:var(--blue);font-weight:600">現在</div>':est?'<div class="stage-est">'+est+'</div>':'')+'</div>';}
h+='</div>';
if(!done){h+='<div onclick="event.stopPropagation()" style="display:flex;gap:6px;margin-bottom:.5rem"><button class="btn btn-sm" onclick="advStage('+r.id+')">次の段階へ ▶</button><button class="btn btn-sm btn-d" onclick="prevStage('+r.id+')">◀ 前に戻す</button><button class="btn btn-sm" onclick="editStageDate('+r.id+','+r.stage+')">日付設定</button><button class="btn btn-sm" onclick="goAddRehabLog('+r.id+')">+ ログ</button></div>';}
if(r.logs&&r.logs.length){h+='<div style="font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:4px">ログ</div>';r.logs.slice(-5).reverse().forEach(function(lg,li){var ri=r.logs.length-1-li;h+='<div class="log-row" onclick="event.stopPropagation()"><span style="min-width:65px;color:var(--text-secondary)">'+fmt(lg.date)+'</span><div class="pain-dot" style="background:'+rpeColor(lg.pain)+'">'+lg.pain+'</div><span style="flex:1">'+(lg.content||'-')+'</span><span style="color:var(--text-secondary)">ROM:'+(lg.rom||'-')+'%</span><button class="btn btn-sm" style="margin-left:4px" onclick="goEditRehabLog('+r.id+','+ri+')">編集</button></div>';});}
if(!done&&r.logs&&r.logs.length>=2)h+='<div class="grid g2" style="margin-top:.75rem"><div class="chart-wrap" style="height:160px"><canvas id="cp-'+r.id+'"></canvas></div><div class="chart-wrap" style="height:160px"><canvas id="cr-'+r.id+'"></canvas></div></div>';return h+'</div>';}

function getTodayPickup(){
  var lastMeasured=D.p.map(function(p){var recs=D.bc.filter(function(r){return r.pid===p.id;});var last=recs.length?recs.sort(function(a,b){return b.date.localeCompare(a.date);})[0].date:'2000-01-01';return{pid:p.id,last:last};});
  lastMeasured.sort(function(a,b){return a.last.localeCompare(b.last);});
  // Use today's date as seed to keep consistent during the day
  var today=todayStr();var seed=0;for(var ci=0;ci<today.length;ci++)seed+=today.charCodeAt(ci);
  // Pick 5 from the least recently measured, with slight shuffle
  var pool=lastMeasured.slice(0,15);
  for(var si=pool.length-1;si>0;si--){var j=(seed+si)%si;var tmp=pool[si];pool[si]=pool[j];pool[j]=tmp;}
  return pool.slice(0,5).map(function(x){return x.pid;});
}

function exportCSV(type){
  var csv='',fname='';
  var pName=function(pid){var p=D.p.find(function(x){return x.id===pid;});return p?p.name:'不明';};
  if(type==='players'){fname='選手情報.csv';csv='名前,ポジション,学年,生年月日,身長,体重,出身校,特記事項\n';D.p.forEach(function(p){csv+='"'+p.name+'","'+p.position+'",'+p.year+',"'+(p.dob||'')+'","'+(p.height||'')+'","'+(p.weight||'')+'","'+(p.school||'')+'","'+(p.note||'')+'"\n';});}
  else if(type==='injuries'){fname='怪我履歴.csv';csv='選手,日付,左右,部位,種類,復帰予定,受診済,ステータス,メモ\n';D.i.forEach(function(i){csv+='"'+pName(i.pid)+'","'+i.date+'","'+(i.side||'')+'","'+i.part+'","'+i.type+'","'+(i.returnDate||'')+'","'+(i.hospitalVisited?'済':'未')+'","'+(i.resolved?'回復済':'治療中')+'","'+(i.note||'').replace(/"/g,'""')+'"\n';});}
  else if(type==='physical'){fname='フィジカル記録.csv';csv='選手,日付,SQ,BP,DL,BIG3,ブロンコ\n';D.ph.forEach(function(r){csv+='"'+pName(r.pid)+'","'+r.date+'",'+(r.squat||'')+','+(r.bench||'')+','+(r.deadlift||'')+','+big3(r)+','+(r.bronco||'')+'\n';});}
  else if(type==='bodycomp'){fname='体組成.csv';csv='選手,日付,体重,体脂肪率,筋量\n';D.bc.forEach(function(r){csv+='"'+pName(r.pid)+'","'+r.date+'",'+(r.weight||'')+','+(r.fat||'')+','+(r.muscle||'')+'\n';});}
  else if(type==='fatigue'){fname='疲労度.csv';csv='選手,日付,RPE,睡眠,TR時間,sRPE,メモ\n';D.f.forEach(function(r){csv+='"'+pName(r.pid)+'","'+r.date+'",'+r.rpe+','+r.sleep+','+(r.duration||0)+','+(r.rpe*(r.duration||0))+',"'+(r.note||'')+'"\n';});}
  else if(type==='absence'){fname='欠席データ.csv';csv='日付,名称,欠席者,理由\n';D.a.forEach(function(s){if(!s.absentees.length){csv+='"'+s.date+'","'+(s.label||'')+'","なし",""\n';}else{s.absentees.forEach(function(a){csv+='"'+s.date+'","'+(s.label||'')+'","'+pName(a.pid)+'","'+(a.reason||'')+'"\n';});}});}
  else if(type==='matchday'){fname='試合日レポート.csv';csv='選手,日付,出場,試合前疲労,試合後疲労,睡眠,朝食,怪我,部位,痛み,足攣り\n';D.md.forEach(function(m){csv+='"'+pName(m.pid)+'","'+m.date+'","'+m.role+'",'+m.fatiguePre+','+m.fatiguePost+',"'+m.sleepTime+'→'+m.wakeTime+'","'+m.breakfast+'","'+(m.injured?'あり':'なし')+'","'+(m.injured?(m.injSide||'')+m.injPart:'')+'","'+(m.injured?m.injPainNow:'')+'","'+(m.cramp?'あり':'なし')+'"\n';});}
  if(!csv)return;
  var bom='\uFEFF';
  var blob=new Blob([bom+csv],{type:'text/csv;charset=utf-8;'});
  var link=document.createElement('a');link.href=URL.createObjectURL(blob);link.download=fname;link.click();
}

// Dashboard body comp alerts
function getDashBCAlerts(){
  var today=todayStr();var pickup=getTodayPickup();
  return pickup.filter(function(pid){return!D.bc.some(function(r){return r.pid===pid&&r.date===today;});}).map(function(pid){var p=D.p.find(function(x){return x.id===pid;});return p?p.name:'';}).filter(Boolean);
}

function goEditPhys(phid){var r=D.ph.find(function(x){return x.id===phid;});if(!r)return;var p=D.p.find(function(x){return x.id===r.pid;});pushView('フィジカル記録を編集','<div style="max-width:520px"><div class="form-box"><div class="form-title">'+(p?p.name:'不明')+' の記録を編集</div><div class="grid g2" style="gap:14px"><div class="fl"><label>測定日</label><input class="ipt" type="date" id="eph-date" value="'+(r.date||'')+'"></div><div class="fl"><label>SQ MAX(kg)</label><input class="ipt" type="number" id="eph-sq" value="'+(r.squat||'')+'"></div><div class="fl"><label>BP MAX(kg)</label><input class="ipt" type="number" id="eph-bp" value="'+(r.bench||'')+'"></div><div class="fl"><label>DL MAX(kg)</label><input class="ipt" type="number" id="eph-dl" value="'+(r.deadlift||'')+'"></div><div class="fl" style="grid-column:1/-1"><label>ブロンコ(秒)</label><input class="ipt" type="number" step="0.1" id="eph-br" value="'+(r.bronco||'')+'"></div></div></div><div style="display:flex;gap:8px;justify-content:flex-end"><button class="btn" onclick="popView()">キャンセル</button><button class="btn btn-p" onclick="doEditPhys('+phid+')">保存</button></div></div>');}
function doEditPhys(phid){var r=D.ph.find(function(x){return x.id===phid;});if(!r)return;r.date=document.getElementById('eph-date').value;r.squat=parseFloat(document.getElementById('eph-sq').value)||null;r.bench=parseFloat(document.getElementById('eph-bp').value)||null;r.deadlift=parseFloat(document.getElementById('eph-dl').value)||null;r.bronco=parseFloat(document.getElementById('eph-br').value)||null;sv('ph');alert('保存しました ✓');popView();}
function doDelPhys(phid){if(!confirm('この記録を削除しますか？'))return;D.ph=D.ph.filter(function(x){return x.id!==phid;});sv('ph');V.physical();}
function mvTab(i){document.querySelectorAll('#main-ct .tab').forEach(function(t,j){t.classList.toggle('ac',j===i);});document.querySelectorAll('#main-ct .tc').forEach(function(t,j){t.classList.toggle('ac',j===i);});}
function goMatchDetail(mid){
  var m=D.md.find(function(x){return x.id===mid;});if(!m)return;var p=D.p.find(function(x){return x.id===m.pid;});
  pushView((p?p.name:'')+'の試合記録 '+fmt(m.date),'<div style="max-width:600px">'+
  '<div class="form-box"><div class="form-title">基本情報</div>'+
  '<div class="detail-row"><span class="detail-label">選手</span><span class="detail-value">'+(p?p.name:'不明')+'</span></div>'+
  '<div class="detail-row"><span class="detail-label">日付</span><span class="detail-value">'+fmt(m.date)+'</span></div>'+
  '<div class="detail-row"><span class="detail-label">出場</span><span class="detail-value"><span class="bd bd-p">'+m.role+'</span></span></div>'+
  '<div class="detail-row"><span class="detail-label">試合前疲労</span><span class="detail-value">'+m.fatiguePre+'/6</span></div>'+
  '<div class="detail-row"><span class="detail-label">試合後疲労</span><span class="detail-value">'+m.fatiguePost+'/6</span></div>'+
  '<div class="detail-row"><span class="detail-label">前日の睡眠</span><span class="detail-value">'+m.sleepTime+' → '+m.wakeTime+'</span></div>'+
  '<div class="detail-row"><span class="detail-label">朝食</span><span class="detail-value">'+m.breakfast+(m.breakfastDetail?' ('+m.breakfastDetail+')':'')+'</span></div></div>'+
  (m.injured?'<div class="form-box"><div class="form-title" style="color:var(--red)">怪我情報</div>'+
  '<div class="detail-row"><span class="detail-label">部位</span><span class="detail-value">'+(m.injSide||'')+m.injPart+' '+m.injType+'</span></div>'+
  '<div class="detail-row"><span class="detail-label">怪我の回数</span><span class="detail-value">'+m.injHistory+'</span></div>'+
  '<div class="detail-row"><span class="detail-label">状況</span><span class="detail-value">'+(m.injHow||'-')+'</span></div>'+
  '<div class="detail-row"><span class="detail-label">受傷時の痛み</span><span class="detail-value">'+m.injPainAt+'/10</span></div>'+
  '<div class="detail-row"><span class="detail-label">現在の痛み</span><span class="detail-value">'+m.injPainNow+'/10</span></div>'+
  '<div class="detail-row"><span class="detail-label">プレー続行</span><span class="detail-value">'+m.injContinued+'</span></div></div>':'')+
  (m.cramp?'<div class="form-box"><div class="form-title">足の攣り</div><div class="detail-row"><span class="detail-label">頻度</span><span class="detail-value">'+m.crampFreq+'</span></div></div>':'')+
  '</div>');
}
