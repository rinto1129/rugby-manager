function avH(p,sz){var i=p.id%AVC.length,ini=p.name?p.name.split(/\s+/).map(function(w){return w[0];}).join('').slice(0,2):'?';return p.photo?'<div class="av" style="width:'+sz+'px;height:'+sz+'px;background-image:url('+p.photo+')"></div>':'<div class="av" style="width:'+sz+'px;height:'+sz+'px;background:'+AVC[i][0]+';color:'+AVC[i][1]+';font-size:'+Math.round(sz*.35)+'px">'+ini+'</div>';}
function fmt(d){return d?d.replace(/-/g,'/'):'-';}
function pSt(pid){var a=D.i.find(function(x){return x.pid===pid&&!x.resolved;});if(!a)return'ok';var rh=D.r.find(function(x){return x.injId===a.id;});return(rh&&rh.stage>0)?'rehab':'inj';}
function getBest(pid,f){var rs=D.ph.filter(function(x){return x.pid===pid&&x[f]!=null;});if(!rs.length)return null;return f==='bronco'?Math.min.apply(null,rs.map(function(x){return x[f];})):Math.max.apply(null,rs.map(function(x){return x[f];}));}
function big3(r){return(r.squat||0)+(r.bench||0)+(r.deadlift||0);}
function broncoFmt(sec){if(!sec&&sec!==0)return'-';var m=Math.floor(sec/60),s=Math.round(sec%60);return m+'分'+String(s).padStart(2,'0')+'秒';}
function broncoFromInputs(minId,secId){var m=parseInt(document.getElementById(minId).value)||0,s=parseInt(document.getElementById(secId).value)||0;return m*60+s||null;}
function broncoMinSec(sec){return{m:sec?Math.floor(sec/60):0,s:sec?Math.round(sec%60):0};}
function medH(pid){var l=D.i.filter(function(x){return x.pid===pid;});return l.length?l.map(function(x){return fmt(x.date)+' '+(x.side||'')+x.part+x.type;}).join('、'):'なし';}
function dC(k){if(charts[k]){charts[k].destroy();delete charts[k];}}
function dCA(){for(var k in charts){charts[k].destroy();}charts={};}
function monStr(){var n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0');}
function $m(){return document.getElementById('main-ct');}
function todayStr(){return new Date().toISOString().split('T')[0];}
function absCnt(pid,mon){return D.a.filter(function(s){return s.date.startsWith(mon);}).reduce(function(c,s){return c+(s.absentees.some(function(x){return x.pid===pid;})?1:0);},0);}
function absCntAll(pid){return D.a.reduce(function(c,s){return c+(s.absentees.some(function(x){return x.pid===pid;})?1:0);},0);}
function totSess(mon){return D.a.filter(function(s){return s.date.startsWith(mon);}).length;}
function rpeColor(v){return v<=3?'var(--green)':v<=6?'var(--amber)':'var(--red)';}
function sleepColor(v){return v>=7?'var(--green)':v>=5?'var(--amber)':'var(--red)';}
function getLatestFatigue(pid){var recs=D.f.filter(function(x){return x.pid===pid;}).sort(function(a,b){return b.date.localeCompare(a.date);});return recs.length?recs[0]:null;}
function injLabel(inj){return (inj.side||'')+inj.part+(inj.partOther?' ('+inj.partOther+')':'')+' '+inj.type+(inj.typeOther?' ('+inj.typeOther+')':'');}

function openPSearch(id){document.getElementById(id+'-list').classList.add('open');}

rank:function(){
  var m=document.getElementById('rkm')?document.getElementById('rkm').value:'squat',yf=document.getElementById('rky')?document.getElementById('rky').value:'',pf=document.getElementById('rkp')?document.getElementById('rkp').value:'';
  var labels={squat:'スクワットMAX',bench:'ベンチプレスMAX',deadlift:'デッドリフトMAX',bronco:'ブロンコテスト',big3:'BIG3合計',big3perkg:'体重あたりBIG3'};
  var rk=D.p.filter(function(p){if(yf&&String(p.year)!==yf)return false;if(pf&&p.position!==pf)return false;return true;}).map(function(p){var rs=D.ph.filter(function(x){return x.pid===p.id;});var v=null;
  if(m==='bronco'){var vs=rs.filter(function(x){return x.bronco;}).map(function(x){return x.bronco;});v=vs.length?Math.min.apply(null,vs):null;}
  else if(m==='big3'){v=rs.length?Math.max.apply(null,rs.map(function(x){return big3(x);})):null;}
  else if(m==='big3perkg'){var w=parseFloat(p.weight);if(w){var b=rs.length?Math.max.apply(null,rs.map(function(x){return big3(x);})):0;v=b?Math.round(b/w*100)/100:null;}}
  else{var vs2=rs.filter(function(x){return x[m];}).map(function(x){return x[m];});v=vs2.length?Math.max.apply(null,vs2):null;}
  return{p:p,v:v};}).filter(function(x){return x.v!==null;});
  m==='bronco'?rk.sort(function(a,b){return a.v-b.v;}):rk.sort(function(a,b){return b.v-a.v;});
  var unit=m==='bronco'?'':m==='big3perkg'?'倍':'kg';
  $m().innerHTML='<div class="srch"><select class="ipt" style="width:auto" id="rkm" onchange="V.rank()">'+Object.keys(labels).map(function(k){return'<option value="'+k+'"'+(m===k?' selected':'')+'>'+labels[k]+'</option>';}).join('')+'</select><select class="ipt" style="width:auto" id="rky" onchange="V.rank()"><option value="">全学年</option>'+[1,2,3,4].map(function(y){return'<option value="'+y+'"'+(yf===String(y)?' selected':'')+'>'+y+'年</option>';}).join('')+'</select><select class="ipt" style="width:auto" id="rkp" onchange="V.rank()"><option value="">全ポジション</option>'+POS.map(function(p){return'<option'+(pf===p?' selected':'')+'>'+p+'</option>';}).join('')+'</select></div><div class="card" style="padding:0;overflow:hidden"><table class="rank-tbl"><thead><tr><th style="width:50px">#</th><th>選手名</th><th>POS</th><th>学年</th><th style="text-align:right">'+labels[m]+'</th></tr></thead><tbody>'+(rk.length?rk.map(function(r,i){return'<tr style="cursor:pointer" onclick="goPlayerDetail('+r.p.id+')"><td style="font-weight:600;'+(i===0?'color:#BA7517':i===1?'color:#888780':i===2?'color:#993C1D':'')+'">'+(["🥇","🥈","🥉"][i]||(i+1))+'</td><td><div style="display:flex;align-items:center;gap:8px">'+avH(r.p,26)+'<span style="font-weight:600">'+r.p.name+'</span></div></td><td>'+(r.p.position||'-')+'</td><td>'+(r.p.year||'-')+'年</td><td style="text-align:right;font-weight:600">'+(m==='big3perkg'?r.v.toFixed(2):r.v)+' '+unit+'</td></tr>';}).join(''):'<tr><td colspan="5" class="no">データなし</td></tr>')+'</tbody></table></div>';
},
calendar:function(){
  var now=new Date();
  var ym=document.getElementById('cal-ym')?document.getElementById('cal-ym').value:(now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0'));
  var parts=ym.split('-');var yr=parseInt(parts[0]),mo=parseInt(parts[1])-1;
  var firstDay=new Date(yr,mo,1);var lastDay=new Date(yr,mo+1,0);
  var eventsThisMonth=D.cal.filter(function(e){return e.date&&e.date.startsWith(ym);}).sort(function(a,b){return a.date.localeCompare(b.date);});
  // Calendar grid
  var DOW=['日','月','火','水','木','金','土'];
  var calH='<div style="display:flex;align-items:center;gap:10px;margin-bottom:1rem"><button class="btn" onclick="calNavMonth(-1,\''+ym+'\')">◀</button><input type="month" class="ipt" id="cal-ym" value="'+ym+'" style="width:auto;flex:1" onchange="V.calendar()"><button class="btn" onclick="calNavMonth(1,\''+ym+'\')">▶</button></div>';
  calH+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:1rem">';
  DOW.forEach(function(d,i){calH+='<div style="text-align:center;font-size:11px;font-weight:600;padding:4px;color:'+(i===0?'var(--red)':i===6?'var(--blue)':'var(--text-secondary)')+'">'+d+'</div>';});
  // blank cells before first day
  for(var bi=0;bi<firstDay.getDay();bi++)calH+='<div></div>';
  var todayS=todayStr();
  for(var d=1;d<=lastDay.getDate();d++){
    var ds=yr+'-'+String(mo+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var dayEvts=D.cal.filter(function(e){return e.date===ds;});
    var isToday=ds===todayS;
    var dow=(firstDay.getDay()+d-1)%7;
    calH+='<div onclick="calDayClick(\''+ds+'\')" style="min-height:52px;border:1px solid var(--border-tertiary);border-radius:6px;padding:4px;cursor:pointer;background:'+(isToday?'var(--blue-bg)':'var(--bg-primary)')+';transition:background .1s" onmouseover="this.style.background=\'var(--bg-secondary)\'" onmouseout="this.style.background=\''+(isToday?'var(--blue-bg)':'var(--bg-primary)')+'\'">';
    calH+='<div style="font-size:12px;font-weight:'+(isToday?'700':'500')+';color:'+(isToday?'var(--blue)':dow===0?'var(--red)':dow===6?'var(--blue)':'var(--text-primary)')+'">'+d+'</div>';
    dayEvts.forEach(function(e){var color=e.type==='match'?'var(--purple)':e.type==='practice'?'var(--green)':e.type==='off'?'var(--amber)':'var(--blue)';calH+='<div style="font-size:9px;background:'+color+';color:#fff;border-radius:3px;padding:1px 4px;margin-top:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">'+e.title+'</div>';});
    calH+='</div>';
  }
  calH+='</div>';
  // Event list for month
  calH+='<div style="font-size:14px;font-weight:600;margin-bottom:.5rem">イベント一覧</div>';
  if(eventsThisMonth.length){
    calH+=eventsThisMonth.map(function(e){
      var color=e.type==='match'?'var(--purple)':e.type==='practice'?'var(--green)':e.type==='off'?'var(--amber)':'var(--blue)';
      var typelabel=e.type==='match'?'試合':e.type==='practice'?'練習':e.type==='off'?'オフ':'その他';
      return'<div class="card" style="margin-bottom:6px;padding:.65rem 1rem;display:flex;align-items:center;gap:10px"><div style="width:8px;height:8px;border-radius:50%;background:'+color+';flex-shrink:0"></div><div style="flex:1"><div style="font-weight:600;font-size:13px">'+fmt(e.date)+' '+e.title+'</div>'+(e.detail?'<div style="font-size:11px;color:var(--text-secondary)">'+e.detail+'</div>':'')+'</div><span class="bd" style="background:'+color+'20;color:'+color+'">'+typelabel+'</span>'+(e.type==='match'?'<button class="btn btn-sm" onclick="goSelectMatchMembers(\''+e.id+'\',\''+e.date+'\')">出場選手設定</button>':'')+
      '<button class="btn btn-sm btn-d" onclick="delCalEvent(\''+e.id+'\')">削除</button></div>';
    }).join('');
  } else {
    calH+='<div class="no">この月のイベントはありません</div>';
  }
  $m().innerHTML=calH;
}};

function rehabHTML(r,done){var inj=D.i.find(function(x){return x.id===r.injId;}),p=D.p.find(function(x){return x.id===r.pid;});if(!p||!inj)return'';if(!r.stageDates)r.stageDates=[];var dl=inj.returnDate?Math.max(0,Math.ceil((new Date(inj.returnDate)-new Date())/86400000)):null;var sl=STG.length-1-r.stage,dps=dl!==null&&sl>0?Math.round(dl/sl):null;
var h='<div class="card card-click" style="margin-bottom:10px" onclick="goInjuryDetail('+inj.id+')"><div style="display:flex;align-items:center;gap:10px;margin-bottom:.5rem">'+avH(p,36)+'<div style="flex:1"><div style="font-size:14px;font-weight:600">'+p.name+' — '+injLabel(inj)+'</div><div style="font-size:12px;color:var(--text-secondary)">受傷: '+fmt(inj.date)+(inj.returnDate?' | 復帰予定: '+fmt(inj.returnDate):'')+'</div></div>'+(dl!==null?'<span class="bd bd-b">残り約'+dl+'日</span>':'')+'</div><div class="stage-line" onclick="event.stopPropagation()">';
for(var idx=0;idx<STG.length;idx++){var isDone=idx<r.stage,isCur=idx===r.stage,sd=r.stageDates[idx]||'',est=!isDone&&!isCur&&dps?'約'+(dps*(idx-r.stage))+'日後':'';h+='<div class="stage-item">'+(idx<STG.length-1?'<div class="stage-conn'+(isDone?' done':'')+'"></div>':'')+'<div class="stage-dot'+(isDone?' done':'')+(isCur?' cur':'')+'">'+(isDone?'✓':(idx+1))+'</div><div class="stage-label">'+STG[idx]+'</div>'+(sd?'<div class="stage-date">'+fmt(sd)+'</div>':isCur?'<div class="stage-est" style="color:var(--blue);font-weight:600">現在</div>':est?'<div class="stage-est">'+est+'</div>':'')+'</div>';}
h+='</div>';
if(!done){h+='<div onclick="event.stopPropagation()" style="display:flex;gap:6px;margin-bottom:.5rem"><button class="btn btn-sm" onclick="advStage('+r.id+')">次の段階へ ▶</button><button class="btn btn-sm btn-d" onclick="prevStage('+r.id+')">◀ 前に戻す</button><button class="btn btn-sm" onclick="editStageDate('+r.id+','+r.stage+')">日付設定</button><button class="btn btn-sm" onclick="goAddRehabLog('+r.id+')">+ ログ</button></div>';}

if(!done&&r.logs&&r.logs.length>=2)h+='<div class="grid g2" style="margin-top:.75rem"><div class="chart-wrap" style="height:160px"><canvas id="cp-'+r.id+'"></canvas></div><div class="chart-wrap" style="height:160px"><canvas id="cr-'+r.id+'"></canvas></div></div>';return h+'</div>';}

function getTodayPickup(){
  var lastMeasured=D.p.map(function(p){var recs=D.bc.filter(function(r){return r.pid===p.id;});var last=recs.length?recs.sort(function(a,b){return b.date.localeCompare(a.date);})[0].date:'2000-01-01';return{pid:p.id,last:last};});
  lastMeasured.sort(function(a,b){return a.last.localeCompare(b.last);});
  // Use today's date as seed to keep consistent during the day
  var today=todayStr();var seed=0;for(var ci=0;ci<today.length;ci++)seed+=today.charCodeAt(ci);
  // Pick 5 from the least recently measured, with slight shuffle
  var pool=lastMeasured.slice(0,15);
  for(var si=pool.length-1;si>0;si--){var j=(seed+si)%si;var tmp=pool[si];pool[si]=pool[j];pool[j]=tmp;}
  return pool.slice(0,5).map(function(x){return x.pid;});
}

function doAddTapeSlot(){
  var date=document.getElementById('ts-date').value;
  var type=document.getElementById('ts-type').value;
  var interval=parseInt(document.getElementById('ts-interval').value)||5;
  if(!date)return alert('日付を入力してください');
  if(!D.tapeslot)D.tapeslot=[];
  var totalSlots=0;
  for(var si=0;si<tapeStaffRowCount;si++){
    var nameEl=document.getElementById('ts-sname-'+si);
    var startEl=document.getElementById('ts-start-'+si);
    var endEl=document.getElementById('ts-end-'+si);
    var capEl=document.getElementById('ts-cap-'+si);
    if(!nameEl||!startEl||!endEl)continue;
    var sname=nameEl.value.trim()||('担当者'+(si+1));
    var startT=startEl.value,endT=endEl.value;
    var cap=parseInt((capEl||{}).value)||1;
    if(startT>=endT){alert(sname+': 終了時間は開始時間より後にしてください');return;}
    var cur=startT;
    while(cur<endT){
      var pts=cur.split(':');var hh=parseInt(pts[0]),mm=parseInt(pts[1]);
      var nm=mm+interval;var nh=hh+Math.floor(nm/60);nm=nm%60;
      if(nh>=24)break;
      var next=String(nh).padStart(2,'0')+':'+String(nm).padStart(2,'0');
      if(next>endT)break;
      D.tapeslot.push({id:Date.now()+totalSlots*17,date:date,type:type,startTime:cur,endTime:next,capacity:cap,staff:sname});
      totalSlots++;cur=next;
    }
  }
  if(!totalSlots)return alert('枠が作成できませんでした。時間を確認してください。');
  tapeStaffRowCount=1;
  sv('tapeslot');
  alert(totalSlots+'枠を作成しました ✓');
  popView();
}

function toggleTomorrowCat(injId,ci){
  var cat=RCATS[ci];if(!cat)return;
  if(!D.rplan)D.rplan=[];
  var plan=D.rplan.find(function(x){return x.injId===injId;});
  if(!plan){plan={injId:injId,tplId:null,tomorrowCats:[]};D.rplan.push(plan);}
  if(!plan.tomorrowCats)plan.tomorrowCats=[];
  var i=plan.tomorrowCats.indexOf(cat);
  if(i>=0){plan.tomorrowCats.splice(i,1);}else{plan.tomorrowCats.push(cat);}
  sv('rplan');
  var sel=plan.tomorrowCats.indexOf(cat)>=0;
  var el=document.getElementById('tmr-'+ci);
  if(el){
    el.style.borderColor=sel?RCAT_COLOR[cat]:'var(--border-secondary)';
    el.style.background=sel?RCAT_BG[cat]:'var(--bg-primary)';
    el.style.color=sel?RCAT_COLOR[cat]:'var(--text-primary)';
  }
}

  '<div class="detail-row"><span class="detail-label">試合前疲労</span><span class="detail-value">'+m.fatiguePre+'/6</span></div>'+
  '<div class="detail-row"><span class="detail-label">試合後疲労</span><span class="detail-value">'+m.fatiguePost+'/6</span></div>'+
  '<div class="detail-row"><span class="detail-label">前日の睡眠</span><span class="detail-value">'+m.sleepTime+' → '+m.wakeTime+'</span></div>'+
  '<div class="detail-row"><span class="detail-label">朝食</span><span class="detail-value">'+m.breakfast+(m.breakfastDetail?' ('+m.breakfastDetail+')':'')+'</span></div></div>'+
  (m.injured?'<div class="form-box"><div class="form-title" style="color:var(--red)">怪我情報</div>'+
  '<div class="detail-row"><span class="detail-label">部位</span><span class="detail-value">'+(m.injSide||'')+m.injPart+' '+m.injType+'</span></div>'+
  '<div class="detail-row"><span class="detail-label">怪我の回数</span><span class="detail-value">'+m.injHistory+'</span></div>'+
  '<div class="detail-row"><span class="detail-label">状況</span><span class="detail-value">'+(m.injHow||'-')+'</span></div>'+
  '<div class="detail-row"><span class="detail-label">受傷時の痛み</span><span class="detail-value">'+m.injPainAt+'/10</span></div>'+
  '<div class="detail-row"><span class="detail-label">現在の痛み</span><span class="detail-value">'+m.injPainNow+'/10</span></div>'+
  '<div class="detail-row"><span class="detail-label">プレー続行</span><span class="detail-value">'+m.injContinued+'</span></div></div>':'')+
  (m.cramp?'<div class="form-box"><div class="form-title">足の攣り</div><div class="detail-row"><span class="detail-label">頻度</span><span class="detail-value">'+m.crampFreq+'</span></div></div>':'')+
  '</div>');
}
// === INJURY APPROVAL ===
function approveInjury(iid){
  var inj=D.i.find(function(x){return x.id===iid;});
  if(!inj)return;
  inj.approved=true;
  sv('i');
  V.dash();
}
function rejectInjury(iid){
  if(!confirm('この怪我報告を却下（非表示に）しますか？'))return;
  var inj=D.i.find(function(x){return x.id===iid;});
  if(!inj)return;
  inj.approved=false;
  inj.resolved=true; // hide from active injury list
  sv('i');
  V.dash();
}

// === CALENDAR FUNCTIONS ===
function escAnn(s){return (s||'').replace(/'/g,'\\\'').replace(/\n/g,' ');}
function getThisWeekEvents(){
  var now=new Date();
  var mon=new Date(now);mon.setDate(now.getDate()-now.getDay()+1);
  var sun=new Date(mon);sun.setDate(mon.getDate()+6);
  var monS=mon.toISOString().split('T')[0],sunS=sun.toISOString().split('T')[0];
  return D.cal.filter(function(e){return e.date>=monS&&e.date<=sunS;}).sort(function(a,b){return a.date.localeCompare(b.date);});
}
function calNavMonth(dir,ym){
  var p=ym.split('-');var yr=parseInt(p[0]),mo=parseInt(p[1])-1+dir;
  if(mo<0){mo=11;yr--;}if(mo>11){mo=0;yr++;}
  var nym=yr+'-'+String(mo+1).padStart(2,'0');
  document.getElementById('cal-ym').value=nym;
  V.calendar();
}
function calDayClick(date){
  // Show events for that day and option to add
  var dayEvts=D.cal.filter(function(e){return e.date===date;});
  var h='<div style="font-size:17px;font-weight:600;margin-bottom:12px">📅 '+fmt(date)+'</div>';
  if(dayEvts.length){
    h+='<div class="form-box"><div class="form-title">この日のイベント</div>';
    dayEvts.forEach(function(e){
      var typelabel=e.type==='match'?'試合':e.type==='practice'?'練習':e.type==='off'?'オフ':'その他';
      h+='<div class="log-row"><span style="font-weight:600;flex:1">'+e.title+'</span><span class="bd bd-p">'+typelabel+'</span>'+(e.type==='match'?'<button class="btn btn-sm" onclick="goSelectMatchMembers(\''+e.id+'\',\''+e.date+'\')">出場選手</button>':'')+'<button class="btn btn-sm btn-d" onclick="delCalEvent(\''+e.id+'\');popView()">削除</button></div>';
      if(e.detail)h+='<div style="font-size:12px;color:var(--text-secondary);padding:4px 0">'+e.detail+'</div>';
    });
    h+='</div>';
  }
  h+='<div class="form-box"><div class="form-title">イベントを追加</div>'+calEventFormHTML(date)+'<button class="btn btn-p" onclick="doAddCalEventForDate(\''+date+'\')">追加する</button></div>';
  pushView(fmt(date)+' のイベント',h);
}
function calEventFormHTML(defaultDate){
  return '<div class="grid g2" style="gap:10px;margin-bottom:10px">'+
  '<div class="fl"><label>種別</label><select class="ipt" id="cef-type"><option value="match">試合</option><option value="practice">練習</option><option value="off">オフ</option><option value="other">その他</option></select></div>'+
  '<div class="fl"><label>タイトル</label><input class="ipt" id="cef-title" placeholder="例: vs ○○大学"></div>'+
  '</div><div class="fl" style="margin-bottom:10px"><label>詳細（場所・時間等）</label><input class="ipt" id="cef-detail" placeholder="例: ホーム 14:00 KO"></div>';
}
function goAddCalEvent(){
  var td=todayStr();
  pushView('イベント追加','<div style="max-width:520px"><div class="form-box"><div class="form-title">カレンダーイベント</div>'+
  '<div class="fl" style="margin-bottom:10px"><label>日付</label><input class="ipt" type="date" id="cal-date" value="'+td+'"></div>'+
  calEventFormHTML(td)+
  '</div><div style="display:flex;gap:8px;justify-content:flex-end"><button class="btn" onclick="popView()">キャンセル</button><button class="btn btn-p" onclick="doAddCalEvent()">追加</button></div></div>');
}
function doAddCalEvent(){
  var date=document.getElementById('cal-date').value;
  var title=document.getElementById('cef-title').value.trim();
  if(!date||!title)return alert('日付とタイトルを入力してください');
  D.cal.push({id:Date.now(),date:date,type:document.getElementById('cef-type').value,title:title,detail:document.getElementById('cef-detail').value});
  sv('cal');popView();
}
function doAddCalEventForDate(date){
  var title=document.getElementById('cef-title').value.trim();
  if(!title)return alert('タイトルを入力してください');
  D.cal.push({id:Date.now(),date:date,type:document.getElementById('cef-type').value,title:title,detail:document.getElementById('cef-detail').value});
  sv('cal');popView();
}
function delCalEvent(evid){
  if(!confirm('このイベントを削除しますか？'))return;
  var eid=parseInt(evid)||evid;
  D.cal=D.cal.filter(function(e){return e.id!==eid&&e.id!==evid;});
  sv('cal');
  V.calendar&&V.calendar();
}
function fillAnnounceFromEvent(date,title,detail){
  var el=document.getElementById('ann-text');
  if(!el)return;
  var line=fmt(date)+' '+title+(detail?' （'+detail+'）':'');
  el.value=(el.value?el.value+'\n':'')+line;
  el.focus();
}
function postAnnounceFromCalendar(){
  var evts=getThisWeekEvents();
  if(!evts.length)return alert('今週のカレンダーイベントがありません');
  var lines=evts.map(function(e){var typelabel=e.type==='match'?'【試合】':e.type==='practice'?'【練習】':e.type==='off'?'【オフ】':'';return fmt(e.date)+' '+typelabel+e.title+(e.detail?' '+e.detail:'');});
  var text='📅 今週の予定\n'+lines.join('\n');
  D.ann.push({id:Date.now(),date:todayStr(),text:text,targetPid:null});
  sv('ann');
  alert('投稿しました ✓');
  V.dash();
}

// === MATCH MEMBER SELECTION ===
var matchSelTemp={};
function goSelectMatchMembers(evid,date){
  var eid=parseInt(evid)||evid;
  var existing=D.matchsel||[];
  matchSelTemp={};
  existing.forEach(function(pid){matchSelTemp[pid]=true;});
  var h='<div style="max-width:600px"><div style="font-size:13px;color:var(--text-secondary);margin-bottom:12px">試合当日にチェックが必要な選手を選択してください（'+fmt(date)+'）</div>';
  h+='<div style="margin-bottom:10px;display:flex;gap:8px"><button class="btn btn-sm" onclick="matchSelAll(true)">全員選択</button><button class="btn btn-sm" onclick="matchSelAll(false)">全員解除</button></div>';
  h+='<div style="max-height:500px;overflow-y:auto;border:1px solid var(--border-tertiary);border-radius:var(--radius)">';
  D.p.forEach(function(p){
    var chk=matchSelTemp[p.id]?true:false;
    h+='<div class="cb-row" id="ms-row-'+p.id+'" onclick="toggleMatchSel('+p.id+')" style="'+(chk?'background:var(--blue-bg)':'')+'">'+
    '<div class="cb-box'+(chk?' on':'')+'" id="ms-cb-'+p.id+'">'+(chk?'✓':'')+'</div>'+
    avH(p,28)+'<span style="font-weight:600;flex:1">'+p.name+'</span><span style="color:var(--text-secondary);font-size:11px">'+p.position+'/'+p.year+'年</span></div>';
  });
  h+='</div><div style="margin-top:10px;font-size:12px;color:var(--text-secondary)">選択中: <span id="ms-cnt" style="font-weight:600;color:var(--blue)">'+existing.length+'</span>名</div>';
  h+='<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px"><button class="btn" onclick="popView()">キャンセル</button><button class="btn btn-p" onclick="saveMatchSel()">保存</button></div></div>';
  pushView('試合日チェック対象選手（'+fmt(date)+'）',h);
}
function toggleMatchSel(pid){
  matchSelTemp[pid]=!matchSelTemp[pid];
  var cb=document.getElementById('ms-cb-'+pid),row=document.getElementById('ms-row-'+pid);
  if(matchSelTemp[pid]){cb.classList.add('on');cb.textContent='✓';row.style.background='var(--blue-bg)';}
  else{cb.classList.remove('on');cb.textContent='';row.style.background='';}
  var cnt=Object.values(matchSelTemp).filter(Boolean).length;
  document.getElementById('ms-cnt').textContent=cnt;
}
function matchSelAll(sel){
  D.p.forEach(function(p){
    matchSelTemp[p.id]=sel;
    var cb=document.getElementById('ms-cb-'+p.id),row=document.getElementById('ms-row-'+p.id);
    if(cb&&row){if(sel){cb.classList.add('on');cb.textContent='✓';row.style.background='var(--blue-bg)';}else{cb.classList.remove('on');cb.textContent='';row.style.background='';}}
  });
  document.getElementById('ms-cnt').textContent=sel?D.p.length:0;
}
function saveMatchSel(){
  D.matchsel=Object.keys(matchSelTemp).filter(function(k){return matchSelTemp[k];}).map(function(k){return parseInt(k);});
  sv('matchsel');
  alert('保存しました ✓');
  popView();
}

ld().then(function(){document.getElementById('loading-screen').style.display='none';startListeners();V.dash();}).catch(function(e){console.error(e);document.getElementById('loading-screen').innerHTML='<div style="text-align:center"><div style="font-size:40px;margin-bottom:16px">⚠️</div><div>読み込みエラー</div><button onclick="location.reload()" style="margin-top:12px;padding:8px 16px;cursor:pointer">再試行</button></div>';});
</script>
