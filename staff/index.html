var WG_DAYS=[{k:'mon',label:'月'},{k:'wed',label:'水'},{k:'fri',label:'金'}];

// 選手サイトと同じ推定1RM最新値取得（レビューLow-1: staffへ移植）
function getLatestE1RM(pid){
  var recs=(D.e1rm||[]).filter(function(x){return idEq(x.pid,pid);}).sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});
  var result={};
  EST_BASES.forEach(function(b){
    for(var i=0;i<recs.length;i++){
      if(recs[i].values&&recs[i].values[b.k]){result[b.k]={e1rm:recs[i].values[b.k].e1rm,date:recs[i].date};break;}
    }
  });
  return result;
}
// BIG3総合強度: 各種目「最新e1rm→実測ph(getBest)」の合計。1種目でも欠測ならnull（対象外）
function groupScore(pid){
  var e1=getLatestE1RM(pid);var total=0;
  for(var i=0;i<STD_LIFTS.length;i++){
    var l=STD_LIFTS[i];
    var v=(e1[l.ph]&&e1[l.ph].e1rm)?e1[l.ph].e1rm:getBest(pid,l.ph);
    if(v==null)return null;
    total+=v;
  }
  return total;
}
// 端数規則（プランMedium-2）: n<=4→1グループ / n=5→3+2 / n%3==0→全3 /
//   n%3==1→末尾4人組1つ / n%3==2→末尾4人組2つ(n>=8)。組めないnは最後の組が2人以下でも許容。
function chunkGroups(arr){
  var n=arr.length,i;
  if(n===0)return [];
  if(n<=4)return [arr.slice()];
  if(n===5)return [arr.slice(0,3),arr.slice(3)];
  var r=n%3,sizes=[];
  if(r===0){for(i=0;i<n/3;i++)sizes.push(3);}
  else if(r===1){for(i=0;i<(n-4)/3;i++)sizes.push(3);sizes.push(4);}
  else{for(i=0;i<(n-8)/3;i++)sizes.push(3);sizes.push(4);sizes.push(4);}
  var groups=[],idx=0;
  sizes.forEach(function(s){groups.push(arr.slice(idx,idx+s));idx+=s;});
  return groups;
}
// シフト自動振分（優先順位: 5限→午前固定 > 本人希望 > 遠方→午後 > 人数バランス）
function tgAutoAssignShifts(pids){
  var am=[],pm=[],reason={},autos=[];
  pids.forEach(function(pid){
    var p=D.p.find(function(x){return idEq(x.id,pid);});
    var wg=(p&&p.wg&&typeof p.wg==='object')?p.wg:{};
    if(wg.f5&&wg.f5.length>0){am.push(pid);reason[pid]='5限';}
    else if(wg.pref==='am'){am.push(pid);reason[pid]='希望';}
    else if(wg.pref==='pm'){pm.push(pid);reason[pid]='希望';}
    else if(wg.far){pm.push(pid);reason[pid]='遠方';}
    else autos.push(pid);
  });
  // バランス配置（強度降順→id昇順で安定化。少ない方へ）
  autos.sort(function(a,b){var sa=groupScore(a),sb=groupScore(b);var na=(sa==null?-1:sa),nb=(sb==null?-1:sb);if(nb!==na)return nb-na;return (a>b?1:(a<b?-1:0));});
  autos.forEach(function(pid){if(am.length<=pm.length)am.push(pid);else pm.push(pid);reason[pid]='自動';});
  return {am:am,pm:pm,reason:reason};
}
// シフト内で強度順に3人組。対象外(スコア欠測)は別リスト。
function tgMakeGroups(pids){
  var scored=[],unscored=[];
  pids.forEach(function(pid){var s=groupScore(pid);if(s==null)unscored.push(pid);else scored.push({pid:pid,s:s});});
  scored.sort(function(a,b){if(b.s!==a.s)return b.s-a.s;return (a.pid>b.pid?1:(a.pid<b.pid?-1:0));});
  return {groups:chunkGroups(scored.map(function(x){return x.pid;})),unscored:unscored};
}

// ---- 画面状態（onSnapshot再描画をまたいで維持。undefined時のみ初期化）----
function tgInit(force){
  if(window._tgState&&!force)return;
  var last=(D.tgroup&&D.tgroup.length)?D.tgroup[D.tgroup.length-1]:null;
  if(last){
    window._tgState={
      mode:last.mode||'ampm',
      excluded:(last.excluded||[]).slice(),
      shifts:(last.shifts||[]).map(function(sh){return {key:sh.key,label:sh.label,groups:(sh.groups||[]).map(function(g){return g.slice();}),pool:[]};}),
      generated:!!(last.shifts&&last.shifts.length),
      _reason:{},sel:null
    };
  }else{
    var injured=[];D.p.forEach(function(p){if(D.i.some(function(x){return idEq(x.pid,p.id)&&!x.resolved;}))injured.push(p.id);});
    window._tgState={mode:'ampm',excluded:injured,shifts:[],generated:false,_reason:{},sel:null};
  }
}
function tgResetState(){if(!confirm('編集中の内容を破棄して初期状態に戻しますか？'))return;tgInit(true);V.tgroup();}
function tgSetMode(m){var st=window._tgState;if(st.mode===m)return;st.mode=m;st.shifts=[];st.generated=false;st.sel=null;V.tgroup();}
function tgToggleExclude(pid){
  var st=window._tgState;var i=st.excluded.findIndex(function(e){return idEq(e,pid);});
  if(i>=0)st.excluded.splice(i,1);else st.excluded.push(pid);
  st.generated=false;st.shifts=[];st.sel=null;V.tgroup(); // 除外変更→グループは作り直しが必要
}
function tgGenerate(){
  var st=window._tgState;
  var elig=D.p.filter(function(p){return !st.excluded.some(function(e){return idEq(e,p.id);});}).map(function(p){return p.id;});
  if(st.mode==='single'){
    var mg=tgMakeGroups(elig);
    st.shifts=[{key:'all',label:'',groups:mg.groups,pool:mg.unscored}];st._reason={};
  }else{
    var as=tgAutoAssignShifts(elig);
    var amg=tgMakeGroups(as.am),pmg=tgMakeGroups(as.pm);
    st.shifts=[{key:'am',label:'午前',groups:amg.groups,pool:amg.unscored},{key:'pm',label:'午後',groups:pmg.groups,pool:pmg.unscored}];
    st._reason=as.reason;
  }
  st.generated=true;st.sel=null;V.tgroup();
}
// チップ2タップで入替（シフト跨ぎも可）
function tgChipTap(si,gi,sli){
  var st=window._tgState;var loc={si:si,gi:gi,sli:sli};
  if(!st.sel){st.sel=loc;V.tgroup();return;}
  if(st.sel.si===si&&st.sel.gi===gi&&st.sel.sli===sli){st.sel=null;V.tgroup();return;}
  var a=st.sel,b=loc;
  var pa=st.shifts[a.si].groups[a.gi][a.sli],pb=st.shifts[b.si].groups[b.gi][b.sli];
  st.shifts[a.si].groups[a.gi][a.sli]=pb;st.shifts[b.si].groups[b.gi][b.sli]=pa;
  if(a.si!==b.si){st._reason=st._reason||{};st._reason[pa]='手動';st._reason[pb]='手動';}
  st.sel=null;V.tgroup();
}
// 対象外(スコア欠測)を手動でそのシフトの最小グループへ追加
function tgAddUnscored(si,pi){
  var st=window._tgState;var sh=st.shifts[si];var pid=sh.pool[pi];if(pid==null)return;
  sh.pool.splice(pi,1);
  if(!sh.groups.length)sh.groups.push([pid]);
  else{var mi=0;for(var i=1;i<sh.groups.length;i++){if(sh.groups[i].length<sh.groups[mi].length)mi=i;}sh.groups[mi].push(pid);}
  st.sel=null;V.tgroup();
}
function tgSave(){
  var st=window._tgState;
  if(!st.generated||!st.shifts.length){alert('先に「自動で組む」でグループを作成してください');return;}
  var rec={id:Date.now(),ts:Date.now(),date:todayStr(),by:'staff',mode:st.mode,excluded:st.excluded.slice(),
    shifts:st.shifts.map(function(sh){return {key:sh.key,label:sh.label,groups:sh.groups.filter(function(g){return g.length>0;}).map(function(g){return g.slice();})};})};
  svSafeUpdate('tgroup',function(){return [rec];},function(){toast('グループを保存しました');});
}
// 申告バッジ（1選手分）
function tgWgBadges(p){
  var wg=(p.wg&&typeof p.wg==='object')?p.wg:null;

  if(wg.f5&&wg.f5.length)out.push(chip('5限:'+wg.f5.map(function(k){return dayLbl[k]||k;}).join(''),'var(--blue)'));

// ============================================================
// ===== GPS・スタッツ取込エンジン（Phase9）: パーサ / 名前照合 / 保存。純関数はdev/test_gps.jsで検証 =====
// ============================================================
// 名前正規化: NFKC（全角→半角等）+ 空白除去（半角/全角）。異体字（渡邉/渡邊, 﨑/崎）はNFKCで吸収されないためgmap辞書で救済する
function normName(s){return String(s==null?'':s).normalize('NFKC').replace(/[\s　]+/g,'').trim();}
// フルネーム（「姓 名」）から姓（先頭トークン）を取り出して正規化。GPS/スタッツ表は姓のみのため
function surnameKey(name){return normName(String(name==null?'':name).split(/[\s　]+/)[0]);}
// セル値→数値（カンマ/単位/全角数字混在に耐性・空/非数はNaN）
function gpsNum(v){
  if(v==null||v==='')return NaN;
  if(typeof v==='number')return isFinite(v)?v:NaN;
  var s=String(v).normalize('NFKC').replace(/[^0-9.\-]/g,'');
  if(s===''||s==='-'||s==='.')return NaN;
  var n=parseFloat(s);return isFinite(n)?n:NaN;
}
// 採用打ち切り用の非選手トークン（ヘッダ/小計/空）
var GPS_STOPNAMES={'':1,'0':1,'名前':1,'氏名':1,'選手名':1,'選手':1,'前半':1,'後半':1,'合計':1,'平均':1,'計':1,'小計':1,'総計':1,'総合計':1,'総合':1,'全体':1,'チーム':1,'total':1,'name':1};
// 固定列プリセット（0基点index）: 各指標は「前半/後半/合計」の3列組→合計列(3列目)を採用。第2ブロックはゾーン合計
var GPS_COLS={name:1,min:4,distKm:7,wr:10,hsr:13,hsrN:16,spr:19,sprN:22,max:25,zone0:28};
// グリッド（行×セル配列。SheetJS sheet_to_json({header:1}) / TSV split 相当）→ 行データ配列
// 返り値: {rows:[{name,min,dist(m),wr(m/min),hsr(m),hsrN,spr(m),sprN,max(m/s),z:[z1..z6](m)}], scanned, stopped}
function parseGpsGrid(grid){
  var out=[],started=false,stopped='';
  if(!grid||!grid.length)return{rows:out,scanned:0,stopped:'empty'};
  var scanned=0;
  for(var i=0;i<grid.length;i++){
    var row=grid[i]||[];
    var rawName=row[GPS_COLS.name];
    var nm=normName(rawName);
    // 名前セルの妥当性: 空/停止語/『列N』ヘッダ/数字のみ は選手名でない
    var isName=nm&&!GPS_STOPNAMES[nm.toLowerCase?nm.toLowerCase():nm]&&!GPS_STOPNAMES[nm]&&!/^列\d*$/.test(nm)&&!/^[0-9.]+$/.test(nm);
    var min=gpsNum(row[GPS_COLS.min]);
    if(!isName||!isFinite(min)){
      if(started){stopped='row'+i;break;} // データ開始後の非採用行で打ち切り（下部のふりがな/別表/小計を拾わない）
      continue; // データ開始前（ヘッダ/空行）はスキップ
    }
    started=true;scanned++;
    var km=gpsNum(row[GPS_COLS.distKm]);
    var z=[];for(var zi=0;zi<6;zi++){var zv=gpsNum(row[GPS_COLS.zone0+zi]);z.push(isFinite(zv)?Math.round(zv):0);}
    var g=function(idx,r){var v=gpsNum(row[idx]);if(!isFinite(v))return 0;var f=Math.pow(10,r||0);return Math.round(v*f)/f;};
    out.push({
      name:String(rawName).trim(),
      min:g(GPS_COLS.min,1),
      dist:isFinite(km)?Math.round(km*1000):0,   // km→m で保存
      wr:g(GPS_COLS.wr,1),
      hsr:g(GPS_COLS.hsr,0),
      hsrN:g(GPS_COLS.hsrN,0),
      spr:g(GPS_COLS.spr,0),
      sprN:g(GPS_COLS.sprN,0),
      max:g(GPS_COLS.max,2),
      z:z
    });
  }
  return{rows:out,scanned:scanned,stopped:stopped};
}
// TSV文字列 → グリッド → parseGpsGrid（Excelコピー / Claude変換PDFの受け皿。列レイアウトはExcelと同一）
function parseGpsTSV(text){
  var lines=String(text==null?'':text).replace(/\r\n?/g,'\n').split('\n');
  var grid=lines.map(function(l){return l.split('\t');});
  return parseGpsGrid(grid);
}
// 名前照合: 各行に pid / 候補cand / status(auto|ambig|none) を付与。gmapMap={正規化名:pid}
function matchGpsRows(rows,players,gmapMap){
  gmapMap=gmapMap||{};
  var bySurname={};
  (players||[]).forEach(function(p){var k=surnameKey(p.name);if(!k)return;(bySurname[k]=bySurname[k]||[]).push(p.id);});
  return (rows||[]).map(function(r){
    var key=normName(r.name);
    var pid=null,cand=[],status='none';
    if(gmapMap[key]!=null&&(players||[]).some(function(p){return idEq(p.id,gmapMap[key]);})){
      pid=gmapMap[key];status='auto';
    }else{
      var m=bySurname[key]||[];
      if(m.length===1){pid=m[0];status='auto';}
      else if(m.length>1){cand=m.slice();status='ambig';}
      else{status='none';}
    }
    return{name:r.name,key:key,row:r,pid:pid,cand:cand,status:status};
  });
}
// gmap辞書（[{id:'namemap',map:{正規化名:pid}}]）から {正規化名:pid} を取り出す
function gpsNameMap(){
  var rec=(D.gmap||[]).find(function(x){return x&&x.id==='namemap';});
  return (rec&&rec.map&&typeof rec.map==='object')?rec.map:{};
}
// 確定行を保存: gr_<id>へ行データ直set → 成功後gs索引へsvSafeUpdate（冪等）→ gmap学習
// matched=matchGpsRows結果（pid確定済みのみ採用）, meta={id?,date,kind,label,team}
function gpsCommit(matched,meta,onDone,onError){
  var use=(matched||[]).filter(function(m){return m.pid!=null;});
  var rowData=use.map(function(m){var r=m.row;return{pid:m.pid,min:r.min,dist:r.dist,wr:r.wr,hsr:r.hsr,hsrN:r.hsrN,spr:r.spr,sprN:r.sprN,max:r.max,z:r.z};});
  var id=meta.id!=null?meta.id:Date.now();
  // gmap学習: 姓が複数の実在選手に一致するkey（曖昧姓）は学習しない。学習すると次回取込で同姓の全行を1人に誤って自動割当してしまう（同姓は毎回ユーザー確認が正解）。姓が一意/未登録（異体字・ニックネーム救済）だけ学習する
  var _snCount={};(D.p||[]).forEach(function(p){var sk=surnameKey(p.name);if(sk)_snCount[sk]=(_snCount[sk]||0)+1;});
  var learn={};use.forEach(function(m){if(m.key&&!(_snCount[m.key]>1))learn[m.key]=m.pid;});
  db.collection('appdata').doc('gr_'+id).set({data:JSON.stringify(rowData)}).then(function(){
    svSafeUpdate('gs',function(latest){
      if(latest.some(function(s){return idEq(s.id,id);}))return latest; // 冪等: 同id再追加しない
      latest.push({id:id,date:meta.date,kind:meta.kind,label:meta.label||'',team:meta.team||'',n:rowData.length,ts:Date.now()});
      return latest;
    },function(){
      _grCache[id]=rowData;
      // gmap学習（確定名→pid）。学習失敗は保存本体の成否に影響させない
      svSafeUpdate('gmap',function(latest){
        var rec=latest.find(function(x){return x&&x.id==='namemap';});
        if(!rec){rec={id:'namemap',map:{}};latest.push(rec);}
        if(!rec.map||typeof rec.map!=='object')rec.map={};
        Object.keys(learn).forEach(function(k){rec.map[k]=learn[k];});
        return latest;
      });
      if(onDone)onDone(id,rowData.length);
    },onError);
  }).catch(function(e){console.error('gr save error',e);if(onError)onError(e);else alert('保存に失敗しました');});
}
// gr_<id>行データをオンデマンド取得（参照キャッシュ）
var _grCache={};
function gpsLoadRows(id,cb){
  if(_grCache[id]){if(cb)cb(_grCache[id]);return;}
  db.collection('appdata').doc('gr_'+id).get().then(function(doc){
    var rows=[];if(doc.exists){try{var q=JSON.parse(doc.data().data);if(Array.isArray(q))rows=q;}catch(e){}}
    _grCache[id]=rows;if(cb)cb(rows);
  }).catch(function(e){console.error('gr load error',e);if(cb)cb([]);});
}
// セッション削除: gs索引から除去 → gr_docを空化（.deleteは環境非依存でないため空set・索引から消えれば実質削除）
function gpsDelSession(id){
  svSafeUpdate('gs',function(latest){return latest.filter(function(s){return!idEq(s.id,id);});},function(){
    delete _grCache[id];
    db.collection('appdata').doc('gr_'+id).set({data:'[]'}).catch(function(e){console.error('gr del error',e);});
  });
}

// ===== 試合スタッツ取込エンジン（Phase9-D）: 貼付TSV専用。名前照合はGPSと同じmatchGpsRowsを再利用 =====
// ============================================================
// 固定列プリセット（0基点index）: No/名前/タックル計/成功%/Dominate/Good/Passive/Miss/Steal/キャリー/LB/Beaten/Pass+/Pass-
// ※成功%(pct)は取り込まない（成功率はDominate/Good/Passive/Missから算出＝データ源に依存しない）
var MS_COLS={no:0,name:1,tkl:2,pct:3,tklD:4,tklG:5,tklP:6,tklM:7,steal:8,carry:9,lb:10,beaten:11,passP:12,passM:13};
// グリッド（行×セル配列。TSV split相当）→ 行データ配列。B列(名前)が実名の行だけ採用、データ開始後の非採用行で打ち切り（GPSと同じ規則）
// 返り値: {rows:[{name,no,tkl,tklD,tklG,tklP,tklM,steal,carry,lb,beaten,passP,passM}], scanned, stopped}
function parseMstatGrid(grid){
  var out=[],started=false,stopped='';
  if(!grid||!grid.length)return{rows:out,scanned:0,stopped:'empty'};
  var scanned=0;
  for(var i=0;i<grid.length;i++){
    var row=grid[i]||[];
    var rawName=row[MS_COLS.name];
    var nm=normName(rawName);
    // 名前セルの妥当性: 空/停止語/『列N』ヘッダ/数字のみ は選手名でない（GPS_STOPNAMESを共用）
    var isName=nm&&!GPS_STOPNAMES[nm.toLowerCase?nm.toLowerCase():nm]&&!GPS_STOPNAMES[nm]&&!/^列\d*$/.test(nm)&&!/^[0-9.]+$/.test(nm);
    if(!isName){
      if(started){stopped='row'+i;break;} // データ開始後の非採用行で打ち切り（下部の合計/別表を拾わない）
      continue; // データ開始前（ヘッダ/空行）はスキップ
    }
    started=true;scanned++;
    var gi=function(idx){var v=gpsNum(row[idx]);return isFinite(v)?Math.round(v):0;};
    out.push({
      name:String(rawName).trim(),
      no:gi(MS_COLS.no),
      tkl:gi(MS_COLS.tkl),tklD:gi(MS_COLS.tklD),tklG:gi(MS_COLS.tklG),tklP:gi(MS_COLS.tklP),tklM:gi(MS_COLS.tklM),
      steal:gi(MS_COLS.steal),carry:gi(MS_COLS.carry),lb:gi(MS_COLS.lb),beaten:gi(MS_COLS.beaten),
      passP:gi(MS_COLS.passP),passM:gi(MS_COLS.passM)
    });
  }
  return{rows:out,scanned:scanned,stopped:stopped};
}
// TSV文字列 → グリッド → parseMstatGrid（Excelコピー / Claude変換PDFの受け皿）
function parseMstatTSV(text){
  var lines=String(text==null?'':text).replace(/\r\n?/g,'\n').split('\n');
  var grid=lines.map(function(l){return l.split('\t');});
  return parseMstatGrid(grid);
}
// 確定行を保存: msr_<id>へ行データ直set → 成功後ms索引へsvSafeUpdate（冪等）→ gmap学習（GPSと同じ辞書を共用）

// ---- GPS取込ウィザード（V.gps）: 状態はwindow._gpsWiz、workbookは_gpsWB。ステップ遷移はnav非経由のため既存revealは再発火しない ----
var _gpsWB=null;
function gpsWizInit(force){
  if(force||!window._gpsWiz){
    window._gpsWiz={type:'gps',step:1,parse:null,matched:[],meta:{date:'',kind:'practice',label:'',team:''},sheets:null,sheetName:'',savedId:null,savedN:0,saving:false,saveId:null,err:''};
  }
}
function gpsReset(){window._gpsWiz=null;_gpsWB=null;gpsWizInit(true);V.gps();}
function gpsSetType(t){gpsWizInit();var st=window._gpsWiz;if(st.type!==t){st.type=t;st.step=1;st.parse=null;st.matched=[];st.sheets=null;st.sheetName='';st.savedId=null;st.saving=false;st.saveId=null;_gpsWB=null;st.meta.kind=(t==='match')?'match':'practice';}st.err='';V.gps();}
function gpsReadMeta(){
  var st=window._gpsWiz;

  var k=document.getElementById('gps-kind');if(k&&k.value)st.meta.kind=k.value;

function gpsFile(input){
  var f=input&&input.files&&input.files[0];if(!f)return;
  var st=window._gpsWiz;st.err='読み込み中…';
  var rd=new FileReader();
  rd.onload=function(e){

      var wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});

      gpsUseSheet(pick);

  };

function gpsUseSheet(name){

function gpsBadge(status){
  if(status==='auto')return{cls:'gx-badge-ok',html:ic('i-check-c',12)+' 自動一致'};
  if(status==='manual')return{cls:'gx-badge-ok',html:ic('i-check-c',12)+' 選択済'};
  if(status==='ambig')return{cls:'gx-badge-amb',html:ic('i-warn',12)+' 要確認'};
  if(status==='excluded')return{cls:'',html:'除外'};
  return{cls:'gx-badge-no',html:ic('i-warn',12)+' 未一致'};
}
function gpsPlayerOpts(sel,cands){
  var ps=D.p.slice();
  if(cands&&cands.length)ps.sort(function(a,b){var ca=cands.some(function(c){return idEq(c,a.id);})?0:1;var cb=cands.some(function(c){return idEq(c,b.id);})?0:1;return ca-cb;});
  var h='<option value=""'+(sel==null?' selected':'')+'>― 除外 ―</option>';
  ps.forEach(function(p){var isc=cands&&cands.some(function(c){return idEq(c,p.id);});h+='<option value="'+p.id+'"'+(sel!=null&&idEq(sel,p.id)?' selected':'')+'>'+(isc?'★ ':'')+escapeHtml(p.name)+'</option>';});
  return h;
}
function gpsSetMatch(idx,val){
  var st=window._gpsWiz;var m=st.matched[idx];if(!m)return;
  if(val===''||val==null){m.pid=null;m.status='excluded';}
  else{m.pid=isNaN(+val)?val:+val;m.status='manual';}
  var b=document.getElementById('gpm-b-'+idx);if(b){var info=gpsBadge(m.status);b.className=info.cls;b.innerHTML=info.html;}
  gpsUpdateMatchSummary();
}
function gpsMatchStats(){
  var st=window._gpsWiz,save=0,warn=0,exc=0;
  (st.matched||[]).forEach(function(m){if(m.pid!=null)save++;else if(m.status==='excluded')exc++;else warn++;});
  return{save:save,warn:warn,exc:exc};
}
function gpsUpdateMatchSummary(){
  var s=gpsMatchStats();var el=document.getElementById('gps-msum');
  if(el)el.innerHTML='保存 <b class="gx-badge-ok">'+s.save+'名</b> ・ 要確認 <b'+(s.warn?' class="gx-badge-amb"':'')+'>'+s.warn+'名</b> ・ 除外 '+s.exc+'名';
  var nb=document.getElementById('gps-next3');if(nb)nb.disabled=(s.save===0);
}
function gpsToStep3(){window._gpsWiz.step=3;window._gpsWiz.err='';V.gps();}
function gpsBackStep(n){var st=window._gpsWiz;st.step=n;st.err='';st.saving=false;st.saveId=null;if(n===1)st.savedId=null;V.gps();}
function gpsDoSave(){
  var st=window._gpsWiz;
  if(st.saving)return; // 二重送信ガード（保存中のonSnapshot再描画でボタンが復活→再クリックしても無効）
  var s=gpsMatchStats();
  if(!s.save){st.err='保存対象の選手がいません';V.gps();return;}
  st.saving=true;
  if(!st.saveId)st.saveId=Date.now(); // 保存試行ごとにid固定＝万一再入してもgs索引の冪等ガードが効き重複しない
  var meta={id:st.saveId,date:st.meta.date,kind:st.meta.kind,label:st.meta.label,team:st.meta.team};
  V.gps(); // 再描画でボタンをdisabled（st.saving）に反映
  var okCb=function(id,n){st.saving=false;st.savedId=id;st.savedN=n;st.step=3;V.gps();};
  var errCb=function(){st.saving=false;st.saveId=null;st.err='保存に失敗しました。通信環境をご確認ください';V.gps();};
  if(st.type==='match')mstatCommit(st.matched,meta,okCb,errCb);
  else gpsCommit(st.matched,meta,okCb,errCb);
}
function gpsDelConfirm(id){var s=(D.gs||[]).find(function(x){return idEq(x.id,id);});if(!s)return;if(confirm((s.label||fmt(s.date))+' のセッションを削除しますか？（元に戻せません）'))gpsDelSession(id);}
function msDelConfirm(id){var s=(D.ms||[]).find(function(x){return idEq(x.id,id);});if(!s)return;if(confirm((s.label||fmt(s.date))+' の試合スタッツを削除しますか？（元に戻せません）'))msDelSession(id);}
function msDetail(id){
  var s=(D.ms||[]).find(function(x){return idEq(x.id,id);});if(!s)return;
  msLoadRows(id,function(rows){
    var sorted=rows.slice().sort(function(a,b){return ((b.tklD||0)+(b.tklG||0)+(b.tklP||0))-((a.tklD||0)+(a.tklG||0)+(a.tklP||0));});
    var h='<div style="max-width:900px">';
    h+='<div class="card" style="margin-bottom:12px;display:flex;gap:14px;flex-wrap:wrap;align-items:center">'+
      '<div style="font-weight:800;font-size:15px">'+escapeHtml(s.label||fmt(s.date))+'</div>'+
      '<span class="flag" style="background:var(--maroon);color:#fff">試合</span>'+
      (s.team?'<span style="font-size:12px;color:var(--text-secondary)">チーム'+escapeHtml(s.team)+'</span>':'')+
      '<span style="font-size:12px;color:var(--text-secondary)">'+fmt(s.date)+' ・ '+rows.length+'名</span></div>';
    h+='<div style="overflow-x:auto"><table class="tbl" style="min-width:640px"><thead><tr>'+
      '<th style="text-align:left">選手</th><th>タックル</th><th>成功率</th><th>Miss</th><th>キャリー</th><th>LB</th><th>Pass+/-</th></tr></thead><tbody>';
    sorted.forEach(function(r){
      var p=(D.p||[]).find(function(x){return idEq(x.id,r.pid);});
      var made=(r.tklD||0)+(r.tklG||0)+(r.tklP||0),att=made+(r.tklM||0);
      h+='<tr><td style="text-align:left">'+(p?escapeHtml(p.name):'?')+'</td>'+
        '<td style="text-align:center">'+(r.tkl||0)+'</td>'+
        '<td style="text-align:center">'+(att>0?Math.round(made/att*100)+'%':'—')+'</td>'+
        '<td style="text-align:center">'+(r.tklM||0)+'</td>'+
        '<td style="text-align:center">'+(r.carry||0)+'</td>'+
        '<td style="text-align:center">'+(r.lb||0)+'</td>'+
        '<td style="text-align:center">'+(r.passP||0)+' / '+(r.passM||0)+'</td></tr>';
    });
    h+='</tbody></table></div></div>';
    pushView(escapeHtml(s.label||fmt(s.date))+' の詳細',h);
  });
}
function gpsDetail(id){
  var s=(D.gs||[]).find(function(x){return idEq(x.id,id);});if(!s)return;
  gpsLoadRows(id,function(rows){
    var sorted=rows.slice().sort(function(a,b){return (b.dist||0)-(a.dist||0);});
    var h='<div style="max-width:900px">';
    h+='<div class="card" style="margin-bottom:12px;display:flex;gap:14px;flex-wrap:wrap;align-items:center">'+
      '<div style="font-weight:800;font-size:15px">'+escapeHtml(s.label||fmt(s.date))+'</div>'+
      '<span class="flag '+(s.kind==='match'?'flag-jp':'')+'" style="background:'+(s.kind==='match'?'var(--maroon)':'var(--green)')+';color:#fff">'+(s.kind==='match'?'試合':'練習')+'</span>'+
      (s.team?'<span style="font-size:12px;color:var(--text-secondary)">チーム'+escapeHtml(s.team)+'</span>':'')+
      '<span style="font-size:12px;color:var(--text-secondary)">'+fmt(s.date)+' ・ '+rows.length+'名</span></div>';
    h+='<div style="overflow-x:auto"><table class="tbl" style="min-width:640px"><thead><tr>'+
      '<th style="text-align:left">選手</th><th>出場(分)</th><th>距離(km)</th><th>最高速(km/h)</th><th>スプリント(m/回)</th><th>高強度ラン(m)</th></tr></thead><tbody>';
    sorted.forEach(function(r){
      var p=(D.p||[]).find(function(x){return idEq(x.id,r.pid);});
      h+='<tr><td style="text-align:left">'+(p?escapeHtml(p.name):'?')+'</td>'+
        '<td style="text-align:center">'+(r.min||0)+'</td>'+
        '<td style="text-align:center">'+((r.dist||0)/1000).toFixed(2)+'</td>'+
        '<td style="text-align:center">'+((r.max||0)*3.6).toFixed(1)+'</td>'+
        '<td style="text-align:center">'+(r.spr||0)+' / '+(r.sprN||0)+'</td>'+
        '<td style="text-align:center">'+(r.hsr||0)+'</td></tr>';
    });
    h+='</tbody></table></div></div>';
    pushView(escapeHtml(s.label||fmt(s.date))+' の詳細',h);
  });
}
V.gps=function(){
  dCA();gpsWizInit(false);
  var st=window._gpsWiz;
  // 描画世代キー: 変化した時だけ装飾アニメを付与（onSnapshot同一状態再描画では再発火しない＝冪等）
  var gen=st.type+'/'+st.step+'/'+(st.savedId?'done':'');
  var anim=(window._gpsGen!==gen);window._gpsGen=gen;
  var ai=anim?' gx-card-in':'';
  var h='<div style="max-width:920px">';
  h+='<div class="rv" style="font-size:12px;color:var(--text-secondary);margin-bottom:14px;line-height:1.6">GPS（平日練習・試合）と試合スタッツを取り込みます。Excelファイルを選ぶか、表をコピーして貼り付けてください。取り込んだ数値は選手のマイデータ・ランキングに反映されます。</div>';

  // ステップインジケータ
  var steps=['読み込み','選手照合','確認・保存'];
  h+='<div class="gx-wiz-steps rv">';
  steps.forEach(function(lbl,i){
    var n=i+1,cls=st.step===n?' ac':(st.step>n?' done':'');
    h+='<div class="gx-step'+cls+'"><span class="gx-step-dot">'+(st.step>n?ic('i-check',14):n)+'</span><span class="gx-step-lbl">'+lbl+'</span></div>';
    if(i<steps.length-1)h+='<div class="gx-step-bar'+(st.step>n?' fill':'')+'"><i></i></div>';
  });
  h+='</div>';

  if(st.err)h+='<div class="card" style="border-left:3px solid var(--red);background:var(--red-bg);color:var(--red);font-size:13px;font-weight:600;margin-bottom:12px">'+escapeHtml(st.err)+'</div>';

  // ===== STEP 1: 読み込み =====
  if(st.step===1){
    h+='<div class="card'+ai+'" style="margin-bottom:14px">';
    // 取込タイプ
    h+='<div style="display:flex;gap:6px;margin-bottom:14px">'+
      '<button class="btn'+(st.type==='gps'?' btn-p':'')+'" style="font-size:12px" onclick="gpsSetType(\'gps\')">'+ic('i-bolt',13)+' GPS（走行）</button>'+
      '<button class="btn'+(st.type==='match'?' btn-p':'')+'" style="font-size:12px" onclick="gpsSetType(\'match\')">'+ic('i-ball',13)+' 試合スタッツ</button></div>';
    if(st.type==='match'){
      // 貼り付けのみ（PDFはClaudeがTSV化 / 元Excelコピー）
      h+='<div style="font-size:12px;color:var(--text-secondary);margin-bottom:5px;line-height:1.6">試合スタッツ表（<b>No / 名前 / タックル計 / 成功% / Dominate / Good / Passive / Miss / Steal / キャリー / LB / Beaten / Pass+ / Pass-</b>）をコピーして貼り付けてください（ヘッダ含めてOK）。</div>'+
        '<textarea class="ipt" id="gps-tsv" placeholder="No＜tab＞名前＜tab＞タックル計… の表を貼り付け" style="min-height:110px;font-family:var(--font-num);font-size:12px"></textarea>'+
        '<button class="btn" style="margin-top:6px;font-size:12px" onclick="gpsParseMstatTSV()">'+ic('i-clipboard',13)+' 貼り付けを解析</button>';
      if(st.parse&&st.parse.rows.length){
        h+='<div class="card" style="margin-top:14px;background:var(--green-bg);border-left:3px solid var(--green)"><span style="font-size:13px;font-weight:700;color:var(--green)">'+ic('i-check-c',14)+' <span data-cu="'+st.parse.rows.length+'">'+st.parse.rows.length+'</span>名分のスタッツを検出しました</span></div>';
      }
    }else{
      // D&Dゾーン
      h+='<div class="gx-drop" id="gps-drop" ondragover="gpsDragOver(event)" ondragleave="gpsDragLeave(event)" ondrop="gpsDrop(event)" onclick="var f=document.getElementById(\'gps-file\');if(f)f.click();">'+
        '<div style="font-weight:800;font-size:14px;margin-bottom:4px">'+ic('i-download',18)+' Excelファイルを選択</div>'+
        '<div style="font-size:12px;color:var(--text-tertiary)">クリックで選択、またはここにドラッグ＆ドロップ（.xlsx）</div>'+
        '<input type="file" id="gps-file" accept=".xlsx,.xls" style="display:none" onchange="gpsFile(this)"></div>';
      // シート選択
      if(st.sheets&&st.sheets.length){
        h+='<div style="margin-top:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap"><span style="font-size:12px;color:var(--text-secondary)">シート:</span>'+
          '<select class="ipt" style="width:auto" onchange="gpsUseSheet(this.value)">'+
          st.sheets.map(function(n){return '<option'+(n===st.sheetName?' selected':'')+'>'+escapeHtml(n)+'</option>';}).join('')+'</select></div>';
      }
      // 貼り付け
      h+='<div style="margin-top:16px"><div style="font-size:12px;color:var(--text-secondary);margin-bottom:5px">または、Excelの表をコピーして貼り付け（ヘッダ含めてOK）</div>'+
        '<textarea class="ipt" id="gps-tsv" placeholder="Excelの表を選択してコピー → ここに貼り付け" style="min-height:90px;font-family:var(--font-num);font-size:12px"></textarea>'+
        '<button class="btn" style="margin-top:6px;font-size:12px" onclick="gpsParseTSV()">'+ic('i-clipboard',13)+' 貼り付けを解析</button></div>';
      // 検出結果
      if(st.parse&&st.parse.rows.length){
        h+='<div class="card" style="margin-top:14px;background:var(--green-bg);border-left:3px solid var(--green)"><span style="font-size:13px;font-weight:700;color:var(--green)">'+ic('i-check-c',14)+' <span data-cu="'+st.parse.rows.length+'">'+st.parse.rows.length+'</span>名分のデータを検出しました</span></div>';
      }
    }
    h+='</div>';

    // メタ情報（GPS=種別あり / 試合スタッツ=種別なし・常に試合）
    h+='<div class="card'+ai+'" style="margin-bottom:14px"><div style="font-weight:800;font-size:14px;margin-bottom:10px">'+(st.type==='match'?'試合情報':'セッション情報')+'</div>'+
      '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px">'+
      '<div class="fl"><label>日付</label><input type="date" class="ipt" id="gps-date" value="'+escapeHtml(st.meta.date||'')+'"></div>'+
      (st.type==='match'?'':'<div class="fl"><label>種別</label><select class="ipt" id="gps-kind"><option value="practice"'+(st.meta.kind!=='match'?' selected':'')+'>練習</option><option value="match"'+(st.meta.kind==='match'?' selected':'')+'>試合</option></select></div>')+
      '<div class="fl"><label>ラベル（任意）</label><input type="text" class="ipt" id="gps-label" placeholder="'+(st.type==='match'?'例: vs 福岡工大':'例: 火曜練習 / vs 福岡工大')+'" value="'+escapeHtml(st.meta.label||'')+'"></div>'+
      '<div class="fl"><label>チーム（任意）</label><select class="ipt" id="gps-team"><option value=""'+(!st.meta.team?' selected':'')+'>なし</option><option'+(st.meta.team==='A'?' selected':'')+'>A</option><option'+(st.meta.team==='B'?' selected':'')+'>B</option></select></div>'+
      '</div></div>';
    h+='<div style="display:flex;justify-content:flex-end"><button class="btn btn-p" onclick="gpsToStep2()">選手照合へ進む '+ic('i-chevron-r',14)+'</button></div>';
  }

  // ===== STEP 2: 選手照合 =====
  if(st.step===2){
    var s2=gpsMatchStats();
    h+='<div class="card'+ai+'" style="margin-bottom:14px">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:10px">'+
      '<div style="font-weight:800;font-size:14px">選手の照合</div>'+
      '<div id="gps-msum" style="font-size:12px;color:var(--text-secondary)">保存 <b class="gx-badge-ok">'+s2.save+'名</b> ・ 要確認 <b'+(s2.warn?' class="gx-badge-amb"':'')+'>'+s2.warn+'名</b> ・ 除外 '+s2.exc+'名</div></div>'+
      '<div style="font-size:11px;color:var(--text-tertiary);margin-bottom:10px">姓が一意なら自動一致。同姓が複数いる場合や未登録の場合は選択してください（★＝候補）。除外を選ぶとその行は保存されません。</div>';
    st.matched.forEach(function(m,idx){
      var info=gpsBadge(m.status);var r=m.row||{};
      h+='<div class="log-row" style="align-items:center;gap:10px;flex-wrap:wrap">'+
        '<div style="flex:0 0 90px;font-weight:700;font-size:13px">'+escapeHtml(m.name)+'</div>'+
        '<div style="flex:0 0 auto;min-width:130px;font-size:11px;color:var(--text-tertiary)">'+(st.type==='match'?('タックル'+(r.tkl||0)+'・キャリー'+(r.carry||0)):(((r.dist||0)/1000).toFixed(2)+'km ・ '+((r.max||0)*3.6).toFixed(1)+'km/h'))+'</div>'+
        '<div id="gpm-b-'+idx+'" class="'+info.cls+'" style="flex:0 0 auto;font-size:11px;min-width:70px">'+info.html+'</div>'+
        '<select class="ipt" style="flex:1 1 160px;min-width:140px" onchange="gpsSetMatch('+idx+',this.value)">'+gpsPlayerOpts(m.pid,m.cand)+'</select></div>';
    });
    h+='</div>';
    h+='<div style="display:flex;justify-content:space-between"><button class="btn" onclick="gpsBackStep(1)">'+ic('i-chevron-l',14)+' 戻る</button>'+
      '<button class="btn btn-p" id="gps-next3" onclick="gpsToStep3()"'+(s2.save===0?' disabled':'')+'>確認へ進む '+ic('i-chevron-r',14)+'</button></div>';
  }

  // ===== STEP 3: 確認・保存 / 完了 =====
  if(st.step===3){
    if(st.savedId){
      h+='<div class="card'+ai+'" style="margin-bottom:14px"><div class="gx-save-ok">'+
        '<svg viewBox="0 0 52 52" aria-hidden="true"><circle cx="26" cy="26" r="23" fill="none" stroke="var(--green)" stroke-width="2" opacity=".35"></circle><path class="gx-check'+(anim?' gx-check-draw':'')+'" d="M15 27 L23 35 L38 18"></path></svg>'+
        '<div style="font-weight:800;font-size:16px;margin-top:8px">'+st.savedN+'名分の'+(st.type==='match'?'試合スタッツ':'セッション')+'を保存しました</div>'+
        '<div style="font-size:12px;color:var(--text-secondary);margin-top:2px">選手のマイデータ・ランキングに反映されます</div></div></div>';
      h+='<div style="display:flex;justify-content:center;gap:8px"><button class="btn btn-p" onclick="gpsReset()">'+ic('i-plus',13)+' 続けて取り込む</button></div>';
    }else{
      var s3=gpsMatchStats();
      h+='<div class="card'+ai+'" style="margin-bottom:14px"><div style="font-weight:800;font-size:14px;margin-bottom:10px">保存内容の確認</div>'+
        '<div style="display:flex;gap:16px;flex-wrap:wrap;font-size:13px;margin-bottom:10px">'+
        '<div><span style="color:var(--text-secondary)">日付</span><br><b>'+escapeHtml(fmt(st.meta.date)||st.meta.date)+'</b></div>'+
        (st.type==='match'?'':'<div><span style="color:var(--text-secondary)">種別</span><br><b>'+(st.meta.kind==='match'?'試合':'練習')+'</b></div>')+
        (st.meta.label?'<div><span style="color:var(--text-secondary)">ラベル</span><br><b>'+escapeHtml(st.meta.label)+'</b></div>':'')+
        (st.meta.team?'<div><span style="color:var(--text-secondary)">チーム</span><br><b>'+escapeHtml(st.meta.team)+'</b></div>':'')+
        '<div><span style="color:var(--text-secondary)">保存人数</span><br><b class="gx-badge-ok" data-cu="'+s3.save+'">'+s3.save+'</b> 名</div></div>';
      var names=st.matched.filter(function(m){return m.pid!=null;}).map(function(m){var p=(D.p||[]).find(function(x){return idEq(x.id,m.pid);});return p?escapeHtml(p.name):escapeHtml(m.name);});
      h+='<div style="font-size:12px;color:var(--text-secondary);line-height:1.9">'+names.join(' ・ ')+'</div>';
      if(s3.warn)h+='<div style="margin-top:8px;font-size:12px;color:var(--amber)">'+ic('i-warn',12)+' '+s3.warn+'名は未照合のため保存されません（戻って選択できます）</div>';
      h+='</div>';
      h+='<div style="display:flex;justify-content:space-between"><button class="btn" onclick="gpsBackStep(2)">'+ic('i-chevron-l',14)+' 戻る</button>'+
        '<button class="btn btn-p" id="gps-save-btn" onclick="gpsDoSave()"'+(st.saving?' disabled':'')+'>'+ic('i-check',14)+' '+(st.saving?'保存中…':(st.type==='match'?'この試合スタッツを保存':'このセッションを保存'))+'</button></div>';
    }
  }

  // ===== 取込履歴（取込タイプに応じてGPS=D.gs / 試合スタッツ=D.msを表示）=====
  var isMatch=st.type==='match';
  var hist=(isMatch?(D.ms||[]):(D.gs||[])).slice().sort(function(a,b){return String(b.date||'').localeCompare(String(a.date||''))||(b.ts||0)-(a.ts||0);});
  h+='<div class="rv" style="margin-top:26px;font-weight:800;font-size:14px;display:flex;align-items:center;gap:6px">'+ic('i-clipboard',15)+' '+(isMatch?'試合スタッツ履歴':'GPS取込履歴')+' <span style="font-size:12px;color:var(--text-tertiary);font-weight:600">('+hist.length+')</span></div>';
  if(!hist.length){
    h+='<div class="no" style="margin-top:10px">まだ取り込まれた'+(isMatch?'試合スタッツ':'セッション')+'はありません。</div>';
  }else{
    h+='<div style="margin-top:10px">';
    hist.forEach(function(s){
      var isMt=isMatch||s.kind==='match'; // 試合スタッツは常に試合・GPSはkindで判定
      h+='<div class="log-row rv" style="align-items:center;gap:10px;flex-wrap:wrap">'+
        '<span class="flag" style="background:'+(isMt?'var(--maroon)':'var(--green)')+';color:#fff;flex:0 0 auto">'+(isMt?'試合':'練習')+'</span>'+
        '<div style="flex:1 1 160px;min-width:0"><div style="font-size:13px;font-weight:700">'+escapeHtml(s.label||fmt(s.date))+(s.team?' <span style="font-size:11px;color:var(--text-secondary)">('+escapeHtml(s.team)+')</span>':'')+'</div>'+
        '<div style="font-size:11px;color:var(--text-tertiary)">'+fmt(s.date)+' ・ '+(s.n||0)+'名</div></div>'+
        '<button class="btn btn-sm" onclick="'+(isMatch?'msDetail':'gpsDetail')+'('+JSON.stringify(s.id)+')">'+ic('i-search',12)+' 詳細</button>'+
        '<button class="btn btn-sm" onclick="'+(isMatch?'msDelConfirm':'gpsDelConfirm')+'('+JSON.stringify(s.id)+')">'+ic('i-trash',12)+'</button></div>';
    });
    h+='</div>';
  }

  h+='</div>';
  $m().innerHTML=h;
};

        // 実施「人数」= programId一致のfitness tlogをpidでユニーク化（延べ件数ではない。反復実施で水増ししない）
        var doneCnt=(function(){var s={};tlogAll().forEach(function(l){if(l&&l.fitness&&idEq(l.programId,mn.id))s[String(l.pid)]=1;});return Object.keys(s).length;})();
        h+='<div class="card card-click" style="margin-bottom:8px;border-left:3px solid var(--green)" onclick="goFitProgDetail(\''+mn.id+'\')">'+

          ''+ic('i-chevron-r',16,'var(--text-tertiary)')+'</div></div>';
      });
    }
  }else{
    // 実施状況
    h+=renderTrainingStatus();
  }
  $m().innerHTML=h;
};

function renderTMenuExList(){

    return'<div class="card" style="margin-bottom:8px;padding:12px">'+
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">'+

      '<div style="display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end">'+

        '<div style="width:64px"><label style="font-size:11px;color:var(--text-secondary)">セット</label><input class="ipt" type="number" min="1" value="'+(ex.sets||'')+'" oninput="updTMenuEx('+i+',\'sets\',this.value)" placeholder="3"></div>'+
        '<div style="width:64px"><label style="font-size:11px;color:var(--text-secondary)">レップ</label><input class="ipt" type="number" min="1" value="'+(ex.reps||'')+'" oninput="updTMenuEx('+i+',\'reps\',this.value)" placeholder="5"></div>'+
        '<div style="width:64px"><label style="font-size:11px;color:var(--text-secondary)">RIR</label><input class="ipt" type="number" min="0" max="10" value="'+(ex.rir!=null&&ex.rir!==''?ex.rir:'')+'" oninput="updTMenuEx('+i+',\'rir\',this.value)" placeholder="2"></div>'+
      '</div>'+
      '<div class="fl" style="margin-top:8px"><label style="font-size:11px;color:var(--text-secondary)">注意点・コツ（任意）</label><textarea class="ipt" style="min-height:48px" oninput="updTMenuEx('+i+',\'note\',this.value)" placeholder="フォームの注意点など">'+escapeHtml(ex.note||'')+'</textarea></div>'+
      '<div class="fl" style="margin-top:8px"><label style="font-size:11px;color:var(--text-secondary)">参考動画URL（任意）</label><input class="ipt" value="'+escapeHtml(ex.videoUrl||'')+'" oninput="updTMenuEx('+i+',\'videoUrl\',this.value)" placeholder="YouTube等のURL"></div>'+

function addTMenuEx(){_tmenuEx.push({name:'',estBase:'',sets:'',reps:'',rir:''});var el=document.getElementById('tm-ex-list');if(el)el.innerHTML=renderTMenuExList();}
function delTMenuEx(i){_tmenuEx.splice(i,1);var el=document.getElementById('tm-ex-list');if(el)el.innerHTML=renderTMenuExList();}
function updTMenuEx(i,field,val){if(_tmenuEx[i])_tmenuEx[i][field]=val;}
function saveTMenu(menuId){
  var name=(document.getElementById('tm-name')||{}).value.trim();
  if(!name)return alert('メニュー名を入力してください');
  var scope=(document.getElementById('tm-scope')||{}).value||'all';
  // 種目を整形
  var exercises=_tmenuEx.filter(function(e){return e.name&&e.name.trim();}).map(function(e){
    return{name:e.name.trim(),estBase:e.estBase||null,sets:parseInt(e.sets)||null,reps:parseInt(e.reps)||null,rir:(e.rir!==''&&e.rir!=null)?parseInt(e.rir):null,note:e.note||'',videoUrl:e.videoUrl||''};
  });
  if(!exercises.length)return alert('種目を1つ以上追加してください');
  // 種目名を履歴に追加（重複なし）。トランザクションで最新へマージ（他端末の追加を巻き戻さない）
  var exNames=exercises.map(function(e){return e.name;});
  function mergeTex(onDone){svSafeUpdate('texlist',function(latest){exNames.forEach(function(nm){if(latest.indexOf(nm)<0)latest.push(nm);});return latest;},onDone);}

  var ptype=(document.getElementById('tm-ptype')||{}).value||'';
  if(ptype&&scope!=='all')return alert('PUSH/PULLスロットのメニューは配布先を「全選手」にしてください');
  // 新規・編集ともsvSafeUpdateに統一。「同ptypeスロットはアクティブ1件」の不変条件を同一トランザクションで担保する
  var ptypeTs=new Date().toISOString();
  var newIdVal=menuId?null:Date.now();
  var targetId=menuId||newIdVal;
  svSafeUpdate('tmenu',function(latest){
    if(!Array.isArray(latest))latest=[];
    if(ptype){latest.forEach(function(x){if(x&&x.ptype===ptype&&!idEq(x.id,targetId)){delete x.ptype;delete x.ptypeTs;}});}
    if(menuId){
      var m=latest.find(function(x){return idEq(x.id,menuId);});
      if(m){m.name=name;m.scope=scope;m.exercises=exercises;if(ptype){m.ptype=ptype;m.ptypeTs=ptypeTs;}else{delete m.ptype;delete m.ptypeTs;}}
    }else if(!latest.some(function(x){return idEq(x.id,newIdVal);})){ // updateFn再実行でも冪等
      var rec={id:newIdVal,name:name,scope:scope,exercises:exercises,createdBy:'スタッフ',createdAt:todayStr()};
      if(ptype){rec.ptype=ptype;rec.ptypeTs=ptypeTs;}
      latest.push(rec);
    }
    return latest;
  },function(){
    mergeTex();
    popView();toast(menuId?'保存しました':'メニューを作成しました');
  });
}
// PUSH/PULLスロットの現メニューを取得。不変条件=同ptypeはアクティブ1件だが、
// 異常時に複数になった場合はptype付与時刻(ptypeTs)最新→id大のタイブレークで1件に確定する（読み取り側はこのヘルパーに統一）
function getSlotMenu(pt){
  var c=(D.tmenu||[]).filter(function(m){return m&&m.ptype===pt;});
  if(!c.length)return null;
  c.sort(function(a,b){return String(b.ptypeTs||'').localeCompare(String(a.ptypeTs||''))||((b.id||0)-(a.id||0));});
  return c[0];
}

// 実施状況（後のステップで充実させる）
function renderTrainingStatus(){
  var logs=tlogAll().slice().sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});
  var h='';
  // 怪我でできなかった種目の通知（直近14日）

  var injuryNotices=[];
  logs.forEach(function(lg){
    if(lg.date<cutoffStr)return;
    // 欠席（痛み・怪我）も通知に含める
    if(lg.absent&&lg.absentReason==='痛み・怪我'){
      var pa=D.p.find(function(x){return idEq(x.id,lg.pid);});
      if(pa)injuryNotices.push({pid:lg.pid,name:pa.name,exName:'トレーニング全体を欠席',date:lg.date});

      if(r.skipped&&r.skipReason==='痛み・怪我'){
        var p=D.p.find(function(x){return idEq(x.id,lg.pid);});
        if(p)injuryNotices.push({pid:lg.pid,name:p.name,exName:r.exName,date:lg.date});

  }
  // 連続スキップアラート（全選手）
  var allSkipAlerts=[];
  D.p.forEach(function(p){

  });
  if(allSkipAlerts.length){

    allSkipAlerts.slice(0,10).forEach(function(a){
      h+='<div class="log-row" style="cursor:pointer;padding:5px 0" onclick="goPlayerDetail('+a.pid+',5)"><span style="flex:1;font-size:13px;font-weight:600">'+escapeHtml(a.name)+'</span><span style="font-size:12px;color:var(--text-secondary)">'+escapeHtml(a.exName)+'</span><span class="bd bd-a" style="font-size:10px;margin-left:8px">'+a.count+'回連続</span></div>';
    });
    h+='</div>';
  }

  if(!logs.length){h+='<div class="no">まだトレーニング記録がありません</div>';return h;}
  h+='<div style="font-size:12px;color:var(--text-secondary);margin:12px 0">選手が実施したトレーニング記録です。</div>';
  logs.slice(0,30).forEach(function(lg){
    var p=D.p.find(function(x){return idEq(x.id,lg.pid);});if(!p)return;
    if(lg.absent){
      // 欠席ログ
      var rc=lg.absentReason==='痛み・怪我'?'bd-r':'bd-n';
      h+='<div class="card card-click" style="margin-bottom:8px;opacity:.85" onclick="goPlayerDetail('+lg.pid+',5)"><div style="display:flex;align-items:center;gap:10px">'+avH(p,30)+
        '<div style="flex:1"><div style="font-weight:600;font-size:14px">'+escapeHtml(p.name)+' <span class="bd '+rc+'" style="font-size:9px">欠席</span></div><div style="font-size:11px;color:var(--text-secondary)">'+fmt(lg.date)+' ・ 理由: '+escapeHtml(lg.absentReason||'-')+'</div></div></div></div>';
      return;
    }
    var selfBadge=lg.kind==='self'?' <span class="bd bd-b" style="font-size:9px">自主</span>':'';
    if(lg.fitness){

      h+='<div class="card card-click" style="margin-bottom:8px" onclick="goPlayerDetail('+lg.pid+',5)"><div style="display:flex;align-items:center;gap:10px">'+avH(p,30)+

  });
  return h;
}
// スタッフ側の連続スキップ検出（選手側と同じロジック）
function getConsecutiveSkipsStaff(pid){
  var logs=tlogAll().filter(function(l){return idEq(l.pid,pid);}).sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});
  if(logs.length<2)return[];
  var exSkipCount={},exSeen={};
  logs.forEach(function(lg){
    (lg.results||[]).forEach(function(r){
      if(exSeen[r.exName]==='stopped')return;
      if(r.skipped){exSkipCount[r.exName]=(exSkipCount[r.exName]||0)+1;}
      else{exSeen[r.exName]='stopped';}
    });
  });
  var result=[];
  Object.keys(exSkipCount).forEach(function(name){if(exSkipCount[name]>=2)result.push({name:name,count:exSkipCount[name]});});
  return result.sort(function(a,b){return b.count-a.count;});
}

    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">'+
    '<div>'+

    '<div style="font-size:11px;color:var(--text-secondary);margin-top:2px">担当: '+Object.keys(staffSummary).map(function(s){return s+'('+staffSummary[s]+'枠)';}).join(' / ')+'</div>'+

// テーピング枠の個別削除。予約ありの枠はslotIds跨ぎ予約の破損を避けるためブロック（日単位削除か予約取消を促す）。空枠のみUndo付きで削除。
function delTapeSlot(slotId,date){
  var booked=tapeSlotBooked(D.tape||[],slotId);
  if(booked.length){alert('この枠には予約があります。先に予約を取消すか、日単位の「削除」を使ってください。');return;}
  var removed=null;
  svSafeUpdate('tapeslot',function(latest){
    var idx=latest.findIndex(function(s){return idEq(s.id,slotId);});
    if(idx<0)return latest;
    removed=latest[idx];
    latest.splice(idx,1);
    return latest;
  },function(){goTapeDayDetail(date);if(removed)toast('枠を削除しました','元に戻す',function(){undoDelTapeSlot(removed,date);});else toast('枠が見つかりませんでした');},function(){alert('削除に失敗しました。もう一度お試しください');});
}
function undoDelTapeSlot(slot,date){
  if(!slot)return;
  svSafeUpdate('tapeslot',function(latest){
    if(latest.some(function(s){return idEq(s.id,slot.id);}))return latest; // 二重復元ガード
    latest.push(slot);
    return latest;
  },function(){goTapeDayDetail(date);toast('元に戻しました');},function(){alert('復元に失敗しました。もう一度お試しください');});
}

function delTapeDay(date){
  if(!confirm(fmt(date)+'のテーピング枠を全て削除しますか？\n既存の予約も削除されます。'))return;
  svSafeUpdate('tapeslot',function(latest){return latest.filter(function(s){return s.date!==date;});});
  svSafeUpdate('tape',function(latest){return latest.filter(function(t){return t.date!==date;});},function(){V.tape();});
}


// === 測定会管理 ===
// 測定会の参加状況を一元判定（一覧V.msessと詳細goMSessDetailで同一基準にしバグ=件数不一致を解消）。
// done: ph記録が (msessId一致) または (msessId無し && 期間内日付)。ブロンコ系は bronco!=null のみ入力済み。
// skip: phskip が同基準。done/skip/missed は D.p を重複なく分割（doneを最優先、skipはdone除外）。
// 測定会への記録帰属判定（msessStatus と computeAllBadges で共通化・帰属ドリフト防止）。
function phInMSess(r,s){
  if(idEq(r.msessId,s.id))return true;
  return (r.msessId==null||r.msessId==='')&&r.date>=s.startDate&&r.date<=s.endDate;
}
// ブロンコ系判定は msessType(s)==='bronco'（mtype>fromCalType>名前 の順にフォールバック）。
// 測定会の種別（'bronco'|'phys'）。mtype > fromCalType==='bronco_measure' > 名前「ブロンコ」含み > 'phys' の4段フォールバック。
function msessType(s){
  if(s&&(s.mtype==='bronco'||s.mtype==='phys'))return s.mtype;
  if(s&&s.fromCalType==='bronco_measure')return'bronco';
  if(s&&String(s.name||'').indexOf('ブロンコ')>=0)return'bronco';
  return'phys';
}
function msessStatus(s){
  var isBronco=msessType(s)==='bronco';
  function inSess(r){return phInMSess(r,s);}
  var recs=(D.ph||[]).filter(function(r){return inSess(r)&&(!isBronco||r.bronco!=null);});
  var donePids=[...new Set(recs.map(function(r){return r.pid;}))];
  var isDone=function(pid){return donePids.some(function(d){return idEq(d,pid);});};
  var seen={},skips=[];
  (D.phskip||[]).forEach(function(sk){
    if(!inSess(sk)||isDone(sk.pid))return;
    var k=String(sk.pid);if(seen[k])return;seen[k]=1;skips.push(sk);
  });
  var skippedPids=skips.map(function(sk){return sk.pid;});
  var missedPids=(D.p||[]).filter(function(p){return!isDone(p.id)&&!skippedPids.some(function(sk){return idEq(sk,p.id);});}).map(function(p){return p.id;});
  return{isBronco:isBronco,recs:recs,skips:skips,donePids:donePids,skippedPids:skippedPids,missedPids:missedPids};
}


// ===== バッジ自動算出エンジン（derived・Firestore保存なし。player/staff md5同期） =====
// 確定測定会(closed or 猶予14日超過)のみ対象。1画面の描画につき1回だけ呼び結果を引き回す。byPid/totalPtsのキーは String(pid)。
// 返り値: {byPid:{pid:[badge]}, totalPts:{pid:n}, sessions:[確定測定会昇順]}
// badge={type:'rank'|'top1'|'posTop1'|'mvp'|'pb'|'club'|'allYear', sessId,sessName,cat,rankK,label,pts,year,date}
function computeAllBadges(){
  var today=todayStr();
  var cfg=getStdCfg();
  var BPTS=cfg.badgePts;
  var FW=['PR','HO','LO','FL','No.8'],BK=['SH','SO','CTB','WTB','FB'];
  var LIFTS=[{k:'sq',ph:'squat',label:'SQ'},{k:'bp',ph:'bench',label:'BP'},{k:'dl',ph:'deadlift',label:'DL'}];
  var CATS=[{k:'squat',label:'SQ',min:false},{k:'bench',label:'BP',min:false},{k:'deadlift',label:'DL',min:false},{k:'chinning',label:'懸垂',min:false},{k:'clean',label:'クリーン',min:false},{k:'bronco',label:'ブロンコ',min:true},{k:'big3',label:'BIG3合計',min:false}];
  var byPid={},totalPts={};
  function add(pid,b){var k=String(pid);(byPid[k]=byPid[k]||[]).push(b);totalPts[k]=(totalPts[k]||0)+b.pts;}
  var posMap={};(D.p||[]).forEach(function(p){posMap[String(p.id)]=p.position;});
  function grpOf(pos){return FW.indexOf(pos)>=0?'FW':(BK.indexOf(pos)>=0?'BK':null);}
  var phByPid={};(D.ph||[]).forEach(function(r){var k=String(r.pid);(phByPid[k]=phByPid[k]||[]).push(r);});

  // 確定測定会（昇順）
  var sessions=(D.msess||[]).filter(function(s){
    if(!s.startDate||!s.endDate)return false;
    if(s.closed)return true;
    var g=toDateStr(new Date(new Date(s.endDate).getTime()+14*86400000));
    return g<today;
  }).slice().sort(function(a,b){return (a.startDate||'').localeCompare(b.startDate||'')||(a.endDate||'').localeCompare(b.endDate||'');});

  // D.ph全走査1回で 確定会×pid の種目集約（種目max・broncoは>0のmin）
  var aggBySess={},stBySess={};
  sessions.forEach(function(s){aggBySess[s.id]={};stBySess[s.id]=msessStatus(s);});
  (D.ph||[]).forEach(function(r){
    for(var si=0;si<sessions.length;si++){
      var s=sessions[si];if(!phInMSess(r,s))continue;
      var m=aggBySess[s.id],k=String(r.pid),a=m[k]||(m[k]={});
      ['squat','bench','deadlift','chinning','clean'].forEach(function(f){if(r[f]!=null&&(a[f]==null||r[f]>a[f]))a[f]=r[f];});
      if(r.bronco!=null&&r.bronco>0&&(a.bronco==null||r.bronco<a.bronco))a.bronco=r.bronco;
    }
  });

  var ranksAsc=cfg.ranks.slice().sort(function(a,b){return a.pct-b.pct;});
  var brRanksAsc=(cfg.broncoRanks&&cfg.broncoRanks.length?cfg.broncoRanks:cfg.ranks).slice().sort(function(a,b){return a.pct-b.pct;});
  function rankFor(ranks,ratio){var cur=null;for(var i=0;i<ranks.length;i++){if(ratio>=ranks[i].pct)cur=ranks[i];}return cur;}

  // ---- セッションごと: ランク到達 / 種目1位(全体) / ポジ別1位 ----
  sessions.forEach(function(s){
    var year=(s.startDate||'').slice(0,4);
    var agg=aggBySess[s.id],pids=Object.keys(agg);
    var big3Map={};pids.forEach(function(k){var a=agg[k];if(a.squat!=null&&a.bench!=null&&a.deadlift!=null)big3Map[k]=a.squat+a.bench+a.deadlift;});

    pids.forEach(function(k){
      var pos=posMap[k];if(!pos)return;
      var posStd=cfg.pos[pos];if(!posStd)return;
      var a=agg[k],wInfo=getWeightInfoAt(k,s.endDate);
      LIFTS.forEach(function(l){
        if(a[l.ph]==null||!posStd[l.k]||!wInfo)return;
        var rk=rankFor(ranksAsc,a[l.ph]/(posStd[l.k]*wInfo.w));
        if(rk)add(k,{type:'rank',sessId:s.id,sessName:s.name,cat:l.ph,rankK:rk.k,label:rk.label+'到達（'+l.label+'）',pts:(BPTS.rank&&BPTS.rank[rk.k])||0,year:year,date:s.endDate,weight:wInfo.w});
      });
      if(a.bronco!=null&&posStd.bronco){
        var brk=rankFor(brRanksAsc,posStd.bronco/a.bronco);
        if(brk)add(k,{type:'rank',sessId:s.id,sessName:s.name,cat:'bronco',rankK:brk.k,label:brk.label+'到達（ブロンコ）',pts:(BPTS.rank&&BPTS.rank[brk.k])||0,year:year,date:s.endDate});
      }
    });

    CATS.forEach(function(c){
      function valOf(k){return c.k==='big3'?(big3Map[k]!=null?big3Map[k]:null):(agg[k][c.k]!=null?agg[k][c.k]:null);}
      var entries=pids.map(function(k){return{k:k,v:valOf(k)};}).filter(function(e){return e.v!=null;});
      if(!entries.length)return;
      function bestOf(list){var b=null;list.forEach(function(e){if(b==null||(c.min?e.v<b:e.v>b))b=e.v;});return b;}
      var oBest=bestOf(entries),oWin={};
      entries.forEach(function(e){if(e.v===oBest){oWin[e.k]=1;add(e.k,{type:'top1',sessId:s.id,sessName:s.name,cat:c.k,label:'種目1位 '+c.label,pts:BPTS.top1||0,year:year,date:s.endDate});}});
      ['FW','BK'].forEach(function(g){
        var sub=entries.filter(function(e){return grpOf(posMap[e.k])===g;});
        if(!sub.length)return;
        var sBest=bestOf(sub);
        sub.forEach(function(e){if(e.v===sBest&&!oWin[e.k])add(e.k,{type:'posTop1',sessId:s.id,sessName:s.name,cat:c.k,label:'ポジ別1位 '+c.label+'（'+g+'）',pts:BPTS.posTop1||0,year:year,date:s.endDate});});
      });
    });
  });

  // ---- 伸び率MVP（mtype別prevチェーン・改善者のみ・同率両者） ----
  ['phys','bronco'].forEach(function(mt){
    var chain=sessions.filter(function(s){return msessType(s)===mt;});
    var prevVal={};
    chain.forEach(function(s){
      var agg=aggBySess[s.id],pids=Object.keys(agg),curVal={};
      pids.forEach(function(k){var a=agg[k];if(mt==='phys'){if(a.squat!=null&&a.bench!=null&&a.deadlift!=null)curVal[k]=a.squat+a.bench+a.deadlift;}else{if(a.bronco!=null)curVal[k]=a.bronco;}});
      var best=null,winners=[];
      Object.keys(curVal).forEach(function(k){
        var cur=curVal[k],prev=prevVal[k];
        if(!(prev>0)||!(cur>0))return;
        var imp=(mt==='phys')?(cur/prev-1):((prev-cur)/prev);
        if(imp<=0)return;
        if(best==null||imp>best+1e-9){best=imp;winners=[k];}
        else if(Math.abs(imp-best)<=1e-9)winners.push(k);
      });
      if(best!=null){var year=(s.startDate||'').slice(0,4);winners.forEach(function(k){add(k,{type:'mvp',sessId:s.id,sessName:s.name,cat:mt,label:'伸び率MVP（'+(mt==='phys'?'BIG3 +':'ブロンコ -')+(Math.round(best*1000)/10)+'%）',pts:BPTS.mvp||0,year:year,date:s.endDate});});}
      Object.keys(curVal).forEach(function(k){prevVal[k]=curVal[k];});
    });
  });

  // ---- 自己ベスト更新（PB・6種目・初回対象外・セッション開始日前の過去プール比較） ----
  var PBF=[{k:'squat',label:'SQ',min:false},{k:'bench',label:'BP',min:false},{k:'deadlift',label:'DL',min:false},{k:'chinning',label:'懸垂',min:false},{k:'clean',label:'クリーン',min:false},{k:'bronco',label:'ブロンコ',min:true}];
  sessions.forEach(function(s){
    var agg=aggBySess[s.id],year=(s.startDate||'').slice(0,4);
    Object.keys(agg).forEach(function(k){
      var a=agg[k],recs=phByPid[k]||[];
      PBF.forEach(function(f){
        var cur=a[f.k];if(cur==null)return;if(f.k==='bronco'&&!(cur>0))return;
        var prior=[];recs.forEach(function(r){if(r[f.k]!=null&&(f.k!=='bronco'||r[f.k]>0)&&r.date<s.startDate)prior.push(r[f.k]);});
        if(!prior.length)return;
        var pb=f.min?Math.min.apply(null,prior):Math.max.apply(null,prior);
        if(f.min?(cur<pb):(cur>pb))add(k,{type:'pb',sessId:s.id,sessName:s.name,cat:f.k,label:'自己ベスト更新（'+f.label+'）',pts:BPTS.pb||0,year:year,date:s.endDate});
      });
    });
  });

  // ---- BIG3クラブ FW600/BK550（ベスト基準・一度きり・測定会非依存） ----
  (D.p||[]).forEach(function(p){
    var bb=getBestBIG3(p.id);if(bb==null)return;
    var g=grpOf(p.position);if(!g)return;
    var th=g==='FW'?600:550;
    if(bb>=th)add(p.id,{type:'club',sessId:null,sessName:null,cat:'club',label:'BIG3クラブ '+g+' '+th+'kg',pts:BPTS.club||0,year:null,date:null});
  });

  // ---- 皆勤賞（年ごと・その年の全確定会でdone or skip＝無断未入力のみNG） ----
  var years={};sessions.forEach(function(s){var y=(s.startDate||'').slice(0,4);(years[y]=years[y]||[]).push(s);});
  Object.keys(years).forEach(function(y){
    var ys=years[y];
    (D.p||[]).forEach(function(p){
      var allPresent=ys.every(function(s){var st=stBySess[s.id];return st.donePids.some(function(d){return idEq(d,p.id);})||st.skippedPids.some(function(sk){return idEq(sk,p.id);});});
      if(allPresent)add(p.id,{type:'allYear',sessId:null,sessName:y+'年',cat:'allYear',label:'皆勤賞 '+y+'年',pts:BPTS.allYear||0,year:y,date:y+'-12-31'});
    });
  });

  return{byPid:byPid,totalPts:totalPts,sessions:sessions};
}
V.msess=function(){
  if(!D.msess)D.msess=[];
  var today=todayStr();
  var activeSess=D.msess.find(function(s){return !s.closed&&s.startDate<=today&&s.endDate>=today;});
  var h='';
  if(activeSess){
    h+='<div class="alert-card alert-info" style="margin-bottom:1rem">'+ic('i-ruler',14)+' 現在進行中の測定会: <b>'+escapeHtml(activeSess.name)+'</b> ('+fmt(activeSess.startDate)+'〜'+fmt(activeSess.endDate)+')</div>';
  }
  // 測定会一覧
  if(!D.msess.length){h+='<div class="no">測定会がまだありません</div>';$m().innerHTML=h;return;}
  var sorted=D.msess.slice().sort(function(a,b){return b.startDate.localeCompare(a.startDate);});
  h+=sorted.map(function(s){
    var isPast=s.endDate<today,isActive=s.startDate<=today&&s.endDate>=today,isFuture=s.startDate>today;
    var st=msessStatus(s);
    var unique=st.donePids,skipped=st.skippedPids.length,missed=st.missedPids.length;
    return'<div class="card card-click" style="margin-bottom:8px" onclick="goMSessDetail(\''+s.id+'\')">'+
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">'+
    '<div style="font-weight:600;font-size:15px">'+escapeHtml(s.name)+(s.autoCreated?' <span class="bd" style="background:var(--blue-bg);color:var(--blue);font-size:9px">'+ic('i-calendar',10)+' カレンダー連動</span>':'')+'</div>'+
    '<div style="display:flex;gap:4px;align-items:center">'+(s.closed?'<span class="bd" style="background:var(--text-tertiary);color:#fff;font-size:9px">締切済</span>':'')+'<span class="bd '+(isActive?'bd-b':isPast?'bd-g':'bd-a')+'">'+(isActive?'進行中':isPast?'完了':'予定')+'</span></div></div>'+
    '<div style="font-size:12px;color:var(--text-secondary);margin-bottom:6px">'+fmt(s.startDate)+' 〜 '+fmt(s.endDate)+'</div>'+
    '<div style="display:flex;gap:10px;font-size:12px">'+
    '<span style="color:var(--green)">入力済: '+unique.length+'名</span>'+
    '<span style="color:var(--amber)">測定なし: '+skipped+'名</span>'+
    '<span style="color:var(--red)">未入力: '+Math.max(0,missed)+'名</span>'+
    '</div></div>';
  }).join('');
  $m().innerHTML=h;
};

function goAddMSess(){

// phskipの取消／理由修正。phskipはid無しの旧レコードが混在するため、照合はpid+phInMSess（測定会範囲）で行う。
// 同一(pid,測定会)に複数skipがあり得るため、取消/更新は該当全件に適用する（集計側msessStatusは重複を畳むため整合的）。
function cancelPhSkip(pid,sessId){
  var s=(D.msess||[]).find(function(x){return idEq(x.id,sessId);});if(!s)return;
  var removed=[];
  svSafeUpdate('phskip',function(latest){
    var keep=[];
    latest.forEach(function(sk){if(idEq(sk.pid,pid)&&phInMSess(sk,s)){removed.push(sk);}else{keep.push(sk);}});
    return keep;
  },function(){goMSessDetail(sessId);if(removed.length)toast('測定なしを取消しました','元に戻す',function(){undoCancelPhSkip(removed,sessId);});else toast('該当する記録がありませんでした');},function(){alert('取消に失敗しました。もう一度お試しください');});
}
function undoCancelPhSkip(recs,sessId){
  if(!recs||!recs.length)return;
  var s=(D.msess||[]).find(function(x){return idEq(x.id,sessId);});
  svSafeUpdate('phskip',function(latest){
    recs.forEach(function(r){
      // 二重復元ガード。id有=id照合／id無=pid+date+同一測定会(phInMSess)で照合（msessId無しの旧レコードでもidEq(null,null)に頼らず判定できる）
      var exists=latest.some(function(x){return (r.id!=null&&idEq(x.id,r.id))||(r.id==null&&idEq(x.pid,r.pid)&&x.date===r.date&&(s?phInMSess(x,s):idEq(x.msessId,r.msessId)));});
      if(!exists)latest.push(r);
    });
    return latest;
  },function(){goMSessDetail(sessId);toast('元に戻しました');},function(){alert('復元に失敗しました。もう一度お試しください');});
}

function doEditPhSkipReason(pid,sessId,btnEl){
  var s=(D.msess||[]).find(function(x){return idEq(x.id,sessId);});if(!s)return;

// 現在の測定会を取得するユーティリティ
// typeOpt('bronco'|'phys')指定時はその種別のみ対象（省略時は全種別＝従来挙動）。
function getCurrentMSess(typeOpt){
  var today=todayStr();
  var cands=(D.msess||[]).filter(function(s){
    if(s.closed||!s.startDate||!s.endDate)return false;
    if(typeOpt&&msessType(s)!==typeOpt)return false;
    if(s.startDate>today)return false;
    var graceEnd=toDateStr(new Date(new Date(s.endDate).getTime()+14*86400000));
    return today<=graceEnd;
  });
  if(!cands.length)return null;
  cands.sort(function(a,b){
    var aIn=(today<=a.endDate)?1:0,bIn=(today<=b.endDate)?1:0;
    if(aIn!==bIn)return bIn-aIn;
    return (b.startDate||'').localeCompare(a.startDate||'');
  });
  return cands[0];
}

function doAddRTestTpl(){
  var name=document.getElementById('rtt-name').value.trim();

  if(!name)return alert('テンプレ名を入力してください');
  if(!D.rtest_tpl)D.rtest_tpl=[];
  var physTests=[];
  for(var ci=1;ci<=window._rtPhysCount;ci++){
    var el=document.getElementById('rtp-'+ci);if(!el)continue;
    var n=(document.getElementById('rtp-name-'+ci)||{}).value||'';
    var t=(document.getElementById('rtp-type-'+ci)||{}).value||'sidediff';
    if(!n)continue;
    var item={name:n,type:t};
    if(t==='sidediff')item.unit=(document.getElementById('rtp-unit-'+ci)||{}).value||'';

// 復帰テスト結果(rtest)の削除（Undo付き）。編集（physResults再入力）は複雑なため未対応＝削除→再入力で対応。
function delRTestResult(rid,injId){
  var removed=null;
  svSafeUpdate('rtest',function(latest){
    var idx=latest.findIndex(function(x){return idEq(x.id,rid);});
    if(idx<0)return latest;
    removed=latest[idx];
    latest.splice(idx,1);
    return latest;
  },function(){goRTestDetail(injId);if(removed)toast('削除しました','元に戻す',function(){undoDelRTestResult(removed,injId);});else toast('記録が見つかりませんでした');},function(){alert('削除に失敗しました。もう一度お試しください');});
}
function undoDelRTestResult(rec,injId){
  if(!rec)return;
  svSafeUpdate('rtest',function(latest){
    if(latest.some(function(x){return idEq(x.id,rec.id);}))return latest; // 二重復元ガード
    latest.push(rec);
    return latest;
  },function(){goRTestDetail(injId);toast('元に戻しました');},function(){alert('復元に失敗しました。もう一度お試しください');});
}

function doSaveRehabLogStaff(injId,hasTpl,exCount){
  if(!roleGuard('rlog'))return;
  var date=document.getElementById('srl-date').value;
  var implementer=document.getElementById('srl-implementer').value.trim();
  if(!date)return alert('日付を入力してください');
  if(!implementer)return alert('実施者を入力してください');

  var exercises=[];
  var cats=[];

  if(hasTpl){
    for(var ei=0;ei<exCount;ei++){
      var chk=document.getElementById('srl-chk-'+ei);
      var done=chk&&chk.checked;
      var nameEl=document.getElementById('srl-ex-'+ei);
      var exName=nameEl?(nameEl.dataset.name||''):'';
      var sets=parseInt((document.getElementById('srl-sets-'+ei)||{}).value)||null;
      var reps=parseInt((document.getElementById('srl-reps-'+ei)||{}).value)||null;
      var cmt=(document.getElementById('srl-cmt-'+ei)||{}).value||'';
      var cat=nameEl?(nameEl.dataset.cat||''):'';
      if(done&&cat&&cats.indexOf(cat)<0)cats.push(cat);
      exercises.push({name:exName,cat:cat,sets:sets,reps:reps,comment:cmt,done:done});
    }
  } else {
    // カスタム種目を収集
    document.querySelectorAll('[id^="cri-"]').forEach(function(el){
      var ci=el.id.replace('cri-','');
      if(isNaN(parseInt(ci)))return;
      var cat=(document.getElementById('cri-cat-'+ci)||{}).value||'';
      var name=(document.getElementById('cri-name-'+ci)||{}).value||'';
      var sets=parseInt((document.getElementById('cri-sets-'+ci)||{}).value)||null;
      var reps=parseInt((document.getElementById('cri-reps-'+ci)||{}).value)||null;
      var cmt=(document.getElementById('cri-cmt-'+ci)||{}).value||'';
      if(name){
        exercises.push({name:name,cat:cat,sets:sets,reps:reps,comment:cmt,done:true});
        if(cat&&cats.indexOf(cat)<0)cats.push(cat);
      }
    });
  }

  var comment=(document.getElementById('srl-comment')||{}).value||'';
  var logRec={id:Date.now(),injId:injId,date:date,implementer:implementer,by:implementer,cats:cats,exercises:exercises,comment:comment};

  stampWho(logRec);
  svSafe('rlog',logRec,function(){
    // カスタムの場合：テンプレ化を提案（confirm+promptを1フォームに統合。保存/スキップはフォーム内で選択）
    if(!hasTpl&&exercises.length){
      goSaveAsTemplate(injId,exercises,cats);return;
    }
    // 次回メニュー設定へ
    goSetNextMenu(injId);
  });
}

function goSetNextMenu(injId){
  var inj=D.i.find(function(x){return x.id===injId;});if(!inj)return;
  var p=D.p.find(function(x){return x.id===inj.pid;});if(!p)return;
  var plan=(D.rplan||[]).find(function(x){return x.injId===injId;});
  var cur=plan?plan.tomorrowCats||[]:[];
  var h='<div style="font-size:17px;font-weight:600;margin-bottom:14px">'+ic('i-calendar',15,'var(--maroon)')+' '+escapeHtml(p.name)+' の次回メニュー設定</div>'+
  '<div style="font-size:13px;color:var(--text-secondary);margin-bottom:14px">今日の状況を踏まえて次回のメニューを選択してください</div>'+
  '<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px">'+
  RCATS.map(function(c,ci){
    var sel=cur.indexOf(c)>=0;
    return'<div id="nmr-'+ci+'" onclick="toggleNextMenuCat('+ci+')" style="padding:8px 16px;border-radius:99px;border:1.5px solid '+(sel?RCAT_COLOR[c]:'var(--border-secondary)')+';background:'+(sel?RCAT_BG[c]:'var(--bg-primary)')+';color:'+(sel?RCAT_COLOR[c]:'var(--text-primary)')+';cursor:pointer;font-size:13px;font-weight:500">'+c+'</div>';
  }).join('')+
  '</div>'+
  '<div style="display:flex;gap:8px"><button class="btn" onclick="popView()">スキップ</button><button class="btn btn-p" style="flex:1" onclick="saveNextMenu('+injId+')">保存して完了</button></div>';
  window._nextMenuCats=cur.slice();
  window._nextMenuInjId=injId;
  pushView('次回メニュー設定',h);
}

function advRehabStage(injId){
  var rh=(D.r||[]).find(function(x){return x.injId===injId;});if(!rh||rh.stage>=STG.length-1)return;
  rh.stage++;
  if(!rh.stageDates)rh.stageDates=[];
  rh.stageDates[rh.stage]=todayStr();
  if(rh.stage===STG.length-1){var inj=D.i.find(function(x){return x.id===injId;});if(inj){inj.resolved=true;svRec('i',inj);}}
  stampWho(rh);svRec('r',rh);goRPlanDetail(injId);
}

function prevRehabStage(injId){
  var rh=(D.r||[]).find(function(x){return x.injId===injId;});if(!rh||rh.stage<=0)return;
  if(!confirm(STG[rh.stage]+'から'+STG[rh.stage-1]+'に戻しますか？'))return;
  rh.stage--;stampWho(rh);svRec('r',rh);goRPlanDetail(injId);
}


function toggleNextMenuCat(ci){
  var cat=RCATS[ci];if(!cat)return;
  if(!window._nextMenuCats)window._nextMenuCats=[];
  var i=window._nextMenuCats.indexOf(cat);
  if(i>=0){window._nextMenuCats.splice(i,1);}else{window._nextMenuCats.push(cat);}
  var el=document.getElementById('nmr-'+ci);if(!el)return;
  var sel=window._nextMenuCats.indexOf(cat)>=0;
  el.style.borderColor=sel?RCAT_COLOR[cat]:'var(--border-secondary)';
  el.style.background=sel?RCAT_BG[cat]:'var(--bg-primary)';
  el.style.color=sel?RCAT_COLOR[cat]:'var(--text-primary)';
}

function saveNextMenu(injId){
  if(!roleGuard('nextmenu'))return;
  var cats=window._nextMenuCats||[];
  // 対象日（設定日の翌日）を持たせる。これが無いと「明日の予定」が日付不明で永遠に残る（旧バグ）
  var _tm=new Date();_tm.setDate(_tm.getDate()+1);var tomorrowDate=toDateStr(_tm);
  svSafeUpdate('rplan',function(latest){var plan=latest.find(function(x){return idEq(x.injId,injId);});if(!plan){plan={injId:injId,tplId:null,tomorrowCats:[]};latest.push(plan);}plan.tomorrowCats=cats;plan.tomorrowDate=cats.length?tomorrowDate:null;stampWho(plan);return latest;},function(){popView();toast('保存しました');});
}

function goSaveAsTemplate(injId,exercises,cats){
  var inj=D.i.find(function(x){return idEq(x.id,injId);});if(!inj){goSetNextMenu(injId);return;}
  window._tplDraft={injId:injId,exercises:exercises,cats:cats}; // 再描画でクロージャを失うため退避
  var h='<div style="max-width:460px"><div style="font-weight:600;margin-bottom:6px">このメニューをテンプレとして保存しますか？</div>'+
  '<div style="font-size:12px;color:var(--text-secondary);margin-bottom:12px">次回以降このメニューを呼び出せます。不要ならスキップしてください。</div>'+
  '<div class="form-box"><div class="form-title">テンプレ名</div>'+
  '<input class="ipt" id="tpl-name" placeholder="例: 足首リハ初期メニュー"></div>'+
  '<div style="display:flex;gap:8px;justify-content:flex-end"><button class="btn" onclick="skipSaveTemplate()">保存しない</button>'+
  '<button class="btn btn-p" onclick="doSaveAsTemplate(this)">テンプレを保存</button></div></div>';
  pushView('テンプレとして保存',h);
}
function skipSaveTemplate(){var d=window._tplDraft||{};window._tplDraft=null;goSetNextMenu(d.injId);}
function doSaveAsTemplate(btnEl){
  var d=window._tplDraft;if(!d){popView();return;}
  var name=(document.getElementById('tpl-name')||{}).value||'';
  if(!isFilled(name))return alert('テンプレ名を入力してください');
  if(!guardSubmit(btnEl,'保存中…'))return;
  var inj=D.i.find(function(x){return idEq(x.id,d.injId);});
  var rec={name:name.trim(),part:inj?inj.part:'',stage:'',cats:d.cats,exercises:d.exercises,createdBy:'スタッフ',createdAt:todayStr()};
  window._tplDraft=null;
  svSafeUpdate('rtpl',function(latest){
    rec.id=latest.length?Math.max.apply(null,latest.map(function(t){return t.id;}))+1:1; // 採番はtx内のlatest基準（同時保存でのid衝突を防ぐ）
    latest.push(rec);
    return latest;
  },function(){goSetNextMenu(d.injId);toast('テンプレを保存しました');},function(){releaseSubmit(btnEl);window._tplDraft=d;alert('保存できませんでした。もう一度お試しください');});
}

function delRehabLogStaff(lid,injId){
  if(!confirm('このリハビリ記録を削除しますか？\n（削除すると元に戻せません）'))return;
  var id=parseInt(lid)||lid;var notFound=false;
  svSafeUpdate('rlog',function(latest){
    var before=latest.length;
    latest=latest.filter(function(r){return r.id!==id&&String(r.id)!==String(lid);});
    notFound=(latest.length===before);
    return latest;
  },function(){if(notFound){alert('記録が見つかりませんでした');return;}goRPlanDetail(injId);toast('削除しました');});
}

function rejectInjury(iid){
  var inj=D.i.find(function(x){return idEq(x.id,iid);});if(!inj)return;
  var p=D.p.find(function(x){return idEq(x.id,inj.pid);});
  var h='<div style="max-width:480px"><div style="font-weight:600;margin-bottom:6px">この怪我報告を却下しますか？</div>'+
  '<div style="font-size:12px;color:var(--text-secondary);margin-bottom:10px">'+(p?escapeHtml(p.name)+' — ':'')+(inj.side||'')+escapeHtml(inj.part||'')+' '+escapeHtml(inj.type||'')+'（'+fmt(inj.date)+'）<br>却下すると怪我人一覧から外れ、選手にも却下通知が届きます。</div>'+
  '<div class="form-box"><div class="form-title">却下理由（任意・選手に表示されます）</div>'+
  '<textarea class="ipt" id="rej-reason" placeholder="例: 練習に支障がないため / 既に報告済みのため など"></textarea></div>'+
  '<div style="display:flex;gap:8px;justify-content:flex-end"><button class="btn" onclick="popView()">キャンセル</button>'+
  '<button class="btn btn-d" onclick="doRejectInjury('+iid+',this)">却下する</button></div></div>';
  pushView('怪我報告を却下',h);
}
function doRejectInjury(iid,btnEl){
  if(!guardSubmit(btnEl,'処理中…'))return;
  var reason=(document.getElementById('rej-reason')||{}).value||'';
  var notFound=false,blocked=false,snapshot=null;
  svSafeUpdate('i',function(latest){
    var idx=latest.findIndex(function(x){return idEq(x.id,iid);});
    if(idx<0){notFound=true;return latest;}
    if(latest[idx].approved===true){blocked=true;return latest;} // 並行承認済み→却下しない
    snapshot={approved:latest[idx].approved,rejectedAt:latest[idx].rejectedAt,rejectReason:latest[idx].rejectReason,notifyPlayer:latest[idx].notifyPlayer,resolved:latest[idx].resolved};
    latest[idx].approved=false;
    latest[idx].rejectedAt=new Date().toISOString();
    latest[idx].rejectReason=reason;
    latest[idx].notifyPlayer=true;
    latest[idx].resolved=true;
    return latest;
  },function(){
    if(notFound){releaseSubmit(btnEl);alert('報告が見つかりませんでした');return;}
    if(blocked){releaseSubmit(btnEl);alert('この報告は既に「怪我人に追加」で承認されています。却下できません。');return;}
    popView();toast('却下しました','元に戻す',function(){undoRejectInjury(iid,snapshot);});
  },function(){releaseSubmit(btnEl);alert('保存できませんでした。もう一度お試しください');});
}
function undoRejectInjury(iid,snap){
  if(!snap)return;
  svSafeUpdate('i',function(latest){
    var idx=latest.findIndex(function(x){return idEq(x.id,iid);});
    if(idx<0)return latest;
    latest[idx].approved=snap.approved;
    if(snap.rejectedAt===undefined)delete latest[idx].rejectedAt;else latest[idx].rejectedAt=snap.rejectedAt;
    if(snap.rejectReason===undefined)delete latest[idx].rejectReason;else latest[idx].rejectReason=snap.rejectReason;
    if(snap.notifyPlayer===undefined)delete latest[idx].notifyPlayer;else latest[idx].notifyPlayer=snap.notifyPlayer;
    if(snap.resolved===undefined)delete latest[idx].resolved;else latest[idx].resolved=snap.resolved;
    return latest;
  },function(){V.dash();toast('元に戻しました');},function(){alert('復元に失敗しました。もう一度お試しください');});
}

// カレンダーの測定イベントから測定会を自動作成（同日の測定会がなければ）
function autoCreateMSessFromCal(evtType,date,title){
  if(evtType!=='phys_measure'&&evtType!=='bronco_measure')return;
  if(!D.msess)D.msess=[];
  // 同日をカバーする測定会が既にあるか
  var exists=D.msess.some(function(s){return s.startDate<=date&&s.endDate>=date;});
  if(exists)return;
  var sessName=title||(evtType==='bronco_measure'?'ブロンコ測定':'フィジカル測定')+' '+fmt(date);
  var newSess={id:Date.now()+1,name:sessName,startDate:date,endDate:date,createdAt:new Date().toISOString(),autoCreated:true,fromCalType:evtType,mtype:(evtType==='bronco_measure'?'bronco':'phys')};
  // svSafeUpdate方式で保存（トランザクション内で再度重複チェック）
  var dup=false;
  svSafeUpdate('msess',function(latest){
    if(latest.some(function(s){return s.startDate<=date&&s.endDate>=date;})){dup=true;return latest;}
    latest.push(newSess);
    return latest;
  },function(){
    if(dup)return;
    toast('測定会「'+sessName+'」を自動作成しました');
  });
}
// 一括インポート用: 複数の測定イベントから測定会をまとめて自動作成（1回のsvSafeUpdateで競合回避）
function autoCreateMSessFromCalBatch(measureRows,onDone){
  var rows=(measureRows||[]).filter(function(r){return r.type==='phys_measure'||r.type==='bronco_measure';});
  if(!rows.length){if(onDone)onDone(0);return;}
  var msBase=Date.now(),msAdded=0;
  svSafeUpdate('msess',function(latest){
    latest=latest||[];
    rows.forEach(function(r){
      // 同日をカバーする測定会が既にあれば作成しない（バッチ内で追加した分もカバー判定に含む）
      if(latest.some(function(s){return s.startDate<=r.date&&s.endDate>=r.date;}))return;
      var sessName=r.title||((r.type==='bronco_measure'?'ブロンコ測定':'フィジカル測定')+' '+fmt(r.date));
      latest.push({id:msBase+msAdded*1000+Math.floor(Math.random()*1000),name:sessName,startDate:r.date,endDate:r.date,createdAt:new Date().toISOString(),autoCreated:true,fromCalType:r.type,mtype:(r.type==='bronco_measure'?'bronco':'phys')});
      msAdded++;
    });
    return latest;
  },function(){
    if(onDone)onDone(msAdded);
  });
}

// === 予定の一括インポート（TimeTreeスクショ起点・貼り付け式） ===
var _calImport=[];
var CAL_IMP_TYPES=[['match','試合'],['practice','練習'],['off','オフ'],['weight','ウエイト'],['phys_measure','フィジカル測定'],['bronco_measure','ブロンコ測定'],['other','その他']];
function _normCalDate(s){
  s=(s||'').trim().replace(/[\/.]/g,'-');
  var m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  if(!m)return null;
  var mo=parseInt(m[2],10),da=parseInt(m[3],10);
  if(mo<1||mo>12||da<1||da>31)return null;
  return m[1]+'-'+('0'+mo).slice(-2)+'-'+('0'+da).slice(-2);
}
function detectCalType(title){
  var t=(title||'').toLowerCase();
  if(t.indexOf('vs')>=0||title.indexOf('ｖｓ')>=0||title.indexOf('対')>=0)return 'match';
  if(t.indexOf('off')>=0||title.indexOf('オフ')>=0)return 'off';
  if(title.indexOf('ウエイト')>=0||title.indexOf('ウェイト')>=0||t.indexOf('weight')>=0)return 'weight';
  if(t.indexOf('at')>=0||t.indexOf('df')>=0||t.indexOf('fit')>=0||t.indexOf('unit')>=0||t.indexOf('mtg')>=0||title.indexOf('ラン')>=0||title.indexOf('練習')>=0||title.indexOf('ミーティング')>=0)return 'practice';
  return 'other';
}
function goImportCal(){
  var ph='2026-06-06 | match | vs文理(AB) | \n2026-06-08 | weight | ウエイト① | 7:30\n2026-06-08 | weight | ウエイト② | 16:30\n2026-06-08 | off | OFF | ';
  var known=CAL_IMP_TYPES.map(function(o){return o[0]+'('+o[1]+')';}).join(' / ');
  var h='<div style="max-width:760px">'+
    '<div class="form-box"><div class="form-title" style="display:flex;align-items:center;gap:6px">'+ic('i-clipboard',16,'var(--maroon)')+'予定を一括インポート</div>'+
    '<div style="font-size:12px;color:var(--text-secondary);line-height:1.7;margin-bottom:10px">TimeTreeのスクショから起こした予定を貼り付けてください。<b>1行＝1予定</b>。<br>形式: <code>日付 | 種別 | タイトル | 時間</code>（種別・時間は省略可。種別を空にするとタイトルから自動判定）<br>種別: '+known+'<br>※同じ日付・同じタイトルの予定は二重登録されません。</div>'+
    '<textarea class="ipt" id="cal-imp-txt" style="min-height:240px;font-family:monospace;font-size:12px;white-space:pre" placeholder="'+ph+'"></textarea>'+
    '<div style="display:flex;gap:8px;margin-top:12px"><button class="btn" onclick="popView()">キャンセル</button><button class="btn btn-p" style="flex:1" onclick="parseCalImport()">解析してプレビュー →</button></div>'+
    '</div><div id="cal-imp-preview"></div></div>';
  pushView('予定インポート',h);
}
function parseCalImport(){
  var raw=(document.getElementById('cal-imp-txt')||{}).value||'';
  var rows=[];
  raw.split(/\r?\n/).forEach(function(ln){
    var s=ln.trim();
    if(!s||s.charAt(0)==='#')return;
    var parts=s.split('|').map(function(x){return x.trim();});
    var date,type,title,time;
    var isType=function(v){v=(v||'').toLowerCase();for(var i=0;i<CAL_IMP_TYPES.length;i++){if(CAL_IMP_TYPES[i][0]===v)return true;}return false;};
    if(parts.length>=4){date=parts[0];type=parts[1];title=parts[2];time=parts.slice(3).join(' ').trim();}
    else if(parts.length===3){
      // 3カラムは曖昧: 中央が既知の種別かつ右にタイトルがある場合のみ date|種別|タイトル、そうでなければ date|タイトル|時間
      if(isType(parts[1])&&parts[2]!==''){date=parts[0];type=parts[1];title=parts[2];time='';}
      else{date=parts[0];type='';title=parts[1];time=parts[2];}
    }
    else if(parts.length===2){date=parts[0];type='';title=parts[1];time='';}
    else{rows.push({raw:s,err:true});return;}
    var nd=_normCalDate(date);
    if(!nd||!title){rows.push({raw:s,err:true});return;}
    type=(type||'').toLowerCase();
    if(!isType(type))type=detectCalType(title);
    rows.push({date:nd,type:type,title:title,time:time,err:false});
  });
  rows.forEach(function(r){
    if(r.err)return;
    r.dup=(D.cal||[]).some(function(e){return e.date===r.date&&(e.title||'').trim()===r.title;});
    r.include=!r.dup;
  });
  _calImport=rows;
  renderCalImportPreview();
}
function renderCalImportPreview(){
  var el=document.getElementById('cal-imp-preview');if(!el)return;
  var rows=_calImport||[];
  var errN=rows.filter(function(r){return r.err;}).length;
  var dupN=rows.filter(function(r){return!r.err&&r.dup;}).length;
  var newN=rows.filter(function(r){return!r.err&&!r.dup;}).length;
  var h='<div class="form-box" style="margin-top:14px"><div class="form-title">プレビュー（新規 '+newN+' ／ 既存重複 '+dupN+' ／ エラー '+errN+'）</div>';
  if(!rows.length){h+='<div class="no">解析できる行がありませんでした</div></div>';el.innerHTML=h;return;}
  h+='<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px">'+
    '<tr style="text-align:left;color:var(--text-secondary)"><th style="padding:4px">登録</th><th style="padding:4px">日付</th><th style="padding:4px">種別</th><th style="padding:4px">タイトル</th><th style="padding:4px">時間</th><th style="padding:4px">状態</th></tr>';
  rows.forEach(function(r,i){
    if(r.err){h+='<tr style="background:rgba(239,68,68,.12)"><td colspan="6" style="padding:5px;color:#B91C1C">'+ic('i-warn',12)+' 解析エラー: '+escapeHtml(r.raw||'')+'</td></tr>';return;}
    var sel='<select class="ipt" style="padding:2px 4px;font-size:12px;width:auto" onchange="setCalImpType('+i+',this.value)">'+CAL_IMP_TYPES.map(function(o){return'<option value="'+o[0]+'"'+(r.type===o[0]?' selected':'')+'>'+o[1]+'</option>';}).join('')+'</select>';
    h+='<tr style="border-top:1px solid var(--border)'+(r.dup?';opacity:.45':'')+'">'+
      '<td style="padding:4px;text-align:center"><input type="checkbox" '+(r.include?'checked':'')+' onchange="toggleCalImpRow('+i+',this.checked)"></td>'+
      '<td style="padding:4px;white-space:nowrap">'+fmt(r.date)+'</td>'+
      '<td style="padding:4px">'+sel+'</td>'+
      '<td style="padding:4px">'+escapeHtml(r.title)+'</td>'+
      '<td style="padding:4px;white-space:nowrap">'+escapeHtml(r.time||'')+'</td>'+
      '<td style="padding:4px;white-space:nowrap">'+(r.dup?'<span style="color:var(--amber)">既存</span>':'<span style="color:var(--green)">新規</span>')+'</td></tr>';
  });
  h+='</table></div>';
  h+='<div style="font-size:11px;color:var(--text-secondary);margin-top:8px">チェックを外すと登録しません（私用の予定などを除外できます）。種別はその場で直せます。</div>';
  h+='<div style="display:flex;gap:8px;margin-top:14px"><button class="btn btn-p" style="flex:1" onclick="doCalImport()">'+ic('i-check',13)+' チェックした予定を登録</button></div></div>';
  el.innerHTML=h;
}
function setCalImpType(i,v){if(_calImport[i])_calImport[i].type=v;}
function toggleCalImpRow(i,c){if(_calImport[i])_calImport[i].include=c;}
function doCalImport(){
  var rows=(_calImport||[]).filter(function(r){return!r.err&&r.include;});
  if(!rows.length)return alert('登録する予定が選択されていません');
  var added=0,skipped=0,base=Date.now();
  // 測定イベント（フィジカル/ブロンコ）は測定会もまとめて自動作成する
  var measureRows=rows.filter(function(r){return r.type==='phys_measure'||r.type==='bronco_measure';});
  svSafeUpdate('cal',function(latest){
    latest=latest||[];
    rows.forEach(function(r){
      var exists=latest.some(function(e){return e.date===r.date&&(e.title||'').trim()===r.title;});
      if(exists){skipped++;return;}
      latest.push({id:base+added*1000+Math.floor(Math.random()*1000),date:r.date,type:r.type,title:r.title,detail:r.time||''});
      added++;
    });
    return latest;
  },function(){
    autoCreateMSessFromCalBatch(measureRows,function(msAdded){
      popView();
      nav('calendar');
      toast(added+'件を登録しました'+(skipped?'（重複 '+skipped+'件はスキップ）':'')+(msAdded?'／測定会 '+msAdded+'件を自動作成':''));
    });
  });
}

function toggleMatchSel(pid){

function matchSelAll(sel){

    matchSelTemp[p.id]=sel;

}
function saveMatchSel(){
  var sel=Object.keys(matchSelTemp).filter(function(k){return matchSelTemp[k];}).map(function(k){return parseInt(k);});
  // 試合選出は「現在の選出を丸ごと置換」が意図的な仕様。トランザクション経路に統一。
  svSafeUpdate('matchsel',function(){return sel;},function(){popView();toast('保存しました');});
}
