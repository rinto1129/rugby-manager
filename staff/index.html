rank:function(){
  var m=document.getElementById('rkm')?document.getElementById('rkm').value:'squat',yf=document.getElementById('rky')?document.getElementById('rky').value:'',pf=document.getElementById('rkp')?document.getElementById('rkp').value:'';
  var labels={squat:'スクワットMAX',bench:'ベンチプレスMAX',deadlift:'デッドリフトMAX',chinning:'チンニングMAX',clean:'クリーンMAX',bronco:'ブロンコテスト',big3:'BIG3合計',big3perkg:'体重あたりBIG3'};
  var rk=D.p.filter(function(p){if(yf&&String(p.year)!==yf)return false;if(pf&&p.position!==pf)return false;return true;}).map(function(p){var rs=D.ph.filter(function(x){return x.pid===p.id;});var v=null;
  if(m==='bronco'){var vs=rs.filter(function(x){return x.bronco;}).map(function(x){return x.bronco;});v=vs.length?Math.min.apply(null,vs):null;}
  else if(m==='big3'){v=rs.length?Math.max.apply(null,rs.map(function(x){return big3(x);})):null;}
  else if(m==='big3perkg'){var w=parseFloat(p.weight);if(w){var b=getBestBIG3(p.id)||0;v=b?Math.round(b/w*100)/100:null;}}
  else{var vs2=rs.filter(function(x){return x[m];}).map(function(x){return x[m];});v=vs2.length?Math.max.apply(null,vs2):null;}
  return{p:p,v:v};}).filter(function(x){return x.v!==null;});
  m==='bronco'?rk.sort(function(a,b){return a.v-b.v;}):rk.sort(function(a,b){return b.v-a.v;});
  var unit=m==='bronco'?'':m==='big3perkg'?'倍':'kg';
  var fmtVal=function(v){return m==='bronco'?broncoFmt(v):m==='big3perkg'?v.toFixed(2):v+(unit?' '+unit:'');};
  var filterUI='<div class="srch"><select class="ipt" style="width:auto" id="rkm" onchange="V.rank()">'+Object.keys(labels).map(function(k){return'<option value="'+k+'"'+(m===k?' selected':'')+'>'+labels[k]+'</option>';}).join('')+'</select><select class="ipt" style="width:auto" id="rky" onchange="V.rank()"><option value="">全学年</option>'+[1,2,3,4].map(function(y){return'<option value="'+y+'"'+(yf===String(y)?' selected':'')+'>'+y+'年</option>';}).join('')+'</select><select class="ipt" style="width:auto" id="rkp" onchange="V.rank()"><option value="">全ポジション</option>'+POS.map(function(p){return'<option'+(pf===p?' selected':'')+'>'+p+'</option>';}).join('')+'</select></div>';

  if(!rk.length){$m().innerHTML=filterUI+'<div class="no">データなし</div>';return;}

  var maxV=m==='bronco'?Math.max.apply(null,rk.map(function(r){return r.v;})):rk[0].v;
  var minV=m==='bronco'?Math.min.apply(null,rk.map(function(r){return r.v;})):0;
  // バーの幅%（broncoは小さいほど良いので反転）
  var barPct=function(v){if(m==='bronco'){var range=maxV-minV;return range?Math.round((maxV-v)/range*70+25):60;}return maxV?Math.round(v/maxV*88):60;};

  var iniOf=function(p){return p.name?p.name.split(/\s+/).map(function(w){return w[0];}).join('').slice(0,2):'?';};
  // 前回比チップ（player P5のdiffStrOfと同一表現。ブロンコは短縮=改善の極性反転済み・値は直近2回の測定差）
  var SIMPLE_F={squat:1,bench:1,deadlift:1,chinning:1,clean:1,bronco:1};
  var latestDiffOf=function(pid){
    if(!SIMPLE_F[m])return null;
    var series=D.ph.filter(function(x){return x.pid===pid&&x[m]!=null;}).sort(function(a,b){return (a.date||'').localeCompare(b.date||'');});
    if(series.length<2)return null;
    return{v:series[series.length-1][m],prev:series[series.length-2][m]};
  };
  var diffStrOf=function(t){
    if(!t||t.prev==null)return'';
    var diff=m==='bronco'?t.prev-t.v:t.v-t.prev;
    var au=m==='bronco'?broncoFmt(Math.abs(diff)):Math.abs(diff)+(unit?unit:'');
    if(diff>0)return'<span style="color:var(--green)">'+ic('i-up',9)+au+'</span>';
    if(diff<0)return'<span style="color:var(--red)">'+ic('i-down',9)+au+'</span>';
    return'<span style="color:var(--text-secondary)">→</span>';
  };
  var subX=function(pid){var d=diffStrOf(latestDiffOf(pid));return d?' / 前回比 '+d:'';};
  var rowHtml=function(r,rankNo,extraCls){
    var p=r.p;
    var avaInner=p.photo?'background-image:url('+p.photo+')':'background:var(--bg-tertiary);color:var(--maroon)';
    return'<div class="rk-row'+(extraCls?' '+extraCls:'')+'" onclick="goPlayerDetail('+p.id+')">'+
      '<div class="rk-bar" style="width:'+barPct(r.v)+'%"></div>'+
      '<div class="rk-rownum">'+rankNo+'</div>'+
      '<div class="rk-rowava" style="'+avaInner+'">'+(p.photo?'':iniOf(p))+'</div>'+
      '<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+escapeHtml(p.name)+'</div><div style="font-size:10px;color:var(--text-secondary)">'+(p.position||'-')+'・'+(p.year||'-')+'年'+subX(p.id)+'</div></div>'+
      '<div style="font-weight:800;font-size:15px;color:var(--text-primary)">'+fmtVal(r.v)+'</div>'+
    '</div>';
  };
  var h=filterUI+'<div class="kicker" style="margin-top:4px">TEAM RANKING</div>'+
  '<div style="font-size:16px;font-weight:900;margin:0 0 2px;display:flex;align-items:center;gap:8px">'+ic('i-trophy',19,'var(--gold-deep)')+labels[m]+' ランキング</div>'+
  '<div style="font-size:12px;color:var(--text-secondary);margin-bottom:16px">'+(yf?yf+'年':'全学年')+'・'+(pf||'全ポジション')+'</div>';

  // 表彰台（3人以上）: 1位のみ全幅リーダーカード + 2-3位カード（player P5と同一様式）
  if(rk.length>=3){
    var lead=rk[0],leadP=lead.p;
    h+='<div class="card rv rk-lead" onclick="goPlayerDetail('+leadP.id+')" style="position:relative;overflow:hidden;margin-bottom:10px;border:1px solid var(--gold);box-shadow:0 4px 18px rgba(201,162,39,.22);cursor:pointer">'+
      '<span class="ghost-num ghost-num--light" aria-hidden="true" style="right:6px;top:-20px;font-size:108px">1</span>'+
      '<div class="kicker" style="color:var(--gold-deep);display:inline-flex;align-items:center;gap:4px">'+ic('i-medal',12)+' CHAMPION</div>'+
      '<div style="display:flex;align-items:center;gap:14px;margin-top:6px">'+
      '<div class="rk-lead-ava'+(leadP.photo?' has-photo':'')+'" style="border:3px solid var(--gold);border-radius:50%;padding:2px;flex-shrink:0">'+avH(leadP,60)+'</div>'+
      '<div style="flex:1;min-width:0"><div style="font-size:17px;font-weight:900;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+escapeHtml(leadP.name)+'</div>'+
      '<div style="font-size:11px;color:var(--text-secondary)">'+(leadP.position||'-')+'・'+(leadP.year||'-')+'年'+subX(leadP.id)+'</div></div>'+
      '<span class="num" style="font-size:clamp(24px,4vw,34px);flex-shrink:0">'+fmtVal(lead.v).replace(/ /g,'')+'</span>'+
      '</div></div>';
    var twoCols=[[rk[1],2,'var(--silver)'],[rk[2],3,'var(--bronze)']];
    h+='<div style="display:flex;gap:10px;margin-bottom:12px">';
    twoCols.forEach(function(tc){
      var t=tc[0],p2=t.p;
      h+='<div class="card rv" onclick="goPlayerDetail('+p2.id+')" style="flex:1;margin:0;position:relative;overflow:hidden;border-top:3px solid '+tc[2]+';padding:.85rem .9rem;cursor:pointer">'+
        '<span class="ghost-num ghost-num--light" aria-hidden="true" style="right:2px;top:-12px;font-size:64px">'+tc[1]+'</span>'+
        '<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">'+ic('i-medal',15,tc[2])+'<span style="font-weight:800;font-size:12px;color:var(--text-secondary)">'+tc[1]+'位</span></div>'+
        avH(p2,40)+
        '<div style="font-size:12px;font-weight:700;margin-top:6px;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+escapeHtml(p2.name)+'</div>'+
        '<div style="font-size:9px;color:var(--text-secondary)">'+(p2.position||'-')+'・'+(p2.year||'-')+'年'+subX(p2.id)+'</div>'+
        '<div class="num" style="font-size:20px;margin-top:3px">'+fmtVal(t.v).replace(/ /g,'')+'</div>'+
      '</div>';
    });
    h+='</div>';
    if(rk.length>3){
      h+='<div style="display:flex;flex-direction:column;gap:7px">';
      rk.slice(3).forEach(function(r,i){h+=rowHtml(r,i+4,i<3?'rv':'');});
      h+='</div>';
    }
  }else{
    // 3人未満：リストのみ（メダルSVG）
    var medalCols=['var(--gold)','var(--silver)','var(--bronze)'];
    h+='<div style="display:flex;flex-direction:column;gap:7px">';
    rk.forEach(function(r,i){h+=rowHtml(r,ic('i-medal',15,medalCols[i])||String(i+1),'rv');});
    h+='</div>';
  }
  $m().innerHTML=h;
},
calendar:function(){
  var now=new Date();
  var ym=document.getElementById('cal-ym')?document.getElementById('cal-ym').value:(now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0'));
  var parts=ym.split('-');var yr=parseInt(parts[0]),mo=parseInt(parts[1])-1;

  var eventsThisMonth=D.cal.filter(function(e){return e.date&&e.date.startsWith(ym);}).sort(function(a,b){return a.date.localeCompare(b.date);});

  // blank cells before first day
  for(var bi=0;bi<firstDay.getDay();bi++)calH+='<div></div>';
  var todayS=todayStr();
  for(var d=1;d<=lastDay.getDate();d++){
    var ds=yr+'-'+String(mo+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var dayEvts=D.cal.filter(function(e){return e.date===ds;});
    var isToday=ds===todayS;

    calH+='<div style="font-size:12px;font-weight:'+(isToday?'700':'500')+';color:'+(isToday?'var(--blue)':dow===0?'var(--red)':dow===6?'var(--blue)':'var(--text-primary)')+'">'+d+'</div>';
    var msessOnDay=(D.msess||[]).filter(function(s){return s.startDate<=ds&&s.endDate>=ds;});
    msessOnDay.forEach(function(s){calH+='<div style="font-size:8px;background:#0891B2;color:#fff;border-radius:3px;padding:1px 3px;margin-top:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">'+escapeHtml(s.name)+'</div>';});
    dayEvts.forEach(function(e){var color=e.type==='match'?'var(--purple)':e.type==='practice'?'var(--green)':e.type==='off'?'var(--amber)':e.type==='weight'?'var(--pull)':e.type==='phys_measure'?'#0891B2':e.type==='bronco_measure'?'#059669':'var(--blue)';calH+='<div style="font-size:9px;background:'+color+';color:#fff;border-radius:3px;padding:1px 4px;margin-top:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">'+escapeHtml(e.title)+'</div>';});
    calH+='</div>';

      var color=e.type==='match'?'var(--purple)':e.type==='practice'?'var(--green)':e.type==='off'?'var(--amber)':e.type==='weight'?'var(--pull)':e.type==='phys_measure'?'#0891B2':e.type==='bronco_measure'?'#059669':'var(--blue)';
      var typelabel=e.type==='match'?'試合':e.type==='practice'?'練習':e.type==='off'?'オフ':e.type==='weight'?'ウエイト':e.type==='phys_measure'?'フィジカル測定':e.type==='bronco_measure'?'ブロンコ測定':'その他';
      var isMatch=e.type==='match';

function rehabHTML(r,done){
  var inj=D.i.find(function(x){return idEq(x.id,r.injId);}),p=D.p.find(function(x){return idEq(x.id,r.pid);});if(!p||!inj)return'';
  if(!r.stageDates)r.stageDates=[];
  if(!r.stageTargetDates)r.stageTargetDates=[];
  var dl=inj.returnDate?Math.max(0,Math.ceil((new Date(inj.returnDate)-new Date())/86400000)):null;
  var sl=STG.length-1-r.stage,dps=dl!==null&&sl>0?Math.round(dl/sl):null;
  // 現在段階の目標日と遅延判定
  var currentTarget=r.stageTargetDates[r.stage+1]||null;
  var isOverdue=false;
  var daysOverdue=0;
  if(currentTarget&&r.stage<STG.length-1){
    var targetDt=new Date(currentTarget);
    var nowDt=new Date(todayStr());
    if(nowDt>targetDt){
      isOverdue=true;
      daysOverdue=Math.ceil((nowDt-targetDt)/86400000);
    }
  }
  var h='<div class="card card-click" style="margin-bottom:10px'+(isOverdue?';border-left:3px solid var(--red)':'')+'" onclick="goInjuryDetail('+inj.id+')">'+
  '<div style="display:flex;align-items:center;gap:10px;margin-bottom:.5rem">'+avH(p,36)+
  '<div style="flex:1"><div style="font-size:14px;font-weight:600">'+escapeHtml(p.name)+' — '+injLabel(inj)+
  (isOverdue?' <span class="bd bd-r" style="font-size:9px">'+ic('i-warn',9)+' '+daysOverdue+'日遅延</span>':'')+
  '</div><div style="font-size:12px;color:var(--text-secondary)">受傷: '+fmt(inj.date)+(inj.returnDate?' | 復帰予定: '+fmt(inj.returnDate):'')+'</div></div>'+
  (dl!==null?'<span class="bd bd-b">残り約'+dl+'日</span>':'')+'</div>'+
  '<div class="stage-line" onclick="event.stopPropagation()">';
  for(var idx=0;idx<STG.length;idx++){
    var isDone=idx<r.stage,isCur=idx===r.stage;
    var sd=r.stageDates[idx]||'';
    var target=r.stageTargetDates[idx]||'';
    var est=!isDone&&!isCur&&dps?'約'+(dps*(idx-r.stage))+'日後':'';
    var dateStr='';
    if(sd){dateStr='<div class="stage-date">開始: '+fmt(sd)+'</div>';}
    else if(target){
      var tDt=new Date(target);
      var nowDt2=new Date(todayStr());
      var isLate=nowDt2>tDt;
      dateStr='<div class="stage-date" style="color:'+(isLate?'var(--red)':'var(--amber)')+';font-weight:600">'+(isLate?ic('i-warn',11)+' ':ic('i-target',11)+' ')+'目標: '+fmt(target)+'</div>';
    } else if(isCur){dateStr='<div class="stage-est" style="color:var(--blue);font-weight:600">現在</div>';}
    else if(est){dateStr='<div class="stage-est">'+est+'</div>';}
    h+='<div class="stage-item">'+(idx<STG.length-1?'<div class="stage-conn'+(isDone?' done':'')+'"></div>':'')+
    '<div class="stage-dot'+(isDone?' done':'')+(isCur?' cur':'')+'">'+(isDone?ic('i-check',12):(idx+1))+'</div>'+
    '<div class="stage-label">'+STG[idx]+'</div>'+dateStr+'</div>';
  }
  h+='</div>';
  if(!done){h+='<div onclick="event.stopPropagation()" style="display:flex;gap:6px;margin-bottom:.5rem;flex-wrap:wrap"><button class="btn btn-sm" onclick="advStage('+r.id+')">次の段階へ '+ic('i-chevron-r',12)+'</button><button class="btn btn-sm btn-d" onclick="prevStage('+r.id+')">'+ic('i-chevron-l',12)+' 前に戻す</button><button class="btn btn-sm" onclick="editStageDate('+r.id+','+r.stage+')">開始日設定</button><button class="btn btn-sm" onclick="setStageTargetDate('+r.id+','+(r.stage+1)+')">'+ic('i-target',13)+' 目標日設定</button><button class="btn btn-sm" onclick="goAddRehabLog('+r.id+')">+ 実施ログ</button><button class="btn btn-sm btn-p" onclick="goInjuryDetail('+r.injId+')">'+ic('i-chart',13)+' 評価・カルテ</button></div>';}
  // 新式（D.rlog）+ 旧式（r.logs）両方からログを取得して結合
  var newLogs=(D.rlog||[]).filter(function(l){return l.injId===r.injId;}).map(function(l){return{date:l.date,content:l.content||(l.comment||''),_id:l.id,_isNew:true};});
  var oldLogs=(r.logs||[]).map(function(lg,li){return{date:lg.date,content:lg.content,_li:li,_isNew:false};});
  var allLogs=newLogs.concat(oldLogs).sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});
  if(allLogs.length){h+='<div style="font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:4px">実施ログ</div>';allLogs.slice(0,5).forEach(function(lg){h+='<div class="log-row" onclick="event.stopPropagation()"><span style="min-width:65px;color:var(--text-secondary)">'+fmt(lg.date)+'</span><span style="flex:1">'+(lg.content||'-')+'</span>'+(lg._isNew?'<button class="btn btn-sm btn-d" style="margin-left:4px" onclick="delRehabLogStaff(\''+lg._id+'\','+r.injId+')">削除</button>':'<button class="btn btn-sm" style="margin-left:4px" onclick="goEditRehabLog('+r.id+','+lg._li+')">編集</button>')+'</div>';});}

function doEditStageDate(rid,si,btnEl){
  var nd=(document.getElementById('esd-date')||{}).value;
  if(!nd){popView();return;} // 空欄=変更なし（従来のif(!nd)return相当）
  if(!guardSubmit(btnEl,'保存中…'))return;
  var notFound=false;
  svSafeUpdate('r',function(latest){
    var idx=latest.findIndex(function(x){return idEq(x.id,rid);});
    if(idx<0){notFound=true;return latest;}
    if(!latest[idx].stageDates)latest[idx].stageDates=[];
    latest[idx].stageDates[si]=nd;
    return latest;
  },function(){if(notFound){releaseSubmit(btnEl);alert('記録が見つかりませんでした');return;}popView();toast('保存しました');},function(){releaseSubmit(btnEl);alert('保存できませんでした。もう一度お試しください');});
}
function prevStage(rid){var r=D.r.find(function(x){return x.id===rid;});if(!r||r.stage<=0)return;if(!confirm(STG[r.stage]+'から'+STG[r.stage-1]+'に戻しますか？'))return;r.stage--;svRec('r',r);V.rehab();}

// ============================================================
// ===== ケガ分析ヘルパー（既往歴・再発検知） =====
// ============================================================
// 指定選手の過去のケガ一覧（指定ケガ自身は除く、新しい順）
function getPlayerInjHistory(pid,excludeIid){
  return D.i.filter(function(x){return idEq(x.pid,pid)&&!idEq(x.id,excludeIid);})
    .sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});
}
// 同一部位の過去ケガ（再発判定用）
function getSamePartInjuries(pid,part,excludeIid){
  return getPlayerInjHistory(pid,excludeIid).filter(function(x){return x.part===part;});
}
// 再発・多発の検知。返り値: {isRecurrent:bool, samePartCount:int, sameTypeCount:int, lastSame:obj}
function analyzeRecurrence(inj){
  var samePart=getSamePartInjuries(inj.pid,inj.part,inj.id);
  var samePartType=samePart.filter(function(x){return x.type===inj.type;});
  return {
    isRecurrent: samePart.length>0,
    samePartCount: samePart.length,
    sameTypeCount: samePartType.length,
    lastSame: samePart.length?samePart[0]:null,
    history: samePart
  };
}
// 全選手の中で「同一部位を3回以上」のケガを持つ選手を検出（多発アラート）
function getFrequentInjuryPlayers(){
  var byPlayerPart={};
  D.i.forEach(function(inj){
    var key=inj.pid+'|'+inj.part;
    if(!byPlayerPart[key])byPlayerPart[key]={pid:inj.pid,part:inj.part,count:0,injs:[]};
    byPlayerPart[key].count++;
    byPlayerPart[key].injs.push(inj);
  });
  var result=[];
  Object.keys(byPlayerPart).forEach(function(k){
    if(byPlayerPart[k].count>=3)result.push(byPlayerPart[k]);
  });
  return result.sort(function(a,b){return b.count-a.count;});
}
// 既往歴HTML（カルテや登録フォームで使う）
function renderInjHistoryBox(pid,excludeIid,currentPart){
  var hist=getPlayerInjHistory(pid,excludeIid);
  if(!hist.length)return'';
  var h='<div class="form-box"><div class="form-title">'+ic('i-clipboard',14,'var(--maroon)')+' この選手の既往歴（'+hist.length+'件）</div>';
  hist.slice(0,8).forEach(function(x){
    var isSamePart=currentPart&&x.part===currentPart;
    h+='<div class="log-row" style="cursor:pointer" onclick="goInjuryDetail('+x.id+')">'+
      '<span style="min-width:64px;color:var(--text-secondary);font-size:11px">'+fmt(x.date)+'</span>'+
      '<span style="flex:1;font-weight:'+(isSamePart?'700':'500')+';'+(isSamePart?'color:var(--amber)':'')+'">'+(x.side||'')+x.part+' '+x.type+(isSamePart?' '+ic('i-warn',11)+'同部位':'')+'</span>'+
      '<span class="bd '+(x.resolved?'bd-g':'bd-r')+'" style="font-size:9px">'+(x.resolved?'回復':'治療中')+'</span>'+
      '</div>';
  });
  h+='</div>';
  return h;
}

// ============================================================
// カルテデータ取得（なければ新規作成して返す）
function getChart(injId){
  var ch=D.chart.find(function(x){return idEq(x.injId,injId);});
  if(!ch){
    ch={injId:injId,injDetail:{},medical:{},evals:[],soaps:[],returnCriteria:{},images:[]};
    D.chart.push(ch);
  }
  // 古いデータに項目がなければ補完
  if(!ch.injDetail)ch.injDetail={};
  if(!ch.medical)ch.medical={};
  if(!ch.evals)ch.evals=[];
  if(!ch.soaps)ch.soaps=[];
  if(!ch.returnCriteria)ch.returnCriteria={};
  if(!ch.images)ch.images=[];
  // 怪我×リハビリ連携（Phase0）：未定義の既存カルテで落ちないよう既定値を補完
  if(!ch.metrics)ch.metrics=[];
  if(!ch.mmtTargets)ch.mmtTargets=[];
  if(ch.injType==null)ch.injType='';
  if(ch.isConcussion==null)ch.isConcussion=false;
  if(!ch.medClearance)ch.medClearance={granted:false,date:null};
  if(!ch.romLimit)ch.romLimit={active:false,key:null,max:null,min:null,until:null};
  if(ch.rtpLevel==null)ch.rtpLevel='';
  return ch;
}
// カルテ保存（必ずsvSafeUpdateで安全に。素のsvは使わない＝他端末のカルテを巻き戻さない）
// 注意: saveChart(ch)は ch 全体を server-latest に上書きする＝同一injId内のロストアップデートの火種。
//   eval/metrics等の頻繁な編集は下の操作単位関数(saveChartMetrics/saveEval/delEval)を使うこと。
//   低頻度のSOAP/復帰基準/rtpLevel等のみ saveChart を継続使用。
function saveChart(ch,onDone){
  if(!ch){if(onDone)onDone();return;}
  // 一意キーは injId 優先、無ければ id。どちらかがあれば一致レコードをupsert、無ければ末尾に追加（全上書きはしない）
  var key=(ch.injId!=null)?'injId':(ch.id!=null?'id':null);
  return svSafeUpdate('chart',function(latest){
    if(key){
      var i=latest.findIndex(function(x){return idEq(x[key],ch[key]);});
      if(i>=0)latest[i]=ch;else latest.push(ch);
    }else{
      latest.push(ch);
    }
    return latest;
  },onDone);
}
// === METRIC-SAVE (4ファイル同期) ===
// 操作単位の保存：server-latestの対象injIdレコードの「指定フィールドだけ」を触る。
// evals/soaps等は一切触らないので、他端末がeval追加中でも巻き戻さない（ロストアップデート対策）。
function _chartIdx(latest,injId){
  var i=latest.findIndex(function(x){return idEq(x.injId,injId);});
  if(i<0){
    latest.push({injId:injId,injDetail:{},medical:{},evals:[],soaps:[],returnCriteria:{},images:[],metrics:[],mmtTargets:[]});
    i=latest.length-1;
  }
  return i;
}
// 追跡指標・MMT目標・chartレベルのメタ（種別/脳震盪/医師clearance/ROM制限）の保存
function saveChartMetrics(injId,metrics,mmtTargets,meta,onDone){
  return svSafeUpdate('chart',function(latest){
    var i=_chartIdx(latest,injId);
    if(metrics!=null)latest[i].metrics=metrics;
    if(mmtTargets!=null)latest[i].mmtTargets=mmtTargets;
    if(meta){
      if(meta.injType!=null)latest[i].injType=meta.injType;
      if(meta.isConcussion!=null)latest[i].isConcussion=meta.isConcussion;
      if(meta.medClearance!=null)latest[i].medClearance=meta.medClearance;
      if(meta.romLimit!=null)latest[i].romLimit=meta.romLimit;
    }
    return latest;
  },onDone);
}
// === CHART-UPDATE (staff/trainer同期) ===
// 操作単位のchart更新: server-latestの対象injIdレコードにfnを適用して保存する（無ければ_chartIdxが雛形を作る）。
// ローカルchを組み立てて saveChart(ch) で丸ごと置換するのは禁止（同一injId内で他端末のevals/soaps等を巻き戻す）。
function chartUpdate(injId,fn,onDone){
  return svSafeUpdate('chart',function(latest){
    var i=_chartIdx(latest,injId);
    fn(latest[i]);
    return latest;
  },onDone);
}

    h+='<div class="no">まだ評価記録がありません。<br>「新しい評価を記録する」から始めてください。</div>';
  }else{

        '<span style="font-weight:700;font-size:14px">'+fmt(ev.date)+'</span>'+
        '<div style="display:flex;gap:6px"><button class="btn btn-sm" onclick="showEvalForm('+iid+',\''+ev.id+'\')">編集</button><button class="btn btn-sm btn-d" onclick="delEval('+iid+',\''+ev.id+'\')">削除</button></div>'+
        '</div>';
      var _who=whoTag(ev.savedRole,ev.savedBy,ev.savedAt||ev.inputAt); // P4: 最終編集者・日時
      if(_who)h+='<div style="margin:-2px 0 8px">'+_who+'</div>';
      // 痛み
      if(ev.pain){
        var painParts=[];
        PAIN_TYPES.forEach(function(pt){if(ev.pain[pt.k]!=null)painParts.push(pt.label+':'+ev.pain[pt.k]);});
        if(painParts.length)h+='<div style="font-size:12px;margin-bottom:4px"><span style="color:var(--text-secondary)">痛み</span> '+painParts.join(' / ')+'</div>';
      }
      // ROM
      if(ev.rom&&Object.keys(ev.rom).length){
        var romParts=[];
        em.rom.forEach(function(r){if(ev.rom[r.k]!=null&&ev.rom[r.k]!=='')romParts.push(r.label+':'+ev.rom[r.k]+r.unit);});
        if(romParts.length)h+='<div style="font-size:12px;margin-bottom:4px"><span style="color:var(--text-secondary)">ROM</span> '+romParts.join(' / ')+'</div>';
      }
      // MMT
      if(ev.mmt&&Object.keys(ev.mmt).length){
        var mmtParts=[];
        em.mmt.forEach(function(mm){if(ev.mmt[mm]!=null&&ev.mmt[mm]!=='')mmtParts.push(mm+':'+ev.mmt[mm]);});
        if(mmtParts.length)h+='<div style="font-size:12px;margin-bottom:4px"><span style="color:var(--text-secondary)">筋力</span> '+mmtParts.join(' / ')+'</div>';
      }
      // 周径
      if(ev.circ&&Object.keys(ev.circ).length){
        var circParts=[];
        em.circ.forEach(function(c){if(ev.circ[c]!=null&&ev.circ[c]!=='')circParts.push(c+':'+ev.circ[c]+'cm');});
        if(circParts.length)h+='<div style="font-size:12px;margin-bottom:4px"><span style="color:var(--text-secondary)">周径</span> '+circParts.join(' / ')+'</div>';
      }
      // 整形外科テスト
      if(ev.ortho&&Object.keys(ev.ortho).length){
        var orthoParts=[];
        Object.keys(ev.ortho).forEach(function(k){if(ev.ortho[k])orthoParts.push(k+':'+ev.ortho[k]);});
        if(orthoParts.length)h+='<div style="font-size:12px;margin-bottom:4px"><span style="color:var(--text-secondary)">整形テスト</span> '+orthoParts.join(' / ')+'</div>';
      }

      h+='</div>';
    });
  }
  return h;
}

function saveEval(iid,evalId){
  if(!roleGuard('eval'))return;
  var pain={},rom={},mmt={},circ={},ortho={},special=[];
  var fit={},romH={},mmtH={},circH={},fitH={};
  document.querySelectorAll('.ev-pain').forEach(function(e){if(e.value!=='')pain[e.dataset.k]=parseFloat(e.value);});
  document.querySelectorAll('.ev-rom').forEach(function(e){if(e.value!=='')rom[e.dataset.k]=e.value;});
  document.querySelectorAll('.ev-mmt').forEach(function(e){if(e.value!=='')mmt[e.dataset.k]=e.value;});
  document.querySelectorAll('.ev-circ').forEach(function(e){if(e.value!=='')circ[e.dataset.k]=parseFloat(e.value);});
  document.querySelectorAll('.ev-ortho').forEach(function(e){if(e.value!=='')ortho[e.dataset.k]=e.value;});
  document.querySelectorAll('.ev-special:checked').forEach(function(e){special.push(e.value);});
  // 健側枠(*H)・フィットネス独自指標(metric id→値)。UIは後フェーズで追加（現状は空＝無害）
  document.querySelectorAll('.ev-romH').forEach(function(e){if(e.value!=='')romH[e.dataset.k]=e.value;});
  document.querySelectorAll('.ev-mmtH').forEach(function(e){if(e.value!=='')mmtH[e.dataset.k]=e.value;});
  document.querySelectorAll('.ev-circH').forEach(function(e){if(e.value!=='')circH[e.dataset.k]=parseFloat(e.value);});
  document.querySelectorAll('.ev-fit').forEach(function(e){if(e.value!=='')fit[e.dataset.k]=parseFloat(e.value);});
  document.querySelectorAll('.ev-fitH').forEach(function(e){if(e.value!=='')fitH[e.dataset.k]=parseFloat(e.value);});
  // 臨床項目（提案の安全ゲートの入力源）
  var effEl=document.getElementById('ev-effusion');var effusion=(effEl&&effEl.value!=='')?effEl.value:null;
  var plEl=document.getElementById('ev-painLoad');var painLoad=(plEl&&plEl.value!=='')?parseFloat(plEl.value):null;
  var rdEl=document.getElementById('ev-readiness');var readiness=(rdEl&&rdEl.value!=='')?parseFloat(rdEl.value):null;
  var date=document.getElementById('ev-date').value||todayStr();
  var note=document.getElementById('ev-note').value;
  var nowISO=new Date().toISOString();
  svSafeUpdate('chart',function(latest){
    var i=_chartIdx(latest,iid);
    if(!latest[i].evals)latest[i].evals=[];
    var rec=null;
    if(evalId)rec=latest[i].evals.find(function(x){return idEq(x.id,evalId);});
    if(!rec){rec={id:evalId||(Date.now()+'_'+Math.floor(Math.random()*1000))};latest[i].evals.push(rec);}
    rec.date=date;rec.pain=pain;rec.rom=rom;rec.mmt=mmt;rec.circ=circ;rec.ortho=ortho;rec.special=special;rec.note=note;rec.inputAt=nowISO;stampWho(rec);
    // 拡張フィールドは中身がある時だけ書く（空{}で既存evalを汚さない＝chart肥大も抑制）
    if(Object.keys(fit).length)rec.fit=fit;
    if(Object.keys(romH).length)rec.romH=romH;
    if(Object.keys(mmtH).length)rec.mmtH=mmtH;
    if(Object.keys(circH).length)rec.circH=circH;
    if(Object.keys(fitH).length)rec.fitH=fitH;
    if(effusion!=null)rec.effusion=effusion;
    if(painLoad!=null)rec.painLoad=painLoad;
    if(readiness!=null)rec.readiness=readiness;
    return latest;
  },function(){chartTab('eval');});
}
function delEval(iid,evalId){
  if(!confirm('この評価記録を削除しますか？'))return;
  svSafeUpdate('chart',function(latest){
    var i=latest.findIndex(function(x){return idEq(x.injId,iid);});
    if(i>=0&&latest[i].evals)latest[i].evals=latest[i].evals.filter(function(x){return!idEq(x.id,evalId);});
    return latest;
  },function(){chartTab('eval');});
}

// 怪我種別テンプレ(INJ_TEMPLATES)から指標を一括生成し、各指標の基準モード/目標/期限を設定・保存する。
// 保存は操作単位の saveChartMetrics（他端末のevals等を巻き戻さない）。
function _mid(){return Date.now()+'_'+Math.floor(Math.random()*10000);}
function renderChartMetrics(iid){
  var inj=D.i.find(function(x){return idEq(x.id,iid);});if(!inj)return'';
  var ch=getChart(iid);
  var tplKeys=Object.keys(INJ_TEMPLATES);
  var h='<div class="form-box" style="border:1px solid var(--border-secondary)">';
  h+='<div class="form-title">'+ic('i-target',14,'var(--maroon)')+' 追跡指標</div>';
  // 種別選択＋テンプレ生成

  h+='<select class="ipt" id="mt-injtype" style="flex:1;min-width:160px;max-width:220px"><option value="">怪我の種別を選択…</option>'+
     tplKeys.map(function(k){return'<option'+(ch.injType===k?' selected':'')+'>'+k+'</option>';}).join('')+'</select>';
  h+='<button class="btn btn-p btn-sm" onclick="applyInjTemplate('+iid+')">テンプレから生成</button>';
  h+='</div>';
  // 脳震盪：数値評価の対象外
  if(ch.isConcussion){
    h+='<div style="font-size:12.5px;padding:12px;border-radius:10px;background:var(--amber-bg);color:var(--amber);line-height:1.6;margin-bottom:8px">'+ic('i-warn',14)+' <b>脳震盪として登録</b>されています。数値評価の対象外です。<br>GRTP（症状ベース・24時間ルール・症状再燃で前段階へ後退）で管理してください。</div>';
    h+='<label style="font-size:12.5px;display:flex;align-items:center;gap:6px;cursor:pointer;margin-top:4px"><input type="checkbox" id="mt-concussion" checked onchange="toggleConcussion('+iid+')"> 脳震盪として扱う（数値評価の対象外）</label>';
    h+='</div>';
    return h;
  }
  // 禁忌期間メモ
  if(ch.injType&&INJ_TEMPLATES[ch.injType]&&INJ_TEMPLATES[ch.injType].contra){

  }
  // 指標リスト
  var ms=ch.metrics||[];
  if(!ms.length){
    h+='<div class="no" style="padding:10px">まだ追跡指標がありません。<br>上で種別を選んで「テンプレから生成」するか、下から手動で追加できます。</div>';
  }else{
    ms.forEach(function(m){h+=metricRow(iid,m);});
  }
  // 手動追加＋保存
  h+='<div style="display:flex;gap:8px;margin-top:10px">'+
     '<button class="btn btn-sm" onclick="addCustomMetric('+iid+')">＋ 指標を手動追加</button>'+
     (ms.length?'<button class="btn btn-p btn-sm" style="flex:1" onclick="saveMetricsFromUI('+iid+')">追跡指標の設定を保存</button>':'')+
     '</div>';
  // 脳震盪トグル
  h+='<label style="font-size:12.5px;display:flex;align-items:center;gap:6px;cursor:pointer;margin-top:12px;color:var(--text-secondary)"><input type="checkbox" id="mt-concussion" onchange="toggleConcussion('+iid+')"> 脳震盪として扱う（数値評価の対象外）</label>';
  h+='</div>';
  return h;
}
// 1指標の編集行（名前・種類・単位・向き・基準・目標・期限すべて編集可）

  h+='<input type="number" step="any" class="ipt mt-baseval" value="'+(m.baseValue!=null?m.baseValue:'')+'" placeholder="手動基準値" style="width:110px">';
  h+='<label style="font-size:12px;display:flex;align-items:center;gap:4px;cursor:pointer" title="患側/健側で回復度を見る指標"><input type="checkbox" class="mt-lsi"'+(m.lsi?' checked':'')+'> 患健LSI</label>';
  h+='</div>';

  h+='<input type="date" class="ipt mt-deadline" value="'+(m.deadline||'')+'" style="width:150px">';
  h+='</div>';
  h+='</div>';

}
// 種別テンプレから指標を一括生成（既存指標は置換）
function applyInjTemplate(iid){
  var sel=document.getElementById('mt-injtype');if(!sel)return;
  var key=sel.value;
  if(!key||!INJ_TEMPLATES[key]){alert('怪我の種別を選択してください');return;}
  var tpl=INJ_TEMPLATES[key];
  var ch=getChart(iid);
  if((ch.metrics&&ch.metrics.length)&&!confirm('「'+key+'」のテンプレで追跡指標を置き換えます。\n現在の指標設定は消えます。よろしいですか？'))return;
  var inj=D.i.find(function(x){return idEq(x.id,iid);});
  var side=(inj&&inj.side)?inj.side:null;
  var metrics=(tpl.metrics||[]).map(function(t){
    var baseMode=t.lsi?'健側':(t.evalKey?'正常値':'受傷前');
    return {id:_mid(),name:t.name,kind:t.kind,unit:t.unit||'',evalKey:t.evalKey||null,
      side:t.lsi?side:null,direction:t.direction||'up',lsi:!!t.lsi,
      baseMode:baseMode,baseValue:null,target:null,deadline:null,
      cat:METRIC_CAT_MAP[t.kind]||'',tplId:key,exName:null};
  });
  saveChartMetrics(iid,metrics,null,{injType:key,isConcussion:!!tpl.concussion},function(){chartTab('eval');});
}
// 空の指標を1件追加（手動作成用）
function addCustomMetric(iid){
  var ch=getChart(iid);

function delMetric(iid,mid){

// UI上の各行の入力を集めて保存（既存フィールドは保持、編集項目だけ上書き）
function saveMetricsFromUI(iid){
  var ch=getChart(iid);
  var metrics=(ch.metrics||[]).map(function(m){
    var row=document.querySelector('.mt-row[data-mid="'+m.id+'"]');
    if(!row)return m;
    function val(cls){var e=row.querySelector('.'+cls);return e?e.value:'';}
    function chk(cls){var e=row.querySelector('.'+cls);return e?e.checked:false;}
    var nm={};for(var k in m)nm[k]=m[k];
    nm.name=(val('mt-name')||'').trim()||m.name;
    nm.kind=val('mt-kind')||m.kind;
    nm.unit=val('mt-unit');
    nm.direction=val('mt-dir')||'up';
    nm.baseMode=val('mt-base')||'正常値';
    nm.lsi=chk('mt-lsi');
    var bv=val('mt-baseval');nm.baseValue=(nm.baseMode==='手動'&&bv!=='')?parseFloat(bv):null;
    var tg=val('mt-target');nm.target=(tg!=='')?parseFloat(tg):null;
    var dl=val('mt-deadline');nm.deadline=dl||null;
    nm.cat=METRIC_CAT_MAP[nm.kind]||nm.cat||'';
    if(nm.side==null&&nm.lsi){var inj=D.i.find(function(x){return idEq(x.id,iid);});nm.side=(inj&&inj.side)?inj.side:null;}
    return nm;
  });
  saveChartMetrics(iid,metrics,null,null,function(){chartTab('eval');});

// 脳震盪フラグの切替（数値評価の対象外）

// ===== 追跡指標ヘルパー（trainerからverbatim移植・バイト一致）=====
// === ステップ⑤-b: クイック評価（痛み＋重要指標・chart.metrics連動）===
// metricの値がevalレコードのどのフィールド/キーに入るかを解決（Phase0のev.rom/circ/fit・健側枠と整合）
function metricEvalRef(m){
  if(m.kind==='rom'&&m.evalKey)return{f:'rom',hf:'romH',k:m.evalKey,str:true};
  if(m.kind==='circ'&&m.evalKey)return{f:'circ',hf:'circH',k:m.evalKey,str:false};
  // strength(定量kg)・fitness・evalKey無しのrom/circ は fit/fitH に metric.id で格納
  return{f:'fit',hf:'fitH',k:'m_'+m.id,str:false};
}
// evalレコードから指定metricの数値を取り出す（患側/健側）。無ければnull
function readEvalMetric(rec,ref,healthy){
  var obj=rec[healthy?ref.hf:ref.f];
  if(!obj)return null;
  var v=obj[ref.k];
  if(v==null||v==='')return null;
  var n=parseFloat(v);
  return isNaN(n)?null:n;
}
// 指定metricについて、最新の患側値を持つevalから {patient,healthy,date} を返す（date→inputAtの2段ソート）
function latestEvalForMetric(evals,m){
  var ref=metricEvalRef(m);
  var sorted=(evals||[]).slice().sort(function(a,b){
    var d=(b.date||'').localeCompare(a.date||'');
    if(d!==0)return d;
    return (b.inputAt||'').localeCompare(a.inputAt||'');
  });
  for(var i=0;i<sorted.length;i++){
    var pv=readEvalMetric(sorted[i],ref,false);
    if(pv!=null)return{patient:pv,healthy:readEvalMetric(sorted[i],ref,true),date:sorted[i].date};
  }
  return null;
}
// direction考慮の左右比%（患健の対称性・0除算/NaN/Infガード）。>=90%で左右差ほぼ解消の目安。
function symPct(patient,healthy,direction){
  if(patient==null||healthy==null||isNaN(patient)||isNaN(healthy))return null;
  var num,den;
  if(direction==='down'){num=healthy;den=patient;}else{num=patient;den=healthy;}
  if(den===0)return num===0?100:null;
  var pct=num/den*100;
  if(!isFinite(pct))return null;
  return Math.round(pct);
}
// 指定metricの患側値の時系列（昇順 date→inputAt）。スパークライン用。[{date,v}]
function metricSeries(evals,m){
  var ref=metricEvalRef(m);
  var sorted=(evals||[]).slice().sort(function(a,b){
    var d=(a.date||'').localeCompare(b.date||'');
    if(d!==0)return d;
    return (a.inputAt||'').localeCompare(b.inputAt||'');
  });
  var out=[];
  sorted.forEach(function(ev){var v=readEvalMetric(ev,ref,false);if(v!=null)out.push({date:ev.date,v:v});});
  return out;
}
// ネオン系ミニスパークライン（純SVG・Chart.js不使用）。pts=[{date,v}]昇順。
// 2点未満は''（推移が描けない）。min==max（横ばい）は中央の水平線。direction基準で終点ドットを色分け（改善=緑/悪化=赤/横ばい=青）。
function sparklineSVG(pts,direction,idsfx){
  pts=(pts||[]).filter(function(p){return p&&p.v!=null&&!isNaN(p.v);});
  if(pts.length>12)pts=pts.slice(-12);
  if(pts.length<2)return '';
  idsfx=String(idsfx==null?'':idsfx).replace(/[^a-zA-Z0-9_]/g,'');
  var W=300,H=40,padX=6,padT=8,padB=8,n=pts.length;
  var vals=pts.map(function(p){return p.v;});
  var mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals),span=mx-mn;
  var X=function(i){return Math.round((padX+(W-2*padX)*(i/(n-1)))*10)/10;};
  var Y=function(v){var y=span===0?H/2:padT+(H-padT-padB)*(1-(v-mn)/span);return Math.round(y*10)/10;};
  var pointStr=pts.map(function(p,i){return X(i)+','+Y(p.v);}).join(' ');
  var first=vals[0],last=vals[n-1],flat=last===first;
  var improved=direction==='down'?last<first:last>first;
  // direction==='none' は良し悪しを断定しない項目（ROM/周径など向きが部位で反転しうる）＝終点は常に青
  var endCol=(direction==='none'||flat)?'var(--blue)':(improved?'var(--green)':'var(--red)');
  var lx=X(n-1),ly=Y(last);
  var sg='sg_'+idsfx,sa='sa_'+idsfx;
  var areaStr='M'+X(0)+','+(H-padB)+' L'+pointStr.split(' ').join(' L')+' L'+lx+','+(H-padB)+' Z';
  var s='<svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none" style="width:100%;height:38px;display:block;overflow:visible">';
  s+='<defs><linearGradient id="'+sg+'" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#3B82F6"/><stop offset="1" stop-color="#A78BFA"/></linearGradient>';
  s+='<linearGradient id="'+sa+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#3B82F6" stop-opacity="0.28"/><stop offset="1" stop-color="#3B82F6" stop-opacity="0"/></linearGradient></defs>';
  s+='<path d="'+areaStr+'" fill="url(#'+sa+')" stroke="none"/>';
  s+='<polyline points="'+pointStr+'" fill="none" stroke="url(#'+sg+')" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.35" vector-effect="non-scaling-stroke"/>';
  s+='<polyline points="'+pointStr+'" fill="none" stroke="url(#'+sg+')" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke"/>';
  s+='<circle cx="'+lx+'" cy="'+ly+'" r="5.5" fill="'+endCol+'" opacity="0.25"/>';
  s+='<circle cx="'+lx+'" cy="'+ly+'" r="2.8" fill="'+endCol+'"/>';
  s+='</svg>';
  return s;
}
// スパークライン脇の推移キャプション（N回・↗改善/↘悪化/→横ばい）。direction基準。2点未満は''
function sparkCaption(pts,direction){
  if(!pts||pts.length<2)return '';
  var first=pts[0].v,last=pts[pts.length-1].v,flat=last===first;
  var improved=direction==='down'?last<first:last>first;
  var arrow=flat?'→':(last>first?'↗':'↘'); // 矢印は数値の増減（スパークラインの見た目と一致）、色で良し悪しを表す
  // direction==='none' は良し悪しを断定しない＝色はニュートラル（矢印だけで数値の増減を示す）
  var col=(direction==='none'||flat)?'var(--text-secondary)':(improved?'var(--green)':'var(--red)');
  return '<span style="white-space:nowrap"><span style="font-size:10px;color:var(--text-tertiary)">'+pts.length+'回</span> <span style="font-size:13px;font-weight:700;color:'+col+'">'+arrow+'</span></span>';
}

// === 怪我×リハビリ連携 Phase2: 不足ゲージ（読み取り＋描画のみ・書込なし）===
// 数値の軽い整形（小数1桁まで・末尾0除去）。null/NaNは''
function fmtNum(n){if(n==null||isNaN(n))return'';var r=Math.round(Number(n)*10)/10;return String(r);}
// 2日付(YYYY-MM-DD)の日数差 to-from（floor）。無効はNaN
function daysBetween(from,to){return Math.floor((new Date(to)-new Date(from))/86400000);}
// 健側値を持つ最新evalを独立に探索（患側最新と同じevalとは限らない）。{val,date}|null
function latestHealthyForMetric(evals,m){
  var ref=metricEvalRef(m);
  var sorted=(evals||[]).slice().sort(function(a,b){
    var d=(b.date||'').localeCompare(a.date||'');
    if(d!==0)return d;
    return (b.inputAt||'').localeCompare(a.inputAt||'');
  });
  for(var i=0;i<sorted.length;i++){
    var hv=readEvalMetric(sorted[i],ref,true);
    if(hv!=null)return{val:hv,date:sorted[i].date};
  }
  return null;
}
// 最古の患側値を持つeval（受傷前基準の代用＝初回評価）。昇順スキャン。{val,date}|null
function oldestPatientForMetric(evals,m){
  var ref=metricEvalRef(m);
  var sorted=(evals||[]).slice().sort(function(a,b){
    var d=(a.date||'').localeCompare(b.date||'');
    if(d!==0)return d;
    return (a.inputAt||'').localeCompare(b.inputAt||'');
  });
  for(var i=0;i<sorted.length;i++){
    var pv=readEvalMetric(sorted[i],ref,false);
    if(pv!=null)return{val:pv,date:sorted[i].date};
  }
  return null;
}
// EVAL_MASTER[部位].rom から m.evalKey に一致する normal を数値で返す（rom以外/未定義はnull）
function normalForMetric(inj,m){
  if(!m.evalKey)return null;
  var em=EVAL_MASTER[inj.part]||EVAL_MASTER['その他'];
  if(!em||!em.rom)return null;
  for(var i=0;i<em.rom.length;i++){
    if(em.rom[i].k===m.evalKey){var n=parseFloat(em.rom[i].normal);return isNaN(n)?null:n;}
  }
  return null;
}
// 基準（ターゲット）解決。優先: 手動目標target → baseModeの指す先 → フォールバック(健側→正常値→受傷前)
// 返り値 {val,src,srcKey,date?}|null（全滅で基準未設定）
function resolveMetricBase(ch,inj,m){
  var evals=ch.evals||[];
  if(m.target!=null&&!isNaN(parseFloat(m.target)))return{val:parseFloat(m.target),src:'手動目標',srcKey:'target'};
  var tried={};
  function tryMode(mode){
    if(!mode||tried[mode])return null;tried[mode]=true;
    if(mode==='手動'){
      if(m.baseValue!=null&&!isNaN(parseFloat(m.baseValue)))return{val:parseFloat(m.baseValue),src:'手動基準',srcKey:'manual'};
      return null;
    }
    if(mode==='健側'){
      var hv=latestHealthyForMetric(evals,m);
      if(hv)return{val:hv.val,src:'健側比',srcKey:'healthy',date:hv.date};
      return null;
    }
    if(mode==='正常値'){
      var nv=normalForMetric(inj,m);
      if(nv!=null)return{val:nv,src:'正常値比',srcKey:'normal'};
      return null;
    }
    if(mode==='受傷前'){
      var ov=oldestPatientForMetric(evals,m);
      if(ov)return{val:ov.val,src:'初回評価比（参考）',srcKey:'oldest',date:ov.date};
      return null;
    }
    return null;
  }
  var r=tryMode(m.baseMode);
  if(r)return r;
  var chain=['健側','正常値','受傷前'];
  for(var i=0;i<chain.length;i++){var f=tryMode(chain[i]);if(f)return f;}
  return null;
}
// 達成率と「あと◯◯」（direction補正＋ガード）。{pct,remain,reached}
// up: pct=cur/base, remain=base-cur ／ down(小さいほど良い): pct=base/cur, remain=cur-base
function gaugeCalc(cur,base,direction){
  var out={pct:null,remain:null,reached:false};
  if(cur==null||base==null||isNaN(cur)||isNaN(base))return out;
  if(direction==='down'){
    out.remain=Math.max(0,cur-base);
    if(cur===0)out.pct=(base===0)?100:null;
    else{var pd=base/cur*100;out.pct=isFinite(pd)?pd:null;}
  }else{
    out.remain=Math.max(0,base-cur);
    if(base===0)out.pct=(cur===0)?100:null;
    else{var pu=cur/base*100;out.pct=isFinite(pu)?pu:null;}
  }
  if(out.pct!=null&&out.pct>=100)out.reached=true;
  return out;
}
// 達成率→色（CSS変数・両テーマ自動適応）。≧90緑/60-89青/<60アンバー/不明はグレー
function gaugeColor(pct){
  if(pct==null)return'var(--text-tertiary)';
  if(pct>=90)return'var(--green)';
  if(pct>=60)return'var(--blue)';
  return'var(--amber)';
}
// ネオン円形プログレスリング（純SVG）。弧は0-100クランプ、中央%表示は実数（120%等）。
// colorはCSS変数（fill/stroke属性でvar()を使う既存スパークラインと同じ流儀）。glowで発光。
function gaugeSVG(pct,color,idsfx){
  idsfx=String(idsfx==null?'':idsfx).replace(/[^a-zA-Z0-9_]/g,'');
  var size=88,sw=9,r=(size-sw)/2,cx=size/2,cy=size/2,circ=2*Math.PI*r;
  var shown=(pct==null)?0:Math.max(0,Math.min(100,pct));
  var dash=Math.round(circ*shown/100*10)/10;
  var gap=Math.round((circ-dash)*10)/10;
  var s='<svg viewBox="0 0 '+size+' '+size+'" style="width:78px;height:78px;display:block">';
  s+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="var(--border-secondary)" stroke-width="'+sw+'" opacity="0.5"/>';

    s+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+color+'" stroke-width="'+sw+'" stroke-linecap="round" stroke-dasharray="'+dash+' '+gap+'" transform="rotate(-90 '+cx+' '+cy+')" opacity="0.4" style="filter:drop-shadow(0 0 5px '+color+')"/>';
    s+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+color+'" stroke-width="'+sw+'" stroke-linecap="round" stroke-dasharray="'+dash+' '+gap+'" transform="rotate(-90 '+cx+' '+cy+')"/>';
  }

  s+='<text x="'+cx+'" y="'+cy+'" text-anchor="middle" dominant-baseline="central" font-size="18" font-weight="800" fill="'+color+'">'+label+'</text>';

}
// MMT段階ドット（chart.metricsにMMTは無いが軽量版）。最新のev.mmtを持つeval→各項目をMMT_ORDER indexで。
function renderMMTDots(inj,evals){
  var em=EVAL_MASTER[inj.part]||EVAL_MASTER['その他'];
  if(!em||!em.mmt||!em.mmt.length)return'';
  var sorted=(evals||[]).slice().sort(function(a,b){
    var d=(b.date||'').localeCompare(a.date||'');
    if(d!==0)return d;return (b.inputAt||'').localeCompare(a.inputAt||'');
  });
  var ev=null;
  for(var i=0;i<sorted.length;i++){if(sorted[i].mmt&&Object.keys(sorted[i].mmt).length){ev=sorted[i];break;}}
  if(!ev)return'';
  var rows='';
  em.mmt.forEach(function(mm){
    var cur=ev.mmt[mm];
    if(cur==null||cur==='')return;
    var ci=MMT_ORDER.indexOf(String(cur));
    if(ci<0)return;
    var hi=(ev.mmtH&&ev.mmtH[mm]!=null&&ev.mmtH[mm]!=='')?MMT_ORDER.indexOf(String(ev.mmtH[mm])):-1;
    var dots='';
    for(var j=0;j<MMT_ORDER.length;j++){
      var on=j<=ci;
      var isCur=j===ci;
      var isH=j===hi;
      var bg=on?(ci>=8?'var(--green)':(ci>=6?'var(--blue)':'var(--amber)')):'var(--border-secondary)';
      var ring=isH?';box-shadow:0 0 0 2px var(--text-tertiary)':'';
      var sz=isCur?'11px':'7px';
      dots+='<span title="'+escapeHtml(MMT_ORDER[j])+'" style="width:'+sz+';height:'+sz+';border-radius:50%;background:'+bg+';display:inline-block'+ring+'"></span>';
    }
    rows+='<div style="display:flex;align-items:center;gap:5px;margin-bottom:5px"><span style="font-size:11px;min-width:64px;color:var(--text-secondary)">'+escapeHtml(mm)+'</span><span style="display:flex;gap:3px;align-items:center">'+dots+'</span><span style="font-size:11px;font-weight:700;margin-left:4px">'+escapeHtml(String(cur))+'</span>'+(hi>=0?'<span style="font-size:10px;color:var(--text-tertiary)">健:'+escapeHtml(String(ev.mmtH[mm]))+'</span>':'')+'</div>';
  });
  if(!rows)return'';
  return '<div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border-tertiary)"><div style="font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:8px">'+ic('i-dumbbell',12)+' 徒手筋力（MMT）'+fmt(ev.date)+'</div>'+rows+'</div>';
}
// 1指標の不足ゲージカード（リング＋現状/基準＋あと◯◯＋出所ラベル＋LSI＋期限＋スパークライン）
function deficitGaugeCard(ch,inj,m,mi){
  var evals=ch.evals||[];
  var name=escapeHtml(m.name||'(名称未設定)');
  var unit=escapeHtml(m.unit||'');
  var cur=latestEvalForMetric(evals,m); // {patient,healthy,date}|null
  var base=resolveMetricBase(ch,inj,m); // {val,src,srcKey,date?}|null
  var cardStyle='flex:1 1 168px;min-width:168px;max-width:260px;background:var(--card-bg,transparent);border:1px solid var(--border-tertiary);border-radius:var(--radius);padding:12px;box-sizing:border-box';
  var h='<div style="'+cardStyle+'">';
  if(!base){
    h+='<div style="font-weight:700;font-size:13px;margin-bottom:6px">'+name+'</div>';
    h+='<div style="font-size:11.5px;color:var(--text-secondary);line-height:1.5">基準が未設定です。指標の「基準」または「目標」を設定すると達成率が表示されます。</div>';
    h+='</div>';return h;
  }
  if(!cur){
    h+='<div style="font-weight:700;font-size:13px;margin-bottom:6px">'+name+'</div>';
    h+='<div style="font-size:11.5px;color:var(--text-secondary);line-height:1.5">まだ測定記録がありません。評価を記録すると達成率が表示されます。</div>';
    h+='<div style="font-size:11px;color:var(--text-tertiary);margin-top:6px">基準 '+fmtNum(base.val)+unit+'（'+escapeHtml(base.src)+'）</div>';
    h+='</div>';return h;
  }
  var dir=(m.direction==='down')?'down':'up';
  var gc=gaugeCalc(cur.patient,base.val,dir);
  var col=gaugeColor(gc.pct);
  h+='<div style="display:flex;gap:10px;align-items:center;margin-bottom:8px">';
  h+='<div style="flex:0 0 auto">'+gaugeSVG(gc.pct,col,'g'+mi)+'</div>';
  h+='<div style="flex:1;min-width:0">';
  h+='<div style="font-weight:700;font-size:13px;line-height:1.3;margin-bottom:2px">'+name+'</div>';
  h+='<div style="font-size:11.5px;color:var(--text-secondary)">現状 <b style="color:var(--text-primary)">'+fmtNum(cur.patient)+unit+'</b> / 基準 '+fmtNum(base.val)+unit+'</div>';
  if(gc.reached){
    var reachMsg=(base.srcKey==='oldest')?'初回値に到達・手動目標の設定を推奨':'基準に到達';
    h+='<div style="font-size:11.5px;color:var(--green);font-weight:700;margin-top:2px">'+ic('i-check',11)+' '+reachMsg+'</div>';
  }else if(gc.remain!=null){
    h+='<div style="font-size:11.5px;color:var(--amber);font-weight:700;margin-top:2px">あと '+fmtNum(gc.remain)+unit+'</div>';
  }
  h+='</div></div>';
  h+='<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px">';
  h+='<span style="font-size:10px;padding:2px 7px;border-radius:99px;background:var(--border-tertiary);color:var(--text-secondary)">'+escapeHtml(base.src)+'</span>';
  if(base.srcKey==='healthy'&&base.date){
    var days=daysBetween(base.date,todayStr());
    var stale=days>=14;
    h+='<span style="font-size:10px;padding:2px 7px;border-radius:99px;background:'+(stale?'var(--amber-bg)':'var(--border-tertiary)')+';color:'+(stale?'var(--amber)':'var(--text-tertiary)')+'">健側測定:'+days+'日前</span>';
  }
  if(m.deadline){
    var dd=daysBetween(todayStr(),m.deadline);
    if(dd>=0)h+='<span style="font-size:10px;padding:2px 7px;border-radius:99px;background:var(--border-tertiary);color:var(--text-secondary)">期限まで'+dd+'日</span>';
    else h+='<span style="font-size:10px;padding:2px 7px;border-radius:99px;background:var(--red-bg);color:var(--red)">期限超過'+(-dd)+'日</span>';
  }
  h+='</div>';
  if(m.lsi){
    var sp=symPct(cur.patient,cur.healthy,dir);
    if(sp!=null){
      var lcol=sp>=90?'var(--green)':(sp>=80?'var(--amber)':'var(--red)');
      var lbg=sp>=90?'var(--green-bg)':(sp>=80?'var(--amber-bg)':'var(--red-bg)');
      h+='<div style="font-size:11px;padding:4px 8px;border-radius:8px;background:'+lbg+';color:'+lcol+';font-weight:700;margin-bottom:6px">患健比 '+sp+'%'+(sp>=90?' '+ic('i-check',10):'')+' <span style="font-weight:400;color:var(--text-secondary)">(患'+fmtNum(cur.patient)+'/健'+fmtNum(cur.healthy)+unit+')</span></div>';
    }else if(cur.healthy==null){
      h+='<div style="font-size:10.5px;color:var(--text-tertiary);margin-bottom:6px">健側未測定（LSI算出待ち）</div>';
    }
  }
  var pts=metricSeries(evals,m);
  var spark=sparklineSVG(pts,dir,'dg'+mi);
  if(spark)h+='<div style="margin-top:2px">'+spark+'</div>';
  h+='</div>';
  return h;
}

function saveSOAP(iid,soapId){
  var g=function(id){var e=document.getElementById(id);return e?e.value:'';};
  var data={date:g('sp-date')||todayStr(),s:g('sp-s'),o:g('sp-o'),a:g('sp-a'),p:g('sp-p'),menu:g('sp-menu'),author:g('sp-author'),inputAt:new Date().toISOString()};
  if(!soapId)data.id=Date.now()+'_'+Math.floor(Math.random()*1000);
  chartUpdate(iid,function(ch){
    if(!ch.soaps)ch.soaps=[];
    if(soapId){
      var sp=ch.soaps.find(function(x){return idEq(x.id,soapId);});
      if(sp)Object.assign(sp,data);
    }else{
      ch.soaps.push(data);
    }
  },function(){chartTab('soap');});
}
function delSOAP(iid,soapId){
  if(!confirm('この記録を削除しますか？'))return;
  chartUpdate(iid,function(ch){
    ch.soaps=(ch.soaps||[]).filter(function(x){return!idEq(x.id,soapId);});
  },function(){chartTab('soap');});
}

function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

function getCurrentUserId(role){
  // role別の現在ユーザーID取得
  if(role==='staff')return 'staff'; // スタッフ複数だが一括
  if(role==='player')return typeof myPid!=='undefined'?myPid:null;
  if(role==='trainer')return (typeof myTrainer!=='undefined'&&myTrainer)?myTrainer.id:null;
  return null;
}

function getCurrentUserName(role){
  if(role==='staff')return 'スタッフ';
  if(role==='player'){var p=D.p.find(function(x){return idEq(x.id,myPid);});return p?p.name:'選手';}
  if(role==='trainer')return (typeof myTrainer!=='undefined'&&myTrainer)?myTrainer.name:'専門学生';
  return '';
}
// 記録者名の解決: authorId(trainerId)があればtrainersから現在の名前を引く→旧レコードの author 文字列にフォールバック。改名が新規レコードに反映される。
function recorderName(rec){
  if(rec&&rec.authorId!=null){
    var t=(D.trainers||[]).find(function(x){return idEq(x.id,rec.authorId);});
    if(t)return t.name;
  }
  return (rec&&rec.author)||'';
}

// ===== P4: リハビリ役割分担フレーム（緩やか分担） =====
// MY_ROLE = このファイルを操作するロール（staff/trainerで固定）。roleGateが参照する。
var MY_ROLE='staff';
// ROLE_MODE: 'soft'=日次記録は両者可（トレーナー主体はバッジで表示）・確定操作のみスタッフ専任
//            'strict'=日次記録もトレーナー専任化（staffは「依頼」経由）。将来この1行を'strict'に変えるだけで切替可能。
var ROLE_MODE='soft';
// ROLE_ACL: アクション→担当ロール。'staff'=確定操作(両モードでスタッフ専任)／'trainer'=日次記録(softは両者可・strictでトレーナー専任)／'both'=常に両者可
var ROLE_ACL={rlog:'trainer',stage:'both',diagnosis:'trainer',eval:'trainer',nextmenu:'trainer',resolve:'staff',unresolve:'staff','delete':'staff',approveRtp:'staff',approveRtest:'staff'};
// REQ_META: 「依頼」機構。prefix=injcomm検出用センチネル文字列／label=依頼対象アクションの表示名
var REQ_META={prefix:'🔔【依頼】',label:{resolve:'「回復済み」への変更',unresolve:'「治療中に戻す」','delete':'この記録の削除',approveRtp:'RTP（完全復帰）承認',approveRtest:'復帰テスト承認'}};
// roleGate(action): MY_ROLE が action を実行してよいか（true=許可／false=不可＝依頼へ誘導）
function roleGate(action){
  var owner=ROLE_ACL[action]||'both';
  if(owner==='both')return true;
  if(owner==='staff')return MY_ROLE==='staff';
  if(ROLE_MODE==='soft')return true;
  return MY_ROLE==='trainer';
}
// roleGuard(action): roleGateが不許可なら理由を提示してfalse（呼び出し側は即return）。
// softでは日次記録は常に許可＝完全に素通り（出荷挙動は不変）。strict時のみ実効化する。
function roleGuard(action){
  if(roleGate(action))return true;
  var owner=ROLE_ACL[action],jp={trainer:'トレーナー',staff:'スタッフ'};
  if(owner==='staff')alert('この操作はスタッフが確定します。トレーナーは「依頼」から連絡してください。');
  else alert('現在は'+(jp[owner]||'担当者')+'が記録する設定です（ROLE_MODE=strict）。');
  return false;
}
// roleTag(role): 記録者の役割バッジ（🔵トレーナー記録／🟤スタッフ記録）
function roleTag(role){
  if(role==='trainer')return '<span class="bd" style="background:var(--blue);color:#fff;font-size:9px">🔵 トレーナー</span>';
  if(role==='staff')return '<span class="bd" style="background:var(--maroon);color:#fff;font-size:9px">🟤 スタッフ</span>';
  if(role==='player')return '<span class="bd" style="background:var(--text-tertiary);color:#fff;font-size:9px">選手</span>';
  return '';
}
// stampWho(rec): 保存時に「誰が(role/name)・いつ」を記録（追加フィールドのみ）。最終編集者表示の土台。
function stampWho(rec){if(!rec)return rec;rec.savedRole=MY_ROLE;rec.savedBy=getCurrentUserName(MY_ROLE);rec.savedAt=new Date().toISOString();return rec;}
// whoTag(role,name,at): 最終編集者の表示「🔵/🟤 名前 ・ 7/14 10:30」。無い要素は省略。
function whoTag(role,name,at){
  var b=role?roleTag(role):'';
  var lbl={trainer:'トレーナー',staff:'スタッフ',player:'選手'};
  var nm=(name&&name!==lbl[role])?escapeHtml(String(name)):''; // 名前がロール名と同一（例: staffの'スタッフ'）なら重複表示しない
  var head=[b,nm].filter(Boolean).join(' ');
  var tm=at?fmtDateTime(at):'';
  if(!head&&!tm)return '';
  return '<span style="font-size:11px;color:var(--text-secondary)">'+head+(tm?(head?' ・ ':'')+tm:'')+'</span>';
}

function postInjComment(iid,role){
  var el=document.getElementById('injcomm-input-'+iid);
  if(!el)return;
  var text=(el.value||'').trim();
  if(!text){alert('コメントを入力してください');return;}
  var newComm={
    id:'ic_'+Date.now()+'_'+Math.floor(Math.random()*1000),
    injId:iid,
    role:role,
    authorId:getCurrentUserId(role),
    authorName:getCurrentUserName(role),
    text:text,
    createdAt:new Date().toISOString()
  };
  svSafeUpdate('injcomm',function(latest){
    latest.push(newComm);
    return latest;
  },function(){
    el.value='';
    // リスト再描画
    var listEl=document.getElementById('injcomm-list-'+iid);
    if(listEl){
      var newHtml=renderInjCommentsListOnly(iid,role);
      listEl.innerHTML=newHtml;
      listEl.scrollTop=listEl.scrollHeight;
    }
  }).catch(function(e){alert('投稿に失敗しました');console.error(e);});
}

    '<span style="color:var(--text-secondary)">'+dateStr+((canEdit&&!editing)?' <button class="btn btn-sm" onclick="editInjComment(\''+c.id+'\','+iid+',\''+role+'\')">編集</button> <button class="btn btn-sm btn-d" onclick="delInjComment(\''+c.id+'\','+iid+',\''+role+'\')">削除</button>':'')+'</span>'+
    '</div>'+
    (editing?'<textarea class="ipt" id="injcomm-edit-'+c.id+'" style="font-size:13px;min-height:56px">'+escapeHtml(c.text||'')+'</textarea><div style="display:flex;gap:6px;justify-content:flex-end;margin-top:4px"><button class="btn btn-sm" onclick="cancelEditInjComment('+iid+',\''+role+'\')">キャンセル</button><button class="btn btn-sm btn-p" onclick="doEditInjComment(\''+c.id+'\','+iid+',\''+role+'\')">保存</button></div>':'<div style="font-size:13px;white-space:pre-wrap;word-break:break-word">'+escapeHtml(c.text||'')+'</div>')+

function cancelEditInjComment(iid,role){

function doEditInjComment(cid,iid,role){
  var el=document.getElementById('injcomm-edit-'+cid);if(!el)return;

function markVisited(iid){var inj=D.i.find(function(x){return x.id===iid;});if(!inj)return;inj.hospitalVisited=true;inj.hospitalDate=todayStr();svRec('i',inj);goInjuryDetail(iid);}
function deleteInjury(iid){
  if(!confirm('この怪我記録を削除しますか？\n（関連するリハビリ記録・プラン・進行データもすべて削除されます。元に戻せません。）'))return;
  var id=parseInt(iid)||iid;
  // 4つのコレクションを順番に削除（Firestoreから最新取得→該当削除→保存）
  // i (怪我), r (リハビリ進行), rplan (プラン), rlog (記録)
  function deleteFromCollection(collectionKey, matchField){
    return svSafeUpdate(collectionKey,function(latest){
      return latest.filter(function(r){
        if(matchField==='id'){return r.id!==id&&String(r.id)!==String(iid);}
        return r[matchField]!==id&&String(r[matchField])!==String(iid);
      });
    });
  }
  deleteFromCollection('i','id')
    .then(function(){return deleteFromCollection('r','injId');})
    .then(function(){return deleteFromCollection('rplan','injId');})
    .then(function(){return deleteFromCollection('rlog','injId');})
    .then(function(){popView();toast('削除しました');})
    .catch(function(e){alert('削除に失敗しました');console.error(e);});
}

  pushView('怪我を編集','<div style="max-width:520px"><div class="form-box"><div class="form-title">怪我情報を編集</div><div class="grid g2" style="gap:14px">'+
  '<div class="fl" style="grid-column:1/-1"><label>選手</label><div style="font-size:14px;font-weight:600">'+(p?p.name:'不明')+'</div></div>'+

function phBroncoBoardHtml(){

      var bi=getBroncoRankInfo(p.id,getBest(p.id,'bronco')); // 達成ボードは自己ベスト基準（達成・最速・達成率は career-best で判定）

        (measured?'<span style="color:var(--text-secondary);font-weight:700">'+broncoFmt(bi.best)+'</span>'+(achieved?ic('i-check',11,'var(--green)'):'')
                 :'<span style="color:var(--text-tertiary);font-weight:400">未測定</span>')+
        '</span></div>';
    }).join('');

  });

    ic('i-run',18,'var(--maroon)')+

    ic(open?'i-chevron-u':'i-chevron-d',18,'var(--text-tertiary)')+
  '</div>';
  if(!open)return head;
  var body='<div class="card" style="margin:0 0 12px;border-top-left-radius:0;border-top-right-radius:0">';
  rows.forEach(function(r,i){
    body+='<div style="padding:8px 0'+(i<rows.length-1?';border-bottom:1px solid var(--border-tertiary)':'')+'">'+
      '<div style="display:flex;align-items:baseline;gap:8px;margin-bottom:'+(r.members.length?'6':'0')+'px"><span style="font-weight:700;font-size:13px;min-width:40px">'+escapeHtml(r.ps)+'</span>'+

      (r.members.length?'<div style="display:flex;flex-wrap:wrap;gap:6px">'+r.chips+'</div>':'<div style="font-size:11px;color:var(--text-tertiary);padding-left:48px">選手なし</div>')+
      '</div>';
  });
  body+='<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;padding-top:8px;border-top:1px solid var(--border-tertiary)">'+
    (cfg.broncoRanks&&cfg.broncoRanks.length?cfg.broncoRanks:cfg.ranks).slice().sort(function(a,b){return a.pct-b.pct;}).map(function(rk){return'<span style="display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--text-secondary)"><span style="width:8px;height:8px;border-radius:50%;background:'+rk.color+';border:1px solid var(--border-secondary)"></span>'+escapeHtml(rk.label)+'</span>';}).join('')+

  body+='</div>';

    var series=getExSeries(pid,sel);
    if(series.length){
      trendHtml+='<div class="chart-wrap" style="height:210px;margin:0 0 8px"><canvas id="ch-tr1rm"></canvas></div>';
      if(metric==='e1rm')trendHtml+='<div style="font-size:10px;color:var(--text-tertiary);margin-bottom:6px">● 濃い点=信頼度高(≤3レップ) / ● 薄い点=参考(4〜6レップ)。候補セット(RIR記録あり・6レップ以下)が無い日は点を打ちません。</div>';

    }else{
      trendHtml+='<div class="no">この種目の記録がありません</div>';
    }
    trendHtml+='</div>';
  }
  // ===== 下段: セッション履歴 =====
  var h='<div class="form-box"><div class="form-title">セッション履歴</div>';

// 種目セレクタ／指標トグル変更 → タブ全再描画（グラフはdC先行で作り直す）
function setTrEx(v){window._trEx=(v||'').trim();renderTrainTab();}
function setTrMetric(m){window._trMetric=m;renderTrainTab();}
// 単一resultのセット群から指標を算出（トップ重量・ボリューム・最大推定1RM＋そのレップ数）
function exMetrics(sets){
  var topW=0,vol=0,e1=null,e1reps=null;
  (sets||[]).forEach(function(s){
    var w=parseFloat(s.weight)||0,rp=parseInt(s.reps)||0;
    if(w>topW)topW=w;vol+=w*rp;
    var hasRir=s.rir!=null&&s.rir!=='';
    if(hasRir&&rp>0&&rp<=6&&w>0){var e=estimateOneRM(w,rp,parseInt(s.rir));if(e&&(e1==null||e>e1)){e1=e;e1reps=rp;}}
  });
  return{topW:topW,vol:vol,e1:e1,e1reps:e1reps};
}
// 種目の時系列（同日集約: トップ重量=最大 / 推定1RM=最大 / ボリューム=合算）
function getExSeries(pid,exName){
  var byDate={};
  tlogAll().filter(function(l){return idEq(l.pid,pid)&&!l.absent;}).forEach(function(l){
    var r=(l.results||[]).find(function(x){return (x.exName||'').trim()===exName&&!x.skipped;});
    if(!r||!r.sets||!r.sets.length)return;
    var m=exMetrics(r.sets);var d=l.date;
    if(!byDate[d])byDate[d]={date:d,topW:0,vol:0,e1:null,e1reps:null};
    if(m.topW>byDate[d].topW)byDate[d].topW=m.topW;
    byDate[d].vol+=m.vol;
    if(m.e1!=null&&(byDate[d].e1==null||m.e1>byDate[d].e1)){byDate[d].e1=m.e1;byDate[d].e1reps=m.e1reps;}
  });
  return Object.keys(byDate).sort().map(function(k){return byDate[k];});
}
// 比較セッション（player getCompareVolume を _curTLog非依存に引数化＋全指標化）。mode: prev / week(6日前以前の直近)
function getCompareEx(pid,exName,beforeDate,mode,curTs,curId){
  var logs=tlogAll().filter(function(l){
    if(!idEq(l.pid,pid))return false;
    if(curId!=null&&idEq(l.id,curId))return false;
    if(l.ts&&curTs)return l.ts<curTs;
    return l.date<beforeDate;
  }).sort(function(a,b){var at=a.ts||a.date,bt=b.ts||b.date;return bt.localeCompare(at);});
  if(mode==='week'){var wkAgo=new Date(beforeDate);wkAgo.setDate(wkAgo.getDate()-6);var wkStr=toDateStr(wkAgo);logs=logs.filter(function(l){return l.date<=wkStr;});}
  for(var i=0;i<logs.length;i++){
    var r=(logs[i].results||[]).find(function(x){return (x.exName||'').trim()===exName&&!x.skipped;});
    if(r&&r.sets){var m=exMetrics(r.sets);m.date=logs[i].date;return m;}
  }
  return null;
}
// 種目のestBase（最初に見つかったもの）
function getExEstBase(pid,exName){
  var eb=null;
  tlogAll().filter(function(l){return idEq(l.pid,pid);}).forEach(function(l){(l.results||[]).forEach(function(r){if(!eb&&(r.exName||'').trim()===exName&&r.estBase)eb=r.estBase;});});
  return eb;
}
// 実測1RM（ph）のベスト値＋測定日
function getBestPh(pid,field){
  var rs=(D.ph||[]).filter(function(x){return idEq(x.pid,pid)&&x[field]!=null;});
  if(!rs.length)return null;
  var best=null;rs.forEach(function(x){if(best==null||x[field]>best.val)best={val:x[field],date:x.date};});
  return best;
}
// 差分の矢印（色付き）
function diffArrow(d){return d>0?'<span style="color:var(--green)">'+ic('i-up',12)+'</span>':d<0?'<span style="color:var(--red)">'+ic('i-down',12)+'</span>':'<span style="color:var(--text-secondary)">'+ic('i-trend-flat',12)+'</span>';}
// 前回比/7日比の一行（トップセット重量差＋実日付）
function trCmpLine(label,cur,cmp){
  if(!cmp)return '<span style="color:var(--text-tertiary)">'+label+' 比較なし</span>';
  var d=cur.topW-cmp.topW;
  return '<span>'+label+' '+diffArrow(d)+' '+(d>0?'+':'')+d+'kg <span style="color:var(--text-tertiary)">('+fmt(cmp.date).slice(5)+'比)</span></span>';
}
// 種目推移グラフ（指標ごとに毎回 dC→new Chart で作り直す）。metric: top / e1rm / vol
function drawTrChart(pid,exName,metric){
  dC('tr1rm');
  var e=document.getElementById('ch-tr1rm');if(!e)return;
  var series=getExSeries(pid,exName);if(!series.length)return;
  var labels=series.map(function(p){return p.date.slice(5);});
  var estBase=getExEstBase(pid,exName);
  var phBest=(metric!=='vol'&&estBase)?getBestPh(pid,estBase):null;
  var datasets=[],maxV=0;
  if(metric==='vol'){
    datasets.push({label:'ボリューム(kg)',data:series.map(function(p){return p.vol;}),borderColor:'#8d0000',backgroundColor:'rgba(141,0,0,0.08)',borderWidth:2,fill:true,tension:.3,spanGaps:true,pointRadius:4,pointBackgroundColor:'#8d0000'});
  }else if(metric==='e1rm'){
    series.forEach(function(p){if(p.e1!=null&&p.e1>maxV)maxV=p.e1;});
    datasets.push({label:'推定1RM(kg)',data:series.map(function(p){return p.e1;}),borderColor:'#046C48',borderWidth:2,tension:.3,spanGaps:true,
      pointRadius:series.map(function(p){return p.e1==null?0:(p.e1reps<=3?5:4);}),
      pointBackgroundColor:series.map(function(p){return p.e1==null?'transparent':(p.e1reps<=3?'#046C48':'#8FC3AF');}),
      pointBorderColor:series.map(function(p){return p.e1==null?'transparent':(p.e1reps<=3?'#046C48':'#8FC3AF');})});
  }else{
    series.forEach(function(p){if(p.topW>maxV)maxV=p.topW;});
    datasets.push({label:'トップセット重量(kg)',data:series.map(function(p){return p.topW||null;}),borderColor:'#8d0000',backgroundColor:'rgba(141,0,0,0.08)',borderWidth:2,fill:true,tension:.3,spanGaps:true,pointRadius:4,pointBackgroundColor:'#8d0000'});
  }
  if(phBest&&phBest.val>0){
    if(phBest.val>maxV)maxV=phBest.val;
    datasets.push({label:'実測1RM '+phBest.val+'kg',data:labels.map(function(){return phBest.val;}),borderColor:'#8A7578',borderWidth:1.5,borderDash:[6,4],pointRadius:0,fill:false,tension:0});
  }
  var yOpt=metric==='vol'?{beginAtZero:true,title:{display:true,text:'kg'}}:{beginAtZero:false,suggestedMax:Math.ceil(maxV*1.05),title:{display:true,text:'kg'}};
  charts.tr1rm=new Chart(e,{type:'line',data:{labels:labels,datasets:datasets},options:{animation:_chAnim(),responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom'}},scales:{y:yOpt}}});
}

// ===== staff tlog代理編集/削除（CRUD雛形v2: in-place+editedAt / 削除=即時+5秒Undo・confirm不使用） =====
// playerは自分の直近D.tlogのみ編集可。staffは全選手の全記録（アーカイブtla_含む）を代理編集できる。
// 記録の所在（メインdoc'tlog' or アーカイブdoc tla_）を特定し、そのdocだけをsvSafeUpdate（idマージ復活防止）。
// アーカイブdocを書き換えたらメモリ上_tlogArchへ反映＋_tlaCache=null（tlogAll/グラフ/rebuildが追従）。
function tlogDocKeys(rec){
  // 記録が在り得るdocキー集合。移送境界(TLOG_KEEP_DAYS)より古い記録は tlog(未移送)/tla(移送済)/過渡的に両方 を取り得るため
  // 両docを対象にする（起動時archiveTlogとの競合で削除/編集した記録がアーカイブから復活する事故を封じる＝idマージ復活防止の徹底）。
  // 新しい/無効date記録は移送対象外→現在の所在（メインdoc優先）に従う。
  var valid=typeof rec.date==='string'&&/^\d{4}-\d{2}-\d{2}$/.test(rec.date);
  if(valid){
    var cut=toDateStr(new Date(Date.now()-TLOG_KEEP_DAYS*86400000));
    if(rec.date<cut)return ['tlog',tlaKey(rec.pid,tlaHalf(rec.date))];
  }
  return (D.tlog||[]).some(function(l){return idEq(l.id,rec.id);})?['tlog']:[tlaKey(rec.pid,tlaHalf(rec.date))];
}
// 複数docへ同一updateFnを順次適用（削除/編集を所在候補の全docに反映）。updateFn(latest,key)。全成功でonAllDone・途中失敗でonErr。
function tlogUpdateKeys(keys,updateFn,onAllDone,onErr){
  var i=0,failed=false;
  (function step(){
    if(failed)return;
    if(i>=keys.length){if(onAllDone)onAllDone();return;}
    var key=keys[i++];
    svSafeUpdate(key,function(latest){return updateFn(latest,key);},function(){step();},function(e){failed=true;if(onErr)onErr(e);});
  })();
}

  })};

}

          '<input class="ipt" type="number" step="any" inputmode="decimal" style="flex:1;min-width:0;text-align:center;padding:8px" value="'+(s.weight!==''&&s.weight!=null?s.weight:'')+'" placeholder="kg" oninput="etlUpdS('+ri+','+si+',\'weight\',this.value)">'+

          '<input class="ipt" type="number" inputmode="numeric" style="width:54px;text-align:center;padding:8px" value="'+(s.rir!==''&&s.rir!=null?s.rir:'')+'" placeholder="RIR" oninput="etlUpdS('+ri+','+si+',\'rir\',this.value)">'+

function etlUpdS(ri,si,f,v){if(window._etl&&_etl.results[ri]&&_etl.results[ri].sets[si])_etl.results[ri].sets[si][f]=v;}
function etlAddSetS(ri){if(!window._etl||!_etl.results[ri])return;_etl.results[ri].sets.push({weight:'',reps:'',rir:''});renderTlogEditInline(_etl.recId);}
function etlDelSetS(ri,si){if(!window._etl||!_etl.results[ri])return;_etl.results[ri].sets.splice(si,1);renderTlogEditInline(_etl.recId);}
function editTlogCancel(id){window._etl=null;var host=document.getElementById('trsess-'+id);var rec=tlogAll().find(function(l){return idEq(l.id,id);});if(host&&rec)host.innerHTML=trSessDetail(rec);}
function doEditTlogStaff(id,btnEl){
  var rec=tlogAll().find(function(l){return idEq(l.id,id);});
  if(!rec){toast('記録が見つかりません。再読み込みしてください');return;}
  if(!window._etl||!idEq(_etl.recId,id)){alert('編集状態が失われました。もう一度開いてください');return;}
  if(!guardSubmit(btnEl,'保存中…'))return;
  var editResults=_etl.results;
  // 元recの各resultへ_etlのsetsを反映してcleanResultsを構築。skipped・estBase・exName等メタは温存し、setsのみ差し替える。
  var cleanResults=(rec.results||[]).map(function(r,ri){
    var c={};for(var key in r){if(Object.prototype.hasOwnProperty.call(r,key))c[key]=r[key];}
    if(r.skipped)return c;
    var er=editResults[ri];
    var srcSets=(er&&er.sets)?er.sets:(r.sets||[]);
    c.sets=srcSets.filter(function(s){return isFilled(s.weight)&&isFilled(s.reps);}).map(function(s){
      return{weight:parseFloat(s.weight)||0,reps:parseInt(s.reps)||0,rir:isFilled(s.rir)?parseInt(s.rir):null};
    });
    return c;
  });
  var cv=computeTlogVolumes(cleanResults,rec.pid,rec.date,'prev',rec.id,rec.ts);
  var editedAt=new Date().toISOString();  // 所在候補の全doc/メモリで同一値にするため1回だけ生成
  var keys=tlogDocKeys(rec);
  var found=false,updated=null;
  tlogUpdateKeys(keys,function(latest,key){
    var idx=latest.findIndex(function(l){return idEq(l.id,id);});
    if(idx<0)return latest;
    found=true;
    var t=latest[idx];
    t.results=cv.results;t.totalVolume=cv.totalVolume;
    if(cv.hasInjurySkip)t.hasInjurySkip=true;else delete t.hasInjurySkip;
    t.editedAt=editedAt;
    latest[idx]=slimTlogRec(t); // 新規保存経路と対称にスリム化（ts/kind/menuId/date等の温存はslimTlogRecが担保）
    updated=latest[idx];
    return latest;
  },function(){
    if(!found){releaseSubmit(btnEl);toast('記録が見つかりません。再読み込みしてください');return;}
    var ai=_tlogArch.findIndex(function(l){return idEq(l.id,id);});if(ai>=0&&updated){_tlogArch[ai]=updated;_tlaCache=null;} // アーカイブdocはtlogAllが_tlogArchを読むため手動反映
    window._etl=null;
    rebuildE1rmFrom(rec.pid,rec.date,function(){renderTrainTab(id);toast('修正しました');},function(){renderTrainTab(id);toast('修正しました（推定1RMの再計算は保留中）');});
  },function(){releaseSubmit(btnEl);alert('保存できませんでした。電波の良い場所でもう一度お試しください。入力内容は残っています。');});
}
function delTlogStaff(id){
  var rec=tlogAll().find(function(l){return idEq(l.id,id);});
  if(!rec){toast('記録が見つかりません。再読み込みしてください');return;}
  var snapshot=slimTlogRec(rec);        // 削除前の値をUndo用に確保（tx再試行のlatch陳腐化に依存しない・所在に依らずtlogAllで取得済み）
  var keys=tlogDocKeys(rec);
  var removedKey=null;
  tlogUpdateKeys(keys,function(latest,key){
    var idx=latest.findIndex(function(l){return idEq(l.id,id);});
    if(idx<0)return latest;
    removedKey=key;                      // ヒットしたdoc（Undo復元先）。両doc在籍なら後勝ちだが復元先として妥当
    return latest.filter(function(l){return !idEq(l.id,id);});
  },function(){
    // _tlogArch（アーカイブのメモリ表現）は無条件に掃除（アーカイブ由来なら消える／そうでなければ元々不在で無害）
    var wasInArch=_tlogArch.some(function(l){return idEq(l.id,id);});
    if(wasInArch){_tlogArch=_tlogArch.filter(function(l){return !idEq(l.id,id);});_tlaCache=null;}
    if(!removedKey&&!wasInArch){toast('記録が見つかりません。再読み込みしてください');return;}
    var saved=snapshot,savedKey=removedKey||tlaKey(rec.pid,tlaHalf(rec.date));
    rebuildE1rmFrom(rec.pid,rec.date,function(){renderTrainTab();toast('削除しました','元に戻す',function(){undoDelTlogStaff(saved,savedKey);});},function(){renderTrainTab();toast('削除しました（推定1RMの再計算は保留中）','元に戻す',function(){undoDelTlogStaff(saved,savedKey);});});
  },function(){alert('削除に失敗しました。もう一度お試しください');});
}
function undoDelTlogStaff(rec,key){
  svSafeUpdate(key,function(latest){
    if(latest.some(function(l){return idEq(l.id,rec.id);}))return latest; // 二重復元ガード（Undo連打・同一レコード再削除の競合対策）
    latest.push(rec);
    return latest;
  },function(){
    if(key!=='tlog'){if(!_tlogArch.some(function(l){return idEq(l.id,rec.id);}))_tlogArch.push(rec);_tlaCache=null;}
    rebuildE1rmFrom(rec.pid,rec.date,function(){if(document.getElementById('dt5'))renderTrainTab(rec.id);toast('元に戻しました');},function(){if(document.getElementById('dt5'))renderTrainTab(rec.id);toast('元に戻しました');});
  },function(){alert('復元に失敗しました。もう一度お試しください');});
}

function ppNext(){
  var a=Array.isArray(D.pp)?D.pp:[]; if(!a.length)return null;
  var last=a[a.length-1]; var t=last&&last.type; if(t!=='push'&&t!=='pull')return null;
  // 当日の自動確定(by:auto)は表示上まだ当日実施タイプを見せ、翌日から反転（日跨ぎ対応）。手動flipは即時反映。
  if(last.by==='auto'&&last.date===todayStr())return t==='push'?'pull':'push';
  return t;
}
function ppNextWeightDay(){
  var t=todayStr();
  var last=(Array.isArray(D.pp)&&D.pp.length>=2)?D.pp[D.pp.length-1]:null;
  // 当日実施済み判定は手動flip(by!=='auto')のみ。当日の自動確定は表示上まだ当日を次のウエイト日として見せる。
  var doneToday=!!last&&last.date===t&&last.by!=='auto';
  var ds=(D.cal||[]).filter(function(e){return e&&e.type==='weight'&&typeof e.date==='string'&&(doneToday?e.date>t:e.date>=t);}).map(function(e){return e.date;});
  if(!ds.length)return null; ds.sort();
  return{date:ds[0],isToday:ds[0]===t};
}
function ppDateLabel(ds){
  var d=new Date(ds+'T00:00:00'); if(isNaN(d))return fmt(ds);
  var W=['日','月','火','水','木','金','土'];
  return(d.getMonth()+1)+'/'+d.getDate()+'('+W[d.getDay()]+')';
}

  var metaTxt=D.pp.length>1?'前回: '+(lastRec.type==='push'?'PULL':'PUSH')+' '+ppDateLabel(lastRec.date)+'（'+byLabel+'）':'開始: '+ppDateLabel(lastRec.date)+'（'+byLabel+'）';

function ppFlip(expected){
  svSafeUpdate('pp',function(latest){
    if(!Array.isArray(latest))latest=[];
    var last=latest.length?latest[latest.length-1]:null;
    if(!last||(last.type!=='push'&&last.type!=='pull'))return latest;
    if(expected&&last.type!==expected)return latest;
    latest.push({id:Date.now(),type:last.type==='push'?'pull':'push',date:todayStr(),by:'staff'});
    if(latest.length>100)latest=latest.slice(-100);
    return latest;
  },function(){if(curPage==='dash')V.dash();});
}
function ppUndo(){

    if(!Array.isArray(latest)||!latest.length)return latest;
    latest.pop();
    return latest;
  },function(){if(curPage==='dash')V.dash();});
}

}

function getTodayPickup(){
  var lastMeasured=D.p.map(function(p){var recs=D.bc.filter(function(r){return r.pid===p.id;});var last=recs.length?recs.sort(function(a,b){return b.date.localeCompare(a.date);})[0].date:'2000-01-01';return{pid:p.id,last:last};});
  lastMeasured.sort(function(a,b){return a.last.localeCompare(b.last);});
  // Use today's date as seed to keep consistent during the day
  var today=todayStr();var seed=0;for(var ci=0;ci<today.length;ci++)seed+=today.charCodeAt(ci);
  // Pick 5 from the least recently measured, with slight shuffle
  var pool=lastMeasured.slice(0,15);
  for(var si=pool.length-1;si>0;si--){var j=(seed+si)%si;var tmp=pool[si];pool[si]=pool[j];pool[j]=tmp;}

function timeOptions(selectedVal){
  var h='';var found=false;
  for(var hh=0;hh<24;hh++){for(var mm=0;mm<60;mm+=5){ // 5分刻み（枠は5分単位。将来の枠編集でグリッド外に落ちないように）
    var v=String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0');
    if(v===selectedVal)found=true;
    h+='<option'+(v===selectedVal?' selected':'')+'>'+v+'</option>';
  }}
  if(selectedVal&&!found)h='<option selected>'+selectedVal+'</option>'+h;
  return h;
}

function doAddTapeSlot(){
  var date=document.getElementById('ts-date').value;
  var type=document.getElementById('ts-type').value;
  var interval=parseInt(document.getElementById('ts-interval').value)||5;
  if(!date)return alert('日付を入力してください');
  if(!D.tapeslot)D.tapeslot=[];
  var newSlots=[];
  for(var si=0;si<tapeStaffRowCount;si++){
    var nameEl=document.getElementById('ts-sname-'+si);
    var startEl=document.getElementById('ts-start-'+si);
    var endEl=document.getElementById('ts-end-'+si);
    var capEl=document.getElementById('ts-cap-'+si);
    if(!nameEl||!startEl||!endEl)continue;
    var sname=nameEl.value.trim()||('担当者'+(si+1));
    var startT=startEl.value,endT=endEl.value;
    var cap=parseInt((capEl||{}).value)||1;
    if(startT>=endT){alert(sname+': 終了時間は開始時間より後にしてください');return;}
    var cur=startT;
    while(cur<endT){
      var pts=cur.split(':');var hh=parseInt(pts[0]),mm=parseInt(pts[1]);
      var nm=mm+interval;var nh=hh+Math.floor(nm/60);nm=nm%60;
      if(nh>=24)break;
      var next=String(nh).padStart(2,'0')+':'+String(nm).padStart(2,'0');
      if(next>endT)break;
      newSlots.push({id:Date.now()+newSlots.length*17,date:date,type:type,startTime:cur,endTime:next,capacity:cap,staff:sname});
      cur=next;
    }
  }
  if(!newSlots.length)return alert('枠が作成できませんでした。時間を確認してください。');
  tapeStaffRowCount=1;
  svSafeUpdate('tapeslot',function(latest){return latest.concat(newSlots);},function(){
    popView();
    toast(newSlots.length+'枠を作成しました');
  });
}
