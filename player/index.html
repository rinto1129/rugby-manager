function resumeTDraft(menuId){
  var mn=getMyMenus().find(function(x){return idEq(x.id,menuId);});
  if(!mn)return;
  var draft=loadTDraft();
  if(!draft){startTrainingFresh(menuId);return;}
  _curTLog=draft;
  resetRestTimer();
  renderTrainingExec(mn);
}
function startTrainingFresh(menuId){
  clearTDraft();
  var mn=getMyMenus().find(function(x){return idEq(x.id,menuId);});
  if(!mn)return;
  var disabled=getMyDisabledEx();
  // 前回セッション検索用: 当日より前のログを新しい順に並べる
  var today=todayStr();
  var sortedPrevLogs=tlogAll().filter(function(l){
    return idEq(l.pid,myPid)&&!l.absent&&l.results&&l.date<today;
  }).sort(function(a,b){
    var at=a.ts||a.date,bt=b.ts||b.date;return bt.localeCompare(at);
  });
  _curTLog={
    id:newId(),pid:myPid,menuId:menuId,date:today,ts:new Date().toISOString(),
    results:(mn.exercises||[]).map(function(ex){
      var oneRM=ex.estBase?getPlayer1RM(myPid,ex.estBase):null;
      var estW=oneRM?estimateWeight(oneRM,ex.reps||1,ex.rir!=null?ex.rir:2):null;
      var isDisabled=disabled.some(function(d){return d.name===ex.name;});
      // 前回実績を取得
      var prevEx=null,prevExDate='';
      for(var k=0;k<sortedPrevLogs.length;k++){
        var found=(sortedPrevLogs[k].results||[]).find(function(x){return x.exName===ex.name&&!x.skipped&&x.sets&&x.sets.length>0;});
        if(found){prevEx=found;prevExDate=sortedPrevLogs[k].date;break;}
      }
      var sets=[];
      for(var s=0;s<(ex.sets||1);s++){
        var prev=prevEx?(prevEx.sets[s]||prevEx.sets[prevEx.sets.length-1]):null;
        sets.push({
          weight:prev&&(prev.weight!==''&&prev.weight!=null)?prev.weight:(estW||''),
          reps:prev&&(prev.reps!==''&&prev.reps!=null)?prev.reps:(ex.reps!=null?ex.reps:''),
          rir:'',done:false
        });
      }
      return{
        exName:ex.name,estBase:ex.estBase,targetSets:ex.sets,targetReps:ex.reps,targetRir:ex.rir,
        note:ex.note,videoUrl:ex.videoUrl,estWeight:estW,oneRM:oneRM,
        prevEx:prevEx?{sets:prevEx.sets,date:prevExDate}:null,
        sets:sets,skipped:isDisabled,skipReason:isDisabled?'申告済み（できない種目）':''
      };
    }),
    totalVolume:0
  };
  resetRestTimer();
  renderTrainingExec(mn);
}
function renderTrainingExec(mn){
  if(!mn)mn=(_curTLog&&_curTLog.kind==='self')?selfWeightMn():{name:'メニュー',exercises:[]}; // 自主トレ（menuId=null）はtmenuに実体が無い
  subView=true; // 実施中は他端末の保存によるリアルタイム再描画から保護（bottom navのgo()で解除）
  var compareMode=window._trCompareMode||'prev'; // prev | week
  // 弱点種目の強調（getWeakWeeklyVolumeと同じ判定=estBase一致 or 種目名がメイン種目/処方箋名に一致）
  var weakInfo=getWeakLift(myPid);
  var weakLift=weakInfo?STD_LIFTS.find(function(l){return l.k===weakInfo.lift;}):null;

    }else{

      r.sets.forEach(function(st,si){

        var fb=(prevW!=null?prevW:(r.estWeight||0)); // 空欄から+2.5した時の基準
        h+='<div id="tr-set-'+ri+'-'+si+'" style="background:var(--bg-primary);border:1px solid var(--bg-tertiary);border-radius:12px;padding:10px">'+
          '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">'+
            '<span style="flex:none;min-width:48px;text-align:center;font-size:12px;font-weight:800;color:var(--blue);background:var(--blue-bg);border-radius:8px;padding:7px 0">SET '+(si+1)+'</span>'+

  // 種目追加（自主・チーム共通。できない/早く終わった時やメニュー外の種目を自由に追加＝addTrainingExは共通実装）

function setTrCompare(mode){window._trCompareMode=mode;var mn=getMyMenus().find(function(x){return idEq(x.id,_curTLog.menuId);});renderTrainingExec(mn);}

// その種目の「前回」ボリューム（mode: prev=直近の同種目、week=7日以上前の直近）
// 同じ日に複数回トレーニングしても、タイムスタンプで「自分より前」を正しく判定
function getCompareVolume(pid,exName,beforeDate,mode){
  var nowTs=(_curTLog&&_curTLog.ts)?_curTLog.ts:new Date().toISOString();
  var curId=_curTLog?_curTLog.id:null;
  var logs=tlogAll().filter(function(l){
    if(!idEq(l.pid,pid))return false;
    if(curId&&idEq(l.id,curId))return false; // 自分自身は除外
    // タイムスタンプがあれば時刻で、なければ日付で「前」を判定
    if(l.ts&&nowTs)return l.ts<nowTs;
    return l.date<beforeDate;
  }).sort(function(a,b){
    // 新しい順（tsがあればts、なければdate）
    var at=a.ts||a.date,bt=b.ts||b.date;
    return bt.localeCompare(at);
  });
  if(mode==='week'){
    var wkAgo=new Date(beforeDate);wkAgo.setDate(wkAgo.getDate()-6);var wkStr=toDateStr(wkAgo);
    logs=logs.filter(function(l){return l.date<=wkStr;});
  }
  for(var i=0;i<logs.length;i++){
    var r=(logs[i].results||[]).find(function(x){return x.exName===exName&&!x.skipped;});
    if(r&&r.sets){return{vol:r.sets.reduce(function(s,x){return s+((parseFloat(x.weight)||0)*(parseInt(x.reps)||0));},0),date:logs[i].date};}
  }
  return null;
}
// リアルタイム再計算＆表示更新
function refreshTrainingLive(){
  if(!_curTLog)return;
  // 前回超え演出の状態（トレーニングセッション単位でリセット）
  if(window._trBeatFor!==_curTLog.id){window._trBeatFor=_curTLog.id;window._trBeatDone={};window._trBeatTimer={};}
  var compareMode=window._trCompareMode||'prev';
  var totalVol=0,totalPrev=0;
  _curTLog.results.forEach(function(r,ri){
    if(r.skipped)return;
    var exVol=0;
    r.sets.forEach(function(st,si){
      var w=parseFloat(st.weight)||0,rp=parseInt(st.reps)||0;
      exVol+=w*rp;
      // セットごとのアラート
      var alertEl=document.getElementById('tr-set-alert-'+ri+'-'+si);
      if(alertEl){
        var msgs=[];
        if(st.reps!==''&&st.reps!=null&&r.targetReps){
          if(rp<r.targetReps)msgs.push('<span style="color:var(--red)">目標'+r.targetReps+'回に'+(r.targetReps-rp)+'回届かず</span>');
          else if(rp>r.targetReps)msgs.push('<span style="color:var(--green)">目標+'+(rp-r.targetReps)+'回 ◎</span>');
        }
        if(st.rir!==''&&st.rir!=null&&r.targetRir!=null){
          var rv=parseInt(st.rir);
          if(rv>r.targetRir)msgs.push('<span style="color:var(--amber)">RIR+'+(rv-r.targetRir)+'（余裕あり=軽いかも）</span>');
          else if(rv<r.targetRir)msgs.push('<span style="color:var(--red)">RIR-'+(r.targetRir-rv)+'（追い込みすぎ注意）</span>');
        }
        alertEl.innerHTML=msgs.join(' / ');
      }
    });
    totalVol+=exVol;
    // 種目ボリューム表示
    var cmp=getCompareVolume(myPid,r.exName,_curTLog.date,compareMode);
    var prevVol=cmp?cmp.vol:0;
    totalPrev+=prevVol;
    var exEl=document.getElementById('tr-ex-vol-'+ri);
    if(exEl){
      var html='';
      if(prevVol>0){
        var diff=exVol-prevVol;
        if(exVol===0){
          html='<div style="font-size:12px;color:var(--text-secondary);padding:8px;background:var(--bg-primary);border-radius:6px">'+(compareMode==='week'?'先週':'前回')+': '+prevVol.toLocaleString()+'kg</div>';
        }else if(diff>=0){
          html='<div style="font-size:12px;padding:8px;background:var(--green-bg);border-radius:6px;color:var(--green);font-weight:600">今 '+exVol.toLocaleString()+'kg ／ '+(compareMode==='week'?'先週':'前回')+' '+prevVol.toLocaleString()+'kg ・ '+ic('i-up',10)+diff.toLocaleString()+'kg 超え！</div>';
        }else{
          html='<div style="font-size:12px;padding:8px;background:var(--red-bg);border-radius:6px;color:var(--text-primary)">今 '+exVol.toLocaleString()+'kg ／ '+(compareMode==='week'?'先週':'前回')+' '+prevVol.toLocaleString()+'kg ・ <span style="color:var(--red);font-weight:600">あと'+Math.abs(diff).toLocaleString()+'kgで超え</span></div>';
        }
      }else if(exVol>0){
        html='<div style="font-size:12px;color:var(--text-secondary);padding:8px;background:var(--bg-primary);border-radius:6px">今 '+exVol.toLocaleString()+'kg（'+(compareMode==='week'?'先週':'前回')+'の記録なし）</div>';
      }
      exEl.innerHTML=html;
      // 前回超えの瞬間を種目単位1回だけ祝う（300msデバウンス=桁打ちかけ中の誤発火防止）
      var beat=prevVol>0&&exVol>prevVol;
      if(beat&&!window._trBeatDone[ri]){
        clearTimeout(window._trBeatTimer[ri]);
        window._trBeatTimer[ri]=setTimeout(function(){
          if(!_curTLog||window._trBeatDone[ri])return;
          var r2=_curTLog.results[ri];if(!r2||r2.skipped)return;
          // 300ms後も超えたままかを再計算して確定
          var v2=(r2.sets||[]).reduce(function(s,st){return s+((parseFloat(st.weight)||0)*(parseInt(st.reps)||0));},0);
          var c2=getCompareVolume(myPid,r2.exName,_curTLog.date,window._trCompareMode||'prev');
          var p2=c2?c2.vol:0;
          if(!(p2>0&&v2>p2))return;
          window._trBeatDone[ri]=true;
          var el2=document.getElementById('tr-ex-vol-'+ri);
          if(el2&&el2.classList){el2.classList.remove('vol-beat');void el2.offsetWidth;el2.classList.add('vol-beat');setTimeout(function(){if(el2.classList)el2.classList.remove('vol-beat');},700);}
        },300);
      }
    }
  });
  // 総ボリューム表示
  var box=document.getElementById('tr-total-box');
  if(box){
    var tdiff=totalVol-totalPrev;
    var sub='';
    if(totalPrev>0){
      if(totalVol===0)sub='<div style="font-size:12px;color:var(--text-secondary);margin-top:3px">'+(compareMode==='week'?'先週':'前回')+'計 '+totalPrev.toLocaleString()+'kg</div>';
      else if(tdiff>=0)sub='<div style="font-size:12px;color:var(--green);font-weight:600;margin-top:3px">'+(compareMode==='week'?'先週':'前回')+'計 '+totalPrev.toLocaleString()+'kg ・ '+ic('i-up',10)+tdiff.toLocaleString()+'kg 超え！</div>';
      else sub='<div style="font-size:12px;color:var(--text-primary);margin-top:3px">'+(compareMode==='week'?'先週':'前回')+'計 '+totalPrev.toLocaleString()+'kg ・ <span style="color:var(--red);font-weight:600">あと'+Math.abs(tdiff).toLocaleString()+'kg</span></div>';
    }
    box.innerHTML='<div style="font-size:11px;color:var(--text-secondary)">総ボリューム</div><div style="font-size:30px;font-weight:800;color:var(--blue);line-height:1.1">'+totalVol.toLocaleString()+'<span style="font-size:13px;color:var(--text-secondary)"> kg</span></div>'+sub;
  }
}

// ===== 休憩タイマー（3分カウントダウン・stickyバー）=====
var _restTimer={interval:null,seconds:180,running:false,done:false,total:180,audio:null};
var REST_DEFAULT=180; // 3分
// 終了ビープ。AudioContextは開始タップ時に生成したものを使う（自動再生ブロック回避）
function _rtBeep(){
  var ctx=_restTimer.audio;if(!ctx)return;
  try{
    if(ctx.state==='suspended')ctx.resume();
    [0,0.22].forEach(function(t0){
      var o=ctx.createOscillator(),g=ctx.createGain();
      o.type='sine';o.frequency.value=880;
      var t=ctx.currentTime+t0;
      g.gain.setValueAtTime(0.0001,t);
      g.gain.exponentialRampToValueAtTime(0.22,t+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001,t+0.16);
      o.connect(g);g.connect(ctx.destination);
      o.start(t);o.stop(t+0.18);
    });
  }catch(e){}
}
function toggleRestTimer(){
  if(_restTimer.running){
    clearInterval(_restTimer.interval);
    _restTimer.running=false;
  }else{
    // 開始（残り時間が0以下ならリセット）
    if(_restTimer.seconds<=0){_restTimer.seconds=REST_DEFAULT;_restTimer.done=false;}
    _restTimer.total=Math.max(_restTimer.seconds,1); // リング進捗の分母
    if(!_restTimer.audio){try{_restTimer.audio=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}
    _restTimer.running=true;
    updateRestTimerDisplay();
    _restTimer.interval=setInterval(function(){
      _restTimer.seconds--;
      if(_restTimer.seconds<=0){
        _restTimer.seconds=0;_restTimer.running=false;_restTimer.done=true;
        clearInterval(_restTimer.interval);
        updateRestTimerDisplay();updateRestTimerBtn();
        // 通知: バイブ＋短ビープ＋バー3回フラッシュ（background/opacityのみ）
        if(navigator&&navigator.vibrate)try{navigator.vibrate([200,100,200]);}catch(e){}
        _rtBeep();
        var bar=document.getElementById('rest-timer-bar');
        if(bar&&bar.classList){bar.classList.remove('rt-flash');void bar.offsetWidth;bar.classList.add('rt-flash');setTimeout(function(){if(bar.classList)bar.classList.remove('rt-flash');},1600);}
        return;
      }
      updateRestTimerDisplay();
    },1000);
  }
  updateRestTimerBtn();
}
function resetRestTimer(){
  clearInterval(_restTimer.interval);
  _restTimer.seconds=REST_DEFAULT;_restTimer.total=REST_DEFAULT;_restTimer.running=false;_restTimer.done=false;
  updateRestTimerDisplay();updateRestTimerBtn();
}
function adjustRestTimer(delta){
  _restTimer.seconds=Math.max(0,_restTimer.seconds+delta);
  _restTimer.done=false;
  if(_restTimer.seconds>_restTimer.total)_restTimer.total=_restTimer.seconds;
  updateRestTimerDisplay();
}
function updateRestTimerDisplay(){
  var el=document.getElementById('rest-timer-disp');
  var lab=document.getElementById('rest-timer-label');
  var ring=document.getElementById('rest-timer-ring');
  if(el){
    if(_restTimer.done){
      el.textContent='TIME ON';el.style.color='var(--green)';
      if(el.classList)el.classList.remove('rt-pulse');
    }else{
      var m=Math.floor(_restTimer.seconds/60),s=_restTimer.seconds%60;
      el.textContent=m+':'+String(s).padStart(2,'0');
      // 残り30秒で赤、それ以外は青
      el.style.color=_restTimer.seconds<=30?'var(--red)':'var(--blue)';
      // 残り5秒はパルス（動作中のみ）
      if(el.classList){if(_restTimer.running&&_restTimer.seconds<=5)el.classList.add('rt-pulse');else el.classList.remove('rt-pulse');}
    }
  }
  if(lab)lab.textContent=_restTimer.done?'TIME ON — 次のセットへ':'TIME OFF・休憩';
  if(ring){
    var col=_restTimer.done?'var(--green)':(_restTimer.seconds<=30?'var(--red)':'var(--blue)');
    var pct=_restTimer.done?100:Math.max(0,Math.min(100,Math.round(_restTimer.seconds/(_restTimer.total||REST_DEFAULT)*100)));
    ring.style.background='conic-gradient('+col+' '+pct+'%,var(--bg-tertiary) 0)';
  }
}
function updateRestTimerBtn(){
  var btn=document.getElementById('rest-timer-btn');
  if(btn)btn.innerHTML=_restTimer.running?ic('i-pause',11)+' 一時停止':(_restTimer.seconds<=0||_restTimer.done?ic('i-play',11)+' もう一度':(_restTimer.seconds<REST_DEFAULT?ic('i-play',11)+' 再開':ic('i-play',11)+' スタート'));
}

// その種目の先週ボリューム（7日前〜実施直前の最新の同種目記録）
function getLastExerciseVolume(pid,exName,beforeDate){
  var logs=tlogAll().filter(function(l){return idEq(l.pid,pid)&&l.date<beforeDate;}).sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});
  for(var i=0;i<logs.length;i++){
    var r=(logs[i].results||[]).find(function(x){return x.exName===exName&&!x.skipped;});
    if(r){
      return r.sets.reduce(function(sum,s){return sum+((parseFloat(s.weight)||0)*(parseInt(s.reps)||0));},0);
    }
  }
  return 0;
}
// 今日のコンディション取得（当日の睡眠＋前日の疲労RPEを総合判定）
function getTodayCondition(){
  var today=todayStr();
  var yest=toDateStr(new Date(new Date(today).getTime()-86400000));
  var mine=(D.f||[]).filter(function(x){return idEq(x.pid,myPid);});
  if(!mine.length)return null;
  // 当日の記録（複数あれば最新）
  var todayRec=mine.filter(function(x){return x.date===today;}).sort(function(a,b){return (b.inputAt||'').localeCompare(a.inputAt||'');})[0];
  // 前日の記録
  var yestRec=mine.filter(function(x){return x.date===yest;}).sort(function(a,b){return (b.inputAt||'').localeCompare(a.inputAt||'');})[0];
  // 当日も前日も記録がなければ、直近2日以内の記録で代用
  if(!todayRec&&!yestRec){
    var recent=mine.sort(function(a,b){return (b.date||'').localeCompare(a.date||'');})[0];
    if(!recent)return null;
    var daysAgo=Math.floor((new Date(today)-new Date(recent.date))/86400000);
    if(daysAgo>2)return null;
    yestRec=recent; // 疲労の手がかりとして扱う
  }
  var bad=false,good=false,reasons=[];
  // 当日の睡眠（その日のコンディション）
  if(todayRec&&todayRec.sleep!=null&&todayRec.sleep>0){
    if(todayRec.sleep<6){bad=true;reasons.push('睡眠'+todayRec.sleep+'時間と短め');}
    else if(todayRec.sleep>=7.5)good=true;
  }
  // 前日の疲労（RPEが高い＝昨日ハード＝今日に疲労が残る）
  if(yestRec&&yestRec.rpe!=null){
    if(yestRec.rpe>=8){bad=true;reasons.push('前日の練習がハード(RPE'+yestRec.rpe+')');}
    else if(yestRec.rpe<=4)good=good||true;
  }
  // 当日のRPE（既に今日きつい練習をした後にトレーニングする場合）
  if(todayRec&&todayRec.rpe!=null&&todayRec.rpe>=8){bad=true;reasons.push('今日の練習がハード(RPE'+todayRec.rpe+')');}
  return{bad:bad,good:good&&!bad,reasons:reasons};
}
// 記録を保存（アラート判定込み）
// ===== tlog容量対策（Phase 0）: 保存レコードのスリム化 =====
// tlogは1ドキュメント1MiB上限に全レコードが同居するため、保存後に読まれないフィールドを落として容量を約45%削減する。
// 削除対象（prevEx/note/videoUrl/estWeight/oneRM/targetSets）の読み手はrenderTrainingExecの_curTLogのみ＝保存済みレコードからは一切読まれない。
// null/false/空文字の省略は、全消費箇所が r.skipped&& / !=null(loose) / >0 / ||'' でガードしているため挙動不変。
// 冪等（スリム済みレコードに再適用しても無変化）。resultsを持たないレコード（欠席等）と未知の将来フィールドはそのまま通す。
var TLOG_DROP_RES={prevEx:1,note:1,videoUrl:1,estWeight:1,oneRM:1,targetSets:1};
function slimTlogRec(log){
  var out={};
  for(var k in log){
    if(!Object.prototype.hasOwnProperty.call(log,k))continue;
    if(k==='hasInjurySkip'&&!log[k])continue;
    if(k==='results'&&Array.isArray(log[k])){
      out.results=log[k].map(function(r){
        var c={};
        for(var rk in r){
          if(!Object.prototype.hasOwnProperty.call(r,rk))continue;
          if(TLOG_DROP_RES[rk])continue;
          var v=r[rk];
          if(v==null)continue;
          if((rk==='skipped'||rk==='skipReason'||rk==='lastVolume')&&!v)continue;
          if(rk==='sets'&&Array.isArray(v)){
            v=v.map(function(s){var o={};for(var sk in s){if(Object.prototype.hasOwnProperty.call(s,sk)&&s[sk]!=null)o[sk]=s[sk];}return o;});
          }
          c[rk]=v;
        }
        return c;
      });
      continue;
    }
    out[k]=log[k];
  }
  return out;
}
// ===== tlog容量対策（Phase 0）: 古いレコードの選手別アーカイブ =====
// メインdoc appdata/tlog には直近TLOG_KEEP_DAYS日分だけを残し、それより古いレコードは
// 選手別×半期のアーカイブdoc（tla_<pid>_<year>h<1|2>・SK非登録＝購読なし・tdraft方式）へ移送する。
// 15日=coachの13日窓（trained14等）+2日マージン。エンジンブロックのgetWeakWeeklyVolumeは7日窓で同様に安全。
// 移送は全てトランザクション（svSafeUpdate）+id重複排除なので、同時実行・途中クラッシュでも壊れない
// （両docに同じidが残った場合は読み出し側のidマージで1件に見え、次回実行でメイン側から消える＝冪等）。
var TLOG_KEEP_DAYS=15;
function tlaHalf(dateStr){return dateStr.slice(0,4)+'h'+((+dateStr.slice(5,7))<=6?1:2);}
function tlaKey(pid,half){return 'tla_'+String(pid)+'_'+half;}
// データ開始（2026年上期）から今日までの半期キー一覧
function tlaHalves(){
  var t=todayStr(),y=+t.slice(0,4),h=(+t.slice(5,7))<=6?1:2;
  var out=[],cy=2026,ch=1;
  while(cy<y||(cy===y&&ch<=h)){out.push(cy+'h'+ch);if(ch===1){ch=2;}else{ch=1;cy++;}}
  return out;
}
var _tlogArch=[],_tlogArchLoaded=false,_tlaCbs=null,_tlaPid=null;
var _tlaCache=null,_tlaCacheSrc=null,_tlaCacheArch=null;
// メインdoc（D.tlog）+読み込み済みアーカイブのidマージ（メイン側優先）。参照比較キャッシュで再計算を抑制。
function tlogAll(){
  var base=D.tlog||[];
  if(_tlaCache&&_tlaCacheSrc===base&&_tlaCacheArch===_tlogArch)return _tlaCache;
  var seen={},out=base.slice();
  base.forEach(function(l){if(l&&l.id!=null)seen[l.id]=1;});
  _tlogArch.forEach(function(l){if(l&&l.id!=null&&!seen[l.id])out.push(l);});
  _tlaCache=out;_tlaCacheSrc=base;_tlaCacheArch=_tlogArch;
  return out;
}
// 自分のアーカイブdocを全半期分取得（選手は自分のtlogしか見ないため自分の分だけ＝通信量極小）。
// 取得済みなら即cb。取得中は完了時にまとめてcb。個別の取得失敗は空扱い（直近データのみで動作継続）。
function loadTlogArch(cb){
  if(myPid==null){if(cb)cb();return;}
  if(_tlaPid!=null&&!idEq(_tlaPid,myPid)){_tlogArch=[];_tlogArchLoaded=false;_tlaCbs=null;_tlaCache=null;} // 選手切替時は前の選手の分を破棄
  if(_tlogArchLoaded){if(cb)cb();return;}
  if(_tlaCbs){if(cb)_tlaCbs.push(cb);return;}
  _tlaCbs=cb?[cb]:[];
  var pidAtStart=myPid;_tlaPid=myPid;
  Promise.all(tlaHalves().map(function(hf){
    return db.collection('appdata').doc(tlaKey(pidAtStart,hf)).get().then(function(doc){
      if(!doc.exists)return[];
      try{var p=JSON.parse(doc.data().data);return Array.isArray(p)?p:[];}catch(e){return[];}
    }).catch(function(e){console.error('tla load error:',hf,e);return[];});
  })).then(function(parts){
    if(!idEq(pidAtStart,myPid))return; // 取得中に選手が切り替わったら結果を捨てる
    var seen={},out=[];
    parts.forEach(function(arr){arr.forEach(function(l){if(l&&l.id!=null&&!seen[l.id]){seen[l.id]=1;out.push(l);}});});
    _tlogArch=out;_tlogArchLoaded=true;_tlaCache=null;
    var cbs=_tlaCbs||[];_tlaCbs=null;
    cbs.forEach(function(f){try{f();}catch(e){console.error(e);}});
  });
}
// ログイン直後のプリロード用: 取得完了時に表示中タブを1回だけ再描画（onSnapshotと同じ入力中・サブ画面ガード）
function kickTlogArch(){
  loadTlogArch(function(){
    var ae=document.activeElement;
    var isInputting=ae&&(ae.tagName==='INPUT'||ae.tagName==='TEXTAREA'||ae.tagName==='SELECT');
    if(!isInputting&&!subView&&myPid&&curTab&&T[curTab]){try{T[curTab]();}catch(e){console.error(e);}}
  });
}
// 古いレコードをアーカイブへ移送し、メインdocの残存レコードもスリム化する（1セッション1回・静かに実行）。
var _tlogArchRan=false;
function archiveTlog(){
  if(_tlogArchRan)return;_tlogArchRan=true;
  var cut=toDateStr(new Date(Date.now()-TLOG_KEEP_DAYS*86400000));
  var stale=(D.tlog||[]).filter(function(l){
    return l&&l.id!=null&&typeof l.date==='string'&&/^\d{4}-\d{2}-\d{2}$/.test(l.date)&&l.date<cut;
  });
  if(!stale.length)return;
  var groups={};
  stale.forEach(function(l){var k=tlaKey(l.pid,tlaHalf(l.date));(groups[k]=groups[k]||[]).push(l);});
  var keys=Object.keys(groups);
  function step(i){
    if(i>=keys.length)return;
    var gk=keys[i],recs=groups[gk];
    // ①アーカイブdocへid重複排除でマージ（移送時にスリム化＝過去の肥大レコードもここで縮む）
    svSafeUpdate(gk,function(latest){
      var have={};latest.forEach(function(x){if(x&&x.id!=null)have[x.id]=1;});
      recs.forEach(function(l){if(!have[l.id])latest.push(slimTlogRec(l));});
      return latest;
    },function(){
      // ②①の成功後にメインdocから移送済みidを除去+残存レコードをin-placeスリム化（旧クライアント保存分も吸収・冪等）
      var ids={};recs.forEach(function(l){ids[l.id]=1;});
      svSafeUpdate('tlog',function(latest){
        return latest.filter(function(l){return !(l&&l.id!=null&&ids[l.id]);}).map(slimTlogRec);
      },function(){
        // 読み込み済みのメモリ上アーカイブにも反映（自分の分のみ保持しているため他選手分は追加しない）
        if(_tlogArchLoaded){
          var have={};_tlogArch.forEach(function(x){if(x&&x.id!=null)have[x.id]=1;});
          recs.forEach(function(l){if(idEq(l.pid,myPid)&&!have[l.id])_tlogArch.push(slimTlogRec(l));});
          _tlaCache=null;
        }
        step(i+1);
      },function(e){console.error('tlog archive(main) skip:',e);});
    },function(e){console.error('tlog archive('+gk+') skip:',e);});
  }
  step(0);
}
function finishTraining(btnEl){
  if(!_curTLog)return;
  if(_curTLog.kind==='self'&&!_curTLog.results.length){alert('種目を追加してください');return;}
  // 1) 二重送信ガード（連打でtlog重複作成を防ぐ）。既に処理中なら何もしない。
  if(!guardSubmit(btnEl,'記録中…'))return;
  function abort(){releaseSubmit(btnEl);}

  // 2) 片側だけ入力のセット（重量か回数の一方だけ）を検出。全空セットは無言で除外する。
  var partialCount=0,keptSetsTotal=0,skippedCount=0;
  _curTLog.results.forEach(function(r){
    if(r.skipped){skippedCount++;return;}
    (r.sets||[]).forEach(function(s){
      var hw=isFilled(s.weight),hr=isFilled(s.reps);
      if(hw&&hr)keptSetsTotal++;
      else if(hw||hr)partialCount++;
    });
  });
  // 片側入力は黙って捨てず、確認する（決定4：未入力セットの扱い）
  if(partialCount>0){
    if(!confirm('重量か回数の片方だけ入力されたセットが'+partialCount+'件あります。\nこのまま記録するとそのセットは除外されます。\n\nOK＝そのまま記録 ／ キャンセル＝戻って修正')){return abort();}
  }
  // 実質空の記録（記録すべきセットが1件も無く、スキップも無い）を確認
  if(keptSetsTotal===0&&skippedCount===0){
    if(!confirm('記録できるセットがありません。\nこのまま空の記録を保存しますか？')){return abort();}
  }

  if(_restTimer.interval){clearInterval(_restTimer.interval);_restTimer.running=false;}

  // 3) _curTLog を破壊せず、保存用のクリーンなコピーを生成する（失敗時に元データを温存）
  var alerts=[];
  var injurySkips=[];
  var totalVol=0;
  var cleanResults=_curTLog.results.map(function(r){
    var c={};for(var key in r){if(Object.prototype.hasOwnProperty.call(r,key))c[key]=r[key];} // 既存フィールドを維持（schema不変）
    if(r.skipped){
      if(r.skipReason==='痛み・怪我')injurySkips.push(r.exName);
      return c;
    }
    // 重量・回数の両方が入力されたセットだけを残す（0は有効値として扱う）
    c.sets=(r.sets||[]).filter(function(s){return isFilled(s.weight)&&isFilled(s.reps);}).map(function(s){
      return{weight:parseFloat(s.weight)||0,reps:parseInt(s.reps)||0,rir:isFilled(s.rir)?parseInt(s.rir):null};
    });
    var exVol=c.sets.reduce(function(sum,s){return sum+(s.weight*s.reps);},0);
    totalVol+=exVol;
    c.sets.forEach(function(s,si){
      if(r.targetReps&&s.reps<r.targetReps)alerts.push({type:'reps',ex:r.exName,set:si+1,msg:r.exName+' '+(si+1)+'セット目: 目標'+r.targetReps+'回→実際'+s.reps+'回'});
      if(r.targetRir!=null&&s.rir!=null&&s.rir>r.targetRir)alerts.push({type:'rir',ex:r.exName,set:si+1,msg:r.exName+' '+(si+1)+'セット目: 設定RIR'+r.targetRir+'→実際'+s.rir+'（余裕あり=強度不足かも）'});
      if(r.targetRir!=null&&s.rir!=null&&s.rir<r.targetRir)alerts.push({type:'rir_low',ex:r.exName,set:si+1,msg:r.exName+' '+(si+1)+'セット目: 設定RIR'+r.targetRir+'→実際'+s.rir+'（追い込みすぎ注意）'});
    });
    var cmp=getCompareVolume(myPid,r.exName,_curTLog.date,window._trCompareMode||'prev');
    c.volume=exVol;
    c.lastVolume=cmp?cmp.vol:0;
    c.lastVolumeDate=cmp?cmp.date:null;
    return c;
  });
  var log={};for(var lk in _curTLog){if(Object.prototype.hasOwnProperty.call(_curTLog,lk))log[lk]=_curTLog[lk];}
  log.results=cleanResults;
  log.totalVolume=totalVol;
  log.hasInjurySkip=injurySkips.length>0;
  log=slimTlogRec(log); // 容量対策: 保存直前にスリム化（_curTLog・下書きは温存＝実施画面のprevEx表示等に必要）

  // 推定1RMを自動計算（BIG3系の種目で、現在の推定値より高ければ記録）
  var e1rmValues={};
  log.results.forEach(function(r){
    if(r.skipped||!r.estBase)return;
    var best=null;
    (r.sets||[]).forEach(function(s){
      if(s.weight&&s.reps){var e=estimateOneRM(s.weight,s.reps,s.rir!=null?s.rir:0);if(e&&(!best||e>best.e1rm))best={e1rm:e,weight:s.weight,reps:s.reps,rir:s.rir};}
    });
    if(best){
      var prevE=getLatestE1RM(myPid)[r.estBase];
      if(!prevE||best.e1rm>prevE.e1rm){
        e1rmValues[r.estBase]={e1rm:best.e1rm,weight:best.weight,reps:best.reps,rir:best.rir};
      }
    }
  });

  // 4) tlog（必須）→ e1rm（任意）を順次安全保存。tlog成功時のみ下書きを消す。
  var items=[{k:'tlog',rec:log}];
  var hasE1rm=Object.keys(e1rmValues).length>0;
  if(hasE1rm)items.push({k:'e1rm',rec:{id:newId(),pid:myPid,date:todayStr(),inputAt:new Date().toISOString(),values:e1rmValues}});
  svSafeSeq(items,function(done){
    clearTDraft();
    ppAutoFlip(log); // チームウエイト完了→当日のPUSH/PULL自動確定（対象外はppAutoFlip内ガードで判定）
    mergeTexlistFromLog(log); // 選手が追加した種目名を履歴（texlist）へ静かにマージ
    showTrainingResult(log,alerts,injurySkips,hasE1rm?e1rmValues:null);
  },function(err,done,item){
    if(done.indexOf('tlog')>=0){
      // tlogは保存済み。e1rmだけ失敗 → 記録は成立扱い（自己ベスト更新の注記のみ落とす）
      clearTDraft();
      ppAutoFlip(log); // tlog成立＝この経路でも自動確定する（漏らすと自己ベスト更新日だけflipされない）
      mergeTexlistFromLog(log);
      showTrainingResult(log,alerts,injurySkips,null);
    }else{
      // tlog自体が失敗 → _curTLog・下書きは温存し、ボタンを戻して再試行可能にする
      releaseSubmit(btnEl);
      alert('記録の保存に失敗しました。電波の良い場所でもう一度お試しください。入力内容は残っています。');
    }
  });
}

// 推定1RMの伸び（最初と最新を比較）
function getE1RMTrend(pid){
  var recs=(D.e1rm||[]).filter(function(x){return idEq(x.pid,pid);}).sort(function(a,b){return (a.date||'').localeCompare(b.date||'');});
  if(!recs.length)return[];
  var result=[];
  EST_BASES.forEach(function(b){
    var first=null,latest=null;
    recs.forEach(function(rec){
      if(rec.values&&rec.values[b.k]){
        if(first===null)first=rec.values[b.k].e1rm;
        latest=rec.values[b.k].e1rm;
      }
    });
    if(first!==null&&latest!==null){result.push({estBase:b.k,first:first,latest:latest,growth:latest-first});}
  });
  return result;
}

// 連続スキップ検出（直近の記録で同じ種目が連続でskip/未達）
function getConsecutiveSkips(pid){
  var logs=tlogAll().filter(function(l){return idEq(l.pid,pid);}).sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});
  if(logs.length<2)return[];
  // 種目ごとに、直近からの連続skip回数を数える
  var exSkipCount={};
  var exSeen={};
  logs.forEach(function(lg){
    (lg.results||[]).forEach(function(r){
      if(exSeen[r.exName]==='stopped')return; // 既に連続が途切れた種目はスキップ
      if(r.skipped){
        exSkipCount[r.exName]=(exSkipCount[r.exName]||0)+1;
      }else{
        exSeen[r.exName]='stopped'; // 実施されたら連続終了
      }
    });
  });
  var result=[];
  Object.keys(exSkipCount).forEach(function(name){
    if(exSkipCount[name]>=2)result.push({name:name,count:exSkipCount[name]});
  });
  return result.sort(function(a,b){return b.count-a.count;});
}

// 自主ウエイト＝チームと同じ実施画面（_curTLogにkind:'self'/menuId:null・種目は自由追加）。

// 自主ウエイト開始。下書きスロットは選手ごと1個なので、当日の下書きの種類に応じて復元/上書き警告を分岐
// （自主下書きはmenuId=nullでidEqの復元ゲートに乗らないため、ここに専用チェックを置く＝レビューHigh-2）
function startSelfWeight(){
  var draft=loadTDraft();
  if(draft&&draft.date===todayStr()){
    if(draft.kind==='self'){promptResumeSelfDraft(loadTDraftTime(),false);return;}
    // 当日のチームメニュー下書きがある→開始すると消えるため確認
    var mn=getMyMenus().find(function(x){return idEq(x.id,draft.menuId);});
    if(!confirm('チームメニュー'+(mn?'「'+mn.name+'」':'')+'の入力途中データがあります。\n自主トレを開始するとその内容は消えます。\n\nOK＝開始する ／ キャンセル＝戻る'))return;
    startSelfWeightFresh();
    return;
  }
  // ローカルに無ければクラウド下書きを確認（端末跨ぎ）
  fetchCloudTDraft(function(cd){
    if(cd&&cd.draft&&cd.draft.kind==='self'&&cd.draft.date===todayStr()){
      try{localStorage.setItem(tDraftKey(),JSON.stringify(cd.draft));if(cd.updatedAt)localStorage.setItem(tDraftKey()+'_t',cd.updatedAt);}catch(e){}
      promptResumeSelfDraft(cd.updatedAt,true);
    }else if(cd&&cd.draft&&cd.draft.kind!=='self'&&cd.draft.date===todayStr()){
      if(!confirm('別の端末にチームメニューの入力途中データがあります。\n自主トレを開始するとその内容は消えます。\n\nOK＝開始する ／ キャンセル＝戻る'))return;
      startSelfWeightFresh();
    }else{
      startSelfWeightFresh();
    }
  });
}
function promptResumeSelfDraft(savedT,fromCloud){
  var h='<div style="text-align:center;padding:24px 10px">'+
    '<div style="margin-bottom:10px">'+ic('i-note',40,'var(--rose)')+'</div>'+
    '<div style="font-size:16px;font-weight:700;margin-bottom:6px">入力途中のデータがあります</div>'+
    '<div style="font-size:13px;color:var(--text-secondary);margin-bottom:4px">自主トレ（ウエイト）</div>'+
    (fromCloud?'<div style="font-size:11px;color:var(--blue);margin-bottom:2px">'+ic('i-info',11)+' 別の端末から引き継ぎ</div>':'')+
    (savedT?'<div style="font-size:11px;color:var(--text-tertiary);margin-bottom:18px">最終保存: '+fmtDateTime(savedT)+'</div>':'<div style="margin-bottom:18px"></div>')+
    '<button class="btn btn-p" style="width:220px;padding:14px;font-size:15px;margin-bottom:10px" onclick="resumeSelfDraft()">▶ 続きから入力する</button><br>'+

    '</div>';
  showSub(h);
}
function resumeSelfDraft(){
  var draft=loadTDraft();
  if(!draft||draft.kind!=='self'){startSelfWeightFresh();return;}
  _curTLog=draft;
  resetRestTimer();
  renderTrainingExec(selfWeightMn());
}
function startSelfWeightFresh(){
  clearTDraft();
  _curTLog={id:newId(),pid:myPid,menuId:null,kind:'self',date:todayStr(),ts:new Date().toISOString(),results:[],totalVolume:0};
  resetRestTimer();
  renderTrainingExec(selfWeightMn());
}
// 実施中の記録に種目を追加（自主ウエイト用・Phase 4でチームメニュー中の追加にも使う共通実装）。
// estBase自動判定: EST_BASESラベル一致 → 過去ログの同名種目 → null。前回実績もチーム開始時と同ロジックで引き継ぐ。
function addTrainingEx(){
  if(!_curTLog)return;
  var el=document.getElementById('tr-add-ex');
  var name=el?(el.value||'').trim():'';
  if(!name){alert('種目名を入力してください');return;}
  if(_curTLog.results.some(function(r){return r.exName===name;})){alert('同じ種目がすでにあります');return;}
  var eb=null;
  EST_BASES.forEach(function(b){if(!eb&&b.label===name)eb=b.k;});
  var today=todayStr();
  var sortedPrevLogs=tlogAll().filter(function(l){
    return idEq(l.pid,myPid)&&!l.absent&&l.results&&l.date<today;
  }).sort(function(a,b){
    var at=a.ts||a.date,bt=b.ts||b.date;return bt.localeCompare(at);
  });
  if(!eb){
    for(var i=0;i<sortedPrevLogs.length&&!eb;i++){
      var f=(sortedPrevLogs[i].results||[]).find(function(x){return x.exName===name&&x.estBase;});
      if(f)eb=f.estBase;
    }
  }
  var oneRM=eb?getPlayer1RM(myPid,eb):null;
  var prevEx=null,prevExDate='';
  for(var k=0;k<sortedPrevLogs.length;k++){
    var found=(sortedPrevLogs[k].results||[]).find(function(x){return x.exName===name&&!x.skipped&&x.sets&&x.sets.length>0;});
    if(found){prevEx=found;prevExDate=sortedPrevLogs[k].date;break;}
  }
  var sets=[];
  for(var s=0;s<3;s++){
    var prev=prevEx?(prevEx.sets[s]||prevEx.sets[prevEx.sets.length-1]):null;
    sets.push({
      weight:prev&&(prev.weight!==''&&prev.weight!=null)?prev.weight:'',
      reps:prev&&(prev.reps!==''&&prev.reps!=null)?prev.reps:'',
      rir:'',done:false
    });
  }
  _curTLog.results.push({
    exName:name,estBase:eb,targetSets:null,targetReps:null,targetRir:null,
    note:null,videoUrl:null,estWeight:null,oneRM:oneRM,
    prevEx:prevEx?{sets:prevEx.sets,date:prevExDate}:null,
    sets:sets,skipped:false,skipReason:'',addedByPlayer:true
  });
  saveTDraft();
  var mn=getMyMenus().find(function(x){return idEq(x.id,_curTLog.menuId);});
  renderTrainingExec(mn); // mn未取得（自主トレ）はrenderTrainingExec先頭のフォールバックが吸収
}
// 選手が追加した種目名をtexlist（種目名履歴・文字列配列）へマージ。失敗しても記録自体は成立済みなので静かに無視
function mergeTexlistFromLog(log){
  var names=[];
  (log&&log.results||[]).forEach(function(r){
    if(r.addedByPlayer&&r.exName){var nm=String(r.exName).trim();if(nm&&names.indexOf(nm)<0)names.push(nm);}
  });
  if(!names.length)return;
  svSafeUpdate('texlist',function(latest){
    if(!Array.isArray(latest))latest=[];
    names.forEach(function(nm){if(latest.indexOf(nm)<0)latest.push(nm);});
    return latest;
  },function(){},function(){});
}

function saveSelfFitness(btnEl){
  var ftype=(document.getElementById('sf-type').value||'').trim();
  var minV=document.getElementById('sf-min').value;
  var kmV=document.getElementById('sf-km').value;
  var rpeV=document.getElementById('sf-rpe').value;
  var note=(document.getElementById('sf-note').value||'').trim();
  if(!ftype){alert('種類を入力してください');return;}
  var minutes=parseFloat(minV);
  if(!isFilled(minV)||!(minutes>0)){alert('時間（分）を入力してください');return;}
  var km=null;
  if(isFilled(kmV)){km=parseFloat(kmV);if(!(km>0)){alert('距離（km）の値が正しくありません');return;}}
  if(!guardSubmit(btnEl,'記録中…'))return;
  var fit={ftype:ftype,minutes:minutes};
  if(km!=null)fit.km=km;
  if(rpeV)fit.rpe=parseInt(rpeV);
  if(note)fit.note=note;
  // 不変条件: results:[] + totalVolume:0 を必ず持たせる（既存の全集計コードが(l.results||[])で無傷に通る）
  var log={id:newId(),pid:myPid,menuId:null,kind:'self',date:todayStr(),ts:new Date().toISOString(),fitness:fit,results:[],totalVolume:0};
  svSafeSeq([{k:'tlog',rec:log}],function(){
    showSelfFitnessResult(log);
  },function(){
    releaseSubmit(btnEl);
    alert('記録の保存に失敗しました。電波の良い場所でもう一度お試しください。入力内容は残っています。');
  });
}
function showSelfFitnessResult(log){

  var h='<div class="hero"><div class="ghost-num">'+(f.minutes||0)+'</div>'+
    '<div class="kicker" style="color:var(--rose-l)">FULL TIME</div>'+
    '<div style="font-size:30px;font-weight:900;font-family:var(--font-num);font-style:italic;line-height:1.15">'+(f.minutes||0)+'<span style="font-size:13px;font-weight:700"> 分</span></div>'+
    '<div style="font-size:11px;opacity:.85">'+ic('i-check',12)+' '+escapeHtml(f.ftype||'フィットネス')+'・記録完了</div>'+
  '</div>';
  h+='<div class="card" style="margin-bottom:12px;padding:6px 14px 10px"><div class="kicker" style="margin:8px 0 1px">SELF TRAINING</div><div style="font-size:12px;font-weight:700;margin-bottom:4px">記録内容</div>';

  h+='</div>';
  h+='<button class="btn btn-p" style="width:100%;margin-top:16px" onclick="go(\'training\')">完了</button>';

T.tape=function(){
  if(!myPid)return;
  if(!D.tapeslot)D.tapeslot=[];
  if(!D.tape)D.tape=[];
  var today=todayStr();
  // 今週〜来週の枠を表示
  var now=new Date();
  var monDt=new Date(now);monDt.setDate(now.getDate()-now.getDay()+1);
  var twoWeekLater=new Date(monDt);twoWeekLater.setDate(monDt.getDate()+13);
  var fromS=toDateStr(monDt);
  var toS=toDateStr(twoWeekLater);
  // 自分の予約
  var myRsvs=D.tape.filter(function(t){return t.pid===myPid;}).sort(function(a,b){return a.date.localeCompare(b.date);});
  // 予約可能な日付
  var availDates=[...new Set(D.tapeslot.filter(function(s){return s.date>=fromS&&s.date<=toS;}).map(function(s){return s.date;}))].sort();
  var h='<div style="font-size:18px;font-weight:600;margin:12px 0 14px">'+ic('i-tape',14)+' テーピング予約</div>';
  // 自分の予約
  if(myRsvs.length){
    h+='<div class="form-box"><div class="form-title">あなたの予約</div>';
    myRsvs.forEach(function(rsv){
      var slot=(D.tapeslot||[]).find(function(s){return s.id===rsv.slotId;});
      h+='<div class="log-row"><div style="flex:1"><div style="font-weight:600">'+fmt(rsv.date)+' '+rsv.startTime+'〜'+rsv.endTime+'</div>'+
      '<div style="font-size:12px;color:var(--text-secondary)">'+rsv.parts.join('・')+'</div>'+
      (rsv.assignedTo?'<div style="font-size:11px;color:var(--blue)">担当: '+rsv.assignedTo+'</div>':'')+'</div>'+
      (rsv.date>=today?'<button class="btn btn-d" style="min-width:80px" onclick="cancelTapeRsv('+rsv.id+')">キャンセル</button>':'<span class="bd bd-g">完了</span>')+'</div>';
    });
    h+='</div>';
  }
  // 予約可能な日
  h+='<div class="form-box"><div class="form-title">予約する</div>';
  if(availDates.length){
    h+='<div style="font-size:12px;color:var(--text-secondary);margin-bottom:10px">予約可能な日を選んでください（今週・来週）</div>';
    h+=availDates.map(function(date){
      var slots=(D.tapeslot||[]).filter(function(s){return s.date===date;});
      var totalCap=slots.reduce(function(c,s){return c+s.capacity;},0);
      var totalBooked=D.tape.filter(function(t){return t.date===date;}).reduce(function(c,t){return c+t.slots;},0);
      var remaining=totalCap-totalBooked;
      return'<div class="card card-click" style="margin-bottom:8px'+(slots[0].type==='match'?';border-left:3px solid var(--maroon)':'')+'" onclick="showTapeBookForm(\''+date+'\')">'+
      '<div style="display:flex;align-items:center;justify-content:space-between">'+
      '<div><div style="font-weight:600">'+fmt(date)+'</div>'+
      '<div style="font-size:12px;color:var(--text-secondary)">'+(slots[0].type==='match'?'<span class="flag" style="background:var(--maroon);color:var(--pale)">MATCH DAY</span> 試合前':'練習前')+'</div></div>'+
      '<span class="bd '+(remaining>0?'bd-g':'bd-r')+'">'+(remaining>0?'予約可能':'満員')+'</span></div></div>';
    }).join('');
  } else {
    h+='<div class="no">予約可能な枠がありません</div>';
  }
  h+='</div>';
  $m().innerHTML=h;
};

function selectTapeStaff(staff,idx){
  window._tapeCurrentStaff=staff;
  document.querySelectorAll('[id^="tss-"]').forEach(function(e){e.style.background='';e.style.color='';e.style.borderColor='';});
  var el=document.getElementById('tss-'+idx);
  if(el){el.style.background='var(--blue)';el.style.color='#fff';el.style.borderColor='var(--blue)';}
  updateTapeSlots();
}

function toggleTapePart(el,part){
  tapePartsSelected[part]=!tapePartsSelected[part];
  if(tapePartsSelected[part]){el.style.background='var(--blue)';el.style.color='#fff';el.style.borderColor='var(--blue)';}
  else{el.style.background='';el.style.color='';el.style.borderColor='';}
  updateTapeSlots();
}

// 予約rsvsのうち、slotId(枠)を占有しているものを返す（複数枠予約はslotIds配列全体を見る。旧データはslotIdのみへフォールバック）
function tapeSlotBooked(rsvs,slotId){return rsvs.filter(function(t){return(t.slotIds||[t.slotId]).indexOf(slotId)>=0;});}
function updateTapeSlots(){
  var wrap=document.getElementById('tape-slots-wrap');if(!wrap)return;
  var parts=Object.keys(tapePartsSelected).filter(function(k){return tapePartsSelected[k];});
  var needed=parts.length;
  var staff=window._tapeCurrentStaff;
  var date=window._tapeCurrentDate;
  if(!staff){wrap.innerHTML='<div style="color:var(--text-secondary);font-size:13px">担当者を先に選択してください</div>';return;}
  if(!needed){wrap.innerHTML='<div style="color:var(--text-secondary);font-size:13px">部位を選択してください</div>';return;}
  var slots=(D.tapeslot||[]).filter(function(s){return s.date===date&&s.staff===staff;}).sort(function(a,b){return a.startTime.localeCompare(b.startTime);});
  // 連続したneeded枠が空いている時間帯を探す
  var available=[];
  for(var i=0;i<=slots.length-needed;i++){
    var ok=true;
    for(var j=0;j<needed;j++){
      var s=slots[i+j];
      var booked=tapeSlotBooked(D.tape,s.id).length;
      if(booked>=s.capacity){ok=false;break;}
      if(j>0&&slots[i+j-1].endTime!==s.startTime){ok=false;break;}
    }
    if(ok){available.push({startTime:slots[i].startTime,endTime:slots[i+needed-1].endTime,slotIds:slots.slice(i,i+needed).map(function(s){return s.id;})});}
  }
  if(!available.length){wrap.innerHTML='<div class="alert-card alert-down">'+needed+'部位（'+(needed*5)+'分）の空き枠がありません</div>';return;}
  var availSlotsData=[];
  wrap.innerHTML='<div style="font-size:12px;color:var(--text-secondary);margin-bottom:8px">'+needed+'部位 → '+(needed*5)+'分。時間を選択：</div>'+
  available.map(function(av,idx){
    availSlotsData.push(av);
    return'<div class="select-card" id="tslt-'+idx+'" onclick="selectTapeSlot('+idx+')" style="margin-bottom:6px;text-align:left;padding:10px 14px">'+
    '<span style="font-weight:600">'+av.startTime+' 〜 '+av.endTime+'</span></div>';
  }).join('');
  window._tapeAvailSlots=availSlotsData;
}


var selectedTapeSlot=null;
function selectTapeSlot(idx){
  var slots=window._tapeAvailSlots||[];
  selectedTapeSlot=slots[idx]||null;
  document.querySelectorAll('[id^="tslt-"]').forEach(function(e){e.style.borderColor='';e.style.background='';});
  var el=document.getElementById('tslt-'+idx);
  if(el){el.style.borderColor='var(--blue)';el.style.background='var(--blue-bg)';}
}

function doTapeBook(date,btnEl){
  if(!D.tape)D.tape=[];
  var parts=Object.keys(tapePartsSelected).filter(function(k){return tapePartsSelected[k];});
  if(!parts.length)return alert('部位を選択してください');
  if(!selectedTapeSlot)return alert('時間枠を選択してください');
  // 重複チェック（同日に既に予約がないか）
  var already=D.tape.find(function(t){return t.pid===myPid&&t.date===date;});
  if(already)return alert('この日はすでに予約があります。キャンセルしてから再予約してください。');
  if(!guardSubmit(btnEl,'予約中…'))return;
  var rsv={id:newId(),pid:myPid,date:date,slotId:selectedTapeSlot.slotIds[0],slotIds:selectedTapeSlot.slotIds,startTime:selectedTapeSlot.startTime,endTime:selectedTapeSlot.endTime,parts:parts,slots:parts.length,staff:window._tapeCurrentStaff||'',assignedTo:null,tapeNote:''};
  var dup=false,slotFull=false;
  svSafeUpdate('tape',function(latest){
    if(latest.find(function(t){return t.pid===myPid&&t.date===date;})){dup=true;return latest;}
    // 枠の残数をサーバー最新値で再検証（クライアント側の空き判定はスナップショット時点のものでレースが起こり得るため）
    var full=rsv.slotIds.some(function(sid){
      var slotDef=(D.tapeslot||[]).find(function(s){return s.id===sid;});
      var cap=slotDef?slotDef.capacity:1;
      return tapeSlotBooked(latest,sid).length>=cap;
    });
    if(full){slotFull=true;return latest;}
    latest.push(rsv);return latest;
  },function(){
    if(dup){releaseSubmit(btnEl);alert('この日はすでに予約があります。キャンセルしてから再予約してください。');return;}
    if(slotFull){releaseSubmit(btnEl);alert('この時間枠はちょうど埋まってしまいました。別の時間を選択してください。');go('tape');return;}
    go('tape');toast('予約しました');
  },function(){
    releaseSubmit(btnEl);
    alert('保存できませんでした。電波の良い場所でもう一度お試しください。');
  });
}

function cancelTapeRsv(rid){
  if(!confirm('この予約をキャンセルしますか？'))return;
  svSafeUpdate('tape',function(latest){return latest.filter(function(t){return t.id!==rid;});},function(){go('tape');});
}

// オフライン閲覧キャッシュを有効化（保存はこれまで通りオンライン必須。トランザクションはオフラインで実行できないため）。
// 複数タブを開いている場合('failed-precondition')や非対応ブラウザ('unimplemented')では無効のまま通常動作を続ける。
db.enablePersistence().catch(function(e){console.log('Firestore persistence not enabled:',e.code);});
// Init
ld().then(function(){
  var lds=document.getElementById('loading-screen');
  if(lds){
    lds.style.pointerEvents='none'; // 透明レイヤーが全タップを遮断する事故防止（display:none前の保険）
    var ldHide=function(){lds.style.display='none';};
    if(typeof lds.addEventListener==='function')lds.addEventListener('transitionend',ldHide,{once:true});
    setTimeout(ldHide,600); // transitionend不発（reduced-motion等）でも必ずdisplay:none
    lds.classList.add('done');
  }
  startListeners();
  // tlog容量対策: 古いレコードのアーカイブ移送（全端末で同時に走らないようランダム遅延。冪等なので重なっても安全）
  setTimeout(archiveTlog,5000+Math.floor(Math.random()*10000));
  // 前回のログイン情報を復元（確認画面を経由）
  try{
    var savedPid=localStorage.getItem('rm_my_pid');
    if(savedPid){
      var pid=parseInt(savedPid);
      var p=D.p.find(function(x){return x.id===pid;});
      if(p){
        // 自動ログインせず、確認画面を表示
        showAutoLoginConfirm(pid);
        return;
      }
    }
  }catch(e){}
  go('home');
}).catch(function(e){
  console.error(e);
  document.getElementById('loading-screen').innerHTML='<div style="text-align:center;color:var(--pale)">'+ic('i-warn',40,'var(--gold-hot)')+'<div style="margin-top:12px;font-weight:700">読み込みエラー</div><button onclick="location.reload()" style="margin-top:14px;padding:10px 22px;cursor:pointer;border:none;border-radius:10px;background:var(--pale);color:var(--maroon-d);font-weight:700;font-family:inherit;font-size:14px">再試行</button></div>';
});
</script>
