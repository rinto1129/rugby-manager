};
// 推定対象となる種目（estBase）。これ以外は手入力
var EST_BASES=[{k:'squat',label:'スクワット'},{k:'bench',label:'ベンチプレス'},{k:'deadlift',label:'デッドリフト'}];

// %1RMを取得（reps, rir から）。範囲外は最寄りにクランプ
function getPctFromRIR(reps,rir){
  var rpe=10-rir;
  if(rpe>10)rpe=10;if(rpe<6)rpe=6;
  // 0.5刻みに丸め
  rpe=Math.round(rpe*2)/2;
  var r=Math.round(reps);
  if(r<1)r=1;if(r>12)r=12;
  var row=RPECHART[r];
  if(!row)return null;
  return row[rpe]!=null?row[rpe]:null;
}
// 推定重量 = 1RM × % 、2.5kg単位に丸め
function estimateWeight(oneRM,reps,rir){
  if(!oneRM)return null;
  var pct=getPctFromRIR(reps,rir);
  if(pct==null)return null;
  var w=oneRM*pct/100;
  return Math.round(w/2.5)*2.5;
}
// e1RM逆算（実際に挙げた weight×reps×rir から推定1RM）
function estimateOneRM(weight,reps,rir){
  if(!weight||!reps)return null;
  var pct=getPctFromRIR(reps,rir!=null?rir:0);
  if(pct==null||pct===0)return null;
  return Math.round(weight/(pct/100));
}
// 選手の1RM（estBaseごと）を取得。getBestを使う
function getPlayer1RM(pid,estBase){
  if(!estBase)return null;
  return getBest(pid,estBase);
}

}

// Firestoreから最新を取得してpushしてから保存（上書き防止）
function svSafe(k,newRec,callback){
  var ref=db.collection('appdata').doc(k);
  db.runTransaction(function(tx){
    return tx.get(ref).then(function(doc){
      var latest=[];
      if(doc.exists){try{var parsed=JSON.parse(doc.data().data);if(Array.isArray(parsed))latest=parsed;}catch(e){}}
      latest.push(newRec);
      tx.set(ref,{data:JSON.stringify(latest)});
      return latest;
    });
  }).then(function(latest){D[k]=latest;if(callback)callback();}).catch(function(e){alert('保存に失敗しました。もう一度試してください。');console.error(e);});
}
// onError(任意・第4引数): 指定時は失敗を呼び出し側へ委譲（既定の保存失敗alertは出さない）。未指定なら従来どおりalert。
function svSafeUpdate(k,updateFn,onDone,onError){
  var ref=db.collection('appdata').doc(k);
  db.runTransaction(function(tx){
    return tx.get(ref).then(function(doc){
      var latest=[];if(doc.exists){try{var parsed=JSON.parse(doc.data().data);if(Array.isArray(parsed))latest=parsed;}catch(e){}}
      latest=updateFn(latest);
      tx.set(ref,{data:JSON.stringify(latest)});
      return latest;
    });
  }).then(function(latest){D[k]=latest;if(onDone)onDone();}).catch(function(e){console.error('svSafeUpdate error:',k,e);if(onError)onError(e);else alert('保存に失敗しました');});
}
// ===== 共通の安全土台（フェーズ1ステップ1） =====
// 0をはじかない必須チェック。空文字・null・undefined・NaNのみを「未入力」とする（0は有効値）。
function isFilled(v){if(v===''||v==null)return false;if(typeof v==='number')return !Number.isNaN(v);if(typeof v==='string')return v.trim()!=='';return true;}
// 複数レコードを順番に安全保存する。items=[{k:'tlog',rec:...},{k:'e1rm',rec:...}]
// 全件成功でonAllDone、途中失敗でonError(err, doneList, item)。done/失敗を呼び出し側へ通知。
function svSafeSeq(items,onAllDone,onError){
  var done=[];
  function step(i){
    if(i>=items.length){if(onAllDone)onAllDone(done);return;}
    var it=items[i];
    // svSafeは失敗時に内部でalert＋catchしてしまうので、ここでは専用のトランザクションで成否を捕捉する
    var ref=db.collection('appdata').doc(it.k);
    db.runTransaction(function(tx){
      return tx.get(ref).then(function(doc){
        var latest=[];
        if(doc.exists){try{var parsed=JSON.parse(doc.data().data);if(Array.isArray(parsed))latest=parsed;}catch(e){}}
        latest.push(it.rec);
        tx.set(ref,{data:JSON.stringify(latest)});
        return latest;
      });
    }).then(function(latest){
      D[it.k]=latest;done.push(it.k);step(i+1);
    }).catch(function(e){
      console.error('svSafeSeq error:',it.k,e);
      if(onError)onError(e,done,it);
    });
  }
  step(0);
}
// 二重送信ガード：保存中はボタンをdisabled＋ラベル差し替え。releaseSubmitで原状復帰。
function guardSubmit(btnEl,label){
  if(!btnEl)return false;
  if(btnEl.dataset.busy==='1')return false; // 既に処理中なら弾く
  btnEl.dataset.busy='1';
  btnEl.dataset.prevLabel=btnEl.innerHTML;
  btnEl.disabled=true;
  btnEl.style.opacity='.6';
  btnEl.style.pointerEvents='none';
  if(label!=null)btnEl.innerHTML=escapeHtml(label);
  return true;
}
function releaseSubmit(btnEl){
  if(!btnEl)return;
  btnEl.dataset.busy='';
  if(btnEl.dataset.prevLabel!=null&&btnEl.dataset.prevLabel!=='')btnEl.innerHTML=btnEl.dataset.prevLabel;
  btnEl.disabled=false;
  btnEl.style.opacity='';
  btnEl.style.pointerEvents='';
}

function todayStr(){var d=new Date();var y=d.getFullYear();var m=String(d.getMonth()+1).padStart(2,'0');var day=String(d.getDate()).padStart(2,'0');return y+'-'+m+'-'+day;}
function toDateStr(d){var y=d.getFullYear();var m=String(d.getMonth()+1).padStart(2,'0');var day=String(d.getDate()).padStart(2,'0');return y+'-'+m+'-'+day;}

function fmtDateTime(iso){if(!iso)return'';var d=new Date(iso);if(isNaN(d))return'';var now=new Date();var ys=d.getFullYear()!==now.getFullYear()?(d.getFullYear()+'/'):'';return ys+(d.getMonth()+1)+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function fmt(d){return d?d.replace(/-/g,'/'):'-';}
function avH(p,sz){var i=p.id%AVC.length,ini=p.name?p.name.split(/\s+/).map(function(w){return w[0];}).join('').slice(0,2):'?';return p.photo?'<div class="av" style="width:'+sz+'px;height:'+sz+'px;background-image:url('+p.photo+')"></div>':'<div class="av" style="width:'+sz+'px;height:'+sz+'px;background:'+AVC[i][0]+';color:'+AVC[i][1]+';font-size:'+Math.round(sz*.35)+'px">'+escapeHtml(ini)+'</div>';}

function broncoFromInputs(minId,secId){var m=parseInt(document.getElementById(minId).value)||0,s=parseInt(document.getElementById(secId).value)||0;return m*60+s||null;}
function dC(k){if(charts[k]){charts[k].destroy();delete charts[k];}}
function dCA(){for(var k in charts){charts[k].destroy();}charts={};}

  '</div>';

function renderInjCommentsListOnly(iid,role){
  var comments=(D.injcomm||[]).filter(function(c){return idEq(c.injId,iid);}).sort(function(a,b){return (a.createdAt||'').localeCompare(b.createdAt||'');});
  var roleLabel={staff:'スタッフ',player:'選手',trainer:'専門学生'};
  var roleColor={staff:'var(--purple)',player:'var(--blue)',trainer:'var(--green)'};
  if(!comments.length)return'<div style="font-size:12px;color:var(--text-secondary);text-align:center;padding:14px">まだコメントはありません</div>';
  return comments.map(function(c){
    var label=roleLabel[c.role]||c.role||'?';
    var color=roleColor[c.role]||'var(--text-secondary)';
    var dt=c.createdAt?new Date(c.createdAt):null;
    var dateStr=dt?(toDateStr(dt)+' '+String(dt.getHours()).padStart(2,'0')+':'+String(dt.getMinutes()).padStart(2,'0')):'';
    var canDelete=c.role===role&&String(c.authorId)===String(getCurrentUserId(role));
    return'<div style="padding:8px 10px;border-radius:var(--radius);background:var(--bg-secondary);margin-bottom:6px">'+
    '<div style="display:flex;align-items:center;justify-content:space-between;font-size:11px;margin-bottom:4px">'+
    '<span><span class="bd" style="background:'+color+';color:#fff;font-size:9px">'+label+'</span> <b style="margin-left:4px">'+(c.authorName||'')+'</b></span>'+
    '<span style="color:var(--text-secondary)">'+dateStr+(canDelete?' <button class="btn btn-sm btn-d" onclick="delInjComment(\''+c.id+'\','+iid+',\''+role+'\')">削除</button>':'')+'</span>'+
    '</div>'+
    '<div style="font-size:13px;white-space:pre-wrap;word-break:break-word">'+escapeHtml(c.text||'')+'</div>'+
    '</div>';
  }).join('');
}

function getCurrentUserId(role){
  if(role==='staff')return 'staff';
  if(role==='player')return typeof myPid!=='undefined'?myPid:null;
  if(role==='trainer')return (typeof myTrainer!=='undefined'&&myTrainer)?myTrainer.id:null;
  return null;
}

function getCurrentUserName(role){
  if(role==='staff')return 'スタッフ';
  if(role==='player'){var p=D.p.find(function(x){return idEq(x.id,myPid);});return p?p.name:'選手';}
  if(role==='trainer')return (typeof myTrainer!=='undefined'&&myTrainer)?myTrainer.name:'専門学生';
  return '';
}

function showInjCommentDialog(iid){
  var inj=D.i.find(function(x){return idEq(x.id,iid);});
  if(!inj)return;
  showSub('<div style="font-size:18px;font-weight:600;margin:12px 0 14px">💬 '+(inj.side||'')+inj.part+' '+inj.type+' のコメント</div>'+renderInjComments(iid,'player'));
}

function postInjComment(iid,role){
  var el=document.getElementById('injcomm-input-'+iid);
  if(!el)return;
  var text=(el.value||'').trim();
  if(!text){alert('コメントを入力してください');return;}
  var newComm={
    id:'ic_'+Date.now()+'_'+Math.floor(Math.random()*1000),
    injId:iid,
    role:role,
    authorId:getCurrentUserId(role),
    authorName:getCurrentUserName(role),
    text:text,
    createdAt:new Date().toISOString()
  };
  svSafeUpdate('injcomm',function(latest){latest.push(newComm);return latest;},function(){
    el.value='';
    var listEl=document.getElementById('injcomm-list-'+iid);
    if(listEl){listEl.innerHTML=renderInjCommentsListOnly(iid,role);listEl.scrollTop=listEl.scrollHeight;}
  });
}

function delInjComment(cid,iid,role){
  if(!confirm('このコメントを削除しますか？'))return;
  svSafeUpdate('injcomm',function(latest){return latest.filter(function(c){return!idEq(c.id,cid);});},function(){
    var listEl=document.getElementById('injcomm-list-'+iid);
    if(listEl)listEl.innerHTML=renderInjCommentsListOnly(iid,role);
  });
}

function selectPlayer(pid){
  // PIN未設定なら設定画面、設定済みならPIN入力画面
  var p=D.p.find(function(x){return x.id===pid;});
  if(!p)return;
  if(!p.pin){
    showPINSetup(pid);
  } else {
    showPINEntry(pid);
  }
}

function doSetupPIN(pid){
  var pin1=document.getElementById('pin-new').value;
  var pin2=document.getElementById('pin-new2').value;
  if(!/^\d{4}$/.test(pin1)){alert('PINは4桁の数字で設定してください');return;}
  if(pin1!==pin2){alert('PINが一致しません');return;}
  // 保存
  svSafeUpdate('p',function(latest){
    var idx=latest.findIndex(function(x){return x.id===pid;});
    if(idx>=0){latest[idx].pin=pin1;}
    return latest;
  },function(){
    alert('PINを設定しました ✓\n次回からはPINだけで素早くログインできます');
    doLogin(pid);
  });
}

function checkPIN(pid){
  var p=D.p.find(function(x){return x.id===pid;});if(!p)return;
  var pinEl=document.getElementById('pin-input');
  if(!pinEl)return;
  if(pinEl.value!==p.pin){
    alert('PINが間違っています');
    pinEl.value='';
    pinEl.focus();
    return;
  }
  doLogin(pid);
}

function doLogin(pid){
  myPid=pid;
  try{localStorage.setItem('rm_my_pid',String(pid));}catch(e){}
  var p=D.p.find(function(x){return x.id===pid;});
  document.getElementById('hdr-name').textContent=p?p.name+' ('+p.position+'/'+p.year+'年)':'';
  document.getElementById('logout-btn').style.display='block';
  go('mypage');
}

function initUI(){var p=D.p.find(function(x){return x.id===myPid;});if(p){document.getElementById('hdr-name').textContent=p.name+' ('+p.position+'/'+p.year+'年)';document.getElementById('logout-btn').style.display='block';}}

function logout(){
  if(!confirm('ログアウトしますか？\n次回ログインにはPINが必要です'))return;
  myPid=null;
  try{localStorage.removeItem('rm_my_pid');}catch(e){}
  document.getElementById('hdr-name').textContent='';
  document.getElementById('logout-btn').style.display='none';
  showPlayerSelect();
}
function needsPlayer(tab){return tab!=='home';}
function go(tab){
  if(needsPlayer(tab)&&!myPid){showPlayerSelect();return;}
  curTab=tab;subView=null;dCA();
  // onclick属性からタブ名を読み取って判定（順序依存をなくす）
  document.querySelectorAll('.nav-btn').forEach(function(e){
    var onclickAttr=e.getAttribute('onclick')||'';
    var m=onclickAttr.match(/go\(['"]([^'"]+)['"]\)/);
    e.classList.toggle('ac',m&&m[1]===tab);
  });
  T[tab]&&T[tab]();
}
function showPlayerSelect(){
  dCA();
  // 全てのnav-btnのハイライトを解除（ログイン画面）
  document.querySelectorAll('.nav-btn').forEach(function(e){
    e.classList.remove('ac');
  });
  var q=(document.getElementById('psel-s')?document.getElementById('psel-s').value:'').toLowerCase();
  var list=D.p.filter(function(p){return!q||p.name.toLowerCase().indexOf(q)>=0;});
  var gh=list.map(function(p){return'<div class="select-card" onclick="selectPlayer('+p.id+')">'+avH(p,36)+'<div style="font-size:13px;font-weight:600;margin-top:4px">'+escapeHtml(p.name)+'</div><div style="font-size:11px;color:var(--text-secondary)">'+p.position+'/'+p.year+'年</div></div>';}).join('');
  var gel=document.getElementById('psel-g');
  if(gel){gel.innerHTML=gh;}else{$m().innerHTML='<div style="text-align:center;margin:1.5rem 0"><div style="font-size:36px;margin-bottom:6px">👤</div><h2 style="font-size:17px">選手を選択してください</h2></div><input class="ipt" id="psel-s" placeholder="名前で検索..." oninput="showPlayerSelect()" style="margin-bottom:10px"><div class="select-grid" id="psel-g">'+gh+'</div>';}
}
function showSub(html){subView=true;dCA();$m().innerHTML='<button class="btn-back" onclick="go(\'mypage\')">← マイページに戻る</button>'+html;}

var T={
home:function(){
  var isOff=(D.offday||[]).indexOf(todayStr())>=0;
  var pickup=isOff?[]:getTodayPickup();
  var teamAnns=D.ann.filter(function(a){return!a.targetPid;}).sort(function(a,b){return b.date.localeCompare(a.date);}).slice(0,5);
  // This week calendar events
  var now=new Date();
  var monDt=new Date(now);monDt.setDate(now.getDate()-now.getDay()+1);
  var sunDt=new Date(monDt);sunDt.setDate(monDt.getDate()+6);
  var monS=toDateStr(monDt),sunS=toDateStr(sunDt);
  var weekEvts=(D.cal||[]).filter(function(e){return e.date>=monS&&e.date<=sunS;}).sort(function(a,b){return a.date.localeCompare(b.date);});
  // Match check alert: am I in selected players and haven't checked today?
  var todayS=todayStr();
  var selectedForMatch=D.matchsel||[];
  // 昨日の試合日チェック未入力通知
  var myMatchDoneYesterday=D.md.some(function(m){return m.pid===myPid&&m.date===yesterdayS2;});
  var isSelectedForMatch=myPid&&selectedForMatch.indexOf(myPid)>=0;
  // 昨日が試合日（カレンダーにmatchがある）かチェック
  var wasMatchYesterday=(D.cal||[]).some(function(e){return e.date===yesterdayS2&&e.type==='match';});
  var showMatchAlert=isSelectedForMatch&&wasMatchYesterday&&!myMatchDoneYesterday;
  // 全体の未入力者（昨日の試合）
  var matchMissedAll=wasMatchYesterday?D.p.filter(function(p){
    return selectedForMatch.indexOf(p.id)>=0&&!D.md.some(function(m){return m.pid===p.id&&m.date===yesterdayS2;});
  }):[];
  // 測定日アラート（昨日の測定日で未入力だったか翌日に通知）
  var yesterday2=new Date();yesterday2.setDate(yesterday2.getDate()-1);
  var yesterdayS2=toDateStr(yesterday2);
  var yesterdayCalEvts2=(D.cal||[]).filter(function(e){return e.date===yesterdayS2;});
  var physMeasureYesterday2=yesterdayCalEvts2.some(function(e){return e.type==='phys_measure';});
  var broncoMeasureYesterday2=yesterdayCalEvts2.some(function(e){return e.type==='bronco_measure';});
  var phSkipYesterday2=myPid&&(D.phskip||[]).some(function(s){return s.pid===myPid&&s.date===yesterdayS2;});
  var physDoneYesterday=myPid&&D.ph.some(function(r){return r.pid===myPid&&r.date===yesterdayS2&&(r.squat!=null||r.bench!=null||r.deadlift!=null||r.chinning!=null||r.clean!=null);});
  var broncoDoneYesterday=myPid&&D.ph.some(function(r){return r.pid===myPid&&r.date===yesterdayS2&&r.bronco!=null;});
  // 未入力者一覧（全体・昨日分）
  var physMissedAll=physMeasureYesterday2?D.p.filter(function(p){
    var done=D.ph.some(function(r){return r.pid===p.id&&r.date===yesterdayS2&&(r.squat!=null||r.bench!=null||r.deadlift!=null||r.chinning!=null||r.clean!=null);});
    var skip=(D.phskip||[]).some(function(s){return s.pid===p.id&&s.date===yesterdayS2;});
    return!done&&!skip;
  }):[];
  var broncoMissedAll=broncoMeasureYesterday2?D.p.filter(function(p){
    var done=D.ph.some(function(r){return r.pid===p.id&&r.date===yesterdayS2&&r.bronco!=null;});
    var skip=(D.phskip||[]).some(function(s){return s.pid===p.id&&s.date===yesterdayS2;});
    return!done&&!skip;
  }):[];
  function getTop3(field){
    var list=D.p.map(function(pp){var rs=D.ph.filter(function(x){return x.pid===pp.id;});var v=null;
    if(field==='bronco'){var vs=rs.filter(function(x){return x.bronco;}).map(function(x){return x.bronco;});v=vs.length?Math.min.apply(null,vs):null;}
    else if(field==='big3'){v=rs.length?Math.max.apply(null,rs.map(function(x){return big3(x);})):null;}
    else{var vs2=rs.filter(function(x){return x[field];}).map(function(x){return x[field];});v=vs2.length?Math.max.apply(null,vs2):null;}
    return{p:pp,v:v};}).filter(function(x){return x.v!==null;});
    field==='bronco'?list.sort(function(a,b){return a.v-b.v;}):list.sort(function(a,b){return b.v-a.v;});
    return list.slice(0,3);
  }
  var h='<div style="text-align:center;margin-bottom:16px"><div style="font-size:28px;margin-bottom:4px">🏉</div><div style="font-size:18px;font-weight:600">福岡大学ラグビー部</div></div>';

function numStepHTML(id,min,max,oninput){
  return '<div style="display:flex;align-items:center;gap:0;border:1.5px solid var(--border-secondary);border-radius:var(--radius);overflow:hidden">'+
  '<button type="button" onclick="numStep(\''+id+'\',-1,'+min+','+max+')" style="padding:8px 14px;border:none;background:var(--bg-secondary);font-size:16px;cursor:pointer;font-weight:600">−</button>'+
  '<input class="ipt" type="number" id="'+id+'" min="'+min+'" max="'+max+'" style="text-align:center;border:none;border-left:1px solid var(--border-tertiary);border-right:1px solid var(--border-tertiary);border-radius:0;flex:1" oninput="'+(oninput||'')+'" placeholder="'+min+'〜'+max+'">'+
  '<button type="button" onclick="numStep(\''+id+'\',1,'+min+','+max+')" style="padding:8px 14px;border:none;background:var(--bg-secondary);font-size:16px;cursor:pointer;font-weight:600">＋</button></div>'+
  '<div style="font-size:11px;color:var(--text-secondary);margin-top:3px">'+min+'〜'+max+'</div>';
}
function numStep(id,dir,min,max){var el=document.getElementById(id);var v=parseInt(el.value)||0;v=Math.min(max,Math.max(min,v+dir));el.value=v;el.dispatchEvent(new Event('input'));}
function updSrpe(){var r=parseInt(document.getElementById('cf-rpe').value)||0,d=parseInt(document.getElementById('cf-dur').value)||0;document.getElementById('cf-pv').innerHTML=r&&d?'<div class="mc" style="margin-top:8px"><div class="v" style="color:var(--purple)">'+(r*d)+'</div><div class="l">sRPE</div></div>':'';}
function doCondition(btnEl){
  // RPEは1〜10の必須項目（isFilledで空のみ未入力扱い→範囲チェックで0や範囲外を弾く）
  var rpe=parseFloat(document.getElementById('cf-rpe').value);
  if(!isFilled(rpe)||rpe<1||rpe>10)return alert('RPE（1〜10）を入力してください');
  // 二重送信ガード（連打で f レコードが重複作成されるのを防ぐ）
  if(!guardSubmit(btnEl,'記録中…'))return;
  var rec={id:Date.now(),pid:myPid,date:document.getElementById('cf-date').value,inputAt:new Date().toISOString(),rpe:rpe,sleep:parseFloat(document.getElementById('cf-sleep').value)||0,duration:parseInt(document.getElementById('cf-dur').value)||0,note:document.getElementById('cf-note').value};
  // svSafeSeqで成否を捕捉（svSafeは失敗時に内部alert＋ボタン固着するため使わない）
  svSafeSeq([{k:'f',rec:rec}],function(){
    alert('記録しました ✓');go('mypage');
  },function(){
    // 保存失敗 → ボタンを戻し、入力内容を温存して再試行できるようにする
    releaseSubmit(btnEl);
    alert('保存できませんでした。電波の良い場所でもう一度お試しください。入力内容は残っています。');
  });
}

// グラフ切り替え
function switchPhysGraph(type){
  var recs=D.ph.filter(function(x){return x.pid===myPid;}).sort(function(a,b){return a.date.localeCompare(b.date);});
  var config={
    sq:{label:'スクワット',field:'squat',color:'#185FA5',unit:'kg',isBronco:false},
    bp:{label:'ベンチプレス',field:'bench',color:'#1D9E75',unit:'kg',isBronco:false},
    dl:{label:'デッドリフト',field:'deadlift',color:'#D85A30',unit:'kg',isBronco:false},
    cn:{label:'チンニング',field:'chinning',color:'#534AB7',unit:'kg',isBronco:false},
    cl:{label:'クリーン',field:'clean',color:'#854F0B',unit:'kg',isBronco:false},
    br:{label:'ブロンコ',field:'bronco',color:'#A32D2D',unit:'',isBronco:true}
  };
  var c=config[type]||config.sq;
  var filtered=recs.filter(function(r){return r[c.field]!=null;});
  // タブの色を更新
  ['sq','bp','dl','cn','cl','br'].forEach(function(t){
    var el=document.getElementById('gt-'+t);
    if(!el)return;
    el.className='btn btn-sm'+(t===type?' btn-p':'');
  });
  var e=document.getElementById('ch-ph');if(!e)return;
  dC('ph');
  if(!filtered.length){new Chart(e,{type:'line',data:{labels:[],datasets:[]},options:{responsive:true,maintainAspectRatio:false}});return;}
  charts.ph=new Chart(e,{type:'line',data:{
    labels:filtered.map(function(r){return r.date.slice(5);}),
    datasets:[{
      label:c.label,
      data:filtered.map(function(r){return c.isBronco?r[c.field]:r[c.field];}),
      borderColor:c.color,
      backgroundColor:c.color+'22',
      fill:true,
      tension:.3,
      pointRadius:4
    }]
  },options:{
    responsive:true,
    maintainAspectRatio:false,
    plugins:{legend:{display:false}},
    scales:{y:{
      reverse:c.isBronco,
      ticks:{callback:function(v){return c.isBronco?broncoFmt(v):v+c.unit;}}
    }}
  }});
}

function doPlayerAbsence(){
  var date=document.getElementById('abs-date').value;
  var type=document.getElementById('abs-type').value;
  var reason=document.getElementById('abs-reason').value.trim();
  if(!date)return alert('日付を入力してください');
  if(!reason)return alert('理由を入力してください');
  // 既存の欠席記録に追加 or 新規作成
  var dupFlag=false;
  svSafeUpdate('a',function(latest){
    // 同日の記録があれば追加、なければ新規
    var existing=latest.find(function(s){return s.date===date;});
    if(existing){
      // すでに自分が申告済みか確認
      var alreadyIn=existing.absentees.some(function(a){return a.pid===myPid;});
      if(alreadyIn){dupFlag=true;return latest;}
      existing.absentees.push({pid:myPid,reason:type+'：'+reason,source:'player'});
    } else {
      latest.push({id:Date.now(),date:date,label:'',absentees:[{pid:myPid,reason:type+'：'+reason,source:'player'}]});
    }
    return latest;
  },function(){
    if(dupFlag){alert('この日はすでに申告済みです');return;}
    alert('申告しました ✓\nスタッフに通知されます');
    go('mypage');
  });
}

// 全体ランキング表示
function showFullRanking(){
  var FW=['PR','HO','LO','FL','No.8'];
  var BK=['SH','SO','CTB','WTB','FB'];
  var POS_LIST=['PR','HO','LO','FL','No.8','SH','SO','CTB','WTB','FB'];
  var fields=[
    {field:'squat',label:'SQ',unit:'kg'},
    {field:'bench',label:'BP',unit:'kg'},
    {field:'deadlift',label:'DL',unit:'kg'},
    {field:'chinning',label:'チンニング',unit:'kg'},
    {field:'clean',label:'クリーン',unit:'kg'},
    {field:'big3',label:'BIG3',unit:'kg'},
    {field:'bronco',label:'ブロンコ',unit:''}
  ];
  var curField='squat';
  var curGroup='';
  var curPos='';
  var curYear='';
  // 測定会フィルター：最新の測定会をデフォルトに
  var sortedSess=(D.msess||[]).slice().sort(function(a,b){return b.startDate.localeCompare(a.startDate);});
  var curSessId=sortedSess.length?sortedSess[0].id:'all';

  function filterPlayers(){
    return D.p.filter(function(p){
      if(curGroup==='fw'&&FW.indexOf(p.position)<0)return false;
      if(curGroup==='bk'&&BK.indexOf(p.position)<0)return false;
      if(curPos&&p.position!==curPos)return false;
      if(curYear&&String(p.year)!==curYear)return false;
      return true;
    });
  }

  function renderRank(){
    var fi=fields.find(function(f){return f.field===curField;})||fields[0];
    var players=filterPlayers();
    // 測定会フィルター対応のベスト計算
    function getSessVal(pid,field){
      var rs=D.ph.filter(function(x){
        if(x.pid!==pid)return false;
        if(curSessId!=='all'&&x.msessId!==curSessId)return false;
        return true;
      });
      if(field==='bronco'){var vs=rs.filter(function(x){return x.bronco;}).map(function(x){return x.bronco;});return vs.length?Math.min.apply(null,vs):null;}
      if(field==='big3'){var sq=null,bp=null,dl=null;rs.forEach(function(r){if(r.squat&&(!sq||r.squat>sq))sq=r.squat;if(r.bench&&(!bp||r.bench>bp))bp=r.bench;if(r.deadlift&&(!dl||r.deadlift>dl))dl=r.deadlift;});return(sq||bp||dl)?(sq||0)+(bp||0)+(dl||0):null;}
      var vs2=rs.filter(function(x){return x[field];}).map(function(x){return x[field];});return vs2.length?Math.max.apply(null,vs2):null;
    }
    // 前回測定会の値を取得
    function getPrevSessVal(pid,field){
      if(curSessId==='all')return null;
      var idx=sortedSess.findIndex(function(s){return s.id===curSessId;});
      if(idx<0||idx>=sortedSess.length-1)return null;
      var prevSessId=sortedSess[idx+1].id;
      var rs=D.ph.filter(function(x){return x.pid===pid&&x.msessId===prevSessId;});
      if(field==='bronco'){var vs=rs.filter(function(x){return x.bronco;}).map(function(x){return x.bronco;});return vs.length?Math.min.apply(null,vs):null;}
      if(field==='big3'){var sq=null,bp=null,dl=null;rs.forEach(function(r){if(r.squat&&(!sq||r.squat>sq))sq=r.squat;if(r.bench&&(!bp||r.bench>bp))bp=r.bench;if(r.deadlift&&(!dl||r.deadlift>dl))dl=r.deadlift;});return(sq||bp||dl)?(sq||0)+(bp||0)+(dl||0):null;}
      var vs2=rs.filter(function(x){return x[field];}).map(function(x){return x[field];});return vs2.length?Math.max.apply(null,vs2):null;
    }
    var rk=players.map(function(p){
      var v=getSessVal(p.id,curField);
      var prev=getPrevSessVal(p.id,curField);
      return{p:p,v:v,prev:prev};
    }).filter(function(x){return x.v!==null;});
    curField==='bronco'?rk.sort(function(a,b){return a.v-b.v;}):rk.sort(function(a,b){return b.v-a.v;});

    var h='<div style="font-size:18px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px"><svg viewBox="0 0 24 24" width="22" height="22" fill="var(--amber)"><path d="M7 4V2h10v2h3a1 1 0 011 1v3a4 4 0 01-4 4h-.54A6.01 6.01 0 0113 18.91V21h3v2H8v-2h3v-2.09A6.01 6.01 0 016.54 15H6a4 4 0 01-4-4V5a1 1 0 011-1h3zm0 2H4v3a2 2 0 002 2h1V6zm10 5h1a2 2 0 002-2V6h-3v5z"/></svg>ランキング</div>';
    // 測定会セレクター
    h+='<div style="margin-bottom:12px"><div style="font-size:11px;font-weight:600;color:var(--text-secondary);margin-bottom:6px">測定会</div>'+
    '<div style="display:flex;flex-wrap:wrap;gap:6px">'+
    '<button class="btn btn-sm'+(curSessId==='all'?' btn-p':'')+'" onclick="rankSSess(0)">全期間</button>'+
    sortedSess.map(function(s,si){return'<button class="btn btn-sm'+(curSessId===s.id?' btn-p':'')+'" onclick="rankSSessIdx('+si+')">'+escapeHtml(s.name)+'</button>';}).join('')+
    '</div></div>';

    // 種目選択
    h+='<div style="margin-bottom:12px"><div style="font-size:11px;font-weight:600;color:var(--text-secondary);margin-bottom:6px">種目</div>'+
    '<div style="display:flex;flex-wrap:wrap;gap:6px">'+
    fields.map(function(f){return'<button class="btn btn-sm'+(curField===f.field?' btn-p':'')+'" onclick="rankSF(\''+f.field+'\')">'+f.label+'</button>';}).join('')+
    '</div></div>';

    // グループ選択（全体・FW・BK）
    h+='<div style="margin-bottom:10px"><div style="font-size:11px;font-weight:600;color:var(--text-secondary);margin-bottom:6px">グループ</div>'+
    '<div style="display:flex;gap:6px">'+
    '<button class="btn btn-sm'+(curGroup===''&&!curPos&&!curYear?' btn-p':'')+'" onclick="rankSG(\'\')">全体</button>'+
    '<button class="btn btn-sm'+(curGroup==='fw'?' btn-p':'')+'" onclick="rankSG(\'fw\')">FW</button>'+
    '<button class="btn btn-sm'+(curGroup==='bk'?' btn-p':'')+'" onclick="rankSG(\'bk\')">BK</button>'+
    '</div></div>';

    // ポジション絞り込み
    var posList=curGroup==='fw'?FW:curGroup==='bk'?BK:POS_LIST;
    h+='<div style="margin-bottom:10px"><div style="font-size:11px;font-weight:600;color:var(--text-secondary);margin-bottom:6px">ポジション</div>'+
    '<div style="display:flex;flex-wrap:wrap;gap:5px">'+
    '<button class="btn btn-sm'+(curPos===''?' btn-p':'')+'" onclick="rankSP(\'\')">全て</button>'+
    posList.map(function(pos){return'<button class="btn btn-sm'+(curPos===pos?' btn-p':'')+'" onclick="rankSP(\''+pos+'\')">'+pos+'</button>';}).join('')+
    '</div></div>';

    // 学年絞り込み
    h+='<div style="margin-bottom:14px"><div style="font-size:11px;font-weight:600;color:var(--text-secondary);margin-bottom:6px">学年</div>'+
    '<div style="display:flex;gap:5px">'+
    '<button class="btn btn-sm'+(curYear===''?' btn-p':'')+'" onclick="rankSY(\'\')">全学年</button>'+
    [1,2,3,4].map(function(y){return'<button class="btn btn-sm'+(curYear===String(y)?' btn-p':'')+'" onclick="rankSY(\''+y+'\')">'+y+'年</button>';}).join('')+
    '</div></div>';

    // ランキング表示（表彰台＋バー付きリスト）
    var fmtV=function(v){return curField==='bronco'?broncoFmt(v):v+(fi.unit?' '+fi.unit:'');};

// ===== トレーニング入力の下書き（二層保存：localStorage即時＋Firestore tdraft間引き同期。選手ごと1件）=====
// localStorageが信頼層。Firestoreは端末跨ぎ復元用の保険なので、同期失敗は静かに無視する（入力中にalertを出さない）。
function tDraftKey(){return 'rm_tdraft_'+myPid;}
var _tdraftTimer=null;
function saveTDraft(){
  if(!_curTLog)return;
  try{localStorage.setItem(tDraftKey(),JSON.stringify(_curTLog));localStorage.setItem(tDraftKey()+'_t',new Date().toISOString());}catch(e){}
  scheduleCloudTDraft(); // Firestoreへは間引いて同期（無料枠を圧迫しない）
}
function scheduleCloudTDraft(){if(_tdraftTimer)clearTimeout(_tdraftTimer);_tdraftTimer=setTimeout(function(){_tdraftTimer=null;flushCloudTDraft();},3000);}
// Firestore tdraft はリスナーを張らない（入力中に他端末から上書きされたくないため）。書き込みは静かに行う。
function cloudTDraftWrite(updateFn){
  try{
    var ref=db.collection('appdata').doc('tdraft');
    db.runTransaction(function(tx){
      return tx.get(ref).then(function(doc){
        var latest=[];if(doc.exists){try{var p=JSON.parse(doc.data().data);if(Array.isArray(p))latest=p;}catch(e){}}
        latest=updateFn(latest)||[];
        tx.set(ref,{data:JSON.stringify(latest)});
        return latest;
      });
    }).then(function(latest){D.tdraft=latest;}).catch(function(e){console.error('tdraft sync skip:',e);});
  }catch(e){}
}
function flushCloudTDraft(){
  if(!_curTLog||!myPid)return;
  var snapshot;try{snapshot=JSON.parse(JSON.stringify(_curTLog));}catch(e){return;}
  var pid=myPid;
  var rec={pid:pid,draft:snapshot,updatedAt:new Date().toISOString()};
  cloudTDraftWrite(function(latest){
    var arr=Array.isArray(latest)?latest.filter(function(x){return!idEq(x.pid,pid);}):[];
    arr.push(rec);return arr;
  });
}
function fetchCloudTDraft(cb){
  try{
    db.collection('appdata').doc('tdraft').get().then(function(doc){
      var arr=[];if(doc.exists){try{var p=JSON.parse(doc.data().data);if(Array.isArray(p))arr=p;}catch(e){}}
      var mine=arr.filter(function(x){return idEq(x.pid,myPid);})[0];
      cb(mine||null);
    }).catch(function(){cb(null);});
  }catch(e){cb(null);}
}
function clearTDraft(){
  if(_tdraftTimer){clearTimeout(_tdraftTimer);_tdraftTimer=null;}
  try{localStorage.removeItem(tDraftKey());localStorage.removeItem(tDraftKey()+'_t');}catch(e){}
  var pid=myPid;
  cloudTDraftWrite(function(latest){return Array.isArray(latest)?latest.filter(function(x){return!idEq(x.pid,pid);}):[];});
}
function loadTDraft(){try{var s=localStorage.getItem(tDraftKey());if(!s)return null;var d=JSON.parse(s);return(d&&d.results)?d:null;}catch(e){return null;}}
function loadTDraftTime(){try{return localStorage.getItem(tDraftKey()+'_t');}catch(e){return null;}}
// アプリがバックグラウンドへ回る瞬間に下書きをクラウドへ確定（モバイルではbeforeunloadより確実）
if(typeof document!=='undefined'&&document.addEventListener){
  document.addEventListener('visibilitychange',function(){if(document.hidden&&_curTLog){flushCloudTDraft();}});
}

// 実際の実施開始（出欠確認で「する」を選んだ後）。当日・同メニューの下書きがあれば復元を提案
function beginTrainingExec(menuId){
  var mn=getMyMenus().find(function(x){return idEq(x.id,menuId);});
  if(!mn)return;
  // まずローカル下書きを優先（同期・即時）
  var draft=loadTDraft();
  if(draft&&idEq(draft.menuId,menuId)&&draft.date===todayStr()){
    promptResumeTDraft(mn,menuId,loadTDraftTime(),false);
    return;
  }
  // ローカルに無ければクラウド下書きを確認（端末跨ぎ：別端末で入力途中→こちらで続き）
  fetchCloudTDraft(function(cd){
    if(cd&&cd.draft&&idEq(cd.draft.menuId,menuId)&&cd.draft.date===todayStr()){
      // ローカルへ取り込んでから既存の復元フローに乗せる
      try{localStorage.setItem(tDraftKey(),JSON.stringify(cd.draft));if(cd.updatedAt)localStorage.setItem(tDraftKey()+'_t',cd.updatedAt);}catch(e){}
      promptResumeTDraft(mn,menuId,cd.updatedAt,true);
    }else{
      startTrainingFresh(menuId);
    }
  });
}

function resumeTDraft(menuId){
  var mn=getMyMenus().find(function(x){return idEq(x.id,menuId);});
  if(!mn)return;
  var draft=loadTDraft();
  if(!draft){startTrainingFresh(menuId);return;}
  _curTLog=draft;
  resetRestTimer();
  renderTrainingExec(mn);
}
function startTrainingFresh(menuId){
  clearTDraft();
  var mn=getMyMenus().find(function(x){return idEq(x.id,menuId);});
  if(!mn)return;
  var disabled=getMyDisabledEx();
  // 前回セッション検索用: 当日より前のログを新しい順に並べる
  var today=todayStr();
  var sortedPrevLogs=(D.tlog||[]).filter(function(l){
    return idEq(l.pid,myPid)&&!l.absent&&l.results&&l.date<today;
  }).sort(function(a,b){
    var at=a.ts||a.date,bt=b.ts||b.date;return bt.localeCompare(at);
  });
  _curTLog={
    id:Date.now(),pid:myPid,menuId:menuId,date:today,ts:new Date().toISOString(),
    results:(mn.exercises||[]).map(function(ex){
      var oneRM=ex.estBase?getPlayer1RM(myPid,ex.estBase):null;
      var estW=oneRM?estimateWeight(oneRM,ex.reps||1,ex.rir!=null?ex.rir:2):null;
      var isDisabled=disabled.some(function(d){return d.name===ex.name;});
      // 前回実績を取得
      var prevEx=null,prevExDate='';
      for(var k=0;k<sortedPrevLogs.length;k++){
        var found=(sortedPrevLogs[k].results||[]).find(function(x){return x.exName===ex.name&&!x.skipped&&x.sets&&x.sets.length>0;});
        if(found){prevEx=found;prevExDate=sortedPrevLogs[k].date;break;}
      }
      var sets=[];
      for(var s=0;s<(ex.sets||1);s++){
        var prev=prevEx?(prevEx.sets[s]||prevEx.sets[prevEx.sets.length-1]):null;
        sets.push({
          weight:prev&&(prev.weight!==''&&prev.weight!=null)?prev.weight:(estW||''),
          reps:prev&&(prev.reps!==''&&prev.reps!=null)?prev.reps:(ex.reps!=null?ex.reps:''),
          rir:'',done:false
        });
      }
      return{
        exName:ex.name,estBase:ex.estBase,targetSets:ex.sets,targetReps:ex.reps,targetRir:ex.rir,
        note:ex.note,videoUrl:ex.videoUrl,estWeight:estW,oneRM:oneRM,
        prevEx:prevEx?{sets:prevEx.sets,date:prevExDate}:null,
        sets:sets,skipped:isDisabled,skipReason:isDisabled?'申告済み（できない種目）':''
      };
    }),
    totalVolume:0
  };
  resetRestTimer();
  renderTrainingExec(mn);
}

function setTrCompare(mode){window._trCompareMode=mode;var mn=getMyMenus().find(function(x){return idEq(x.id,_curTLog.menuId);});renderTrainingExec(mn);}

// その種目の「前回」ボリューム（mode: prev=直近の同種目、week=7日以上前の直近）
// 同じ日に複数回トレーニングしても、タイムスタンプで「自分より前」を正しく判定
function getCompareVolume(pid,exName,beforeDate,mode){
  var nowTs=(_curTLog&&_curTLog.ts)?_curTLog.ts:new Date().toISOString();
  var curId=_curTLog?_curTLog.id:null;
  var logs=(D.tlog||[]).filter(function(l){
    if(!idEq(l.pid,pid))return false;
    if(curId&&idEq(l.id,curId))return false; // 自分自身は除外
    // タイムスタンプがあれば時刻で、なければ日付で「前」を判定
    if(l.ts&&nowTs)return l.ts<nowTs;
    return l.date<beforeDate;
  }).sort(function(a,b){
    // 新しい順（tsがあればts、なければdate）
    var at=a.ts||a.date,bt=b.ts||b.date;
    return bt.localeCompare(at);
  });
  if(mode==='week'){
    var wkAgo=new Date(beforeDate);wkAgo.setDate(wkAgo.getDate()-6);var wkStr=toDateStr(wkAgo);
    logs=logs.filter(function(l){return l.date<=wkStr;});
  }
  for(var i=0;i<logs.length;i++){
    var r=(logs[i].results||[]).find(function(x){return x.exName===exName&&!x.skipped;});
    if(r&&r.sets){return{vol:r.sets.reduce(function(s,x){return s+((parseFloat(x.weight)||0)*(parseInt(x.reps)||0));},0),date:logs[i].date};}
  }
  return null;
}
// リアルタイム再計算＆表示更新
function refreshTrainingLive(){
  if(!_curTLog)return;
  var compareMode=window._trCompareMode||'prev';
  var totalVol=0,totalPrev=0;
  _curTLog.results.forEach(function(r,ri){
    if(r.skipped)return;
    var exVol=0;
    r.sets.forEach(function(st,si){
      var w=parseFloat(st.weight)||0,rp=parseInt(st.reps)||0;
      exVol+=w*rp;
      // セットごとのアラート
      var alertEl=document.getElementById('tr-set-alert-'+ri+'-'+si);
      if(alertEl){
        var msgs=[];
        if(st.reps!==''&&st.reps!=null&&r.targetReps){
          if(rp<r.targetReps)msgs.push('<span style="color:var(--red)">目標'+r.targetReps+'回に'+(r.targetReps-rp)+'回届かず</span>');
          else if(rp>r.targetReps)msgs.push('<span style="color:var(--green)">目標+'+(rp-r.targetReps)+'回 ◎</span>');
        }
        if(st.rir!==''&&st.rir!=null&&r.targetRir!=null){
          var rv=parseInt(st.rir);
          if(rv>r.targetRir)msgs.push('<span style="color:var(--amber)">RIR+'+(rv-r.targetRir)+'（余裕あり=軽いかも）</span>');
          else if(rv<r.targetRir)msgs.push('<span style="color:var(--red)">RIR-'+(r.targetRir-rv)+'（追い込みすぎ注意）</span>');
        }
        alertEl.innerHTML=msgs.join(' / ');
      }
    });
    totalVol+=exVol;
    // 種目ボリューム表示
    var cmp=getCompareVolume(myPid,r.exName,_curTLog.date,compareMode);
    var prevVol=cmp?cmp.vol:0;
    totalPrev+=prevVol;
    var exEl=document.getElementById('tr-ex-vol-'+ri);
    if(exEl){
      var html='';
      if(prevVol>0){
        var diff=exVol-prevVol;
        if(exVol===0){
          html='<div style="font-size:12px;color:var(--text-secondary);padding:8px;background:var(--bg-primary);border-radius:6px">'+(compareMode==='week'?'先週':'前回')+': '+prevVol.toLocaleString()+'kg</div>';
        }else if(diff>=0){
          html='<div style="font-size:12px;padding:8px;background:rgba(52,211,153,.12);border-radius:6px;color:var(--green);font-weight:600">今 '+exVol.toLocaleString()+'kg ／ '+(compareMode==='week'?'先週':'前回')+' '+prevVol.toLocaleString()+'kg ・ ▲'+diff.toLocaleString()+'kg 超え！</div>';
        }else{
          html='<div style="font-size:12px;padding:8px;background:rgba(248,113,113,.10);border-radius:6px;color:var(--text-primary)">今 '+exVol.toLocaleString()+'kg ／ '+(compareMode==='week'?'先週':'前回')+' '+prevVol.toLocaleString()+'kg ・ <span style="color:var(--red);font-weight:600">あと'+Math.abs(diff).toLocaleString()+'kgで超え</span></div>';
        }
      }else if(exVol>0){
        html='<div style="font-size:12px;color:var(--text-secondary);padding:8px;background:var(--bg-primary);border-radius:6px">今 '+exVol.toLocaleString()+'kg（'+(compareMode==='week'?'先週':'前回')+'の記録なし）</div>';
      }
      exEl.innerHTML=html;
    }
  });
  // 総ボリューム表示
  var box=document.getElementById('tr-total-box');
  if(box){
    var tdiff=totalVol-totalPrev;
    var sub='';
    if(totalPrev>0){
      if(totalVol===0)sub='<div style="font-size:12px;color:var(--text-secondary);margin-top:3px">'+(compareMode==='week'?'先週':'前回')+'計 '+totalPrev.toLocaleString()+'kg</div>';
      else if(tdiff>=0)sub='<div style="font-size:12px;color:var(--green);font-weight:600;margin-top:3px">'+(compareMode==='week'?'先週':'前回')+'計 '+totalPrev.toLocaleString()+'kg ・ ▲'+tdiff.toLocaleString()+'kg 超え！</div>';
      else sub='<div style="font-size:12px;color:var(--text-primary);margin-top:3px">'+(compareMode==='week'?'先週':'前回')+'計 '+totalPrev.toLocaleString()+'kg ・ <span style="color:var(--red);font-weight:600">あと'+Math.abs(tdiff).toLocaleString()+'kg</span></div>';
    }
    box.innerHTML='<div style="font-size:11px;color:var(--text-secondary)">総ボリューム</div><div style="font-size:30px;font-weight:800;color:var(--blue);line-height:1.1">'+totalVol.toLocaleString()+'<span style="font-size:13px;color:var(--text-secondary)"> kg</span></div>'+sub;
  }
}

function setSetWeight(ri,si,val){var el=document.getElementById('tw-'+ri+'-'+si);if(!el)return;el.value=val;updTSet(ri,si,'weight',el.value);}
function adjSetWeight(ri,si,delta){
  var el=document.getElementById('tw-'+ri+'-'+si);if(!el)return;
  var base=(el.value!==''&&!isNaN(parseFloat(el.value)))?parseFloat(el.value):(parseFloat(el.getAttribute('data-fb'))||0);
  var v=Math.round((base+delta)*100)/100;if(v<0)v=0;

// ===== 休憩タイマー（3分カウントダウン）=====
var _restTimer={interval:null,seconds:180,running:false,done:false};
var REST_DEFAULT=180; // 3分
function toggleRestTimer(){
  if(_restTimer.running){
    clearInterval(_restTimer.interval);
    _restTimer.running=false;
  }else{
    // 開始（残り時間が0以下ならリセット）
    if(_restTimer.seconds<=0){_restTimer.seconds=REST_DEFAULT;_restTimer.done=false;}
    _restTimer.running=true;
    updateRestTimerDisplay();
    _restTimer.interval=setInterval(function(){
      _restTimer.seconds--;
      if(_restTimer.seconds<=0){
        _restTimer.seconds=0;_restTimer.running=false;_restTimer.done=true;
        clearInterval(_restTimer.interval);
        updateRestTimerDisplay();updateRestTimerBtn();
        // 通知（バイブ＋アラート）
        if(navigator&&navigator.vibrate)try{navigator.vibrate([200,100,200]);}catch(e){}
        var disp=document.getElementById('rest-timer-disp');
        if(disp){disp.textContent='完了!';disp.style.color='var(--green)';}
        return;
      }
      updateRestTimerDisplay();
    },1000);
  }
  updateRestTimerBtn();
}
function resetRestTimer(){
  clearInterval(_restTimer.interval);
  _restTimer.seconds=REST_DEFAULT;_restTimer.running=false;_restTimer.done=false;
  updateRestTimerDisplay();updateRestTimerBtn();
}
function adjustRestTimer(delta){
  _restTimer.seconds=Math.max(0,_restTimer.seconds+delta);
  _restTimer.done=false;
  updateRestTimerDisplay();
}
function updateRestTimerDisplay(){
  var el=document.getElementById('rest-timer-disp');
  if(el){
    if(_restTimer.done){el.textContent='完了!';el.style.color='var(--green)';return;}
    var m=Math.floor(_restTimer.seconds/60),s=_restTimer.seconds%60;
    el.textContent=m+':'+String(s).padStart(2,'0');
    // 残り30秒で赤、それ以外は青
    el.style.color=_restTimer.seconds<=30?'var(--red)':'var(--blue)';
  }
}
function updateRestTimerBtn(){
  var btn=document.getElementById('rest-timer-btn');
  if(btn)btn.textContent=_restTimer.running?'⏸ 一時停止':(_restTimer.seconds<=0||_restTimer.done?'▶ もう一度':(_restTimer.seconds<REST_DEFAULT?'▶ 再開':'▶ スタート'));
}

// その種目の先週ボリューム（7日前〜実施直前の最新の同種目記録）
function getLastExerciseVolume(pid,exName,beforeDate){
  var logs=(D.tlog||[]).filter(function(l){return idEq(l.pid,pid)&&l.date<beforeDate;}).sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});
  for(var i=0;i<logs.length;i++){
    var r=(logs[i].results||[]).find(function(x){return x.exName===exName&&!x.skipped;});
    if(r){
      return r.sets.reduce(function(sum,s){return sum+((parseFloat(s.weight)||0)*(parseInt(s.reps)||0));},0);
    }
  }
  return 0;
}
// 今日のコンディション取得（当日の睡眠＋前日の疲労RPEを総合判定）
function getTodayCondition(){
  var today=todayStr();
  var yest=toDateStr(new Date(new Date(today).getTime()-86400000));
  var mine=(D.f||[]).filter(function(x){return idEq(x.pid,myPid);});
  if(!mine.length)return null;
  // 当日の記録（複数あれば最新）
  var todayRec=mine.filter(function(x){return x.date===today;}).sort(function(a,b){return (b.inputAt||'').localeCompare(a.inputAt||'');})[0];
  // 前日の記録
  var yestRec=mine.filter(function(x){return x.date===yest;}).sort(function(a,b){return (b.inputAt||'').localeCompare(a.inputAt||'');})[0];
  // 当日も前日も記録がなければ、直近2日以内の記録で代用
  if(!todayRec&&!yestRec){
    var recent=mine.sort(function(a,b){return (b.date||'').localeCompare(a.date||'');})[0];
    if(!recent)return null;
    var daysAgo=Math.floor((new Date(today)-new Date(recent.date))/86400000);
    if(daysAgo>2)return null;
    yestRec=recent; // 疲労の手がかりとして扱う
  }
  var bad=false,good=false,reasons=[];
  // 当日の睡眠（その日のコンディション）
  if(todayRec&&todayRec.sleep!=null&&todayRec.sleep>0){
    if(todayRec.sleep<6){bad=true;reasons.push('睡眠'+todayRec.sleep+'時間と短め');}
    else if(todayRec.sleep>=7.5)good=true;
  }
  // 前日の疲労（RPEが高い＝昨日ハード＝今日に疲労が残る）
  if(yestRec&&yestRec.rpe!=null){
    if(yestRec.rpe>=8){bad=true;reasons.push('前日の練習がハード(RPE'+yestRec.rpe+')');}
    else if(yestRec.rpe<=4)good=good||true;
  }
  // 当日のRPE（既に今日きつい練習をした後にトレーニングする場合）
  if(todayRec&&todayRec.rpe!=null&&todayRec.rpe>=8){bad=true;reasons.push('今日の練習がハード(RPE'+todayRec.rpe+')');}
  return{bad:bad,good:good&&!bad,reasons:reasons};
}
// 記録を保存（アラート判定込み）
function finishTraining(btnEl){
  if(!_curTLog)return;
  // 1) 二重送信ガード（連打でtlog重複作成を防ぐ）。既に処理中なら何もしない。
  if(!guardSubmit(btnEl,'記録中…'))return;
  function abort(){releaseSubmit(btnEl);}

  // 2) 片側だけ入力のセット（重量か回数の一方だけ）を検出。全空セットは無言で除外する。
  var partialCount=0,keptSetsTotal=0,skippedCount=0;
  _curTLog.results.forEach(function(r){
    if(r.skipped){skippedCount++;return;}
    (r.sets||[]).forEach(function(s){
      var hw=isFilled(s.weight),hr=isFilled(s.reps);
      if(hw&&hr)keptSetsTotal++;
      else if(hw||hr)partialCount++;
    });
  });
  // 片側入力は黙って捨てず、確認する（決定4：未入力セットの扱い）
  if(partialCount>0){
    if(!confirm('重量か回数の片方だけ入力されたセットが'+partialCount+'件あります。\nこのまま記録するとそのセットは除外されます。\n\nOK＝そのまま記録 ／ キャンセル＝戻って修正')){return abort();}
  }
  // 実質空の記録（記録すべきセットが1件も無く、スキップも無い）を確認
  if(keptSetsTotal===0&&skippedCount===0){
    if(!confirm('記録できるセットがありません。\nこのまま空の記録を保存しますか？')){return abort();}
  }

  if(_restTimer.interval){clearInterval(_restTimer.interval);_restTimer.running=false;}

  // 3) _curTLog を破壊せず、保存用のクリーンなコピーを生成する（失敗時に元データを温存）
  var alerts=[];
  var injurySkips=[];
  var totalVol=0;
  var cleanResults=_curTLog.results.map(function(r){
    var c={};for(var key in r){if(Object.prototype.hasOwnProperty.call(r,key))c[key]=r[key];} // 既存フィールドを維持（schema不変）
    if(r.skipped){
      if(r.skipReason==='痛み・怪我')injurySkips.push(r.exName);
      return c;
    }
    // 重量・回数の両方が入力されたセットだけを残す（0は有効値として扱う）
    c.sets=(r.sets||[]).filter(function(s){return isFilled(s.weight)&&isFilled(s.reps);}).map(function(s){
      return{weight:parseFloat(s.weight)||0,reps:parseInt(s.reps)||0,rir:isFilled(s.rir)?parseInt(s.rir):null};
    });
    var exVol=c.sets.reduce(function(sum,s){return sum+(s.weight*s.reps);},0);
    totalVol+=exVol;
    c.sets.forEach(function(s,si){
      if(r.targetReps&&s.reps<r.targetReps)alerts.push({type:'reps',ex:r.exName,set:si+1,msg:r.exName+' '+(si+1)+'セット目: 目標'+r.targetReps+'回→実際'+s.reps+'回'});
      if(r.targetRir!=null&&s.rir!=null&&s.rir>r.targetRir)alerts.push({type:'rir',ex:r.exName,set:si+1,msg:r.exName+' '+(si+1)+'セット目: 設定RIR'+r.targetRir+'→実際'+s.rir+'（余裕あり=強度不足かも）'});
      if(r.targetRir!=null&&s.rir!=null&&s.rir<r.targetRir)alerts.push({type:'rir_low',ex:r.exName,set:si+1,msg:r.exName+' '+(si+1)+'セット目: 設定RIR'+r.targetRir+'→実際'+s.rir+'（追い込みすぎ注意）'});
    });
    var cmp=getCompareVolume(myPid,r.exName,_curTLog.date,window._trCompareMode||'prev');
    c.volume=exVol;
    c.lastVolume=cmp?cmp.vol:0;
    c.lastVolumeDate=cmp?cmp.date:null;
    return c;
  });
  var log={};for(var lk in _curTLog){if(Object.prototype.hasOwnProperty.call(_curTLog,lk))log[lk]=_curTLog[lk];}
  log.results=cleanResults;
  log.totalVolume=totalVol;
  log.hasInjurySkip=injurySkips.length>0;

  // 推定1RMを自動計算（BIG3系の種目で、現在の推定値より高ければ記録）
  var e1rmValues={};
  log.results.forEach(function(r){
    if(r.skipped||!r.estBase)return;
    var best=null;
    (r.sets||[]).forEach(function(s){
      if(s.weight&&s.reps){var e=estimateOneRM(s.weight,s.reps,s.rir!=null?s.rir:0);if(e&&(!best||e>best.e1rm))best={e1rm:e,weight:s.weight,reps:s.reps,rir:s.rir};}
    });
    if(best){
      var prevE=getLatestE1RM(myPid)[r.estBase];
      if(!prevE||best.e1rm>prevE.e1rm){
        e1rmValues[r.estBase]={e1rm:best.e1rm,weight:best.weight,reps:best.reps,rir:best.rir};
      }
    }
  });

  // 4) tlog（必須）→ e1rm（任意）を順次安全保存。tlog成功時のみ下書きを消す。
  var items=[{k:'tlog',rec:log}];
  var hasE1rm=Object.keys(e1rmValues).length>0;
  if(hasE1rm)items.push({k:'e1rm',rec:{id:Date.now()+1,pid:myPid,date:todayStr(),inputAt:new Date().toISOString(),values:e1rmValues}});
  svSafeSeq(items,function(done){
    clearTDraft();
    showTrainingResult(log,alerts,injurySkips,hasE1rm?e1rmValues:null);
  },function(err,done,item){
    if(done.indexOf('tlog')>=0){
      // tlogは保存済み。e1rmだけ失敗 → 記録は成立扱い（自己ベスト更新の注記のみ落とす）
      clearTDraft();
      showTrainingResult(log,alerts,injurySkips,null);
    }else{
      // tlog自体が失敗 → _curTLog・下書きは温存し、ボタンを戻して再試行可能にする
      releaseSubmit(btnEl);
      alert('記録の保存に失敗しました。電波の良い場所でもう一度お試しください。入力内容は残っています。');
    }
  });
}

      else diffStr='<span style="color:var(--text-secondary)">±0</span>';
    }else{diffStr='<span style="color:var(--text-secondary);font-size:11px">初回</span>';}
    h+='<div class="card" style="margin-bottom:6px;padding:10px 12px"><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:13px;font-weight:600">'+escapeHtml(r.exName)+'</span><span style="font-size:13px">'+r.volume.toLocaleString()+'kg '+diffStr+'</span></div></div>';

  }

  // 推定1RM（自動記録された場合のみ通知）
  if(e1rmRecorded&&Object.keys(e1rmRecorded).length){

    Object.keys(e1rmRecorded).forEach(function(k){

    var exData=[];
    asc.forEach(function(l){
      var r=(l.results||[]).find(function(x){return x.exName===exName&&!x.skipped;});
      if(r&&r.sets){var vol=r.sets.reduce(function(s,x){return s+((parseFloat(x.weight)||0)*(parseInt(x.reps)||0));},0);exData.push({date:l.date.slice(5),vol:vol});}
    });
    var ctx2=ee.getContext('2d');
    var g2=ctx2.createLinearGradient(0,0,0,180);g2.addColorStop(0,'rgba(52,211,153,0.3)');g2.addColorStop(1,'rgba(52,211,153,0)');
    new Chart(ee,{type:'line',data:{labels:exData.map(function(d){return d.date;}),datasets:[{label:exName,data:exData.map(function(d){return d.vol;}),borderColor:'#34D399',backgroundColor:g2,borderWidth:3,fill:true,tension:.4,pointBackgroundColor:'#1E3251',pointBorderColor:'#34D399',pointBorderWidth:2,pointRadius:4,pointHoverRadius:7}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'rgba(15,27,45,0.96)',padding:12,cornerRadius:10,callbacks:{label:function(c){return c.parsed.y.toLocaleString()+' kg';}}}},scales:{y:{grid:{color:'rgba(159,176,200,0.12)'},ticks:{color:'#9FB0C8',font:{size:11}}},x:{grid:{display:false},ticks:{color:'#9FB0C8',font:{size:11}}}}}});
  }
}
// 推定1RMの伸び（最初と最新を比較）
function getE1RMTrend(pid){
  var recs=(D.e1rm||[]).filter(function(x){return idEq(x.pid,pid);}).sort(function(a,b){return (a.date||'').localeCompare(b.date||'');});
  if(!recs.length)return[];
  var result=[];
  EST_BASES.forEach(function(b){
    var first=null,latest=null;
    recs.forEach(function(rec){
      if(rec.values&&rec.values[b.k]){
        if(first===null)first=rec.values[b.k].e1rm;
        latest=rec.values[b.k].e1rm;
      }
    });
    if(first!==null&&latest!==null){result.push({estBase:b.k,first:first,latest:latest,growth:latest-first});}
  });
  return result;
}

// 連続スキップ検出（直近の記録で同じ種目が連続でskip/未達）
function getConsecutiveSkips(pid){
  var logs=(D.tlog||[]).filter(function(l){return idEq(l.pid,pid);}).sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});
  if(logs.length<2)return[];
  // 種目ごとに、直近からの連続skip回数を数える
  var exSkipCount={};
  var exSeen={};
  logs.forEach(function(lg){
    (lg.results||[]).forEach(function(r){
      if(exSeen[r.exName]==='stopped')return; // 既に連続が途切れた種目はスキップ
      if(r.skipped){
        exSkipCount[r.exName]=(exSkipCount[r.exName]||0)+1;
      }else{
        exSeen[r.exName]='stopped'; // 実施されたら連続終了
      }
    });
  });
  var result=[];
  Object.keys(exSkipCount).forEach(function(name){
    if(exSkipCount[name]>=2)result.push({name:name,count:exSkipCount[name]});
  });
  return result.sort(function(a,b){return b.count-a.count;});
}

T.tape=function(){
  if(!myPid)return;
  if(!D.tapeslot)D.tapeslot=[];
  if(!D.tape)D.tape=[];
  var today=todayStr();
  // 今週〜来週の枠を表示
  var now=new Date();
  var monDt=new Date(now);monDt.setDate(now.getDate()-now.getDay()+1);
  var twoWeekLater=new Date(monDt);twoWeekLater.setDate(monDt.getDate()+13);
  var fromS=toDateStr(monDt);
  var toS=toDateStr(twoWeekLater);
  // 自分の予約
  var myRsvs=D.tape.filter(function(t){return t.pid===myPid;}).sort(function(a,b){return a.date.localeCompare(b.date);});
  // 予約可能な日付
  var availDates=[...new Set(D.tapeslot.filter(function(s){return s.date>=fromS&&s.date<=toS;}).map(function(s){return s.date;}))].sort();
  var h='<div style="font-size:18px;font-weight:600;margin:12px 0 14px">🩻 テーピング予約</div>';
  // 自分の予約
  if(myRsvs.length){
    h+='<div class="form-box"><div class="form-title">あなたの予約</div>';
    myRsvs.forEach(function(rsv){
      var slot=(D.tapeslot||[]).find(function(s){return s.id===rsv.slotId;});
      h+='<div class="log-row"><div style="flex:1"><div style="font-weight:600">'+fmt(rsv.date)+' '+rsv.startTime+'〜'+rsv.endTime+'</div>'+
      '<div style="font-size:12px;color:var(--text-secondary)">'+rsv.parts.join('・')+'</div>'+
      (rsv.assignedTo?'<div style="font-size:11px;color:var(--blue)">担当: '+rsv.assignedTo+'</div>':'')+'</div>'+
      (rsv.date>=today?'<button class="btn btn-d" style="min-width:80px" onclick="cancelTapeRsv('+rsv.id+')">🗑 キャンセル</button>':'<span class="bd bd-g">完了</span>')+'</div>';
    });
    h+='</div>';
  }
  // 予約可能な日
  h+='<div class="form-box"><div class="form-title">予約する</div>';
  if(availDates.length){
    h+='<div style="font-size:12px;color:var(--text-secondary);margin-bottom:10px">予約可能な日を選んでください（今週・来週）</div>';
    h+=availDates.map(function(date){
      var slots=(D.tapeslot||[]).filter(function(s){return s.date===date;});
      var totalCap=slots.reduce(function(c,s){return c+s.capacity;},0);
      var totalBooked=D.tape.filter(function(t){return t.date===date;}).reduce(function(c,t){return c+t.slots;},0);
      var remaining=totalCap-totalBooked;
      return'<div class="card card-click" style="margin-bottom:8px" onclick="showTapeBookForm(\''+date+'\')">'+
      '<div style="display:flex;align-items:center;justify-content:space-between">'+
      '<div><div style="font-weight:600">'+fmt(date)+'</div>'+
      '<div style="font-size:12px;color:var(--text-secondary)">'+(slots[0].type==='match'?'試合前':'練習前')+'</div></div>'+
      '<span class="bd '+(remaining>0?'bd-g':'bd-r')+'">'+(remaining>0?'予約可能':'満員')+'</span></div></div>';
    }).join('');
  } else {
    h+='<div class="no">予約可能な枠がありません</div>';
  }
  h+='</div>';
  $m().innerHTML=h;
};

function selectTapeStaff(staff,idx){
  window._tapeCurrentStaff=staff;
  document.querySelectorAll('[id^="tss-"]').forEach(function(e){e.style.background='';e.style.color='';e.style.borderColor='';});
  var el=document.getElementById('tss-'+idx);
  if(el){el.style.background='var(--blue)';el.style.color='#fff';el.style.borderColor='var(--blue)';}
  updateTapeSlots();
}

function toggleTapePart(el,part){
  tapePartsSelected[part]=!tapePartsSelected[part];
  if(tapePartsSelected[part]){el.style.background='var(--blue)';el.style.color='#fff';el.style.borderColor='var(--blue)';}
  else{el.style.background='';el.style.color='';el.style.borderColor='';}
  updateTapeSlots();
}

function updateTapeSlots(){
  var wrap=document.getElementById('tape-slots-wrap');if(!wrap)return;
  var parts=Object.keys(tapePartsSelected).filter(function(k){return tapePartsSelected[k];});
  var needed=parts.length;
  var staff=window._tapeCurrentStaff;
  var date=window._tapeCurrentDate;
  if(!staff){wrap.innerHTML='<div style="color:var(--text-secondary);font-size:13px">担当者を先に選択してください</div>';return;}
  if(!needed){wrap.innerHTML='<div style="color:var(--text-secondary);font-size:13px">部位を選択してください</div>';return;}
  var slots=(D.tapeslot||[]).filter(function(s){return s.date===date&&s.staff===staff;}).sort(function(a,b){return a.startTime.localeCompare(b.startTime);});
  // 連続したneeded枠が空いている時間帯を探す
  var available=[];
  for(var i=0;i<=slots.length-needed;i++){
    var ok=true;
    for(var j=0;j<needed;j++){
      var s=slots[i+j];
      var booked=D.tape.filter(function(t){return t.slotId===s.id;}).length;
      if(booked>=s.capacity){ok=false;break;}
      if(j>0&&slots[i+j-1].endTime!==s.startTime){ok=false;break;}
    }
    if(ok){available.push({startTime:slots[i].startTime,endTime:slots[i+needed-1].endTime,slotIds:slots.slice(i,i+needed).map(function(s){return s.id;})});}
  }
  if(!available.length){wrap.innerHTML='<div class="alert-card alert-down">'+needed+'部位（'+(needed*5)+'分）の空き枠がありません</div>';return;}
  var availSlotsData=[];
  wrap.innerHTML='<div style="font-size:12px;color:var(--text-secondary);margin-bottom:8px">'+needed+'部位 → '+(needed*5)+'分。時間を選択：</div>'+
  available.map(function(av,idx){
    availSlotsData.push(av);
    return'<div class="select-card" id="tslt-'+idx+'" onclick="selectTapeSlot('+idx+')" style="margin-bottom:6px;text-align:left;padding:10px 14px">'+
    '<span style="font-weight:600">'+av.startTime+' 〜 '+av.endTime+'</span></div>';
  }).join('');
  window._tapeAvailSlots=availSlotsData;
}


var selectedTapeSlot=null;
function selectTapeSlot(idx){
  var slots=window._tapeAvailSlots||[];
  selectedTapeSlot=slots[idx]||null;
  document.querySelectorAll('[id^="tslt-"]').forEach(function(e){e.style.borderColor='';e.style.background='';});
  var el=document.getElementById('tslt-'+idx);
  if(el){el.style.borderColor='var(--blue)';el.style.background='var(--blue-bg)';}
}

function doTapeBook(date){
  if(!D.tape)D.tape=[];
  var parts=Object.keys(tapePartsSelected).filter(function(k){return tapePartsSelected[k];});
  if(!parts.length)return alert('部位を選択してください');
  if(!selectedTapeSlot)return alert('時間枠を選択してください');
  // 重複チェック（同日に既に予約がないか）
  var already=D.tape.find(function(t){return t.pid===myPid&&t.date===date;});
  if(already)return alert('この日はすでに予約があります。キャンセルしてから再予約してください。');
  var rsv={id:Date.now(),pid:myPid,date:date,slotId:selectedTapeSlot.slotIds[0],slotIds:selectedTapeSlot.slotIds,startTime:selectedTapeSlot.startTime,endTime:selectedTapeSlot.endTime,parts:parts,slots:parts.length,staff:window._tapeCurrentStaff||'',assignedTo:null,tapeNote:''};
  var dup=false;
  svSafeUpdate('tape',function(latest){
    if(latest.find(function(t){return t.pid===myPid&&t.date===date;})){dup=true;return latest;}
    latest.push(rsv);return latest;
  },function(){
    if(dup){alert('この日はすでに予約があります。キャンセルしてから再予約してください。');return;}
    alert('予約しました ✓');T.tape();
  });
}

function cancelTapeRsv(rid){
  if(!confirm('この予約をキャンセルしますか？'))return;
  svSafeUpdate('tape',function(latest){return latest.filter(function(t){return t.id!==rid;});},function(){T.tape();});
}
