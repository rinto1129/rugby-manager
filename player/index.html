function doMatch(){
  var injured=document.getElementById('md-inj').value==='はい';

  var rec={id:Date.now(),pid:myPid,date:document.getElementById('md-date').value,role:document.getElementById('md-role').value,fatiguePre:parseInt(document.getElementById('md-fpre').value)||0,fatiguePost:parseInt(document.getElementById('md-fpost').value)||0,sleepTime:document.getElementById('md-stime').value,wakeTime:document.getElementById('md-wtime').value,breakfast:document.getElementById('md-bf').value,breakfastDetail:document.getElementById('md-bftext').value,injured:injured,cramp:cramp};
  if(injured){rec.injSide=document.getElementById('md-side').value;rec.injPart=document.getElementById('md-part').value;rec.injType=document.getElementById('md-type').value;rec.injHistory=document.getElementById('md-hist').value;rec.injHow=document.getElementById('md-how').value;rec.injPainAt=parseInt(document.getElementById('md-painat').value)||0;rec.injPainNow=parseInt(document.getElementById('md-painnow').value)||0;rec.injContinued=document.getElementById('md-cont').value;rec.canPractice=document.getElementById('md-canprac').value;

    var injId=Date.now()+100;
    D.i.push({id:injId,pid:myPid,side:rec.injSide,part:rec.injPart,partOther:'',type:rec.injType,typeOther:'',date:rec.date,returnDate:'',hospitalVisited:false,hospitalDate:'',note:'【試合で受傷】'+rec.injHow+' / 痛み:受傷時'+rec.injPainAt+' 現在'+rec.injPainNow+' / '+rec.injHistory+' / プレー続行:'+rec.injContinued+' / 来週練習:'+rec.canPractice,resolved:false,source:'match',canPractice:rec.canPractice});

  if(cramp){rec.crampFreq=document.getElementById('md-crampfreq').value;}

}

// === PRACTICE INJURY REPORT ===
function getTodayPickup(){
  var lastMeasured=D.p.map(function(p){var recs=D.bc.filter(function(r){return r.pid===p.id;});var last=recs.length?recs.sort(function(a,b){return b.date.localeCompare(a.date);})[0].date:'2000-01-01';return{pid:p.id,last:last};});
  lastMeasured.sort(function(a,b){return a.last.localeCompare(b.last);});
  var today=todayStr();var seed=0;for(var ci=0;ci<today.length;ci++)seed+=today.charCodeAt(ci);
  var pool=lastMeasured.slice(0,15);
  for(var si=pool.length-1;si>0;si--){var j=(seed+si)%si;var tmp=pool[si];pool[si]=pool[j];pool[j]=tmp;}
  return pool.slice(0,5).map(function(x){return x.pid;});
}
